front:
  text: 秋水第十七秋水時至百川灌河涇流之大兩涘渚涯之間不辯牛馬
  hash: sha256:42d46e70bd9a2e1660056d9a32b1ad630f4c780eb320069638e0c7b0b0026c2e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0139_YP-C_09niuji-05-0013b, image: JY132/09niuji-05-0013b.png}
body:
  text: 註言其廣也疏河孟津也涇通也涘岸也涯際也渚洲也水中之可居曰洲也大水生於春而旺於秋素秋陰氣猛盛多致霖雨故秋時而水至也既而凡百川谷皆灌注黃河通流盈滿其水甚大涯崖曠闊洲渚迢遥遂使隔水遠看不辯牛之與馬也於是焉河伯欣然自喜以天下之美爲盡在己疏河伯河神也姓馮名夷華陰潼堤鄉人得水仙之道河既曠大故欣然懽喜謂天下榮華盛美盡在己身順流而東行至於北海東面而視不見水端於是焉河伯始旋其面目望洋向若而歎曰野語有之曰聞道百以爲莫己若者我之謂也疏北海今萊州是望洋不分明也水日相映故望洋也若海神也河伯㳂流東行至于大海聊復顧眄不見水之端涯方始迴旋面目高視海若仍慨然發歎託之野語而百是萬之一誠未足以自多遂爲無如己者卽河伯之謂也此乃鄙里之談未爲通論耳且夫我嘗聞少仲尼之聞而輕伯夷之義者始吾弗信今我覩子之難窮也吾非至於子之門則殆矣吾長見笑於大方之家註知其小而不能自大則理分有素跂尚之情無爲乎其間疏方猶道也世人皆以仲尼刪定六經爲多聞博識伯夷讓國清廉其義可重復有通人達士議論高談以伯夷之義爲輕仲尼之聞爲寡卽河伯嘗聞竊未之信今見大海之宏博浩汗難窮方覺昔之所聞諒不虛矣河伯不至海若之門於事大成危殆既而所見狹劣則長被嗤笑於大道之家北海若曰井蛙不可以語於海者拘於墟也夏蟲不可以語於氷者篤於時也曲士不可以語於道者束於教也註夫物之所生而安者趣各有極疏海若知河伯之狹劣舉三物以譬之夫坎井之蛙聞大海無風而洪波百尺必不肯信者爲拘於墟域也夏生之蟲至秋便死聞玄冬之時水結爲冰雨凝成霰必不肯信者心厚於夏時也曲見之士偏執之人聞說虛通至道絶聖棄智大毫末而小太山壽殤子而夭彭祖而必不信者爲束縛於名教故也而河伯不至洪川未逢海若自矜爲大其義亦然今爾出於涯涘觀於大海乃知爾醜爾將可與語大理矣註以其知分故可與言理也疏河伯駕水乘流超於涯涘之表適逢海若仍於澣海之中詳觀大壑之無窮方鄙小河之陋劣既悟所居之有限故可語大理之虛通也哉天下之水莫大於海萬川歸之不知何時止而不盈尾閭泄之不知何時已而不虛春秋不變水旱不知此其過江河之流不可爲量數疏尾閭者泄海水之所也在碧海之東其處有石闊四萬里厚四萬里居百川之下尾而爲閭族故曰尾閭海水沃著卽焦亦名沃焦也山海經云羿射九日落爲沃焦此言迂誕今不詳載春雨少而秋雨多堯遭水而湯遭旱故海之爲物也萬川歸之而不盈沃焦瀉之而不虛春秋不變其多少水旱不知其增減論其大也遠過江海之流優劣懸殊豈可語其量數也而吾未嘗以此自多者自以比形於天地而受氣於陰陽吾在天地之間猶小石小木之在大山也方存乎見少又奚以自多註窮百川之量而縣於河河縣於海海縣於天地則各有量也此發辭氣者有似乎觀大可以明小尋其意則不然夫世之所患者不夷也故體大者快然謂小者爲無餘質小者塊然謂大者爲至足是以上下夸跂俯仰自失此乃生民之所惑也惑者求正正之者莫若先極其差而因其所謂所謂大者至足也故秋毫無以累乎天地矣所謂小者無餘也故天地無以過乎秋毫矣然後惑者有由而反各知其極物安其分逍遥者用其本步而遊乎自得之場矣此莊子之所以發德音也若如惑者之說轉以小大相傾則相傾者無窮矣若夫覩大而不安其小視小而自以爲多將奔馳於勝負之境而助天民之矜夸豈達乎莊生之旨哉疏存在也奚何也夫覆載萬物莫大於天地布氣生化莫大於陰陽也是以海若比形於天地則無等級以寄言受氣於陰陽則是陰陽象之一物也故託諸物以爲譬猶小木石之在太山乎而海若於天理在乎寡少物各有量亦何足以自多計四海之在天地之間也不似礨穴之在大澤乎計中國之在海內不似稊米之在大倉乎疏礨穴蟻穴也稊草似稗而米甚細小也中國九州也夫四海在天地之間九州居四海之內豈不似蟻孔之居大澤稊米之在大倉乎言其大小優劣有如此之懸也號物之數謂之萬人處一焉人卒九州穀食之所生舟車之所通人處一焉此其比萬物也不似毫末之在於馬體乎註小大之辯各有階級不可相跂疏號名號也卒眾也夫物之數不止於萬而世間語便多稱萬物人是萬數中之一物也中國九州人眾聚集百穀所生舟車來往在其萬數亦處一焉然以人比之萬物九州方之宇宙亦無異乎一毫之在馬體曾何足以介懷也五帝之所連三王之所爭仁人之所憂任士之所勞盡此矣註不出乎一域疏五帝連接而揖讓三王興師而爭奪仁人殷憂於社稷任士劬勞於職務四者雖事業不同俱理盡於毫末也伯夷辭之以爲名仲尼語之以爲博此其自多也不似爾向之自多於水乎註物有定域雖至知不能出焉故起大小之差將以申明至理之無辯也疏伯夷讓五等以成名仲尼論六經以爲博用斯輕物持此自多亦何異乎向之河伯自多於水此通合前喻並覆釋前少仲尼之聞輕伯夷之義也河伯曰然則吾大天地而小毫末可乎疏夫形之大者無過天地質之小者莫先毫末故舉大極小以明禀分有差河伯呈己所知詢於海若又解若以自足爲大吾可大於兩儀若以無餘爲小吾可小於毫末河伯既其領悟故物我均齊所以述己解心詢其可不也已北海若曰否夫物量無窮註物物各有量疏既領所疑答云不可夫物之器量禀分不同隨其所受各得稱適而千差萬降品類無窮稱適之處無大無小豈得率其所知抑以爲定時無止註死與生皆時行疏新新不住分無常註得與失皆分疏所禀分命隨時變易終始無故註日新也疏雖復終而復始而未嘗不新也是故大知觀於遠近故小而不寡註各自足也疏此下釋量無窮也以大聖之知觀於遠理察於近事故毫末雖小當體自足無所寡少也大而不多註亦無餘也疏天地雖大當體無餘故未足以自多也不多則無夸不寡則息企也知量無窮註覽而觀之知遠近大小之物各有量疏以大人之知知於物之器量大小雖異各稱其情名不同故無窮也此結前物量無窮也證曏今故註曏明也今故猶古今疏此下釋時無止義也曏明也既知小大非小大則證明古今無古今也故遥而不悶註遥長也掇而不跂註掇猶短也疏遙長也掇短也既知古今無古今則知壽夭無壽夭是故年命延長終不厭生而悒悶禀齡夭促亦不欣企於遐壽隨變任化未始非吾知時無止註證明古今知變化之不止於死生也故不以長而悒悶短故爲跂也疏此結前時無止義也察乎盈虛故得而不喜失而不憂疏此下釋分無常義也夫天道既有盈虛人事寧無得喪是以觀乎盈虛之變達乎得喪之理故儻然而得時也不足爲欣偶爾而失命也不足爲戚也知分之無常也註察其一盈一虛則知分之不常於得也故能忘其憂喜疏此結前分無常義也明乎坦塗註死生者日新之正道疏此下釋終始無故義也坦平也途道也不以死爲死不以生爲生死生無隔故明乎坦然平等之大道者如此故生而不悅死而不禍疏夫明乎坦然之道者生也不足以爲欣悅其死也不足以爲禍敗達死生之不二何憂樂之可論乎知終始之不可故也註明終始之日新也則知故之不可執而留矣是以涉日新而不愕舍故而不驚死生之化若一疏此結前終始無故義計人之所知不若其所不知註所知各有限也疏强知者乖眞不知者會道以此計當故不如也其生之時不若未生之時註生時各有年也疏未生之時無喜所以無憂既生之後有愛所以有憎以其至小求窮其至大之域是故迷亂而不能自得也註莫若安於所受之分而已疏至小智也至大境也夫以有限之小智求無窮之大境而無窮之境未周有限之知已喪是故終身迷亂返本無由喪己企物而不自得也由此觀之又何以知毫末之足以定至細之倪又何以知天地之足以窮至大之域註以小求大理終不得各安其分則大小俱足矣若毫末不求天地之功則周身之餘皆爲棄物天地不見大於秋毫則顧其形象裁自足耳將何以知細之定細大之定大也疏夫物之禀分各自不同大小雖殊而咸得稱適若以小企大則迷亂失性各安其分則逍遙一也故毫末雖小性之可以稱大二儀雖大無餘可以稱小由此觀之至小之倪何必定在於毫末至大之域豈猶理窮於天地河伯曰世之議者皆曰至精無形至大不可圍是信情乎疏信實也世俗議論未辯是非僉言至精細者無復形質至曠大者不可圍繞未知此理情智虛實河伯未達故有此疑也北海若曰夫自細視大者不盡自大視細者不明註目之所見有常極不能無窮也故於大則有所不盡於細則有所不明直是目之所不逮耳精與大皆非無也庸詎知無形而不可圍者哉疏夫以細小之形視於曠大之物者必不盡其宏遠故謂之不可圍又以曠大之物觀於細小之形者必不曉了分明故謂之無形質此並未出於有境豈是至無之義哉夫精小之微也垺大之殷也故異便註大小異故所便不得同疏精微小也垺殷大也欲明小中之小大中之大禀氣雖異並不離有形天機自張各有宜便也此勢之有也註若無形而不可圍則無此異便之勢也疏大小既異宜便亦殊故知此勢未超於有之已夫精粗者期於有形者也註有精粗矣故不得無形疏夫言及精粗者必期限於形名之域而未能超於言象之表也無形者數之所不能分也不可圍者數之所不能窮也疏無形不可圍者道也至道深玄絶於心色故不可以名數分別亦不可以數量窮盡可以言論者物之粗也可以意致者物之精也言之所不能論意之所不能察致者不期精粗焉註唯無而已何精粗之有哉夫言意者有也而所言所意者無也故求之於言意之表而入乎無言無意之域而後至焉疏夫可以言辯論說者有物之粗法也可以心意致得者有物之精細也而神口所不能言聖心不能察者妙理也必求之於言意之表豈期必於精粗之間乎是故大人之行不出乎害人註大人者無意而在天行也舉足而投諸吉地豈出害人之塗哉疏夫大人應物譬彼天行運而無心故投諸吉地出言利物終不害人也不多仁恩註無害而不自多其恩疏慈澤類乎春陽而不多徧行恩惠也動不爲利疏應理而動而理自無害疏應機而動不域心以利物不賤門隸註任其所能而位當於斯耳非由賤之故措之斯職疏混榮辱一窮通故守門僕隸不以爲賤也貨財弗爭註各使分定疏寡欲知足守分不貪故於彼貨財曾無爭競也不多辭讓註適中而已疏率性謙和用捨隨物終不矯情飾辭多讓事焉不借人註各使自任疏愚智率性工拙襲情終不假借於人分外求務不多食乎力註足而已疏食於分內充足而已不多貪求疲勞心力不賤貪污註理自無欲疏體達玄道故無情欲非關苟貴清廉賤於貪汚行殊乎俗註己獨無可無不可所以與俗殊疏和光同塵無可不可而在染不染故行殊乎俗也不多辟異註任理而自殊也疏居正體道故不多邪僻而大順羣生故曾無乖異也爲在從眾註從眾之所爲疏至人無心未曾專己故凡厥施爲務在從眾也不賤佞謟註自然正直疏素性忠貞不履左道非鄙賤佞謟而後正直也世之爵祿不足以爲勸戮恥不足以爲辱註外事不接於心疏夫高官重祿世以爲榮刑戮黜落世以爲恥既而體榮枯之非我遠通塞之有時寄來不足以勸勵寄去不足以羞辱也知是非之不可爲分細大之不可爲倪註故玄同也疏各執是非故是非不可爲定分互爲大小故細大何得有倪限卽天地毫末之謂乎聞曰道人不聞註任物而物性自通則功名歸物矣故不聞疏夫體道聖人和光韜晦推功於物無功名之可聞寓諸他人故稱聞曰至德不得註得者生於失也物各無失則得名去也疏得者不喪之名也而造極之人均於得喪既無所喪亦無所得故老經云上德不德大人無己註任物而已疏大聖之人有感斯應方圓任物故無己也約分之至也註約之以至其分故冥也夫唯極乎無形而不可圍者爲然疏約依也分限也夫大人利物抑乃多塗要切而言莫先依分若視目所見聽耳所聞知止所知而限於分內者斯德之至者也河伯曰若物之外若物之內惡至而倪貴賤惡至而倪小大疏若物之外若物之內謂物性分之內外也惡何也言貴賤之分小大之倪爲在物性之中爲在生分之外至何處所而有此耶河伯未達其源故致斯請也北海若曰以道觀之物無貴賤註各自足也疏道者虛通之妙理物者質礙之麤事而以麤觀妙故有大小以妙觀麤故無貴賤以物觀之自貴而相賤註此區區者乃道之所錯綜而齊之也疏夫物情倒置迷惑是非皆欲貴己而賤他他亦自貴而賤彼彼此懷惑故言相也以俗觀之貴賤不在己註斯所謂倒置也疏夫榮華戮恥事出儻來而流俗之徒妄生欣惑是以寄來爲貴得之所以爲寵寄去爲賤失之所以爲辱斯乃寵辱由乎外物豈貴賤在乎己哉以差觀之因其所大而大之則萬物莫不大因其所小而小之則萬物莫不小知天地之爲稊米也知毫末之爲邱山也則差數觀矣註所大者足也所小者無餘也故因其性足以名大則毫末丘山不得異其名因其無餘以稱小則天地稊米無所殊其稱若未觀差而不由斯道則差數相加幾微相傾不可勝察也疏差别也夫以自足爲大則毫末之與丘山均其大矣以無餘爲小則天地之與稊米均其小矣是以因毫末爲大則萬物莫不大矣因天地以爲小則萬物莫不小矣故雖千差萬降數量不同而以此觀之則理可見以功觀之因其所有而有之則萬物莫不有因其所無而無之則萬物莫不無知東西之相反而不可以相無則功分定矣註天下莫不相與爲彼我而彼我皆欲自爲斯東西之相反也然彼我相與爲唇齒者未嘗相爲而唇亡則齒寒故彼之自爲濟我之功弘矣斯相反而不可以相無者也故因其自爲而無其功則天下之功莫不皆無矣因其不可相無而有其功則天下之功莫不皆有矣若乃忘其自爲之功而思夫相爲之惠惠之愈勤而偽薄滋甚天下失業而情性瀾漫矣故其功分無時可定也疏夫東西異方其義相反也而非東無以立西斯不可以相無者也若近取諸身者眼見耳聽手捉脚行五臟六腑四肢百體各有功能咸禀定分豈眼爲耳視而腳爲手行哉相爲之功於斯減矣此是因其所無而無之則萬物莫不無也然足不行則四肢爲之委頓目不視則百體爲之否塞而所司各用無心相爲濟彼之功自然成矣斯因其所有而有之則萬物莫不有也以此觀之則功用有矣分各定矣若乃忘其自爲之功而思夫相爲之惠則彼我失性而是非淆亂也豈莊生之意哉以趣觀之因其所然而然之則萬物莫不然因其所非而非之則萬物莫不非知堯桀之自然而相非則趣操覩矣註物皆自然故無不然物皆相非故無不非無不非則無然矣無不然則無非矣無然無非者堯也有然有非者桀也然此二君各受天素不能相爲故因堯桀以觀天下之趣操其不能相爲也可見也疏然猶是也夫物皆自是故無不是物皆相非故無不非無不非則天下無是矣無不是則天下無非矣故以物情趣而觀之因其自是則萬物莫不是因其相非則萬物莫不非矣天下之極相反者堯桀也故舉堯桀之二君以明是非之兩義故堯以無爲爲是有欲爲非桀以無爲爲非有欲爲是故曰知堯桀之自然相非因此而言則天下萬物情趣志操可以見之矣昔者堯舜讓而帝之噲讓而絶疏夫帝王異代爭讓殊時既而堯知天命有歸故禪於舜舜知歷祚將改又讓於禹唐虞是五帝之數故曰讓而帝也子之燕相子之也噲燕王名也子之卽蘇秦之女婿也秦弟蘇代從齊使燕以堯讓許由故事說燕王噲令讓位與子之子之遂受國人恨其受讓皆不服子之三年國亂齊宣王用蘇代計興兵伐燕於是殺燕王噲於郊斬子之於朝以絶燕國豈非効堯舜之陳迹而禍至於此乎湯武爭而王白公爭而滅註夫順天應人而受天下者其迹則爭讓之迹也尋其迹者失其所以迹矣故絶滅也疏殷湯伐桀周武克紂此之二君皆受天命故致六合清泰萬國來朝是以時繼三王故云爭而王也而時須干戈應以湯武時須揖讓應以堯舜故千變萬化接物隨時讓爭之迹不可執留也白公名勝楚平王之孫太子建之子也平王用費無忌之言納秦女而疏太子太子奔鄭取鄭女而生勝太傅伍奢被殺子胥奔吳勝從奔吳與胥耕於野楚令尹子西迎勝歸國封於白邑僭號稱公勝以鄭人殺父請兵報讐頻請不允遂起兵反楚遣葉公子高伐而滅之故曰白公爭而滅由此觀之爭讓之禮堯桀之行貴賤有時未可以爲常也疏爭讓文武也堯桀是非也若經緯天地則賤武而貴文若克定禍亂則賤文而貴武是以文武之道貴賤有時而是非之行亦用捨何定故爭讓之禮於堯舜湯武之時則貴於之噲白公時則賤不可常也梁麗可以衝城而不可以窒穴言殊器也疏梁屋梁也麗屋棟也衝擊也窒塞也言梁棟大可用作攻擊城隍不可用塞於鼠穴言其器用大小不同之也騏驥驊騮一日而馳千里捕鼠不如狸狌言殊技也疏騏驥驊騮並古之良馬也捕捉也狸狌野猫也夫良馬駿足日馳千里而捕捉小鼠不及狸狌是伎藝不同不可一概而取者也鴟鵂夜撮蚤察毫末晝出瞋目而不見丘山言殊性也註就其殊而任之則萬物莫不當也疏鴟鵂鶹也亦名隻狐是土梟之類也晝則眼闇夜則目明故夜能撮捉蚤虱察視秋毫之末晝出瞋張其目不見邱山之形是知物性不同豈直鴟鵂而已故隨其性而安之則物無不當也故曰蓋師是而無非師治而無亂乎是未明天地之理萬物之情者也註夫天地之理萬物之情以得我爲是失我爲非適性爲治失和爲亂然物無定極我無常適殊性異便是非無主若以我之所是則彼不得非此知我而不見彼者耳故以道觀者於是非無當也付之天地恣之兩行則殊方異類同焉皆得也疏蓋不盡之辭也師猶師心也夫物各師其域心妄爲偏執將己爲是不知他以爲非將我爲治不知物以爲亂故師心爲是不見己上有非師心爲治謂言我身無亂豈知治亂同原是非無主故治亂同源者天地之理也是非無主者萬物之情也闇於斯趣故言未明也是猶師天而無地師陰而無陽其不可行明矣疏夫天地陰陽相對而有若使有天無地則萬物不成有陰無陽則蒼生不立是知師是而無非師治而無亂者必不可行明矣然且語而不舍非愚則誣也註天地陰陽對生也是非治亂互有也將奚去哉疏若夫師是而無非師天而無地語及於此而不捨於口者若非至愚之人則是故爲誣罔帝王殊禪三代殊繼差其時逆其俗者謂之篡夫疏帝五帝也王三王三代夏殷周禪授也繼續也或宗族相承或讓與他姓故言殊禪也或父子相繼或興兵篡弑故言殊繼也或遲速差互不合天時或氓俗未歸逆於人事是以之噲纂堯舜以絶嗣白公效湯武以滅身如此之流謂之篡奪也當其時順其俗者謂之義之徒疏夫干戈揖讓事迹不同用捨有時不可常執至如湯武興兵唐虞揖讓上符天道下合人心如此之徒謂之爲義也默默乎河伯汝惡知貴賤之門小大之家註俗之所貴有時而賤物之所大世或小之故順物之迹不得不殊斯五帝三王之所以不同也疏河伯未能會理故海若訶使忘言默默莫聲幸勿辭費也夫小大無主貴賤無門物情顚倒妄爲臧否故汝於何推逐而知貴賤小大之家門乎言其不知也河伯曰然則我何爲乎何不爲乎吾辭受趣舍吾終奈何疏奈何猶如何也河伯雖領高義而未達旨歸故更請決疑遲聞解釋我欲處涉人世攝衛修道於何事而可爲乎於何事而不可爲乎及辭讓受納進趣退舍眾諸物務其事云何願垂告誨終身奉遵北海若曰以道觀之何貴何賤是謂反衍註貴賤之道反覆相尋疏反衍猶反覆也夫貴賤者生乎妄執也今以虛通之理照之則貴者反賤而賤者復貴故謂之反衍也無拘而志與道大蹇註自拘執則不夷於道疏而汝也夫修道之人應須放任而汝乃拘執心志矜而持之故與虛通之理蹇而不夷之也何少何多是謂謝施註隨其分故所施無常疏謝代也施用也夫物或聚少以成多或散多以爲少故施張代謝無常定耳無一而行與道參差註不能隨變則不齊於道疏夫代謝施用多少適時隨機變化故能齊物若執一爲行則與理不冥者也嚴乎若國之有君其無私德註公當而已疏體道之士望之儼然端拱萬乘楷模於物群彼萬國宗仰一君亭毒黎元必無私德繇繇乎若祭之有社其無私福註天下之所同求疏繇繇賒長之貌也若眾人之祭社稷而社稷無私福於人也汛汛乎其若四方之無窮其無所畛域註汛汛然無所在疏汛汛普徧之貌也夫至人立志周普無偏接濟羣生汛愛平等譬東西南北曠遠無窮量若虛空豈有畛界限域也兼懷萬物其孰承翼註掩御羣生反之分內而平往者也豈扶疏而承翼哉疏懷藏也孰誰也言大聖慈悲兼懷庶品平往而已終無偏愛誰復有心拯救接承扶翼也是謂無方註無方故能以方物爲方疏譬彼明鏡方兹幽谷逗機百變無定一方也萬物一齊孰短孰長註莫不皆足疏萬物參差亭毒唯一𠒎鶴長短分足性齊道無終始物有死生註死生者無窮一變耳非終始也疏虛通之道無終無始執滯之物妄計死生故老經云迎不見其首隨不見其後不恃其成註成無常處疏有物無方超然獨化豈假待對而後生成也一虛一滿不位乎位形註不以形爲位而守之不變疏譬彼陰陽春生秋殺盈虛變化榮落順時豈執守形骸拘持名位耶年不可舉註欲舉之令去而不能時不可止註欲止之使停又不可疏夫年之夭壽時之賒促出乎天理蓋不由人故其來也不可舉而令去其去也不可止而令住但當任之未始非我也消息盈虛終則有始註變化日新未嘗守故疏夫陰消陽息夏盈冬虛氣序循環終而復始混成之道變化日新循理直前無勞措意也是所以語大義之方論萬物之理也疏前來所辯海若之談正是語大道之義方論萬物之玄理者也物之生也若驟若馳註但當就用耳疏夫生滅流謝運運不停其爲迅速如馳如驟是知百年焂獎忽何足介懷也無動而不變無時而不移註故不可執而守疏夫流動變化時代遷移迅若交臂驟如過隙故未有語動而不變化言時而不遷移也何爲乎何不爲乎夫固將自化註若有爲不爲於其間則敗其自化矣疏萬物紛亂同禀天然安而化之必自變化何勞措意爲與不爲河伯曰然則何貴於道邪註以其自化疏若使爲與不爲混一則凡聖之理均齊既任變化之自然又何貴於至道河伯更起斯問遲以所疑北海若曰知道者必達於理達於理者必明於權明於權者不以物害己註知道者知其無能也無能也則何能生我我自然而生耳而四支百體五臟精神己不爲而自成矣又何有意乎生成之後哉達乎斯理者必能遣過分之知遺益生之情而乘變應權故不以外傷內不以物害己所以常全也疏夫能知虛通之道者必達殊玄之實理達深玄之實理者必明於應物之權智既明權實之無方故能安排而去化死生無變於己何外物之能害哉以答河伯之所疑次明至道之可貴至德者火弗能熱水弗能溺寒暑弗能害禽獸弗能賊註夫心之所安則危不能危意無不適故苦不能苦也疏至德者謂得至道之人也雖復和光混世處俗同塵而不爲四序所侵不爲三災所害既得之於內故外不能賊此明解道之可貴也非謂其薄之也註雖心所安亦不使犯之疏薄輕也所以水火不侵禽獸不害者惟心所安則傷不能傷也既不違避亦不輕犯之也言察乎安危註知其不可逃也疏所以傷所不能傷者正言審察乎安危順之而不可逃處之而常適也寧於禍福註安乎命之所遇疏寧安也禍窮塞也福通達也至德之人唯變所適體窮通之有命達禍福之無門故所樂非窮通而所遇常安也謹於去就註審去就之非己疏謹去就之無定審取捨之有時雖復順物遷移而恒居至當者莫之能害也註不以害爲害故莫之能害疏一於安危冥於禍福與化俱往故物莫能傷此總結以前無害之義故曰天在內人在外註天然在內而天然之所順者在外故大宗師曰知天人之所爲者至矣明內外之分皆非爲也疏天然之性韞之內心人事所須涉乎外迹皆非爲也任之自然故物莫之害矣德在乎天註恣人任知則流蕩失素也疏至德之美在乎天然若恣人任知則流蕩天性知天人之行本乎天位乎得註此天然之知自行而不出乎分也故雖行於外而常本乎天而位乎得矣疏此眞知也位居處也運眞知而行於世雖涉於物千變萬化而恒以自然爲本居於虛極而不喪其性動而寂者也蹢䠱而屈伸註與機會相應者有斯變也疏蹢䠱進退不定之貌也至人應世隨物汙隆或屈或伸曾無定執趣人冥會以逗機宜反要而語極註知雖落天地事雖核萬物而常不失其要極故天人之道全也疏雖復混迹人間而心恒凝靜常居樞要而反本還源所有語言皆發乎虛極動不乖寂語不乖默也曰何謂天何謂人疏何伯未達玄妙更起此疑問天人之道庶希後答也北海若曰牛馬四足是謂天落馬首穿牛鼻是謂人註人之生也可不服牛乘馬乎服牛乘馬可不穿落之乎牛馬不辭穿落者天命之固當也苟當乎天命則雖寄之人事而本在乎天也疏夫牛馬禀於天自有四腳非關人事故謂天羈勒馬頭貫穿牛鼻出自人意故謂之人然牛鼻可穿馬首可絡不知其爾莫辯所由事雖寄乎人情理終歸乎造物欲顯天人之一道故託牛馬之二獸也故曰無以人滅天註穿落之可也若乃走作過分驅步失節則天理滅矣疏夫因自然而加人事則羈絡之可也若乃穿馬絡牛乖於造化可謂逐人情之矯偽滅天理之自然無以故滅命註不因其自爲而故爲之者命其安在乎疏夫率性乃動動不過分則千里可致而天命全矣若乃以駑勵驥而驅馳失節斯則以人情事故毁滅天理危亡旦夕命其安在乎豈唯馬牛萬物皆爾無以得殉名註所得有常分殉名則過也疏夫名之可殉者無涯性之所得者有限若以有限之得殉無涯之名則天理滅而性命喪矣謹守而勿失是謂反其眞註眞在性分之內疏夫愚智夭壽窮通榮辱禀之自然各有其分唯當謹固守持不逐於物得於分內而不喪於道者謂反本還源復於眞性者也此一句總結前玄妙之理也夔憐蚿蚿憐蛇蛇憐風風憐目目憐心疏憐是愛尚之名夔是一足之獸其形如鼓足似人腳而迴踵向前也山海經云東海之內有流波之山其山有獸狀如牛蒼色無角一足而行聲音如雷名之曰夔昔黃帝伐蚩尤以夔皮冒鼓聲聞五百里也蚿百足蟲也夔則以少企多故憐蚿蚿則以有羡無故憐蛇蛇則以小企大故憐風風則以闇慕明故憐目目則以外慕內故憐心欲明天地萬物皆禀自然明闇有無無勞企羡放而任之自合玄道倒置之徒妄心希慕故舉夔等之麤事以明天機之妙理又解憐哀愍也夔以一足跳躑憐蚿眾足之煩勞蚿以有足而安行哀蛇無足而辛苦蛇有形而適樂愍風無質而冥昧風以飄颻而自在憐目域形而滯著目以在外而明顯憐心處內而闇塞欲明物情顚倒妄起哀憐故託夔蚿以救其病者也夔謂蚿曰吾以一足踸踔而行予無如矣今子之使萬足獨奈何疏踸踔跳躑也我以一足跳躑快樂而行天下簡易無如我者今子驅馳萬足豈不劬勞如何受生獨異於物發此疑問庶顯天機也蚿曰不然子不見夫唾者乎噴則大者如珠小者如霧雜而下者不可勝數也今子動吾天機而不知其所以然疏夫唾而噴者實無心於大小而大小之質自分故大者如珠璣小者如濛霧散雜而下其數難舉今蚿之眾足乃是天然機關運動而行不知所以無心自張有同噴唾夔以人情起問蚿以天機直答必然之理於此自明蚿謂蛇曰吾以眾足而行而不及子之無足何也疏蚿以眾足而遲蛇以無足而速然遲速有無禀之造化欲明斯理故設此疑問蛇曰夫天機之所動何可易邪吾安用足哉註物之生也非知生而生也則生之行也豈知行而行哉故足不知所以行目不知所以見心不知所以知悗然而自得矣遲速之節聰明之鑒或能或否皆非我也而或者因欲有其身而矜其能所以逆其天機而蕩其神器也至人知天機之不可易也故損聰明棄知慮縱然忘其爲而任其自動故萬物無動而不逍遙也疏天然機關有此動用遲速有無不可改易無心任運何用足哉蛇謂風曰予動吾脊脅而行則有似也今子蓬蓬然起於北海蓬蓬然入於南海而似無有何也疏脅肋也蓬蓬風聲也亦塵動貌也蛇既無足故行必動於脊脅也似像也蛇雖無足而有形像風無形像而鼓動無方自北徂南擊揚溟海無形有力竊有所疑故陳此問庶聞後答也風曰然予蓬蓬然起於北海而入於南海也然而指我則勝我䠓我亦勝我雖然夫折大木蜚大屋者唯我能也故以眾小不勝爲大勝也爲大勝者唯聖人能之註恣其天機無所與爭斯小不勝者也然乘萬物御羣才之所爲使羣才各自得萬物各自爲則天下莫不逍遙矣此乃聖人所以爲大勝也疏風雖自北徂南擊揚溟海然人以手指撝於風風卽不能折指以腳䠓踏於風風亦不能折腳此小不勝也然而飄風卒起羊角乍騰則大厦爲之飛揚櫟社以之摧折此大勝也譬達觀之士穢迹揚波混愚智於群小之間泯是非於囂塵之內此眾小不勝也而亭毒蒼生造化區宇周二儀之覆載等三光之照燭此大勝也非下凡之所解唯聖人獨能之䠓亦有作鰌字者鰌籍蓋也今不用此解也孔子遊於匡宋人圍之數帀而絃歌不輟疏輟止也宋當爲衛字之誤也匡衛邑也孔子自魯適衛路經匡邑而陽虎曾侵暴匡人孔子貌似陽虎又孔子弟子顔尅與陽虎同暴匡邑尅時復與孔子爲御匡人既見孔子貌似陽虎復見顔尅爲御謂孔子是陽虎重來所以興兵圍繞孔子達窮通之命故絃歌不止也子路入見曰何夫子之娛也疏娛樂也匡人既圍理須憂懼而絃歌不止何故如斯不達聖情故起此問本亦有作虞字者虞愛也怪夫子憂虞而絃歌不止孔子曰來吾語汝我諱窮久矣而不免命也求通久矣而不得時也註將明時命之固當故寄之求諱疏諱忌也拒也窮否塞也通泰達也夫子命仲由來語其至理云我忌於窮困而不獲免者豈非天命也求通亦久而不能得者不遇明時也夫時命者其來不可拒其去不可留故安而任之無往不適也夫子欲顯明斯理故寄之窮諱而實無窮諱之也當堯舜而天下無窮人非知得也當桀紂而天下無通人非知失也時勢適然註無爲勞心於窮通之間疏夫生當堯舜之時而天下太平使人如器恣其分內故無窮塞當桀紂之時天下暴亂物皆失性故無通人但時屬夷險勢使之然非關運知有斯得失夫水行不避蛟龍者漁父之勇也陸行不避兕虎者獵夫之勇也白刃交於前視死若生者烈士之勇也註情各有所安疏情有所安而忘其怖懼此起譬也知窮之有命知通之有時臨大難而不懼者聖人之勇也註聖人則無所不安疏聖人知時命達窮通故勇敢於危險之中而未始不安也此合喻也由處矣吾命有所制矣註命非己制故無所用其心也夫安於命者無往而非逍遙矣故雖匡陳羑里無異於紫極閒堂也疏處安息也制分限也告勅子路令其安心我禀天命自有涯分豈由人事所能制哉無幾何將甲者進辭曰以爲陽虎也故圍之今非也請辭而退疏無幾何俄頃之時也既知是宣尼非關陽虎故將帥甲士前進拜辭遜謝錯誤解圍而退也公孫龍問於魏牟曰龍少學先王之道長而明仁義之行合同異離堅白然不然可不可困百家之知窮眾口之辯吾自以爲至達已疏姓公孫名龍趙人也魏牟魏之公子懷道抱德厭穢風塵先王堯舜禹湯之迹也仁義五德之行也孫龍禀性聰明率才宏辯著守白之論以博辯知名故能合異爲同離同爲異以可爲不可然爲不然難百氏之書皆困窮眾口之辯咸屈生於衰周一時獨步弟子孔穿之徒祖而師之擅名當世莫與爭者故曰矜此學問達於至妙忽逢莊子猶若井蛙也今吾聞莊子之言汒焉異之不知論之不及與知之弗若與今吾無所開吾喙敢問其方疏喙口也方道也孫龍雖善於言辯而未體虛玄是故聞莊子之言汒焉怪其奇異方覺己之學淺始悟莊子語深豈直議論不如抑亦智力不逮所以自緘其口更請益於魏牟公子牟隱机大息仰天而笑曰子獨不聞夫埳井之蛙乎謂東海之鼈曰吾樂與吾跳梁乎井幹之上入休乎缺甃之崖赴水則接腋持頤蹶泥則没足滅跗還視虷蟹與科斗莫吾能若也疏公子體道清高超然物外識孫龍之淺辯鑒莊子之深言故仰天太息歎息而嗤笑舉蛙鼈之兩譬明二子之勝負坎井猶淺井也蛙蝦蟆也幹井欄也甃井中累塼也跗腳趺也還顧視也虷井中赤蟲也亦言是到結蟲也蟹小螃蟹也科斗蝦蟆子也腋臂下也頤口下也東海之鼈其形宏巨隨波游戲蹔居平陸而蝦蟆小蟲處於淺井形容既劣居處不寬謂自得於井中見巨鼈而不懼云我出則跳躑井欄之上入則休息乎破塼之涯游泳則接腋持頤蹶泥則滅趺没足顧瞻蝦蟹之類俯視科斗之徒逍遙快樂無如我者也且夫擅一壑之水而跨跱埳井之樂此亦至矣夫子奚不時來入觀乎註此猶小鳥之自足於蓬蒿疏擅專也跱安也蛙呼鼈爲夫子也言我獨專一壑之水而安坎井之樂天下至足莫甚於斯處所雖陋可以遊涉夫子何不蹔時降步入觀下邑乎以此自多務夸於鼈也東海之鼈左足未入而右膝已縶矣註明大之不遊於小非樂然疏縶拘也坎井狹小海鼈巨大以小懷大理不可容故右膝纔下而已遭拘束也於是逡巡而却告之海曰夫千里之遠不足以舉其大千仞之高不足以極其深疏逡巡從容也七尺曰仞鼈既左足未入右膝以拘於是逡巡卻退告蛙大海之狀夫世人以千里爲遠者此未足以語海之寬大以千仞爲高者亦不足極海之至深言海之深大非人所測忽以坎井爲至無乃劣乎禹之時十年九潦而水弗爲加益湯之時八年七旱而崖不爲加損夫不爲頃久堆移不以多少進退者此亦東海之大樂也疏頃少時也久多時也推移變改也堯遭洪水命禹治之有功故稱禹時也而堯十年之中九年遭潦殷湯八歲之間七歲遭旱旱涯不加損潦亦水不加益足明滄波浩汗溟渺深宏不爲頃久推移豈由多少進退東海之樂其在兹乎於是塪井之蛙聞之適適然驚規規然自失也註以小羡大故自失疏適適驚怖之容規規自失之貌蛙擅坎井之美自言天下無過忽聞海鼈之談汒然喪其所謂是以適適規規驚而自失也而公孫龍學先王之道篤仁義之行困百家之知窮眾口之辯忽聞莊子之言亦猶井蛙之逢海鼈也且夫知不知是非之境而猶欲觀於莊子之言是猶使蚊負山商蚷馳河也必不勝任矣註物各有分不可强相希效疏商距馬蚿也亦名商蚷亦名且渠孫龍雖復聰明性識但是俗知非眞知也故知未能窮於是非之境而欲觀察莊子至理之言者亦何異乎使蚊子負於丘山商蚷驅於河海而力微負重智小謀大故必不勝任也且夫知不知論極妙之言而自適一時之利者是非塪井之蛙與疏孫龍所學心知狹淺何能議論莊子窮微極妙之言耶祗可辯折是非適一時之名利耳以斯爲道豈非埳井之蛙乎此結譬也且彼方跐黃泉而登大皇無南無北奭然四解淪於不測無東無西始於玄冥反於大通註言其無不至也疏跐踰也亦極也大皇天也玄冥妙本也大通迹也夫莊子之言窮理性妙能仰登旻蒼之上俯極黃泉之下四方八極奭然無礙此智隱没不可測量始於玄極而其道杳冥反於域中而大通於物也子乃規規然而求之以察索之以辯註夫遊無窮者非察辯所得是直用管闚天用錐指地也不亦小乎子往矣註非其任者去之可也疏規規經營之貌也夫以觀察求道言辯索眞雖復規規用心而去之遠矣譬猶以管窺天詎知天之闊狹用錐指地寧測地之淺深莊子道合二儀孫龍德同錐管智力優劣若此之類既其不知宜其速去矣且子獨不聞夫壽陵餘子之學行於邯鄲與未得國能又失其故行矣直錐匐而歸耳註以此效彼兩失之疏壽陵燕之邑邯鄲趙之都弱齡未壯謂之餘子趙郡之地其俗能行故燕國少年遠來學步既乖本性未得趙國之能捨己效人更失壽陵之故是以用手踞地匍匐而還也今子不去將忘子之故失子之業疏莊子道冠重玄獨超方外孫龍雖言辯宏博而不離域中故以孫學莊談終無得理若使心生企尚躊躇不歸必當失子之學業忘子之故步此合喻也矣公孫龍口呿而不合舌舉而不下乃逸而走疏呿開也逸奔也前聞莊子之談以過視聽之表後見魏牟之說更超言象之外內殊外隔非孫龍所知故口開而不能合舌舉而不能下是以心神恍惚形體奔馳者也莊子釣於濮水楚王使大夫二人往先焉曰願以境內累矣疏濮水名也屬東郡今濮州濮陽縣是也楚王楚威王也莊生心處無爲而寄迹綸釣楚王知莊生賢達屈爲卿輔是以齎持玉帛爰發使命詣於濮水先述其意願以國境之內委託賢人王事殷繁不無憂累也莊子持竿不顧曰吾聞楚有神龜死已三千歲矣王巾笥而藏之廟堂之上此龜者寧其死爲留骨而貴乎寧其生而曳尾於塗中乎疏龜有神異故刳之而卜可以決吉凶也盛之以笥覆之以巾藏之廟堂用占國事珍貴之也問此龜者寧生全遠害曳尾泥途之中豈欲刳骨留名取貴廟堂之上耶是以莊生深達斯情故敖然而不顧之矣二大夫曰寧生而曳尾塗中莊子曰往矣吾將曳尾塗中註性各有所安也疏莊子保高尚之遐志貴山海之逸心類澤雉之養生同泥龜之曳尾是以令使命之速往庶全我之無爲也惠子相梁莊子往見之疏姓惠名施宋人爲梁惠王之相惠施博識贍聞辯名析理既是莊生之友故往訪之或謂惠子曰莊子來欲代子相疏梁國之人或有來者知莊生才高德大王必禮之國相之位恐有爭奪故謂惠子欲代之言也於是惠子恐搜於國中三日三夜註揚兵整旅疏惠施聞國人之言將爲實錄心靈恐怖慮有阽危故揚兵整旅三日三夜搜索國中尋訪莊子莊子往見之曰南方有鳥其名鵷鶵子知之乎夫鵷鶵發於南海而飛於北海非梧桐不止非練實不食非醴泉不飲於是鴟得腐鼠鵷鶵過之仰而視之曰嚇疏鵷鶵鸞鳳之屬亦言鳳子也練實竹實也醴泉泉甘味如醴也嚇怒而拒物聲也惠施恐莊生奪已故整旅揚兵莊子因往見之爲其設譬夫鳳是南方之鳥來儀應瑞之物非梧桐不止非溟海不停非竹實不食非醴泉不飲凡猥之鳶遇得臭鼠自美其味仰嚇鳳凰譬惠施滯溺榮華心貪國相豈知莊子清高無情爭奪今子欲以子之梁國而嚇我邪註言物嗜好不同願各有極疏鴟以腐鼠爲美仰嚇鵷鶵惠以國相爲榮猜疑莊子總合前譬也莊子與惠子遊於濠梁之上疏濠是水名在淮南鍾離郡今見有莊子墓亦有莊惠遨遊之所石絶水爲梁亦言是濠水之橋梁莊惠清談在其上也莊子曰鯈魚出遊從容是魚樂也疏鯈魚白鯈也從容放逸之貌也夫魚遊於水鳥棲於陸各率其性物皆逍遙而莊子善達物情所以故知魚樂惠子曰子非魚安知魚之樂疏惠施不體物性妄起質疑莊子非魚焉知魚樂莊子曰子非我安知我不知魚之樂註欲以起明相非而不可以相知之義耳子非我尚可以知我之非魚則我非魚亦可以知魚之樂也疏若以我非魚不得知魚子既非我何得知我若子非我尚得知我我雖非魚何妨知魚反而質之令其無難也惠子曰我非子固不知子矣子固非魚也子之不知魚之樂全矣註舍其本言而給辯以難也疏惠非莊子故不知莊子莊必非魚何得知魚之樂不樂不知之義於此無虧捨其本宗給辯以難莊子曰請循其本疏循猶尋也惠施給辯有言無理棄初逐末失其論宗請尋其源自當無難循本之義列在下文子曰汝安知魚樂云者既已知吾知之而問我我知之濠上也註尋惠子之本言云非魚則無縁相知耳今子非我也而云汝安知魚樂者是知我之非魚也苟知我之非魚則凡相知者果可以此知彼不待是魚然後知魚也故循子安知之云已知吾之所知矣而方復問我我正知之於濠上耳豈待入水哉夫物之所生而安者天地不能易其處陰陽不能回其業故以陸生之所安知水生之所樂未足稱妙耳疏子曰者莊生卻稱惠子之辭也惠子云子非魚安知魚樂者足明惠子非莊子而知莊子之不知魚也且子既非我而知我知我而問我亦何妨我非魚而知魚知魚而歎魚夫物性不同水陸殊致而達其理者體其情是以濠上彷徨知魚之適樂鑒照羣品豈入水哉故寄莊惠之二賢以標議論之大體也
