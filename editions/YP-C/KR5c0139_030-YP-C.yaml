front:
  text: 讓王第二十八堯以天下讓許由許由不受又讓於子州支父子州支父曰以我爲天子猶之可也雖然我適有幽憂之病方且治之未暇治天下也
  hash: sha256:fa2922e7448d79ac2ebe813896f828459fe494022d798462b8dc1a4004eefa3c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0139_YP-C_09niuji-08-0017a, image: JY132/09niuji-08-0017a.png}
body:
  text: 疏堯許事迹具載內篇姓子名州字支父懷道之人隱者也堯知其賢讓以帝位以我爲帝亦當能以爲事故言猶之可也幽深也憂勞也言我滯竟幽深固心憂勞且欲修身庶令合道未有閒暇緝理萬機也夫天下至重也而不以害其生又况他物乎疏夫位登九五威跨萬乘人倫尊重莫甚於此尚不以斯榮貴損害生涯况乎他外事物何能介意也惟无以天下爲者可以託天下也疏夫忘天下者無以天下爲也惟此之人可以委託於天下也舜讓天下於子州支伯子州支伯曰予適有幽憂之病方且治之未暇治天下也疏舜之事迹具在內篇支伯猶支父也故天下大器也而不以易生此有道者之所以異乎俗者也疏夫帝王之位重大之器也而不以此貴易奪其生自非有道孰能如是故異於流俗之行也舜以天下讓善卷善卷曰余立於宇宙之中冬日衣皮毛夏日衣葛絺春耕種形足以勞動秋收斂身足以休食日出而作日入而息逍遥於天地之間而心意自得吾何以天下爲哉疏姓善名卷隱者也處於六合順于四時自得天地之間逍遥塵垢之外道在其中故不用天下悲夫子之不知余也遂不受於是去而入深山莫知其處疏古人淳樸喚帝爲子恨舜不識野情所以悲嘆舜以天下讓其友石戸之農石戸之農曰捲捲乎后之爲人葆力之士也疏后字亦有作戸者隨字讀之石戸地名也農人也今江南喚人作農此則舜之友人也葆牢固也言舜心志堅固筋力勤苦腰背捲捲不得歸休以此勤勞翻來見讓故不受也以舜之德爲未至也於是夫負妻戴𢹂子以入海終身不反也疏古人荷物多用頭戴如今高麗猶有此風以舜德化未爲至極故擕妻子不踐其土入於大海洲島之中往而不反也大王亶父居邠狄人攻之疏亶父王季之父文王之祖也邠地名狄人獫狁也國鄰戎虜故爲狄人攻伐事之以皮帛而不受事之以犬馬而不受事之以珠玉而不受狄人之所求者土地也大王亶父曰與人之兄居而殺其弟與人之父居而殺其子吾不忍也子皆勉居矣爲吾臣與爲狄人臣奚以異疏事奉也勉勵也奚何狄人貪殘意在土地我不忍傷殺汝勉力居之且吾聞之不以所用養害所養因杖筴而去之民相連而從之遂成國於岐山之下疏用養土地也所養百姓也本用地以養人今殺人以存地故不可也因柱杖而去民相連續遂有國於岐陽夫大王亶父可謂能尊生矣能尊生者雖貴富不以養傷身雖貧賤不以利累形今世之人居高官尊爵者皆重失之見利輕亡其身豈不惑哉疏夫亂世澆僞人心浮淺狥于軒冕以喪其身逐於財利以殞其命不知輕重深成迷惑也越人三世弑其君王子搜患之逃乎丹穴而越國无君求王子搜不得從之丹穴王子搜不肯出越人薰之以艾乘以玉輿疏搜王子名也丹穴南山洞也玉輿君之車輦也亦有作王字者隨字讀之所謂玉輅也越國之人頻弑君主王子怖懼逃之洞穴呼召不出以艾薰之既請爲君故乘以玉輅王子搜援綏登車仰天而呼曰君乎君乎獨不可以舍我乎王子搜非惡爲君也惡爲君之患也若王子搜者可謂不以國傷生矣此固越人之所欲得爲君也疏援引也綏車上繩也辭不獲免長歎登車非惡爲君恐爲禍患以其重生輕位故可屈而爲君也韓魏相與爭侵地子華子見昭僖侯昭僖侯有憂色疏僖侯韓國之君也華子魏之賢人也韓魏相鄰爭侵境土干戈既動勝負未知怵惕居懷故有憂色子華子曰今使天下書銘於君之前書之言曰左手攫之則右手廢右手攫之則左手廢然而攫之者必有天下君能攫之乎疏銘書記也攫捉取也廢斬去之也假且書一銘記投之於前左手取銘則斬去右手右手取銘則斬去左手然取銘者必得天下君取之不以此譬喻借問韓侯也昭僖侯曰寡人不攫也疏答云不能斬兩臂而取六合也子華子曰甚善疏歎君之言甚當於理自是觀之兩臂重於天下也身亦重於兩臂韓之輕於天下亦遠矣疏自從也於此言而觀察之則一身重於兩臂兩臂重於天下天下又重於韓韓之與天下輕重相遠矣今之所爭者其輕於韓又遠君固愁身傷生以憂戚不得也疏所爭者疆畔之間故於韓輕重遠矣而必固憂愁傷形損性恐其不得豈不惑哉僖侯曰善哉教寡人者眾矣未嘗得聞此言也子華子可謂知輕重矣疏頓悟其言歎之奇妙也魯君聞顔闔得道之人也使人以幣先焉疏魯侯魯哀公或云魯定公也姓顔名闔魯人隱者也幣帛也聞顔闔得清廉之道欲召之爲相故遣使人齎持幣帛先通其意顔闔守陋閭苴布之衣而自飯牛疏苴布子麻布也飯飯也居疏陋之閭巷著粗惡之布衣身自飯牛足明貧儉魯君之使者至顔闔自對之使者曰北顔闔之家與顔闔對曰此闔之家也使者致幣顔闔對曰恐聽者謬而遺使者罪不若審之疏遺與也不欲授幣致此矯辭以欺使者使者還返審之復來求之則不得已故若顔闔者眞惡富貴也故曰道之眞以治身其緒餘以爲國家其土苴以治天下由此觀之帝王之功聖人之餘事也非所以完身養生也疏緒殘也土糞也苴草也夫用眞道以持身者必以國家爲殘餘之事將天下同於草土者也今世俗之君子多危身棄生以殉物豈不悲哉凡聖人之動作也必察其所以之與其所以爲疏殉逐也察世人之所適往觀黎庶之所云爲然後動作而應之也今且有人於此以隨侯之珠彈千仞之雀世必笑之是何也則其所用者重而所要者輕也夫生者豈特隨侯之重哉疏隨國近濮水濮水出寶珠卽是靈蛇所銜以報恩隨侯所得者故謂之隨侯之珠也夫雀高千仞以珠彈之所求者輕所用者重傷生殉物其義亦然也子列子窮容貌有飢色客有言之於鄭子陽者曰列御寇蓋有道之士也居君之國而窮君无乃爲不好士乎疏子陽鄭相也禦寇鄭人也有道而窮子陽不好賢士遠辭之客譏刺子陽鄭子陽卽令官遺之粟子列子見使者再拜而辭疏命召主倉之官令與之粟禦寇清高辭謝不受也使者去子列子入其妻望之而拊心曰妾聞爲有道者之妻子皆得佚樂今有飢色若過得遺先生食先生不受豈不命邪疏與粟不受天命貧窮嗟惋拊心責夫罪過故知禦寇之妻不及老萊之婦遠矣子列子笑謂之曰君非自知我也以人之言而遺我粟至其罪我也又且以人之言此吾所以不受也其卒民果作難而殺子陽疏子陽嚴酷人多怒之左右有誤折子陽弓者恐必得罪因國人逐猘狗遂殺子陽也楚昭王失國屠羊說走而從於昭王疏昭王名軫平王之子也伍奢伍尚遭平王誅戮子胥奔吳而耕於野後至吳王闔閭之世請兵伐楚遂破楚入郢以雪父之讐其時昭王窘急棄走奔隨又奔於鄭有屠羊賤人名說從王奔走奔走之由置在下文昭王反國將賞從者乃屠羊說屠羊說曰大王失國說失屠羊大王反國說亦反屠羊臣之爵祿已復矣又何賞之有王曰强之屠羊說曰大王失國非臣之罪故不敢伏其誅大王反國非臣之功故不敢當其賞王曰見之屠羊說曰楚國之法必有重賞大功而後得見今臣之知不足以存國而勇不足以死寇吳軍入郢說畏難而避寇非故隨大王也今大王欲廢法毁約而見說此非臣之所以聞於天下也正謂司馬子綦曰屠羊說居處卑賤而陳義甚高子其爲我延之以三旌之位疏三旌三公也亦有作珪字者謂三卿皆執珪故謂三卿爲珪也屠羊說曰夫三旌之位吾知其貴於屠羊之肆也萬鍾之祿吾知其富於屠羊之利也然豈可以貪爵祿而使吾君有妄施之名乎說不敢當願復反吾屠羊之肆遂不受也原憲居魯環堵之室茨以生草蓬戸不完桑以爲樞而甕牖一室褐以爲塞上漏下濕匡坐而弦疏原憲孔子弟子姓原名思字憲也周環各一堵謂之環堵猶方丈之室也以草蓋屋謂之茨也褐粗衣也匡正也原憲家貧室唯環堵仍以草覆舍桑條爲樞蓬作門扉破甕爲牖夫妻二人各居一室逢雨濕而弦歌自娛知命安貧所以然也子貢乘大馬中紺而表素軒車不容巷往見原憲疏子貢孔子弟子名賜能言語好榮華其軒蓋是白素裹爲紺色車馬高大故巷道不容也原憲華冠縱履杖藜而應門疏縱躡也以華皮爲冠用藜藿爲杖貧無僕使故自應門也子貢曰嘻先生何病原憲應之曰憲聞之无財謂之貧學而不能行謂之病今憲貧也非病也子貢逡巡而有愧色疏嘻笑聲也逡巡却退貌也以儉繫奢故懷慙愧之色原憲笑曰夫希世而行比周而友學以爲人教以爲己仁義之慝輿馬之飾憲不忍爲也疏慝姦惡也飾莊嚴也夫趨世候時希望富貴周旋親比以結朋黨自求名譽學以爲人多覓束脩教以爲已託仁義以爲姦慝飾車馬以衒矜夸君子耻之不忍爲之也曾子居衛緼袍无表顔色腫噲手足胼胝疏以麻緼袍絮復無表裏也腫噲猶剝錯也每自力作故生胼胝三日不舉火十年不製衣正冠而纓絶捉衿而肘見納屢而種决疏守分清虛家業窮窶三日不營熟食十年不製新衣繩爛正冠而纓斷袖破捉衿而肘見履敗納之而根後决也曳縱而歌商頌聲滿天地若出金石天子不得臣諸侯不得友疏歌商頌響韻叶宫商察其辭理雅符天地聲氣清虛又諧金石風調高素超絶人倫故不與天子爲臣不與諸侯爲友也故養志者忘形養形者忘利致道者忘心矣疏夫君子賢人不以形挫志攝衛之士不以利傷生得道之人忘心知之術也孔子謂顔回曰來家貧居卑胡不仕乎顔回對曰不願仕回有郭外之田五十畝足以給飦粥郭內之田十畝足以爲絲麻鼓琴足以自娛所學夫子之道者足以自樂也回不願仕孔子愀然變容曰善哉回之意丘聞之知足者不以利自累也審自得者失之而不懼行修於內者無位而不怍丘誦之久矣今於回而後見之是丘之得也疏飦麋也怍羞也夫自得之士不以得喪駭心內修之人豈復羞慙無位孔子誦之其來已久今勸回仕豈非失言因回反照故言丘得之矣中山公子牟謂瞻子曰身在江海之上心居乎魏闕之下奈何疏瞻子魏之賢人也魏公子名牟封中山故曰中山公子牟也公子有嘉遁之情而無高蹈之德故身在江海上而隱遁心思魏闕之下榮華既見賢人借問其術也瞻子曰重生重生則利輕疏重於生道則輕於榮利榮利既輕則不思魏闕中山公子牟曰雖知之未能自勝也疏雖知重於生道未能勝於情欲瞻子曰不能自勝則從神无惡乎疏若不勝於情欲則宜從順心神亦不勞忘生嫌惡也不能自勝而强不從者此之謂重傷重傷之人无壽類矣疏情既不勝强生抑挫情欲已損抑又乖心故名重傷也如此之人自然夭折故不得與壽考者爲儕類也魏牟萬乘之公子也其隱巖穴也難爲於布衣之士雖未至乎道可謂有其意矣疏夫大國王孫生而榮貴遂能巖棲谷隱身履艱辛雖未階乎玄道而有清高之志足以激貪勵俗也孔子窮於陳蔡之間七日不火食藜羹不糝顔色甚憊而弦歌於室疏陳蔡之事外篇已解既遭飢餒營無火食藜菜之羹不加米糝顔色衰憊而歌樂自娛達道聖人不以爲事也顔回擇菜子路子貢相與言曰夫子再逐於魯削迹於衛伐樹於宋窮於商周圍於陳蔡殺夫子者無罪藉夫子者無禁弦歌鼓琴未嘗絶音君子之無耻也若此乎疏仕於魯而被放游於衛而削迹講於宋樹下而司馬桓魋欲殺夫子憎其坐處遂伐其樹故欲殺夫子當無罪咎凌藉之者應無禁忌由賜未達故發斯言顔回無以應入告孔子孔子推琴喟然而歎曰由與賜細人也召而來吾語之子路子貢入子路曰如此者可謂窮矣疏喟然嗟嘆貌由與賜細碎之人也命召將來告之善道如斯困苦豈不窮乎孔子曰是何言也君子通於道之謂通窮於道之謂窮今邱抱仁義之道以遭亂世之患其何窮之爲故內省而不窮於道臨難而不失其德天寒既至霜雪既降吾是以知松柏之茂也陳蔡之隘於丘其幸乎疏夫歲寒別木處窮知士因難顯德可謂幸矣孔子削然反琴而弦歌子路扢然執干而舞疏削然取琴聲也扢然奮勇貌也既師資領悟彼此歡娛也子貢曰吾不知天之高也地之下也古之得道者窮亦樂通亦樂所樂非窮通也道德於此則窮通爲寒暑風雨之序矣疏夫陰陽天地有四序寒温人處其中何能無窮通否泰邪故得道之人處窮通而常樂譬之風雨何足介懷乎故許由娛於潁陽而共伯得乎丘首疏共伯名和周王之孫也懷道抱德食封於共厲王之難天子曠絶諸侯知共伯賢請立爲王共伯不聽辭不獲免遂卽王位一十四年天下大旱舍屋生火卜曰厲王爲祟遂廢共伯而立宣王共伯退歸還食本邑立之不喜廢之不怨逍遥於丘首之山丘首山今在河內如灼坂地名在襄陽未爲定地是也故許由娛樂於穎水共伯得志於首山也舜以天下讓其友北人無擇北人無擇曰異哉后之爲人也居於畎畝之中而遊堯之門不若是而已又欲以其辱行漫我吾羞見之因自投清泠之淵註孔子曰士志於仁者有殺身以成仁無求生以害仁夫志尚清遐高風邈世與夫貪利沒命者故有天地之降也疏北方之人名曰無擇舜之友人也后君也壟上曰畝下曰畎清泠淵在南陽西崿縣界舜耕於歷山長於壟畝游堯門闕受堯禪讓其事迹豈不如是乎又欲將耻辱之行汙漫於我以此羞慙遂投清泠也湯將伐桀因卞隨而謀卞隨曰非吾事也湯曰孰可曰吾不知也湯又因務光而謀務光曰非吾事也湯曰孰可曰吾不知也湯曰伊尹何如曰强力忍垢吾不知其他也疏姓卞名隨姓務名光並懷道之人隱者也湯知其賢因之謀議既非隱者之務故答以不知姓伊名尹字贄佐世之賢人也忍耐也垢耻辱也既欲阻兵應須强力之士方將弑主亦藉耐羞之人他外之能吾不知也湯遂與伊尹謀伐桀尅之以讓卞隨卞隨辭曰后之伐桀也謀乎我必以我爲賊也勝桀而讓我必以我爲貪也吾生乎亂世而無道之人再來漫我以其辱行吾不忍數聞也乃自投稠水而死疏漫汙也稠水在穎川郡界字又作桐湯又讓務光曰知者謀之武者遂之仁者居之古之道也吾子胡不立乎務光辭曰廢上非義也殺民非仁也人犯其難我享其利非廉也疏享受也廢上謂放桀也殺民謂征戰也犯其難謂遭誅戮也我享其利謂受祿也吾聞之曰非其義者不受其祿無道之世不踐其土况尊我乎吾不忍久見也乃負石而自沈於廬水註舊說曰如卞隨務光者其視天下也若六合之外人所不能察也斯則謬矣夫輕天下者不得有所重也苟無所重則無死地矣以天下爲六合之外故當付之堯舜湯武耳淡然無係故汎然從眾得失無槩於懷何自投之爲哉若二子者可以爲殉名慕高矣未可謂外天下也疏廬水在遼西北平郡界也昔周之興有士二人處於孤竹曰伯夷叔齊二人相謂曰吾聞西方有人似有道者試往觀焉疏孤竹國名在遼西伯夷叔齊兄弟讓位聞文王有道故往觀之夷齊事迹外篇已解矣至於岐陽武王聞之使叔旦往見之與盟曰加富二等就官一列血牲而埋之疏岐陽是岐山之陽文王所都之地今扶風是也周公名旦是武王之弟故曰叔旦也其時文王已崩武王登極將欲伐紂招慰賢良故令周公與其盟誓加祿二級授官一列仍牲血釁其盟書埋之壇下也二人相視而笑曰嘻異哉此非吾所謂道也昔者神農之有天下也時祀盡敬而不祈喜其於人也忠信盡治而無求焉疏祈求也喜福也神農之世淳朴未殘四時祭祀盡於恭敬其百姓忠誠信實緝理而已無所求焉樂與政爲政樂與治爲治不以人之壞自成也不以人之卑自高也不以遭時自利也疏爲政順事百姓緝理從於物情終不幸人之灾以爲己福願人之險以爲己利也今周見殷之亂而遽爲政上謀而下行貨阻兵而保威割牲而盟以爲信揚行以悅眾殺伐以要利是推亂以易暴也疏遽速也速爲治政彰紂之虐謀謨行貨以保兵威顯物行說以化黎庶可謂推周之亂以易殷之暴也吾聞古之士遭治世不避其任遇亂世不爲苟存今天下闇周德衰其並乎周以塗吾身也不如避之以絜吾行二子北至於首陽之山遂餓而死焉若伯夷叔齊者其於富貴也苟可得已則必不賴高節戾行獨樂其志不事於世此二士之節也註論語曰伯夷叔齊餓于首陽之下不言其死也而此云死焉亦欲明其守餓以終未必餓死也此篇大意以起高讓遠退之風故被其風者雖貪冒之人乘天衢入紫庭猶時慨然中路而歎况其凡乎故夷許之徒足以當稷契對伊吕矣夫居山谷而弘天下者雖不俱爲聖佐不猶高於蒙埃塵者乎其事雖難爲然其風少弊故可遺也曰夷許之之安在曰許由之弊使人飾讓以求進遂至乎之噲也伯夷之風使暴虐之君得肆其毒而莫之敢亢也伊吕之弊使天下貪冒之雄敢行篡逆唯聖人無迹故無弊也若以伊吕爲聖人之迹則伯夷叔齊亦聖人之迹也若以伯夷叔齊非聖人之迹邪則伊吕之事亦非聖矣夫聖人因物之自行故無迹然則所謂聖者我本無迹故物得其迹迹得而强名聖則聖者乃無迹之名也疏塗汙也若與周並存恐汙吾行不如逃避餓死於首山首山在蒲州城南近河是也
