body:
  text: 不資於道內不由於己掘然自得而獨化也夫生之難也猶獨化而自得之矣既得其生又何患於生之不得而爲之哉故夫爲生果不足以全生以其生之不由於己爲也而爲之則傷其眞生也疏武丁殷王名也號曰高宗高宗夢得傅說使求之天下於陜州河北縣傅巖版築之所而得之相於武丁奄我清泰傅說星精也而傅說一星在箕尾上然箕尾則是二十八宿之數維持東方故言乘東維騎箕尾而與角亢等星比並行列故云比於列星也南伯子葵問乎女偊曰子之年長矣而色若孺子何也疏葵當爲綦字之誤猶是人間世篇中南伯子綦也女偊古之懷道人也孺子猶稚子也女偊久聞至道故能攝衛養生年雖老猶有童顔之色駐彩之狀既異凡人是故子葵問其何以致此曰吾聞道矣注聞道則任其自生故氣色全也疏答云聞道故得全生是以反少還童色如稚子南伯子葵曰道可得學耶疏覩其容色既異常人心懷景慕故詢其方術者也曰惡惡可子非其人也疏惡惡可言不可也女偊心神內靜形色外彰子葵見有容貌欣然請學嫌其所問故抑謂其非人也夫卜梁倚有聖人之才而無聖人之道我有聖人之道而無聖人之才疏卜梁姬姓也倚名也虛心凝淡爲道智用明敏爲才言梁有外用之才而無內凝之道女偊有虛淡之道而無明敏之才各滯一邊未爲通美然以才方道才劣道勝也吾欲以教之庶幾其果爲聖人乎不然以聖人之道告聖人之才亦易矣吾猶守而告之疏庶慕也幾邇也果決也夫上士聞道猶藉勤行若不勤行道無由致是故雖蒙教誨必須修學慕近玄道決成聖人若其不然告示甚易爲須修守所以成難然女偊久聞至道內心凝寂今欲傳告猶自守之况在初學無容懈怠假令口說耳聞蓋亦何益是以非知之難行之難者也參日而後能外天下注外猶遺也疏外遺忘也夫爲師不易傳道極難方欲教人故凝神寂慮修而守之凡經三日心既虛寂觀萬億皆空是以天下地上悉皆非有也已外天下矣吾又守之七日而後能外物注物者朝夕所須切己難忘疏天下萬境疎遠所以易忘身物親近所以難遣守經七日然後遣之故郭注云物者朝夕所須切己難忘之者也已外物矣吾又守之九日而後能外生注都遺也疏隳體離形坐忘我喪運心既久遺遣漸深也已外生矣而後能朝徹注遺生則不惡死不惡死故所遇卽安豁然無滯見機而作斯朝徹也疏朝旦也徹明也死生一觀物我兼忘惠照豁然如朝陽初啟故謂之朝徹也朝徹而後能見獨注當所遇而安之忘先後之所接斯見獨者也疏夫至道凝然妙絶言象非無非有不古不今獨往獨來絶待絶對覩斯勝境謂之見獨故經云寂寞而不改見獨而後能無古今注與獨俱往疏任造物之日新隨變化而俱往不爲物境所遷故無古今之異無古今而後能入於不死不生注夫係生故有死惡死故有生是以無係無惡然後能無死無生疏古今會也夫時有古今之異法有生死之殊者此蓋迷徒倒置之見也時既運新運新無今無古故法亦不去不來無死無生者也會斯理者其唯女偊之子也殺生者不死生生不生疏殺滅也死亦滅也謂此死者未曾滅謂此生者未曾生既生能入於無死無生故體於法無生滅也法既不生不滅而情亦何欣何惡耶任之而無不適也其爲物無不將也注任其自將故無不將無不迎也注任其自迎故無不迎疏將送也夫道之爲物拯濟無方雖復不滅不生亦復而生而滅是以迎無窮之生送無量之死也無不毁也注任其自毁故無不毁無不成也注任其自成故無不成疏不送而送無不毁滅不迎而迎無不生成之也其名爲攖寧注夫與物冥者物縈亦縈而未始不寧也疏攖擾動也寧寂靜也夫聖人慈救道濟蒼生妙本無名隨物立稱動而常寂雖攖而寧者也攖寧也者攖而後成者也注物縈而獨不縈則敗矣故縈而任之則莫不曲成也疏既能和光同塵動而常寂然後隨物攖擾善貸生成也南伯子葵曰子獨惡乎聞之疏子葵怪女偊之談其道高妙故問子於何處獨得聞之自斯已下凡有九重前六約教後三據理並是女偊告示子葵之辭也曰聞諸副墨之子疏諸之也副副貳也墨翰墨也翰墨文字也理能生教故謂文字爲副貳也夫魚必因筌而得理亦因教而明故聞之翰墨以明先因文字得解故也副墨之子聞諸洛誦之孫疏臨本謂之副墨背文謂之洛誦初既依文生解所以執持披讀次則漸悟其理是故羅洛誦之且教從理生故稱爲子而誦因教起名之曰孫也洛誦之孫聞之瞻明疏瞻視也亦至也讀誦精熟功勞積久漸見至理靈府分明瞻明聞之聶許疏聶登也亦是附耳私語也既誦之精深因教悟理心生懽悅私自許當附耳竊私語也既聞於道未敢公行亦是漸登勝妙玄情者也聶許聞之需役疏需須也役用也行也雖復私心自許智照漸明必須依教遵脩勤行勿怠解也不行道無由致需役聞之於謳疏謳謌謠也旣因教悟理依解而行遂使威德顯彰謳謌滿路者也於謳聞之玄冥注玄冥者所以名無而非無疏玄者深遠之名也冥者幽寂之稱既德行內融芳聲外顯故漸階虛極以至於玄冥者矣玄冥聞之參寥注夫階名以至無者必得無於名表故雖玄冥猶未極而又推寄於參寥亦玄之又玄也疏參三也寥絶也一者絶有二者絶無三者非有非無故謂之三絶也夫玄冥之境雖妙未極故至乎三絶方造重玄也參寥聞之疑始注夫自然之理有積習而成者蓋階近以至遠研粗以至精故乃七重而後及無之名九重而後疑無是始也疏始本也夫道超四句離彼百非名言路斷心知處滅雖復三絶未窮其妙而三絶之外道之根本而謂重玄之域眾妙之門意亦難得而差言之矣是以不本而本本無所本疑名爲本亦無的可本故謂之疑始也耳子祀子輿子犁子來四人相與語曰孰能以無爲首以生爲脊以死爲尻孰知死生存亡之一體者吾與之友矣疏子祀四人未詳所據觀其心迹並方外之士情同淡水共結素交敘莫逆於虛玄迷忘言於至道夫人起自虛無無則在先故以無爲首從無生有生則居次以生爲脊既生而死死最居後故以死爲尻亦故然也尻首雖别本是一身而死生乃異源乎一體能達斯趣所遇皆適豈有存亡欣惡於其間哉誰能知是我與爲友四人相視而笑莫逆於心遂相與爲友疏目擊道存故相視而笑同順玄理故莫逆於心也俄而子輿有病子祀往問之疏既病須往問之任理而行不乖於方外也曰偉哉夫造物者將以予爲此拘拘也疏偉大也造物猶造化也拘拘攣縮不申之貌也夫洪鑪大冶造物無偏豈獨將我一身故爲拘攣之疾以此而言無非命也子輿達理自歎此辭也曲僂發背上有五管頤隱於齊肩高於頂句贅指天陰陽之氣有沴注沴陵亂也疏傴僂曲腰背骨發露既其俯而不仰故藏俯並在上頭低則頤隱於齊膊聳則肩高於項而咽頂句曲大槌如贅陰陽二氣陵亂不調遂使一身遭斯疾篤其心間而無事注不以爲患疏死生猶爲一體疾患豈復槩懷故雖曲僂拘拘而心神閑逸都不以爲事跰𨇤而鑒于井曰嗟乎夫造物者又將以予爲此拘拘也注夫任自然之變者無嗟也與物嗟耳疏跰𨇤曳疾貌言曳疾力行照臨于井既見己貌遂使發傷嗟尋夫大道首然造物均等豈偏於我獨此拘攣欲顯明物理故寄玆嗟歎也子祀曰汝惡之乎疏淡水素交契心方外見其嗟嘆故有驚疑曰亡予何惡疏亡無也存亡生死本自無心不嗟之嗟何嫌惡之也浸假而化予之左臂以爲雞予因以求時夜浸假而化予之右臂以爲彈予因以求鶚炙浸假而化予之尻以爲輪以神爲馬予因而乘之豈更駕哉注浸漸也夫體化合變則無往而不因無因而不可也疏假令陰陽二氣漸而化我左右兩臂爲雞爲彈則求於鶚鳥雞則夜候天時尻無識而爲輪神有知而作馬因漸漬而變化乘輪馬以遨遊苟隨任以安排亦於何而不適者也且夫得者時也注當所遇之時世謂之得失者順也注時不暫停順往而去世謂之失安時而處順哀樂不能入也疏得者生也失者死也夫忽然而得時應生也倏然而失順理死也是以安於時則不欣於生處於順則不惡於死旣其無欣無惡何憂樂之入乎此古之所謂縣解也而不能自解者物有結之注一不能自解則眾物共結之矣故能解則無所不解不解則無所而解也疏處順忘時蕭然無係古昔聖人謂爲懸解若夫當生慮死而以憎惡存懷者既內心不能自解故爲外物結縛之也且夫物不勝天久矣吾又何惡焉注天不能無晝夜我安能無死生而惡之哉疏玄天在上猶有晝夜之殊況人居世間焉能無死生之變且物不勝天非唯今日我復何人獨生憎惡俄而子來有病喘喘然將死其妻子環而泣之疏環繞也喘喘氣息急也子轝語訖俄頃之間子來又病氣奔欲死既將屬纊故妻子繞而哭之也子犁往問之曰叱避無怛化注夫死生猶寤寐耳於理當寐不願人驚之將化而死無爲怛之也疏叱訶聲也夫方外之士冥一死生而朋友臨終和光往問故叱彼親族令避傍邊正欲變化不欲驚怛也倚其戸與之語曰偉哉造化又將奚以汝爲將奚以汝適以汝爲鼠肝乎以汝爲蟲臂乎疏又復也奚何也適往也倚戸觀化與之而語歎彼大造弘普無私偶爾爲人忽然還化不知方外適往何道變作何物將汝五藏爲鼠之肝或化四支爲蟲之臂任化而往所遇皆適也子來曰父母於子東西南北唯命之從陰陽於人不翅於父母注自古或有能違父母之命者未有能違陰陽之變而距晝夜之節者也疏自此而下是子來臨終答子犁之辭也夫孝子侍親尚驅馳唯命況陰陽造化何啻二親乎故知違親之教世或有焉拒於陰陽未之有也彼近吾死而我不聽我則捍矣彼何罪焉注死生猶晝夜耳未足爲遠也時當死亦非所禁而橫有不聽之心適足捍逆於理以速其死其死之速由於我捍非死之罪也彼謂死耳在生故以死爲彼疏彼造化也而造化之中令我近死我惡其死而不聽從則是我拒陰陽違於變化斯乃咎在於我彼何罪焉郭注以死爲彼也夫大塊載我以形勞我以生佚我以老息我以死故善吾生者乃所以善吾死也注理常俱也疏此重引前文證成彼義斯言切當所以再出其解釋文意不異前旨今之大冶鑄金金踊躍曰我且必爲鏌鋣大冶必以爲不祥之金今一犯人之形而曰人耳人耳夫造化者必以爲不祥之人注人耳人耳唯願爲人也亦猶金之踊躍世皆知金之不祥而不能任其自化夫變化之道靡所不遇今一遇人形豈故爲哉生非故爲時自生耳矜而有之不亦妄乎疏祥善也犯遇也鏌鋣古之良劎名也昔吳人干將爲吳王造劎妻名鏌鋣因名雄劎曰干將雌劎曰鏌鋣夫洪鑪大冶鎔鑄金鐵隨器大小悉皆爲之而鑪中之金忽然跳躑殷勤致請願爲良劎匠者驚嗟用爲不善亦猶自然大冶彫刻眾形鳥獸魚蟲種種皆作偶爾爲人遂卽欣愛鄭重啟請願更爲人而造化之中用爲妖孽也今一以天地爲大鑪以造化爲大冶惡乎往而不可哉注人皆知金之有係爲不祥故明己之無異於金則所係之情可解可解則無不可也疏夫用二儀造化一爲鑪冶陶鑄群物錘鍜蒼生磅礴無心亭毒均等所遇斯適何惡何欣安排變化無往不可也成然寐蘧然覺注寤寐自若不以死生累心疏成然是閑放之貌蘧然是驚喜之貌寐寢也以臂於死也覺是寤也以況於生然寤寐雖殊何嘗不從容逸樂死生乃異亦未始不任命逍遙此總結子來以死生爲寤寐者也子桑戸孟子反子琴張三人相與友曰孰能相與於無相與相爲於無相爲注夫體天地冥變化者雖手足異任五藏殊官未嘗相與而百節同和斯相與於無相與也未嘗相爲而表裏俱濟斯相爲於無相爲也若乃役其心志以恤手足運其股肱以營五藏則相營愈篤而外內愈困矣故以天下爲一體者無愛爲於其間也疏此之三人並方外之士冥於變化一於死生志行既同故相與交友仍各率職試述其情致云誰能於虛無自然而相與爲朋友乎斯乃無與而與無爲而爲非爲之而爲與之而與者也猶如五藏六根四肢百體各有司存更相御用豈有心於相與情係於親疏哉雖無意於相爲而相濟之功成矣故於無與而相與周旋於無爲而爲交友者其義亦然乎耳孰能登天遊霧撓挑無極注無所不任疏撓挑猶宛轉也夫登昇上天示清高輕舉遨遊雲霧表不滯有中故能隨變化而無窮將造物而宛轉者也相忘以生無所終窮注忘其生則無不忘矣故能隨變任化俱無所窮竟疏終窮死也相與忘生復忘死死生混一故順化而無窮也三人相視而笑莫逆於心遂相與友注若然者豈友哉蓋寄明至親而無愛念之近情也疏得意忘言故相視而笑智冥於境故莫逆於心方外道同遂相與爲友也莫然有間而子桑戸死未葬孔子聞之使子貢往待事焉疏莫無也三人相視寂爾無言俄頃之間子桑戸死仲尼聞之使子貢往弔仍令供給喪事將迎賓客欲顯方外方內故寄尼父琴張或編曲或鼓琴相和而歌疏曲薄也或編薄織簾或鼓琴歌詠相和歡樂曾無戚容所謂相忘以生方外之至也曰嗟來桑戸乎嗟來桑戸乎而已反其眞而我猶爲人猗注人哭亦哭俗內之迹也齊死生忘哀樂臨尸能歌方外之至也疏嗟來歌聲也桑戸乎以下相和之辭也猗相和聲也夫從無出有名之曰生自有還無名之曰死汝今既還空寂便是歸本反眞而我猶寄人間羇旅未還桑梓欲齊一死生故發斯猗歎者也子貢趨而進曰敢問臨尸而歌禮乎疏方內之禮貴在節文鄰里有喪舂猶不相况臨朋友之屍曾無哀哭琴歌自若豈是禮乎子貢怪其如此故趨走進問也二人相視而笑曰是惡知禮意注夫知禮意者必遊外以經內守母以存子稱情而直往也若乃矜乎名聲牽乎形制則孝不任誠慈不任實父子兄弟懷情相欺豈禮之大意哉疏夫大禮與天地同節不拘制乎形名直致任眞率情而往况冥同生死豈存哀樂於胸中而子貢方內儒生性猶偏執唯貴麤迹未契妙本如是之人於何知禮之深乎爲方外所嗤固其宜矣子貢反以告孔子曰彼何人者邪脩行無有而外其形骸臨尸而歌顔色不變無以命之彼何人者邪疏命名也子貢使還且告尼父云彼二人情事難識修己德行無有禮儀而忘外形骸混同生死臨喪歌樂神形不變既莫測其道故難以明之孔子曰彼遊方之外者也而丘遊方之內者也注夫理有至極外內相冥未有極遊外之致而不冥於內者也未有能冥於內而不遊於外者也故聖人常遊外以弘內無心以順有故雖終日揮形而神氣無變俯仰萬機而淡然自若夫見形而不及神者天下之常累也是故覩其與羣物並行則莫能謂之遺物而離人矣觀其體化而應務則莫能謂之坐忘而自得矣豈直謂聖人不然哉乃必謂至理之無此是故莊子將明流統之所宗以釋天下之可悟若直就稱仲尼之如此或者將據所見以排之故超聖人之內迹而寄方外於數子宜忘其所寄以尋述作之大意則夫遊外弘內之道坦然自明而莊子之書故是涉俗蓋世之談矣疏方區域也彼之二人齊一死生不爲教迹所拘故遊心寰宇之外而仲尼子貢命世大儒行裁非之義服節文之禮銳意哀樂之中遊心區域之內所以爲異之者也外內不相及而丘使汝往弔之丘則陋矣注夫弔者方內之近事也施之於方外則陋矣疏玄儒理隔內外道殊勝劣而論不相及逮用區中之俗禮弔方外之高人芻狗再陳鄙陋之甚也彼方且與造物者爲人而遊乎天地之一氣注皆冥之故無二疏達陰陽之變化與造物之爲人體萬物之混同遊二儀之一氣也彼以生爲附贅縣疣注若疣之自縣贅之自附此氣之時聚非所樂也以死爲決疣潰癕注若疣之自決癕之自潰此氣之自散非所惜也疏彼三子體道之人達於死生冥於變化是以氣聚而生譬疣贅附縣非所樂也氣散而死若疣癕決潰非所惜之者也夫若然者又惡知死生先後之所在注死生代謝未始有極與之俱往則無往不可故不知勝負之所在也疏先勝也後劣也夫附贅疣癕四者皆是疾而氣有聚散病無勝負若以此方於生死亦安知優劣之所在乎假於異物託於同體注假因也今死生聚散變化無方皆異物也無異而不假故所假雖異而共成一體也疏水火金木異物相假眾諸寄託共成一身是知形體由來虛偽忘其肝膽遺其耳目注任之於理而冥往也疏既知形質虛假無可欣愛故能內則忘於藏腑外則忘其根竅故也反覆終始不知端倪注五藏猶忘何物足識哉未始有識故能放身於變化之塗玄同於反覆之波而不知終始之所極也疏端緒也倪畔也反覆猶往來也終始猶生死也既忘其形質隳體黜聰故能去來生死與化俱往化又無極故莫知端倪芒然彷徨乎塵垢之外逍遙乎無爲之業注所謂無爲之業非拱默而已所謂塵垢之外非伏於山林也疏芒然無知之貌也彷徨逍遙皆自得逸豫之名也塵垢色聲等有爲之物也前既遺物形骸此又忘於心智是以放任於塵累之表逸豫於清曠之鄉以此無爲而爲事業也彼又惡能憒憒然爲世俗之禮以觀眾人之耳目哉注其所以觀示於眾人者皆其塵垢耳非方外之冥物也疏憒憒猶煩亂也彼數子者清高虛淡安排去化率性任眞何能强事節文拘世俗之禮威儀顯示悅眾人之視聽哉子貢曰然則夫子何方之依注子貢不聞性與天道故見其所依而不見其所以依也夫所以依者不依也世豈覺之哉疏方內方外淺深不同未知夫子依從何道師資起發故設此疑曰邱天之戮民也注方內爲桎梏明所貴在方外也夫遊外者依內離人者合俗故有天下者無以天下爲也是以遺物而後能入羣坐忘而後能應務愈遺之愈得之苟居斯極則雖欲釋之而理固自來斯乃天人之所不赦者也疏夫聖迹禮儀乃桎梏形性仲尼既依方內則是自然之理刑戮之人也故德充篇云天刑之安可解雖然吾與汝共之注雖爲世所桎梏但爲與汝共之耳明己恒自在外也疏夫孔子聖人和光接物揚波同世貴斯俗禮雖復降迹方內與汝共之而遊心方外蕭然無著也子貢曰敢問其方注問所以遊外而共內之意疏方猶道也問迹混域中心遊方外外內玄合其道若何孔子曰魚相造乎水人相造乎道注造詣也魚之所詣者適性莫過深水人之所至者得意莫過道術雖復情智不一而相與皆然此略標義端次下解釋也相造乎水者穿池而養給相造乎道者無事而生定注所造雖異其於由無事以得事自方外以共內然後養給而主定則莫不皆然也俱不自知耳故成無爲也疏此解釋前義也夫江湖淮海皆名天池魚在大水之中窟穴泥沙以自資養供給也亦猶人處大道之中清虛養性無事逍遙故得性分靜定而安樂也故曰魚相忘乎江湖人相忘乎道術注各自足而相忘者天下莫不然也至人常足故常忘也疏此解釋前義也夫深水遊泳各足相忘道術內充偏愛斯絶豈與夫呴濡仁義同年而語哉臨尸而歌其義云爾故也子貢曰敢問畸人注問向之所謂方外而不耦於俗者又安在也疏畸者不耦之名也修行無有而疏外形體乖異人倫不偶於俗敢問此人其道如何曰畸人者畸於人而侔於天注夫與內冥者遊於外也獨能遊外以冥內任萬物之自然使天性各足而帝王道成斯乃畸於人而侔於天也疏自此已下孔子答子貢也侔者等也同也夫不修仁義不偶於物而率其本性者與自然之理同也故曰天之小人人之君子人之君子天之小人也注以自然言之則人無小大以人理言之則侔於天者可謂君子矣疏夫懷仁履義爲君子乖道背德爲小人也是以行蹩躠之仁用踶跂之義者人倫謂之君子而天道謂之小人也故知子反琴張不偶於俗乃曰畸人實天之君子重言之者復結其義也顔回問仲尼曰孟孫才其母死哭泣無涕中心不慽居喪不哀無是三者以善喪疏姓孟孫名才魯之賢人體無爲之一道知生死之不二故能迹同方內心遊物表居母氏之喪禮數不闕威儀詳雅甚有孝容而淚不滂沱心不悲慽聲不哀慟三者既無不名孝子而鄉邦之內悉皆善之云其處喪深得禮法蓋魯國固有無其實而得其名者乎回壹怪之注魯國觀其禮而顔回察其心疏蓋者發語之辭也哭泣縗絰同域中之俗禮心無哀慽契方外之忘懷魯人覩其外迹故有善喪之名顔子察其內心知無至孝之實所以一見孫才遂生疑怪仲尼曰夫孟孫氏盡之矣進於知矣注盡死生之理應內外之宜者動而以天行非知之匹也疏進過也夫孟孫氏窮哀樂之本所以無樂無哀盡生死之源所以忘生忘死既而本迹難測故能合內外之宜應物無心豈是運知之正者邪唯簡之而不得注簡擇死生而不得其異若春秋冬夏四時行耳疏夫生來死去譬彼四時故孟孫簡擇不得其異夫已有所簡矣孟孫氏不知所以生不知所以死注已簡而不得故無不安無不安故不以生死槩意而付之自化也疏雖復有所簡擇竟不知死生之異故能安於變化而不以哀樂槩懷也不知就先不知就後注所遇而安若化爲物注不違化也疏先生也後死也若順也既一於死生故無去無就冥於變化故順化爲物也以待其所不知之化已乎注死生宛轉與化爲一猶乃忘其所知於當今豈待所未知而豫憂者哉疏不知之化謂當來未化之事也已止也見在之生猶自忘遣況未來之化豈復逆憂若用心預待不如止而勿爲也且方將化惡知不化哉方將不化惡知已化哉注已化而生焉知未生之時哉方化而死焉知已死之後哉故無所避就而與化俱往也疏方今正化爲人安知過去未化之事乎正在生日未化而死又安知死後之事乎但當推理直前與化俱往無勞在生憂死妄爲欣惡也吾特與汝其夢未始覺者邪注夫死生猶覺夢耳今夢自以爲覺則無以明覺之非夢也苟無以明覺之非夢則亦無以明生之非死也死生覺夢不知所在當其所遇無不自得何爲在此而憂彼哉疏夢是昏睡之時覺是了知之日仲尼顔子猶拘名教爲昏於覺夢之中不達死生未嘗暫覺者也且彼有駭形而無損心注以變化爲形之駭動耳故不以死生損累其心疏彼之孟孫冥於變化假見生死爲形之驚動終無哀樂損累心神也有旦宅而無情死注以形骸之變爲旦宅之日新耳其情不以爲死疏旦日新也宅者神之舍也以形之故變爲宅舍之日新利其性靈凝淡終無死生之異也孟孫氏特覺人哭亦哭是自其所以宜也注夫常覺者無往而有逆也故人哭亦哭正自是其所宜也疏孟孫冥同生死獨居覺悟應於內外不乖人理人哭亦哭自是順物之宜者也且也相與吾之耳矣注夫死生變化吾皆吾之既皆是吾吾何失哉未始失吾吾何憂哉無逆故人哭亦哭無憂故哭而不哀疏吾生吾死相與皆吾未始非吾吾何所失若以係吾爲意何適非吾庸詎知吾所謂吾之乎注靡所不吾也故玄同外內彌貫古今與化日新豈知吾之所在也疏庸常也凡常之人識見淺狹詎知吾之所謂無處非吾假令千變萬化而吾常在新吾故吾何欣何惡也且汝夢爲鳥而厲乎天夢爲魚而沒於淵注言無往而不自得也不識今之言者其覺者乎其夢者乎注夢之時自以爲覺則焉知今者之非夢邪亦焉知其非覺邪覺夢之化無往而不可則死生之變無時而足惜也疏厲至也且爲魚爲鳥任性逍遥處死處生居然自得而魚鳥既無優劣死生亦何勝負而係之哉孟孫妙達斯源所以未嘗介意又不知今之所論魚鳥者爲是覺中而辯爲是夢中而說乎夫人夢中自以爲覺今之覺者何非夢中是知覺夢生死未可定也造適不及笑獻笑不及排注所造皆適則忘適矣故不及笑也排者推移之謂也夫禮哭必哀獻笑必樂哀樂存懷則不能與適推移矣今孟孫常適故哭而不哀與化俱往也疏造至也獻善也排推移也夫所至皆適斯適其常適何及歡笑然後樂哉若待善事感己而後適者此則不能隨變任化與物推移也今孟孫常適故哭而不哀也安排而去化乃入於寥天一注安於推移而與化俱去故乃入於寂寥而與天爲一也自此以上至于子祀其致一也所執之喪異故歌哭不同疏所在皆適故安任推移未始非吾而與化俱去如此之人乃能入於寥廓之妙門自然之一道意而子見許由許由曰堯何以資汝注資者給濟之謂疏意而古之賢人資給濟之謂意而先謁帝堯後見仲武問云帝堯大聖道德甚高汝既謁見有何教授資濟之術幸請陳說耳意而子曰堯謂我汝必躬服仁義而明言是非疏躬身也仁則恩慈育物義則斷割裁非是則明賞其善非則明懲其惡此之四者人倫所貴汝必須己身報行亦須明言示物此言意而述堯教語之辭也許由曰而奚來爲軹疏而汝也奚何也軹語助也堯將教迹刑害於汝瘡痕已大何爲更來矣夫堯既已黥汝以仁義而劓汝以是非矣汝將何以遊夫遙蕩恣睢轉徙之塗乎注言其將以形教自虧殘而不能復遊夫自得之場無係之塗也疏黥鑿額也劓割鼻也恣睢縱任也轉徙變化也塗道也夫仁義是非損傷眞性其爲殘害譬之刑殘汝既被堯黥劓拘束性情如何復能遨遊自得逍遙放蕩從容自適於變化之道乎言其不復能如是意而子曰雖然吾願遊於其藩注不敢復來涉中道也且願遊其藩傍而已疏我雖遭此虧殘而庶幾之心靡替不復敢當心路願涉道之藩傍也許由曰不然夫盲者無以與乎眉目顔色之好瞽者無以與乎青黃黼黻之觀疏盲者有眼睛而不見物瞽者眼無眹縫如鼓皮也作斧形謂之黼兩己相背謂之黻而盲瞽之人眼睛已敗既不能觀文彩青黃亦不愛好眉目顔色譬意而遭堯黥劓情智已傷豈能愛慕深玄觀覽眾妙耶意而子曰夫無莊之失其美據梁之失其力黃帝之亡其智皆在鑪錘之間耳注言天下之物未必皆自成也自然之理亦有須冶鍜而爲器者耳故此之三人亦皆聞道而後亡其所務也此皆寄言以遣云爲之累疏無莊古之美人爲聞道故不復莊飾而自忘其美色也據梁古之多力人爲聞道守雌故不勇其力也黃帝軒轅也有聖知亦爲聞道故能忘遣其知也鑪竈也錘鍛也以上三人皆因聞道然後忘其所務以契其眞猶如世間器物假於鑪冶打鍛以成其用者耳今何妨自然之理今夫子教示於我以成其道耶故知自然造物在鑪冶之間則是有修學冶鍛之義庸詎知夫造物者之不息我黥而補我劓使我乘成以隨先生耶注夫率然直往者自然也往而傷性性傷而能改者亦自然也庸詎知我之自然當不息黥補劓而乘可成之道以隨夫子邪而欲棄而勿告恐非造物之至疏造物猶造化也我雖遭仁義是非殘傷情性焉知造化之內不補劓息黥令我改過自新乘可成之道隨夫子以請益邪乃欲棄而不教恐乖造物者也許由曰噫未可知也我爲汝言其大略疏噫嘆聲也至道深玄絶言於象不可以心慮測故歎云未可知也既請益慇懃亦無容杜默雖復不可言盡爲汝梗槩陳也吾師乎吾師乎𩐎萬物而不爲義澤及萬世而不爲仁注皆自爾耳亦無愛爲於其間也安所寄其仁義疏吾師乎者至道也然至道不可心知爲汝略言其要卽吾師是也𩐎碎也至如素秋霜降碎落萬物豈有情斷割而爲義哉青春和氣生育萬物豈有情恩愛而爲仁哉蓋不然而然也而許由師於至道至道既其如是汝何得躬服仁義耶此略爲意而說息黥補劓之方也長於上古而不爲老注日新也覆載天地刻彫眾形而不爲巧注自然故非巧也疏萬象之前先有此道智德具足故義說爲長而實無長也長既無矣老豈有邪欲明不長而長老而不老故長於上古而不爲老也雖復天覆地載而以道爲源眾形刻彫咸資造化同禀自然故巧名斯滅既其無老無巧無是無非汝何所明言耶此所遊已注遊於不爲而師於無師也疏吾師之所遊心止如此說而已此則總結以前吾師之義是也顔回曰回益矣注以損之爲益也疏顔子禀教孔氏服膺問道覺已進益呈解於師損有益空故以損爲益也仲尼曰何謂也疏既言益矣有何意謂曰回忘仁義矣疏忘兼愛之仁遣裁非之義所言益者此之謂乎曰可矣猶未也注仁者兼愛之迹義者成物之功愛之非仁仁迹行焉成之非義義功見焉存夫仁義不足以知愛利之由無心故忘之可也但忘功迹故猶未玄達疏仁義已忘於理漸可解心尚淺所以猶未他日復見曰回益矣疏他日猶異日也空解日新時更復見所言進益列在下文曰何謂也疏所言益者是何意謂曰回忘禮樂矣疏禮者荒亂之首樂者淫蕩之具爲累更重次忘之也曰可矣猶未也注禮者形體之用樂者樂生之具忘其具未若忘其所以具也疏虛忘漸可猶未至極他日復見曰回益矣曰何謂也疏並不異前解也曰回坐忘矣疏虛心無著故能端坐而忘坐忘之義具列下文仲尼蹵然曰何謂坐忘注蹵然驚悚貌也忘遣既深故悚然驚歎坐忘之謂厥義云何也顔回曰隳肢體黜聰明疏隳毁廢也黜退除也雖聽屬於耳明關於目而聽明之用本乎心靈既悟一身非有萬境皆空故能毁廢四肢百體屏黜聰明心智者也離形去知同於大通此謂坐忘注夫坐忘者奚所不忘哉既忘其迹又忘其所以迹者內不覺其一身外不識有天地然後曠然與變化爲體而無不通也疏大通猶大道也道能通生萬物故謂道爲大通也外則離析於形體一一虛假此解隳肢體也內則除去心識悗然無知此解黜聰明也既而枯木死灰冥同大道如此之益謂之坐忘也仲尼曰同則無好也注無物不同則未嘗不適未嘗不適何好何惡哉化則無常也注同於化者唯化所適故無常也疏既同於大道則無是非好惡冥於變化故不執滯守常也而果其賢乎邱也請從而後也疏果決也而汝也忘遣如此定是大賢邱雖汝師遂落汝後從而學之是邱所願撝謙退己以進顔回者也子輿與子桑友而淋雨十日子輿曰子桑殆疾矣裏飯而往食之注此二人相爲於無相爲者也今裹飯而相食者乃任之天理而自爾非相爲而後往也疏雨經三日已上爲霖殆近也子桑家貧屬斯霖雨近於餓病此事不疑於方外之交任理而往雖復裹飯非有相爲之情也至子桑之門則若歌若哭鼓琴曰父邪母邪天乎人乎有不任其聲而趨舉其詩焉疏任堪也趨卒疾也子桑既遭飢餒故發琴聲問此飢貧從誰而得爲關父母爲是人夫此則歌哭之詞也不堪此聲又率爾詩詠也子輿入曰子之歌詩何故若是注嫌其有情所以趨出遠理疏一於死生忘於哀樂於無相與方外之交今子歌詩似有怨望故入門驚怪問其所由矣曰吾思夫使我至此極者而弗得也父母豈欲吾貧哉天無私覆地無私載天地豈私貧我哉求其爲之者而不得也然而至此極者命也夫注言物皆自然無爲之者也疏夫父母慈造不欲飢凍天地無私豈獨貧我思量主宰皆是自然尋求來由竟無兆朕而使我至此窮極者皆我之賦命也亦何惜之有哉
