body:
  text: 南華眞經周莊周著河南郭象注唐西華法師成玄英疏內篇人間世第四與人羣者不得離人然人間之變故世世異宜唯無心而不自用者爲能隨變所適而不荷其累也顔回見仲尼請行疏姓顔名回字子淵魯人也孔子三千門人之中總四科入室弟子也仲尼者姓孔名丘字仲尼亦魯人殷湯之後生衰周之世有聖德卽顔回之師也其根由事迹徧在儒史今既解釋莊子意在玄虛故不復委碎載之耳然人間事緒糺紛實難接物利他理在不易故寄顔孔以顯化導之方託此聖賢以明心齋之術也孔聖顔賢耳曰奚之疏奚何也之適也質問顔回欲往何處耳曰將之衛疏衛卽殷紂之都又是康叔之封今汲郡衛州是也此則顔答孔問欲行之所也曰奚爲焉疏欲往衛國何所云爲重責顔生行李意謂矣曰回聞衛君其年壯其行獨注不與民同欲也疏衛君卽靈公之子蒯聵也荒淫昏亂縱情無道其年少壯而威猛可畏獨行凶暴而不順物心顔子述己所聞以答尼父輕用其國注夫君人者動必乘人一怒則伏尸流血一喜則軒冕塞路故君人者之用國不可輕也疏夫民爲邦本本固則邦寧不能愛重黎元方欲輕蔑其用欲不顚覆其可得乎而不見其過注莫敢諫也疏强足以拒諫辯足以飾非故百固五懼而吞聲有過而無敢諫者也輕用民死注輕用之於死地疏不凝動靜泰然自安乃輕用國民投諸死地矣死者以國量乎澤若蕉注舉國而輸之死地不可稱數視之若草芥也疏蕉草芥也或征戰屢興或賦稅煩重而死者其數極多語其多少以國爲量若舉爲數造次難悉縱恣一身不恤百姓視於國民如藪澤之中草芥者也民其無如矣注無所依歸疏君上無道臣子飢荒非但無可奈何亦乃無所歸往也回嘗聞之夫子曰治國去之亂國就之醫門多疾願以所聞思其則庶幾其國有瘳乎疏庶冀也幾近也瘳愈也治邦寧謐不假匡扶亂國孤危應須相諫顔生今將化衛是以述昔所聞思其禀受法言冀其近於善道譬彼醫門多能救疾方玆賢士必能拯難荒淫之病庶其瘳愈者也仲尼曰譆若殆往而刑耳注其道不足以救彼患疏譆怪笑聲也若汝也殆近也孔子哂其術淺禾足化他汝若往於衛必遭刑戮者也夫道不欲雜注宜正得其人雜則多多則擾擾則憂憂而不救注若夫不得其人則雖百醫守病適足致疑而不能一愈也疏夫靈通之道唯在純粹必其宣雜則事緒繁多事多則心中擾亂心中擾亂則憂患斯起藥病既乖彼此俱困己尚不立焉能救物哉古之至人先存諸己而後存諸人注有其具然後可以接物也疏諸於也存立也古昔至德之人虛懷而遊世間必先安立巳道然後拯救他人未有己身不存而能接物者也援引古人以爲鑒誡所存於己者未定何暇至於暴人之所行注不虛心以應物而役思以犯難故知其所存於己者未定也夫唯外其知以養眞寄妙當於群才功名歸物而患慮遠身然後可以至於暴人之所行也疏夫唯虛心以應務忘智以養眞寄當於羣才歸功於萬物者方可處涉人間逗機行化也今顔回存立己身猶未安定是非喜怒勃戰胸中有何庸暇輙至於衛欲諫暴君此行未可也且若亦知夫德之所蕩而知之所爲出乎哉德蕩乎名知出乎爭注德之所以流蕩者矜名故也知之所以橫出者爭善故也雖復桀跖其所矜惜無非善名也疏汝頗知德蕩智出所由乎哉夫德之所以流蕩喪眞爲矜名故也智之所以橫出逾分者爭善故也夫惟善惡兩忘名實雙遣者故能萬德不蕩至智不出者也名也者相軋也知也者爭之器也二者凶器非所以盡行也注夫名智者世之所用也而名起則相軋知用則爭興故遣名知而後行可盡也疏軋傷也夫矜名則更相毁損顯智則爭競路興故二者並凶禍之器盡不可行於世且德厚信矼未達人氣名聞不爭未達人心疏矼確實也假且道德純厚信行確實芳名令聞不與物爭而衛君素性頑愚凶悖少鑒既未達顔回之意氣豈識匡扶之心乎而彊以仁義繩墨之言術暴人之前者是以人惡有其美也注夫投人夜光鮮不按劍者未達故也今回之德信與其不爭之名彼所未達也而彊以仁義準繩於彼彼將謂回欲毁人以自成也是故至人不役志以經世而虛心以應物誠信著於天地不爭暢於萬物然後萬物歸懷天地不逆故德音發而天下響會景行彰而六合俱應而後始以經寒暑涉治亂而不與逆鱗迕也疏繩墨之言卽五德聖智也內之德性衛君未達而强用仁義之術行於暴人之前所述先王美言必遭衛君憎惡故不可也命之曰菑人菑人者人必反菑之注適不信受則謂與己爭名而反害之疏命名也衛侯不達汝心謂汝菑害於己既遭疑貳必被反菑故也若殆爲人菑夫且苟爲悅賢而惡不肖惡用而求有以異注苟能悅賢惡愚聞義而服便爲明君也苟爲明君則不爲無賢臣汝往亦不足復奇如其不爾往必受害故以有心而往無往而可無心而應其慶自來則無往而不可也疏殆近也夫歎也汝若往衛必近危亡爲暴人所菑害深可歎也且衛侯苟能悅愛賢人憎惡不肖故當朝多君子屏黜小人已有忠臣何求於汝至於彼亦何異彼人既與無異去便無益若唯無詔王公必將乘人而鬭其捷注汝唯有寂然不言耳言則王公必乘人以君人之勢而角其捷辯以距諫飾非也疏詔言也王公衛侯也汝若至衛唯當默爾不言若有箴規必遭戮辱且衛侯恃千乘之勢用五等之威飾非拒諫鬭其捷辯汝既恐怖何暇匡扶也而目將熒之注其言辯捷使人眼眩也疏熒眩也衛侯雖荒淫暴虐而甚俊辯聰明加恃人君之威陵藉忠諫之士故顔回心生惶怖眼目眩惑者也而色將平之注不能復自異於彼也疏縱有諫心不敢顯異顔色靡順與彼和平口將營之注自救解不暇疏衛侯位望既高威嚴可畏顔生恐禍及己憂懼百端所以口舌自營略無容暇容將形之疏形見也既懼災害故委順面從擎跽曲拳形迹斯見也心且成之注乃且釋己以從彼也疏豈直外形從順亦乃內心和同不能進善而更成彼惡故也是以火救火以水救水名之曰益多注適不能救乃更足以成彼之盛疏以用也夫用火救火猛燎更增用水救水波浪彌甚故顔子之行適足衛侯之暴不能匡勸可謂益多也順始無窮注尋常守故未肯變也若殆以不信厚言必死於暴人之前矣注未信而諫雖厚爲害疏汝之忠厚之言近不信用則雖誠心獻替而必遭刑戮於暴虐君人之前矣且昔者桀殺關龍逢紂殺王子比干是皆修其身以下傴拊人之民以下拂其上者也注居下而任上之憂比干非其事也疏諡法賊民多殺曰桀殘義損善曰紂姓關字龍逢夏桀之賢臣盡誠而遭斬首比干殷紂之庶叔忠諫而被剖心傴拊猶愛養也拂違戾也此二子者並古昔良佐修飾其身伏行忠節以臣下之位憂君上之民臣有德而君無道拂戾其君咸遭戮辱援古證今足爲龜鏡是知顔回化衛理未可行也故其君因其修以擠之是好名者也注不欲今臣有勝君之名也疏擠墜也䧟也毒也夏桀殷紂無道之君不自揣量猶貪令譽故因賢臣之修飾肆其鴆毒而啗之意在爭名逐利遂至於此故也昔者堯攻叢枝胥敖禹攻有扈國爲虛厲身爲刑戮其用兵不止其求實無已是皆求名實者也而獨不聞之乎注夫暴君非徒求恣其欲乃復求名但所求者非其道耳疏堯禹二君已具前解叢枝胥敖有扈並是國名有扈者今雍州鄠縣是也宅無人曰墟鬼無後曰厲言此三國之君悉皆無道好起兵戈征伐他國豈唯貪求實利亦乃規覓虛名遂使境域丘墟人民絶滅身遭刑戮宗廟顚殞貪名求實一至如斯今古共知汝獨不聞也名實者聖人之所不能勝也而況若乎注惜名貪欲之君雖復堯禹不能勝化也故與眾攻之而汝乃欲空手而往化之以道哉疏夫庸人暴王貪利求名雖復堯禹聖君不能懷之以德猶興兵眾問罪夷凶況顔子匹夫空手行化不然之理亦在無疑故也雖然若必有以也嘗以語我來疏嘗試也汝之化導雖復未弘既欲請行必有所以試陳汝意告語我來顔回曰端而虛注正其形而虛其心也疏端正其形盡人臣之敬虛豁心慮竭匡諫之誠既承高命敢述所以耳勉而一注言遜而不二也疏勉勵身心盡誠奉國言行忠謹終無差二則可乎疏如前二術可行以不曰惡惡可注言未可也疏惡惡猶於何也於何而可言未可也夫以陽爲充孔揚注言衛君亢陽之性充張於內而甚揚於外彊禦之至也疏陽剛猛也充滿也孔甚也言衛君剛猛之性滿寔內心彊暴之甚彰揚外迹采色不定注喜怒無常疏順心則喜違意則嗔神采氣色曾無定準常人之所不違注莫之敢逆疏爲性暴虐威猛尋常諫士賢人詎能逆因案人之所感以求容與其心注夫頑彊之甚人以快事感己己陵籍而乃抑挫之以求從容自放而遂其侈心也疏案抑也容與猶放縱也人以快善之事箴規感動君因其忠諫而抑挫之以求快樂縱容遂其淫荒之意也名之曰日漸之德不成而況大德乎注言乃少多無回降之勝也疏衛侯無道其來已久日將漸漬之德尚不能成況乎鴻範聖明如何可望也將執而不化注故守其本意也疏飾非闇主不能從人如流固執本心誰肯變惡爲善者也外合而內不訾其庸詎可乎注外合而內不訾卽向之端虛而勉一耳言此未足以化之疏外形擎跽以盡足恭內心順從不敢訾毁以此請行有何利益化衛之道庸詎可言乎斯則斥前端虛之術未宜行用之也然則我內直而外曲成而上比注顔回更說此三條也疏前陳二事己被抵訶今設三條庶其允合此標題目下釋其義顔生述己以問宣尼是也內直者與天爲徒與天爲徒者知天子之與己皆天之所子而獨以己言蘄乎而人善之蘄乎而人不善之邪注物無貴賤得生一也故善與不善付之公當耳一無所求於人也疏此下釋義祈求也言我內心質素誠直共自然之理而爲徒類是知帝王與我皆禀天然故能忘貴賤於君臣遣善惡於榮辱復矜名以避惡求善於他人乎具此虛懷庶其合理若然者人謂之童子是之謂與天爲徒注依乎天理推已性命若嬰兒之直往也疏然如此也童子嬰兒也若如面說推理直前行比嬰兒故謂之童子結成前義故是之謂與天爲徒也外曲者與人之爲徒也擎跽曲拳人臣之禮也人皆爲之吾敢不爲邪爲人之所爲者人亦無疵焉疏夫外形委曲隨順世間者將人倫爲徒類也擎手跽足罄折曲躬俯仰拜伏者人臣之禮也而和同塵垢污隆任物人皆行此我獨不爲耶是以爲人所爲故人無怨疾也是之謂與人爲徒注外形委曲隨人事之所當爲也疏此結成也成而上比者與古爲徒注成於今而比於古也疏忠諫之事乃成於今君臣之義上比於古故與古之忠臣比干等類是其義也其言雖教謫之實也注雖是常教實有諷責之旨疏謫責也所陳之言雖是教迹論其意旨實有諷責之心也古之有也非吾有也疏夐古以來有此忠諫非我今日獨起箴規者也若然者雖直而不病注寄直於古故無以病我也疏若忠諫之道自古有之我今誠直亦幸無憂累是之謂與古爲徒疏此結前也若是則可乎疏呈此三條未知可不仲尼曰惡惡可大多政法而不諜注當理無二而張三條以政之與事不冥也疏諜條理也當也法苟當理不俟多端政設三條大傷繁冗於理不當亦不安恬故於何而可也雖固亦無罪注雖未弘大亦且不見咎責疏設此三條雖復固陋既未行李亦幸無咎責者也雖然止是耳矣夫胡可以及化注罪則無矣化則未也疏胡何也顔回化衛止有是法纔可獨善未及濟時故何可以及化也又解若止而勿行於理便是如其適衛必自遭殆也猶師心者也注挾三術以適彼非無心而付之天下也疏夫聖人虛己應時無心譬彼明鏡方玆虛谷今顔回預作言教方思慮可不既非忘淡薄故知師其有心也顔回曰吾無以進矣敢問其方疏顔生三行一朝頓盡化衛之道進趣無方更請聖師庶聞妙法仲尼曰齋吾將語若有而爲之其易邪注夫有其心而爲之者誠未易也疏顔回殷勤致請尼父爲說心齋但能虛忘吾當告汝必其有心爲作便乖心齋之妙故有心而索玄道誠未易者也易之者皞天不宜注以有爲爲易未見其宜也疏爾雅云夏曰皞天言其氣皞旴也以有爲之心而行道爲易者皞天之下不見其宜言不宜以有爲心齋也顔回曰回之家貧唯不飲酒不茹葷者數月矣若此則可以爲齋乎疏茹食也葷辛菜也齋齊也謂心迹俱不染塵人也顔子家貧儒史具悉無酒可飲無葷可茹簞瓢蔬素已經數月請問若此得爲齋不曰是祭祀之齋非心齋也疏尼父答言此是祭祀鬼神祼獻宗廟俗中致齋之法非所謂心齋者也回曰敢問心齋疏向說家貧事當祭祀心齋之術請示其方仲尼曰若一志注去異端而任獨也疏一汝志心無復異端入寂虛忘冥符獨化此下答於顔子廣示心齋之術者也無聽之以耳而聽之以心疏耳根虛寂不凝宮商反聽無聲凝神心府無聽之以心而聽之以氣疏心有知覺猶起人緣氣無情慮虛柔任物故去彼知覺取此虛柔遣之又遣漸階玄妙也聽止於耳疏不著聲塵止於心聽此釋無聽之以耳也心止於符疏符合也心起緣慮必與境合庶令凝寂不復與境相符此釋無聽之以心者也氣也者虛而待物者也注遺耳目去心意而付氣性之自得此虛以待物者也疏如氣柔弱虛空其心寂泊忘懷方能應物此解而聽之以氣也唯道集虛虛者心齋也注虛其心則至道集於懷也疏唯此眞道集在虛心故知虛心者心齋妙道也顔回曰回之未始得使實自回也注未使心齋故有其身疏未禀心齋之教猶懷封滯之心既不能隳體以忘身尚謂顔回之實有也得使之也未始有回也注既得心齋之使則無其身疏既得夫子之教使其人以虛齋遂能物我洞忘未嘗之可有也可謂虛乎夫子曰盡矣疏夫子向說心齋之妙妙盡於斯吾語若若能入遊其樊而無感其名注放心自得之場當於實而止疏夫子謂顔生化衛之要愼莫據其樞要且復遊入蕃傍亦宜晦迹消聲不可以名智感物樊蕃也入則鳴不入則止注譬之宫商應而無心故曰鳴也夫無心而應者任彼耳不彊應也疏若也道狎衛侯則可鳴聲匡救如其諫不入耳則宜緘口忘言示勿彊顯忠貞必遭於禍害無門無毒注使物自若無門者也付天下之自安無毒者也毒治也疏毒治也如水如鏡應感虛懷既不預作也一宅而寓於不得已注不得已者理之必然者也體至一之宅而會乎必然之符也疏宅居處也處心至一之道不得止而應之機感冥會非預謀也則幾矣注理盡於斯疏幾盡也應物理盡於斯也矣絶迹易無行地難注不行則易欲行而不踐地不可能也無爲則易欲爲而不傷性不可得也疏夫端居絶迹理在不難行不踐地故當不易亦猶無爲虛寂應感則易有爲思慮涉物則難其理必然故與斯譬矣爲人使易以僞爲天使難以僞注視聽之所得者粗故易欺也至於自然之報細故難爲也則失眞少者不全亦少失眞多者不全亦多失得之報未有不當其分者也而欲違天爲僞不亦難乎疏夫人情驅使其法麤淺所以易欺天然馭用斯理微細是故難矯故知人間涉物必須率性任眞也聞以有翼飛者矣未聞以無翼飛者也聞以有知知者矣未聞以無知知者也注言必有其具乃能其事今無至虛之宅無由有化物之實也疏夫鳥無六翮必不可以摶空人無二智亦未能以接物也瞻彼闋者虛室生白注夫視有若無虛室者也室虛而純白獨生矣疏瞻觀照也彼前境也闋空也夫觀察萬有悉皆空寂故能盡其心室反照眞源而智惠明白隨用而生白道也吉祥止止注夫吉祥之所集者至虛至靜也疏吉者福善之事祥者嘉慶之徵止者凝靜之智言吉祥善福止在凝靜之心凝靜之心亦能致吉祥之善應也夫且不止是之謂坐馳注若夫不止於當不會於極此爲以應坐之日而馳騖不息也故外敵未至而內已困矣豈能化物哉疏苟不能形同稿木心若死灰則雖容儀端拱而精神馳騖可謂形坐而心馳者也夫徇耳目內通而外於心知鬼神將來舍而況人乎注夫使耳目閉而自然得者心知之用外矣故將任性直通無往不冥尚無幽昧之責而況人間之累乎疏徇使也夫能令根竅內通不緣於物境精神安靜志外於心知者斯則外遣於形內忘於智則隳體黜聰虛懷任物鬼神冥附而舍止不亦當乎人倫鑽仰而歸依固其宜矣故外篇云無鬼責無人非也是萬物之化也禹舜之所紐也伏羲几蘧之所行終而況散焉者乎注言物無貴賤未有不由心知耳目以自通者也故世之所謂知者豈欲知而知哉所謂見者豈爲見而見哉若夫知見可以欲而爲得者則欲賢可以得賢爲聖可以得聖乎固不可矣而世不知知之自知因欲爲知以知之不見見之自見因欲爲見以見之不知生之自生又將爲生以生之故見目而求離朱之明見耳而責師曠之聰故心神奔馳於內耳目竭喪於外處身不適而與物不冥矣不冥矣而能合乎人間之變應乎世世之節者未之有也疏是指斥之名也此近指以前心齋等法能造化萬物孕育蒼生也伏牛乘馬號曰伏犧姓風號太昊几蘧者三皇已前無文字之君也言此心齋之道夏禹虞舜以爲應物綱紐伏犧几蘧行之以終其身而況世間凡鄙疏散之人軌轍此道而欲化物葉公子高將使於齊問於仲尼曰王使諸梁也甚重注重其使欲有所求也疏楚莊王之玄孫尹成子名諸梁字子高食采於葉僭號稱公王者春秋實爲楚子而僭稱王齊卽姜姓太公之裔其先禹之四岳或封於呂故謂太公爲呂望周武王封太公於營邱是爲齊國齊楚二國結好往來王帛使乎相繼不絶或急難而求救或問罪而請兵情事不輕委寄甚重是故諸梁憂慮詢道仲尼也齊之待使者蓋將甚敬而不急注恐直空報其敬而不肯急應其求也疏齊侯迹雖往來心無眞實至於迎待楚使甚自殷勤所請事情未達依允奉命既重預有此憂匹夫猶未可動也而況諸侯乎吾甚懷之疏匹夫鄙志尚不可動況乎五等如何可動以此而量甚爲憂慄之也子嘗語諸梁也曰凡事若小若大寡不道以懽成注夫事無小大少有不言以成爲懽者耳此仲尼之所曾告諸梁也疏子者仲尼寡之言少夫經營事緒抑乃多端雖復大小不同而莫不以成遂爲懽適也故諸梁引前所禀用發後機事若不成則必有人道之患注夫以成爲懽者不成則怒矣此楚王之所不能免也疏情若乖阻事不成遂則有人倫之道刑罰之憂事若成則必有陰陽之患注人患雖去然喜懼戰於胸中固已結冰炭於五藏矣疏喜則陽舒憂則陰慘事既成遂中情允愜變昔日之憂爲今時之喜喜懼交集於一心陰陽勃戰於五藏冰炭聚結非患而何故下文云若成若不成而後無患者唯有德者能之注成敗若任之於彼而莫足以患心者唯有德者乎疏安得喪於靈府任成敗於前塗不以憂喜累心者其唯盛德焉吾食也執粗而不臧爨無欲清之人注對火而不思涼明其所饌儉薄也疏臧善也清涼也承命嚴重心懷怖懼執用粗餐不暇精膳所饌既其儉薄爨人不欲思涼然火不多無熱可避之也今吾朝受命而夕飲冰我其內熱與注所饌儉薄而內熱飲冰者誠憂事之難非美食之爲疏諸梁晨朝受詔暮夕飲冰足明怖懼憂愁內心薰灼詢道情切達照此懷也吾未至乎事之情而既有陰陽之患矣事若不成必有人道之患是兩也注事未成則唯恐不成耳若果不成則恐懼結於內而刑網羅於外也疏夫情事未決成敗不知而憂喜存懷是陰陽之患也事若乖舛必不成遂則有人臣之道刑網斯及有此二患何處逃𠎝爲人臣者不足以任之子其有以語我來疏忝爲人臣濫充末使位高德薄不足任之子既聖人情兼利物必有所以幸來告示仲尼曰天下有大戒二其一命也其一義也疏戒法也寰寓之內教法極多要切而論莫過二事二事義旨具列下文子之愛親命也不可解於心注自然結固不可解也疏夫孝子事親盡於愛敬此之性命出自天然中心率由故不可解也臣之事君義也無適而非君也無所逃於天地之間注千人聚不以一人爲主不亂則散故多賢不可以多君無賢不可以無君此天人之道必至之宜疏夫君臣上下理固必然故忠臣事君死成其節此乃分義相投非關天性然六合雖寬未有無君之國若有罪責亦何處逃愆是以奉命卽行無勞進退是之謂大戒注若君可逃而親可解則不足戒也疏結成以前君親大戒義矣是以夫事其親者不擇地而安之孝之至也疏夫孝子養親務在順適登仕求祿不擇高卑所遇而安方名至孝也夫事其君者不擇事而安之忠之盛也疏夫亂臣事主事盡忠貞無夷險安之若命豈得揀擇利害然後奉行能如此者是忠臣之盛美也自事其心者哀樂不易施乎前知其不可奈何而安之若命德之至也注知不可奈何者命也而安之則無哀無樂何易施之有哉故冥然以所遇爲命而不施心於其間泯然與至當爲一而無休戚於其中雖事凡人猶無往而不適而況君親乎疏夫爲道之士而自安其心智者體違順之不殊達得喪之爲一故能涉哀樂之前境不輕易施知窮達之必然豈人情之能制是以安心順命不乖天理自非至人玄德孰能如此也爲人臣子者固有所不得已行事之情而忘其身注事有必至理固常通故任之則事齊事齊而身不存者未之有也又何用心於有身哉疏夫臣子事於君父必須致命盡情有事卽行無容揀擇忘身整務固是其宜苟不得止應須任命也何暇至於悅生而惡死夫子其行可矣注理無不通故當任所遇而直前耳若乃信道不篤而悅惡存懷不能與至當俱往而謀生慮死未見能成其事者也疏既曰行人無容悅惡奉受君命但當適齊有何閑日謀生慮死也邱請復以所聞凡交近則必相靡以信注近者得接故以其信驗親相靡服也遠則必忠之以言注遙以言傳意也疏凡交游鄰近則以性情靡順相去遙遠則任言以表忠誠此仲尼引己所聞勸戒諸梁也言必或傳之夫傳兩喜兩怒之言天下之難者也注夫喜怒之言若過其實傳之者宜使兩不失中故未易也疏以言表意或遣人傳彼此相投乍相喜怒爲此使乎人間未易夫兩喜必多溢美之言兩怒必多溢惡之言注溢過也喜怒之言常過其當也疏溢過也彼此兩人互相善怒若其順情則美惡之言必當過者也凡溢之類妄注嫌非彼言似傳者妄作疏類似也夫溢當之言體非眞實聽者既疑似使人妄構也妄則其信之也莫注莫然疑之疏莫致疑貌也既似傳者妄作遂生不信之心莫然疑之也莫則傳言者殃注就傳過言似於誕妄受者有疑則傳言者橫以輕重爲罪也疏受者生疑心懷不信傳語使乎殃禍斯及故法言曰傳其常情無傳其溢言則幾乎全注雖聞臨時之過言而勿傳也必稱其常情而要其誠致則近於全也疏夫處涉人間爲使實難必須深察常情必使賓主折中不得傳一時喜怒致兩言有間能如是者近獲全身夫子引先聖之格言爲當來之軌轍也且以巧鬭力者始乎陽注本共好戲常卒乎陰注欲勝情至潛興害彼疏陽喜也陰怒也夫較力相戲非無機巧初始戲謔則情在喜懽逮乎終卒則心生忿怒好勝之情潛以相害世間喜怒情使例然此舉鬥力以譬之也泰至則多奇巧注不復循理疏忿怒之至欲勝之甚則情多奇譎巧詐百端也以禮飲酒者始乎治注尊卑有别旅酬有次常卒乎亂注湛湎淫泆也疏治理也夫賓主獻酬自有倫理側弁之後無後尊卑初正卒亂物皆如此舉飲酒之爲譬泰至則多奇樂注淫荒縱橫無所不至疏宴賞既酣荒淫斯甚當歌屢舞無復節文多方奇異歡樂何極凡事亦然始乎諒常卒乎鄙其作始也簡其將畢也必巨注夫煩生於簡事起於微此必至之勢也疏凡情常事亦復如然莫不始則誠信終則鄙惡初起簡少後必巨大是以煩生於簡事起於微此合喻也言者風波也行者實喪也注夫言者風波也故行之則實喪矣疏夫水因風而起波譬心因言而喜怒也故因此風波之言而行喜怒者則喪於實理者也夫風波易以動實喪易以危注故遺風波而弗行則實不喪矣夫事得其實則危可安而蕩可定也疏風鼓水波易爲動蕩譬言喪實理危殆不難也故忿設無由巧言偏辭注夫忿怒之作無他由也常由巧言過實偏辭失當疏夫施設忿怒更無所由每爲浮僞巧言偏辭謟佞之故也獸死不擇音氣息茀然於是並生心厲注譬之野獸蹴之窮地意急情盡則和聲不至而風息不理茀然暴怒俱生𤷅疵以相對之疏夫野獸因窘迫之窮地性命將死嗚不擇音氣息茀鬱心生疵疾忽然暴怒搏噬於人此更起譬也尅核太至則必有不肖之心應之而不知其然也注夫寬以容物物必歸焉尅核太精則鄙吝心生而不自覺也大人蕩然放物於自得之塲不苦人之能不竭人之歡故四海之交可全疏夫尅切責核逼迫太甚則不善之心歘然自應情事相感物理自然是知躁則失君寬則得眾也苟爲不知其然也孰知其所終注苟不自覺安能知禍福之所齊詣也疏夫急躁忤物必拒之理數自相召不知所以且當時以不肖應之則誰知終後之禍者邪故法言曰無遷令注傳彼實也疏承君令命以實傳之不得以臨時喜怒輒爲遷改者也無勸成注任其自成疏直陳君令任彼事情無勞勸獎强令成就也過度益也注益則非任實疏安於天命率性任情無勞添益語言過於本度也遷令勸成殆事注此事之危殆疏改於君命强勸彼成其於情事大成危殆美成在久注美成者任其時化譬之種植不可一朝成疏心之所美率意以成不由勸獎故能長久惡成不及改注彼之所惡而勸强成之則悔改尋至疏心之所惡强勸而成不及多時尋當改悔可不愼與疏處涉人世銜命使乎先聖法言深宜戒愼且夫乘物以遊心注寄物以爲意也疏夫獨化之士混迹人間乘有物以遨遊運虛心以順世則何殆之有哉託不得已以養中至矣注任理之必然者中庸之符全矣斯接物之至也疏不得已者理之必然也寄必然之事養中和之心斯眞理之造極應物之至妙者矣何作爲報也注當任齊所報之實何爲爲齊作意於其間哉疏率己運命推理而行何須預生億度爲齊作報故也莫若爲致命此其難者注直爲致命最易而已喜怒施心故難也疏直致率情任於天命其自簡易豈有難耶此其難者言不難也顔闔將傅衛靈公太子疏姓顔名闔魯之賢人也太子蒯聵也顔闔自魯適衛將欲爲太子之師傅也而問於蘧伯玉曰有人於此其德天殺疏姓蘧名瑗字伯玉衛之賢大夫蒯聵禀天然之凶德持殺戮以快心既是衛國之人故言有人於此將爲儲后之傅故詢道於哲人與之爲無方則危吾國與之爲有方則危吾身注夫小人之性引之軌制則憎己縱其無度則亂邦疏方猶法也禀性兇頑不履仁義與之方法而軌制憎己所以危身縱之無度而荒淫顚蹷所以亡國其知適足以知人之過而不知其所以過注不知民過之由己故罪責於民而不自改疏己之無道曾不悛革百姓有罪誅戮極深唯見黔首之愆不知過之由己既知如風靡草是知責在於君若然者吾奈之何疏然猶如是將奈之何詢道蘧瑗故陳其所以蘧伯玉曰善哉問乎戒之愼之正汝身哉注反覆與會俱所以爲正身疏戒朂也己身不可率耳防愼儲君勿輕犯觸身履正道隨順機宜前則歎其能問後則示其方法也形莫若就心莫若和注形不乖迕和而不同疏身形從就不乖君臣之禮心知和順迹混四事濟之也雖然之二者有患疏前之二條略標方術既未盡善猶有其患累也就不欲入注就者形順入者遂與同疏郭注云就者形順入者遂與同也和不欲出注和者義濟出者自顯伐疏心知和順方便接引推功儲君不顯己能斯不出也形就而入且爲顚爲滅爲崩爲蹷注若遂與同則是顚危而不扶持與彼俱亡矣故當模格天地但不立小異耳疏顚覆也滅絶也崩壞也蹶敗也形容從就同入彼惡則是顚危而不扶持故致顚覆滅絶崩蹷敗壞與彼俱亡也矣心和而出且爲聲爲名爲妖爲孽注自顯和之且有含垢之聲齊彼之名彼將惡其勝己妄生妖孽故當悶然若晦玄同光塵然後不可得而親不可得而踈不可得而利不可得而害疏反物爲妖孽災也雖復和光同塵而自顯出己智不能韜光晦迹故有齊彼之名蒯聵惡其勝己謂其妄生妖孽故以事而害之彼且爲嬰兒亦與之爲嬰兒彼且爲無町畦亦與之爲無町畦彼且爲無崖亦與之爲無崖達之入於無疵注不小立圭角以逆其鱗也疏町畔也畦埒也與共也入會也夫處世接物其道實難不可遂與和同亦無容郄頓生乖忤或同嬰兒之愚鄙且復無知或類田野之無畦略無界畔縱奢侈之貪求任凶猛之殺戮然後導之以德齊之以禮達斯趣者方會無累之道也汝不知夫螳蜋乎怒其臂以當車轍不知其不勝任也是其才之美者也注夫螳蜋之怒臂非不美也以當車轍顧非敵耳今知之所無奈何而欲彊當其任卽螳蜋之怒臂也疏螳蜋有斧蟲也夫螳蜋鼓怒其臂以當軒車之轍雖復自恃才能之美善而必不勝舉其職任喻顔闔欲以己之才能以當儲君之勢何異乎螳蜋怒臂之當車轍也戒之愼之積伐而美者以犯之幾矣注積汝之才伐汝之美以犯此人危殆之道疏積藴蓄也而汝也幾危也既傅儲君應須戒愼今乃藴蓄才能自矜汝美犯觸威勢必致危亡汝不知夫養虎者乎不敢以生物與之爲其殺之之怒也注恐其因有殺心而遂怒也疏汝頗知世有養虎之法乎猪羊之類不可生供猛獸恐其因殺而生嗔怒也不可以全物與之爲其決之之怒也注方使虎自齧分之則因用力而怒矣疏汝頗知假令以死物投獸猶須先爲分決若使虎自齧分恐因用力而怒之也時其飢飽達其怒心注知其所以怒而順之疏知飢飽之時達喜怒之節通於物理豈復危亡虎之與人異類而媚養己者順也故其殺者逆也注順理則異類生愛逆節則至親交兵疏夫順則悅媚虎狼可以馴狎逆則殺害至親所以交兵養己之道既同涉物之方無别也夫愛馬者以筐盛矢以蜄盛溺注矢溺至賤而以寶器盛之愛馬之至也疏蜃大蛤也愛馬之矢意在貴重屎溺至賤以大蛤盛之情有所滯遂至於是也適有蚊䖟僕緣注僕僕然羣著馬而拊之不時注雖救其患而掩馬之不意則缺銜毁首碎胷注掩其不備故驚而至此疏僕聚也拊拍也銜勒也適有蚊䖟相聚緣馬主既愛惜率然拊之意在除害不定時節掩馬不意忽然驚駭於是馬缺銜勒挽破轡頭人遭蹄踏碎胷毁首者也意有所至而愛有所亡可不愼邪注意至除患率然拊之以致毁碎失其所以愛矣故當世接物逆順之際不可不愼也疏亡猶失也意之所在在乎愛馬既以毁損卽失其所愛人間涉物其義亦然機感參差卽遭禍厄拊馬之喻深宜愼之也匠石之齊至于曲轅見櫟社樹疏之適也曲轅山名也其道屈曲猶如嵩山之西有轘轅之道卽斯類也櫟木名也社土神也祀封土曰社社吐也言能吐生萬物故謂之社而匠是工人之通稱石乃巧者之私名其人自魯適齊塗經曲道覩玆異木擁腫不才欲明處涉人間必須以無用爲用其大蔽牛絜之百圍疏絜約束也櫟社之大特高常木枝葉覆蔭木蔽千牛以繩束之圍麤百尺江南莊本多言其大蔽牛無數千字此本應錯且商丘之木既結駟千乘曲轅之樹豈蔽一牛以此格量數千之本是也其高臨山千仞而後有枝其可以爲舟者旁十數疏七尺曰仞此樹直竦高岑七十餘尺然後挺生枝幹蔽日捎雲堪爲船者旁有數十木之大也其狀如是也觀者如市匠伯不顧遂行不輟疏輟止也木大異常看者甚眾唯有匠石知其不材行塗直過曾不留視也弟子厭觀之走及匠石曰自吾執斧斤以隨夫子未嘗見材如此之美也先生不肯視行不輟何邪疏門人驚櫟社之盛美乃任立以觀看自負笈以從師未見材其若此怪大匠之不顧走及遂以諮詢曰已矣勿言之矣疏已止也匠石知大木之不材非世俗之所用嫌弟子之辭費訶令止而勿言也散木也以爲舟則沉以爲棺槨則速腐疏櫟木體重爲船卽沉近土多敗爲棺槨速朽疎散之樹終於天年亦是不材之木故致閑散也以爲器則速毁疏人間器物貴在牢固櫟既疏脆早毁何疑也以爲門戸則液樠以爲樹則蠹疏樠脂汁出也蠹木內蟲也爲門戸則津液樠而脂出爲梁柱則蠹而不牢是不材之木也無所可用故能若是之壽注不在可用之數故曰散木疏閑散疏脆故是不材之木涉用無堪所以免於早夭匠石歸櫟社見夢曰汝將惡乎比予哉若將比予於文木耶注凡可用之木爲文木疏惡乎猶於何也若汝也予我也可用之木爲文木也匠石歸寢櫟社感夢問於匠石汝將何物比並我故爲當將我不材散木邪爲當比予於有用文章之木邪夫柤梨橘柚果蓏之屬疏夫在樹曰果柤梨之類在地曰蓏瓜瓠之徒汝豈比我於此之輩者耶實熟則剝則辱大枝折小枝泄此以其能苦其生者也故不終其天年而中道夭自掊擊於世俗者也物莫不若是注物皆以自用傷疏夫果蓏之類其味甚甜子實既熟卽遭剝落於是大枝損折小枝發泄此豈不爲滋味能美所以用苦其生毁辱之言卽斯之謂且春生秋落乃盡天年中塗打擊名爲橫夭而其識無情世俗人物皆以有用傷夭其生故此結言莫不如是掊打也且予求無所可用久矣幾死乃今得之注數有䁹睨己者唯今匠石明之耳爲予大用注積無用乃爲濟生之大用疏不材無用必獲全生櫟社求之其來久矣而庸拙之匠疑是文木頻來顧盻欲見誅鄰懼夭斧斤翦乎死地今逢匠伯鑒我不材方得全生爲予大用幾近也使予也而有用且得有此大也邪注若有用久見伐疏向使我是文木而有材用久遭翦截夭折斤斧豈有此長大而壽年乎且也若與予也皆物也奈何哉其相物也疏汝之與我皆造化之一物也物與物豈能相知奈何哉假問之辭而幾死之散人又惡知散木注以戲匠石疏匠石以不材爲散櫟社以材能爲無用故謂石爲散人也汝炫才能於世俗故鄰於夭枉我以疏散而無用故得全生汝是近死之散人安知我是散木耶託於夢中以戲匠石也匠石覺而診其夢疏診占也匠石既覺思量睡中占候其夢說向弟子也弟子曰趣取無用則爲社何邪注猶嫌其以爲社自榮不趣取於無用而已疏櫟木意趣取於無用爲用全其生者則何爲爲社以自榮乎門人未解故起斯問也曰密若無言彼亦直寄焉注社自來寄耳非此木求之爲社也疏若汝也彼謂社也汝但愼密莫輕出言彼社之神自來寄託非關此木櫟爲社也以爲不知己者詬厲也注言此木乃以社爲不知己而見辱病也豈榮之哉疏詬辱也用此社神爲不知我以無用爲用貴在全生乃橫來寄託深見詬病翻爲羞恥豈榮之哉不爲社者且幾有翦乎注本自以無用爲用則雖不爲社亦終不近於翦伐之害疏木以疏散不材故得全其生道假令不爲社樹豈近於翦伐之害乎且也彼其所保與眾異注彼以無保爲保而眾以有保爲保疏疏散之樹以無用保生文木之徒以才能夭折所以爲其異之者也而以義譽之不亦遠乎注利人長物禁民爲非社之義也夫無用者泊然不爲而羣才自用用者各得其敘而不與焉此無用之所以全也汝以社譽之無縁近也疏夫散木不材禀之造物賴其無用所以全生而社神寄託以成詬厲更以社義讚譽失彌遠南伯子綦遊乎商之丘見大木焉有異結駟千乘隱將芘其所籟注其枝所陰可以隱芘千乘疏伯長也其道甚尊堪爲物長故爲之伯卽南郭子綦也商丘地名在梁宋之域駟馬曰乘藾蔭也子綦於宋國之中經於商丘之地遇見大木異於尋常樹本麤長枝葉茂盛垂陰布影隱覆極多連結車乘可庇四千匹馬也子綦曰此何木也哉此必有異材疏子綦既覩此木不識其名疑有異能故致斯大夫仰而視其細枝則拳曲而不可以爲棟梁俯而視其大根則軸解而不可以爲棺槨疏軸解者如車軸之轉謂轉心木也周身爲棺棺完也周棺爲槨也夫梁棟須直卷曲所以不堪棺槨藉牢解散所以不固也咶其葉則口爛而爲傷嗅之則使人狂酲三日而不已疏以舌咶葉則唇口爛傷用鼻嗅之則醉悶不止醒病酒也子綦曰此果不材之木也以至於此其大也疏通體不材可謂全生之大才眾諸無用乃是濟物之妙用故能不夭斤斧而蔭庇千乘也嗟乎神人以此不材注天王不才於百官故百官御其事而明者爲之視聰者爲之聽知者爲之謀勇者爲之扞天何爲哉玄默而已而羣材不失其當則不材乃材之所至賴也故天下樂推而不厭乘萬物而無害也疏夫至人神矣陰陽所以不測混迹人間和光所以不耀故深根固蔕長生久視舟船庶物蔭覆黔黎譬彼櫟社方茲異木是以嗟歎神人用不材也者大材也宋有荆氏者宜楸柏桑疏荆氏地名也宋國有荆氏之地宜此楸柏桑之三木悉皆端直堪爲材用此略舉文木有材所以夭折對前散木無用所以全生也其拱把而上者求狙猴之杙者斬之疏兩手曰拱一手曰把狙猴獼猴也杙橜也亦扞也拱把之木其材非大適可斬爲扞橜以擊扞獼猴也三圍四圍求高名之麗者斬之疏麗屋棟也亦言小船也高名榮顯也三尺四尺之圍其木稍大求榮華高屋顯好名船者輙取之也七圍八圍貴人富商之家求禪傍者斬之疏禪傍棺材也亦言棺之全一邊而不卑合者謂之禪傍七八尺圍其木極大貴富之室商賈之家求大板爲棺材者當斬取之也故未終其天年而中道夭於斧斤此材之患也注有材者未能無惜也疏爲有用故不盡造化之年而中塗夭於工人之手斯皆以其材能爲之患害也故解之以牛之白顙者與豚之亢鼻者與人有痔病者不可以適河注巫祝解除棄此三者必妙選辭具然後敢用疏顙額也亢高也痔下漏病也巫祝陳芻狗以祠祭選牛豕以解除必須精簡純色擇其好者展如在之誠敬庶冥感於鬼神今乃有高鼻折頞之豚白頞不騂之犢痔漏穢病之人三者既不清潔故不可往於靈河而設祭奠者也古者將人沉河以祭河伯西門豹爲鄴令方斷之卽其類是也此皆巫祝以知之矣注巫祝於此亦知不材者全所以爲不祥也此乃神人之所以爲大祥也注夫全生者天下之所謂祥也巫祝以不材爲不祥而弗用也彼乃以不祥全生乃大祥也神人者無心而順物者也故天下之所謂大祥神人不逆疏女曰巫男曰覡祝者執板讀祭文者也祥善也巫師祝史解除之時知此三者不堪享祭故棄而不用以爲不善之物也然神聖之人知侔造化知不材無用故得全生是知白顙亢鼻之言痔病不祥之說適是小巫之鄙情豈曰大人之通智故才不全者神人所以爲吉祥大善之事也支離疏者頤隱於齊肩高於頂疏四肢離析百體寬疏遂使頰頤隱在臍間肩膊高於頂上形容如此故以支離爲名也會撮指天五管在上兩髀爲脅疏會撮高豎貌五臟腧也五臟之腧並在人背古人頭髻皆近頂後今支離殘病傴僂低頭遂使臟腧頭髻悉皆向上兩腳髀股攣縮而迫於脅肋也挫鍼治繲足以餬口疏挫鍼縫衣也治繲洗浣也餬飼也庸役身力以飼養其口命鼓莢播精足以食十人疏莢小箕也精米也言其掃市場鼓箕莢播揚土簡精粗也又解鼓莢謂布蓍敷卦兆也播精謂精判吉凶辯精靈也或掃市以供家口或賣卜以活身命所得之物可以養十人也上徵武士則支離攘臂於其閒注恃其無用故不自竄匿疏邊蕃有事徵求勇夫殘病之人不堪征討自得無懼攘臂遨遊恃其無用故不竄匿上有大役則支離以有常疾不受功注不任作役故疏國家有重大徭役爲有痼疾故不受其功程者也上與病者粟則受三鍾與十束薪注役則不與賜則受之疏六石四斗曰鐘君上憂憐鰥寡矜恤貧病形殘既重受物還多故郭注云役則不預賜受之者也夫支離其形者猶足以養其身終其天年又況支離其德者乎注神人無用於物而物各得自用歸功名於羣材與物冥而無迹故免人間之害處常美之實此支離其德也疏夫支離其形猶忘形也支離其德猶忘德也支離殘病適是忘形既非聖人故未能忘德夫忘德者智周萬物而反智於愚明並三光而歸明於昧故能成功不居爲而不恃推功名於羣有與物冥而無迹斯忘德者也夫忘形者猶足以養身終年免乎人間之害何況忘德者耶其勝劣淺深故不可同年而語矣是知支離其德者其唯聖人乎孔子適楚楚狂接輿游其門曰鳳兮鳳兮何如德之衰也注當順時直前盡乎會通之宜耳世之衰盛蔑然不足覺故曰何如疏何如猶如何也之適也時孔子自魯之楚舍於賓館楚有賢人姓陸名通字接輿知孔子歷聘行歌譏刺鳳兮鳳兮故哀歎聖人比於來儀應瑞之鳥也有道卽見無道當隱如何懷此聖德往適衰亂之邦者耶來世不可待往世不可追也注趣當盡臨時之宜耳疏當來之世有懷道之君可應聘者時命如馳故不可待過往之時堯舜之主變化已久亦不可尋趣合當時之宜無勞瞻前顧後也天下有道聖人成焉天下無道聖人生焉注付之自爾而理自生成生成非我也豈爲治亂易節哉治自求成故遺成而不敗亂自求生故忘生而不死疏有道之君休明之世聖人弘道主教成就天下時逢暗主命屬荒年適可全生遠害韜光晦迹方今之時僅免刑焉注不瞻前顧後而盡當今之會冥然與時世爲一而後妙當可全刑名可免疏方猶當今喪亂之時正屬衰周之世危行言遜僅可免於刑戮方欲執迹應聘不亦妄乎此接輿之詞譏誚孔子也福輕乎羽莫之知載注足能行而放之手能執而任之聽耳之所聞視目之所見知止其所不知能止其所不能用其自用爲其自爲恣其性內而無纖芥於分外此無爲之至易也無爲而性命不全者未之有也性命全而非福者理未聞也故夫福者卽向之所謂全耳非假物也豈有寄鴻毛之重哉率性而動動不過分天下之至易也舉其自舉載其自載天下之至輕也然知以無崖傷性心以欲惡蕩眞故乃釋此無爲之至易行彼有爲之至難棄夫自舉之至輕而取夫載彼之至重此世之常患也禍重乎地莫之知避注舉其性內則雖負萬鈞而不覺其重也外物寄之雖重不盈錙銖有不勝任者矣爲內福也故福至輕爲外禍也故禍至重禍至重而莫之知避此世之大迷也疏夫視聽知能各有涯分止於分內可以全生求其分外必遭夭折全生所以爲福夭折所以爲禍而分內之福輕於鴻毛貪競之徒不知載之在己分外之禍重於厚地執迷之徒不知避之去身此蓋流俗之常患者也故寄孔陸以彰其累已已乎已乎臨人以德殆乎殆乎畫地而趨注夫畫地而使人循之其迹不可掩矣有其已而臨物與物不冥矣故大人不明我以耀彼而任彼之自明不得我以臨人而付人之自得故能彌貫萬物而玄同彼我泯然與天下爲一而內外同福也疏已止也殆危也仲尼生衰周之末當澆季之時執持聖迹歷國應聘頻遭斥逐屢被詆訶故重言已乎不如止而勿行也若用五德臨於百姓捨己效物必致危亡猶如畫地作迹使人走逐徒費功勞無由得掩以己率物其義亦然也迷陽迷陽無傷吾行注迷陽猶亡陽也亡陽任獨不蕩於外則吾行全矣天下皆全其吾則凡稱吾者莫不皆全也疏迷亡也陽明也動也陸通勸其尼父令其晦迹韜光宜放獨化之無爲忘遣應物之明智既而止於分內無傷吾全生之行也吾行郤曲無傷吾足注曲成其行各自足矣疏郤空也曲從順也虛空其心隨順物性則凡稱吾者各自足也山木自寇也膏火自煎也疏寇伐也山中之木杞梓之徒爲有材用橫遭寇伐膏能明照以充燈炬爲其有用故被煎燒豈獨膏木在人亦爾桂可食故伐之漆可用故割之疏桂心辛香故遭斫伐漆供器用所以割之俱爲才能夭於斤斧人皆知有用之用而莫知無用之用也注有用則與彼爲功無用則自全其生夫割肌膚以爲天下者天下之所知也使百姓不失其自全而彼我俱適者悗然不覺妙之在身也疏楸柏橘柚膏火桂漆斯有用也曲轅之樹商丘之木白顙之牛亢鼻之豕斯無用也而世人皆炫己才能爲有用之用而不知支離其德爲無用之用也故郭注云有用則與彼爲功無用則自全乎其生也
