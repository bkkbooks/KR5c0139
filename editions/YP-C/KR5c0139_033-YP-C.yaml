front:
  text: 漁父第三十一孔子遊乎緇帷之林休坐乎杏壇之上弟子讀書孔子弦歌鼓琴奏曲未半
  hash: sha256:af0a2cb0bb68c7ec8570cdda06c9d45cb79e5dc05d6a088c7538824076c959c6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0139_YP-C_09niuji-08-0058a, image: JY132/09niuji-08-0058a.png}
body:
  text: 疏緇黑也尼父游行天下讀講詩書時於江濱休息林籟其林鬱茂蔽日陰沈布葉垂條又如帷幕故謂之緇帷之林也壇澤中之高處也其處多杏謂之杏壇也琴者和也可以和心養性故奏之有漁父者下船而來鬢眉交白被髮揄袂行原以上距陸而止左手據膝右手持頤以聽曲終疏漁父越相范蠡也輔佐越王勾踐平吳事訖乃乘扁舟遊三江五湖變易姓名號曰漁父卽於原所逢者也既而汎海至齊號曰鴟夷子至魯號曰白珪先生至陶號曰朱公晦迹韜光隨時變化仍遺大夫種書云揄揮也袂袖也原高平也距至也鬢眉交白壽者之容散髮無冠野人之貌於是遙望平原以手揮袂至子高陸維舟而止拓頤抱膝以聽琴歌也而招子貢子路二人俱對客指孔子曰彼何爲者也疏詢問仲尼是何爵命之人子路對曰魯之君子也疏答云是魯國賢人君子也客問其族子路對曰族孔氏疏問其族答云姓孔客曰孔氏者何治也疏又問孔氏以何法術修理其身子路未應子貢對曰孔氏者性服忠信身行仁義飾禮樂選人倫上以忠於世主下以化於齊民將以利天下此孔氏之所治也疏率性謙和服行聖迹修飾禮樂簡選人倫忠誠事君化物齊等將欲利群品此孔氏之心乎又問曰有土之君與子貢曰非也侯王之佐與子貢曰非也疏爲是有茅土五等之君爲是王侯輔佐卿相乎皆答云非也客乃笑而還行言曰仁則仁矣恐不免其身苦心勞形以危其眞嗚呼遠哉其分於道也疏夫勞苦心形危忘眞性偏行仁愛者去本迢遰而分離於玄道也是以嗤笑徘徊嗚呼歎之也子貢還報孔子孔子推琴而起曰其聖人與乃下求之至於澤畔方將杖拏而引其船顧見孔子還鄉而立孔子反走再拜而進疏拏撓也反走前進是虔敬之容也客曰子將何求孔子曰曩者先生有緒言而去丘不肖未知所謂竊待於下風幸聞咳唾之音以卒相丘也疏曩向也緒言餘論也卒終也相助也向者先生有清言餘論丘不敏未識所由之故竊聽下風庶承謦欬卒用此言助丘不逮客曰嘻甚矣子之好學也孔子再拜而起曰丘少而脩學以至於今六十九歲矣無所得聞至教敢不虛心疏嘻笑聲也丘少年已來脩學仁義逮乎耆艾未聞至道所以恭謹虔恪虛心矣客曰同類相從同聲相應固天之理也吾諸釋吾之所有而經子之所以疏夫虎嘯風馳龍興雲布自然之理也固其然乎是以漁父大賢宣尼至聖賢聖相感斯同聲相應也故釋吾之所有方外之道經營子之所以方內之業子之所以者人事也天子諸侯大夫庶人此四者自正治之美也四者離位而亂莫大焉官治其職人憂其事乃無所陵疏陵亦亂也夫人倫之事抑乃多端切要而言無過此四者若四者守位乃教治盛美若上下相冒則亂莫大焉是以百官各司其職庶人自憂其務不相陵亂斯不易之道者也故田荒室露衣食不足徵賦不屬妻妾不和長少無序庶人之憂也疏田畝荒蕪屋室漏露追徵賦稅不相係屬妻妾既失尊卑長幼曾無次序庶人之憂患也能不勝任官事不治行不清白羣下荒怠功美不有爵祿不持大夫之憂也疏職任不勝物務不理百姓荒亂四民不勤大夫之憂也廷無忠臣國家昏亂工技不巧貢職不美春秋後倫不順天子諸侯之憂也疏陪臣不忠苞茅不貢春秋盟會落朋倫之後五等之憂也陰陽不和寒暑不時以傷庶物諸侯暴亂擅相攘伐以殘民人禮樂不節財用窮匱人倫不飭百姓淫亂天子有司之憂也疏攘除也陰陽不調日時愆度兵戈荐起萬物夭傷三公九卿之憂也今子既上無君侯有司之勢而下無大臣職事之官而擅飾禮樂選人倫以化齊民不泰多事乎疏上非天子諸侯下非宰輔卿相而擅修飾禮樂選擇人倫教化蒼生正齊群物乃是多事之人且人有八疵事有四患不可不察也非其事而事之謂之總疏謂之原本闕莫之顧而進之謂之佞疏彊進忠言人不采顧謂之佞也希意導言謂之謟疏希望前人意氣而導達其言斯謟也不擇是非而言謂之諛疏苟且順物不簡是非謂之諛也好言人之惡謂之讒疏聞人之過好揚敗之析交離親謂之賊疏人有親情交故輒欲離而析之斯賊害也稱譽詐僞以敗惡人謂之慝疏與己親者雖惡而舉與己疏者雖善而毁以斯詐偽好敗傷人可謂姦慝之人也不擇善否兩容顔適偷拔其所欲謂之險疏否惡也善惡二邊兩皆容納和顔悅色偷拔其意之所欲隨而佞之斯險詖之人也此八疵者外以亂人內以傷身君子不友明君不臣疏外則惑亂於百姓內則傷敗於一身是以君子不與爲友朋明君不將爲臣佐也所謂四患者好經大事變更易常以挂功名謂之叨疏伺候安危經營大事變改之際建立功名謂叨濫之人也專知擅事侵人自用謂之貪疏事己獨擅自用陵人謂之貪也見過不更聞諫愈甚謂之狠疏有過不改聞諫彌增狠戾之人人同於己則可不同於己雖善不善謂之矜疏物同乎己雖惡而善物異乎己雖善而惡謂之矜夸之人此四患也能去八疵無行四患而始可教已孔子愀然而歎再拜而起曰丘再逐於魯削迹於衛伐樹於宋圍於陳蔡丘不知所失而離此四謗者何也疏愀然慙竦貌也罹遭也丘無罪失而遭罹四謗未悟前旨故發此疑客悽然變容曰甚矣子之難悟也人有畏影惡迹而去之走者舉足愈數而迹愈多走愈疾而影不離身自以爲尚遲疾走不休絶力而死不知處陰以休影處靜以息迹愚亦甚矣子審仁義之間察同異之際觀動靜之變適受與之度理好惡之情和喜怒之節而幾於不免矣疏留停仁義之間以招門徒伺察同異之際以候機宜觀動靜之變晞其僥倖適受與之度望著功名理好惡之情而是非堅執和喜怒之節用爲達道以己誨人矜矯天性近於不免也謹修而身愼守其眞還以物與人則無所累矣疏謹愼形體修守眞性所有功名還歸人物則物我俱全故無患累也今不修之身而求之人不亦外乎註不能修其身而求之他人者豈非疏外乎孔子愀然疏自竦也曰請問何謂眞客曰眞者精誠之至也不精不誠不能動人疏夫眞者不偽精者不雜誠者不矯也故矯情偽性者不能動於人也故彊哭者雖悲不哀彊怒者雖嚴不威彊親者雖笑不和眞悲無聲而哀眞怒未發而威眞親未笑而和眞在內者神動於外是所以貴眞也其用於人理也事親則慈孝事君則忠貞飲酒則歡樂處喪則悲哀疏夫道無不在所在皆通故施於人倫有此四事之義以列下文忠貞以功爲主飲酒以樂爲主處喪以哀爲主事親以適爲主功成之美無一其迹矣疏貞者事之幹也故以功績爲主飲酒陶蕩性情故以樂爲主是以功在其美故不可一其事迹也事親以適不論所以矣飲酒以樂不選其具矣處喪以哀無問其禮矣疏此覆釋前四義者也禮者世俗之所爲也眞者所以受於天也自然不可易也疏節文之禮世俗爲之眞實之性禀乎大素自然而然故不可改易也故聖人法天貴眞不拘於俗疏法效自然寶貴眞道故不拘束於俗禮也愚者反此不能法天而恤於人不知貴眞祿祿而受變於俗故不足疏恤憂也祿祿貴貌也愚迷之人反於聖行不能法自然而造適貴道德而逍遥翻復溺人事而憂慮滯囂塵而遷貿徇物無厭故心恒不足也惜哉子之早湛於人僞而晚聞大道也疏惜孔子之雄才久迷情於聖迹耽人間之浮偽不早聞於玄道孔子又再拜而起曰今者丘得遇也若天幸然先生不羞而比之服役而身教之敢問舍所在請因受業而卒學大道疏尼父喜歡自嗟慶幸得逢漁父欣若登天必其不耻訓誨尋當服勤驅役庶爲門人身禀教授問舍所在終學大道客曰吾聞之可與往者與之至於妙道不可與往者不知其道愼勿與之身乃無咎疏從迷適悟爲往也妙道眞本也知分别也若逢上智之士可與言於妙本若遇下根之人不可語其玄極觀機吐照方乃無疵子勉之吾去子矣吾去子矣乃刺船而去延緣葦間疏戒約孔子令其勉勵延緣上蘆葦之間重言去子殷勤訓勗也顔淵還車子路授綏孔子不顧待水波定不聞拏音而後敢乘疏仲尼既見異人告以至道故仰之彌甚喜懼交懷門人授綏猶不顧盻船遠波定不聞橈響方敢乘車子路旁車而問曰由得爲役久矣未嘗見夫子遇人如此其威也萬乘之主千乘之君見夫子未嘗不分庭伉禮夫子猶有倨傲之容今漁父杖拏逆立而夫子曲腰磬折言拜而應得無太甚乎門人皆怪夫子矣漁父何以得此乎疏天子萬乘諸侯千乘伉對也分處庭中相對設禮位望相似無階降也仲尼遇天子諸侯尚懷倨傲一逢漁父盡禮曲腰并受言詞必拜而應漁父威嚴遂至於此孔丘重方外之道子路是方內之人故致驚疑旁車而問也孔子伏軾而歎曰甚矣由之難化也湛於禮義有間矣而樸鄙之心至今未去疏湛著禮義時間固久嗟其鄙拙故凭軾歎之也進吾語汝夫遇長不敬失禮也見賢不尊不仁也彼非至人不能下人下人不精不得其眞故長傷身惜哉不仁之於人也禍莫大焉而由獨擅之疏召由令前示其進趨夫遇長老不敬則失於禮儀見可貴不尊則心無仁愛若非至德之人則不能使人謙下謙下或不精誠則不造於玄極不仁不愛乃禍敗之基惜哉仲由專擅於此也且道者萬物之所由也庶物失之者死得之者生爲事逆之則敗順之則成故道之所在聖人尊之今漁父之於道可謂有矣吾敢不敬乎註此篇言無江海而間者能下江海之士也夫孔子之所放任豈直漁父而已哉將周流六虛旁通無外蝡動之類咸得盡其所懷而窮理致命固所以爲至人之道也疏由從也庶眾也夫道生萬物則謂之道故知眾庶從道而生是以順而得者則生而成逆而失者則死而敗物無貴賤道在則尊漁父既其懷道孔子何能不敬邪
