body:
  text: 列御寇之齊中道而反遇伯昏瞀人疏伯昏楚之賢士號曰伯昏瞀人隱者之徒也禦寇旣師壺子又事伯昏方欲適齊行於化道自驚行淺中路而還適逢瞀人問其所以伯昏瞀人曰奚方而反疏方道也奚何也汝行何道欲往何方問其所由中塗反意也曰吾驚焉疏自覺已非驚懼而反此略答前問意曰惡乎驚疏重聞禦寇於何事迹而起驚心曰吾嘗食於十漿註賣漿之家而五漿先饋註言其敬已疏饋遺也十漿謂有十家賣漿飲也列子因行渴於逆旅十家賣飲而五家先遺覩其容觀競起驚心未能冥混是以驚懼也伯昏瞀人曰若是則汝何爲驚巳疏更問驚由庶陳已失曰夫內誠不解註外自矜飾疏自覺內心實智未能懸解爲物所敬是以驚而歸形諜成光註舉動便辟而成光儀也以外鎭人心註其內實不足以服物疏諜便僻貌也鎭服也儀容便僻動成光華用此外形鎭服人物使人輕乎貴老註若鎭物由乎內實則使人貴老之情篤也而𩐎其所患註言以美形動物則所患亂生也疏𩐎亂也未能混俗同塵而爲物標杓使人敬貴於已而輕老人良恐禍患方亂生矣夫漿人特爲食羹之貨多餘之贏其爲利也薄其爲權也輕而猶若是註權輕利薄可無求於人而况於萬乘之主乎疏特獨也贏利也夫賣漿之人獨有羹食爲貨所盈之物蓋亦不多爲利旣薄權亦非重尙能敬已競走獻漿况在君王權高利厚奔馳尊貴不亦宜乎身勞於國而知盡於事彼將任我以事而效我以功吾是以驚疏夫君人者位總萬機威跨四海故躬疲倦於邦國心盡慮於世事則思賢若渴以代已勞必將任我以物務而驗我以功績徇外喪內逐偽忘眞驚之所由具陳如是也伯昏瞀人曰善哉觀乎疏汝能觀察已身審知得喪嘉其自覺故歎善哉汝處已人將保汝矣註苟不遺形則所在見保保者聚守之謂也疏保守也汝安處已身不能忘我猶顯形德爲物所歸門人請益聚守之矣无幾何而往則戸外之屨滿矣疏無幾何謂無多時也俄頃之間伯昏往禦寇之所適見脫屨戸外跣足升堂請益者多矣伯昏瞀人北面而立敦杖蹙之乎頤立其間不言而出疏敦䜿也以杖柱頤聽其言說倚立間久忘言而歸也賓者以告列子列子提屨跣而走暨乎門曰先生旣來曾不發藥乎疏賓者謂通賓客人也御寇聞師友立不言而歸於是竦息慙惕不暇納屨跣足馳走至門而反高人旣來庶蒙鍼艾不嘗開發藥石遺棄而還誠心欽渴有此固請也曰已矣吾固告汝曰人將保汝果保汝矣疏已止也我已於先固告汝汝不能韜光晦迹必爲物所歸依今果見汝門人滿室吾昔語汝諒非虛言宜止所請無勞辭費非汝能使人保汝而汝不能使人無保汝也註任平而化則無感無求無感無求乃不相保疏顯迹於外故爲人保之未能忘德故不能無守也而焉用之感豫出異也註先物施惠惠不因彼豫出則異也疏而汝也焉何也夫物我兩忘亦何須物來感已必有機來感而後應不勞預出異端先物施惠必且有感搖而本性又無謂也註必將有感則與本性動也疏搖動也必固有感迫而後起率其本性搖而應之滅迹匿端有何稱謂也與汝遊者又莫汝告也彼所小言盡人毒也註細巧入人爲小言疏共汝同游行解相類唯事浮辯細巧之言佞媚於人盡爲鳩毒詎能用道以告汝也莫覺莫悟何相孰也疏孰誰也彼此迷塗無能覺悟何誰獨曉以相告乎巧者勞而知者憂無能者無所求飽食而遨遊汎若不繫之舟虛而遨遊者也註夫無其能者唯聖人耳過此以下至於昆蟲未有自忘其能而任眾人者也疏夫物未嘗爲無用憂勞而必以智巧困弊唯聖人汎然無係泊爾忘心譬彼虛舟任運逍遙鄭人緩也呻吟裘氏之地註呻吟吟詠之謂祇三年而緩爲儒註祇適也疏呻吟詠讀也裘氏地名也祗適也鄭人名緩於裘地學問適經三年而成儒道河潤九里澤及三族使其弟墨註三族謂父母妻族也能使弟成於墨教也儒墨相與辯其父助翟註翟緩弟名疏翟緩弟名也儒則憲章文武祖述堯舜甚固吝好多言墨乃遵於禹道勤儉好施儒墨塗別志尙不同各執是非互相爭辯父黨小兒遂助於翟矣十年而緩自殺其父夢之曰使而子爲墨者子也闔胡嘗視其良旣爲秋栢之實矣註緩怨其父之助弟故感激自殺死而見夢謂已旣能自化爲儒又化弟令墨弟由已化而不能順已已以良師而便怨精誠之至故爲秋栢之實疏闔何也秋栢勁木也父旣助翟而緩恨之經由十年感激自殺仍見夢於父以申怨言云使汝子爲墨者我之功力也何不看視我爲賢良之師而更朋助弟我怨恨之甚化爲異物秋栢子實生於墓上亦有作垠字者垠冢也云汝何不看我冡上已化爲秋栢之木而生實也夫造物者之報人也不報其人而報其人之天註自此已下莊子辭也夫積習之功爲報報其性不報其爲也然則學習之功成性而已豈爲之哉疏造物者自然之洪鑪也而造物者無物也能造化萬物故謂之造物也夫物之智能禀乎造化非由從師而學成也故假於學習輔道自然報其天性不報人功也是知翟有墨性不從緩得緩言我教不亦繆乎彼故使彼註彼有彼性故使習彼疏彼翟先者有墨性故成墨若率性素無學終不成也豈唯墨翟庶物皆然夫人以已爲有以異於人以賤其親註言緩自美其儒謂已能有積學之功不知其性之自然也夫有功以賤物者不避其親也無其身以平往者貴賤不失其倫也疏言緩自恃於已有學植之功異於常人故輕賤其親而汝於父也人之迷滯而至於斯乎齊人之井飲者相捽也故曰今之世皆緩也註夫穿井所以通泉吟詠所以通性無泉則無所穿無性則無所詠而世皆忘其泉性之自然徒識穿詠之末功因欲矜而有之不亦妄乎疏夫土下有泉人各有性天也穿之成井學以成術者人也嗟乎世人迷妄之甚徒知穿學之末事不悟泉性之自然而矜之以爲已功者故世皆緩之流也齊人穿鑿得井行李汲而飲之井主護水捽頭而休莊生聞之故引爲諭自是有德者以不知也而况有道者乎註觀緩之謬以爲學父故能任其自爾而知故無爲其間也疏觀緩之迷以爲已誠有德之人從是之後忘知任物不復自矜况體道之人豈視其功邪古者謂之遁天之刑註仍自然之能以爲已功者逃天者也故刑戮及之疏不知物性自爾矜爲已功者逃遁天然之理也旣乖造化故刑戮及之聖人安其所安不安其所不安註夫聖人無安無不安順百姓之心也疏安任也任羣生之性不引物從已性之無者不强安之故所以爲聖人也眾人安其所不安不安其所安註所安相與異故所以爲眾人也疏學已所不能安其所不安也不安其素分不安其所安也莊子曰知道易勿言難疏玄道窈冥言像斯絶運知則易忘言實難知而不言所以之天也知而言之所以之人也疏妙悟玄道無法可言故詣於自然之境雖知至極而猶存言辯斯未離於人倫矣古之人天而不人註知而落天地未嘗開言以引物應其至分而已疏復古眞人知道之士天然淳素無復人情朱泙漫學屠龍於支離益單千金之家三年技成而無所用其巧註事在於適無貴於遠功疏姓朱名泙漫姓支離名益殫盡也罄千金之産學殺龍之術伏膺三歲其道方成伎雖巧妙卒爲無用屠龍之事於世稍稀欲明處涉人間貴在適中苟不當機雖大無益也聖人以必不必故無兵註理雖必然猶不必之斯至順矣兵其安有疏達道之士隨逐物情理雖必然猶不固執故無交爭也眾人以不必必之故多兵註理雖未必抑而必之各必其所見則乖逆生也疏庸庶之類妄爲封執理不必爾而固必之旣忤物情則多乖矣順於兵故行有求註物各順性則足足則無求疏心有貪求故任於執固之情也兵恃之則亡註不得已而用之以恬淡爲上者未之亡也疏不能大順羣命而好乖逆物情者則幾亡吾寶矣小夫之知不離苞苴竿牘註苞苴以遺竿牘以問遺問之具小知所殉疏小夫猶匹夫也苞苴香草也竿牘竹簡也夫搴芳草以相贈折簡牘以相問者斯蓋俗中細務固非丈夫之所忍爲敝精神乎蹇淺註昏于小務所得者淺疏好爲遺問徇於小務可謂勞精神於跛蹇淺薄之事不能遊虛涉遠矣而欲兼濟導物太一形虛若是者迷惑于宇宙形累不知太初註小夫之知而欲兼濟導物經虛涉遠志大神敝形爲之累迷惑而失致也疏以蹇淺之知而欲兼濟羣物導達羣生望得虛空其形合太一之玄道者終不可也此人迷於古今形累於六合何能照知太初之妙理邪彼至人者歸精神乎無始而甘瞑乎無何有之鄉疏無始妙本也無何有之鄉道境也至德之人動而常寂雖復兼濟道物而神凝無始故能和光混俗而恒寢道鄉也水流乎無形發泄乎大清註泊然無爲而任其天行也疏無以順物如水流行隨時適變不守形迹迹不離本故雖應動恒發泄於太清之極也悲哉乎汝爲知在毫毛註爲知所得者細而不知大寧註任性大寧而至疏苞苴竿牘何異毫毛如斯運智深可悲歎精神淺薄詎知乎至寂之道邪宋人有曹商者爲宋王使秦其往也得車數乘王悅之益車百乘疏姓曹名商宋人也爲宋偃王使秦應對得所秦王愛之遂賜車百乘乘駟馬也反於宋見莊子曰夫處窮閭阨巷困窘織屨槁項黃馘者商之所短也一悟萬乘之主而從車百乘者商之所長也疏窘急也言貧窮困急織屨以自供頸項枯槁而顦顇頭面黃瘦而馘厲當爾之際是商之所短也一使强秦遂使秦王驚悟遺車百乘者是商之智數長也以此自多矜夸莊子也莊子曰秦王有病召醫破癰潰痤者得車一乘舐痔者得車五乘所治愈下得車愈多子豈治其痔邪何得車之多也子行矣註夫事下然後功高功高然後祿重故高遠恬淡者遺榮也疏癰痒熱毒腫也痔下漏病也莊生風神俊悟志尙清遠旣而縱此奇辯以挫曹商故郭注云夫事下然後功高功高然後祿重高遠恬淡者遺榮也魯哀公問乎顔闔曰吾以仲尼爲貞幹國其有瘳乎疏言仲尼有忠貞幹濟之德欲命爲卿相魯邦亂病庶瘳差矣曰殆哉圾乎仲尼註圾危也夫至人以民靜爲安今一爲貞幹則遺高迹於萬世令飾競於仁義而畫其毛彩百姓旣危至人亦無以爲安也疏殆近也圾危也以貞幹迹率物物旣失性仲尼何以安也方且飾羽而畫註凡言方且皆謂後世將然飾畫非任眞也疏方將貞幹輔相魯廷萬代奔逐修飾羽儀喪其眞性也從事華辭以支爲旨註將令後世之從事者無實而意趣橫出也疏聖迹旣彰令從政任事情偽辭華析派分流爲意旨也忍性以視民而不知不信註後世人君將慕仲尼之遐軌而遂忍性自矯僞以臨民上下相習遂不自知也疏後代人君慕仲尼遐軌安忍情性用之臨人上下相習矯僞黔黎而不知已無信實也以華僞之迹教示蒼生禀承心靈宰割眞性用此居人之上何足稱哉受乎心宰乎神夫何足以上民註今以上民則後世百姓非直外形從之而已乃以心神受而用之不能復自得於心中也疏彼代百姓非直外形從之乃以心神受用之不能復自得之性以此居民上何足可安哉彼宜汝與註彼百姓也汝哀公也彼與汝各自有所宜相效則失眞此卽今之見驗疏彼百姓也汝哀公也百姓與汝各有所宜若將汝所宜與百姓不可也予頤與註效彼非所以養已也疏予我也頤養也我與百姓怡養不同譬如魚鳥升沈各異若以汝所養衞物物我俱失也誤而可矣註正不可也疏以貞幹之迹錯誤行之正不可也今使民離實學僞非所以視民也爲後世慮不若休之註問不謂當時也疏離實性學僞法不可教示黎民慮後世荒亂不如休止也難治也註治之則僞故聖人不治也疏捨已效物聖人不治也施於人而不忘非天布也註布而識之非芻狗萬物也疏二儀布生萬物豈貴恩也商賈不齒註况士君子乎疏夫能施求報商客尙不齒理况君子士人乎雖以事齒之神者不齒註要能施惠故於事不得不齒以其不忘故心神忽之此百姓之大情也疏施而不忘未合天道能施恩惠於物事不得不齒爲責求報心神輕忽不錄百姓之情也事之者性情也爲外刑者金與木也註金謂刀鋸斧鉞木謂棰楚桎梏爲內刑者動與過也註靜而當則外內無刑宵人之離外刑者金木訊之疏宵闇夜也離羅也訊問也闇惑之人罹於憲網身遭枷杻斧鉞之刑也離內刑者陰陽食之註動而過分則性氣傷於內金木訊於外也疏若不止分則內結寒暑陰陽殘食之也夫免乎外內之刑者唯眞人能之註自非眞人未有能止其分者故必外內受刑但不問大小耳疏心若死灰內不滑靈府形同槁木外不挂桎梏唯眞人哉孔子曰凡人心險於山川難於知天天猶有春秋冬夏旦暮之期人者厚貌深情疏人心難知甚於山川過於蒼昊厚深之狀列在下文故有貌願而益有畏若不肖疏願慤眞也不肖不似也人有形如慤眞而心益虛浮也有心實長者形如不肖也有順懷而遠疏懷急也形順躁急而心達理也有堅而縵有緩而釬註言人情貌之反有如此者疏縵緩也釬急也自有形如堅固而實散縵亦有外形寬緩心內躁急也故其就義若渴者其去義若熱註但爲難知耳未爲殊無迹疏人有就仁義如渴思水捨仁義若熱逃火雖復難知未爲無迹徵驗具列下文也故君子遠使之而觀其忠近使之而觀其敬疏遠使忠佞斯彰咫步敬慢立明者也煩使之而觀其能疏煩極任使察其才能卒然問焉而觀其知疏卒問近對觀其願智急與之期而觀其信疏忽卒與期觀信契也委之以財而觀其仁疏仁者不貪告之以危而觀其節疏告危亡驗節操醉之以酒而觀其則雜之以處而觀其色疏至人酒不能昏法則男女參居貞操不易九徵至不肖人得矣疏君子易觀不肖難明然視其所以觀其所由察其所安搜之有塗亦可知也疏九事徵驗小人君子厚貌深情必無所避正考父一命而傴再命而僂三命而俯循墻而走孰敢不軌註言人不敢以不軌之事侮之疏考成也父大也有考成大德而履正道故號正考父則孔子十代祖宋大夫也士一命大夫二命卿三命也傴曲循墻並敬容極恭卑退若此誰敢將不軌之事而侮之也如而夫者一命而呂鉅再命而於車上儛三命而名諸父孰協唐許註而夫謂凡夫也唐謂堯也許謂許由也言而夫與考父者誰同於唐許之事也疏而夫鄙夫也諸父伯叔也凡夫篤競軒冕一命則呂鉅夸華再命則援綏作舞三命善識自高下呼伯叔之名然考夫謙夸各異格量勝劣誰同唐堯許由無爲禪讓之風哉賊莫大乎德有心註有心於爲德非眞德也夫眞德者忽然自得而不知所以德也疏役智勞慮有心爲德此賊害之甚也而心有眼註率心爲德猶之可耳役心於眉睫之間則僞已甚矣及其有眼也而內視內視而敗矣註乃欲探射幽隱以深爲事則心與事俱敗矣疏率心爲役用心神於眼睫緣慮逐境不知休止致危敗甚矣凶德有五中德爲首疏謂心耳眼舌鼻也曰此五根禍因此德謂凶德也五根禍主中德爲無心也何謂中德中德也者有以自好也而吡其所不爲者也註吡訾也夫自是而非彼則攻之者非一故爲凶首也若中無自好之情則恣萬物之所是所是各不自失則天下皆思奉之矣疏吡訾也用心中所好者自以爲是不同已爲者訾而非之以心中自是爲得故曰中德窮有八極達有三必形有六府疏八極三必窮達猶人身有六府也列下文矣美髯長大壯麗勇敢八者俱過人也因以是窮註窮於受役也然天下未曾窮於所短而恒以所長自困疏美恣媚也髯髭鬢也長高也大粗大也壯多力麗妍華勇猛敢果决也藴此八事超過常人受役旣多因以窮困也緣循偃佒困畏不若人三者俱通達註緣循杖物而行者也偃佒不能俯執者也困畏怯弱者也此三者旣不以事見任乃將接佐之故必達也疏循順也緣物順他不能自立也偃佒仰首不能俛執也困畏困苦怯懼也有此三事不如恒人所在通達也知慧外通註通外則以無崖傷其內也疏自持智慧照物外通塵境也勇動多怨註怯而靜乃厚其身耳疏雄健躁擾必招讐隙仁義多責註天下皆望其愛然愛之則有不周矣故多責疏仁義則不周必有多責也達生之情者傀註傀然大恬解之貌也達於知者肖註肖釋散也疏注云消釋散也傀恬解也達悟之崖眞性虛照傀然縣解無係戀也達大命者隨註泯然與化俱也疏大命大年假如彭祖夀考隨而順之亦不厭其長久以爲勞苦也達小命者遭註每在節上住乃悟也疏小命小年也遭遇也如殤子促齡所遇斯適曾不介懷耳人有見宋王者錫車十乘以其十乘驕穉莊子疏錫與也穉後也宋襄王時有庸𤨏之人游宋妄說宋王錫車十乘用此驕炫排莊周於已後自矜物先也莊子曰河上有家貧恃緯蕭而食者其子没於淵得千金之珠其父謂其子曰取石來鍛之夫千金之珠必在九重之淵而驪龍頷下子能得珠者必遭其睡也使驪龍而寤子尙奚微之有哉疏葦蘆也蕭蒿也家貧織蘆蒿爲薄賣以供食鍛椎也驪黑龍也頷下有千金之珠也譬譏得車之人也今宋國之深非直九重之淵也宋王之猛非直驪龍也子能得車者必遭其睡也使宋王而寤子爲𩐎粉矣註夫取富貴必順乎民望也若挾奇說乘天衢以嬰人主之心者明君之所不受也故如有所譽必有所試於斯民不違僉曰舉之以合萬夫之望者此三代所以直道而行之也疏懷忠貞以感人主者必有非常之賞而用左道使其說佞媚君王僥倖於富貴者故有驕穉之容亦何異遭驪龍睡得珠邪餘詳注意或聘於莊子疏寓言不明聘人姓氏族故言或也莊子應其使曰子見夫犧牛乎疏犧養也君王預前三日養牛祭宗廟曰犧也衣以文繡食以芻菽及其牽而入於太廟雖欲爲孤犢其可得乎註樂生者畏犧而辭聘髑髏聞生而矉𥉷此死生之情異而各自當也疏芻草也菽豆也犧養豐贍臨祭日求爲孤犢不可得也况祿食之人例多夭折嘉遁之士方足全生莊子清高笑彼名利莊子將死弟子欲厚葬之莊子曰吾以天地爲棺槨以日月爲連璧星辰爲珠璣萬物爲齎送吾葬具豈不備邪何以加此疏莊子妙達玄道逆旅形骸故棺槨天地鑪冶兩儀珠璣星辰變化三景資送備矣門人厚葬深乖造物也弟子曰吾恐烏鳶之食夫子也莊子曰在上烏鳶食在下爲螻蟻食奪彼與此何其偏也疏鳶鶿也門人荷師主深恩也將欲厚葬避其烏鳶豈知厚葬還遭螻蟻情好所奪偏私之也以不平平其平也不平註以一家之平平萬物未若任萬物之自平也疏無情與奪委任均平此眞平也若運情慮均平萬物若欲起心已不平矣以不徵徵其徵也不徵註徵應也不因萬物之自應而欲以其所見應之則必有不合矣疏聖人無心有感則應此眞應也若有心應物不能應也徵應也明者唯爲之使註夫執其所見受使多矣安能使物哉疏自炫其明情應於務爲物驅使何能役人也神者徵之註唯任神然後能至順故無往不應也疏神者無心寂然不動能無不應也夫明之不勝神也久矣註明之所及不過於形骸也至順則無遠近幽深皆各自得疏明則有心應務爲物驅役神乃無心應感無方有心不及無心存應不及忘應格量可知也而愚者恃其所見入於人其功外也不亦悲乎註夫至順則用發於彼而以藏於物若恃其所見執其自是雖欲入人其功外矣疏夫忘懷應物者爲而不恃功成不居愚惑之徒自執其用叨人功績歸入已身雖欲矜伐其功外矣迷忘如此深可悲哉
