front:
  text: 重刋道藏輯要周莊周著河南郭象注唐西華法師成玄英疏
  hash: sha256:11811342da28f332c8c4e8cd8ae0bd1f6e7f4d270c3a8e19ef73ebf09e047edb
  markers:
  - {type: head, offset: 6, content: 南華眞經, id: KR5c0139_CK-KZ-jye_010-h1, level: 1}
body:
  text: 駢拇枝指出乎性哉而侈於德疏駢合也大也謂足大拇指與第二指相連合爲一指也枝指者謂手大拇指傍枝生一指成六指也出乎性者謂此駢枝二指並禀自然性命生分中有之侈多也德謂仁義禮智信五德也言曾史禀性有五德藴之五藏於性中非剩附贅縣疣出乎形哉而侈於性註夫長者不爲有餘短者不爲不足此則駢贅皆出於形性非假物也然駢與不駢其於各足而此獨駢枝則於眾以爲多故曰侈耳而惑者或云非性因欲割而棄之是道有所不存德有所不載而人有棄才物有棄用也豈是至治之意哉夫物有小大能有少多所大卽駢所多卽贅駢贅之分物皆有之若莫之任是都棄萬物之性也疏附生之贅肉縣係之小疣並禀形以後方有故出乎形哉而侈性者譬離曠禀性聰明列之藏府非關假學故無侈性也多方乎仁義而用之者列於五藏哉而非道德之正也註夫與物冥者無多也故多方於仁義者雖列於五藏然自一家之正耳未能與物無方而各正性命故曰非道德之正夫方之少多天下未之有限然少多之差各有定分豪芒之降卽不可以相跂故各守其方則少多無不自得而或者聞多之不足以正少因欲棄多而任少是舉天下而棄之不亦妄乎疏方道術也言曾史之德性多仁義羅列藏府而施用之此直一家之知未能大冥萬物夫能與物冥者故當非義而應夫仁義不多不少而應夫多少千變萬化與物無窮無所偏執故是道德之正言是故駢於足者連無用之肉也枝於手者樹無用之指也註直自性命不得不然非以有用故然也疏夫駢合之拇無益於行步故雖有此連終成無用之肉枝生於手指者既不益操捉故雖樹立此肉終是無用之指也欲明禀自然天性有之非關助用而生也多方駢枝於五藏之情者淫僻於仁義之行註五藏之情直自多方耳而少者橫復尙之以至淫僻而失至當於體中也疏夫曾史之徒性多仁義以此情性駢於藏府性少之類矯性慕之矜此僞行求於天理既非率性遂成淫僻淫者耽滯僻者不正之貌而多方於聰明之用也註聰明之用各有本分故多方不爲有餘少方不爲不足然情欲之所蕩未嘗不賤少而貴多也見夫可貴而矯以尙之則自多於本用而困其自然之性若乃忘其所貴而保其素分則與性無多而異方俱全矣疏言離曠素分多於聰明性少之徒矯情爲尙以此爲用不亦謬乎是故駢於明者亂五色淫文章青黃黼黻之煌煌非乎而離朱是已疏斧形謂之黼兩己相背謂之黻五色青黃赤白黑也靑與赤爲文赤與白爲章煌煌眩目貌也豈非離朱乎是然也已助聲也離朱一名離婁黃帝時明目人百里察毫毛也多於聰者亂五聲淫六律金石絲竹黃鍾大呂之聲非乎而師曠是已註夫有耳目者未嘗以慕聾盲自困也所困常在於希離慕曠則離曠雖性聰明乃是亂耳目之主也疏五聲謂宮商角徵羽也六律黃鍾大呂姑洗蕤賓無射夾鍾之徒是也六律陽六呂陰總十二也金石絲竹匏土革木此八音也非乎言滯著此聲音豈非是師曠乎師曠字子野晉平公樂師極知音律言離曠二子素分聰明庸昧之徒橫生希慕既失本性寧不困乎然則離曠聰明乃是亂耳目之主者也枝於仁者擢德塞性以收名聲使天下簧鼓以奉不及之法非乎而曾史是已註夫曾史性長於仁耳而性不長者橫復慕之慕之而仁仁已僞矣天下未嘗慕桀跖而必慕曾史則曾史之簧鼓天下使失其眞性甚於桀跖也疏枝於仁者謂素分枝多仁義由如生分中枝生一指也擢用五德旣偏滯邪淫仍閉塞正性用斯接物以收聚名聲遂使蒼生馳動奔競由如笙簧鼓吹能感動於物欣企也然曾史性長於仁義而不長者橫復慕之舍短效長故言奉不及之法也擢拔謂拔擢僞德塞其眞性也曾者姓曾名參字子輿仲尼之弟子史者姓史名鰌字子魚衛靈公臣此二人並禀性仁孝故舉之駢於辯者纍瓦結繩竄句遊心於堅白同異之間而敝跬譽無用之言非乎而楊墨是已註夫騁其奇辯致其危辭者未曾容思於檮杌之口而必競辯於楊墨之間則楊墨乃亂羣言之主也疏楊者姓楊名朱字子居宋人也墨者名翟亦宋人也爲宋大夫以其行墨之道故稱爲墨此二人並墨之徒禀性多辯咸能致高談危險之辭鼓動物性固執是非由如緘結藏匿文句使人難解其游心學處惟在堅執守白之論是非同異之間未始出非人之域也蹩躠由自恃也亦用力之貌譽光贊也楊墨之徒並矜其小學炫燿眾人誇無用之言惑於羣物然則楊墨豈非亂羣之師乎言卽此楊墨而已也故此皆多駢旁枝之道非天下之至正也註此數子皆師其天性眞自多駢旁枝各自是一家之正耳然以一正萬則萬不正矣故至正者不以己正天下使天下各得其正而已疏言此數子皆自天然聰明仁辯由如合駢之拇傍生枝指禀之素分豈由人爲故知率性多仁乃是駢傍枝之道也而愚惑之徒舍己效物求之分外由而不已然搖動物性由此數人以一正萬故非天下至道正理也彼正正者不失其性命之情註物各任性乃正正也自此已下觀之至正可見矣疏以自然之正理正蒼生之性命故言正也物各自得故言不失也言自然者卽我之自然所言性命者亦我之性命也豈遠哉故言正正者以不正而正正而不正而言也自此以上明矯性之失自此以下顯率性之得也故合者不爲駢註以枝正合乃謂合爲駢而枝者不爲跂註以合正枝乃謂枝爲跂疏以枝正合乃謂合爲駢而合實非駢以合望枝乃謂枝爲跂而枝實非跂也長者不爲有餘註以短正長乃謂長有餘短者不爲不足註以長正短乃謂短不足疏長者謂曾史離曠楊墨並禀之天性藴蓄仁義聰明俊辯比之羣小故謂之長率性而動故非有餘短者眾人此曾史等不及故謂之短然亦天機自張故非爲不足是故鳧脛雖短續之則憂鶴脛雖長斷之則悲註各自有正不可以此正彼而損益之疏鳧小鴨也鶴鶬之類也脛腳也自然之理亭毒眾形雖復修短不同而形體各足稱事咸得逍遙而或者方欲截鶴之長續鳧之短以爲齊深乖造化違失本性所以憂悲故性長非所斷性短非所續無所去憂也註知其性分非所斷續而任之則無所去憂而憂自去也疏夫禀性受形僉有崖量脩短明闇素分不同此如鳧鶴非所斷續如此卽各守分內雖爲無勞去憂憂自去也噫仁義其非人情乎註夫仁義自是人之情性但當任之耳彼仁人何其多憂也註恐仁義非人情而憂之者眞可謂多憂也疏噫嗟歎之聲也夫仁義之情出自天理率性有之非由放效彼仁人者則是曾史之徒不體眞趣橫生勸獎謂仁義之道可學而成莊生深嗟此迷故發噫歎分外引物故謂多憂也非其人情乎者是人之情性者也且夫駢於拇者决之則泣枝於手者齕之則啼二者或有餘於數或不足於數其於憂一也註謂之不足故泣而决之以爲有餘故啼而齕之夫如此雖羣品萬殊無釋憂之地矣唯各安其天性不决駢而齕枝則曲成而無傷又何憂哉疏齕者齧斷也决者離析也有餘於數謂枝生六指也不足於數謂駢爲四指夫駢枝二物自出天然但當任置未爲多少而或者不能忘淡固執是非謂枝爲有餘駢爲不足橫欲决駢齕枝成於五數旣傷造化所以泣啼故决齕雖殊其憂一也今世之仁人蒿目而憂世之患註兼愛之迹可尙則天下之目亂矣以可尙之迹蒿令有患而遂憂之此爲陷人於難而後拯之也然今世正謂此爲仁也疏蒿目亂也仁兼愛之迹也今世猶末代言曾史之徒行此兼愛遂令或者舍己效人希幸之路旣開耳目之用亂矣耳目亂則患難生於是憂其紛擾還救以仁義不知患難之所興興乎聖迹也不仁之人决性命之情而饕貴富註夫貴富所以可饕由有蒿之者也若乃無可尙之迹則人安其分將量力受任豈有决己效彼以饕竊非望哉疏饕貪財也素分不懷仁義者謂之不仁之人也意在貪求利祿偷竊貴富故絶己之天性亡失分命眞情而矯性僞情舍我逐物良由聖迹可尙故有斯弊者也是知抱樸還湻必須絶仁棄義故意仁義其非人情乎疏此重結前旨也自三代以下者天下何其囂囂也註夫仁義自是人情也而三代以下橫共囂囂棄情逐迹如將不及不亦多憂乎疏自從也三代夏殷周也囂囂猶讙聒也夫仁義者出自性情而三代已下棄情徇迹囂囂競逐何愚之甚是以夏行仁殷行義周行禮卽此囂囂之狀也且夫待鉤繩規矩而正者是削其性也疏鉤曲繩直規圓矩方也夫物賴鉤繩規矩而後曲直方圓也此非天性也諭人待教迹而後仁義者非眞情也夫眞率性而動非假學也故矯性僞情舍已效物而行仁義者是減削毁損於天性也待繩約膠漆而固者是侵其德也疏約束縛也固牢也侵傷也德眞智也夫待繩索約束膠漆堅固者斯假外物非眞牢者也喻學曾史而行仁者此矯僞非實性也旣乖本性所以侵傷其德也屈折禮樂呴俞仁義以慰天下之心者此失其常然也疏屈曲也折截也呴俞猶嫗撫也揉直爲曲施節文之禮折長就短行漫澶之樂嫗撫偏愛之仁呴俞執迹之義以此爲眞以慰物心遂使物喪其眞人亡其本旣而棄本逐末故失其眞常自然之性者也此則總結前文之失以生後文之得也天下有常然常然者曲者不以鉤直者不以繩圓者不以規方者不以矩附離不以膠漆約束不以纏索疏夫天下萬物各有常分至如蓬曲麻直首圓足方也水則冬凝而夏釋魚則春聚而秋散斯出自天然非假諸物豈有鉤繩規矩膠漆纏索之可加乎在形旣然於性亦爾故知禮樂仁義者亂天之經者也又解附離離依也故漢書云哀帝時附離董氏者皆起家至二千石注云離依之也故天下誘然皆生而不知其所以生同焉皆得而不知其所以得註夫物有常然任而不助則民泯然自得而不自覺也疏誘然生物禀氣受形或方或圓乍曲乍直亭之毒之各足於性悉莫辨其然皆不知所以豈措意於緣慮情係於得失者乎是知屈折呴俞失其常也故古今不二不可虧也註同物故與物無二而常全疏夫見始終以不一者凡情之闇惑也覩古今之不二者聖智之明照也是以不生而生不知所以生不得而得不知所以得雖復時有古今而法無虧損千變萬化無常唯則仁義又奚連連如膠漆纏索而遊乎道德之間爲哉註任道而得則抱朴獨往連連假物無爲其間也疏奚何也連連猶接續也夫道德者非有非無不生不滅不可以聖智求安得以形名取而曾史之類性多於仁以已率物滯於名教束縛旣似緘繩執固又如膠漆心心相續連連不斷懷挾此行敖游道德之鄉者譬猶以圓學方以魚慕鳥徒希企尙之名終無功用之實筌蹄不忘魚兔又喪已陳芻狗貴此何爲也使天下惑也註仁義連連秪足以惑物使喪其眞疏仁義之教聰明之迹乖自然之道亂天下之心夫小惑易方大惑易性註夫東西易方於體未虧矜仁尙義失其常然以之死地乃大惑也疏夫指南爲北其迷尙小滯迹喪眞爲惑更大何以知其然耶疏然如是也此卽假設疑問以出後文自虞氏招仁義以撓天下也天下莫不奔命於仁義註夫與物無傷者非爲仁也而仁迹行焉令萬理皆當者非爲義也而義功見焉故當而無傷者非仁義之招也然而天下奔馳棄我殉彼以失其常然故亂心不由於醜而恒在美色撓世不出於惡而恒由仁義則仁義者撓天下之具也疏虞氏舜也招取也撓亂也自唐堯以前猶懷質樸虞舜以後湻風漸散故以仁義聖迹招慰蒼生遂使宇宙黎元荒迷奔走喪於性命逐於聖迹是非以仁義易其性與註雖虞氏無易之情而天下之性固以易矣疏由是觀之豈非用仁義聖迹撓亂天下使天下蒼生棄本逐末而改其天性耶故嘗試論之自三代以下者天下莫不以物易其性矣註自三代以上實有無爲之迹無爲之迹亦有爲者之所尙也尙之則失其自然之素故雖聖人有不得已或以盤夷之事易垂拱之性而況悠悠者哉疏五帝以上猶扇無爲之風三代以下漸興有爲之教澆湻異世步驟殊時遂使捨已效人易奪眞性徇物不反不亦悲乎注云或以盤夷之事易垂拱之性者盤夷猶創傷也言夏禹以風櫛雨沐手足骿胝以此辛苦之事易於無爲之業居上旣爾下民亦然也小人則以身殉利士則以身殉名大夫則以身殉家聖人則以身殉天下註夫鶉居而鷇食鳥行而無章者何惜而不殉哉故與世常㝠唯變所適其迹則殉世之迹也所遇者或時有盤夷秃脛之變其迹則傷性之迹也然而雖揮斥八極而神氣無變手足盤夷而居形者不擾則奚殉哉無殉也故乃不殉其所殉而迹與世同殉也疏殉從也營也求也逐也謂身所以從之也夫小人貪利廉士重名大夫殉爲一家帝王營於四海所殉雖異易性則同然聖人與世常冥其迹則殉故有瘢痍秃脛之變而未始累其神者也故此數子者事業不同名聲異號其於傷性以身爲殉一也疏數子者則前之世以下四人也事業者謂利名天下不同也名聲者謂小人大夫聖人異號也言此四人事業雖復不同名聲異號其於殘生以身逐物未始不均也臧與穀二人相與牧羊而俱亡其羊疏此仍前舉譬以生後文也孟子云臧善學人穀孺子也揚雄云男壻婢曰臧穀良家子也牧養也亡失也言此二人名耽事業俱失其羊也問藏奚事則挾筴讀書問穀奚事則博塞以游二人者事業不同其於亡羊均也疏奚何也册簡古人無紙皆以簡册寫書行五通而投瓊曰博不投瓊曰塞問臧問穀乃有書塞之殊牧羊亡羊實無復異也伯夷死名於首陽之下盜跖死利於東陵之上疏此下合譬也伯夷叔齊並孤竹君之子也孤竹神農之後也姜姓伯夷名允字公信叔齊名致字公遠夷長而庶齊幼而嫡父常愛齊數稱之於夷及其父薨兄弟相讓不襲先封聞文王有道乃往於周遇武王伐紂扣馬而諫諫不從走入首陽山採薇爲糧不食粟遂餓死首陽山山在蒲州東縣莆州城南三十里見有夷齊廟墓林木森竦盜跖者柳下惠之從弟名跖徒卒九千常爲巨盜故以盜爲名東陵者山名又云卽太山也在齊州界去東平十五里跖死其上也二人者所死不同其於殘生傷性均也疏伯夷徇名死於首陽之下盜跖貪利殞於東陵之上乃名利所徇不同其於殘傷未能相異也奚必伯夷之是而盜跖之非乎註天下之所惜者生也今殉之太甚俱殘其生則所殉是非不足復論疏據俗而言有美有惡以道觀者何是何非故盜跖不必非伯夷豈獨是天下盡殉也彼其所殉仁義也則俗謂之君子其所殉貨財也則俗謂之小人疏此總結前文以成後義但道喪日久並非適當今俗中盡殉豈獨夷跖從於仁義未始離名逐於貨財固當是利唯名與利殘生之本卽非天理近出俗情君子小人未可正據也其殉一也則有君子焉有小人焉若其殘生損性則盜跖亦伯夷已又惡取君子小人於其間哉註天下皆以不殘爲善今均於殘生則雖所殉不同不足復計也夫生奚爲殘性奚爲易哉皆由乎尙無爲之迹也若知迹之由乎無爲而成則絶尙去甚而反冥我極矣堯桀將均於自得君子小人奚辨哉疏惡何也其所殉名利則有君子小人之殊若殘生損性曾無盜跖伯夷之異此蓋俗徒到置非關眞極於何而取君子於何而辨小人哉言無别也且夫屬其性乎仁義者雖通如曾史非吾所謂臧也註以此係彼爲屬屬性於仁殉仁者耳故不善也疏屬係也臧善也吾莊生自稱也夫捨己效人得物喪我者流俗之僞情也故係我天性學彼仁義雖通達聖迹如墨翟楊朱乖於本性故非論生之所善也屬其性於五味雖通如俞兒非吾所謂臧也註率性通味乃善疏孟子云俞兒齊之識味人也尸子云俞兒和薑桂爲人主上食夫自無天素効物得知假令通似俞兒非其善故也屬其性乎五聲雖通如師曠非吾所謂聰也屬其性乎五色雖通如離朱非吾所謂明也註不付之於我而屬之於彼則雖通之如彼而我己喪矣故各任其耳目之用而不係於離曠乃聰明也疏夫離朱師曠禀分聰明率性而能非關學致今乃矯性僞情捨己效物雖然通達未足稱善也吾所謂臧者非仁義之謂也臧於其德而已矣註善於自得忘仁而仁疏德得也夫達於玄道者不易性以徇者也豈復執已陳之芻狗治先王之蘧廬者哉故當知其自知得其自得以斯爲善不亦宜乎吾所謂臧者非所謂仁義之謂也任其性命之情而已矣註謂仁義爲善則損身以殉之此於性命還自不仁也身自不仁其如人何故任其性命乃能及人及人而不累於已彼我同於自得斯可謂善也疏夫曾參史魚楊朱墨翟此四子行仁義者蓋率性任情禀之天命譬彼駢枝非由學得而或者覩曾史之仁義言放效之可成聞離曠之聰明謂庶幾之必致豈知造物而亭毒之乎哉故王弼注易云不性其情焉能久行其跂斯之謂也吾所謂聰者非謂其聞彼也自聞而已矣吾所謂明者非謂其見彼也自見而已矣註夫絶離棄曠自任聞見則萬方之聰明莫不皆全也疏夫希離慕曠見彼聞他心神馳奔耳目竭喪此乃愚闇豈曰聰明若聽耳之所聞視目之所見保分任眞不蕩於外者卽物皆聽明也夫不自見而見彼不得而得彼者是得人之得而不自得其得者也適人之適而不自適其適者也註此舍己效人者也雖效之若人而已已亡矣疏夫不能視見之所見而見目卽求離朱之明不能知知之所知而役知以慕史魚之義者斯乃僞情學人之得非謂率性自得己得也旣而僞學外顯效彼悅人作僞心勞故不自適其適也夫適人之適而不自適其適雖盜跖與伯夷是同爲淫僻也註苟以失性爲淫僻則雖所失之途異其於失之一也疏淫滯也僻邪也夫保分率性正道也尙名好勝邪淫也是以舍已逐物開希幸之路者雖伯夷之善盜跖之惡亦同爲邪僻也重舉適人之適者此結前生後以起文勢故也余愧乎道德是以上不敢爲仁義之操而下不敢爲淫僻之行也註愧道德之不爲謝冥復之無迹故絶操行忘名利從容吹累遺我忘彼若斯而已矣疏夫虛通之道至忘之德絶仁絶義無利無名而莊生妙體環中游心物表志操絶乎仁義心行忘乎是非體自然之無有媿道德之不爲而言上下者顯仁義淫僻之優劣也而云余愧不敢者示謙也郭注云從容吹累者從容猶閑放而吹累動而無心也吹風也累塵猶清風之動微塵輕舉也
