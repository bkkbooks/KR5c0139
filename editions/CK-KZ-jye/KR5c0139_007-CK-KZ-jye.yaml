body:
  text: 知天之所爲知人之所爲者至矣註知天人之所爲者皆自然也則內放其身而外冥於物與眾玄同任之而無不至也疏天者自然之謂至者造極之名天之所爲者謂三景晦明四時生殺風雲舒卷雷雨寒温也人之所爲者謂手捉腳行目視耳聽心知工拙凡所施爲也知天之所爲悉皆自爾非關修造豈由知力是以內放其身外冥於物浩然大觀與眾玄同窮理盡性故稱爲至也知天之所爲者天而生也註天者自然之謂也夫爲爲者不能爲而爲自爲耳爲知者不能知而知自知耳自知耳不知也不知也則知出於不知矣自爲耳不爲也不爲也則爲出於不爲矣爲出於不爲故以不爲爲主知出於不知故以不知爲宗是故眞人遺知而知不爲而爲自然而生坐忘而得故知稱絕而爲名去也疏雲行雨施川源岳瀆非關人力此乃天生能知所知並自然也此解前知天之所爲知人之所爲者以其知之所知以養其知之所不知終其天年而不中道夭者是知之盛也註人之生也形雖七尺而五常必具故雖區區之身乃舉天地以奉之故天地萬物凡所有者不可一日而相無也一物不具則生者無由得生一理不至則天年無緣得終然身之所有者知或不知也理之所存者或不爲也故知之所知者寡而身之所有者眾爲之所爲者少而理之所存者博在上者莫能器之而求其備焉人之所知不必同而所爲不敢異異則僞成矣僞成而眞不喪者未之有也或好知而不倦以困其百體所好不過一肢而舉根俱弊斯以其所知而害所不知也若夫知之盛也知人之所爲者有分故任而不彊也知人之所知者有極故用而不蕩也故所知不以無崖自困則一體之中知與不知闇相與會而俱全矣斯以其所知養所不知也疏人之所爲謂四肢百體各有御用也知之所知者謂自知於色卽以色爲所知也知之所不知者謂自能知色不能知聲卽以聲爲所不知也既而目爲手足而視腳爲耳鼻而行雖復無心相爲而濟彼之功成矣故眼耳鼻舌四肢百體更相役用各有司存心之明闇亦有限極用其分內終不强知斯以其知之所知以養其知之所不知也故得盡於天年不橫夭折能如是者可謂知之盛美者也雖然有患註雖知盛未若遺知任天之無患也疏知雖盛美猶有患累不若忘知而任獨也夫知有所待而後當註夫知者未能無可無不可故必有待也若乃任天而生者則遇物而當也其所待者特未定也註有待則無定也疏夫知必對境非境不當境既生滅不定物亦待奪無常唯當境智兩忘能所雙遣方能無可無不可然後無患已庸詎知吾所謂天之非人乎所謂人之非天乎註我生有崖天也心欲益之人也然此人之所謂耳物無非天也天也者自然也人皆自然則治亂成敗遇與不遇非人爲也皆自然耳疏近取諸身遠託諸物知能運用無非自然是知天之與人理歸無二故謂天則人謂人則天凡庸之流詎曉斯旨所言吾者莊生自稱此則泯合人天混同物我也且有眞人而後有眞知註有眞人而後天下之知皆得其眞而不可亂也疏夫聖人者誠能㝠眞合道忘我遺物懷玆聖德然後有此眞知是以混一眞人而無患累眞知之狀列在下文耳何謂眞人疏假設疑問庶顯其旨古之眞人不逆寡註凡寡皆不逆則所順者眾疏寡少也引古御今崇本抑末虛懷任物大順羣生假令微少會不逆扞者也不雄成註不恃其成而處物先疏爲而不恃長而不宰豈雄據成績欲處物先邪不謩士註縱心直前而羣士自合非謀謩以致之疏虛夷忘淡士眾自歸非關運心謀謩招致故也若然者過而弗悔當而不自得也註直自全當而無過耳非以得失經心疏天時已過曾無悔吝之心分命偶當不以自得爲美若然者登高不慄入水不濡入火不熱是知之能登假於道也若此註言夫能之登至於道者若此之遠也理固自全非畏死也故眞人陸行而非避濡也遠火而非逃熱也無過而非措當也故雖不以熱爲熱而未嘗赴火不以濡爲濡未嘗蹈水不以死爲死未嘗喪生故夫生者豈生之而生哉成者豈成之而成哉故任之而無不至者眞人也豈有槩意於所遇哉疏慄懼也濡濕也登昇也假至也眞人達生死之不二體安危之爲一故能入水入火曾不介懷登高履危豈復驚懼眞知之士有此功能昇至玄道故得如是者也古之眞人其寢不夢註無意想也其覺無憂註當所遇而安也疏夢者情意妄想也而眞人無情慮絕思想故雖寢寐寂泊而不夢以至覺悟常適而無憂也其食不甘註理當食耳疏混迹人間同塵而食不耽滋味故不知甘美其息深深眞人之息以踵註乃在根本中來疏踵足根也眞人心性和緩智照凝寂至於氣息亦復徐遲腳踵中來明其深靜也眾人之息以喉屈服者其嗌言若哇註氣不平暢疏嗌喉也哇礙也凡俗之人心靈馳競言語喘息唯出咽喉情躁氣促不能深靜屈折起伏氣不調和咽喉嗌之中恒如哇礙也其嗜欲深者其天機淺註深根寧極然後反一無欲疏夫耽嗜諸塵而情欲深重者其天然機神淺鈍故也若使智照深遠豈其然乎古之眞人不知悅生不知惡死註與化爲體疏氣聚爲生生爲我時氣散而死死爲我順既冥於變化故不以悅惡存懷其出不訢其入不距註泰然而任之疏時應出生本無情於忻樂時應入死豈有意於距諱耶翛然而往翛然而來而已矣註寄之至理故往來而不難疏翛然無係貌也翛然獨化任理遨遊雖復死往生來曾無意戀之者也不忘其所始不求其所終註終始變化皆忘之矣豈直逆忘其生而猶伏探求死意也疏始生也終死也生死都遣曾無執滯豈直獨忘其生而偏求於死耶終始均平所遇斯適也受而喜之注不問所受者何物遇之而無不適也疏喜所遇也忘而復之注復之不由於識乃至疏反未生也是之謂不以心捐道不以人助天是之謂眞人注人生而靜天之性也感物而動性之欲也物之感人無窮人之逐欲無節則天理滅矣眞人知用心則背道助天則傷生故不爲也疏是謂者指斥前文總結其旨也捐棄也言上來智德忘生可謂不用取捨之心捐棄虛通之道亦不用人情分别添助自然之分能如是者名曰眞人也若然者其心志注所居而安爲志疏若如以前不捐道等心是心懷志操能致然也故老經云强行者有志其容寂注雖行而無傷於靜其顙頯注頯大樸之貌疏顙額也頯大朴貌夫眞人降世挺氣異凡非直智照虛明志力弘普亦乃威容閑雅相貌端嚴日角月玄卽斯類也淒然似秋注殺物非爲威也煖然似春注生物非爲仁也喜怒通四時注夫體道合變者與寒暑同其温嚴而未嘗有心也然有温嚴之貌生殺之節故寄名於喜怒疏聖人無心有感斯應威恩適務寬猛逗機同素秋之降霜初無心於肅殺似青春之生育甯有意於仁惠是以眞人如雷行風動木茂花敷覆載合乎二儀喜怒通乎四序與物有宜而莫知其極註無心於物故不奪物宜無物不宜故莫知其極疏眞人應世赴感隨時與物交涉必有宜便而虛心慈愛常善救人量等太虛故莫知其極故聖人之用兵也亡國而不失人心疏堯攻叢支禹攻有扈成湯滅夏周武伐殷並上合天時下符人事所以興動干戈弔民問罪雖復滅亡邦國而不失百姓歡心故也利澤施乎萬世不爲愛人注因人心之所欲亡而亡之故不失人心也夫白日登天六合俱照非愛人而照之也故聖人之在天下煖焉若春陽之自和故䝉澤者不謝凄乎若秋霜之自降故彫落者不怨疏利物滋澤事等陽春豈直一時乃施乎萬世若芻狗百姓故無偏愛之情故樂通物非聖人也注夫聖人無樂也直莫之塞而物自通疏夫懸鏡高堂物來斯照不迎不送豈有情哉大聖應機其義亦爾和而不唱非謂樂通故知惑意於物非聖人者也有親非仁也注至人無親任理而自存疏至人無親親則非至人也天時非賢也注時人者未若忘時而自合之賢也疏占玄象之虧盈侯天時之去就此乃小智豈是大賢者也利害不通非君子也注不能一是非之塗而就利違害則傷德而累當矣疏未能一窮通均利害而擇情榮辱封執是非者身且不能自達焉能君子人物乎行名失已非士也註善爲士者遺名而自得故名當其實而福應其身疏矯行求名失其已性此乃流俗之人非爲道之士亡身不眞非役人也注自失其性而矯以從物受役多矣安能役人疏夫矯行喪眞求名亡己斯乃受人驅役焉能役人之哉若狐不偕務光伯夷叔齊箕子胥餘紀他申徒狄是役人之役適人之適而不自適其適者也注斯皆舍己效人徇彼傷我也疏姓狐字不偕古之賢人云堯時賢人不受堯讓投河而死務光黃帝時人身長七尺又云夏時人餌藥養性好鼓琴湯讓天下不受自負石沉於廬水伯夷叔齊遼西孤竹君之二子神農之裔姓姜氏父死兄弟相讓不肯嗣位聞西伯有道試往觀焉逢文王崩武王伐紂夷齊扣馬而諫武王不從遂隱於河東首陽山不食其粟卒餓而死箕子殷紂賢臣諫紂不從遂遭奴戮子胥餘紀他者箕子名也又解是楚大夫伍奢之子名員字子胥吳王夫差之臣忠諫不從抉眼而死屍沈乎江紀他者姓紀名他湯時逸人也聞湯讓務光恐及乎已遂將弟子陷於窾水而死申徒狄聞之因以踣河此數子者皆矯情僞行亢志立名分外波蕩遂至於此自餓自沈促齡夭命而芳名令譽傳諸史籍斯乃被他驅使何能役人悅樂眾人之耳目焉能自適其情性耶古之眞人其狀義而不朋注與物同宜而非朋黨疏狀迹也義宜也降迹同世隨物所宜而虛己均平曾無偏黨也若不足而不承注沖虛無餘如若不足也下之而無不上若不足而不承也疏韜晦沖虛猶如神智不足率性而動汎然自得故無所禀承者也與乎其觚而不堅也注常遊於獨而非固疏觚獨也堅固也彷徨放任容與自得遨遊獨化之場而不固執之張乎其虛而不華也注曠然無懷乃至於實疏張廣大貌也靈府寬閑與虛空等量而智德眞實故不浮華邴邴乎其似喜乎注至人無喜暢然和適故似喜也疏邴邴喜貌也隨變任化所遇斯適實忘喜怒故云似喜者也崔乎其不得已乎注動靜行止常居必然之極疏崔動也已止也眞人凝寂應物無方迫而後動非關先唱故不得已而應之者也滀乎進我色也注不以物傷已也疏滀聚也進益也心同止水故能滀聚群生是以應而無情惠而不費適我益我神色終無減損者也與乎止我德也注無所趨也疏雖復應動隨世接物逗機而恒容與無爲作於眞德所謂動而常寂者也厲乎其似世乎注至人無厲與世同行故若厲也疏厲危也眞人一於安危冥於禍福而和光同世亦似厲乎如孔子之困匡人文王之拘羑里雖遭危厄不廢無爲之事也謷乎其未可制也註高放而自得疏聖德廣大謷然高遠超於世表故不可禁制也連乎其似好閉也註綿邈深遠莫見其門疏連長也聖德遐長連綿難測心如路絕孰見其門昏默音聲似如閉門不聞見也悗乎忘其言也註不識不知而天機自發故悗然也疏悗無心貌也放任安排無爲虛淡得玄珠於赤水所以忘言自此以前歷顯眞人自利利他內外德行從此以下明眞人利物爲政之方也以刑爲體註刑者治之體非我爲以禮爲翼註禮者世之所以自行耳非我制疏用刑法爲治政之體本以禮物爲馭物之羽儀以知爲時註知者自時之動非我唱以德爲循註德者自彼所循非我作疏循順也用智照機不失時候以德接物俯順物情以前略標此以下解釋也以刑爲體者綽乎其殺也註任治之自殺故雖殺而寛疏綽寛也所以用刑法爲治體者以殺止殺殺一懲萬故雖殺而寛簡是以惠者民之讎法者民之父以禮爲翼者所以行於世也註順世之所行故無不行疏禮雖忠信之薄而爲御世之首故不學禮無以立非禮勿動非禮勿言人而無禮胡不遄死是故禮之於治要哉羽翼人倫所以大行於世者也以知爲時者不得已於事也註夫高下相受不可逆之流也小大相居不得已之勢也曠然無情群知之府也承百流之會居師人之極者奚爲哉任時世之知委必然之事付之天下而已疏隨機感以接物運至知以應時理無可視聽之色聲事有不得已之形勢故爲宗師者曠然無懷付之羣智居必然之會乘之以游者也以德爲循者言其與有足者至於邱也註邱者所以本也以性言之則性之本也夫物各有足足於本也付羣德之自循斯與有足者至於本也本至而理盡矣疏邱本也以德接物順物之性性各有分止分而足順其本性故至於邱也而人眞以爲勤行者也註凡此皆自彼而成成之不在已則雖處萬機之極而常間暇自適忽然不覺事之經身悗然不識言之在口而人之大迷眞謂至人爲勤行者也疏夫至人者動若行雲止若谷神境智洞忘虛心玄應豈有懷於爲物情係於拯救者乎而凡俗之人觸塗封執見舟航庶品亭毒群生實謂聖人勤行不怠詎知汾水之上凝淡窅然故文云孰肯以物爲事故其好之也一其弗好之也一註常無心而順彼故好與不好所善所惡與彼無二也疏既忘懷於美惡亦遣蕩於愛憎故好與弗好出自凡情而聖智虛融未嘗不一其一也一其不一也一註其一也天徒也其不一也人徒也夫眞人同天人均彼我不以其一異乎不一疏其一聖智也其不一凡情也既而凡聖不二故不一皆一之也其一與天爲徒註無有而不一者天也其不一與人爲徒註彼彼而我我者人也疏同天人齊萬物與玄天而爲類也彼彼而我我將凡庶而爲徒也天與人不相勝也是之謂眞人註夫眞人同天人齊萬致萬致不相非天人不相勝故曠然無不一冥然無不在而玄同彼我也疏雖復天無彼我人有之非確然論之咸歸空寂若使天勝人劣豈謂齊乎此又混一天人冥同勝負體斯趣者可謂眞人者也死生命也其有夜旦之常天也註其有晝夜之常天之道也故知死生者命之極非妄然也若夜旦耳奚所係哉疏夫旦明夜闇天之常道死生來去人之分命天不能無晝夜人焉能無死生故任變隨流我將於何係哉人之有所不得與皆物之情也註夫眞人在晝得晝在夜得夜以死生爲晝夜豈有所不得今人之有所不得而憂娛在懷皆物情耳非理也䟽夫死生晝夜人天常道未始非我何所係哉而流俗之徒逆於造化不能安時處順與變俱往而欣生惡死哀樂存懷斯乃凡物之滯情豈是眞人之通智也彼特以天爲父而身猶愛之而況其卓乎註卓者獨化之謂也夫相因之功莫若獨化之至也故人之所因者天也天之所生者獨化也人皆以天爲父故晝夜之變寒暑之節猶不敢惡隨天安之況乎卓爾獨化至於玄冥之境又安得而不任之哉既任之則死生變化唯命之從也疏卓者獨化之謂也彼之眾人禀氣蒼昊而獨以天爲父身猶愛而重之至於晝夜寒温不能返逆况乎至道窈冥之鄉獨化自然之境生天生地開闢陰陽適可安而任之何得拒而不順也人特以有君爲愈乎巳而身猶死之而況其眞乎註夫眞者不假於物而自然也夫自然之不可避豈直君命而已哉疏愈猶勝也其眞則向之獨化者也人獨以爲君王爲勝巳尊貴尙殞身致命不敢有避而況玄道至極自然之理欲不從順其可得乎安排委化固其宜矣泉涸魚相與處於陸相呴以濕相濡以沫不如相忘於江湖註與其不足而相愛豈若有餘而相忘疏此起譬也江湖浩瀚游泳自在各足深水無復往還彼此相忘恩情斷絕洎乎泉源旱涸鱣鮪困苦共處陸地頳尾曝腮於是吐沫相濡呴氣相濕恩愛往來更相親附比之江湖去之遠矣亦猶大道之世物各逍遙雞犬聲聞不相來往湻風旣散澆浪漸興從理任教聖迹斯起矜蹩躠以爲仁踶跂以爲義父子兄弟懷情相欺聖人羞之良有以也故知魚失水所以呴濡人喪道所以親愛之者也與其譽堯而非桀也不如兩忘而化其道註夫非譽皆生於不足故至足者忘善惡遺死生與變化爲一曠然無不適矣又安知堯桀之所在耶疏此合喻夫唐堯聖君夏桀庸主故譽堯善而非桀惡祖述堯舜以朂將來仁義之興自玆爲本也豈若無善無惡善惡兩忘不是不非是非雙遣然後出生入死隨變化而遨遊莫往莫來履玄道而自得豈與夫呴濡聖迹同年而語哉夫大塊載我以形勞我以生佚我以老息我以死註夫形生老死皆我也故形爲我載生爲我勞老爲我佚死爲我息四者雖變未始非我我奚惜哉疏大塊者自然也夫形是構造之物生是誕育之始老是耆艾之年死是氣散之日但運載有形生必勞苦老既無能暫時間逸死滅還無理歸停憩四者雖變而未始非我而我坦然何所惜邪故善吾生者乃所以善吾死也註死與生皆命也無善則已有善則生不獨善也故若以吾生爲善乎則吾死亦善也疏夫形生老死皆我也故以善吾生爲善者吾死亦可以爲善矣夫藏舟於壑藏山於澤謂之固矣註方言死生變化之不可逃故舉無逃之極然後明之以必變之符將任化而無係也然而夜半有力者負之而走昧者不知也註夫無力之力莫大於變化者也故乃揭天地以趨新負山嶽以舍故故不暫停忽已涉新則天地萬物無時而不移也世皆新矣而自以爲故舟日易矣而視之若舊山日更矣而視之若前今交一臂而失之皆在冥中去矣故向者之我非復今我也我與今俱往豈常守故哉而世莫之覺橫謂今之所遇可係而在豈不昧哉疏夜半闇冥以譬眞理玄邃也有力者造化也夫藏舟船於海壑正合其宜隱山嶽於澤中謂之得所然而造化之力擔負而趨變故曰新驟如逝水凡惑之徒心靈愚昧眞謂山舟牢固不動巋然豈知冥中貿遷無時暫息昨我今我其義亦然也藏小大有宜猶有所遯註不知與化爲體而思藏之使不化則雖至深至固各得其所宜而無以禁其日變也故夫藏而有之者不能止其遯也無藏而任化者變不能變也疏遁變化也藏舟於壑藏山於澤此藏大也藏人於室藏物於器此藏小也然小大雖異而藏皆得宜猶念念遷流新新移改是知變化之道無處可逃也若夫藏天下於天下而不得所遯是恒物之大情也註無所藏而都任之則與物無不冥與化無不一故無外無內無死無生體天地而合變化索所遯而不得矣此乃常存之大情非一曲之小意疏恒常也夫藏天下於天下者豈藏之哉蓋無所藏也故能一死生冥變化放縱寰宇之中乘造物以遨遊者斯藏天下於天下也旣變所不能變何所遯之有哉此乃體凝寂之人物達大道之眞情豈流俗之迷徒運人間之小智耶特犯人之形而猶喜之若人之形者萬化之未始有極也註人形乃是萬化之一遇耳未足獨喜也無極之中所遇者皆若人耳豈特人形可喜而餘物無樂邪其爲樂可勝計耶註本非人而化爲人失於故矣失故而喜喜所遇也變化無窮何所不遇所遇而樂樂豈有極乎疏特獨也犯過也夫大冶洪鑪陶鑄羣品獨遇人形遂以爲樂如形者其貌類無窮所遇卽喜喜亦何極是以唯形與喜不可勝計故聖人將遊於物之所不得遯而皆存註夫聖人遊於變化之塗放於日新之流萬物萬化亦與之萬化化者無極亦與之無極誰得遯之哉夫於生爲亡而於死爲存則何時而非存哉疏夫物不得遯者自然也孰能逃遯於自然之道乎是故聖人遊心變化之塗放任日新之境未始非我何往不存耶善夭善老善始善終人猶效之注此自均於百年之內不善少而否老未能體變化齊死生也然其平粹猶足以師人也又况萬物之所係而一化之所待乎注此玄同萬物而與化爲體故其爲天下之所宗也不亦宜乎疏係屬也夫人之識性明暗不同自有百年之中一生之內從容平淡群有欣慽至於壽夭老少都不介懷雖未能忘生死但復無嫌惡猶足以爲物師傅人放效之而況混同萬物冥一變化屬在至人必資聖知爲物宗匠不亦宜乎夫道有情有信無爲無形注有無情之情故無爲也有常無之信故無形也䟽明鑒同照有情也赴機若響有信也恬淡寂寞無爲也視之不見無形也可傳而不可受注古人傳而宅之莫能受而有之可得而不可見注咸得自容而莫見其狀䟽寄言詮理可傳也體非量數不可受也方寸獨悟可得也離於形色不可見也自本自根未有天地自古以固存注明無不得有而無也䟽自從也存有也虛通至道無始無終從本以來未有天地五氣未逃天道存焉故老經云有物混成先天地生又云迎之不見其首隨之不見其後者也神鬼神帝生天生地注無也豈能生神哉不神鬼帝而鬼帝自神斯乃不神之神也不生天地而天地自生斯乃不生之生也故夫神之果不足以神而不神則神矣功何足有事何足恃哉䟽言大道能神於鬼靈神於天帝開明三景生立二儀至無之力有玆功用斯乃不神而神不生而生非神之而神生之而生者也故老經云天得一以清神得一以靈也在太極之先而不爲高在六極之下而不爲深先天地生而不爲久長於上古而不爲老注言道之無所不在也故在高爲無高在深爲無深在久爲無久在老爲無老無所不在而所在皆無也且上下無不知者不得以高卑稱也外內無不至者不得以表裏名也與化俱移者不得言久也終始常無者不可謂老也䟽太極五氣也六極六合也且道在五氣之上不爲高遠在六合之下不爲深邃先天地生不爲長久長於夐古不爲耆艾言道非高非深非久非老故道無不在而所在皆無者也狶韋氏得之以挈天地䟽狶韋氏文字已前遠古帝王號也得靈通之道故能驅役羣品提挈二儀又作契字者契合也言能混同萬物符合二儀者也伏犧氏得之以襲氣母䟽伏犧三皇也能伏牛乘馬養伏犧牲故謂之伏犧也襲合也氣母者元氣之母應道也爲得至道故能畫八卦演六爻調陰陽合元氣也維斗得之終古不忒疏維斗北斗也爲眾星綱維故謂之維斗忒差也古始也得於至道故歷於終始維持天地心無差忒日月得之終古不息疏日月光證於一道故得終始照臨竟無休息者也堪坏得之以襲崑崙疏崑崙山名也在北海之北堪坏崑崙山神名也襲入也堪坏人面獸身得道入崑崙山爲神也馮夷得之以遊大川疏姓馮名夷弘農華陰潼鄉堤首里人也服八石得水仙大川黃河也天帝錫馮夷爲河伯故遊處盟津大川之中也肩吾得之以處太山疏肩吾神名也得道故處東嶽爲太山之神黃帝得之以登雲天疏黃帝軒轅也採首山之銅鑄鼎於荆山之下鼎成有龍垂於鼎以迎帝帝遂將群臣及後宫七十二人白日乘雲駕龍以登上天仙化而去顓頊得之以處玄宫疏顓頊卽黃帝之孫卽帝高陽也亦曰玄帝年十二而冠十五佐少昊二十卽位採羽山之銅爲鼎能召四海之神有靈異年九十七崩得道爲北方之帝玄者北方之色故處於玄宫也禺强得之立乎北極疏禺强水神名也亦曰禺京人面鳥身乘龍而行與顓頊並軒轅之𦙍也雖復得道不居帝位而爲水神水位北方故位號北極也西王母得之坐乎少廣莫知其始莫知其終疏少廣西極山名也王母太陰之精也豹尾虎齒善笑舜時王母遣使獻玉環漢武帝時獻青桃顔容十六七女子甚端正常坐西方少廣之山不復生死故莫知始終也彭祖得之上及有虞下及五伯疏彭祖帝顓頊之玄孫也封於彭城其道可祖故稱彭祖善養性得道者也五伯者昆吾爲夏伯大彭豕韋爲殷伯齊桓晉文爲周伯合爲五伯而彭祖得道所以長年上至有虞下及殷周凡八百年也傅說得之以相武丁奄有天下乘東維騎箕尾而比於列星註道無能也此言得之於道乃所以明其自得耳自得其道不能使之得也我之未得又不能爲得也然則凡得之者外
