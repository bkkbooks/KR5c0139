body:
  text: 聞在宥天下不聞治天下也註宥使自在則治治之則亂也人之生也直莫之蕩則性命不過欲惡不爽在上者不能無爲上之所爲而民皆赴之故有誘慕好欲而民性淫矣故所貴聖王者非貴其能治也貴其無爲而任物之自爲也疏宥寛也在自在也治統馭也寓言云聞諸賢聖任物自在寛宥卽天下清謐若立教以馭蒼生物失其性如伯樂治馬也在之也者恐天下之淫其性也宥之也者恐天下之遷其德也疏性者禀生之理德者功行之名故致在宥之言以防遷淫之過若不任性自在恐物淫僻喪性也若不宥之復恐効他其德遷改也天下不淫其性不遷其德有治天下者哉註無治乃不遷淫疏性正德定何勞布政治之哉有政不及無政有爲不及無爲昔堯之治天下也使天下欣欣焉人樂其性是不恬也桀之治天下也使天下瘁瘁焉人苦其性是不愉也註夫堯雖在宥天下其迹則治也治亂雖殊其於失後世之恬愉使物爭尙畏鄙而不自得則同耳故譽堯而非桀不如兩忘也疏恬靜也愉樂也瘁憂也堯以德臨人人歌擊壤乖靜性也桀以殘害於物物遭憂瘁乖其愉樂也堯桀政代斯異使物失性均也夫不恬不愉非德也非德也而可長久者天下無之註恬愉自得乃可長久疏堯以不恬涖人桀以不愉取物不合湻和之性欲得長久天下未之有也人大喜邪毗於陽大怒邪毗於陰陰陽并毗四時不至寒暑之和不成其反傷人之形乎使人喜怒失位居處無常疏毗助也喜出於魂怒出於魄人禀陰陽與二儀同氣堯令百姓喜毗陽暄舒桀使人怒助陰慘肅人喜怒過分天則失常盛夏不暑隆冬無霜旣失和氣加之天災人多疾病豈非反傷形乎不可有爲作法必致殘傷也思慮不自得中道不成章註此皆堯桀之流使物喜怒太過以致斯患也人在天地之中最能以靈知喜怒擾亂羣生而振蕩陰陽也故得失之間喜怒集乎百姓之懷則寒暑之和敗四時之節差百度昏亡萬事夭落也疏爲滯喜怒遂使百姓謀慮失眞旣乖憲章之法斯敗也已於是乎天下始喬詰卓鷙而後有盜跖曾史之行故舉天下以賞其善者不足註慕賞乃善故賞不能供舉天下以罰其惡者不給註畏罰乃止故罰不能勝疏喬詐僞也詰責問也卓獨也鷙猛也於是喬僞詰責卓爾不羣獨懷鷙猛輕陵於物自堯爲始次後有盜跖之惡曾史之善善惡旣著賞罰係焉慕賞行善懼罰止惡舉天下斧鉞不足以罰惡傾宇宙之藏不足以賞善給猶足也故天下之大不足以賞罰疏若忘賞罰任眞乃在足也自三代以下者匈匈焉終以賞罰爲事彼何暇安其性命之情哉註忘賞罰而自善性命乃大足耳夫賞罰者聖王之所以當功過非以著勸畏也故理至則遺之然後至一可反也而三代以下遂尋其事迹故爲匈匈焉與迹競逐終以所寄爲事性命之情何暇而安哉疏匈匈讙譁也競逐之謂也人懼斧鉞之誅又慕軒冕之賞心懷百慮事出萬端匈匈競逐而不知止夏殷以來其風漸扇賞罰攖擾終日荒忙有何容暇安其性命而且悅明邪是淫於色也悅聰邪是淫於聲也疏悅受染也淫耽滯也希離慕曠爲滯聲色也悅仁邪是亂於德也悅義邪是悖於理也疏德無憎愛偏愛故亂德理無是非裁非故逆理悖逆也悅禮邪是相於技也悦樂邪是相於淫也疏禮者擎跽曲拳節文隆殺樂者咸池大夏律呂八音說禮乃助浮華技能愛樂更助宮商淫聲悅聖邪是相於藝也悅知邪是相於疵也註當理無悅悅之則致淫悖之患矣相助也疏說聖迹助世間之藝術愛智計益是非之疵病也天下將安其性命之情之八者存可也亡可也註存亡無所在任其所受之分則性命安矣疏八者聰明仁義禮樂聖智是也言人禀分不同性情各異離曠曾史素分有者存之可也眾人性分本無企慕乖眞亡之可也天下將不安其性命之情之八者乃始臠卷傖囊而亂天下也註必存此八者則不能縱任自然故爲臠卷傖囊也疏臠卷不舒放之容也傖囊忽遽之貌天下羣生唯知分外不能安任臠卷自拘夸華人事傖囊急速爭馳逐物由八者不忘致斯弊者也而天下乃始尊之惜之甚矣天下之惑也註不能遺之已爲誤矣而乃復尊之以爲貴豈不甚惑哉疏前八者亂天之經不能忘遺已是大惑方復尊敬用爲楷模痛惜甚也豈直過也而去之邪乃齋戒以言之跪坐以進之鼓歌以儛之吾若是何哉註非直由寄而過去也乃珍貴之如此疏八條之義事同芻狗過去之後不合更收誡禁致齋明言執禮君臣跪坐更相進獻鼓九韶之歌舞大章之曲珍重蘧廬一至於此莊生自擊無奈之何也故君子不得已而臨蒞天下莫若無爲無爲也而後安其性命之情註無爲者非拱默之謂也直各任其自爲則性命安矣不得已者非迫於威刑也直抱道懷朴任乎必然之極而天下自賓也疏君子聖人也不得已臨蒞天下恒自無爲雖復無爲非關拱默動寂無心而性命之情未始不安也故貴以身於爲天下則可以託天下愛以身於爲天下則可以寄天下註若夫輕身以赴利棄我而殉物則身且不能安其如天下何疏貴身賤利內我外物保愛精神不蕩於世者故可寄坐萬物之上託化於天下也故君子苟能無解其五藏無擢其聰明註解擢則傷也疏五藏精靈之宅聰明耳目之用若分辨五藏情識顯擢聰明之用則精神奔馳於內耳目竭喪於外矣尸居而龍見淵默而雷聲註出處默語常無其心而付之自然疏聖人寂同死尸寂泊動類飛龍在天豈有寂動理教之異哉故寂而動尸居而龍見淵默而雷聲欲明寂動動寂理教教理不一異也神動而天隨註神順物而動天隨理而行疏神者妙萬物而爲言也卽動卽寂德同蒼昊隨順生物也從容無爲而萬物炊累焉註若遊塵之自動疏累塵也從容自在無爲虛淡若風動細塵清空中浮物陽氣飄颻任運去留非已吾又何暇治天下哉註任其自然而已疏物我齊混俱合自然何勞功暇更爲治法也崔瞿問於老聃曰不治天下安臧人心老聃曰汝愼無攖人心註攖之則傷其自善也疏姓崔名瞿不知何許人也旣問在宥不治人心何以履善答曰宥之放之自合其理作法理物則攖撓人心引下文云人心排下而進上註排之則下進之則上言其易搖蕩也疏人心排他居下進已在上皆常情也上下囚殺註無所排進乃安全耳疏溺心上下爲境所牽如禁之囚攖煩困苦淖約柔乎剛强註言能淖約則剛彊者柔矣疏淖約柔弱也矯情行於柔弱欲制服於剛强廉劌彫琢其熱焦火其寒凝冰註夫焦火之熱凝冰之寒皆喜怒並積之所生若乃不彫不琢各全其朴則何冰炭之有哉疏廉務名也劌傷也彫琢名行欲在物前若違情起怒寒甚凝冰順心生喜熱喻焦火其疾俛仰之間而再撫四海之外註風俗之所動也疏逐境之心一念之頃已遍十方況俯仰之間不再臨四海哉其居也淵而靜其動也縣而天註靜之可使如淵動之則係天而踊躍也疏有欲之心去無定凖偶爾而靜如流水之遇淵潭觸境而動類高天之縣不息動之則係天踊躍僨驕而不可係者其唯人心乎註人心之變靡所不爲順而放之則靜而自通治而係之則跂而僨驕僨驕者不可禁之勢也疏排下進上美惡喜怒僨發驕矜不可禁制者其在人心乎昔者黃帝始以仁義攖人之心註夫黃帝非爲仁義也直與物冥則仁義之迹自見迹自見則後世之心必自殉之是亦黃帝之迹使物攖也疏黃帝因宜作則慈愛養民實異偏尙之仁裁非之義後代之主執之軌轍蒼生名之爲聖攖人之心自此始也弊起後王釁非黃帝堯舜於是乎股無肱脛無毛以養天下之形愁其五藏以爲仁義矜其血氣以規法度然猶有不勝也疏肱白肉也堯舜行黃帝之迹心形瘦弊股瘦無白肉脛秃無細毛養天下形容安萬物情性五藏憂愁於內血氣矜莊於外行仁義以爲規矩立法度以爲楷模尙不免流放凶族則有不勝堯於是放讙兜於崇山投三苗於三峗流共工於幽都此不勝天下也疏昔帝鴻氏有不才子天下謂之混沌卽讙兜也爲黨共工放南裔也縉雲氏有不才子天下謂之饕餮卽三苗也爲堯諸侯封三苗之國國在左洞庭右彭蠡居豫章近南嶽三峗山名在西裔卽秦州西羌也少昊氏有不才子天下謂之窮奇卽共工也爲堯水官幽都在北方卽幽州之地尙書有殛鯀此文備也四人皆包藏凶惡不遵堯化故投諸四裔是堯不勝天下之事故四凶由舜今稱堯者其時舜攝堯位故耳夫施及三王而天下大駭矣註夫堯舜帝王之名皆其迹耳我寄斯迹而迹非我也故駭者自世世彌駭其迹愈粗粗之與妙自塗之夷險耳遊者豈常改其足哉故聖人一也而有堯舜湯武之異明斯異者時世之名耳未足以名聖人之實也故夫堯舜者豈直一堯舜而已哉是以雖有矜愁之貌仁義之迹而所以迹者故全也疏施延也自黃帝延乎堯舜聖迹滯物擾亂延及三王驚駭更甚下有桀跖疏桀跖行小人之行爲下曾史行君子之行爲上上有曾史而儒墨畢起疏謂儒墨守迹是非因之而起也於是乎喜怒相疑疏喜是怒非更相疑貳愚知相欺疏飾智驚愚互爲欺侮善否相非疏善與不善彼此相非誕信相譏疏誕虛信實自相譏誚而天下衰矣註莫能齊於自得疏相仍糾紛宇宙衰也大德不同而性命爛漫矣註立小異而不止於分疏喜怒是非熾然大盛於世故天年夭枉性命爛漫爛漫散亂也天下好知而百姓求竭矣註知無涯而好之故無以供其求疏聖人窮無崖之智百姓焉不竭哉於是乎釿鋸制焉繩墨殺焉椎鑿决焉註彫琢性命遂至於此疏繩墨正木之曲直禮儀示人之隆殺椎鑿穿木之孔竅刑法决人之身首工匠運斤鋸以殘木聖人用禮法以傷道天下脊脊大亂罪在攖人心故賢者伏處大山嵁巖之下而萬乘之君憂慄乎廟堂之上註若夫任自然而居當則賢愚襲情而貴賤履位君臣上下莫匪爾極而天下無患矣斯迹也遂攖天下之心使奔馳而不可止故中知以下莫不外飾其性以眩惑眾人惡直醜正蕃徒相引是以任眞者失其據而崇僞者竊其柄於是主憂於上民困於下矣疏脊脊相踐籍也一云亂宇宙大亂罪由聖智君子道消晦迹林藪人君雖在廟堂心恒憂慄旣無良輔恐國傾危也今世殊死者相枕也桁楊者相推也刑戮者相望也疏殊者决定當死也桁楊者械也夾腳及頸皆名桁楊六國之時及衰周之世良由聖迹黥劓五刑遂使桁楊者盈衢殊死者相枕殘兀滿路相枕相望明其多也而儒墨乃始離跂攘臂乎桎梏之間意甚矣哉其無愧而不知恥也甚矣註由腐儒守迹故致斯禍不思捐迹反一而方復攘臂用迹以治迹可謂無愧而不知恥之甚也疏離跂用力貌也聖迹謂害物之具而儒墨方復攘臂分外用力於桎梏之間執迹封教救當世之弊何荒亂之能極哉故發噫歎息傷固陋不已愧而不恥也吾未知聖知之不爲桁楊椄槢也仁義之不爲桎梏鑿枘也註桁楊以椄槢爲管而桎梏以鑿枘爲用聖知仁義者遠於罪之迹也迹遠罪則民斯尙之尙之則驕詐生焉驕詐生而禦奸之器不具者未之有也故棄所尙則矯詐不作矯詐不作則桁楊桎梏廢矣何鑿枘椄槢之爲哉疏椄槢械楔也鑿孔也以物內孔中曰枘械不楔不牢梏無孔無用亦猶憲章非聖迹不立桀跖無仁義不行聖迹是攖擾之原仁義是殘害之本焉知曾史之不爲桀跖嚆矢也註嚆矢矢之猛者言曾史爲桀跖之利用也疏嚆箭鏃有孔猛聲也聖知是竊國之具仁義爲凶暴之資曾史爲桀跖利用猛箭故云然也故曰絶聖棄知而天下大治註法其所以攖也疏絶竊國之具棄凶暴之資卽宇內淸平言大治也黃帝立爲天子十九年令行天下疏德化詔令宇內大行聞廣成子在於空同之上故往見之疏空同山凉州北界廣成卽老子别號也曰我聞吾子達於至道敢問至道之精吾欲取天地之精以佐五穀以養民人疏五穀黍稷菽麻麥也欲取窈㝠之理天地陰陽精氣助成五穀以養蒼生也吾又欲官陰陽以遂羣生爲之奈何疏遂順也欲象陰陽設官分職順羣生之性問其所以廣成子曰而所欲問者物之質也註問至道之精可謂質也疏而汝也欲播植五穀官府二儀所問粗淺不過形質乖深玄之致是抵訶也而所欲官者物之殘也註不任其自爾而欲官之故殘也疏苟欲設官分職引物從己旣乖造化必致傷殘自而治天下雲氣不待族而雨草木不待黃而落日月之光益以荒矣疏族聚也分百官放陰陽有心治萬物必致凶災雨風不調炎凉失節雲未聚而雨降木尙靑而棄落攙搶薄蝕三光昏晦人心遭擾玄象荒怠而佞人之心翦翦者又奚足以語至道疏翦翦狹劣貌也汝是諂佞之人心其狹劣何能語至道也黃帝退捐天下築特室席白茅閒居三月復往邀之疏黃帝退淸齊一心舍九五尊位築特室避讙囂藉白茅以潔淨閑居經時重往請道邀過也廣成子南首而臥黃帝順下風膝行而進再拜稽首而問曰聞吾子達於至道敢問治身奈何而可以長久廣成子蹶然而起曰善哉問乎註人皆自修而不治天下則天下治矣故善之也疏使人治物物必攖煩各各治身天下淸正故善之蹶然疾起來吾語汝至道至道之精窈窈㝠㝠至道之極昏昏默默註窈㝠昏默皆了無也夫莊老之所以屢稱無者何哉明生物者無物而物自生耳自生耳非爲生也又何有爲於已生乎疏至道精微心靈不測故寄窈窅深遠昏默玄絶無視無聽抱神以靜形將自正註忘視而自見忘聽而自聞則神不擾而形不邪也疏耳目無外視聽抱守精神境不能亂心與形合自㝠正道必靜必淸無勞汝形無搖汝精乃可以長生註任其自動故閒靜而不夭也疏淸神靜慮體無所勞不緣外境精神常寂心閑形逸長生久視目無所見耳無所聞心無所知汝神將守形形乃長生註此皆率性而動故長生也疏任視聽而無所見聞根塵旣空心亦安靜照無知慮應機常寂神淡守形可長生久視也愼汝內註全其眞也疏忘心全漠也閑汝外註守其分也疏絶視聽守分也多知爲敗註知無崖故敗疏不愼智慮心神旣困耳目竭於外何不敗哉我爲汝遂於大明之上矣至彼至陽之原也爲汝入於窈㝠之門矣至彼至陰之原也註夫極陰陽之原乃遂於大明之上入於窈㝠之門也疏陽動也陰寂也遂出也至人應動之時智照如日月名大明也至陽之原表從本降迹故言出也無感之時深根寂然凝湛也至陰之原亦攝迹歸本故曰入窈㝠之門廣成示黃帝動寂兩義故託陰陽二門也天地有官陰陽有藏註但當任之愼守汝身物將自壯疏天官謂日月星辰能照臨四方綱維萬物稱官也地官謂金木水火土能維持動植運載羣品亦稱官也陰陽二氣春夏秋冬各有司存如藏府也咸得隨任無不稱適何違造化更立官府也汝但無爲愼守汝身一切萬物自然昌盛何勞措心自貽伊慽哉我守其一以處其和故我修身千二百歲矣吾形未常衰註取於盡性命之極極長生之致耳身不夭乃能及物也疏保恬淡一心處中和妙道攝衞修身雖有夀考之年終無衰老之日黃帝再拜稽首曰廣成子之謂天矣註天無爲也疏歎聖道之清高可與玄天合德也廣成子曰來余語汝彼其物無窮而人皆以爲終疏死生變化物理無窮俗人愚惑謂有終始彼其物無測而人皆以爲極註徒見其一變也疏萬物不測千變萬化愚人迷執謂有限極得吾道者上爲皇而下爲王註皇王之稱隨世之上下耳其於得通變之道以應無窮一也疏得自然之道上逢淳樸之世則作犧農下遇澆季之時應爲湯武皇王迹自夷險道之一也失吾道者上見光而下爲土註失無窮之道則自信於一變而不能均同上下故俯仰異心疏喪無爲之道滯有欲之心生則覩於光明死則便爲土壤迷執生死不能均同上下故有兩名也今夫百昌皆生於土而反於土故余將去汝註土無心者也生於無心故當反守無心而獨往也疏夫百物昌盛皆生於地及其彫落還歸於土世間萬物從無而生死歸空寂生死不二不滯一方今將去汝任適也入無窮之門以遊無極之野註與化俱也疏反歸冥寂之本入無窮之門應變天地之間游無極之野吾與日月參光吾與天地爲常註都任之也疏參同也與三景齊明將二儀同久豈千二百歲哉當我緡乎遠我昬乎註物之去來皆不覺也疏聖人無心若鏡機當感發卽應感冥符若前機不感卽昏然晦迹也人其盡死而我獨存乎註以死生爲一體則無往而非存疏一死生明變化未始非我無去無來我獨存也人執生死故憂患之雲將東遊過扶搖之枝而適遭鴻蒙鴻蒙方將拊髀爵躍而遊疏雲將雲主將也鴻蒙元氣也扶搖木神生東海也亦云風遭遇也拊拍也雀躍跳躍也寓言也夫氣是生物之元也雲爲雨澤之本也木是春陽之鄉東爲仁惠之方舉此四事示君王御物以德澤爲先也雲將見之疏怪其容儀殊俗動止異凡故問行李之由庶爲理物之道也倘然止贄然立曰叟何人邪叟何爲此疏倘驚疑貌贄不動也叟長老名也鴻蒙拊髀爵躍不輟對雲將曰遊疏乘自然變化敖遊也雲將曰朕願有問也鴻蒙仰而視雲將曰吁雲將曰天氣不和地氣鬱結疏二氣不降不升鬱結也六氣不調疏陰陽風雨晦明此六氣也四時不節疏春夏秋冬節令愆滯其序今我願合六氣之精以育羣生爲之奈何疏我欲合六氣精華以養萬物故問也鴻䝉拊髀爵躍掉頭曰吾弗知吾弗知疏萬物咸禀自然若措意治之必乖造化故掉頭不答雲將不得問又三年東遊過有宋之野而適遭鴻䝉雲將大喜行趨而進曰天忘朕邪天忘朕邪再拜稽首願聞於鴻䝉疏故如上天再言忘朕幸憶往時也鴻䝉曰浮遊不知所求註而自得所求也疏浮遊處世無貪取也猖狂不知所往註而自得所往也疏無心忘行無的當也遊者鞅掌以觀无妄註夫內足者舉目皆自正也疏鴻䝉游心之處寛大涉見之物眾多能觀之智知所觀之境無妄也鞅掌眾多也朕又何知註以斯而已矣疏浮游猖狂虛心任物物各自正我復何知雲將曰朕也自以爲猖狂而民隨予所往朕也不得已於民今則民之放也註夫乘物非爲迹而迹自彰猖狂非招民而民自往故爲民所放效效而不得已也疏我同鴻䝉無心馭世不得已臨人人則隨我迹便爲物放效也願聞一言疏願聞要旨庶決深疑鴻蒙曰亂天之經逆物之情玄天弗成註若夫順物性而不治則情不逆而經不亂玄默成而自然得也疏亂天然常道逆物眞性卽譎詐方起自然之化不成也解獸之羣而鳥皆夜鳴註離其所以靜也疏放效迹彰害物災起獸則驚羣散起鳥則駭飛夜鳴災及草木禍及昆蟲註皆坐而受害也疏草木未霜零落災禍及昆蟲昆明也向陽啟蟄噫治人之過也註夫有治之迹亂之所由生也疏天治斯滅治人過也雲將曰然則吾奈何疏欲請不治之術鴻蒙曰噫毒哉註言治人之過深疏重傷禍敗屢歎噫聲僊僊乎歸矣註僊僊坐起之貌嫌不能隤然通放故遣使歸疏僊僊輕舉之貌嫌雲將治物爲禍故示輕舉勸令急返歸本雲將曰吾遇天難願聞一言鴻䝉曰噫心養註夫心以用傷則養心者其惟不用心乎疏養心之術列在下文汝徒處無爲而物自化疏徒但也但處心無爲而物自化墮爾形體吐爾聰明倫與物忘註理與物皆不以存懷而闇付自然則無爲而自化矣疏倫理也墮形體忘身也吐聰明忘心也身心兩忘物我雙遣是養心也大同乎涬溟註與物無際疏溟涬自然之氣也茫蕩身心大同自然合體也解心釋神莫然無魂註坐忘任獨疏魂好知爲也解釋遣蕩也莫然無知滌蕩心靈同死灰枯木無知魂也萬物云云各復其根各復其根而不知註不知而復乃眞復也疏云云眾多也眾多往來生滅不離自然歸根明矣豈得用知然後復命矣哉渾渾沌沌終身不離註渾沌無知而任其自復乃能終身不離其本也疏渾沌無知而任獨千變萬化不離自然若彼知之乃是離之註知而復之與復乖矣疏用知慕生乃離自然本性也無問其名無闚其情物固自生註闚問則失其自生也疏道離名言理絶情慮若以名問道以情闚理不亦遠哉能遣情忘名任于獨化物得生理也雲將曰天降朕以德示朕以默躬身求之乃今也得註知而不默常自失也疏降道德之言示玄點之行立身以來方今始悟再拜稽首起辭而行世俗之人皆喜人之同乎已而惡人之異於已也疏染習之人迷執日久同喜懼異已嫌惡也同於已而欲之異於已而不欲者以出乎眾爲心也註心欲出羣爲眾雋也疏夫是我而非彼喜同而惡異者必欲顯已功名超出羣眾夫以出乎眾爲心者曷常出乎眾哉註眾皆以出眾爲心故所以爲眾人也若我亦欲出乎眾則與眾無異而不能相出矣夫眾皆以相出爲心而我獨無往而不同乃大殊於眾而爲眾主也疏人以競先出乎眾爲心此是恆物鄙情何能獨超羣外同其光塵方大殊於眾而爲眾傑因眾以寧所聞不如眾技眾矣註吾一人之所聞不如眾技多故因眾則寧也若不因眾則眾之千萬皆我敵也疏用眾人技能因眾人聞見卽無忿競所謂明者爲之視智者爲之謀也而欲爲人之國者此攬乎三王之利而不見其患者也註夫欲爲人之國者不因眾之自爲而以已爲之者此爲徒求三王主物之利而不見已爲之患也然則三王之所以利豈爲之哉因天下之自爲而任耳疏用一已偏執爲國者徒求三王主物之利不知爲喪身之大患也此以人之國僥倖也幾何僥倖而不喪人之國乎疏僥要也以皇王之國利要求非分爲一身之幸會者未嘗不身遭殞敗萬不存一故云幾何也其存人之國也無萬分之一而喪人之國也一不成而萬有餘喪矣註已與天下相因而成者也今以一已而專制天下則天下塞矣已豈通哉故一身旣不成而萬方有餘喪矣疏以僥倖之心爲帝王之主論存已無一成語亡則有餘敗也悲夫有土者之不知也疏此一句傷歎君王不知僥倖爲弊矣夫有土者有大物也疏九五尊高四海宏巨是稱大物也有大物者不可以物物註不能用物而爲物用卽是物耳豈能物物哉不能物物則不足以有大物矣疏苟求三王之國不能任物自爲翻爲物用已自是物焉能物物斷不可也而不物故能物物註夫用物者不爲物用也不爲物用斯不物矣不物故物天下之物使各自得也疏不爲物用而用於物者也明乎物物者之非物也豈獨治天下百姓而已哉出入六合遊乎九州註用天下之自爲故馳萬物而不窮疏聖人通自然達造化運百姓心知用羣生耳目是知物物者非物也豈獨戴黃屋坐汾陽佩玉璽治天下哉固當排六合陵太淸超九州游姑射矣獨往獨來是謂獨有註人皆自異而己獨羣遊斯乃獨往獨來者也獨有斯獨可謂獨有矣獨有之人是之謂至貴註夫與眾玄同非求貴於眾而眾人不能不貴斯至貴也若乃信其偏見而以獨異爲心則雖同於一致故是俗中之一物耳排獨有者也未能獨有而欲饕竊軒冕冒取非分眾豈歸之哉故非至貴也疏人皆自異而己獨與羣游斯乃獨往獨來者也獨有斯獨可謂獨有矣欲出眾而己獨游眾無此能故名獨有獨有之人蒼生樂推百姓荷戴以斯爲主可謂至尊至貴也大人之教若形之於影聲之於響註百姓之心形聲也大人之教影響也大人之於天下何心哉猶影響之隨形聲耳疏大人聖人也無心感應應不以心故百姓之心形聲也大人之教影響也有問而應之盡其所懷註使物之所懷各得自盡也疏聖人心隨物感感亦稱機盡物懷抱爲天下配註問者爲主應故爲配疏配匹也先感爲主應者爲匹也處乎無響註寂以待物疏處寂也無感之時心如枯木寂無影響也行乎無方註隨物轉化疏行應機也逗機不定方所也挈汝適復之撓撓註撓撓自動也提挈萬物使復歸自動之性卽無爲之至也疏撓撓自動也逗機無方還欲提挈汝等羣品令歸本性則無爲至也以遊無端註與化俱故無端疏遊心與自然俱遊故無朕迹之端崖出入無旁註玄同無表疏出入塵埃生死之中玄同造物無邊可見與日無始註與日新俱故無始也疏與日俱新故無終始頌論形軀合乎大同註其形容與天地無異疏贊頌論語聖人盛德軀貌與二儀大道合同外不闚乎宇宙內不有其已身也大同而無已註有已則不能大同也疏合二儀同大道則物我俱忘也無已惡乎得有有註天下之難無者已也已旣無矣則羣有不足復有之疏已旣無矣物焉有哉覩有者昔之君子註能美其名者耳疏行仁義禮君臣者不離有爲君子也覩無者天地之友註覩無則任其獨生也疏覩無爲之妙理見自然之正性二儀非有萬物盡空翻有入無故稱爲友矣賤而不可不任者物也卑而不可不因者民也註因其性而任之則治反其性而凌之則亂夫民物之所以卑而賤者不能因任故也是以任賤者貴因卑者尊此必然之符也疏民雖居下各有功能物雖輕賤咸負材用物無棄材人無棄用庶咸亨也匿而不可不爲者事也註夫事藏於彼故匿也彼各自爲故不可不爲但當因任耳疏匿藏也事有隱顯性有工拙或顯於此或隱於彼或工於此或拙於彼但當任之悉事齊也麤而不可不陳者法也註法者妙事之迹也安可以迹麤而不陳妙事哉疏法言教也以教望理理妙法粗取喻筌蹄故須陳說故也遠而不可不居者義也註當乃居之所以爲遠疏義雖去道疏遠苟其合理應須取斷親而不可不廣者仁也註親則若偏故廣乃仁耳疏親雖偏愛狹博周普廣愛乃大仁也節而不可不積者禮也註夫禮節者患於係一故物物體之則積而周矣疏積厚也節文也夫禮貴尙往來人情華薄故外示折旋內敦積厚此眞禮也中而不可不高者德也註事之下者雖中非德疏中順也修道之人和光處世卑順於物而志行淸高涅而不緇其德也一而不可不易者道也註事之難者雖一非道况不一哉疏妙本一氣通生萬物甚自簡易其唯道乎神而不可不爲者天也註執意不爲雖神非天况不神哉疏神功不測顯晦無方逗機無滯合天然也故聖人觀於天而不助註順其自爲而已疏聖人觀自然妙理大順羣物而不助其性分此下釋前文成於德而不累註自然與高會也疏能使境智冥會上德旣成自無瑕累也出於道而不謀註不謀而一所以爲身會於仁而不恃疏老經云爲而不恃仁慈博愛貴在合宜故無恃賴薄於義而不積註率性居遠非積也疏先王籧廬非可寶重已陳芻狗豈積而留應於禮而不諱註自然應禮非由忌諱疏妙本湛然迹應於禮豈拘忌諱接於事而不讓註事以理接能否自任應動而動無所辭讓疏混俗揚波因事接物應機不取亦無辭讓齊於法而不亂註御粗以妙故不亂也疏因於物性以法齊之故不亂也恃於民而不輕註恃其自爲耳不輕用也疏民惟邦本本固而邦寧故恃籍不敢輕用也因於物而不去註因而就任之不去其本也疏順黔黎之心因庶物之性雖施於法教不令雜於性本物者莫足爲也而不可不爲註夫爲者豈以足爲故爲哉自體此爲故不可得而止也疏物之禀生功用萬殊如羗蜋轉丸蜘蛛結網出自天然非關假學故素無之事不强爲性中有者不可不爲也不明於天者不純於德註不明自然則有爲有爲而德不純也疏闇自然之理則澆薄之德不純也不通於道者無自而可註不能虛已以待物則事事失會疏閉虛玄道性故觸事面墻諒無從而可也不明於道者悲夫疏闇天然之理惑君臣之義所作顚蹷深可悲傷何謂道有天道有人道無爲而尊者天道也註在上而任萬物之自爲也疏無事無爲尊高在上者合自然天道也有爲而累者人道也註以有爲爲累者不能率其自得也疏司職有爲事累繁擾者人倫之道王者天道也註同乎天之任物則自然居物上疏君在上任物合天道無爲也臣者人道也註各當所任天道之與人道也相去遠矣註君任無爲而委百官百官有所司而君不與焉二者俱以不爲而自得則君道逸臣道勞勞逸之際不可同日而論之也疏君位尊高委之宰牧臣道卑下竭誠奉上故君道逸臣道勞不可同日而語也不可不察也註不察則君臣之位亂矣疏天道君而無爲人道臣而有事尊卑有隔勞逸不同各守其分則君臣咸無爲也必不能鑒理卽勞逸失宜君臣亂矣
