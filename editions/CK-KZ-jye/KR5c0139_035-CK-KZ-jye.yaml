body:
  text: 天下之治方術者多矣皆以其有爲不可加矣註爲以其有爲則眞爲也爲其眞爲則無僞矣又何加焉疏方道也自軒頊已下迄于堯舜治道藝術方法甚多皆隨有物之情順其所爲之性任羣品之動植曾不加之於分表是以雖教不教雖爲不爲矣古之所謂道術者果惡乎在疏上古三皇所行道術隨物任化淳樸無爲此之方法定在何處假設疑問發明深理也曰無乎不在疏答曰無爲玄道所在有之自古及今無處不徧曰神何由降明何由出註神明由事感而後降出疏神者妙物之名明者智周爲義若使虛通聖道今古有之亦何勞彼神人顯兹明智制禮作樂以導物乎聖有所生王有所成疏夫虛凝玄道物感所以誕生聖帝明王功成所以降迹豈徒然哉皆原於一註使物各復其根抱一而已無飾於外斯聖王所以生成也疏原本也一道雖復降靈接物混迹和光應物不離眞常抱一而歸本者也不離於宗謂之天人不離於精謂之神人不離於眞謂之至人以天爲宗以德爲本以道爲門兆於變化謂之聖人註凡此四名一人耳所自言之異疏冥宗契本謂之自然淳粹不雜謂之神妙嶷然不假謂之至極以自然爲宗上德爲本玄道爲門觀於機兆隨物變化者謂之聖人已上四人只是一耳隨其功用故有四名也以仁爲恩以義爲理以禮爲行以樂爲和薰然慈仁謂之君子註此四名之粗迹而賢人君子之所服膺也疏布仁惠爲恩澤施義理以裁非運節文爲行首動樂音以和性慈照光乎九有仁風扇乎八方譬蘭蕙芳馨香氣薰於遐邇可謂賢矣以法爲分以名爲表以參爲驗以稽爲决其數一二三四是也疏稽考也操執也法定其分名表其寔操驗其行考决其能一二三四卽名法等是也百官以此相齒以事爲常疏自堯舜已下置立百官用此四法更相齒次君臣物務遂以爲常所謂彝倫也以衣食爲主蕃息畜藏疏夫事之不可廢者耕織也聖人之不可廢者衣食也故國以民爲本民以食爲天是以蕃滋生息畜積藏儲者皆養民之法老弱孤寡爲意皆有以養民之理也註民理旣然故聖賢不逆古之人其備乎註古之人卽此之四名也疏養老哀弱矜孤恤寡五帝已下備有之焉配神明醇天地育萬物和天下疏配合也夫聖帝無心因循品物故能合神明之妙理同天地之精醇育宇內之黎元和域中之羣有澤及百姓明於本數係於末度註本數明故末不離疏本數仁義也末度名法也夫聖心慈育恩覃黎庶故能明仁義以崇本係法名以救末六通四闢小大精粗其運無乎不在註所以爲備疏闢法也大則兩儀小則羣物精則神智粗則形像通六合以遨游法四時而變化隨機運動無所不在也其明而在數度者舊法世傳之史尙多有之註其在數度而可明者雖多有之已疏外也疏史者春秋尙書皆古史也數度者仁義法名等也古舊相傳顯明在世者史傳書籍尙多有之其在於詩書禮樂者鄒魯之士搢紳先生多能明之註能明其迹耳豈所以迹哉疏鄒邑名也魯國號也搢笏也亦插也紳大帶也先生儒士也言仁義名法布在六經者鄒魯之地儒服之人能明之也詩以道志書以道事禮以道行樂以道和易以道陰陽春秋以道名分疏道達也通也夫詩道情志書道世事禮道心行樂道和適易明卦兆通達陰陽春秋褒貶定其名分其數散於天下而設於中國者百家之學時或稱而道之註皆道古人之陳迹耳尙復不能常稱疏六經之迹散在區中風教所覃不過華壤百家諸子依稀五德時復稱說不能大同也天下大亂註用其迹而無統故也疏執守陳迹故不昇平聖賢不明註能明其迹又未易也疏韜光晦迹道德不一註百家穿鑿疏法教多端天下多得一註各信其偏見而不能都舉疏宇內學人各滯所執偏得一術豈能弘通察焉以自好註夫聖人統百姓之大情而因爲之制故百姓寄情於所統而自忘其好惡故與一世而得澹漠焉亂則反之人恣其近好家用典法故國異政家殊俗疏不能恬淡虛忘而每運心思察隨其情好而爲教方譬如耳目鼻口皆有所明不能相通疏夫目能視色不能聽聲鼻能聞香不能辯味各有所主故不能相通也猶百家眾技也皆有所長時有所用註所長不同不得常用疏夫六經五德百家諸書其於救世各有所長旣未中道故時有所廢猶如鼻口有所不通也雖然不該不徧一曲之士也註故未足備任也疏雖復各有所長而未能該通周徧斯乃偏僻之士滯迹之人非圓通合變者也判天地之美析萬物之理註各用其一曲故析判疏一曲之人各執偏僻雖著方術不能會道故分散兩儀淳和之美離析萬物虛通之理也察古人之全寡能備於天地之美稱神明之容註况一曲者乎疏觀察古昔全德之人猶能備兩儀之亭毒稱神明之容貌况一曲之人乎是故內聖外王之道闇而不明鬱而不發註全人難遇故也疏玄聖素王內也飛龍九五外也旣而百家競起各私所見是非殽亂彼我紛紜遂使出處之道闇塞而不明鬱閉而不泄也天下之人各爲其所欲焉以自爲方悲夫百家往而不反必不合矣疏心之所欲執而爲之卽此欲心而爲方術一往逐物曾不反本欲求合理其可得也旣乖物情深可悲歎後世之學者不幸不見天地之純古人之大體註大體各歸根抱一則天地之純也疏幸遇也天地之純無爲也古人大體樸素也言後世之人屬斯澆季不見無爲之道不遇淳樸之世道術將爲天下裂註裂分離也道術流弊遂各奮其方或以主物則物離性以從其上而性命喪矣疏裂分離也儒墨名法相爲馳騖各私所見咸率已情道術紛紜更相倍譎遂使蒼生措心無所分離一性實此之由也不侈於後世不靡於萬物不暉於數度註勤儉則瘁故不暉也疏侈奢也靡麗也暉明也教於後世不許奢華物我窮儉未嘗綺麗旣乖物性教法不行故於先王典禮不得顯明於世也以繩墨自矯註矯厲也疏矯厲也用仁義爲繩墨以勉厲其志行也而備世之急註勤而儉則財有餘故急有備疏世急者謂陽九百六水火之災也勤儉節用儲積財物以備世之凶災急難也古之道術有在於是者墨翟禽滑釐聞其風而悅之爲之大過已之大循註不復度眾所能也疏循順也古之道術禹治洪水勤儉枯槁其迹尙在故言有在於是者姓禽字滑釐墨翟弟子也墨翟滑釐性好勤儉聞禹風教深悅愛之務爲此道勤苦過甚適周已身自順未堪教被於人矣作爲非樂命之曰節用生不歌死無服疏非樂節用是墨子二篇書名也生不歌故非樂死無服故節用謂無衣衾棺槨等資葬之服言其窮儉惜費也墨子氾愛兼利而非鬭註夫物不足則以鬭爲是今墨子令百姓皆勤儉各有餘故以鬭爲非也疏普汜兼愛利益羣生使各自足故無鬬爭以鬬爭爲非也其道不怒註但自刻也疏克已勤儉故不怨怒於物也又好學而博不異註旣自以爲是則欲令萬物皆同乎已也疏墨子又好學博通墳典已旣勤儉欲物同之也不與先王同毁古之禮樂註先王則恣其羣異然後同焉皆得而不知所以得也疏禮則節文隆殺樂則鍾鼓羽毛嫌其侈麗奢華所以毁棄不用黃帝有咸池堯有大章舜有大韶禹有大夏湯有大濩文王有辟雍之樂武王周公作武疏已上是五帝三王樂名也古之喪禮貴賤有儀上下有等天子棺槨七重諸侯五重大夫三重士再重疏自天王已下至于士庶皆有儀法悉有等級斯古之禮也今墨子獨生不歌死不服桐棺三寸而無椁以爲法式以此教人恐不愛人以此自行固不愛已註皆以任力稱情爲愛今以勤儉爲法而爲之大過雖欲饒天下更非所以爲愛也疏師於禹迹勤儉過分上則乖於三王下則逆於萬民故生死勤窮不能養於外物形容枯槁未可愛於已身也未敗墨子道註但非道德疏末無也翟性尹老之意也雖然歌而非歌哭而非哭樂而非樂是果類乎註雖獨成墨而不類萬物之情疏夫生歌死哭人倫之常理凶哀吉樂世物之大情今乃反此故非徒類矣其生也勤其死也薄其道大觳註觳無潤也疏觳無潤也生則勤苦身心死則資葬儉薄其爲道乾觳無潤也使人憂使人悲其行難爲也恐其不可以爲聖人之道註夫聖人之道悅以使民民得性之所樂則則悅悅天下無難矣疏夫聖人之道得百姓之歡心今乃使物憂悲行之難久又無潤澤故不可以教世也反天下之心天下不堪墨子雖獨能任奈天下何離於天下其去王也遠矣註王者必合天下之懽心而與物俱往也疏夫王天下者必須虛心忘已大順羣生今乃毁皇王之法反黔首之性其於主物不亦遠乎墨子稱道曰昔禹之湮洪水决江河而通四夷九州也名川三百支川三千小者無數疏湮塞也昔堯遭洪水命禹治水寘塞隄防通决川瀆救百六之災以播種九穀也禹親自操橐耜而九雜天下之川疏橐盛土器也耜掘土具也禹捉耜掘地操橐負土躬自辛苦以導川原於是舟檝往來九州雜易又解古者字少以滌爲盪川爲原凡經九度言九雜也又本作鳩者言鳩雜川谷以導江河也腓無胈脛無毛沐甚雨櫛疾風置萬國禹大聖也而形勞天下也如此註墨子徒見禹之形勞耳未覩其性之適也疏通導百川安置萬國聞啟之泣無暇暫看三過其門不得看子賴驟雨而洒髮假疾風而梳頭勤苦執勞形容毁悴遂使腓股無肉膝脛無毛禹之道聖尙自艱辛况我凡庸而不勤苦使後世之墨者多以裘褐爲衣以跂蹻爲服日夜不休以自苦爲極註謂自苦爲盡理之法疏裘褐粗衣也木曰跂草曰蹻也後世墨者翟之弟子也裘褐跂蹻儉也日夜不休力也用此自苦爲理之妙極也曰不能如此非禹之道也不足謂墨註非其時而守其道所以爲墨也疏墨者禹之陳迹也故不能勤苦乖於禹道者不可謂之墨也相里勤之弟子五侯之徒南方之墨者苦獲已齒鄧陵子之屬俱誦墨經而倍譎不同相謂别墨註必其各守所見則所在無通故於墨之中又相與别也疏姓相里名勤南方之墨師也苦獲五侯之屬並是學墨人也譎異也俱誦墨經而更相倍異相呼爲别墨以堅白同異之辯相訾以觭偶不仵之辭相應以巨子爲聖人註巨子最能辨其所是以成其行疏訾毁也巨大也獨唱曰觭音奇對辯曰偶仵倫次也言鄧陵之徒然蹈墨術堅執堅白各炫已能合異爲同析同爲異或獨唱而寡和或賓主而往來以有無是非之辯相毁用無倫次之辭相應勤儉甚者號爲聖人皆願爲之尸註尸者主也冀得爲其後世至今不决註爲欲係巨子之業也疏咸願爲師主庶傳業將來對爭勝負不能决定也墨翟禽滑釐之意則是註意在不侈靡而備世之急斯所以爲是其行則非也註爲之太過故也疏意在救物所以是也勤儉太過所以非也將使後世之墨者必自苦以腓無胈脛無毛相進而已矣疏進過也後世學徒執墨陳迹精苦自勵意在過人也亂之上也註亂莫大於逆物而傷性也治之下也註任眾適性爲上今墨反之故爲下疏墨子之道逆物傷性故是治化之下術荒亂之上首也雖然墨子眞天下之好也註爲其眞好重聖賢不逆也但不可以教也將求之不得也註無輩雖枯槁不舍也註所以爲眞好也疏字內好儉一人而已求其輩類竟不能得顦顇如此終不休廢率性眞好非矯爲也才士也夫註非有德也疏夫歎也逆物傷性誠非聖賢亦勤儉救世才能之士耳不累於俗不飾於物不苟於人不忮於眾註忮逆也疏於俗無患累於物無矯飾於人無苟且於眾無逆忮立於名行以養蒼生也願天下之安寧以活民命人我之養畢足而止註不敢望有餘也以此白心古之道術有在於是者疏每願宇內清夷濟活黔首物我儉素止分知足以此教迹清白其心古術有在相傳不替矣宋鈃尹文聞其風而悅之疏姓宋名鈃姓尹名文並齊宣王時人同游稷下宋著書一篇尹著書二篇咸師於墨而爲之名也性與教合故聞風悅愛作爲華山之冠以自表註華山上下均平疏華山其形如削上下均平而宋尹立志清高故爲冠以表德之異接萬物以别宥爲始註不欲令相犯錯疏宥區域也始本也置立名教應接人間而區别萬有用斯爲本也語心之容命之曰心之行疏命名也發語吐辭每令心容萬物卽名此容受而爲心行以聏合驩以調海內註强以其道聏令合調令和也請欲置之以爲主註二子請得若此者立以爲物主也疏聏和也用斯名教和調四海庶令同合以得驩心置立此人以爲物主也見侮不辱註其於以活民爲急也救民之鬥禁攻寢兵救世之戰註所謂聏調疏寢息也防禁攻伐止息干戈意在調和不許戰鬥假令欺侮不以爲辱意在救世所以然也以此周行天下上說下教雖天下不取强聒而不舍者也註聏調之理然也疏用斯教迹行化九州上說君王下教百姓雖復物不取用而强勸喧聒不自廢舍也故曰上下見厭而强見也註所謂不辱疏雖復物皆厭賤猶自强見勸他所謂被人輕侮而不耻辱也雖然其爲人太多其自爲太少註不因其自化而强以慰之則其功太重也疏夫達道聖賢感而後應先存諸已後存諸人今乃勤强勸人被厭不已當身枯槁豈非自爲太少乎曰請欲固置五升之飯足矣註斯明自爲之大少也先生恐不得飽弟子雖飢不忘天下註宋鈃尹文稱天下爲先生自稱爲弟子也疏宋尹稱黔首爲先生自謂爲弟子先物後已故也坦然之迹意在勤儉置五升之飯爲一日之食唯恐百姓之飢不慮已身之餓不忘天下以此爲心勤儉故養蒼生也用斯作法晝夜不息矣日夜不休曰我必得活哉註謂民亦當報已也圖傲乎救世之士哉註揮斥高大之貌疏圖傲高大之貌也言其强力忍垢接濟黎元雖未合道可謂救世之人也曰君子不爲苛察註務寬恕也疏夫賢人君子恕已寬容終不用取捨之心苟且伺察於物也不以身假物註必自出其力也疏立身求已不必假物以成名也以爲無益於天下者明之不如已也註所以爲救世之士也疏已止也苦心勞形乖道逆物旣無益於宇內明不如止而勿行以禁攻寢兵爲外疏爲利他外行也以情欲寡淺爲內疏爲自利內行也其大小精粗其行適至是而止註未能經虛涉曠疏自利利他內外兩行雖復大小有異精粗稍殊而立趨維綱不過適是而已矣公而不黨易而無私决然無主註各自任也疏公正而不阿黨平易而無偏私依理斷决無的主宰所謂法者其在於斯趣物而不兩註物得所趣故一疏意在理趣而於物無二也不顧於慮不謀於知於物無擇與之俱往疏依理用法不顧前後斷决正直無所懼慮亦不運知法外謀謨守法而往酷而無擇古之道術有在於是者疏自五帝已來有以法爲政術者故有可尙之迹而猶在乎世彭蒙田駢愼到聞其風而悅之疏姓彭名蒙姓田名駢姓愼名到並齊之隱士俱游稷下各著書數篇性與法合故聞風悅愛也齊萬物以爲首曰天能覆之而不能載之地能載之而不能覆之大道能包之而不能辯之知萬物皆有所可有所不可故曰選則不徧註都用乃周疏夫天覆地載各有所能大道包容未嘗辯說故知萬物有可不可隨其性分但當任之若欲揀選必不周徧也教則不至註任其性乃至道則無遺者矣疏異物不同禀性各異以此教彼良非至極若率玄道則物皆自得而無遺失矣是故愼到棄知去已而緣不得已泠汰於物以爲道理註泠汰猶聽放也疏泠汰猶揀鍊也息慮棄知忘身去已機不得已感而後應揀鍊是非據法斷决愼到守此用爲道理曰知不知將薄知而後鄰傷之者也註謂知力淺不知任其自然故薄之而後鄰傷焉疏鄰近也夫知則有所不知故薄淺其知雖復薄知而未能都忘故猶近傷於理謑髁無任而笑天下之尙賢也註不肯當其任而任夫眾人眾人各自能則無爲橫復尙賢也疏謑髁不定貌也隨物順情無的任用物各自得不尙賢能故笑之也縱脫無行而非天下之大聖註欲壤其迹使物不殉疏縱恣脫略不爲仁義之德行忘遺陳迹故非宇內之聖人也椎拍輐斷與物宛轉註法家雖妙猶有椎拍故未泯合疏椎拍笞撻也輐斷行刑也宛轉變化也復能打拍刑戮而隨順時代故能與物變化而不固執之者也舍是與非苟可以免疏不固執是非苟且免於當世之爲也不師知慮不知前後註不能知是之與非前之與後睧目恣性苟免當時之患也疏不師其成心不運用知慮亦不瞻前顧後矯性爲情直舉宏網順物而已魏然而已矣註任性獨立疏魏然不動之貌也雖復處俗同塵而魏然獨立也推而後行曳而後往註所謂緣於不得已疏推而曳之緣不得已感而後應非先唱也若飄風之還若羽之旋若所石之隧全而無非動靜無過未嘗有罪疏磨磑也隧轉也如飄風之回如落羽之旋若磑石之轉三者無心故能全得是以無是無非無罪無過無情任物故致然也是何故疏假設疑問以顯其能夫無知之物無建已之患無用知之累動靜不離於理是以終身無譽註患生於譽譽生於有建疏夫物莫不耽滯身已建立功名運用心知没溺前境今磨磑等行藏任物動靜無心恒居妙理患累斯絶是以終於天命無咎無譽也故曰至於若無知之物而已無用賢聖註唯聖人然後能去知與故循天之理故愚知處宜貴賤當位賢不肖襲情而云無用賢聖所以爲不知道也夫塊不失道註欲令去知如土塊也亦爲凡物云云皆無緣得道道非遍物也疏貴尙無知情同瓦石無用賢聖闇若夜游遂如土塊名爲得理愼到之惑其例如斯豪桀相與笑之曰愼到之道非生人之行而至死人之理註夫去知任性然後神明洞照所以爲賢聖也而云土塊乃不失道人若土塊非死如何豪桀所以笑也疏夫得道賢聖照物無心德合二儀明齊三景今乃以土塊爲道與死何殊旣無神用非生人之行也是以英儒贍聞玄通豪桀知其乖理故嗤笑之適得怪焉註未合至道故爲詭怪疏不合至道者適爲其怪也田駢亦然學於彭蒙得不教焉註得自任之道也疏田駢愼到禀業彭蒙縱任放誕無所教也彭蒙之師曰古之道人至於莫之是莫之非而已矣註所謂齊萬物以爲首其風窢然惡可而言註逆風所動之聲疏窢然迅速貌也古者道人虛懷忘我指爲天地無復是非風教窢然隨時過去何可留其聖迹執而言之也常反人不聚觀註不順民望疏未能大順羣品而每逆忤人心亦不能致蒼生之稱其瞻望也而不免於魭斷註雖立法而魭斷無圭角也疏魭斷無圭角貌也雖復立法施化而未能大齊萬物故不免於魭斷也其所謂道非道而所言之韙不免於非註韙是也疏韙是也愼到所謂爲道者非正道也所言爲是者不是也故不免於非也彭蒙田駢愼到不知道註道無所不在而云土塊乃不失道所以爲不知疏雖復習尙虛忘以無心爲道而未得圓照故不知也雖然槩乎皆嘗有聞者也註但不至也疏彭蒙之類雖未體眞而志尙知略有梗槩更相師祖皆有禀承非獨臆斷故嘗有聞之也以本爲精以物爲粗疏本無也物有也用無爲妙道爲精用有爲事物爲粗以有積爲不足註寄之天下乃有餘也澹然獨與神明居古之道術有在於是者疏貪而儲積心常不足知足止分故清廉虛澹絶待獨立而精神道無不在自古有之也關尹老聃聞其風而悅之疏姓尹名喜字公度周平王時函谷關令故爲之關尹也姓李名耳字伯陽外字老聃卽尹喜之師老子也師資唱和與理相應故聞無爲之風而悅愛之也建之以常無有註夫無有何所能建建之以常無有則明有物之自建也主之以太一註自天地以及羣物皆各自得而已不兼他飾斯非主之以太一邪疏太者廣大之名一以不二爲稱言大道曠蕩無不制圍括囊萬有通而爲一故謂之太一也建立言教每以凝常無物爲宗悟其指歸以虛通太一爲主斯蓋好儉以勞形質未可以教他人亦無勞敗其道術也以濡弱謙下爲表以空虛不毁萬物爲實疏表外也以柔弱謙和爲權智外行以空惠圓明爲實智內德也關尹曰在已无居註物來則應應而不藏故功隨物去疏成功弗居推功於物用此在已而修其身也形物自著註不自是而委萬物故物形各自彰著疏委任萬物不伐其功故彼之形性各自彰著也其動若水其靜若鏡其應若響註常無情也疏動若水流靜如縣鏡其逗機也似響應聲動靜無心神用故速芴乎若亡寂乎若清同焉者和得焉者失註常全者不知所得也疏芴忽也亡無也夫道非有非無不清不濁故闇忽似無體非無也靜寂如清也是已同靡清濁和蒼生之淺見也遂以此清虛無爲而爲德者斯喪道矣未嘗先人而常隨人疏和而不唱也老聃曰知其雄守其雌爲天下谿知其白守其辱爲天下谷註物各自守其分則靜默而已無雄白也夫雄白者非尙勝自顯者邪尙勝自顯豈非逐知過分以殆其生邪故古人不隨無崖之知守其分內而已故其性全其性全然後能及天下能及天下然後歸之如谿谷也疏夫英雄俊傑進躁所以夭年雌柔謙下退靜所以長久是以去彼顯白之榮華取此韜光之屈辱斯乃學道之樞機故爲宇內之谿谷也而谿谷俱是川壑但谿小而谷大故重言耳人皆取先已獨取後註不與萬物爭鋒然後天下樂推而不厭故後其身疏俗人皆尙勝趨先大聖獨謙卑處後故道經云後其身而身先故也曰受天下之垢註雌辱後下之類皆物之所謂垢疏退身居後推物在先斯受垢辱之者人皆取實註唯知有之以爲利未知無之以爲用疏貪資貨也已獨取虛註守沖泊以待羣實疏守沖寂也無藏也故有餘註付萬物使各自守故不患其少疏藏積也知足守分散而不積故有餘巋然而有餘註獨立自足之謂疏巋然獨立之謂也言清廉潔已在物至稀獨有聖人無心而已其行身也徐而不費註因民所利而行之隨四時而成之常與道理俱故無疾無費也疏費損也夫達道之人無近恩惠食苟簡之田立不貸之圃從容閑雅終不損已爲於物耳以此爲行而養其身也無爲也而笑巧註巧者有爲以傷神器之自成故無爲者因其自生任其自成萬物各得自爲蜘蛛猶能結網則人人自有所能矣無貴於工倕也疏率性而動淳朴無爲嗤彼俗人機心巧僞也人皆求福已獨曲全註委順至理則常全故無所求福福已足曰苟免於咎註隨物故物不得咎也疏咎禍也俗人愚迷所爲封執但知求福不能慮禍唯大聖虛懷委曲隨物保全生道且免災殃以深爲根註理根於太初之極不可謂之淺也以約爲紀註去甚泰也疏以深玄爲德之本根以儉約爲行之綱紀曰堅則毁矣註夫至順則雖金石無堅也迕逆則雖水氣無耎也至順則全迕逆則毁斯正理也銳則挫矣註進躁無崖爲銳疏毁損堅剛之行挫止貪銳之心故道經云挫其銳常寬容於物註各守其分則自容有餘不削於人註全其性也疏退已謙和故寬容於物知足守分故不侵削於人也可謂至極關尹老聃乎古之博大眞人哉疏關尹老子古之大聖窮微極妙冥眞合道教則浩蕩而宏博理則廣大而深玄莊子庶幾故有斯歎也寂漠無形變化無常註隨物也疏妙本無形故寂漠也迹隨物化故無常也死與生與天地並與神明往與註任化也疏以死生爲晝夜故將二儀並也隨造化而轉變故共神明往矣芒乎何之忽乎何適註無意趣也疏委自然而變化隨芒忽而敖游旣無情於去取亦任命而之適萬物畢羅莫足以歸註故都任置疏包羅庶物囊括宇內未嘗離道何處歸根古之道術有在於是者莊周聞其風而悅之以謬悠之說荒唐之言無端崖之辭時恣縱而不儻不以觭見之也註不急欲使物見其意疏謬虛也悠遠也荒唐廣大也恣縱猶放任也觭不偶也而莊子應世挺生冥契玄道故能致虛遠深宏之說無涯無緒之談隨時放任而不偏黨和炁混俗未嘗觭介也以天下爲沉濁不可與莊語註累於形名以莊語爲狂而不信故不與也疏莊語猶大言也宇內黔黎沉滯闇濁咸溺於小辯未可與說大言也以巵言爲曼衍以重言爲眞以寓言爲廣疏巵言不定也曼衍無心也重尊老也寓寄也夫巵滿則傾巵空則仰故以巵器以況至言而耆艾之談體多眞實寄之他人其理深廣則鴻蒙雲將海若之徒是也獨與天地精神往來而不敖倪於萬物註其言通至理正常萬物之性命疏敖倪猶驕矜也抱眞精之智運不測之神寄迹域中生來死往謙和順物固不驕矜不譴是非註已無是非故恣物而行以與世俗處註形羣於物疏譴責也是非無主不可窮責故能混世揚波處於塵俗也其書雖瑰瑋而連犿無傷也註還與物合故無傷也疏瑰瑋宏壯也連犿和混也莊子之書其旨高遠言猶涉俗故合物而無傷其辭雖參差而諔詭可觀註不唯應當時之務故參差疏參差者或虛或實不一其言也諔詭猶滑稽也雖寓言託事時代參差而諔詭滑稽甚可觀閱也彼其充實不可以已註多所有也疏已止也彼所著書辭清理遠括囊無實富贍無窮故不止極也上與造物者遊而下與外死生無終始者爲友疏乘變化而遨遊交自然而爲友故能混同生死冥一始終本妙迹粗故言上下其於本也弘大而闢深閎而肆其於宗也可謂調適而上遂矣疏闢開也弘大也閎亦大也肆申也遂達也言至本深大申暢開通眞宗調適上達玄道也雖然其應於化而解於物也疏言此莊書雖復諔詭而應機變化解釋物情莫之先也其理不竭其來不蛻疏蛻脫捨也妙理虛玄應無窮竭而機來感已終不蛻而捨之也芒乎昧乎未之盡者註莊子通以平意說已與說他人無異也案其辭明爲汪汪然禹拜昌言亦何嫌乎此也疏芒昧猶窈冥也言莊子之書窈窕深遠芒昧恍忽視聽無辯若以言象徵求未窮其趣也惠施多方其書五車其道舛駁其言也不中疏舛差殊也駁雜揉也旣多方術書有五車道理殊雜而不純言辭雖辯而無當也歷物之意疏心遊萬物歷覽辯之曰至大無外謂之大一至小無內謂之小一疏囊括無外謂之大也入於無間謂之小也雖復大小異名理歸無二故曰一也無厚不可積也其大千里疏理旣精微搏之不得妙絶形色何厚之有故不可積而累之也非但不有亦乃不無有無相生故大千里也天與地卑山與澤平疏夫物情見者則天高而地卑山崇而澤下今以道觀之則山澤均平天地一致矣齊物云莫大於秋豪而太山爲小卽其義也日方中方睨物方生方死疏睨側視也居西者呼爲中處東者呼爲側則無中側也猶生死也生者以死爲死死者以生爲死日旣中側不殊物亦死生無異也大同而與小同異此之謂小同異疏物情分别見有同異此小同異也萬物畢同畢異此之謂大同異疏死生交謝寒暑遞遷形性不同體理無異此大同異也南方無窮而有窮疏知四方無窮會有物也形不盡形色不盡色形與色相盡也知不窮知物不窮物窮與物相盡也只爲無厚故不可積也獨言南方舉一隅三可知也今日適越而昔來疏夫以今望昔所以有今以昔望今所以有昔而今自非今何能有昔昔自非昔豈有今哉旣其無昔無今故曰今日適越而昔來可也連環可解也疏夫環之相貫貫於空處不貫於環也是以兩環貫空不相涉入各自通轉故可解者也我知天下之中央燕之北越之南是也疏夫燕越二邦相去迢遞人情封執各是其方故燕北越南可爲天中者也氾愛萬物天地一體也疏萬物與我爲一故氾愛之二儀與我並生故同體也惠施以此爲大觀於天下而曉辯者疏惠施用斯道理自以爲最觀照天下曉示辯人也天下之辯者相與樂之疏愛好旣同情性相感故域中辯士樂而學之也卵有毛疏有無二名咸歸虛寂俗情執見謂卵無毛名謂旣空有毛可也雞三足疏數之所起自虛從無從無適有三名斯立是知二三竟無實體故雞之二足可名爲三雞足旣然在物可見者也郢有天下疏郢楚都也在江陵北七十里夫物之所居皆有四方是以燕北越南可謂天中故楚都于郢地方千里何妨卽作天下觀邪犬可以爲羊疏名無得物之功物無應名之實名實不定可呼犬爲羊鄭人謂玉未理者爲璞周人謂鼠未腊者亦曰璞故形在於物名在於人也馬有卵疏夫胎卵濕化人情分别以道觀者未始不同鳥卵旣有毛獸胎何妨名卵也丁子有尾疏楚人呼蝦蟆爲丁子也夫蝦蟆無尾天下共知此蓋物情非關至理以道觀之者無體非無非無尙得稱無何妨非有可名尾也火不熱疏火熱水冷起自物情據理觀之非冷非熱何者南方有食火之獸聖人則入水不濡以此而言固非冷熱也又譬杖加於體而痛發於人人痛杖不痛亦猶火加體而熱發於人人熱火不熱也山出口疏山本無名山名出自人口在山旣爾萬法皆然也輪不蹍地疏夫車之運動輪轉不停前迹已過後塗未至除卻前後更無蹍時是以輪雖運行竟不蹍於地也猶肇論云旋嵐偃嶽而常靜江河競注而不流野馬飄鼓而不動日月歷天而不周復何怪哉復何怪哉目不見疏夫目之見物必待於緣緣旣體空故知目不能見之者也指不至至不絶疏夫以指指物而非指故指不至也無目指得物故至不絶者也龜長於蛇疏夫長短相形則無長無短謂蛇長龜短乃是物之滯情今欲遣此昏迷故云龜長於蛇也矩不方規不可以爲圓疏夫規圓矩方其來久矣而名謂不定方圓無實故不可也鑿不圍枘疏鑿者孔也枘者內孔中之木也然枘入鑿中木穿空處不關涉故不能圍此猶連環可解義也飛鳥之景未嘗動也疏過去已滅未來未至過未之外更無飛時推鳥與影嶷然不動是知世間卽體皆寂故論云然則四象風馳璇璣電卷得意豪微雖遷不轉所謂物不遷者也鏃矢之疾而有不行不止之時疏鏃矢耑也夫幾發雖速不離三時無異輪行何殊鳥影旣不蹍不動鏃矢豈有止有行亦如利刀割三條絲其中亦有過去未來見在之者也狗非犬疏狗之與犬一物兩名名字旣空故狗非犬也狗犬同實異名名實合則彼謂狗此謂犬也名實離則彼謂狗異於犬也墨子曰狗犬也然狗非犬也黃馬驪牛三疏夫形非色色非形故一馬一牛以之爲二添馬之色而可成三曰黃馬曰驪牛曰黃驪形爲三也亦猶一與言爲二二與一爲三者也白狗黑疏夫名謂不實形色皆空欲反執情故指白爲黑也孤駒未嘗有母一尺之捶日取其半萬世不竭疏捶杖也取折也問曰一尺之杖今朝折半逮乎後夕五寸存焉兩日之間捶當窮盡此事顯著豈不竭之義乎答曰夫名以應體體以應名故以名求物物不能隱也是以執名責實名曰尺捶每於尺取何有窮時若於五寸折之便虧名理乃曰半尺豈是一尺之義邪辯者以此與惠施相應終身無窮桓團公孫龍辯者之徒疏姓桓名團姓公孫名龍並趙人皆辯士也客游平原君之家而公孫龍著守白論見行於世用此上來尺捶言更相應和以斯卒歲無復窮已飾人之心易人之意疏縱兹玄辯彫飾人心用此雅辭改易人意能勝人之口不能服人之心辯者之囿也疏辯過於物故能勝人之口言未當理故不服人之心而辯者之徒用爲苑囿又解囿域也惠施之言未宜於理所詮限域莫出於斯者也惠施曰以其知與人之辯特與天下之辯者爲怪此其柢也疏特獨也字亦有作將者怪異也柢體也惠子曰用分别之知共人評之獨將一已與天地殊異雖復姦狡萬端而本體莫過於此然惠施之口談自以爲最賢疏然猶如此也言惠施解理亞乎莊生加之口談最賢於眾豈似諸人直辯而已曰天地其莊乎施存雄而無術疏壯大也術道也言天地與我並生不足稱大意在雄俊超世過人旣不謙柔故無眞道而言其壯者猶獨壯也南方有倚人焉曰黃繚問天地所以不墜不陷風雨雷霆之故疏住在南方姓黃名繚不偶於俗羈異於人游方之外賢士者也聞惠施聰辯故來致問問二儀長久風雨雷霆動靜所發起何端緒惠施不辭而應不慮而對疏意氣雄俊言辯縱橫是以未辭謝而應機不思慮而對答者也徧爲萬物說說而不休多而無已猶以爲寡益之以怪疏徧爲陳說萬物根由並辯二儀雷霆之故不知休止猶嫌簡約故加奇怪以騁其能者也以反人爲實而欲以勝人爲名是以與眾不適也疏以反人情曰爲實道每欲超勝群物出眾爲心意在聲名故不能和適於世者也弱於德强於物其塗隩矣疏塗道也德術甚弱於物極强自言道理異常深隩也由天地之道觀惠施之能其猶一蚊一蝱之勞者也其於物也何庸疏由從也庸用也從二儀生成之道觀惠施化物之能無異乎蚊蝱飛空鼓翅喧擾徒自勞倦曾何足云益物之言便成無用者也夫充一尙可曰愈貴道幾矣疏幾近也夫惠施之辯詮理不弘於萬物之中尙可充一數而已而欲銳情貴道飾意近眞慤而論之良未可也惠施不能以此自寧散於萬物而不厭卒以善辯爲名疏卒終也不能用此玄道以自安寧而乃散亂精神高談萬物竟無道存目擊卒有辯者之名耳惜乎惠施之才駘溢而不得逐萬物而不反是窮響以聲形與影競走也悲夫註昔吾未覽莊子嘗聞論者爭夫尺捶連環之意而皆云莊生之言遂以莊生爲辯者之流案此篇較評諸子至於此章則曰其道舛駁其言不中乃知道聽塗說之傷實也吾意亦謂無經國體致眞所謂無用之談也然膏粱之子均之戲豫或倦於典言而能辯名析理以宣其氣以係其思流於後世使性不邪淫不猶賢於博奕者乎故存而不論以貽好事也疏駘放也痛惜惠施有才無道放蕩辭辯不得眞原馳逐萬物之末不能反歸於妙本夫得理莫若忘知反本無過息辯今惠子役心術求道縱河瀉以素眞亦何異乎欲逃響以振聲將避影而疾走者也洪才若此深可悲傷也
