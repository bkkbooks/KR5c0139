body:
  text: 南華眞經周莊周著河南郭象注唐西華法師成玄英疏雜篇寓言第二十七寓言十九註寄之他人則十言而九見信疏寓寄也世人愚迷妄爲猜忌聞道已說則起嫌疑寄之他人則十言而信九矣故鴻蒙雲將肩吾連叔之類皆寓言耳重言十七註世之所重則十言而七見信疏重言長老鄉閭尊重者也老人之言猶十信其七也巵言日出和以天倪註夫巵滿則傾空則仰非持故也况之於言因物隨變唯彼之從故曰日出日出謂日新也日新則盡其自然之分自然之分盡則和也疏巵酒器也日出猶日新也天倪自然之分也和合也夫巵滿則傾巵空則仰空滿任物傾仰隨人無心之言卽巵言也是以不言言而無係傾仰乃合於自然之分也又解巵支也支離其言言無的當故謂之巵言耳寓言十九藉外論之註言出於已俗多不受故借外耳肩吾連叔之類皆所借者也疏籍假也所以寄之也人十言九信者爲假託外人論說之也親父不爲其子媒親父譽之不若非其父者也註父之譽子誠多不信然時有信者輒以常嫌見疑故借外論也疏媒媾合也父談其子人多不信別人譽之信者多矣非吾罪也人之罪也註已雖信而懷常疑者猶不受寄之彼人則信之人之聽有斯累也疏吾父也非父談子不實而聽者妄起嫌疑致不信之過也與已同則應不與已同則反註互相非也疏夫俗人顚倒妄爲臧否與已同見則應而爲是與已不同則反而非之同於已爲是之異於已爲非之註三異同處而二異訟其所取是必於不訟者俱異耳而獨信其所是非借外如何疏夫迷執同異妄見是非同異旣空是非滅矣重言十七所以已言也是爲耆艾註以其耆艾故俗共重之雖使言不借外猶十信其七疏耆艾夀考者之稱也已自言之不藉於外爲是長老故重而信之流俗之人有斯迷妄也年先矣而无經緯本末以期年耆者是非先也註年在物先耳其餘本末無以待人則非所以先也期待也疏期待也上下爲經傍通曰緯言此人直置以年老居先亦無本末之智故待以耆宿之禮非關道德可先也人而无以先人无人道也人而无人道是之謂陳人註直是陳久之人耳而俗便共信之此俗之所以爲安故而習常也疏無禮義以先人無人倫之道也直是陳久之人故重之耳世俗無識一至於斯巵言日出和以天倪因以曼衍所以窮年註夫自然有分而是非無主無主則曼衍矣誰能定之哉故曠然無懷因而任之所以各終其天年疏曼衍無心也隨日新之變轉合天然之倪分故能因循萬有接物無心所以窮造化之天年極生涯之遐夀也不言則齊疏夫理處無言言則乖當故直置不言而物自均等也齊與言不齊疏齊不言也不言與言旣其不一故不齊也言與齊不齊也註付之於物而就用其言則彼此是非居然自齊若不能因彼而立言以齊之則我與萬物復不齊耳故曰無言註言彼所言故雖有言而我竟不言也疏夫以言遣言言則無盡縱加百非亦未偕妙唯當凝照聖人智冥動寂出處默語其致一焉故能無言則言言則無言也豈有言與不言之別齊與不齊之異乎故曰言無言也言无言終身言未嘗言註雖出吾口皆彼言耳終身不言未嘗不言註據出我口疏此復解前言無言義有自也而可有自也而不可有自也而然有自也而不然疏夫各執自見故有可有然自他旣空然可斯泯惡乎然然於然惡乎不然不然於不然惡乎可可於可惡乎不可不可於不可註自由也由彼我之情偏故有可不可疏惡乎猶於何也自他並空物我俱幻於何處而有可不可於何處有然不然以此推窮然可自息斯復解前有自而然可義也物固有所然物固有所可註各自然各自可无物不然无物不可註統而言之則無可無不可無可無不可而至也疏夫俗中之物倒置之徒於無然而固然於不可而執可也非巵言日出和以天倪孰得其久註夫唯言隨物制而任其天然之分者能無夭落疏自非隨日新之變達天然之理者誰能證長生久視之道乎言得之者之至也萬物皆種也以不同形相禪註雖變化相代原其氣則一疏禪代也夫物云云禀之造化受氣一種而形質不同運運遷流而更相代謝始卒若環註於今爲始者於昨已復爲卒也疏物之遷貿譬彼循環死去生來終而復始此出禪代之狀也莫得其倫註理自爾故莫得疏倫理也尋索變化之道竟無理之可致也是謂天均天均者天倪也註夫均齊者豈妄哉皆天然之分疏均齊也此總結以前一章之是謂天然齊等之道卽以齊均之道亦名自然之分也莊子謂惠子曰孔子行年六十而六十化註與時俱也疏夫運運不停新新流謝是以行年六十而與年俱變者也然莊惠相逢好談玄道故遠稱尼父以顯變化之功始時所是卒而非之註時變則俗情亦變乘物以遊心者豈異於俗哉未知今之所謂是之非五十九非也註變者不停是不可常疏夫人之夀命依年而數年旣不定數豈有邪是以去年之是於今非矣故知今年之是還是去歲之非今歲之非卽是來年之是故容成氏曰除日無歲也惠子曰孔子勤志服知也註謂孔子勤志服膺而後知非能任其自化也此明惠子不及聖人之韻遠矣疏服用也惠施未達抑度孔子謂其勵志勤行用心學道故至斯智非自然任化者也莊子曰孔子謝之矣而其未之嘗言註謝變化之自爾非知力之所爲故隨時任物而不造言也疏謝代也而汝也未無也言尼父於勤服之心久已代謝汝宜復靈無復浪言也孔子云夫受才乎大本復靈以生註若役其才知而不復其本靈則生亡矣疏夫人禀受才智於大道妙本復於靈命以盡生涯豈得勤志役心乖於造物此是莊子述孔丘之語訶抵惠施也鳴而當律言而當法註鳴者律之所生言者法之所出而法律者眾之所爲聖人就用之耳故無不當而未之嘗言未之嘗爲也疏鳴聲也當中也尼父聖人與陰陽合德故風韻中於鍾律言教考於模範也哉利義陳乎前而好惡是非直服人之口而已矣註服用也我無言也我之所言直用人之口耳好惡是非利義之陳未始出吾口也疏仁義利害好惡是非逗彼前機應時陳說雖復言出於口而隨前此卽是用眾人之口矣使人乃以心服而不敢蘁立定天下之定註口所以宣心旣用眾人之口則眾人之心用矣我順眾心則眾心信矣誰敢逆立哉吾因天下之自定而定之又何爲乎疏隨眾所宜用其心智教旣隨物物以順之如草從風不敢逆立因其本靜隨性定之故定天下之定也已乎已乎吾且不得及彼乎註因而乘之故無不及疏已止也彼孔子也重勗惠子止而勿言吾徒庸淺不能逮及此是莊子歎美宣尼之言曾子再仕而心再化疏姓曾名參孔子弟子再仕之義列在下文曰吾及親仕三釜而心樂後仕三千鍾而不洎吾心悲註洎及也疏六斗四升曰釜六斛四斗曰鍾洎及也曾參至孝求祿養親故前仕親在祿雖少而歡樂後仕親沒祿雖多而悲悼所謂再化以悲樂易心爲不及養親故也弟子問于仲尼曰若參者可謂无所縣其罪乎註縣係也謂參仕以爲親無係祿之罪也疏縣係也門人之中無的姓諱當是四科十哲之流也曾參仁孝爲親求祿雖復悲樂應無係罪門人疑此咨問仲尼也曰旣已縣矣註係於祿以養也夫无所縣者可以有哀乎註夫養親以適不問其具若能無係則不以貴賤經懷而平和怡暢盡色養之宜矣疏夫孝子事親務在於適無論祿之厚薄盡於色養而已故有庸賃而稱孝子三仕猶爲不孝參旣心存哀樂得無係祿之罪乎夫唯無係者故當無哀樂也彼視三釜三千鍾如觀雀蚊虻相過乎前也註彼謂無係也夫無係者視榮祿若蚊虻鳥雀之在前而過去耳豈有哀樂於其間哉疏彼謂無係之人也鳥雀大以諭千鍾蚊虻小以比三釜達道之人無心係祿千鍾三釜不覺少多猶如鳥雀蚊虻相與飛過于前矣决然而已豈係之哉顔成子游謂東郭子綦曰自吾聞子之言一年而野註外權利也疏居在郭東號曰東郭猶是齊物篇中南郭子綦也子游子綦弟子也野質樸也聞道一年學心未熟稍能樸素去浮華耳二年而從註不自專也疏順於俗也三年而通註通彼我也疏不滯境也四年而物註與物同也疏與物同也五年而來註自得也疏爲眾皈也六年而鬼入註外形骸也疏神會理物七年而天成註無所復爲疏合自然成八年而不知死不知生註所遇皆適而安疏智冥造物神合自然故不覺死生聚散之異也九年而大妙註妙善也善惡同故無往而不冥此言久聞道知天籟之自然將忽然自忘則穢累日去以至於盡耳疏妙精微也聞道日久學心漸著故能超四句絶百非義極重玄理窮眾妙知照宏博故稱大也生有爲死也註生而有爲則喪其生疏處生人道沈溺有爲適歸死滅也勸公以其死也有自也註自由也由有爲故死由私其生故有爲今所以勸公者以其死之由私耳疏公平也自由也所以人生動之死地者猶私愛其生不能公正故勸導也而生陽也无自也註夫生之陽遂以其絶迹無爲而忽然獨爾非有由也疏感於陽氣而有此生旣無所由從故不足私也而果然乎疏果决定也陽氣生物决定如此惡乎其所適惡乎其所不適註然而果然故無適無不適而後皆適皆適而至也疏夫氣聚爲生生不足樂氣散爲死死不足哀生死旣齊哀樂斯泯故於何處而可適於何處而不可適乎所在皆適耳天有歷數地有人據吾惡乎求之註皆已自足疏夫星歷度數玄象麗天九州四極人物依據造化之中悉皆具足吾於何處分外求之也莫知其所終若之何其无命也註理必自終不由於知非命如何疏夫天地晝夜人物死生尋其根由莫知終始時來運去非命如何其無命者言有命也莫知其所始若之何其有命也註不知其所以然而然謂之命似若有意也故又遣命之名以明其自爾而後命理全也疏夫死去生來猶春秋冬夏旣無終始豈其命乎其有命者言無命也此又遣其命也有以相應也若之何其无鬼邪註理必有應若有神靈以致也疏鬼神識也夫耳眼應於聲色心知應於物境義同影響豈無靈乎其無鬼者言其有之也无以相應也若之何其有鬼邪註理自相應相應不由於故也則雖相應而無靈也疏夫人睡中則不知外物雖有眼耳則不應色聲若其有靈如何不應其有鬼者言其無也此又遣其有也眾罔兩問於影曰若向也俯而今也仰向也括而今也被髮向也坐而今也起向也行而今也止何也疏罔兩影外微陰也斯寓言者也若汝也俯低頭也括束髮也汝坐起行止惟形是從以此測量必因形乃有若言不待厥理未詳設此問答以彰獨化耳影曰叟叟也奚稍問也註運動自爾無所稍問疏叟叟無心運動之貌也奚何也影答云我運動無心蕭條自得無所可待獨化而生汝無所知何勞見問也予有而不知其所以註自爾故不知所以疏予我也我所有行止率乎造物皆不知所以悉莫辨其然爾豈有待哉予蜩甲也蛇蛻也似之而非也註影似形而非形疏蜩甲蟬殻也蛇蛻皮也夫蠐螬變化而爲蟬蛇從皮內而蛻出者皆不自覺知也而蠐螬滅於前蟬自生於後非因蠐螬而有蟬蟬亦不待蠐螬而生也蛇皮之義亦復如之是知一切萬有無相因待悉皆獨化僉曰自然故影云我之因待同蛇蛻蜩甲似形有而實非待形者也火與日吾屯也陰與夜吾代也疏屯聚也代謝也有火有日影卽屯聚逢夜逢陰影便代謝若其同形有影故當不待火日陰夜有形而無影將知影必不待形而獨化之理彰也彼吾所以有待邪疏吾所以有待者火日也心其不形火日亦不能生影也故影亦不待於火日也而况乎以有待者乎註推而極之則今之所謂有待者率至於無待而獨化之理彰矣疏况乎有待者形也必無火日形亦不能生影不待形也夫形之生也不用火日影之生也豈待形乎故以火日况之則知影不待形明矣形影尙不相待而况他物乎是知一切萬物悉皆獨化也彼來則我與之來彼往則我與之往彼彊陽則我與之彊陽彊陽者又何以有問乎註直自强陽運動相隨往來耳無意不可問也疏彼者形也强陽運動之貌也夫往來運動形影共時旣無因待咸資獨化獨化之理妙絶名言名言問答其具之矣楊子居南之沛老聃西遊於秦邀於郊至於梁而遇老子疏姓楊名朱字子居之往也沛彭城今徐州是也邀遇也梁國今汴州也楊朱南邁老子西遊邂逅逢於梁宋之地適於郊野而與之言老子中道仰天而歎曰始以汝爲可教今不可也疏昔逢楊子謂有道心今見矜夸知其難教嫌其異俗是以傷嗟也楊子居不答疏自覺已非默然悚愧至舍進盥漱巾櫛脫屨戸外膝行而前疏盥洒也櫛梳也屆逆旅之舍至止息之所於是進水漱洒執持巾櫛肘行膝步盡禮虔恭殷勤請益庶蒙鍼艾也曰向者弟子欲請夫子夫子行不間是以不敢今間矣請問其過疏向被抵訶欲請其過正逢行李未有閒庸今至主人清閒無事庶聞責旨以助將來也老子曰而睢睢盱盱而誰與居註睢睢盱盱跋扈之貌人將畏難而疏遠疏睢盱躁急威權之貌也而汝也跋扈威勢矜莊燿物物皆哀悼誰將汝居處乎大白若辱盛德若不足疏夫人廉潔貞清者猶如汙辱也盛德圓滿者猶如不足也此是老子引道德經以戒子居也陽子居蹴然變容曰敬聞命矣疏蹙然慚悚也旣承教旨驚懼更深稽首虔恭敬奉尊命也其往也舍者迎將其家公執席妻執巾櫛舍者避席煬者避竈註尊形自異故憚而避之也疏將送也家公主人公也煬然火也陽朱往沛正事威容舍息逆旅主人迎送夫執氈席妻捉梳巾先坐之人避席而走然火之者不敢當竈威勢動物一至於斯矣其反也舍者與之爭席矣註去其夸矜故也疏從沛返歸已蒙教戒除其容飾遣其矜夸混迹同塵和光順俗於是舍息之人與爭席而坐矣
