  text: 重刋道藏輯要
  hash: sha256:972c3c5029b24a17e27f2b03a7e86d4422a7e71d4455eb70dca445dd908b9848
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0139_CK-KZ_04p126b, image: JY132/CK-KZ_JY132_04p126b.png}
body:
  text: 南華眞經周莊周著河南郭象註唐西華法師成玄英疏天道第十三天道運而無所積故萬物成疏運動也轉也積滯也蓄也言天道運轉覆育蒼生照之以日月潤之以雨露鼓動陶鑄曾無滯積是以四序回薄萬物生成也帝道運而無所積故天下歸疏王者法天象地運御羣品散而不積施化無方六故合同歸八方款附聖道運而無所積故海內服註此三者皆恣物之性而無所牽滯也疏聖道者玄聖素王之道也隨應垂迹制法立教舟航有識拯濟無窮道合於天德同於帝出處不一故有帝聖二道也而運智救時亦無滯蓄慈造弘博故海內服也明於天通於聖六通四辟於帝王之德者其自爲也昧然無不靜者矣註任其自爲故雖六通四辟而無傷於靜也疏六通謂四方上下也四辟者謂春秋冬夏也夫唯照天道之無爲洞聖情之絶慮通六合以生化順四序以施爲以此而總萬乘可謂帝王之德也任物自動故曰自爲晦迹韜光其猶昧闇動不傷寂故無不靜也聖人之靜也非曰靜也善故靜也註善之乃靜則有時而動也疏夫聖人之所以虛靜者直置形同槁木心若死灰亦不知靜之故靜也若以靜爲善美而有情於爲靜者斯則有時而動矣萬物無足以撓心者故靜也註斯乃自得也疏妙體二儀非有萬境皆空是以參變同塵而無喧撓非由飭勵而得靜也水靜則明燭鬚眉平中准大匠取法焉疏夫水動則波流止便澄靜懸鑒洞照與物無私故能明照鬚眉清而中正治諸褒枉可爲凖的縱使工倕之巧猶須放水取平故老經云上善若水此舉喻前之義水靜猶明而况精神聖人之心靜乎天地之鑒也萬物之鏡也註夫有其具而任其自爲故所照無不洞明疏夫聖人德合二儀智周萬物豈與夫無情之水同日論邪水靜猶明燭鬢眉况精神聖人之心靜乎是以鑒天地之精㣲鏡萬物之玄賾者固其宜矣此合譬也夫虛靜恬淡寂寞無爲者天地之平而道德之至註凡不平不至者生於有爲疏虛靜恬淡寂寞無爲四者異名同實者也歎無爲之美具此四名而天地以此爲平道德用兹爲至也故帝王聖人休焉註未嘗動也疏息慮於靜休則虛虛則實實者倫矣註倫理也疏既休慮息則自與虛空合德與虛空合德則會於眞實會於眞實之道則自然之理也虛則靜靜則動動則得矣註不失其所以動疏理虛靜寂寂而能動斯得之矣靜則無爲無爲也則任事者責矣註夫無爲也則羣才萬品各任其事而自當其責矣故曰巍巍乎舜禹之有天下而不與焉此之謂也疏任事臣也言臣下各有任職之事也夫帝王任智安靜無爲則臣下職任各司憂責斯則主上無爲而臣下有事故冕旒垂目而不與焉無爲則俞俞俞俞者憂患不能處年夀長矣註俞俞然從容自得之貌疏俞俞從容和樂之貌也夫有爲滯境塵累所以嬰其心無爲自得憂患不能處其慮俞俞和樂故年夀長矣夫虛靜恬淡寂寞無爲者萬物之本也註尋其本皆在不爲中來疏此四句萬物根原故重舉前言結成其美也明此以南鄉堯之爲君也明此以北面舜之爲臣也疏夫揖讓之美無出唐虞君臣之盛莫先堯舜故舉二君以明四德雖復南北兩面而平至一焉以此處上帝王天子之德也以此處下玄聖素王之道也註此皆無爲之至也有其道爲天下所歸而無其爵者所謂素王自貴也疏用此無爲而處物上者天子帝堯之德也用此虛淡而居臣下者玄聖素王之道也夫有其道而無其爵者所謂玄聖素王自貴者卽老君尼父是也以此退居而閒游江海山林之士服疏退居謂晦迹隱處也用此道而退居故能游翫山水從容閑樂是以天下隱士無不服從卽巢許之流是也以此進爲而撫世則功大名顯而天下一也註此又其次也故退則巢許之流進則伊望之倫也夫無爲之體大矣天下何所不爲哉故主上不爲冢宰之任則伊吕靜而司尹矣冢宰不爲百官之所執則百官靜而御事矣百官不爲萬民之所務則萬民靜而安其業矣萬民不易彼我之所能則天下之彼我靜而自得矣故自天子以下至于庶人下及昆蟲孰能有爲而成哉是故彌無爲而彌尊也疏進爲謂顯迹出任也夫妙體無爲而同塵降迹者故能撫蒼生於仁夀弘至德於聖朝著莫測之功名顯阿衡之功績是以天下大同車書共軌盡善盡美其唯伊望之倫乎靜而聖動而王註時行則行時止則止無爲也而尊註自然爲物所尊奉疏其應靜也玄聖素王之尊其應動也九五萬乘之貴無爲也而尊出則天子處則素王是知道之所在孰敢不貴也樸素而天下莫能與之爭美註夫美配天者唯樸素也疏夫湻樸素質無爲虛靜者實萬物之根本也故所尊貴孰能與之爭美也夫明白於天地之德者此之謂大本大宗與天和者也註天地以無爲爲德故明其宗本則與天地無逆也疏夫靈府明靜神照潔白而德合於二儀者固可以宗匠蒼生根本萬有冥合自然之道與天和也所以均調天下與人和者也註夫順天所以應人也故天和至而人和盡也疏均平也調順也且應感無心方之影響均平萬有大順物情而混迹同塵故與人和也與人和者謂之人樂與天和者謂之天樂註天樂適則人樂足矣疏俯同塵俗且適人世之歡仰合自然方欣天道之樂也莊子曰吾師乎吾師乎𩐎萬物而不爲戾註變而相雜故曰𩐎自𩐎耳非吾師之暴戾疏𩐎碎也戾暴也莊子以自然至道爲師再稱之者歎美其德言我所師大道亭毒生靈假令𩐎萬物亦無心暴怒故素秋搖落而彫零者不怨此明雖復斷截而非義也澤及萬世而不爲仁註仁者兼愛之名耳無愛故無所稱仁疏仁者偏愛之迹也言大道開闔天地造化蒼生慈澤無窮而不偏愛故不爲仁長於上古而不爲夀註夀者期之遠耳無期故無所稱夀疏豈但長於上古抑乃象帝之先既其不滅不生亦復何夭何夀郭注云夀者期之遠耳覆載天地刻彫眾形而不爲巧註巧者爲之妙耳皆自爾故無所稱巧疏乘二儀以覆載取萬物以刻彫而二儀以生化爲功萬物以自然爲用生化既不假物彫刻豈假他人是以物各任能人皆率性則工拙之名於斯滅矣郭注云巧者爲之妙此之謂天樂註忘樂而樂足疏所在任適結成天樂故曰知天樂者其生也天行其死也物化疏既知天樂非哀樂則知生死無生死故其生也同天道之運行其死也混萬物之變化也靜而與陰同德動而與陽同波疏妙本虛凝將至陰均其寂泊應迹同世與太陽合其波流故知天樂者無天怨無人非無物累無鬼責疏德合於天故無天怨行順於世故無人非我冥於物故物不累我我不負幽顯有何鬼責也故曰其動也天其靜也地註動靜雖殊無心一也疏天地結動靜無心之義也一心定而王天下其鬼不祟其魂不疲註常無心故王天下而不疲病疏境智冥合謂之爲一物不能撓謂之爲定祇爲定於一心故能王於萬國既無鬼責有何禍祟動而常寂故魂不疲勞一心定而萬物服疏一心凝寂者類死灰而靜爲躁君故萬物歸伏言以虛靜推於天地通於萬物此之謂天樂註我心常靜則萬物之心通矣通則服不通則叛疏所以一心定而萬物服者秪言用虛靜之智推尋二儀之理通達萬物之情隨物變轉而未嘗不適故謂之天樂也天樂者聖人之心以畜天下也註聖人之心所以畜天下者奚爲哉天樂而已疏夫聖人之所以降迹同凡合天地之至樂者方欲畜養蒼生亭毒羣品也夫帝王之德以天地爲宗以道德爲主以無爲爲常疏王者宗本於天地故覆載無心君主於道德故生而不有雖復千變萬化而常自無爲盛德如此堯之爲君也無爲也則用天下而有餘註有餘者間暇之謂也有爲也則爲天下用而不足註不足者汲汲然欲爲物用也欲爲物用故可得而臣也及其爲臣亦有餘也疏不足者汲汲之辭有餘者閒暇之謂言君主無爲智照寛曠御用區宇而閒暇有餘臣下有爲情慮狹劣各有職司爲君所用匪懈在公猶恐不足是知無爲有事勞逸殊塗故古之人貴夫無爲也上無爲也下亦無爲也是下與上同德下與上同德則不臣下有爲也上亦有爲也是上與下同道上與下同道則不主註夫工人無爲於刻木而有爲於用斧主上無爲於親事而有爲於用臣臣能親事主能用臣斧能刻木而工能用斧各當其能則天理自然非有爲也若乃主代臣事則非主矣臣秉主用則非臣矣故各司其任則上下咸得而無爲之理至矣疏無爲者君德也有爲者臣道也若上下無爲則臣僭君德上下有爲則君濫臣道君濫臣道則非主矣臣僭君德豈曰臣哉於是上下相混君臣冒亂既乖天然必招危禍故無爲之言不可不察無爲君也古之人貴夫無爲郭注此文甚有辭理上必無爲而用天下下必有爲爲天下用此不易之道也註無爲之言不可不察也夫用天下者亦有用之爲耳然自得此爲率性而動故謂之無爲也今之爲天下用者亦自得耳但居下者親事故雖舜禹爲臣猶稱有爲故對上下則君靜而臣動比古今則堯舜無爲而湯武有事然各用其性而天機玄發則古今上下無爲誰有爲也疏夫處上爲君則必須無爲任物用天下之才能居下爲臣亦當親事有爲稱所司之職任則天下化矣斯乃百王不易之道故古之王天下者知雖落天地不自慮也疏謂三王五帝淳古之君也知照明達籠落二儀而垂拱無爲委之臣下知者爲謀故不自慮也辯雖彫萬物不自說也疏宏辯如流彫飾萬物而付之司牧終不自言也能雖窮海內不自爲也註夫在上者患於不能無爲而代人臣之所司使咎繇不得行其明斷后稷不得施其播植則羣才失其任而主上困於役矣故冕旒垂目而付之天下天下皆得其自爲斯乃無爲而無不爲者也故上下皆無爲矣但上之無爲則用下下之無爲則自用也疏藝術才能冠乎海內任之良佐而不與焉夫何爲焉哉玄默而已故老經云是謂用人之力天不產而萬物化地不長而萬物育註所謂自爾疏天無情於生產而萬物化生地無心於長成而萬物成育故郭注云所謂自然也帝王無爲而天下功註功自彼成疏王者同兩儀之含育順四序以施上任萬物之自爲故天下之功成矣故曰莫神於天莫富於地莫大於帝王疏夫日月明晦雲雷風雨而蔭覆不測故莫神於天囊括川原包容嶽瀆運載無窮故莫富於地位居九五威跨萬乘日月照臨一人總統功德之大莫先王者故老經云域中四大王居其一焉故帝王之德配天地註同乎天地之無爲也疏配合也言聖人之德合天地之無爲此乘天地馳萬物而用人羣之道也疏達覆載之無主是以乘馭兩儀循變化之往來故能驅馳萬物任黔黎之才用用人羣之道也本在於上末在於下疏本道德也末仁義也言道德淳樸治之根本行於上古仁義澆薄治之末藝行於下代故云本在於上末在於下也要在於主詳在於臣疏要簡省也詳繁多也主道逸而簡要臣道勞而繁冗繁冗故有爲而奉上簡要故無爲而御下也三軍五兵之運德之末也疏五兵者一弓二殳三矛四戈五㦸也運動也夫聖明之世則偃武修文逮德下衰則偃文修武偃文修武則五兵動亂偃武修文則四民安業德之本末自此可知也賞罰利害五刑之辟教之末也疏賞者軒冕榮華故利也罰者誅殘戮辱故害也辟法也五刑者一劓二黥三刖四宫五大辟夫道喪德衰浮僞日甚故設刑辟以被黎元旣虧理本適爲教末也禮法度數形名比詳治之末也疏禮法者五禮之法也數者計算度者丈尺形者容儀名者字諱比者校當詳者定審用此等法以養蒼生治乖湻古故爲治末也鍾鼓之音羽旄之容樂之末也疏樂者和也羽者鳥羽旄者獸毛言采鳥獸之羽毛以飾其器也夫帝王之所以作樂者欲下調陰陽上和時俗也古人聞樂卽知國之興亡治世亂世其音各異是知大樂與天地同和非羽毛鍾鼓者也自三代以下澆浪荐興賞鄭衛之淫聲棄雲韶之雅韻遂使羽旄文采盛飾容儀既非咸池之本適是濮水之末哭泣衰絰隆殺之服哀之末也疏絰者實也衰摧也上曰衰下曰裳在首在腰二俱有絰隆殺者言禮有斬衰齊衰大功小功緦麻五等哭泣衣裳各有差降此是教迹外儀非情發於衷故哀之末也此五末者須精神之運心術之動然後從之者也註夫精神心術者五末之本也任自然而運動則五事之末不振而自舉也疏術能也心之所能謂之心術也精神心術者五末之本也言此之五末必須精神心智率性而動然後從於五事卽非矜矯者也末學者古人有之而非所以先也註所以先者本也疏古之人謂中古之人也先本也五末之學中古有之事涉澆僞終非根本也君先而臣從父先而子從兄先而弟從長先而少從男先而女從夫先而婦從疏夫尊卑先後天地之行也故聖人取象焉註言此先後雖是人事然皆在至理中來非聖人之所作也疏天地之行者謂春夏先秋冬後四時行也夫天地雖大尙有尊卑況在人倫而無先後是以聖人象二儀之造化觀四序之自然故能篤君臣之大義正父子之要道也天尊地卑神明之位也春夏先秋冬後四時之序也疏天尊地卑不刊之位春先冬後不易之序舉此二條足明萬物萬物化作萌區有狀疏夫萬物變化未始暫停或起或伏乍生乍死千族萬種色類不同而萌兆區分各有形狀盛衰之殺變化之流也疏夫春夏盛長秋冬衰殺或變生作死或化故成新物理自然非關措意故隨流任物而所造皆適夫天地至神而有尊卑先後之序而况人道乎註明夫尊卑先後之序固有物之所不能無也疏二儀生育有不測之功萬物之中最爲神化尙有尊卑先後况人倫之道乎宗廟尙親朝廷尙尊鄉黨尙齒行事尙賢大道之序也註言非但人倫所尙也疏宗廟事重必據昭穆以嫡相承故尙親也朝廷以官爵尊卑鄉黨以年齒爲次第行事擇賢能用之此理必然故云大道之序語道而非其序者非其道也疏議論道理而不知次第者雖有語言終非道語既失其序不堪治物也語道而非其道者安取道註所以取道爲有序也疏旣不識次第雖語非道於何取道而行之邪是故古之明大道者先明天而道德次之註天者自然也自然既明則物得其道也疏此重開大道次序之義言古之明閑大道之人先明自然之理爲自然是道德之本故道德次之道德已明而仁義次之註物得其道而和理自適也疏失德後仁失仁後義故仁義次之仁義已明而分守次之註理適而不失其分也疏既行兼愛之仁又明裁非之義次令各守其分不相爭奪也分守已明而形名次之註得分而物物之名各當其形也疏形身也各守其分不相傾奪次勸修身致其名譽也形名已明而因任次之註無所復改疏雖復勸令修身以致名譽而皆須因其素分任其天然不可矯性偽情以要令問也因任已明而原省次之註物各自任則罪責除也疏原者恕免省者除廢雖復因任其本性而不無其愆過故宜布之愷澤宥免其辜也原省已明而是非次之註各以得性爲是失性爲非疏雖復赦過宥罪而人心漸薄次須示其是非以爲鑒誡也是非已明而賞罰次之註賞罰者失得之報也夫至治之道本在於天而末極於斯疏是非旣明臧否斯見故賞善罰惡以勗黎元也賞罰已明而愚知處宜貴賤履位註官各當其才也疏用此賞罰以次前序而爲治方者智之明暗安處各得其宜才之高下貴賤咸履其位仁賢不肖襲情註各自行其所能之情疏仁賢智也不肖愚也襲用也主上聖明化導得所雖復賢愚各異而咸用本情終不舍己效人矜夸炫物也必分其能註無相易業疏夫性性不同物物各異藝能固别才用必分使之如噐無不調適也必由其名註名當其實故由名而實不濫也疏夫名以召實而由實故名若使實不當名則名過其實今明名實相稱故云必由其名也以此事上以此畜下以此治物以此修身疏以用也言用以前九法可以爲臣事上爲君畜下外以治物內以修身也知謀不用必歸其天此之謂太平治之至也疏至默無爲委之羣下塞聰閉智歸之自然可謂太平之君至治之美也故書曰有形有名形名者古人有之而非所以先也疏先本也言形名等法蓋聖人之應迹耳不得已而用之非所以先也書者道家之書遭秦世焚燒今檢亦無的據古之語大道者五變而形名可舉九變而賞罰可言也註自先明天以下至形名而五至賞罰而九此自然先後之序也疏夫爲治之體必隨世污隆而世有澆淳故治亦有寬急是以五變九變可舉可言苟其不失次序則是太平至治也驟而語形名不知其本也疏驟數也速也季世之人不知倫序數語形名以爲治術而未體九變以自然悉宗但識其末不知其本也驟而語賞罰不知其始也疏速論賞罰以此馭時唯見枝條未知根本始猶本也互其名耳倒道而言迕道而說者人之所治也安能治人註治人者必順序疏迕逆也不識治方不知次序顚倒道理迕逆物情適可爲物所治豈能治物也驟而語形名賞罰此有知治之具非知治之道註治道先明天不爲棄賞罰也但當不失其先後之序耳疏夫形名賞罰此乃知治之具度非知治之要道也可用於天下不足以用天下此之謂辯士一曲之人也註夫用天下者必大通順序之道疏若以形名賞罰可施用於天下者不足以用於天下也斯乃苟飾華辭浮游之士一節曲見偏執之人未可以議通方悟於大道者也禮法數度形名比詳古人有之此下之所以事上非上之所以畜下也註寄此事於羣才斯乃畜下也疏重疊前語古人有之但寄羣下而不親預故是臣下之術非主上養民之道總結一章之意以明本末之旨歸也昔者舜問於堯曰天王之用心何如疏天王猶天子也舜問於堯爲帝王之法若爲用心以合大道也堯曰吾不敖無告註無告者所謂頑民也疏敖侮慢也無告謂頑愚之甚無堪告示也堯答舜云縱有頑愚之民不堪告示我亦殷勤教誨不敖慢棄舍也故老經云不善者吾亦善之敖亦有作傲字者合不用也不廢窮民註恒加恩也疏百姓之中有貧窮之者每加拯恤此心不替也苦死者嘉孺子而哀歸人疏孺子猶稚子也哀憐也民有死者輒悲苦而慰之稚子小兒婦人孤寡並皆矜慜善嘉養恤也此吾所以用心已疏已止也總結以前問答舜問我之用心止盡於此舜曰美則美矣而未大也疏用心爲治美則美矣其道狹劣未足稱大既領堯答因發此譏堯曰然則何如疏堯旣被譏因兹請益治道之大其術如何舜曰天德而出甯註與天合德則雖出而靜疏化育之方與玄天合德迹雖顯著心恒甯靜日月照而四時行若晝夜之有經雲行而雨施矣註此皆不爲而自然也疏經常也夫日月盛明六合俱照春秋凉暑四序運行晝夜昏明雲行雨施皆天地之大德自然之常道者也旣無心於偏愛豈有情於養育帝王之道其義亦然堯曰膠膠擾擾乎註自嫌有事疏膠膠擾擾皆亂之貌也領悟此言日嫌多事更相發起聊此撝謙子天之合也我人之合也疏堯自謙光推讓於舜故言子之盛德遠合上天我之用心近符人事堯舜二君德無優劣故寄此兩聖以顯方治耳夫天地者古之所大也疏自此已下莊生之辭也夫天覆地載生育羣品域中四大此當二焉故引古證今歎美其大而黃帝堯舜之所共美也疏惟天爲大惟堯則之故知軒頊唐虞皆以德合天地爲共美也故古之王天下者奚爲哉天地而已矣疏言古之懷道帝王何爲者哉蓋無心順物德合二儀而已矣孔子西藏書於周室子路謀曰由聞周之徵藏史有老聃者免而歸居夫子欲藏書則試往因焉疏姓仲名由字子路宣尼弟子也宣尼覩周德已衰不可匡輔故將己所修之書欲藏於周之府藏庶當來君王爲治化之術故與門人謀議詳其可否老君姓李名聃爲周之徵藏史猶今之秘書官職典墳籍見周室版蕩所以解免其官歸休靜處故子路咨勸孔子何不暫試過往因而問焉孔子曰善往見老聃而老聃不許疏老子知欲藏之書是先聖之已陳芻狗不可久留恐亂後人故云不許於是繙十二經以說疏孔子删詩書定禮樂贊易道修春秋此六經也又加六緯合爲十二經也委曲敷演故繙覆說之老聃中其說曰大謾願聞其要疏中其說者許其有理也大謾者嫌其繁謾太多請簡要之術也孔子曰要在仁義疏經有十二乃得繁盈切要而論莫先仁義也老聃曰請問仁義人之性邪疏問此仁義率性否乎孔子曰然君子不仁則不成不義則不生仁義眞人之性也又將奚爲矣疏然猶如此言仁義是人之大性也賢人君子若不仁則名行不成不義則生道不立故知仁義是人之眞性又將何爲而疑之也耶老聃曰請問何謂仁義疏前言仁義是人之眞性今之重問請解所由也孔子曰中心物愷兼愛無私此仁義之情也註此常人之所謂仁義者也故寄孔老以正之疏愷樂也忠誠之心願物安樂慈愛平等兼濟無私允合人情可爲世教也老聃曰噫幾乎後言夫兼愛不亦迂乎註夫至仁者無愛而直前也疏意不平之聲也幾近也迂曲也後發之言近乎浮僞故興噫嘆以長不平夫至人推理直前無心思慮而汝存情兼愛不乃私曲乎無私焉乃私也註世所謂無私者釋已而愛人夫愛人者欲人之愛已此乃甚私非忘公而公也疏夫兼愛於人欲人之愛已也此乃甚私何公之有邪夫子若欲使天下無失其牧乎疏牧養也欲使天下蒼生咸得本性者莫若上下各各守分自全恬養則大治矣牧有本作放字者言君王但放任羣性則天下太平也則天地固有常矣日月固有明矣星辰固有列矣疏夫天地覆載日月照臨星辰羅列此並自然之理也非關人事豈惟三種萬物悉然但當任之莫不備足何勞措意妄爲矜矯也禽獸固有羣矣樹木固有立矣註皆已自足疏有識禽獸無情草木各得生立各有羣分豈資仁義方獲如此夫子亦放德而行循道而趨已而至矣註不待於兼愛也疏循順也放任己德而逍遙行世順於天道而趨步人間至極妙行莫過於此也又何偈偈乎揭仁義若擊鼓而求亡子焉註無由得之疏偈偈勵力貌也揭儋負也亡子逃人也言孔丘勉勵身心儋負仁義强行於世以教蒼生何異乎打擊大鼓而求覔亡子是以鼓聲愈大而亡者愈離仁義彌彰而安道彌遠故無由得之噫夫子亂人之性也註事至而愛當義而止斯忘仁義者也常念之則亂眞矣疏亡子不獲罪在鳴鼓眞性不明過由仁義故發噫歎總結之也士成綺見老子而問曰吾聞夫子聖人也吾國不辭遠道而來願見百舍重趼而不敢息疏姓士字成綺不知何許人舍逆旅也趼腳生泡漿創也成綺素聞老子有神聖之德故不辭艱苦慕義遠來百經旅舍一不敢息途路旣遙足生重趼今吾觀子非聖人也鼠壤有餘蔬註言其不惜物也疏昔時籍甚謂是至人今日親觀知無聖德見其鼠穴土中有餘殘蔬菜嫌其穢惡故發此譏也而棄妹不仁也註無近恩故曰棄疏妹猶昧也闇昧之徒應須誘進棄而不教豈曰仁慈也生熟不盡於前註至足故恒有餘疏生謂粟帛熟謂飲食充足之外不復槩懷所以飲食資財目前狼藉且大聖寬弘而不拘小節士成庸瑣以此爲非細碎之間格量眞聖可謂以螺酌海焉測淺深也而積斂無崖註萬物歸懷來者受之不小立界畔也疏旣有聖德爲物所歸故供給聚歛略無崖岸浩然無心積散任物也老子漠然不應註不以其言槩意疏塵垢之言豈曾入耳漠然虛淡何足介懷士成綺明日復見曰昔者吾有刺於子今吾心正郤矣何故也註自怪刺譏之心所以懷也疏卻空也息也昨日初來妄生譏刺今時思省方覺己非所以引過責躬深懷慙竦心之空矣不識何耶老子曰夫巧知神聖之人吾自以爲脫焉註脫過去也疏夫巧智神聖之人者蓋是迹非所以迹也汝言我欲爲聖人乎我於此久以免脫汝何爲乃謂我是聖非聖邪老君欲抑成綺之譏心故示以息迹歸本也郭注云脫過去也謂我於聖已得過免而去也昔者子呼我牛也而謂之牛呼我馬也而謂之馬註隨物所名苟有其實人與之名而弗受註有實故不以毁譽經心也再受其殃註一毁一譽若受之於心則名實俱累斯所以再受其殃也疏昨日汝喚我作牛我卽從汝喚作牛喚我作馬我亦從汝喚作馬我終不拒且有牛馬之實是一名也人與之名諱而不受是再殃也譏刺之言未甚牛馬是尙不諱而况非乎吾服也恒服註服者容行之謂也不以毁譽自殃故能不變其容疏郭注云服者容行之謂也老君體道大聖故能制服身心行行容受呼牛呼馬唯物是從此乃恒常非由措意也吾非以服有服註有爲爲之則不能恒服疏言我率性任眞自然容受非關有心用意方得而然必也用心便成矯性旣其有作豈曰無爲士成綺雁行避影履行遂進而問修身若何疏成綺自知失言身心慚愧於是雁行斜步側身避影隨逐老子之後不敢履躡其迹乃徐進問請修身之道如何老子曰而容崖然註趨進不安之貌疏而汝也言汝莊飾容貌夸駭於人自爲崖岸不能舒適而目衝然註衝出之貌疏心旣不安目亦馳動故左盼右睇睢盱充詘也而顙頯然註高露發美之貌疏顙額高亢顯露華飾持此容儀矜敖於物而口闞然註虓豁之貌疏郭注云虓豁之貌也謂志性强梁言語雄猛夸張虓豁使人可畏也而狀義然註踶跂自持之貌疏義宣也踶跂驕豪實乖曲禮而修飭容狀自然合宜也似繫馬而止也註志在奔馳疏形雖矜莊而心性諠躁猶如逸馬被繫意存奔走動而持註不能自舒放也疏馳情逐境觸物而動不能任適每自約持發也機註趣舍速也疏機弩牙也攀援之心遇境而發其發猛速有類弩也察而審註明是非也疏不能盧遣達順兩忘而明察是非域心審是非理也知巧而覩於泰註泰者多於本性之謂也巧於見泰則拙於抱朴疏泰多也不能忘巧忘知觀無爲之一理而詐知詐巧見有爲之多事凡以爲不信註凡此十事以爲不信性命而蕩夫毁譽皆非修身之道也疏信實也言此十事皆是虛詐之行非眞實之德也邊境有人焉其名爲竊註亦如汝所行非正人也疏竊賊也邊蕃境域忽有一人不憚憲章但行竊盜內則損傷風化外則阻隔蕃情蠹政害物莫斯之甚成綺之行其猥亦然舉動睢盱猶如此賊也夫子曰夫道於大不終於小不遺故萬物備疏莊周師老君故呼爲夫子也終窮也二儀雖大猶在道中不能窮道之量秋毫雖小待之成體此則於小不遺旣其能小能大故知備在萬物廣廣乎其無不容也淵乎其不可測也疏旣大無不包細無不入貫穿萬物囊括二儀故廣廣歎其寬博淵乎美其深遠形德仁義神之末也非至人孰能定之疏夫形德仁義者精神之末迹耳非所以迹也救物之弊不得已而用之自非至聖神人誰能定其粗妙邪夫至人有世不亦大乎而不足以爲之累註用世故不患其大也疏聖人威跨萬乘王有世界位居九五不亦大乎而姑射汾陽忘物忘己卽動卽寂何四海之能累乎天下奮棅而不與之偕註靜而順之疏棅權也偕俱也社稷顚覆宇內崩摧趨世之人奮動權棅必靜而自守不與並逐也審乎無假而不與利遷註任眞而直往也疏志性安靜委命任眞榮位旣不關情財利豈能遷動也極物之眞能守其本疏夫聖人靈鑒洞徹窮理盡性斯極物之眞者也而應感無方動不傷寂能守其本故外天地遺萬物而神未嘗有所困也疏雖復握圖御宇總統羣方而忘外二儀遺棄萬物是以爲旣無爲事旣無事心閑神王何困弊之有通乎道合乎德疏淡泊之心通乎至道虛忘之智合乎上德斯乃境智相會能所冥符也退仁義註進道德也賓禮樂註以情性爲主也疏退仁義之澆薄進道德之淳和賓禮樂之浮華主無爲之虛淡至人之心有所定矣註定於無爲也疏恬淡無爲而用不乖寂定矣世之所貴道者書也疏道者言說書者文字世俗之人說見浮淺或託語以通心或因書以表意持許往來以爲貴重不知無足可言也書不過語語有貴也語之所貴者意也疏所以致書貴宣於語所以宣語貴表於意也意有所隨意之所隨者不可以言傳也疏隨從也意之所出從道而來道旣非色非聲故不可以言傳說而世因貴言傳書世雖貴之哉猶不足貴也爲其貴非其貴也註其貴恒在意言之表疏夫書以載言言以傳意而末世之人心靈暗塞遂貴言重書不能忘言求理故雖貴之哉猶不足貴者爲言書糟粕非可貴之物也故郭注云其貴恒在意之表故視而可見者形與色也聽而可聞者名與聲也悲夫世人以形色名聲爲足以得彼之情夫形色名聲果不足以得彼之情註得彼情唯忘言遺書者耳疏夫目之所見莫過形色耳之所聽唯在名聲而世俗之人不達至理謂名言聲色盡道情實豈知玄極視聽莫偕愚惑如此深可悲歎郭注云得彼之情唯忘言遺書者也則知者不言言者不知而世豈識之哉註此絶學去知之意也疏知道者忘言貴德者不知而聾俗愚迷豈能識悟唯當達者方體之矣桓公讀書於堂上輪扁斲輪於堂下釋椎鑿而上問桓公曰敢問公之所讀者何言邪疏桓公齊桓公也輪車輪也扁匠人名也斲雕斫也釋放也齊君翫讀輪扁打車貴賤不同事業各異乃釋放其具方事質疑欲明至道深玄不可傳集故寄桓公匠者略顯忘言之致也公曰聖人之言也疏所謂憲章文武祖述堯舜是聖人之言曰聖人在乎疏又問聖人見在以不公曰已死矣疏答曰聖人雖死厥教尙存焉曰然則君之所讀者古人之糟魄已矣疏夫酒滓曰糟漬糟曰粕夫醇酎比乎道德糟粕方之仁義已陳芻狗曾何足云桓公曰寡人讀書輪人安得議乎有說則可無說則死疏貴賤禮隔不可輕言庸委之夫輒敢議論說若有理方可免辜其如無辭必獲死罪輪扁曰臣也以臣之事觀之斲輪徐則甘而不固疾則苦而不入不徐不疾得之於手而應於心口不能言有數存焉於其間疏甘緩也苦急也數術也夫斲輪失所則罕固若使得宜則口不能言也况之理教其義亦然臣不能以喻臣之子臣之子亦不能受之於臣是以行年七十而老斲輪註此言物各有性教學之無益也疏喻曉也輪扁之術不能示其子輪扁之子亦不能禀受其教是以行年至老不勉斤斧之勞故知物各有性不可倣效古之人與其不可傳也死矣然則君之所讀者古人之糟魄已矣註當古之事已滅於古矣雖或傳之豈能使古在今哉古不在今今事已變故絶學任性與時變化而後至焉疏夫聖人制法利物隨時時旣不停法亦隨變是以古人古法淪殘於前今法今人自興於後無容執古聖迹行乎今世故知所讀之書定是糟粕也
