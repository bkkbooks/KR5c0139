body:
  text: 河南郭象子玄撰南華眞經疏序夫莊子者所以申道德之深根述重玄之妙旨暢无爲之恬淡明獨化之窅冥鉗揵九流括囊百氏諒區中之至教實象外之微言者也其人姓莊名周字子休生宋國睢陽蒙縣師長桑公子受號南華仙人當戰國之初降衰周之末歎蒼生之業薄傷道德之陵夷乃慷慨發憤爰著斯論其言大而博其旨深而遠非下士之所聞豈淺識之能究所言子者是有德之嘉號古人稱師曰子亦言子是書名非但三篇之總名亦是百家之通題所言內篇者內以待外立名篇以編簡爲義古者殺青爲簡以韋爲編編簡成篇猶今連紙成卷也故元愷云大事書之於策小事簡牘而已內則談於理本外則語其事迹事雖彰著非理不通理既幽微非事莫顯欲先明妙理故前標內篇內篇理深故每於文外别立篇目郭象仍於題下卽注解之逍遙齊物之類是也自外篇以去則取篇首二字爲其題目駢拇馬蹄之類是也所言逍遙遊者古今解釋不同今汎舉紘綱略爲三釋所言三者第一顧桐柏云逍者銷也遥者遠也銷盡有爲累遠見無爲理以斯而遊故曰逍遥第二支道林云物物而不物於物故逍然不我待玄感不疾而速故遥然靡所不爲以斯而遊天下故曰逍遥遊第三穆夜云逍遥者蓋是放狂自得之名也至德內充无時不適忘懷應物何往不通以斯而遊天下故曰逍遥遊內篇明於理本外篇語其事迹雜篇雜明於理事內篇雖明理本不无事迹外篇雖明事迹甚有妙理但立教分篇據多論耳所以逍遥建初者言達道之士智德明敏所造皆適遇物逍遥故以逍遥命物夫無待聖人照機若鏡既明權實之二智故能大齊於萬境故以齊物次之既指馬蹄天地混同庶物心靈凝澹可以攝衛養生故以養生主次之既善惡兩忘境智俱妙隨變任化可以處涉人間故以人間世次之內德圓滿故能支離其德外以接物既而隨物升降內外冥契故以德充符次之止水流鑑接物无心忘德忘形契外會內之極可以匠成庶品故以大宗師次之古之眞聖知天知人與造化同功卽寂卽
