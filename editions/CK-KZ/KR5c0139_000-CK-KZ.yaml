front:
  text: 南華眞經注序夫莊子者可謂知本矣故未始藏其狂言言雖无會而獨應者也夫應而非會則雖當无用言非物事則雖高不行與夫寂然不動不得已而後起者固有間矣斯可謂知无心者也夫心无爲則隨感而應應隨其時言唯謹爾故與化爲體流萬代而冥物豈曾設對獨遘而游談乎方外哉此其所以不經而爲百家之冠也然莊生雖未體之言則至矣通天地之統序萬物之性達死生之變而明內聖外王之道上知造物无物下知有物之自造也其言宏綽其旨玄妙至至之道融微旨雅泰然遣放放而不敖故曰不知義之所適猖狂妄行而蹈其大方含哺而熙乎澹泊鼓腹而游乎混茫至仁極乎无親孝慈終於兼忘禮樂復乎已能忠信發乎天光用其光則其朴自成是以神器獨化於玄冥之境而源深流長也故其長波之所蕩高風之所扇暢乎物宜適乎民願弘其鄙解其懸灑落之功未加而矜夸所以散故觀其書超然自以爲已當經崑崙涉太虛而游惚怳之庭矣雖復貪婪之人進躁之士暫而攬其餘芳味其溢流仿佛其音影猶足曠然有忘形自得之懷況探其遠情而玩永年者乎遂綿邈清遐去離塵埃而返冥極者也
