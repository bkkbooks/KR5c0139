body:
  text: 天地第十二天地雖大其化均也註均於不爲而自化也疏夫二儀生育覆載無窮形質之中最爲廣大而新新變化其狀不殊念念遷謝實唯均等所謂亭之也故云天地生我並生萬物雖多其治一也註一以自得爲治疏夫四生萬物其類最繁至於率性自得斯理唯一所謂毒之也故又云萬物與我爲一人卒雖眾其主君也註天下異心無心者主也疏黔首卒隸其數雖多主而君者一人而已無心因任允當斯位君原於德而成於天註以德爲原無物不得得者自得故得而不謝所以成天也疏原本也夫君主人物必須以德爲宗物各自得故全成自然之性故曰玄古之君天下無爲也天德而已矣註任自然之運動疏玄遠也古之君謂三皇已前帝王也言玄古聖君無爲而治天下也蓋何爲哉此引古證今成天德之義也以道觀言而天下之君正註無爲者自然爲君非邪也疏以虛通之理觀應物之數而無爲因任之君不用邪僻之言者故理當於王道以道觀分而君臣之義明註各當其分則無爲位上有爲位下也疏夫君道無爲而臣道有事尊卑勞逸理固不同譬如首自居上足自居下用道觀察分義分明以道觀能而天下之官治註官各當其所能治矣疏夫官有高卑能有優劣能受職則物無私得是故天下之官治也以道汎觀而萬物之應備註無爲也則天下各以其無爲應之疏夫大道生物性情不同率己所以悉皆備足或走或飛咸應其用不知所以豈復措心故以理徧觀則庶物之應備故通於天地者德也註萬物莫不皆得則天地通疏通同也同兩儀之覆載與天地而俱生者德也行於萬物者道也註道不塞其所由則萬物自得其行矣疏至理無塞恣物往來同行萬物故曰道也上治人者事也註使人人自得其事疏雖則治人因其本性物各率能咸自稱適故事事有宜而天下治也能有所藝者技也註技者萬物之末用也疏率其本性自有藝能非假外爲故眞技術也技兼於事事兼於義義兼於德德兼於道道兼於天註夫本末之相兼猶手臂之相包故一身和則百節皆適天道順則本末俱暢疏兼帶也濟也歸也夫藝能之技必須帶事不帶於事技術何施也事苟失宜技便無用雖行於義不可乖德雖有此德理須法道虛通故曰虛通終歸自然之術斯乃理事相包用不同耳是故示本能攝末自淺之深之義故曰古之畜天下者無欲而天下足無爲而萬物化疏夫兼天所以無爲兼道所以無欲故古之帝王養畜羣庶者何爲哉蓋無欲而蒼生各足無爲而萬物自化也淵靜而百姓定疏一人垂拱而玄默百姓則比屋而可封故老經云我好靜而民自正記曰通於一而萬事畢疏一道也夫事從理生理必包事本能攝末故知一萬事畢語在西升經莊子引以爲證無心得而鬼神服註一無爲而羣理都舉疏夫迹混人間之事心證自然之理而窮原徹際妙極重玄者故在於顯則爲人物之所歸處於幽則爲鬼神之所服夫子曰夫道覆載萬物者也洋洋乎大哉君子不可以不刳心焉註有心則累其自然故當刳而去之疏夫子者老子也莊生師老君故曰夫子也刳去也灑也虛通之道包羅無外二儀待之以覆載萬物得之以化生何莫由斯最爲物本歎洋洋之美大以勗當世之君王可不法道之無爲洗去有心之累者耶無爲爲之之謂天註不爲此爲而此爲自爲乃天道疏無爲爲之率性而動也天機自張故謂之天此不爲爲也無爲言之之謂德註不爲此言而此言自言乃眞德疏寂然無說而應答無方譬縣鏡高堂物來斯照語默不殊故謂之德也此不言而言者愛人利物之謂仁註此任其性命之情也疏慈若雲行愛如雨施心無偏執德澤弘普惜其性命故謂之仁也不同同之之謂大註萬物萬形各正其分不引彼以同我乃成大耳疏夫刻雕眾形而性情各異率其素分僉合自然任而不割故謂之大也行不崖異之謂寬註玄同彼我則萬物自容故有餘疏夫韜光晦迹而混俗揚波若樹德不異於人立行豈殊於物哉而心無崖際若萬頃之陂林藪蒼生可謂寬容矣有萬不同之謂富註我無不同故能獨有斯萬疏位居九五威誇萬乘任庶物之不同順蒼生之爲異而羣性咸得故能富有天下也故執德之謂紀註德者人之綱疏能持己有之德行者可謂羣物之綱紀也德成之謂立註非德而成者不可謂立疏德行旣成方可立功而濟物也循於道之謂備註夫道非偏物也疏循順也能順於虛通德行方足不以物挫志之謂完註內自得也疏挫屈也一毁譽混榮辱不以世物屈節其德完全君子明於此十者則韜乎其事心之大也註心大故事無不容也疏韜包容也君子賢人明於已前十事則能包容物務心性寛大也沛乎其爲萬物逝也註德澤滂沛任萬物之自往也疏逝往也心性寬閑德澤滂沛故爲羣生之所歸往也若然者藏金於山藏珠於淵註不貴難得之物疏若如前行便是無爲旣不羨於榮華故不貴於寶貨是以珠生於水不索故藏之於淵金出於山不求故韜之於嶽也不利貨財註乃能忘我況貨財乎疏雖得珠玉尙不貪以資身常用貨財豈復將爲利也不近貴富註自來寄耳心常去之遠也疏寄去寄來不哀不樂故外疏遠乎軒冕內不近乎富貴也不樂夀不哀夭註所謂縣解疏假令夀年延永不以爲樂性命夭促不以爲哀不榮通不醜窮註忘夭夀於胸中况窮通之間哉疏富貴榮達不以爲榮華貪賤窒塞不以爲醜辱夀夭嘗不以措意榮辱之情豈容介懷不拘一世之利以爲己私分註皆委之萬物也疏光臨宇宙統御天下四海珍寶總繫一人而行不利貨財委之萬國豈容拘束入己用爲私分也不以王天下爲己處顯註忽然不覺榮之在身疏覆有黔黎主領天下而推功於物忘其富貴故不以己大而榮顯也顯則明註不顯則默而止疏明彰也雖坐汾陽喪其天下必也顯智豈曰韜光也萬物一府死生同狀註蛻然無所在也疏忘於物我故萬物可以爲一府冥於變化故死生同其形狀死生無變於己況窮通夭夀之間乎夫子曰夫道淵乎其居也漻乎其淸也疏至理深玄譬猶淵海漻然淸潔明燭鬢眉淵則嘆其居寂以深澄漻則嘆其雖動而恒潔也本亦作君字者金石不得無以鳴註聲由寂彰疏嗚由寂彰應由眞起也故金石有聲不考不鳴註因以喻體道者物感而後應也疏考擊也夫金石之內素藴宮商若不考擊終無聲響亦猶至人之心實懷聖德物若不感無由顯應前託淵水以明至道此寄金石以顯聖心萬物孰能定之註應感無方疏喻彼明鏡方玆虛谷物來斯應應而無心物旣脩短無窮應亦方圓無定夫王德之人素逝而恥通於事註任素而往耳非好通於事也疏素眞也逝往也王盛不驕不矜任眞而往旣抱朴以淸高故羞通於物務立之本原而知通於神註本立而知不逆疏神者不測之用也常在理上往而應物也不測之神知通於物此之妙用必資於本欲示本能起用用不乖本義也故其德廣註任素通神而後彌廣疏夫淸素無爲任眞而往神知通物而恒立本原用不乖體動不傷寂德行如是豈不大中之者邪其心之出有物採之註物採之而後出耳非先物而唱也疏採求也夫至聖虛懷而物我斯應自非物求聖德無由顯出聖心聖心之出良由物採欲和而不唱不爲物先故形非道不生生非德不明疏形者七尺之身生者百齡之命德者能澄之智道者可通之境也道能通生萬物故非道不生德能鑒照理原故非德不明老經云道生之德畜之也存形窮生立德明道非王德者邪疏存任也窮盡也任形容之妍醜盡生齡之夭夀立盛德以匡時用至道以通物能如是者其唯王德乎蕩蕩乎忽然出勃然動而萬物從之乎此謂王德之人註忽勃皆無心而應之貌動出無心故萬物從之斯蕩蕩矣故能存形窮生立德明道而成王德也疏蕩蕩寬平之名忽勃無心之貌物感而動逗機而出因循任物物則從之猶具眾美故爲王德也視乎㝠㝠聽乎無聲疏至道深玄聖心凝寂非色不可以目視絶聲不可以耳聽㝠㝠之中獨見曉焉無聲之中獨聞和焉註若夫視聽而不寄之於寂則有闇昧而不和也疏雖復冥冥非色而能陶甄萬象乃云寂寂無響故能諧韻八音欲明從體起用功能如是者也故深之又深而能物焉註窮其原而後能物物疏卽有卽無卽寂卽應遣之又遣故深之又深旣而窮理盡性故能物眾物也神之又神而能精焉註極至順而後能盡妙疏神者不測之名應寂相卽有無洞達旣而非測非不測亦不非測乃是神之精妙故其與萬物接也至無而供其求註我確斯而都任彼則彼求自供疏遣之又遣乃曰至無而接物無方隨機稱適千差萬品求者卽供若縣鏡高堂物來斯照也時騁而要其宿大小長短修遠註皆恣而任之會其所極而已疏騁縱也宿會也若夫體故至無所以隨求稱適故能順時因任應物多方要在會歸而不滯一故或大或小乍短乍長乃至脩遠其來者隨彼機務悉供其求應病以藥理無不當黃帝遊乎赤水之北登乎崑崙之丘而南望還歸遺其玄珠註此寄明得眞之所由疏赤是南方之色心是南方之藏水性流動位在北方譬迷心緣鏡闇無所照故言赤水北也崑丘身也南是顯明之方望是觀見之義玄則疏遠之目珠乃珍貴之寶欲明世間羣品莫不身心迷妄馳騁耽者無所覺知闇似北方動如流水迷眞喪道實此之由今欲返本還源祈眞訪道是以南望示其照察還歸表其復命故先明失眞之處後用顯得道之方法所顯方法列在下文使知索之而不得註言用知不足以得眞疏索求也故絶慮不可以心求也使離朱索之而不得疏非色不可以目取也使喫詬索之而不得也註聰明喫詬失眞愈遠疏喫詬言辨也離言不可以辨索乃使象罔象罔得之疏罔象無心之謂離聲色絶思慮故智與離朱自涯而反喫詬言辨用力失眞唯罔象無心獨得玄珠也黃帝曰異哉象罔乃可以得之乎註明得眞者非用心也象罔然卽眞也疏離婁迷性恃明目而喪道軒轅悟理歎罔象而得珠勗諸學生故可以不離形去智黜聰隳體邪堯之師曰許由許由之師曰齧缺齧缺之師曰王倪王倪之師曰被衣疏已上四人並是堯時隱士厭穢風塵懷道抱德淸廉潔已不同人世堯知其賢欲讓天下莊生示有承禀故具列其師資也堯問於許由曰齧缺可以配天乎註謂爲天子吾藉王倪以要之註欲因其師以要而使之疏配合也藉因也堯云齧缺之賢者有合天位之德庶因王倪遙能屈致情事不决故問許由許由曰殆哉圾于於天下註圾危也疏殆近也圾危也若要齧缺讓萬乘危亡之徵其則不遠也齧缺之爲人也聰明叡知給數以敏其性過人註聰敏過人則使人跂之屢傷於民也疏叡聖也給捷也敏速也夫聖人治天下也冕旒垂目黈纊塞耳所以杜聰明不欲多聞見今齧缺乃內懷聖智外眩聰明詞鋒捷辯計數宏達德行性機所作過人其迹旣彰必以爲患危亡之狀列在已下而又乃以人受天註用知以求復其自然疏物之喪眞其日已久乃以心智之術令復其初故自然之性失之遠彼審乎禁過而不知過之所由生註夫過生於聰知而又役知以禁之其過彌甚矣故曰無過在去知不在於强禁疏過之所由生者知也言齧缺但知審禁蒼生之過患而不知患生之由智也與之配天乎彼且乘人而無天註若與之天下彼且遂使後世任知而失眞疏若與天位令御羣生必運乎心智悦乎天理則物皆喪己無復自然之性也方且本身而異形註夫以萬物爲本則羣變可一而異形可同斯迹也將遂使後世由已以制物則萬物乖矣疏方將也夫聖人無心因循任物今齧缺以己身爲本引物使歸令天下異形從我之化物之失性實此之由後世之患自斯而始也方且尊知而火馳註賢者當位於前則知見尊於後奔競而火馳也疏夫不能忘智以任物而尊智以御世遂將徇迹舍已效人馳驟奔逐其速如火矣方且爲緒使註將興後世事役之端疏緒端也使役也不能無爲而任知御物後世勞役自此爲端方且爲物絯註將遂使後世拘牽而制物疏絯礙也不能用道以通人方復任智以礙物也方且四顧而物應註將遂使後世指麾以動物令應上務疏方將顧盼四方撫安萬國令彼之氓黎應我之化法方且應眾宜註將遂使後世不能忘善而利仁以應宜也疏用一已之知應眾物之宜旣非無心未免危殆矣方且與物化註將遂使後世與物相逐而不能自得於內疏將我已知施與物眾令庶物從化物旣失之我亦未得也而未始有恆註此皆盡當時之宜也然今日受其德而明日承其弊矣故曰未始有恆疏以智理物政出多門前荷其德後遭其弊旣乖湻古所以無恆夫何足以配天乎雖然有族有祖註其事類可得而祖效疏族藪也夫齧缺隱居山藪高尙其志不能混迹未足配天而流俗之中罕其輩類故志尙清遐良可效耳可能爲眾父而不可以爲眾父父註眾父父者所以迹也疏父君也言齧缺高尙無爲不夷乎俗雖其道可述適可爲眾人之父而未可爲父父也父父者堯也夫堯寄坐萬物之上而心馳乎姑射之山往見四子之時卽在汾陽之地是以卽寂而動卽動而寂無爲有爲爲無爲有有無一時動寂相卽故可爲君中之君父中之父所謂窮理盡性玄之又玄而爲眾生之父故其宜矣故郭注云父父者所以迹也治亂之率也註言非但治主乃爲亂率疏率主也若用智理物當時雖治於後必亂二途皆以智爲率北面之禍也註夫桀紂非能殺賢臣乃賴聖知之迹以禍之疏桀紂賴聖智以殺賢臣故聖智是北面之禍也南面之賊也註田恒非能殺君乃資仁義以賊之疏田恒資仁義以殺主故仁義南面之賊注云田恒非能殺君乃資仁義以賊之堯觀乎華華封人曰嘻聖人請祝聖人疏華地名也今華州也封人者謂華地守封疆之人也嘻歎聲也封人見堯有聖人之德光臨天下請祝願常富庶享多福使聖人夀堯曰辭使聖人富堯曰辭使聖人多男子堯曰辭疏夫富夀多男子實爲繁撓而能體之者廢無爲故寄彼二人明兹三患辭讓之旨列在下文封人曰夀富多男子人之所欲也汝獨不欲何邪疏前之三事人之大欲存焉汝獨致辭有何意謂堯曰多男子則多懼富則多事夀則多辱是三者非所以養德也故辭疏夫子胤扶疏憂懼斯重財貨殷盛則事業實繁命夀延長則貽困辱三者未足養無爲之德適可以益有爲之累所以並辭封人曰始也我以汝爲聖人邪今然君子也疏言汝有無雙照便爲體道聖人今旣舍有趣無適是賢人君子也天生萬民必授之職多男子而授之職則何懼之有註物皆得所而志定也疏天地造化爲萬物各有才能量才授官有何憂懼富而使人分之則何事之有註寄之天下故無事也疏百姓豐饒四海殷實寄之羣有而不以私焉斯事無爲也夫聖人鶉居註無意而期安也而鷇食註仰物而足疏鶉䳺鶉也野居而無常處鷇者鳥之子食必仰母而足聖人寢處儉薄譬彼䳺鶉供膳裁充方茲鷇鳥旣無心於侈靡豈有情於滋味乎鳥行而無彰註率性而動非常迹也疏彰文迹也夫聖人灰心滅智而與物俱冥猶如鳥之飛行無蹤跡而可見也天下有道則與物皆昌註猖狂妄行而自蹈大方也疏運屬清夷則撫臨億兆物來感我則應時昌盛郭注云猖狂妄行恐乖文旨天下無道則脩德就閒註雖湯武之事苟順天應人未爲不閒也故無爲而無不爲者非不間也疏閒音閑時逢擾亂則混俗韜光脩德隱迹全我生道嘉遁閑居逍遙遁世所謂隱顯自在用舍隨時千歲厭世去而上仙註夫至人極夀命之長任窮理之變其生也天行其死也物化故云厭世而上仙也疏夫聖人達生死之不二通變化之爲一故能盡天年之脩短厭囂俗以消升何必鼎湖之舉獨爲上仙安期之夀方偁千歲乘彼白雲至于帝鄉註氣之散無不之疏精靈上升與太一而冥合乘雲御氣屆于天帝之鄉三患莫至身常無殃則何辱之有疏三患前富夀多男子也夫駕造物而來往乘變化而遨遊三患本自虛無七尺來從非有殃辱之事曾何足云封人去之堯隨之曰請問疏請言旣訖封人於是去之堯方悟非所以請答也封人曰退已疏所疑已决宜速退歸堯治天下伯成子高立爲諸侯堯授舜舜授禹伯成子高辭爲諸侯而耕疏伯成子高不知何許人也蓋有道之士也禹往見之則耕在野禹趨就下風立而問焉曰昔堯治天下吾子立爲諸侯堯授舜舜授予而吾子辭爲諸侯而耕敢問其故何也疏唐虞之世南面稱孤逮乎有夏退耕於野出處頓殊有何意謂子高曰昔堯治天下不賞而民勸不罰而民畏疏夫賞罰者所以著勸畏也而堯以無爲爲治物物從其化故百姓不待其褒賞而自勉行善無勞刑罰而畏惡不爲此顯堯聖明其德如是今子賞罰而民且不仁德自此衰刑自此立後世之亂自此始矣疏盛行賞罰百姓猶不仁至德旣衰是以刑書滋起故知將來之亂從此始焉夫子盍行耶無落吾事俋俋乎耕而不顧註夫禹時三聖相承治成德備功美漸去故史籍無所載仲尼不能間是以雖有天下而不與焉斯乃有而無之也故考其時而禹爲最優計其人則雖三聖故一堯耳時無聖人故天下之心俄然歸啟夫至公而居當者付天下於百姓取與之非已故失之不求得之不辭忽然而往侗然而來是以受非毁於廉節之士而名列於三王未足怪也莊子因斯以明堯之弊弊起於堯而釁成於禹況後世之無聖乎寄遠迹於子高使棄而不治將以絶聖而反一遺知而寧極耳其實則未聞也夫莊子之言不可以一塗詰或以黃帝之迹秃堯舜脛豈獨貴堯而賤禹哉故當遺其所寄而錄其絶聖棄知之意焉疏盍何也落廢也俋俋耕地之貌伯成謂禹爲夫子夫子何不行去邪莫廢我農事於是用力而耕不復顧盼也夫三聖相承蓋無優劣但澆湻異世故其迹不同郭注云弊起於堯而釁成於禹者欲明有聖不如無聖有爲不及無爲故高遠寄迹以明絶聖棄智者耳泰初有無無有無名註無有故無所名疏泰初始也無氣始萌謂之太初言其氣廣大能爲萬物之始本故名太初太初之時惟有此無未有於有有旣未有名將安寄故無有無名一之所起有一而未形註一者有之初至妙者也至妙故未有物理之形耳夫一之所起起於至一非起於無也然莊子之所以屢稱無於初者何哉初者未生而得生得生之難而猶上不資於無下不待於知突然而自得此生矣又何營生於已生以失其自生哉疏一應道也有無一之名而無萬物之狀物得以生謂之德註夫無不能生物而云物得以生乃所以明物生之自得任其自得斯可謂德也疏德者得也謂得此也夫物得以生者外不資乎物內不由乎我非無非有不自不他不知所以而生故謂之德也未形者有分且然無間謂之命疏雖未有形質而受質以有素分然且此分脩短慤乎更無間隙故謂之命留動而生物物成生理謂之形疏留靜也陽動陰靜氛氲升降分布三才化生萬物物得成就生理具足謂之形也形體保神各有儀則謂之性註夫德形性命因變立名其於自爾一也疏體質保守也禀受形質保守精神形則有醜有妍神則有愚有智旣而宜便軌則各自不同素分一定更無改易故謂之性也性循反德德至同於初註恒以不爲而自得之疏率此所禀之性循復生初之德故至其德處同於太初同乃虛虛乃大註不同於初而中道有爲則其懷中故爲有物也有物而容養之德小矣疏同於太初心乃虛豁心旣虛空故能包容廣大合喙鳴註無心於言而自言者合於喙鳴疏喙鳥口也心旣虛空迹復冥物故其說合彼鳥鳴鳥鳴旣無心於是非聖言豈有情於愛憎喙鳴合與天地爲合註天地亦無心而自動疏言旣合於鳥鳴德亦合於天地天地無心於覆載聖人無心於言說故與天地合也其合緡緡若愚若昏註坐忘而自合耳非照察以合之疏緡合也聖人內符至理外順羣生唯迹與本罄無不合故曰緡緡是混俗揚波同塵萬物旣若愚蠢又如昏暗又解旣合喙鳴又合天地亦是緡緡是謂玄德同乎大順註德玄而所順者大矣疏總結已前歎其美盛如是之人可謂深玄之德故同乎太初大順天下也夫子問於老聃曰有人治道若相放可不可然不然註若相放效强以不可爲可不然爲然斯矯其性情也疏師於老聃所以每事請答汎論無的故曰有人布行政化使人倣效以已而制物物失其性故已之可者物或不可已之然者物或不然物之可然於已亦爾也辨者有言曰離堅白若縣寓註言其高顯易見疏堅白公孫龍守白論也孔穿之徒堅執此論當時獨步天下無敵今辨者云我能離析堅白之論不以爲辯雄辯分明如懸日月於區宇故郭注云言其高顯易見也若是則可謂聖人乎疏結前問意如是之人得爲聖否老聃曰是胥易技係勞形怵心者也疏胥相也言以是非更相易奪用此技藝係縛其身所以疲勞形體怵惕心慮也此答前問意技有本或作枝字者言是非易奪枝分葉派也執狸之狗成思猨狙之便自山林來註言此皆失其常然也疏猨狙獼猴也執捉狐狸之狗多遭傑頸而獵旣不自在故成愁思猨猴本居山林逶迤故曠爲挑攫便捷故失其常處狸有本作猫者竹鼠也丘予告若而所不能聞與而所不能言凡有首有趾無心無耳者眾註首趾猶始終也無心無耳言其自化疏若而皆汝也首趾終始也理絶言辯故不能聞言也又不可以心慮知耳根聽故言無心無耳也凡有機無情皆曰終始故言眾也咸不能以言說悉不可以心知汝何多設猨狙之能高張懸寓之辨今物效已豈非過乎有形者與無形無狀而皆存者盡無註言有形者善變不能與無形無狀者並存也故善治道者不以故自持也將順日新之化而已疏有形者身也無形者心也汝言心與身悉皆有存我以理觀照盡見是空也其動止也其死生也其廢起也此又非其所以也註此言動止死生盛衰廢興未始有恒皆自然而然非其所用而然故放之而自得也疏時在動靜物有死生事有興廢此六者自然之理不知所以然也豈關人情思慮倣效能致哉但任而順之物之自當也有治在人註不在乎主自用疏人各有率性而動天機自張非猶主教忘乎物忘乎天其名爲忘已註天物皆忘非獨忘己復何所有哉疏豈唯物務是空抑亦天理非有惟事與理二種皆忘故能造乎非有非無之至也忘已之人是之謂入於天註人之所不能忘者已也已猶忘之又奚識哉斯乃不識不知而冥於自然疏入會也且天下難忘者己也而已尙能忘則天下有何物足存哉是知物我兼忘故能冥會自然之道也蔣閭葂見季徹曰魯君謂葂也曰請受教辭不獲命旣已告矣未知中否請嘗薦之疏薦獻也蔣問及季姓也葂徹名也此二賢未知何許人也未詳所據魯君魯侯也伯禽之後未知的是何公魯公見葂請受治國之術雖復辭不得免君之命遂告魯君爲政之道當時率師恐不折中敢陳所告試獻吾賢必不合宜幸希鍼艾吾謂魯君曰必服恭儉拔出公忠之屬而無阿私民孰敢不輯疏輯音集阿曲也孰誰也輯和也夫爲政之道先須躬服恭敬儉素清約然後拔擢公平忠節之人銓衡質直無私之士獻可替否共治百姓則蕃境無虞域中淸謐民歌擊壤誰敢不和季徹局局然笑曰若夫子之言於帝王之德猶螳蜋之怒臂以當車軼則必不勝任矣註必服恭儉非忘儉而儉也拔出公忠非忘忠而忠也故雖無阿私而不足以勝矯詐之任也疏局局俛身而笑也夫必能恭儉拔出公忠此皆僞情非忘淡者也故以此言爲面南之德何異乎螳蜋怒臂以敵車轍用小擬大故不能任也且若是則其自爲處危其觀臺註此皆自處高顯若臺觀之可覩也疏夫公儉公忠非能忘淡適自顯燿以炫眾人旣高危必遭隳敗猶如臺觀峻聳處置危縣雖復行李觀見而崩毁非久多物將往註將使物不止於本性之分而矯跂自多以附之疏觀臺高迥人競觀之立行自多物爭歸凑投迹者眾註亢足投迹不安其本步也疏顯燿動物物不安分故舉足投迹企踵者多也蔣閭葂覤覤然驚曰葂也汒若於夫子之所言矣疏覤覤驚貌也汒無所見也乍聞高議率爾驚悚思量不悟所以汒然矣雖然願先生之言其風也疏風教也我前所陳深爲乖理所願一言庶爲法教也季徹曰大聖之治天下也搖蕩民心使之成教易俗舉滅其賊心而皆進其獨志若性之自爲而民不知其所由然註大志各有趣不可相效也故因其自搖而搖之則雖搖而非爲也因其自蕩而蕩之則雖蕩而非動也故其賊心自滅獨志自進教成俗易汎然無迹履性自爲而不知所由皆云我自然矣舉皆也疏夫聖人治天下大順羣生乘其自搖而作法因其自蕩而成教是以教成而迹不顯俗易而物不知皆除滅其賊害之心而進脩獨化之志不動於物故若性之自爲率性而動故不知其所由然也舉皆也若然者豈兄堯舜之教民溟涬然弟之哉註溟涬甚貴之謂也不肯多謝堯舜而推之爲兄也疏溟涬甚貴之謂也若前方法以教蒼生則治各淳古物皆得性詎須獨貴堯舜而推之爲兄邪此意揖讓之風不謝唐虞矣欲同乎德而心居矣註居者不逐於外也心不居則德不同也疏居安定之謂也夫心馳分外則觸物參差虛夷靜定則萬境唯一境之異同在心之靜亂耳是以欲將堯舜同德者必須是居其心也子貢南遊於楚反於晉過漢陰見一丈人方將爲圃畦鑿隧而入井抱甕而出灌搰搰然用力甚多而見功寡疏水南曰陰種蔬曰圃埒中曰畦隧地道也搰搰用力貌也丈人長者之稱也子貢南遊荆楚之地途經漢水之陰遂與丈人更相伉答其抑揚詞調具在文中莊子因記二賢以明稱混沌子貢曰有械於此一日浸百畦用力甚寡而見功多夫子不欲乎疏械機器也子貢旣見丈人力多而功少是以教其械器庶力少功多輙進愚誠未知欲否爲圃者仰而視之曰奈何疏奈何猶如何謂其方法也曰鑿木爲機後重前輕挈水若抽數如泆湯其名爲槔疏機關也提挈其水灌其若抽欲論數疾似泆湯之騰沸前輕後重卽今所用桔槔也爲圃者忿然作色而笑曰吾聞之吾師有機械者必有機事有機事者必有機心機心存於胸中則純白不備純白不備則神生不定神生不定者道之所不載也吾非不知羞而不爲也註夫用時之所用者乃純備也斯人欲修純備而抱一守古失其旨也疏夫有機關之器者必有機動之務有機動之務者必有機變之心而機變存乎胷府則純粹素白不圓備矣純粹素白不圓備則精神縣境生滅不定不定者至道不載也是以羞而不爲此來未體眞脩故抱一守白者也子貢瞞然慙俯而不對疏瞞羞怍之貌也旣失所言故不知何答也有間爲圃者曰子奚爲者邪註有間俄頃也奚何也問子貢汝是誰門徒作何學業曰孔邱之徒也疏答宣尼之弟子也爲圃者曰子非夫博學以擬聖於于以蓋眾獨弦哀歌以賣名聲於天下者乎疏於于佞媚之謂也言汝博學瞻聞擬似聖人諂曲佞媚以葢羣物獨坐弦歌抑揚哀歎執斯聖迹賣彼名聲厯聘諸國徧行天下汝方將忘汝神氣墮汝形骸而庶幾乎註不忘不墮則無庶幾之道疏幾近也汝忘遺神氣隳壞形體身心旣忘而後庶近於道而身之不能治而何暇治天下乎子往矣無乏吾事疏而汝也乏闕也夫物各自治則天下理矣以己理物則大亂矣如子貢之德未足以治身何容應聘天下理宜速往無廢吾業子貢卑陬失色頊頊然不自得行三十里而後愈疏卑陬慙怍之貌頊頊自失之貌旣被抵訶顔色自失行三十里方得復常其弟子曰向之人何爲者邪夫子何故見之變容失色終日不自反邪疏反復也子貢之門人謂賜爲夫子也向見之人修何藝業遂使先生一覩容色失常竟日崇朝神氣不復門人怪之所以致問曰始吾以爲天下一人耳註謂孔子也不知復有夫人也疏昔來禀學宇內唯夫子一人今逢丈人道德又更深遠所以卑慙不能自得也旣未體乎眞假實謂賢乎仲尼也吾聞之夫子事求可功求成用力少見功多者聖人之道註聖人之道卽用百姓之心耳疏夫事以適時爲可功以能遂爲成故力少而見功多者則是適稱遂之機子貢述昔時所聞以爲聖人之道今徒不然執道者德全德全者形全形全者神全神全者聖人之道也託生與民並行而不知其所之汒乎淳備哉功利機巧必忘夫人之心註此乃聖王之道非夫人也子貢聞其假修之說而服之未知純白者之同乎世也疏今丈人問余則不如此言執持道者則德行無虧德全者則形不虧損形全者則精神專一神全者則寄迹人間託生同世雖與羣物並行而不知所往芒昧深遠不可測量故其操行湻和道德圓備不可以此功利機巧語其心也斯乃聖人之道非假修之術子貢未悟妄致所談若夫人者非其志不之非其心不爲雖以天下譽之得其所謂謷然不顧以天下非之失其所謂儻然不受天下之非譽無益損焉是謂全德之人哉我之謂風波之民註此宋榮子之徒未足以爲全德子貢之迷没於此人卽若列子之心醉於季咸也疏謷誕慢之容儻是無心之貌丈人志氣湻素不任機巧心懷寡欲不務有爲縱令舉世贊譽稱爲斯德知爲無益曾不顧盻舉世非毁聲名喪失達其無損都不領受旣毁譽不動可謂全德之人夫水性雖澄逢風波起我心不定類彼波瀾故謂之風波之民也郭注云此宋榮子之徒未足以爲全德子貢之迷沒於此人卽若列子之心醉於季咸反於魯以告孔子孔子曰彼假修渾沌氏之術者也註以其背今向古羞爲世事故知其非眞渾沌也疏子貢自魯適楚反歸於魯以其情事咨告孔子夫混沌者無分別之謂也旣背今向古所以云不眞是者也識其一不知其二註徒識修古抱灌之朴而不知因時任物之易也疏識其一謂古而不移也不知其二謂不能順今而適變治其內而不治其外註夫眞渾沌都不治也豈以其內爲異而偏有所治哉疏抱道守素治內也不能隨時應變不治外也夫明白入素無爲復朴體性抱神以遊世俗之間者汝將固驚邪註此眞渾沌也故與世同波而不自失則雖遊於世俗而泯然無迹豈必使汝驚哉疏夫心智明白會於質素之本無爲虛淡復於湻朴之原悟眞性而抱精淳混囂塵而遊世俗者固當江海蒼生林藪萬物鳥獸不駭人豈驚哉而言汝將固驚者明其必不驚也且渾沌氏之術子與汝何足以識之哉註在彼爲彼在此爲此渾沌玄同孰識之哉所識者常識其迹耳疏夫渾沌無心妙絶智慮假令聖賢時達亦何足識哉明恍惚深玄故推之於情意之表者也諄芒將東之大壑適遇苑風於東海之濱疏諄湻也苑小風也亦言是扶搖大風也濱涯大壑海也諄芒苑風皆寓言也莊生寄此二人明於大道故假賓主相值海涯苑風曰子將奚之疏奚何也之往也借問諄芒有何遊往曰將之大壑疏欲往東海曰奚爲焉疏又問何所求訪曰夫大壑之爲物也注焉而不滿酌焉而不竭吾將遊焉疏夫大海泓宏深遠難測百川注之而不溢尾閭泄之而不乾以譬至理而其義亦然故雖寄往滄溟實乃游心大道也苑風曰夫子無意于橫目之民乎願聞聖治疏五行之內唯民橫目故謂之橫目之民且諄芒東游臨於大壑觀其深遠而爲治方苑風旣察此情因發斯問夫子豈無意於黔首願聞聖化之法也諄芒曰聖治乎官施而不失其宜拔舉而不失其能疏施令設官取得宜便拔擢薦舉不失才能知此則天下太平彝倫攸叙聖治之術在乎兹也畢見其情事而行其所爲註皆因而任之疏夫所乖舛事業多端是以步驟殊時澆湻異世故治之者莫先任物必須覩見其情事而察其所爲然後順物而行則無不當也行言自爲而天下化註使物爲之則不化也疏所有施行之事教令之言咸任物自爲而不使物從已如此則宇內蒼生自然從化手撓顧指四方之民莫不俱至此之謂聖治註言指麾顧盼而民各至其性也任其自爲故疏撓動也言動手指揮舉目顧盼則四方欵附萬國來朝聖治功能其義如是有本作顯字者言用顯指揮四方皆服此中凡有三人一聖二德三神以上聖治以下次列德神二者願聞德人疏前之聖治以蒙敷釋德人之義深所願聞曰德人者居無思行無慮註率自然耳疏妙契道境得無所得故曰德人德人凝神端拱寂爾無思假令應物行化曾無謀慮不藏是非美惡註無是非於胷中而任之天下疏懷道抱德物我俱忘豈容藴蓄是非包藏善惡邪四海之內共利之之爲悅共給之之爲安註無自私之懷也疏夫德人惠澤弘博徧覃羣品故貨利將四海共同資給與萬民無别是普天慶悅率土安寧怊乎若嬰兒之失其母也儻乎若行而失其道也疏夫嬰兒失母心怊悵而無所依行李迷途神儻莽而無所據用斯二事以况德人也財用有餘而不知其所自來飲食取足而不知其所從此謂德人之容註德者神人迹也故曰容疏寡欲止分故財用有餘不貪滋味故飲食取足性命無求故不知所從來也總結前義故云德人之容願聞神人註願聞所以迹也疏德者神人之迹耳願聞所以迹也曰上神乘光與形滅亡註乘光者乃無光疏乘用也光智也上品神人用智照物雖復光如日月卽照而亡隳體黜聰心形俱遣是故與形滅亡者也此謂照曠註無我而任物空虛無所懷者非闇塞也疏智周萬物明逾三景無幽不燭豈非曠遠致命盡情天地樂而萬事銷亡註情盡命至天地樂矣事不妨樂斯無事矣疏窮性命之致盡生化之情故寄天地之間而未嘗不逍遙快樂旣達物我虛幻是以萬事銷亡萬物復情此之謂混冥註情復而混冥無迹也疏夫忘照而照照與三景高明忘生而生生將二儀並樂故能觀萬物之還原覩四生之復命是以混沌無分而冥同一道也門無鬼與赤張滿稽觀於武王之師疏門與赤張姓也無鬼滿稽名也二千五百人爲師師眾也武王伐紂兵渡孟津是時則二人共觀赤張滿稽曰不及有虞氏乎故罹此患也疏罹遭也虞舜以揖讓御時武王以干戈濟世而揖讓干戈優劣縣隔以斯商度互有不及之言而兵者不祥之器故遭殘殺之禍也門無鬼曰天下均治而有虞氏治之邪其亂而後治之與註言二聖俱以亂故治之則揖讓之與用師直是時異耳未有勝負於其間也疏均平也若天下太平物皆得理則何勞虞舜作法治之良由堯年將减其德日衰故讓重華令其緝理也赤張滿稽曰天下均治之爲願而何計以有虞氏爲註均治則願各足矣復何爲計有虞氏之德而推以爲君哉許無鬼之言是也疏宇內淸夷志願各足則何須計有虞氏之德而推之爲君此領悟無鬼之言許其有理也有虞氏之藥瘍也註天下皆患創亂故求虞氏之藥疏瘍頭瘡也夫身上患創故求醫療亦猶世逢紛擾須聖人治之是以不病則無醫不亂則無聖秃而施髢病而求醫疏鬢髮如雲不勞施髢幸無疾恙豈假醫人是知天下淸平無煩大聖此之二句總結前二事也孝子操藥以修慈父其色燋然聖人羞之註明治天下者非以爲榮疏操執也修理也焦然憔悴貌夫孝子之治慈父旣不伐其功績聖人之救禍亂豈矜以榮顯事不得已是故羞之至德之世不尙賢註賢當其位非尙之也疏夫不肖與賢各當其分非尙之以別賢不使能註能者自爲非使之也疏上拙習性不相夸企非尙而使之上如標枝註出物上而不自高也疏君居民上恬淡虛忘猶如高樹之枝無心榮貴也民如野鹿註放而自得也疏上旣無爲下亦淳樸譬彼野鹿絶君王之禮也端正而不知以爲義相愛而不知以爲仁疏端直其心不爲邪惡豈識裁非之義率乎天理更相親附甯知偏愛之仁者也實而不知以爲忠當而不知以爲信註率性自然非由知也疏率性成實不知此實爲忠任其當理豈將此當爲信蠢動而相使不以爲賜註用其自動故動而不謝疏賜䝉願也蠢動之物卽是精爽之類更相驅使理固自然譬彼股肱方玆耳目旣無心於爲造豈有情於䝉賴無爲理物其義亦然是故行而無迹註主能任其自行故無迹也疏君民淳樸上下和平率性而動故無迹之可記事而無傳註各止其分故不傳教於彼也疏方之首足各有職司止其分內不相傳習迹旣昧矣事亦滅焉孝子不諛其親忠臣不諂其君臣子之盛也疏善事父母爲孝諛僞也諂欺也不以正求人謂之諂爲臣爲子事父事君不諂不諛盡忠盡孝此乃臣子之盛德也親之所言而然所行而善則世俗謂之不肖子君之所言而然所行而善則世俗謂之不肖臣而未知此其必然邪註此直違俗而從君親故俗謂不肖耳未知至當正在何許疏不肖猶不似君父言行不擇善惡直致隨時曾無諫爭之心故世俗之中實爲不肖未知正理的在可許也世俗之所謂然而然之所謂善而善之則不謂之導諛之人也然則俗故嚴於親而尊於君邪註言俗不爲尊嚴於君親而從俗俗不謂之諂明尊嚴不足以服物則服物者更在於從俗也是以聖人未嘗獨異於世必與時消息故在皇爲皇在王爲王豈有背俗而用我哉疏嚴教也此明違從不定也世俗然善則諫爭是也夫違俗從親爲之導諛而違親從俗豈非諂佞邪且有逆有順故見是見非而違順旣空未知正在何處又違親從俗豈謂尊嚴於君父謂已導人則勃然作色謂己諛人則怫然作色註世俗遂以多同爲正故謂之導諛則作色不受而終身導人也終身諛人也註亦不問道理期於相善耳疏勃怫皆嗔貌也導達也謂其諂佞以媚君親也言世俗之人謂已諂佞卽作色而怒不受其名而終身導諛舉世皆爾合譬飾辭聚眾也是終始本末不相坐註夫合譬飾辭應受導諛之罪而世復以此得人以此聚眾亦爲從俗者恒不見罪坐也疏夫能合於譬喻飾於浮詞人皆競趨故以聚眾能保其終始合其本末眾旣從之故不相罪坐也譬本有作璧字者言合珪璧也垂衣裳設采色動容貌以媚一世而不自謂導諛與夫人之爲徒通是非而不自謂眾人愚之至也註世皆至愚乃更不可不從疏黃帝垂衣裳而天下治上衣下裳以象天地紅紫之色間而爲彩用此華飾改動容貌以媚一世浮僞之人不謂導諛翻且從君諂佞此乃與夫流俗之人而爲徒黨更相彼此通用是非自謂殊於眾人可謂愚癡之至知其愚者非大愚也知其惑者非大惑也大惑者終身不解大愚者終身不靈註夫聖人道同而帝王殊迹者誠世俗之惑不可解故隨而任之疏解悟也靈智也知其愚惑者聖人也隨而任之故非愚惑也大愚惑者凡俗也心識闇鄙觸境生迷所以竟世終身不覺悟也三人行而一人惑所適者猶可致也惑者少也二人惑則勞而不至惑者勝也而今也以天下惑予雖有祈嚮不可得也不亦悲乎註天下都惑雖我有求嚮至道之情而終不可得故堯舜湯武隨時而已疏適往也致至也惑迷也祈求也夫三人同行一人迷路所往之方猶自可至惑少解多故也二人迷則神勞而不至迷勝悟劣故也今宇內皆惑莊生雖求向至道之情無由能致故可悲傷也大聲不入於里耳註非委巷之所尙也折楊皇華則嗑然而笑註俗人得情曲則同聲動笑也疏大聲謂咸池大韶之樂也非下里委巷之所聞折楊皇華蓋古之俗中小曲也玩狎鄙野故嗑然動容同聲大笑也昔魏文侯聽於古樂怳然而睡聞鄭衞新聲欣然而喜卽其事也是故高言不止於眾人之心註不以存懷疏至妙之談超出俗表故謂之高言適可藴羣聖之靈府豈容止於眾人之智乎大聲不入於里耳高言固不止於眾心至言不出俗言勝也註此天下所以未嘗用聖而常自用也疏出顯也至道之言淡而無味不入委巷之耳豈止眾人之心而流俗之言飾詞浮僞猶如折楊之曲喜聽者多俗說旣其當途至言於乎隱蔽故齊物云言隱於榮華以二垂踵惑而所適不得矣註各自信據故不知所之疏踵足也夫迷方之士指北爲南二惑旣生垂腳不得一人亦無由獨進欲達前所其可得乎此復釋前惑者也而今也以天下惑予雖有祈嚮其庸可得邪疏夫二人垂踵所適尙難況天下皆迷如何得正故雖有求向之心其固不可得此釋前不亦悲乎傷歎旣深所以鄭重知其不可得也而强之又一惑也故莫若釋之而不推註卽而同之疏釋放也迷惑旣深造次難解而强欲正者又是一愚莫若放而不推則物我安矣不推誰其比憂註趣令得當時之適不强推之令解也則相與無憂於一世矣疏比與也若任物解惑棄而不推則彼此逍遙憂患誰與也厲之人夜半生其子遽取火而視之汲汲然唯恐其似已也註厲惡人也言天下皆不願爲惡或迫於苛役或迷而失性耳然迷者自思復而厲者自思善故我無爲而天下自化疏厲醜病人遽速也汲汲匆迫貌言醜人半夜生子速取火而看之情意忽忙恐其似已而厲醜惡之甚尙希改醜以從妍欲明愚惑之徒豈不厭迷以思悟邪釋之不推自無憂患百年之木破爲犧樽青黃而文之其斷在溝中比犧樽於溝中之斷則美惡有間矣其於失性一也疏犧刻作犧牛之形以爲祭器名曰犧尊也間別旣削刻爲牛又加靑黃文飾其一斷棄之溝瀆不被收用若將此兩斷相比則美惡有殊其於失喪性一也此且起譬也跖與曾史行義有間矣然其失性均也疏此合諭也桀跖之縱兇殘曾史之行仁義雖復善惡之迹有別而喪眞之處實同且夫失性有五疏迷情失性抑乃多端要且而言其數有五一曰五色亂目使目不明疏五色者靑黃赤白黑也流俗耽貪以此亂目不能見理故曰不明也二曰五聲亂耳使耳不聰疏五聲謂宮商角徵羽也淫滯俗聲不能聞道故曰不聰三曰五臭薰鼻困惾中顙疏五臭謂羶薰香鯹腐惾塞也謂刻賊不通也言鼻耽五臭故壅塞不通而中傷顙額也外書呼爲臭也故易云其臭如蘭道經謂五香故西升經云香味是寃也四曰五味濁口使口厲爽疏五味謂酸辛甘苦鹹也厲病爽失也令人著五味穢濁口根遂使鹹苦成痾舌失其味故言厲爽也五曰趣舍滑心使性飛揚疏趣取也滑亂也順心則取違情則舍撓亂其心使自然之性馳競不息輕浮躁動故曰飛揚也此五者皆生之害也疏總結前之五事皆是伐命之刀害生之斧是生民之巨害也而楊墨乃始離跂自以爲得非吾所謂得也疏離跂用力貌也言楊朱墨翟各擅己能失性害生以此爲得旣乖自然之理故非莊生所得也夫得者困可以爲得乎則鳩鴞之在於籠也亦可以爲得矣疏夫仁義禮法約束其心者非眞性者也旣僞其性則遭困苦若以此困而爲得者則何異乎鳩鴞之鳥在樊籠之中稱其自得者也且夫趣舍聲色以柴其內皮弁鷸冠搢笏紳修以約其外疏皮弁者以皮爲冠也鷸者鳥名也似鶩紺色出鬱林取其翠羽飾冠故謂之鷸冠此鳥知天文者爲之冠也搢插笏猶笏也紳大帶也修長裙也此皆以飾朝服也夫浮僞之徒以取舍爲業故聲色諸塵柴塞其內府衣冠插笏約束其外形背無爲之道乖自然之性以此爲得何異鳩鴞也內支盈於柴栅外重纆繳睆睆然在纆繳之中而自以爲得則是罪人交臂歷指而虎豹在於囊檻亦可以爲得矣疏支塞也盈滿栅籬也纆繳繩也睆睆視貌也夫以取舍塞滿於內府故方柴栅縉紳約束於外形取譬繳繩旣因弊如斯而自以爲得者則何異有罪之人交臂歷指以繩反縛也又類乎虎豹遭陷困於囊檻之中憂厄困苦莫斯之甚自以爲得何異此乎
