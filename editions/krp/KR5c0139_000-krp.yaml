front:
  text: 南華眞經序
  hash: sha256:976c945a5834f533b085d1d3881e12692ea207d1869ce98e52c868cfb085a4b1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0139_HFL_000-001a, image: hfl/0507/0507-004.png}
body:
  text: 河南郭象子玄撰夫莊子者可謂知本矣故未始藏其狂言言雖无會而獨應者也夫應而非會則雖當无用言非物事則雖高不行與夫寂然不動不得已而後起者固有間矣斯可謂知无心者也夫心无爲則隨感而應應隨其時言唯謹爾故與化爲體流萬代而冥物豈曾設對獨遘而游談乎方外哉此其所以不經而爲百家之冠也然莊生雖未體之言則至矣通天地之統序萬物之性達死生之變而明内聖外王之道上知造物无物下知有物之自造也其言宏綽其㫖玄妙至至之道融微㫖雅泰然遺放放而不敖故曰不知義之所適猖狂妄行而蹈其大方含哺而熙乎澹泊鼓腹而游乎混茫至仁極乎无親孝慈終於兼忘禮樂復乎已能忠信發乎天光用其光則其朴自成是以神器獨化於玄冥之境而源深流長也故其長波之所蕩高風之所扇暢乎物宜適乎民願弘其鄙解其懸灑落之功未加而矜夸所以散故觀其書超然自以爲已當經崑崙涉太虚而游惚怳之庭矣雖復貪婪之人進躁之士暫而攬其餘芳味其溢流仿佛其音影猶足曠然有忘形自得之懷況探其遠情而玩永年者乎遂綿邈清遐去離塵埃而返冥極者也南華眞經䟽序唐西華法師成玄英撰夫莊子者所以申道德之深根述重玄之妙㫖暢无爲之恬淡明獨化之窅冥鉗揵九流括囊百氏諒區中之至教實象外之微言者也其人姓莊名周字子休生宋國睢陽蒙縣師長桑公子受號南華仙人當戰國之初降衰周之末歎蒼生之業薄傷道德之陵夷乃慷慨發憤爰著斯論其言大而博其㫖深而遠非下士之所聞豈淺識之能究所言子者是有德之嘉號古人稱師曰子亦言子是書名非但三篇之總名亦是百家之通題所言内篇者内以待外立名篇以編簡爲義古有殺青爲簡以韋爲編編簡成篇猶今連紙成卷也故元愷云大事書之於策小事簡牘而已内則談於理本外則語其事迹事雖彰著非理不通理既幽微非事莫顯欲先明妙理故前摽内篇内篇理深故每於文外别立篇目郭象仍於題下即注解之逍遥齊物之類是也自外篇以去則取篇首二字爲其題目駢拇馬蹄之類是也所言逍遥遊者古今解釋不同今汎舉紘綱略爲三釋所言三者第一顧桐柏云逍者銷也遥者遠也銷盡有爲累遠見無爲理以斯而遊故曰逍遥第二支道林云物物而不物於物故逍然不我待玄感不疾而速故遥然靡所不爲以斯而遊天下故曰逍遥遊第三穆夜云逍遥者蓋是放狂自得之名也至德内充无時不適忘懷應物何往不通以斯而遊天下故曰逍遥遊内篇明於理本外篇語其事迹雜篇雜明於理事内篇雖明理本不无事迹外篇雖明事迹甚有妙理但立教分篇據多論耳所以逍遥建初者言達道之士智德明敏所造皆適遇物逍遥故以逍遥命物夫無待聖人照機若鏡既明權實之二智故能大齊於萬境故以齊物次之既指馬蹄天地混同庶物心靈凝澹可以攝衛養生故以養生主次之既善惡兩忘境智俱妙隨變任化可以處涉人間故以人間世次之内德圓滿故能支離其德外以接物既而隨物升降内外冥契故以德充符次之止水流鑑接物无心忘德忘形契外會内之極可以匠成庶品故以大宗師次之古之眞聖知天知人與造化同功即寂即應既而驅馭群品故以應帝王次之駢拇以下皆以篇名二字爲題既无别義今不復次篇也而自古高士晋漢逸人皆莫不耽翫爲之義訓雖注述無可間然並有美辭咸能索隱玄英不揆庸昧少而習焉研精覃思三十年矣依子玄所注三十三篇輒爲䟽解總三十卷雖復詞情䟽拙亦頗有心跡指歸不敢貽厥後人聊自記其遺忘耳
