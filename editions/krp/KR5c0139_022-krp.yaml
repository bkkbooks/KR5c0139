body:
  text: 河南郭象註唐西華法師成玄英䟽外篇山木第二十莊子行於山中見大木枝葉盛茂伐木者止其旁而不取也問其故曰無所可用莊子曰此木以不材得終其天年䟽既同曲轅之樹又類商丘之木不材無用故終其天年也夫子岀於山舍於故人之家䟽舍息也故人喜命竪子殺鴈而烹之䟽門人呼莊子爲夫子也竪子童僕也竪子請曰其一能鳴其一不能鳴請奚殺主人曰殺不能鳴者明日弟子問於莊子曰昨日此中之木以不材得終其天年今主人之鴈以不材死先生將何處莊子笑曰周將處夫子與不材之間材與不材之間似之而非也故未免乎累註設將處此耳以此未免於累竟不處䟽言材者有爲也不材者無爲也之間中道也雖復離彼二偏處兹中一既未遣中亦猶人不能理於人鴈不能同於鴈故似道而非眞道猶有斯於累也若夫乗道德而浮遊則不然䟽夫乗玄道至德而浮遊於世者則不如此也既遣二偏又忘中一則能虚通而浮遊於代爾無譽無訾一龍一蛇註訾毁也龍出也蛇處也言道無材與不材故毁譽之材都失也與時俱化䟽此遣中也既遣二偏又忘中一遣之又遣玄之又玄而無肯專爲䟽言既妙遣中一遠超四句豈復謟情毁譽惑意龍蛇故當世浮沈與時俱化何肯偏滯而專爲一物也一上一下以和爲量䟽言至人能隨時上下以和爲同度量浮遊乎萬物之祖䟽以大和而等重遊造物之祖宗物物而不物於物則胡可得而累邪䟽物不相物則無憂患此神農黄帝之法則也註故莊子亦處焉䟽郭注云故莊子亦處焉若夫萬物之情人倫之傳則不然䟽倫理也共俗物傳習則不如前也合則離成則毁廉則柱尊則榮䟽合則離之成者必毁清廉則被挫傷尊貴者又遭議疑世情險陂何可必固又廉則傷物物不堪化則反挫也自尊財物物不堪辱反有議疑也有爲則虧賢則謀䟽虧損也有爲則損也賢以志高爲人之所謀也不肖則欺胡可得而必乎哉䟽言己上賢與不肖等事何必爲也必則偏執名中所以有成虧也悲夫弟子志之䟽悲夫歎聲也志記也其唯道德之鄉乎註不可必故待之不可以一方也唯與時俱化者爲能涉變而常通耳䟽言能用中平之理其唯道德之鄉也市南宜僚見魯侯䟽姓熊名宜僚隱於市南也魯侯有憂色市南子曰君有憂色何也魯侯曰吾學先王之道脩先君之業吾敬鬼尊賢䟽先王謂王季文王先君謂周公伯禽也親而行之無須臾離居䟽離散也居安居也然不免於患吾是以憂市南子曰君之除患之術淺矣註有其身而矜其國故雖憂懷萬端尊賢尚行而患慮愈深矣䟽言敬鬼尊賢之法其法未除也夫豐狐文豹䟽豐大也以文章豐美毛衣悦澤故爲人利也棲於山林伏於巖穴靜也夜行晝居戒也雖飢渴隱約猶且胥䟽於江湖之上而求食焉䟽戒愼也隱約猶斟酌也旦明也胥皆也言雖飢渴猶斟酌明旦無人之時相命於江湖之上扶䟽草中而求食也定也然且不免於網羅機辟之患是何罪之有哉其皮爲之灾也䟽機辟罝罘也言斟酌定計如此猶不免罝罘之患者更無餘罪直是皮色之患也今魯國獨非君之皮邪吾願君刳形去皮洒心去欲而遊於無人之野註欲令無其身忘其國而任其自化也䟽刳形忘身也去皮忘國也洒心忘智也去欲息貪也無人之野謂道德之鄉也郭註云欲令無其身忘其國任其自化南越有邑焉名爲建德之國註寄之南越取其去魯之遠也䟽言去魯既遥名建立無爲之道也其民愚而朴少私寡欲知作而不知藏䟽作謂耕作也藏謂藏貯也君既懷道民亦還淳與而不求其報不知義之所適不知禮之所將䟽義宜也將行也猖狂妄行䟽猖狂無心也妄行混跡也乃蹈乎大方註各恣其本歩而人人自蹈其方則萬方得矣不亦大乎䟽道方也猖狂恣任混跡妄行乃能蹈大方之道其生可樂其死可葬註言可終始處之䟽郭注云言可以終始處之也吾願君去國捐俗與道相輔而行註所謂去國捐俗謂蕩餘其胸中也䟽捐棄也言棄俗與無爲至道相輔導而行也君曰彼其道遠而險又有江山我無舟車奈何註眞謂欲使之南越䟽迷悟性殊故致魯越之隔也市南子曰君無形倨註形倨躓礙之謂䟽勿恃高尊形容倨傲無留居註留居滯守之謂䟽隨物任運無滯榮觀以爲君車註形與物夷心與物化斯寄物以自戴也君曰彼其道幽遠而無人君誰與爲鄰吾無糧我無食安得而至焉䟽未體獨化不能忘物也市南子曰少君之費寡君之欲雖無糧而乃足註所謂知足則無所不足也䟽言道不資物成而但恬淡耳君其涉於江而浮於海䟽江謂智也海謂道也涉上善之之江遊大道之海望之而不見其崖愈往而不知其所窮註絶情欲之遠也䟽寧知窮極哉送君者皆自崖而反註君欲絶則民各反守其分䟽送君行邁至于道德之鄉民反其自守素分崖分也君自此遠矣註超然獨立於萬物之上也䟽自從也君從此清高道德玄遠也故有人者累註有人者有之以爲己私也䟽君臨魯邦富贍人物爲我己有深成病累也見有於人者憂註見有於人者爲人所役用也䟽言未能忘魯見有於人是以敬鬼尊賢矜人恤衆爲臨役寜非憂患故堯非有人非見有於人也註雖有天下皆寄之百官委之萬物而不與焉斯非有人也因民任物而不役己斯非見有於人也䟽郭注云雖有天下皆寄之百官委之萬物而不與焉斯非有人也因民任物而不役己斯非見有於人也吾願去君之累除君之憂而獨與道遊於大莫之國註欲令蕩然無有國之懷䟽大莫猶大無也言天下無能雜之方舟而濟於河䟽相舟兩並曰方舟有虚船來觸舟雖有褊心之人不怒䟽褊狹急也不怒者縁舟虚故也有一人在其上則呼張歙之一呼而不聞再呼而不聞於是三呼邪則必以惡聲隨之䟽惡聲駡辱也向也不怒而今也怒向也虚而今也實人能虚己以遊世其孰能害之註世雖變其於虚己以免害一也䟽虚己無心也北宫奢䟽姓北宫名奢居北宫因以爲姓衛之大夫也爲衛靈公賦斂以爲鍾爲壇乎郭門之外䟽言爲鍾先須設祭所以爲壇也三月而成上下之縣䟽上下調八音備故曰縣王子慶忌見而問焉曰子何術之設䟽周王慶忌之子周之大夫言見鍾壇極妙怪而問焉奢曰一之間無敢設也註泊然抱一耳非敢假設以益事也䟽郭注云泊然抱一耳非敢假設以益事也奢聞之既彫既琢復歸於朴註還用其本性也䟽郭注云還用本性侗乎其無識註任其純朴而已䟽侗乎無情之貌任其淳朴而己儻乎其怠疑註無所趣也䟽儻無慮也怠退也言狐疑思慮之事並已去矣萃乎芒乎其送往而迎來註無所忻悦䟽萃聚也言物之萃聚芒然不知物之去來亦不迎送此下各任物也又芒昧恍惚心無的當隨其迎送任物往來來者勿禁往者勿止註任彼也䟽百姓懷來者未防禁而去者亦無情而留止也從其彊梁註順乎梁也隨其曲傳註無所係也䟽傳張戀反剛彊難賦者從而任之人情曲傳者隨而順之因其自窮註用其不得不爾䟽因任百姓各於其所情也故朝夕賦斂而毫毛不挫註當故無損䟽雖設賦斂而未嘗抑度各率其性是故略無任損者也而况有大塗者乎註泰然無執用天下之自爲斯大通之塗也故曰經之營之不日成之䟽塗道也直致任物己任枉損况資大道神化無爲三月而成何怪之有孔子圍於陳蔡之間七日不火食䟽楚昭王召孔子孔子自魯聘楚途經陳蔡二國之間居之徒衆既多陳蔡之人謂孔子是陽虎所以起兵圍之門人飢餒七日不起火食窘迫困苦也太公任往弔之曰子幾死乎曰然子惡死乎曰然註自同於好惡耳聖人無好惡也䟽太公老之稱也任名也幾近也然猶如是也尼父既遭圍繞太公弔而問之曰子近死乎答曰如是曰子嫌惡乎答云如是也任曰子嘗言不死之道東海有鳥焉其名曰意怠其爲鳥也翂翂翐翐而似無能引援而飛迫脅而棲註既弘大舒緩又心無常係䟽試言長生之道舉海鳥而譬之翂翂翐翐是舒遲不能高飛之貌也飛必援引徒侣不敢先起棲必戢其脅翼迫引於羣進不敢爲前退不敢爲後註常從容處中食不敢先嘗必取其緒註其於隨物而已䟽夫進退處中遠害之至飲啄隨行必依次叙是故其行列不斥註與羣俱也而外人卒不得害是以免於患註患害生於役知以奔競䟽爲其謙柔不與物競故衆鳥行列不獨斥棄也而外人造次不得害之是以免於人間之禍患直木先伐甘井先竭註才之害也䟽直木有材先遭斫伐甘井來飲其流先竭人衒才智其義亦然子其意者飾知以驚愚脩身以明汙昭昭乎如揭日月而行故不免也註夫察焉小異則與衆爲迕矣混然大同則無獨於世矣故夫昭昭者乃㝠㝠之迹也將寄言以遺迹故因陳蔡以託患䟽謂仲尼意在裝飾才智驚異愚俗脩瑩身心顯他汗染昭昭明察炫耀己能猶如揭日月而行故不免於禍患也昔吾聞之大成之人曰自伐者無功功成者隳名成者虧註恃功名以爲已成者未之嘗全䟽大成之人即老子也言聖德宏博生成庶品故謂之大成伐取也隳敗也夫自取其能者無功續而功成不退者必隳敗名聲彰顯者不韜光必毁辱孰能去功與名而還與衆人註功自衆成故還之䟽夫能立大功建鴻名而功成弗居推功於物者誰能如是其唯聖人乎道流而不明註昧然而自行耳䟽道德流行徧滿天下而韜光匿耀故云不明居得行而不名處註彼皆居然自得此行耳非由名而後處之䟽身有道德盛行於世而藏名晦迹故不處其名純純常常乃比於狂註無心而動故也䟽純純者材素常常者混物既不矜飾更類於狂人也削迹捐勢不爲功名註功自彼成故勢不在我而名迹皆去䟽削除聖迹捐棄權勢豈存情於功績以留意於名譽是故無責於人人迹無責焉註恣情任彼故彼各自當其責也䟽爲是義故無名譽我既不譴於人故人亦無責於我至人不聞子何喜哉註寂泊無懷乃至人也䟽夫至德之人不顯於世子既聖哲何爲喜好名聲者邪孔子曰善哉辭其交遊去其弟子逃於大澤衣裘褐食杼栗註取於棄人間之好也䟽孔子既承教戒善其所言於是辭退交遊捨去弟子離析徒衆獨逃山澤之中捐縫掖而服絺裘棄甘肥而食杼栗入獸不亂羣入烏不亂行註若草木之無心故爲鳥獸所不畏鳥獸不惡而况人乎註蓋寄言以極推至誠之信任乎物而無受害之地也䟽同死灰之寂泊類草木之無情羣鳥獸而不驚況人倫而有惡邪孔子問子桑雩曰吾再逐於魯伐樹於宋削迹於衛窮於商周圍於陳蔡之間吾犯此數患親交益䟽徒友益散何與䟽姓桑名雩隱者也孔子爲魯司寇齊人聞之遂選女樂文馬而遺魯君間搆魯君因而被逐宋是殷後孔子在宋及周遂不被用故偁窮也遇此憂患親戚交情益甚䟽遠門徒朋友益甚離散何爲如此耶子桑雩曰子獨不聞假人之亡與林回棄千金之璧負赤子而趨或曰爲其布與赤子之布寡矣註布謂財帛也爲其累與赤子之累多矣棄千金之壁負赤子而趨何也䟽假國名晋下邑也姓林名回假之賢人也布財貨也假遭晋滅百姓逃亡林回棄擲寳璧負子而走或人問之謂爲財布然亦以爲財則少財以爲累重則多累輕負多不知何也林回曰彼以利合此以天屬也夫以利合者迫窮禍患害相棄也以天屬者迫窮禍患害相收也夫相收之與相棄亦遠矣䟽寳璧利合也赤子然親屬也親屬急迫猶相收利合窮禍則相棄棄收之情相去遠耳且君子之交淡若水小人之交甘若醴君予淡以親註無利故淡道合故親小人甘以絶註飾利故甘利不可常故有時而絶也䟽無利故淡道合故親有利故甘利盡故絶彼無故以合者由無故以離註夫無故而自合者天屬也合不由故則故不足以離之也然則有故而合必有故而離矣䟽不由事故而合者謂父子天屬也故無由而離之孔子說先王陳迹親於明友非天屬也皆爲求名利而來此則是有故而合也見削迹伐樹而去是則有故而離也非是天屬無故自親無故自離孔子曰敬聞命矣徐行翔佯而歸絶學捐書弟子無挹於前其愛益加進註去飾任素故也䟽的聞高命徐歩而歸翶翔閑放逍遥自得絶有爲之學棄聖迹之書不得華藻之教故無揖讓之禮徒有敬愛月加進益焉異日桑雩又曰舜之將死眞泠禹曰汝戒之哉形莫若縁情莫若率註因形率情不矯之以利也䟽縁順也形必順物情必率中昔虞舜將終用此眞教命大禹今其戒愼依語遵行故桑雩引來以告孔子亦有作泠字者泠曉也舜將眞言曉示大禹也縁則不離率則不勞註形不假故常全精不矯故常逸䟽形順則常合於物性率則用而無弊不離不勞則不求文以待形註任朴而直前也䟽率性而動任朴直前豈復求假文迹而待用飾其形性哉不求文以待形固不待物註朴素而足䟽既不求文籍以飾形故知當分各足不待於外物也莊子衣大布而補之正緳係履而過魏王魏王曰何先生之憊邪䟽大布猶粗布也莊子家貧以粗布爲服而補之緳履帶也亦言腰帶也履穿故以繩係之魏王魏惠王也憊病也衣粗布而著破履正腰帶見魏王王見其顦顇故問言先生何貧病如此耶莊子曰貧也非憊也士有道德不能行憊也衣弊履穿貧也非憊也此所謂非遭時也王獨不見夫騰猿乎其得柟梓豫章也攬蔓其枝而王長其間雖羿逄蒙不能睥睨也註遭時得地則申其長枝故雖古之善射莫之能害䟽柟梓豫章皆端直好木也攬蔓猶把捉也長王猶自得也羿古之善射人逄蒙羿之弟子也睥睨猶斜視字亦有作聒字者讀之言善士賢人遭時得地猶如猨得直木則跳躑自在雖有善射之人不敢舉目側視何况灣弓乎及其得柘棘枳枸之間也危行側視振動悼慄此筋骨非有加急而不柔也處勢不便未足以逞其能也䟽柘棘枸枳並有刺之惡木也夫猨得有刺之木不能逞其捷巧是以心中悲悼而戰慄形貌危行而側視非謂筋骨有異於前而勢不便也士逢亂世亦須如然今處昏上亂相之間而欲無憊奚可得邪此比干之見剖心徵也夫註勢不便而强爲之則受戮矣䟽此合諭也當時周室微弱六國興盛於是主昏於上臣亂於下莊生懷道抱德莫能見用晦迹遠害故發此言昔殷紂無道比干忠諫剖心而死豈非徵驗引古證今異日明鏡孔子窮於陳蔡之間七日不火食左據槁木石擊槁枝而歌猋氏之風有其具而無其數有其聲而無宫角木聲與人聲犁然有當於人之心䟽猋氏神農也孔子聖人安於窮通雖遭陳蔡之困不廢無爲故左手擊槁木右手凭枯枝恬然自得歌猋氏之淳風木乃八音雖擊而無曲無聲惟打木寧有於宫商然歌聲木聲犁然清淡而樂正心故有應當於人心者也顔回端拱還目而窺之仲尼恐其廣己而造大也愛己而造哀也䟽顔生既見仲尼擊木而歌於是正身回目而視仲尼恐其未悟妄生虞度謂言仲父廣己道德而規造大位之心愛惜己身遭窮而造哀歎之曲慮其如是故召而誨之曰回無受天損易註唯安之故易無受人益難註物之儻來不可禁禦䟽夫自然之理有窮塞之損達於時命安之則易人倫之道有禄之益儻來而寄推之即難此明仲尼雖擊木而歌無心哀怨無始而非卒也註於今爲始者於昨爲卒則所謂始者即是卒矣言變化之無窮䟽卒終也於今爲始者於昨爲終也欲明無始無終無生無死既無死無生何窮塞之有哀乎人與天一也註皆自然也䟽所謂天損人益者猶是教迹之言也若至疑理處皆是自然故不二也夫今之歌者其誰乎註任其自爾則歌者非我也䟽夫大聖虚忘物我兼喪我既非我歌是誰歌我乃無身歌將安寄也回曰敢問無受天損易仲尼曰飢渴寒暑窮桎不行天地之行也運物之泄也註不可逃也䟽前略標名此下解義桎塞也夫命終窮塞道德不行此猶天地虚盈四時轉變運動萬物發泄氣候也言與之偕逝之謂也註所謂不識不知而順帝之則也䟽偕俱也逝往也既體運物之無常故與變化而俱往而無欣惡於其間也爲人臣者不敢去之執臣之道猶若是而況乎所以待天乎註所在皆安不以損爲損斯待天而不受其損已䟽夫爲人臣者不敢逃去君命執持臣道由自如斯而況爲變化窮通必待自然之理豈可違距者哉何謂無受人益難仲尼曰始用四達註感應旁通爲四達爵禄並至而不窮註旁通故可以御高大也物之所利乃非己也註非已求而取之䟽始本也乃宜也妙本虚寂迹用赴機傍通四方凝照九表既縻好爵財德無窮萬物利求是其宜也吾命其在外者也註人之生必外有接物之命非如瓦石止於形質而已䟽孔子聖人挺於天命運兹外德救彼蒼生非瓦石形質也君子不爲盜賢人不爲竊吾若取之何哉註盜竊者私取之謂也今賢人君子之致爵禄非私取也受之而已䟽夫賢人君子尚不爲盜竊況孔丘大聖寧肯違天乖理而私取於爵禄乎儻來而寄受之而已矣蓋無心也故曰鳥莫知於鷾鴯目之所不宜處不給視雖落其實棄之而走註避禍之速䟽鵲鴯燕也實食也智能遠害全身鳥中無過燕子飛入人舍欲作窠巢目略處所不是宜便不待周給看詠即遠飛出假令銜食落地急棄而走必不復收避禍之速者也其畏人也而襲諸人間註未有自䟽外於人而人存之者也畏人而入於人舍此鳥之所以稱知也䟽襲入也燕子畏懼於人而依附人住入人舍宅寄作窠巢是故人愛而狎之故得免害亦由聖人和光在世混迹人間戒愼灾危不溺塵境蒼生樂推而不厭故得乆視長生社稷存焉爾註況之至人則玄同天下天下樂推而不厭相與社而稷之斯無受人益之所以爲難也䟽聖德遐被羣品樂推社稷之存故其宜矣所謂人益此之謂乎何謂無始而非卒仲尼曰化其萬物而不知其禪之者註莫覺其變䟽襌代也夫道通生萬物變化羣方運轉不停新新變易日用不知故莫覺其代謝者也既無日新而變何始卒之有邪焉知其所終焉知其所始正而待之而已耳注日夜相代未始有極故正而待之無所爲懷也䟽夫終則是始始則是終故何能定終始既其無終與始則無死與生是以隨變任化所遇皆適抱守正眞待於造物而已矣何謂人與天一邪仲尼曰有人天也有天亦天也註凡所謂天皆明不爲而自然䟽夫人倫萬物莫不自然愛及自然也是以人天不二萬物混同人之不能有天性也註言自然則自然矣人安能故有此自然哉自然耳故曰性䟽夫自然者不知所以然而然自然耳不爲也豈是能有之哉若謂所有則非自然也故知自然者性也非人有之矣此解前有天之義也聖人晏然體逝而終矣註晏然無矜而體與變俱也䟽晏然安也逝往也夫聖人通始終之不二達死生之爲一故能安然解體隨化而往汎乎無始任變而終莊周遊乎雕陵之樊覩一異鵲自南方來者翼廣七尺目大運寸感周之顙而集於栗林䟽雕陵栗園名也樊藺也謂遊於栗園藺籬之内也運圓也感觸也顙額也異常之鵲從南方來翅長七尺眼圓一寸突著莊生之額仍棲栗林之中莊周曰此何鳥哉翼殷不逝目大不覩蹇裳躩步執彈而留之䟽殷大也逝往也躩歩猶疾行也留伺候也翅大不能遠飛目大不能遠視莊生怪其如此仍即起意規求既而舉步疾行把彈弓而伺候覩一蟬方得美蔭而忘其身螳蜋執翳而搏之見得而忘其形註執木葉以自翳於蟬而忘其形之見乎異鵲也異鵲從而利之見利而忘其眞註目能覩翼能逝此鳥之眞性也今見利故忘之䟽搏捕也眞性命也莊生執彈未放中間忽見一蟬隱於樹葉美兹蔭庇不覺有身有螳蜋執木葉以自翳意在捕蟬不覺形見異鵲異鵲從螳蜋之後利其捕蟬之便意在取利不覺性命之危所謂忘其眞矣莊周怵然曰噫物固相累註相爲利者恒相爲累䟽既覩蟬鵲徇利忘身於是怵然驚惕仍言噫歎之聲故知物相利者必有累憂二類相召也註夫有欲於物者物亦有欲之䟽夫有欲於物者物亦欲之也是以蟬鵲俱世物之徒利害相召必其然也捐彈而反走虞人逐誶之註誶問之也䟽捐棄也虞人掌栗園之虞侯也誶問也既覺利害相隨棄彈弓而反走虞人謂其盜栗故逐而問之莊周反入三月不庭藺且從而問之夫子何爲頃間甚不庭乎䟽莊周見鵲忘身被疑盜栗歸家愧恥不出門庭姓藺名且莊子弟子怪師頃來閉尸所以從而問之莊周曰吾守形而忘身註夫身在人間世有夷險若推夷易之形於此世而不度此世之所宜斯守形而忘身者也觀於濁水而迷清淵註見彼而不明即因彼以自見幾忘反鑒之道也䟽我見利徇物愛守其形而利害相召忘身者也既覩鵲蟬歸家不出門庭疑亦自責所以靜觀濁水所以迷於清泉雖非本性合意猶存反照之道且吾聞子曰入其俗從其俗註不違其禁令也䟽莊周師老聃故稱老子爲夫子也夫達者同塵入俗俗有禁令從而行之今既遊彼雕陵被疑盜栗輕犯憲網悔責之辭今吾遊於雕陵而忘吾身異鵲感吾顙遊於栗林而忘眞栗林虞人以吾爲戮吾所以不庭也註以見問爲戮夫莊子推平於天下故每寄言以出意乃毁仲尼賤老聃上掊擊乎三皇下痛病其一身也䟽意在異鵲遂忘栗林之禁令斯忘身也字亦作眞字者隨字讀之虞人謂我偷栗是成身恥之辱如此是故不庭夫莊子大人隱身卑位遨遊宋國養性漆園豈迷目於清淵留意於利害者邪蓋欲評品羣性毁殘其身耳陽子之宋宿於逆旅逆旅人有妾二人其一人美其一人惡惡者貴而美者賤陽子問其故逆旅小子對曰其美者自美吾不知其美也其惡者自惡吾不知其惡也䟽姓陽名朱字子居秦人也逆旅店也往於宋國宿於中地逆旅美者恃其美故人忘其美而不知也惡者謙下自惡故人忘其惡而不知也陽子曰弟子記之行賢而去自賢之行安往而不愛哉註言目賢之道無時而可䟽夫種德立行而去自賢輕物之心者何往而不得愛重哉故命門人記之云耳南華眞經注䟽卷之二十二
