body:
  text: 河南郭象注唐西華法師成玄英䟽古之人其知有所至矣䟽至造極之名也淳古聖人運智虚妙雖復和光混俗而智則無知動不乖寂常眞妙本所至之義列在下文也惡乎至䟽假設疑問於何而造極耶有以爲未始有物者至矣盡矣不可以加矣注此忘天地遺萬物外不察乎宇宙内不覺其一身故能曠然無累與物俱往而無所不應也䟽未始猶未曾世所有法悉皆非有唯物與我内外咸空四句皆非蕩然虚靜理盡於此不復可加答於前問意以明至極者也其次以爲有物矣而未始有封也注雖未都忘猶能忘其彼此䟽初學大賢鄰乎聖境雖復見空有之異而未曾封執其次以爲有封焉而未始有是非也注雖未能忘彼此猶能忘彼此之是非也䟽通欲難除滯物之情已有别惑易遣是非之見猶忘也是非之彰也道之所以虧也注無是非乃全也䟽夫有非有是流俗之鄙情無是無非達人之通鑒故知彼我彰而至道隱是非息而妙理全矣道之所以虧愛之所以成注道虧則情有所偏而愛有所成未能忘愛釋私玄同彼我也䟽虚玄之道既以虧損愛染之情於是乎成著矣果且有成與虧乎哉果且無成與虧乎哉注有之與無斯不能知乃至䟽果决定也夫道無增减物有虧成是以物愛既成謂道爲損而道實無虧也故假設論端以明其義有無既不决定虧成理非實録有成與虧故昭氏之鼓琴也無成與虧故昭氏之不鼓琴也注夫聲不可勝舉也故吹管操弦雖有繁手遺聲多矣而執籥嗚弦者欲以彰聲也彰聲而聲遺不彰聲而聲全故欲成而虧之者昭文之鼓琴也不成而無虧者昭文之不鼓琴也䟽姓昭名文古之善鼓琴者也夫昭氏鼓琴雖云巧妙而鼓商則喪角揮宫則失徵未若置而不鼓則五音自全亦由有成有虧存情所以乖道無成無虧忘智所以合眞者也昭文之鼓琴也師曠之枝策也惠子之據梧也三子之知幾乎注幾盡也夫三子者皆欲辯非己所明以明之故知盡慮窮形勞神倦或枝策假寐或據梧而瞑䟽師曠字子野晋平公樂師甚知音律支柱也策打鼓枝也亦言擊節枝也梧琴也今謂不爾昭文己能鼓琴何容二人共同一伎況檢典籍無惠子善琴之文而言據梧者只是以梧几而據之談說猶隱几者也幾盡也昭文善能鼓琴師曠妙知音律惠施好談名理而三子之性禀自天然各以己能明示於世世既不悟己又疲怠遂使柱策假寐以復凭几而瞑三好之能咸盡於此皆其盛者也故載之末年注賴其盛故能乆不爾早困也䟽惠施之徒皆少年盛壯故能運載形智至于衰末之年是非少盛乆當困苦也唯其好之也以異於彼注言此三子唯不好其所明自以殊於衆人䟽三子各以已之所好耽而翫之方欲矜其所能獨異於物其好之也欲以明之注明示衆人欲使同乎我之所好䟽所以疲倦形神好之不已者欲將己之道術明示衆人也彼非所明而明之故以堅白之昧終注是猶對牛鼔簧耳彼竟不明故己之道術終於昧然也䟽彼衆人也所明道術也白即公孫龍守白馬論也姓公孫名龍趙人當六國時弟子孔穿之徒堅執此論横行天下服衆人之口不服衆人之心言物禀性不同所好各異故知三子道異非衆人所明非明而强示之彼此終成暗昧亦何異乎堅執守白之論眩惑世間雖宏辯如流終有言而無理也而其子又以文之綸終終身無成注昭文之子又乃終文之緒亦卒不成䟽綸緒也言昭又之子亦乃荷其父業終其綸緒卒其年命竟無所成況在他人如何放哉若是而可謂成乎雖我亦成也注此三子雖求明於彼彼竟不明所以終身無成若三子而可謂成則雖我之不成亦可謂成也䟽我衆人也若三子異於衆人遂自以爲成而衆人異於三子亦可謂之成也若是而不可謂成乎物與我無成也注物皆自明而不明彼若彼不明即謂不成則萬物皆相與無成矣故聖人不顯此以耀彼不捨己而逐物從而任之各宜其所能故曲成而不遺也今三子欲以己之所好明示於彼不亦妄乎䟽若三子之與衆物相與而不謂之成乎故知衆人之與三子彼此共無成矣是故滑疑之耀聖人之所圖也爲是不用而寓諸庸此之謂以明注夫聖人無我者也故滑疑之耀則圖而域之恢恑憰怪則通而一之使群異各安其所安衆人不失其所是則己不用於物而萬物之用用矣物皆自用則孰是孰非哉故雖認蕩之變屈竒之異曲而從之寄之自用則用雖萬殊歷然自明䟽夫聖人者與天地合其德與日月齊其明故能晦迹同地韜光接物終不眩耀群品亂惑蒼生亦不矜己以率人而各域限於分内忘懷大順於萬物爲是寄於於群才而此運心可聖明眞知也今且有言於此不知其與是類乎其與是不類乎類與不類相與爲類則與彼無以異矣注今以言無是非則不知其與言有者類乎不類乎欲謂之類則我以無爲是而彼以無爲非斯不類矣然此雖是非不同亦固未免於有是非也則與彼類矣故曰類與不類又相與爲類則與彼無以異也然則將大不類莫若無心既遣是非又遣其遣遣之又遣之以至於無遣然後無遣無不遣而是非自去矣䟽類者輩徒相似之類也但群生愚迷滯是滯非今論乃欲反彼世情破兹迷執故假且說無是無非則用爲眞道是故復言相與爲類此則遣於無是無非也既而遣之又遣方至重玄也雖然請嘗言之注至理無言言則與類故試寄言之䟽嘗試也夫至理難復無言而非言無以詮理故試寄言彷象其義有始也者注有始則有終䟽此假設疑問以明至道無始無終此遣於始終也有未始有始也者注謂無終始而一死生䟽未始猶未曾也此又假問有未曾有始終不此遣於無始終也有未始有夫未始有始也者注夫一之者未若不一而自齊斯又忘其一也䟽此又假問有未曾有始也者斯則遣於無始無終也有有也者注有有則美惡是非具也䟽夫萬象森羅悉皆虚幻故標此有明即以有體空此句遣有也有無也者注有無而未知無無則是非好惡猶未離懷䟽假問有此無不今明非但有即不有亦乃無即不無此句遣於無也有未始有無也者注知無無矣而猶未能無知䟽假問有未曾有無不此句遣非有未始有夫未始有無也者䟽假問有未曾未曾有無不此句遣非非無也而自淺之深從麤入妙始乎有有終乎非無是知離百非超四句明矣前言始終此則明時今言有無此則辯法唯時與法皆虚靜者也俄而有無矣而未知有無之果孰有孰無也注此都忘其知也爾乃俄然始了無耳了無則天地萬物彼我是非豁然確斯也䟽前後有無之迹入非非有無之本今後非非有無之體出有無之用而言俄者明即體即用俄爾之間蓋非賒遠也夫玄道窈冥眞宗微妙故俄而用則非有無而有無用而體則有無非有無也是以有無不定體用無恒誰能决定無耶誰能决定有耶此又就有無之用明非有非無之體者也今我則已有謂矣注謂無是非即復有謂而未知吾所謂之其果有謂乎其果無謂乎注又不知謂之有無爾乃蕩然無纖芥於胸中也䟽謂言也莊生復無言也理出有言之教即前請嘗言之類是也既寄此言以詮於理未知斯言定有言耶定無言耶欲明理家非默非言教亦非無非有恐學者滯於又字故致此辭天下莫大於秋豪之末而太山爲小莫壽乎殤子而彭祖爲夭天地與我並生而萬物與我爲一注夫以形相對則太山大於秋豪也若各據其性分物冥其極則形大未爲有餘形小不爲不足於其性則秋豪不獨小其小而太山不獨大其大矣若以性足爲大則天下之足未有過於秋豪也若性足者非大則雖太山亦可稱小矣故曰天下莫大於秋豪之末而太山爲小太山爲小則天下無大矣秋豪爲大則天下無小也無小無大無壽無夭是以蟪蛄不羡大椿而欣然自得斥鴳不貴天池而榮願以足茍足於天然而安其性命故雖天地未足爲壽而與我並生萬物未足爲異而與我同得則天地之生又何不並萬物之得又何不一哉䟽秋時獸生豪毛其末至微故謂秋豪之末也人生在於襁褓而亡謂之殤子太大也夫物之生也形氣不同有小有大有夭有壽若以性分言之無不自足是故以性之爲大天下莫大於豪末無餘爲小天下莫小於太山太山爲小則天下無大豪末爲大則天下無小小大既爾夭壽亦然是以兩儀雖大各足之性乃均萬物雖多自得之義唯一前明不終不始非有非無此明非小非大無夭無壽耳既已爲一矣且得有言乎注萬物萬形同於自得其得一也已自一矣理無所言既己謂之一矣且得無言乎注夫名謂生於不明者也物或不能自明其一而以此逐彼故謂一以正之既謂之一即是有言矣䟽夫玄道冥寂理絶形聲誘引迷途稱謂斯起故一雖玄統而猶是名教既謂之一豈曰無言乎一與言爲二二與一爲三自此以往巧歷不能得而況其凡乎注夫以言言一而一非言也則一言爲二矣一既一矣言又二之有一有二得不謂之三乎夫以一言言之猶乃成三況尋其支流凡物殊稱雖有善數莫之能紀也故一之者與彼未殊而忘一者無言而自一䟽夫妙一之理理非所言是知以言言一而一非言也且一既一矣言又言焉有一有言二名斯起覆將後時之二名對前時之妙一有一有二得不謂之三乎從三以往假有善巧筭歷之人亦不能紀得其數而況凡夫之類乎故自無適有以至於三而況自有適有乎注夫一無言也而有言則至三況尋其末數其可窮乎䟽自從也適往也夫至理無言言則名起故從無言以往有言纔言則至乎三況從有言往有言枝流分派其可窮乎此明一切方法本無名字從無生有遂至於斯矣無適焉因是已注各止於其所能乃最是也䟽夫諸法空幻何獨名言是知無即非無有即非有有無名數當體皆寂既不從無以適有豈復自有以適有耶故無所措意於往來因循物性而已矣夫道未始有封注冥然無不在也䟽夫道無不在所在皆無蕩然無際有何封域也言未始有常注彼此言之故是非無定䟽道理虚通既無限域故言教隨物亦無常定也爲是而有畛也注道無封故萬物得恣其分域䟽畛界畔也理無崖域教隨物變是爲義故畛分不同請言其畛䟽畛假設問㫖發起後文也有左有右注各異便也䟽左陽也右陰也理雖凝寂教必隨機畛域不同昇沉各異故有東西左右春秋生殺有倫有義注物物有理事事有宜䟽倫理也義宜也群物糾紛有理存焉萬事參差各隨宜便者也有分有辯注群分而類别也䟽辯别也飛走雖衆各有群分物性萬殊自隨類别矣有競有爭注並逐曰競對辯曰爭䟽夫物性昏愚彼我封執既而並逐勝負對辯是非也此之謂八德注略而判之有此八德䟽德者功用之名也群至功用轉變無窮略而陳之有此八種斯則釋前有畛之義也六合之外聖人存而不論注夫六合之外謂萬物性分之表耳夫物之性表雖有理存焉而非性分之内則未嘗以感聖人也故聖人未嘗論之則是引萬物使學其所不能也故不論其外而八畛同於自得也䟽六合者謂天地四方也六合之外謂衆生性分之表重玄至道之鄉也夫玄宗罔象出四句之瑞妙理希夷超六合之外既非神口所辯所以存而不論也六合之内聖人論而不議注陳其性而安之䟽六合之内謂蒼生所禀之性分夫云云取捨皆起妄情尋責根源並同虚有聖人隨其機感陳而應之既曰馮虚亦無可詳議故下文云我亦妄說之春秋經世先王之志聖人議而不辯注順其成迹而凝乎至當之極不執其所是以非衆人也䟽春秋者時代也經者典誥也先王者三皇五帝也誌記也夫祖述軒頊憲章堯舜記録時代以爲與謨軌轍蒼生流傳人世而聖人議論利益當時終不執是辯非滯於陳迹故分也者有不分也辯也者有不辯也注夫物物自分事事自别而欲由己以分别之者不見彼之自别也䟽夫理無分别而物有是非故於無封無域之中而起有分有辯之見者此乃一曲之士偏滯之人亦何能剖析於精微分辯於事物者也曰何也䟽假問質疑發生義㫖聖人懷之注以不辯爲懷耳聖人無懷䟽夫達理聖人冥心會道故能懷藏物我包括是非枯木死灰曾無分别矣衆人辯之以相示也故曰辯也者有不見也注不見彼之自辯故辯己所知以示之䟽衆多之人即衆生之别稱也凡庸迷執彼之自别亦乃不鑒己之妙道故云有不見也夫大道不稱注付之自稱無所稱謂䟽大道虚廓妙絶形名既非色聲故不可稱謂體道之人消聲亦爾也大辯不言注已自别也䟽妙悟眞宗無可稱說故辯彫萬物而言無所言大仁不仁注無愛而自存也䟽亭毒群品汎愛無心譬彼青春非爲仁也大廉不嗛注夫至足者物之去來非我也故無所容其嗛盈䟽夫玄悟之人鑒達空有知萬境虚幻無一可貪物我俱空何所遜讓大勇不忮注無往而不順故能無險而不往䟽忮逆也内藴慈悲外弘接物故能俯順塵俗惠救蒼生虚己逗機終無迕逆道昭而不道注以此明彼彼此俱失矣䟽明已功名炫耀於物此乃淫僞不是眞道言辯而不及注不能及其自分䟽不能玄默唯滯名言華詞浮辯不達深理仁常而不成注物無常愛而常愛必不周䟽不能忘愛釋知玄同彼我而恒懷恩惠每挾親情欲效成功無時可見廉清而不信注皦然廉清貪名者耳非眞廉也䟽皎然異俗卓爾不群意在聲名非實廉也勇忮而不成注忮逆之勇天下共疾之無敢舉足之地也䟽捨慈而勇忮逆物情衆共疾之必無成遂也五者園而幾向方矣注此五者皆以有爲傷當者也不能止乎本性而求外無已夫外不可求而求之譬猶以圓學方以魚慕鳥耳雖希翼鸞鳳擬規日月此愈近彼愈遠實學彌得而性彌失故齊物而偏尚之累去矣䟽園圓也幾近也五者即已前道昭等也夫學道之人直須韜晦而乃矜炫己之能顯燿於物其於道也不亦遠乎猶如慕方而學園圓愛飛而好游泳雖希翼鸞鳳終無騫翥之能擬規日月詎有幾方之效故也故知止其所不知至矣注所不知者皆性分之外也故止於所知之内而至也䟽夫境有大小智有明闇智不逮者不須强知故知止其分學之造極也孰知不言之辯不道之道若有能知此之謂天府注浩然都任之也䟽孰誰也天自然也誰知言不言之言道不道之道以此積辯用兹通物者可謂合於自然之府藏也注焉而不滿酌焉而不竭注至人之心若鏡應而不藏故曠然無盈虚之變也而不知其所由來注至理之來自然無迹䟽夫巨海深宏莫測涯際百川注之而不滿尾閭泄之而不竭體道大聖其義亦然萬機頓起而不撓其神千難殊對而不忤其慮故能囊括群有府藏含靈又譬懸鏡高堂物來斯照能照之智不知其所由來可謂即照而忘忘而能照者也此之謂葆光注任其自明故其光不弊也䟽葆蔽也至忘而照即照而忘故能韜蔽其光其光彌朗此結以前天府之義故昔者堯問於舜曰我欲伐宗膾胥敖南面而不釋然其故何也注於安任之道未弘故聽朝而不怡也將寄明齊一之理於大聖故發自怪之問以起對也䟽釋然怡悦貌也宗膾胥敖是堯時小蕃三國號也南面君位也舜者顓頊六世孫也父曰瞽瞍母曰握登感大虹而生舜生於姚墟因即姓姚住於嬀水亦曰嬀氏目有重瞳子因字重華以仁孝著於鄉黨堯聞其賢妻以二女封邑於虞年三十總百揆三十三受堯襌即位之後都於蒲坂在位四十年讓禹後崩葬於蒼梧之野而三國貢賦既愆所以應須問罪謀事未定故聽朝不怡欲明齊物之一理故寄問答於二聖舜曰夫三子者猶存乎蓬艾之間注大物之所安無陋也則蓬艾乃三子之妙處也若不釋然何哉䟽三子即三國之君也言蓬艾賤草斥鷃足以逍遥况蕃國雖卑三子足以存養乃不釋然有何意謂也昔者十日並出萬物皆照注夫重明登天六合具照無有蓬艾而不光被也而況德之進乎日者乎注夫日月雖無私於照猶有所不及德則無不得也而今欲奪蓬艾之願而伐使從己於至道豈弘哉故不釋然神解耳若乃物暢其性各安其所安無遠邇幽深付之自若皆得其極則彼無不當而我無不怡也䟽進過也淮南子云昔堯時十日並出焦禾稼殺草木封豨長蛇皆爲民害於是堯使羿上射十日遂落其九下殺長蛇以除民害夫十日登天六合俱照覆盆隱處猶有不明而聖德所臨無幽不燭連兹二智過彼三光乃欲興動干戈伐令從己於安任之道豈曰弘通者耶齧缺問乎王倪曰子知物之所同是乎䟽齧缺許由之師王倪弟子並堯時賢人也託此二人明其齊一言物情顚倒執見不同悉皆自是非他頗知此情是否曰吾惡乎知之注所同未必是所異不獨非故彼我莫能相正故無所用其知䟽王倪答齧缺云彼此各有是非遂成無主我若用知知彼我知還是是非故我於何知之言無所用其知也子知子之所不知邪䟽子既不知物之同是頗自知己之不知乎此從麤入妙次第窮質假託師資以顯深趣曰吾惡乎知之注若自知其所不知即爲有知有知則不能任群才之自當䟽若以知知不知不知還是知故重言於何知之還以不知答也然則物無知邪䟽重責云汝既自無知物豈無知者邪曰吾惡乎知之注都不知乃曠然無不任矣䟽豈獨不知我亦乃不知物唯物與我内外都忘故無所措其知也雖然嘗試言之注以其不知故未敢正言試言之耳䟽然乎猶雖然也既其無知理無所說不可的當故嘗試之也庸詎知吾所謂知之非不知邪注魚游於水水物所同咸謂之知然自鳥觀之則向所謂知者復爲不知矣夫蛣蜣之知在於轉丸而笑蛣蜣者乃以蘇合爲貴故所同之知未可正據䟽夫物或此知而彼不知彼知而此不知魚鳥水陸即其義也故知即不知不知即知凡庸之人詎知此理耶庸詎知吾所謂不知之非不知邪注所謂不知者直是不同耳亦自一家之知䟽所謂不知者彼此不相通耳非謂不知耳且吾嘗試問乎汝注己不知其正故試問汝䟽理既無言不敢正據聊復反質試問乎汝民溼寢則腰疾偏死鰌然乎哉木處則惴慄恂懼猨猴然乎哉三者孰知正處注此略舉三者以明萬物之異便䟽惴慄恂懼是恐迫之别名然乎哉謂不如此也言人濕地卧寢則病腰跨偏枯而死泥鰌豈如此乎人於樹上居處則迫怖不安猨猴跳躑曾無所畏物性不同便宜各異故舉此三者以明萬物誰知正定處乎所是知蓬户金閨榮辱安在民食芻豢麋鹿食薦蝍蛆甘帶䲭鴉嗜鼠四者孰知正味注此略舉四者以明美惡之無主䟽芻草也是牛羊之類豢養也是犬豕之徒皆以所食爲名也麋與鹿而食長薦茂草鴟鳶鴉鳥便嗜腐鼠蜈蚣食蛇略舉四者定與誰爲滋味乎故知盛饌蔬食其致一者也猨猵狙以爲雌麋與鹿交猶與魚游毛嬙麗姬人之所美也魚見之深入鳥見之高飛麋鹿見之决驟四者孰知天下之正色哉注此略舉四者以明天下所好之不同也不同者而非之則無以知所同之必是䟽猨猴狙以爲雌雄麋鹿更相撓泥鰌與魚游戲毛嬙越王嬖妾麗姬晋國之寵嬪此二人者姝妍冠世人謂之美也然魚見怖而深入鳥見驚而高飛麋鹿走而不顧舉此四者誰知宇内定是美色耶故知凡夫愚迷妄生憎愛以理觀察孰是非哉决卒疾貌也自我觀之仁義之端是非之塗樊然殽亂吾惡能知其辯注夫利於彼者或害於此而天下之彼我無窮則是非之境無常故唯莫之辯而任其自是然後蕩然俱得䟽夫物乃衆而未嘗非我故行仁履義損益不同或於我爲利於彼爲害或於彼爲是則於我爲非是以從彼我而互觀之是非之路仁義之緒樊亂糾紛若殽饌之雜亂既無定法吾何能知其分别耶齧缺曰子不知利害則至人固不知利害乎注未能妙其不知故猶嫌至人當知之斯懸之未解也䟽齧缺曰未悟彼此之不知更起利害之疑請云子是至人應知利害必其不辯迷闇若夜游重爲此難冀州後答之矣王倪曰至人神矣注無心而無不順䟽至者妙極之體神者不測之用夫聖人虚已應物無方知而不知辯而不辯豈得以名言心慮億度至人耶大澤焚而不能熱河漢沍而不能寒疾雷破山風振海而不能驚注夫神全形具而體與物冥者雖涉至變而未始非我故蕩然無蠆介於胷中也䟽沍凍也原澤焚燎河漢水凝雷霆奮發而破山飄風濤蕩而振海而至人神凝未兆體與物冥水火既不爲灾風雷詎能驚駭猶如此也虚淡無心方之雲氣蔭芘群品順物而行若然者乗雲氣注寄物而行非我動也騎日月注有晝夜而無死生也䟽昏明代序有晝夜之可分處順安時無死生之能異而控馭群物運載含靈故有乗騎之名也耳而遊乎四海之外注夫唯無其知而任天下之自爲故馳萬物而不窮也䟽動寂相即眞應一時瑞坐寰宇之中而心遊四海之外矣死生無變於己注與變爲體故死生若一而況利害之端乎注况利害於死生愈不足以介意䟽夫利害者生涯之損益耳既死生爲晝夜乗變化以遨遊況利害於死生曾何足以介意矣瞿鵲子問乎長悟子曰吾聞諸夫子聖人不從事於務注務自來而理自應耳非從而事之也䟽務猶事也諸於也瞿鵲是長梧弟子故謂師爲夫子夫體道聖人忘懷冥物雖涉事有而不以爲務混跡塵俗泊爾無心豈措意存情從於事物瞿鵲既欲請益是以述昔之所聞者也不就利不違害注任而直前無所避就䟽違避也體窮通之關命達利害之有時故推理直前而無所避就也不喜求注求之不喜直取不怒䟽妙悟從遠也故物求之而不忻喜矣不縁道注獨至者也䟽夫聖智凝湛照物無情不將不迎無生無滅固不以攀縁之心行乎虚通至道者也無謂有謂有謂無謂注凡有稱謂者皆非吾所謂也彼各自謂耳故無彼有謂而有此無謂也䟽謂言教也夫體道至人虚夷寂絶從本降迹感而遂通故能理而教無謂而有謂殺而理有謂而無謂者也而遊乎塵垢之外注凡非眞性皆塵垢也䟽和光同塵處染不染故雖在囂俗之中而心自遊於塵垢之外者矣夫子以爲孟浪之言而我以爲妙道之行也吾子以爲奚若䟽孟浪猶率略也奚何也若如也如何所謂不縁道等乃窮理盡性瞿鵲將爲妙道之行長梧用作率略之談未知其理如何以何爲是長梧子曰是黃帝之所聽瑩也而丘也何足以知之䟽聽瑩疑惑不明之貌也夫至道深玄非名言而可究雖復三皇五帝乃是聖人而詮辯至理不盡其妙聽瑩至竟疑惑不明我是何人猶能曉了本亦有作黃字者則是軒轅且汝亦大早計見卵而求時夜見彈而求鴞炙注夫物有自然理有至極循而直往則冥然自合非所言也故言之者孟浪而聞之者聽瑩雖復黄帝猶不能使萬物無懷而聽瑩至竟故聖人付當於塵垢之外而玄合乎視聽之表照之以天而不逆計放之自爾而不推明也今瞿鵲子方聞孟浪之言而便以爲妙道之行斯亦無異見卵而責司晨之功見彈而生鴞炙之實也夫不能安時處順而探變求化當生而慮死執是以辯非皆逆計之徒也䟽鴞即鵩鳥賈誼之所賦者也大小如雌雞而似斑鳩青緑色其肉甚美堪作羹炙出江南然卵有生雞之用而卵時未能司晨彈有得鴞之功而彈時未堪爲炙亦猶教能詮於妙理而教時非理今瞿鵲纔聞言說將爲妙道此計用之太早予嘗爲汝妄言之注言之則孟浪也故試妄言之汝以妄聽之奚注若正聽妄言復爲太早計也故亦妄聽之何䟽予我也奚何也夫至理無言言則孟浪我試爲汝妄說汝亦妄聽何如亦言奚者即何之聲也旁日月挾宇宙注以死生爲晝夜旁日月之喻也以萬物爲一體挾宇宙之譬也䟽旁依附也挾懷藏也天地四方曰宇往來古今曰宙契理聖人忘物忘我既而囊括萬有冥一死生故郭注云以死生爲晝夜旁日月之喻也以萬物爲一體挾宇宙之喻也爲其脗合置其滑涽以隸相尊注以有所賤故尊卑生焉而滑涽紛亂莫之能正各自是於一方矣故爲脗然自合之道莫若置之勿言委之自爾也脗然無波際之謂也䟽脗無分别之貌也置任也滑亂也涽闇也隸皂僕之類也蓋賤稱也夫物情顚倒妄執尊卑今聖人欲祛此惑爲脗然合同之道者莫若滑亂昏雜隨而任之以隸相尊一於貴賤也衆人役役注馳鶩於是非之境也聖人愚毛注芚然無知而直往之貌䟽役役馳動之容也愚芚無知之貌凡俗之人馳逐前境勞役而不息體道之士忘知廢照芚然而若愚也參萬歲而一成純注純者不雜者也夫舉萬歲而參其變而衆人謂之雜矣故役役然勞形怵心而去彼就此唯大聖無執故芚然直往而與變化爲一一變化而常遊於獨者也故雖參揉億載千殊萬異道行之而成則古今一成也物謂之而然則萬物一然也無物不然無時不成斯可謂純也䟽夫聖人者與二儀合其德萬物同其體故能隨變任化與世相宜雖復代歷古今時經夷險參雜塵俗千殊萬異而淡然自若不以介懷抱一精純而常居妙極也萬物盡然注無物不然而以是相藴注藴積也積是於萬歲則萬歲一是也積然於萬物則萬物盡然也故不知死生先後之所在彼我勝負之所如也䟽藴積也夫物情封執爲日已乆是以横論萬物莫不我然彼不然堅說古今悉皆自是他不是雖復萬物之多古今之遠是非藴積未有休時聖人順世污隆動而常寂參揉億載而純一凝然也予惡乎知悦生之非惑邪注死生一也而獨悦生欲與變化相背故未知其非惑也䟽夫鑪錘萬物未始不均變化死生其理唯一而獨悦生惡死非惑如何予惡乎知惡死之非弱喪而不知歸者邪注少而失其故居名爲弱喪夫弱喪者遂安於所在而不知歸於故鄉也焉知生之非夫弱喪焉知死之非夫還歸而惡之哉䟽弱者弱齡喪之言失謂少年遭亂喪失桑梓遂安他土而不知歸謂之弱失從無出有謂之爲生自有還無謂之爲死遂其戀生惡死豈非弱喪不知歸邪麗之姬艾封人之子也晋國之始得之也涕泣沾襟及其至於王所與王同匡牀食芻豢而後悔其泣也注一生之内情變若此當此之日則不知彼況夫死生之變惡能相知哉䟽昔秦穆公與晋獻公共伐麗戎之國得美女一玉環二秦取環而晋取女即麗戎國艾地守封疆人之女也匡正也初去麗戎離别親戚懷土之戀故涕泣沾襟後至晋邦寵愛隆重與獻公同方牀而燕處進牢饌以盈厨情好既移所以悔其先泣一生之内情變若此況死生之異何能知哉莊子寓言故稱獻公爲王耳予惡乎知夫死者不悔其始之蘄生乎注蘄求也䟽蘄求也麗姬至晋悔其先泣焉知死者之不却悔初始在生之日求生之意也夢飲酒者旦而哭泣夢哭泣者旦而田獵注此寤寐之事變也事茍變情亦異則死生之願不得同矣故生時樂生則死時樂死矣死生雖異其於各得所願一也則何係哉䟽夫死生之變猶覺夢之異耳夫覺夢之事既殊故死生之情亦别而世有覺凶而夢吉亦何妨死樂而生憂耶是知寤寐之間未足可係也方其夢也不知其夢也注由此觀之當死之時亦不知其死而自適其志也䟽方將爲夢之時不知夢之是夢亦猶方將處死之日不知死之爲死各適其志何所戀哉夢之中又占其夢焉注夫夢者乃復夢中占其夢則無以異於寤者也覺而後知其夢也注當所遇無不足也何爲方生而憂死哉䟽夫人在睡夢之中謂是眞實亦復占候夢想思度吉凶既覺以後方知是夢是故生時樂生死時樂死何爲當生而憂死哉且有大覺而後知此其大夢也注夫人覺者聖人也大覺者乃知夫患慮在懷者未寤也䟽夫擾擾生民芸芸群品馳鶩有爲之境昏迷大夢之中唯有體道聖人朗然獨覺知夫患慮在懷者皆未寤也而愚者自以爲覺竊竊然知之君乎牧乎固哉注夫愚者大夢而自以爲寤故竊竊然以所好爲君上而所惡爲牧圉欣然信一家之偏見可謂固陋矣䟽夫物情愚惑闇若夜遊昏在夢中自以爲覺竊竊然議專所知情之好者爲君上情之惡者同牧圉以此爲情懷可謂固陋牛曰牧馬曰圉也丘也與汝皆夢也注未能忘言而神解故非大覺也䟽丘是長梧名也夫照達眞言猶以爲夢况愚徒竊竊豈有覺哉予謂汝夢亦夢也注即復夢中之占夢也夫自以爲夢猶未寤也況竊竊然自以爲覺哉䟽夫迷情無覺論夢還在夢中聲說非眞妙辯猶居言内是故夢中占夢夢所以皆空言内試言言所以虚假此託夢中之占夢亦結孟浪之譚耳是其言也其名爲弔詭注夫非常之談故非常人之所知故謂之弔當卓詭而不識其懸解䟽夫舉世皆夢此乃玄談非常之言不顧於俗予當卓詭駮異物情自非清通豈識深遠哉萬世之後而一遇大聖知其解者是旦暮遇之也注言能蜕然無係而玄同死生者至希也䟽且世萬年而一逢大聖知三界悉空四生非有彼我言說皆在夢中如此解人甚爲希遇論其賒促是旦暮逢之三十年爲一世也既使我與若辯矣若勝我我不若勝若果是也我果非也邪䟽若而皆汝也若不勝汝也耶假問之詞也夫是非彼我舉體不眞倒置之徒妄爲臧否假使我與汝對爭汝勝我不勝汝勝定是我不勝定非耶固不可也我勝若若不吾勝我果是也而果非也邪注若而皆汝也䟽假令我勝於汝汝不及我我决是也汝定非也各據偏執未足可依也其或是也其或非也邪䟽或不定也我之與汝或是或非彼此言之勝負不定故或是則非是或非則非非也其俱是也其俱非也邪䟽俱是則無非俱非則無是故是非彼我出自妄情也我與若不能相知也則人固受其黮闇吾誰使正之注不知而後推不見而後辯辯之而不足以自信以其與物對也辯對終日黮闇至竟莫能正之故當付之自正耳䟽彼我二人各執偏見咸謂自是故不能相知必也相知己之所非者他家之是也假令别有一人遣定臧否此人遺有彼此亦不離是非各據妄情總成闇惑心必懷愛此見所以黮闇不明三人各執使誰正之黮闇不明之謂也使同乎若者正之既與若同矣惡能正之䟽既將汝同見則與汝不殊與汝不殊何能正定此覆釋第一句使同乎我者正之既同乎我矣惡能正之注同故是之未足信也䟽注云同故是之耳未足信也此覆釋第二句也使異乎我與若者正之既異乎我與若矣惡能正之注異故指非耳亦不足據䟽既異我汝故别起是非别起是非亦何足可據此覆解第三句使同乎我與若者正之既同乎我與若矣惡能正之注是若果是則天下不得復有非之者也非若信非則亦無縁復有是之者也今是其所同而非其所異異同既具而是非無主故夫是非者生於好辯而休乎天均付之兩行而息乎自正也䟽彼此曲從是非兩順不異我汝亦何能正之此解第四句然則我與若與人俱不能相知也而待彼也邪注各自正耳待彼不足以正此則天下莫能相正也故付之自正而至矣䟽我與汝及人固受黮闇之人總有三人各執一見咸言我是故俱不相知三人既不能定豈復更須一人若别待一人亦與前何異彼也耶言其不待之也何謂和之以天倪注天倪者自然之分也䟽天自然也倪分也夫彼我妄執是非無主所以三人四句不能正之故假設論端託爲問答和以自然之分令歸無是無非天倪之義次列於下文曰是不是然不然是若果是也則是之異乎不是也亦無辯然若果然也則然之異乎不然也亦無辯注是非然否彼我更對故無辯無辯故和之以天倪安其自然之分而已不待彼以正之䟽辯别也夫是非然否出自妄情以理推求舉體虚幻所是則不是然則不然何以知其然耶是若定是是則異非然若定然然則異否而今此謂之是彼謂之非彼之所然此以爲否故知是非然否理在不殊彼我更對妄爲分别故無之也矣化聲之相待若其不相待注是非之辯爲化聲夫化聲之相待俱不足以相正故若不相待也䟽夫是非彼我相待而成以理推尋待亦非實故變化聲說有此待名名既不眞待便虚待待即非待故知不相待者也和之以天倪因之以曼衍所以窮年也注和之以自然之分任其無極之化尋斯以往則是非之境自泯而性命之致自窮也䟽曼衍猶變化也因任也窮盡也和以自然之分所以無是無非任其無極之化故能不滯不著既而處順安時盡天年之性命也忘年忘義振於無竟故寓諸無竟注夫忘年故玄同死生忘義故彌貫是非是非死生蕩而爲一斯至理也至理暢於無極故寄之者不得有窮也䟽振暢也竟窮也寓寄也夫年者生之所禀也既同於生死所以忘年也義者裁於是非也既一於是非所以忘義也此則遣前知是非無窮之義也既而生死是非蕩而爲一故能通暢妙理洞照無窮寄言無窮亦無無窮之可暢斯又遣於無極者也罔兩問景曰曩子行今子止曩子坐今子起何其無特操與注罔兩景外之微陰也䟽罔兩景外之微陰也曩昔也向也特獨也莊子寓言以暢玄理故寄景與罔兩明於獨化之義而罔兩問景云汝向行今止昔坐今起然則子行止坐起制在於形唯欲隨逐於他都無獨立志操者何耶景曰吾有待而然者邪注言天機自爾坐起無待無待而獨得者孰知其故而責其所以哉䟽夫物之形質咸禀自然事似有因理在無待而形影非遠尚有天機故曰萬類參差無非獨化者也吾所待又有待而然者邪注若責其所待而尋其所由則尋責無極卒至於無待而獨化之理明矣䟽影之所待即是形也若使影待於形形待造物請問造物復何待乎斯則待待無窮卒乎無待也吾待蛇蚹蜩翼邪注若待蛇蚹蜩翼則無特操之所由未爲難識也今所以不識正由不待斯類而獨化故耳䟽昔諸講人及郭生注意皆云蛇蚹是蝮下齟齬蜩翼者是蜩翅也言蛇待蚹而行蜩待翼而飛影待形而有也蓋不然乎若使待翼而飛待足而走飛禽走獸其類無窮何勞獨舉蛇蚹頻引爲譬即今解蚹者蛇蜕皮也蜩翼者蜩甲也言蛇蜕舊皮蜩新出甲不知所以莫辯其然獨化而生蓋無待也而蛇蜩二蟲猶蜕皮甲稱異諸物所以引之故外篇云吾待蛇蚹蜩甲耶是知形影之義與蚹甲無異者也惡識所以然惡識所以不然注世或謂罔兩待景景待形形待造物者請問夫造物者有邪無邪無也則胡能造物哉有也則不足以物衆形故明衆形之自物而後始可與言造物耳是以涉有物之域雖復罔兩未有不獨化於玄冥者也故造物者無主而物各自造物各自造而無所待焉此天地之正也故彼我相因形景俱生雖復玄合而非待也明斯理也將使萬物各反所宗於體中而不待乎外外無所謝而内無所矜是以誘然皆生而不知所以生同焉皆得而不知所以得也今罔兩之因景猶云俱生而非待也則萬物雖衆而共成乎天而皆歷然莫不獨見矣故罔兩非景之所制而景非形之所使形非無之所化也則化與不化然與不然從人之與由己莫不自爾吾安識其所以哉故任而不助則本末内外暢然俱得泯然無迹若乃責此近因而忘其自爾宗物於外喪主於内而愛尚生矣雖欲推而齊之然其所尚己存乎胸中何夷之得有哉䟽夫待與不待然與不然天機自張莫知其宰豈措情於尋責而思慮於心識者乎昔者莊周夢爲胡蝶栩栩然胡蝶也自喻適志與注自快得意悦豫而行䟽栩栩忻暢貌也喻曉也夫生滅交謝寒暑遞遷蓋天地之常萬物之理也而莊生暉明鏡以照燭汎上善以遨遊故能託夢覺於死生寄自他於物化是以夢爲胡蝶栩栩而適其心覺乃莊周蘧薳而暢其志也不知周也注方其夢爲胡蝶而不知周則與殊死不異也然所在無不適志則當生而係生者必當死而戀死矣由此觀之知夫在生而哀死者誤也䟽方爲胡蝶曉了分明快意適情悦豫之甚只言是蝶不識莊周死不知生其義亦爾俄然覺則蘧蘧然周也注自周而言故稱覺耳未必非夢也䟽蘧蘧驚動之貌也俄頃之間夢罷而覺驚怪思省方是莊周故注云自周而言故稱覺耳未必非夢也不知周之夢爲胡蝶與胡蝶之夢爲周與注今之不知胡蝶無異於夢之不知周也而各適一時之志則無以明胡蝶之不夢爲周矣世有假寐而夢經百年者則無以明今之百年非假寐之夢者也䟽昔夢爲蝶甚有暢情今作莊周亦言適志是以覺夢既無的當莊蝶豈辯眞虚者哉周與胡蝶則必有分矣注夫覺夢之分無異於死生之辯也今所以自喻適志由其分定非由無分也䟽既覺既夢有蝶有莊乃曰浮虚亦不無崖分也此之謂物化注夫時不暫停而今不遂存故昨日之夢於今化矣死生之變豈異於此而勞心於其間哉方爲此則不知彼夢爲胡蝶是也取之於人則一生之中今不知後麗姬是也而愚者竊竊然自以爲知生之可樂死之可苦未聞物化之謂也䟽夫新新變化物物遷流譬彼窮指方兹交臂是以周蝶覺夢俄頃之間後不知前此不知彼而何爲當生慮死妄起憂悲故知生死往來物理之變化也南華眞經注䟽卷之三
