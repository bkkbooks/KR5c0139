  - {type: variant, offset: 0, length: 0, content: '', CK-KZ: 不雜爲素則雖龍章鳳姿倩乎有非常之觀乃至素也若不能保其自然之質而雜乎外飾則雖犬羊之鞹庸得謂之純素哉疏夫混迹世物之中而與物無雜者至素者也參變囂塵之內而其神不虧者至純者也豈復獨立於高山之頂拱手於林籟之間而稱純素哉蓋不然乎此結釋前純素之道義也能體純素謂之眞人疏體悟解也妙契純素之理則所在皆眞道也故可謂得眞道之人也重刋道藏輯要}
