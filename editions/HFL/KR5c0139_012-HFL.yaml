body:
  text: 河南郭象注唐西華法師成玄英䟽外篇胠篋第十將爲胠篋探囊發匱之盜而爲守備則必攝緘縢固扃鐍此世俗之所謂知也䟽胠開篋箱囊袋攝收緘結縢繩也扃關鈕也鐍鎖鑰也夫將爲開箱探囊之竊發匱取財之盜此蓋小賊非巨盜者也欲與守備其法如何必須收攝箱囊緘結繩約堅固扃鐍使不慢藏此世俗之淺知也然而巨盜至則負匱揭篋擔囊而趨唯恐緘縢扃鐍之不固也然則向之所謂知者不乃爲大盜積者也註知之不足恃也如此䟽夫攝緘縢固扃鐍者以備小賊然大盜既至負揭而趨更恐繩約關鈕之不牢向之守備翻爲盜資是故俗知不足可恃故嘗試論之世俗之所謂知者有不爲大道積者乎所謂聖者有不爲大盜守者乎䟽夫體道大賢言無的當將欲顯忘言之理故曰試論之曰夫世俗之人知謨淺近顯迹之聖於理未深既而意在防閑更爲賊之聚積雖故官世翻爲盜之守備而信有不爲者欲明豈有不爲大盜積守乎言其必爲盜積也何以知其然邪䟽假設疑問發明義㫖昔者齊國鄰邑相望雞犬之音相聞罔罟之所布耒耨之所刺方二千餘里䟽齊即太公之後封於營丘之地逮桓公九合諸侯一匡天下百姓殷實無出三齊是以雞犬即嗚吠相聞鄰邑即棟宇相望罔罟布以事畋漁耒耨刺以脩農業境土寬大二千餘里論其盛美實冠諸侯耒犁也耨鋤也闔四境之内所以立宗廟社稷治邑屋州閭鄉曲者曷嘗不法聖人哉䟽夫人非土不立非穀不食故邑封土祠曰社封稷祠曰稷稷五穀之長也社吐也言能吐生萬物也司馬法六尺爲歩步百爲畝畝百爲夫夫三爲屋屋三爲井井四爲邑又云五家爲比五比爲閭五閭爲族五族爲黨五黨爲州五州爲鄉鄭玄云二十五家爲閭二千五百家爲州萬二千五百家爲鄉也闔合也曷何也而四境之内三齊之中置此宗廟等事者皆放效堯舜以辯聖人立邦國之法則也然而田成子一旦殺齊君而盜其國註法聖人者法其迹耳夫迹者已去之物非應變之具也奚足尚而執之哉執成迹以御乎無方無方至而迹滯矣所以守國而爲人守之也䟽田成子齊大夫陳恒也是敬仲七世孫初敬仲適齊食采於田故改爲田氏魯哀公十四年陳恒弑其君君即簡公也割安平至于郎邪自爲封邑至恒曾孫太公和遷齊康公於海上乃自立於齊侯自敬仲至莊公凡九世知齊政自太公威王三世爲齊侯通計爲十二世莊子宣王時人今不數宣王故言十二世也所盜者豈獨其國邪并與其聖知之法而盜之註不盜其聖法乃無以取其國也䟽田恒所盜豈唯齊國先盜聖智故得諸侯是知仁義陳迹適爲盜本也故田成子有乎盜賊之名而身處堯舜之安䟽田恒篡竊齊國故有巨盜之聲名而位忝諸侯身處唐虞之安樂小國不敢非大國不敢誅十二世有齊國䟽子男之邦不敢非毁伯侯之國詎能征伐遂胤冑相繫宗廟遐延世歷十二俱如前解則是不乃竊齊國并與其聖知之法以守其盜賊之身乎註言聖法唯人所用未足以爲全當之具䟽揭仁義以竊國資聖智以保身此則重舉前文以結其義也嘗試論之世俗之所謂至知者有不爲大盜積者乎所謂至聖者有不爲大盜守者乎䟽重結前義以發後文也何以知其然邪䟽假設疑問以暢其㫖也昔者龍逄斬比干剖萇弘肔子胥靡故四子之賢而身不免乎戮註言暴亂之君亦得據君人之威以戮賢人而莫之敢亢者皆聖法之由也向無聖法則桀紂焉得守斯位而放其毒使天下側目哉䟽龍逄姓關夏桀之賢臣爲桀所殺比干王子也諫紂紂剖其心而視之萇弘周靈王賢臣說苑云晋叔向之殺萇弘也萇弘數見於周因群遺書萇弘謂叔向曰子起晋國之兵以攻周以廢劉氏以立單氏劉氏謂君曰此萇弘也乃殺之肔裂也亦言肔刳腸靡爛也碎也言子胥遭戮浮屍於江令靡爛也言此四子共有忠賢之行而不免于戮刑者爲無道之人恃君人之勢賴聖迹之威故得躓頓忠良肆其毒害故跖之徒問於跖曰盜亦有道乎䟽假設跖之徒類以發問之端跖曰何適而無有道邪䟽此即答前問意道無不在何往非道道之所在具列下文夫妄意室中之藏聖也入先勇也出後義也知可否知也分均仁也五者不備而能成大盜者天下未之有也註五者所以禁盜而反爲盜資也䟽室中庫藏以貯財寳賊起妄心斟量商度有無必中其驗若神故言聖也戮力同心不避人禦並爭先入豈非勇也矢石相交不顧性命出競居後豈非義也知可則爲不可則止識其安危審其凶吉往必克捷是其智也輕財重義取少讓多分物均平是其仁也五者則向之聖勇義智仁也夫爲一盜必資五德五德不備盜則不成是知無聖智而成巨盜者天下未之有也由是觀之善人不得聖人之道不立跖不得聖人之道不行䟽聖人之道謂五德也以向如是以理觀之爲善之徒不履五德則無由立身行道盜跖之類不資聖智豈得行其盜竊天下之善人少而不善人多則聖人之利天下也少而害天下也多註信哉斯言斯言雖信而猶不可亡聖者猶天下之知未能都亡故須聖道以鎮之也群知不亡而獨亡聖知則天下之害又多於有聖矣然則有聖之害雖多猶愈於亡聖之無治也雖愈於亡聖故未若都亡之無害也甚矣天下莫不求利而不能一亡其知何其迷而失致哉䟽夫善惡二塗皆由聖智者也伯夷守廉潔著名盜跖恣貪殘取利然盜跖之徒甚衆伯夷之類蓋寡故知聖迹利益天下也少而損害天下也多故曰脣竭則齒寒魯酒薄而邯鄲圍聖人生而大盜起註夫竭脣非以寒齒而齒寒魯酒薄非以圍邯鄲而邯鄲圍聖人生非以起大盜而大盜起此自然相生必至之勢也夫聖人雖不立尚於物而亦不能使物不尚也故人無貴賤事無眞偽苟效聖法則天下吞聲而闇服之斯乃桀跖之所至賴而以成其大盜者也䟽春秋左傳云脣亡齒寒虞虢之謂也邯鄲趙城也音楚宣王朝會諸侯魯恭公後至而酒薄宣王怒將辱之恭公曰我周公之胤行天子禮樂勳在周室今送酒以失禮方責其薄無乃太甚乎遂不辭而還宣王怒興兵伐魯梁惠王恒欲伐趙畏魯救之今楚魯有事梁遂圍邯鄲而邯鄲圍亦由聖人生非欲起大盜而大盜起勢使之然也掊擊聖人縱舍盜賊而天下始治矣註夫聖人者天下之所尚也若乃絶其所尚而守其素朴棄其禁令而代以寡欲此所以掊擊聖人而我素朴自全縱舍盜賊而彼姦自息也故古人有言曰閑邪存誠不在善察息淫去華不在嚴刑此之謂也䟽掊打也聖人猶聖迹也夫聖人者智周萬物道濟天下今言掊擊者亦貶斥仁義絶聖棄智之意也不貴難得之貨故縱舍盜賊不假嚴刑而天下太平也夫川竭而谷虚丘夷而淵實聖人已死則大盜不起註竭川非以虚谷而谷虚夷丘非以實淵而淵實絶聖非以止盜而盜止故止盜在去欲不在彰聖知䟽夫智慧出則姦偽生聖迹亡則大盜息猶如川竭谷虚丘夷淵實豈得措意必至之宜死息也天下平而無故矣註非唯息盜爭尚之迹故都去矣䟽故事也絶聖棄智天下太平人歌繫壤故無有爲之事聖人不死大盜不止雖重聖人而治天下則是重利盜跖也註將重聖人以治天下而桀跖之徒亦資其法所資者重故所利不得輕也䟽若夫淳樸之世恬惔無爲物各歸根人皆復命豈待教迹而後冥乎及至聖智不忘大盜斯起雖復貴聖法治天下無異重利盜跖何者所以夏桀肆其害毒盜跖肆其貪殘者由資乎聖迹故也向無聖迹夏桀豈得居其九五毒流黎庶盜跖何能擁卒數千横行天下所資既重所利不輕以此而推過由聖智也爲之斗斛以量之則並與斗斛而竊之爲之權衡以稱之則並與權衡而竊之爲之符璽以信之則并與符璽而竊之爲之仁義以矯之則并與仁羲而竊之註小盜之所困乃大盜之所資而利也䟽斛者今之函所以量物之多少權稱鎚也衡稱梁也所以平物之輕重也符者分爲兩片合而成一即今之銅魚木契也璽者是王者之玉印握之所以攝召天下也仁恩也義宜也王者恩被蒼生循宜作則所以育養黔黎也此八者天下之利器也不可相無也夫聖人立教以正邦家田成用之以竊齊國豈非害於小賊而利大盜者乎何以知其然邪彼竊鉤者誅竊國者爲諸侯諸侯之門而仁義存焉則是非竊仁義聖知邪䟽鉤者腰帶鉤也夫聖迹之興本懲惡勸善今私竊鉤帶必遭刑戮公劫齊國翻獲諸侯仁義不存無由率衆以此而言豈非竊聖迹而盜國邪何以知其者假問也彼竊以下假答也故逐於大盜揭諸侯竊仁義並斗斛權衡符璽之利者雖有軒冕之賞弗能勸斧鉞之威弗能禁註夫軒冕斧鉞賞罰之重者也重賞罰以禁盜然大盜者又逐而竊之則反爲盜用矣所用者重乃所以成其大盜也大盜也者必行以仁義平以權衡信以符璽勸以軒冕威以斧鉞盜此公器然後諸侯可得而揭也是故仁義賞罰者適足以誅竊鉤者也䟽逐隨也勸勉也禁止也軒車也冕冠也夫聖迹之設本息姦袤而田恒遂用其道而竊齊國權衡符璽悉共有之誓揭諸侯安然南面胡可勸之以軒冕威之以斧鉞者哉小曰斧大曰鉞又云黃金飾斧此重利盜跖而使不可禁者是乃聖人之過也註夫跖之不可禁由所盜之利重也利之所以重由聖人之不輕也故絶在賤貨不在重聖也䟽盜跖所以擁卒九千横行天下者亦賴於五德故也向無聖智豈得爾乎是知驅馬掠人不可禁制者原乎聖人作法之過也故曰魚不可脱於淵國之利器不可以示人註魚失淵則爲人禽利器用則爲盜資故不可示人䟽脱失也利器聖迹也示明也魚失水則爲物所傷禽利器示人則爲人所執故不可也彼聖人者天下之利器也註夫聖人者誠能絶聖棄知而反冥物極物極各冥則其迹利物之迹也器猶迹耳可執而用曰器䟽聖人則堯舜文武等是也非所以明天下也註示利器於天下所以資其盜賊䟽夫聖人馭世應物隨時揖讓干戈行藏匪一不可執固明示天下若執而行者必致其弊即燕噲白公之類是也故絶聖棄知大盜乃止註去其所資則未施禁而自止也䟽棄絶聖者天下之物各守其分則盜自息擿玉毁珠小盜不起註賤其所寳則不加刑而自息也䟽藏玉於山藏珠於川不貴珍寳豈有盜濫焚符破璽而民朴鄙註除矯之所賴者則無以行其姦巧䟽符璽者表誠信也矯詐之徒賴而用之故焚燒毁破可以反樸還淳而歸鄙野掊斗折衡而民不爭註夫小平乃大不平之所用也䟽斗衡者所以量多少稱輕重也既遭斗竊翻爲盜資掊擊破壞合於古人之智守故無忿爭殫殘天下之聖法而民始可與論議註外無所矯則内全我朴而無自失之言也䟽殫盡也殘毁也聖法謂五德也既殘三王又毁五帝蘧廬咸盡芻狗不陳忘筌忘蹄物我冥極然後始可與論重妙之境議道德之遐也擢亂六律鑠絶竽瑟塞瞽曠之耳而天下始人含其聰矣滅文章散五采膠離朱之目而天下始人含其明矣註夫聲色離曠有耳目者之所貴也受生有分而以所貴引之則性命喪矣若乃毁其所貴棄彼任我則聰明各全人含其眞也䟽擢拔也鑠消也竽形與笙相似並布管於匏内施簧於管端瑟長八尺一寸闊一尺八寸二十七絃优犧造也夫耳淫宫徵慕師曠之聰目滯玄黄希離朱之視所以心神奔馳耳目竭喪既而拔管絶絃銷金絶緯毁黃華之曲棄白雪之歌滅黼黻之文散紅紫之采故膠離朱之目除矯效之端塞瞽曠之耳去亂群之帥然後人皆自得物無喪我極耳之所聽而反聽無聲恣目之能視而内視無色天機自張無爲之至也豈有明暗優劣於其間哉是以天下和平萬物同德率己聞見故人含其聰明含懷養之謂毁絶鉤繩而棄規矩攦工倕之指而天下始人有其巧矣故曰大巧若拙註夫以蜘蛛蛣蜣之陋而布網轉丸不求之於工匠則萬物各有能也所能雖不同而所習不敢異則若巧而拙矣故善用人者使能方者爲方圓者爲圓各任其所能人安其性不責萬民以工倕之巧故衆技以不相能似拙而天下皆自能則大巧矣夫用其自能則規矩可棄而妙匠之指可攦也䟽鉤曲繩直規圓矩方工倕是堯工人作規矩之法亦云舜臣也攦折也割也工倕禀性機巧運用鉤繩割刻異端述作規矩遂令天下黔黎誘然放效舍己逐物實此之由若使棄規絶繩攦割倕指則人師分内咸有其巧譬猶蜘網蜣丸豈關矜企人事若天機巧也事出老經削曾史之行鉗楊墨之口攘棄仁義而天下之德始玄同矣註去其亂群之率則天下各復其朴而同於玄德也䟽削除也鉗閉也攘却也玄原也道也曾參至孝史魚忠直楊朱墨翟禀性宏辯彼四子者素分天然遂使天下學人捨己效物由此亂群失其本性則除忠信之行鉗閉浮辯之口攘去蹩躠之仁棄擲踶跂之義於是物不喪眞人皆自得率性全理故與玄道混同也彼人含其明則天下不鑠矣人含其聰則天下不累矣䟽鑠銷散也累憂患也只爲自衒聰明故憂患斯集使蒼生顚化而銷散也若能含抱聰明於内府而不衒於外者則物皆適樂而無憂患也人含其知則天下不惑矣人含其德則天下不僻矣䟽若能知於分内養德而不蕩者固當履環中之正道游㝢内而不惑豈有倒置哀僻於其間哉彼曾史楊墨師曠工倕離朱者皆外立其德而以爚亂其天下者也註此數人者所禀多方故使天下躍而效之效之則失我我失由彼則彼爲亂主矣夫天下之大患者失我也䟽以前數子皆禀分過人不能韜光匿燿而揚波混俗剽名於表立德於外引物從己炫燿群生天下亡德而不反本失我之原斯之由也法之所無用也註若夫法之所用者視不過於所見故衆目無不明聽不過於所聞故衆耳無不聰士不過於所能故衆技無不巧知不過於所知故群性無不適德不過於所得故群德無不當安用立所不逮於性分之表使天下奔馳而不能自反哉䟽夫率性而動動必由性此法之妙也而曾史之徒以已引物既無益於當世翻有損於將來雖設此法終無所用也子獨不知至德之世乎昔者容成氏大庭氏伯皇氏中央氏栗陸氏驪畜氏軒轅氏赫胥氏尊盧氏祝融氏伏犧氏神農氏當是時也民結繩而用之註足以紀要而已䟽已上十二氏並上古帝王也當時既未有史籍亦不知指次第前後刻木爲契結繩表信上下和平人心淳樸故易云上古結繩而治後世聖人易之以書契甘其食美其服註適故常甘當故常美若思夫多靡則無時慊矣樂其俗安其居䟽止分故甘去華故美混同故樂恬淡故安居也鄰國相望雞犬之音相聞民至老死而不相往來註無求之至䟽境邑相比相去不遠雞犬吠聲音聞相接而性各自足無求于世卒于天命不相往來無爲之至若此之時則至治己䟽無欲無求懷道抱德如此時也豈非至哉今遂至使民延頸舉踵曰某所有賢者贏糧而趣之則内棄其親而外去其主之事足跡接乎諸侯之境車軌結乎千里之外註至治之迹猶致斯弊䟽贏裹也亦是至理之風播而爲教貴此文近使物學之尚賢路開尋師訪道引領舉足遠適他方軌轍交行足跡所接裹糧負販不憚千里内則棄親而不孝外則去主而不忠至治之迹遂致斯弊也則是上好知之過也註上謂好知之君知而好之則有斯過矣䟽尚至治之迹好治物之智故致斯也上誠好知而無道則天下大亂矣䟽在上君王不能無爲恬憺清虚合道而以知能治物物必弊之故大亂也老君云以知治國國之賊也何以知其然邪䟽假設疑問出其所由夫弓弩畢弋機變之知多則鳥亂於上矣鉤餌罔罟罾笱之知多則魚亂於水矣削格羅落罝罘之知多則獸亂於澤矣註攻之愈密避之愈巧則雖禽獸猶不可圖之以知而況人哉故治天下者唯不任知任知無妙也䟽網小而柄形似畢星故名爲畢以繩繫箭射謂弋罟罾皆網也笱曲梁也亦筌也削格爲之即今之鹿角馬以繩末羅落而取獸也罝罘免網也即以智治於物寧無沸騰之患故治國者必不可用智也知詐漸毒頡滑堅白解垢同異之變多則俗惑於辯矣註上之所多者下不能安其少也性少而以逐多則迷也䟽智數詐偽漸漬毒害於物也頡滑骨稽也亦姦黠也解垢詐偽也夫滑稽堅白之智譎說同異之譚諒有虧於眞理無益於世教故遠觀譬於若訥愚俗惑於小辯故天下每每大亂罪在於好知䟽每每昏昏貌也夫忘懷任物則宇内清夷執迹用智則天下大亂故知上下昏昏由乎好智故天下皆知求其所不知而莫知求其所已知者註不求所知而求所不知此乃舍己效人而不止其分也䟽所以知者分内也所不知者分外也舍内求外非惑如何也皆知非其所不善而莫知非其所以善者註善其所善爭尚之所由生也䟽所不善者桀跖也所以善者聖迹也盜跖行不善以據東陵田恒行聖迹以竊齊國故臧穀業畢亡羊趣同或桀跖行殊損性均也愚俗之徒妄生臧否善與不善誠未足定也是以大亂故上悖日月之明下爍山川之精中墮四時之施喘耎之蟲肖翹之物莫不失其性甚矣夫好知之亂天下也註夫吉凶悔吝生於動也而知之所動誠能摇蕩天地運御群生故君人者胡可以不忘其知哉䟽是以仍上辭也只爲上來用智執迹故天下大亂悖亂也爍銷也墮壞也附地之徒曰喘耎飛空之類曰肖翹皆輕小物也夫執迹用智爲害必甚故能鼔動陰陽摇蕩天地日月爲之薄蝕山川爲之崩竭炎凉爲之愆叙風雨所以不時飛走水陸失其本性好知毒物一至於此也自三代以下者是己舍夫種種之民而悦夫役役之佞釋夫恬惔無爲而悦夫啍啍之意啍啍已亂天下矣註啍啍以已誨人也䟽自從也三代謂夏殷周也種種淳樸之人役役輕黠之貌釋廢也啍啍以己誨人也夫上古至淳之世素樸之時像圜天而清虚法方地而安靜而爲族同禽獸之無知逮乎散澆去淳離道背德而五常聖迹已彰三代用知更甚舍淳樸之素士愛輕黠之佞夫廢無欲之自安悦有心之誨物已亂天下可不悲夫南華眞經註䟽卷之十二
