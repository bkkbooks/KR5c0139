  text: 南華眞經註䟽卷之二十八尺二
  hash: sha256:a8dd159394472f46769c59766a128148a0a3e7b1eb09791a9932680acbdebc3d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0139_HFL_028-001a, image: hfl/0517/0517-102.png}
body:
  text: 河南郭象註唐西華法師成玄英䟽雜篇外物第二十六外物不可必䟽域心執固謂必然也夫人間事物參差萬緒惟安大順則所在虚通若其逆物執情必遭禍害故龍逄誅比干戮箕子狂惡來死桀紂亡註善惡之所致俱不可必也䟽龍逄比干外篇已解箕子殷紂之庶叔也忠諫不從懼紂之害所以徉狂亦終不免殺戮惡來紂之佞臣畢志從紂所以俱亡人主莫不欲其臣之忠而忠未必信故伍員流于江萇弘死于蜀藏其血三年而化爲碧註精誠之至䟽碧玉也子胥萇弘外篇已釋而言流江者忠諫夫差夫差殺之取馬皮作袋爲鴟鳥之形盛伍員屍浮之江水故云流于江萇弘遭譖被放歸蜀自恨忠而遭譖遂刳腸而死蜀人感之以匱盛其血三年而化爲碧玉乃精誠之至也人親莫不欲其子之孝而孝未必愛故孝己憂而曾參悲註是以至人無心而應物唯變所適䟽孝已殷高宗之子也遭後母之難憂苦而死曾參至孝而父母憎之常遭父母打鄰乎死地故悲泣也夫父子天性君臣義重而至忠至孝尚有不愛不知况乎世事萬塗而可必固者唯當忠懷物我適可全身遠害與木相摩則然金與火相守則流䟽夫木生火火尅金五行之氣自然之理故木摩木則火生火守金則金爍是以誠心執固而必於外物者爍滅之敗陰陽錯行則天地大絃於是乎有雷有霆水中有火乃焚大槐註所謂錯行䟽水中有火電也乃焚大槐霹靂也陰陽錯亂不順五行故雷霆擊怒驚駭萬物人乖和氣敗損亦然有甚憂兩陷無所逃註苟不能忘形則隨形所遭而陷於憂樂左右無宜也䟽不能虚志而忘形域心執固是以馳情於榮辱二境陷溺於憂樂二邊無處逃形螴蜳不得成註矜之愈重則所在爲難莫知所守故不得成䟽螴蜳猶怵惕也不能忘情忘懷矜惜故雖勞形怵慮而卒無所成心若縣於天地之間註所希跂者高而闊也䟽心徇有爲高而且遠馳情逐物通乎宇宙慰睯沈屯註非情夷平暢也䟽遂心則慰喜乖意則昏悶遇境則沈溺觸物則屯邅既非清夷豈是平暢利害相摩生火甚多註内熱故也䟽夫利者必有害蟬鵲是也纓纏於利害之間内心恒熱故生火多矣衆人焚和註衆人而遺利則和若利害存懷則其和焚也䟽焚燒也衆人猶俗人也不能守分無爲而每馳心利害内熱如火故燒焰中和之性月固不勝火註大而闇則多累小而明則知分䟽月雖大而光圓火雖小而明照諭志大而多貪不如小心守分於是乎有僓然而道盡註唯僓然無矜遺形自得道乃盡也䟽僓然放任不矜之貌忘情利害淡爾不矜虚玄道理乃盡於此也莊周家貧故往貸粟於監河侯䟽監河侯魏文侯也莊子高素不事有爲家業既貧故來貸粟監河侯曰諾我將得邑金將貸子三百金可乎䟽諾許也銅鐵之類皆名爲金此非黄金也待我歲終得百姓租賦封邑之物乃貸子莊周忿然作色曰周昨來有中道而呼者周顧視車轍中有鮒魚焉周問之曰鮒魚來子何爲者邪對曰我東海之波臣也君豈有斗升之水而活我哉䟽波浪小臣困於車轍君頗有水以相救乎周曰諾我且南遊吴越之王激西江之水而迎子可乎䟽西江蜀江也江水至多北流者衆惟蜀江從西來故謂之西江是也鮒魚忿然作色曰吾失我常與我无所處吾得斗升之水然活耳君乃言此曾不如早索我於枯魚之肆註此言當理無小苟其不當雖大何益䟽索求肆市常行海水鮒魚波浪失於常處升斗之水可以全生乃激西江非所宜也既其不救斯須不如求我於乾魚之肆此言事無大小時有機宜苟不逗機雖大無益也任公子爲大鉤巨緇五十犗以爲餌䟽任國名任國之公子巨大也緇黑繩也犗犍牛也餌鉤頭肉既爲巨鉤故用大繩縣五十頭牛以爲餌蹲乎會稽投竿東海䟽號爲巨鉤期年不得魚蹲踞也踞坐也踞其山旦旦而釣期年不得魚已而大魚食之牽巨鉤錎没而下驚揚而奮鬐白波若山海水震蕩聲侔鬼神憚赫千里䟽期年之外有大魚吞鉤於是牽鉤陷没馳驚而下揚其頭尾奮其鱗鬐遂使白波如山洪波際日任公子得若魚離而腊之自淛河以東蒼梧已北莫不厭若魚者䟽若魚海神也淛浙江也蒼梧山名在嶺南舜葬之所海神肉多分爲脯腊自五嶺已北三湘已東皆厭之已而後世輇才諷說之徒皆驚而相告也䟽代末季葉才智輕浮諷誦詞說不敦玄道聞得大魚驚而相語輕字有作輇字者輇量也夫揭竿累趨灌瀆守鯢鮒其於得大魚難矣䟽累細繩也鯢鮒小魚也擔揭細小之竿繩趨走溉灌之溝瀆適得鯢鮒難獲大魚也飾小說以干縣令其於大達亦遠矣䟽千求也縣高也夫脩飾小行矜持言說以求高名令問者必不能大通於至道字作縣者古懸字多不著心是以未嘗聞任氏之風俗其不可與經於世亦遠矣註此言志趣不同故經世之宜小大各有所適也䟽人間世道夷險不常自非懷豁虚通未可以治亂若矜名飾行去之遠矣儒以詩禮發冢大儒臚傳曰東方作矣事之何若䟽大儒碩儒謂大博士從上傳語告下曰臚臚傳也東方作謂天曙曰先起儒弟子發冢爲盜恐天時曙故催告之問其如何將事小儒曰未解裙襦口中有珠䟽小儒弟子也死人裙衣猶未解脱捫其口中知其有寳珠詩固有之曰靑靑之麥生於陵陂生不布施死何舍珠爲䟽此是逸詩乆遭删削凡貴人葬者口多含珠故誦青青之詩刺之接其鬢擪其顪儒以金椎控其頤徐别其頰無傷口中珠註詩禮者先王之陳迹也苟非其人道不虚行故夫儒者乃有用之爲姦則迹不足恃也䟽接撮也擪按也顪口也控打也撮其鬢桉其口鐵椎打仍恐損珠故安徐分别之是以田恒資仁義以竊齊儒生誦詩禮以發冢由是觀之聖迹不足頼老萊子之弟子出薪遇仲尼返以告䟽老萊子楚之賢人隱者也常隱蒙山楚王知其賢遣使召爲相其妻采樵歸見門前有車馬迹妻問其故老萊曰楚王召我爲相妻曰受人有者必爲人角制而之不能爲人制之妻遂捨而去老萊隨之夫負妻戴逃於江南莫知所之出取薪者采樵也既見孔子歸告其師曰有人於彼脩上而趨下註長上而促下也末僂而後耳註耳却近後而上僂視若營四海註視之儡然似營他人事者不知其誰氏之子䟽脩長也趨短末肩背也所見之士下短上長肩背傴僂耳却近後瞻視高遠所作怱怱觀其儀容似營天下未知子之族姓是誰督其異常故發斯問老萊子曰是丘也召而來䟽魯人孔丘汝宜唤取仲尼至曰丘去汝躬矜與汝容知斯爲君子矣註謂仲尼能遺形去知故以爲君子䟽躬身也孔丘既至老萊未語宜遣汝身之躬飾忘爾容貌心知如此之時可爲君子仲尼揖而退註受其言也䟽敬受其言揖讓而退蹙然改容而問曰業可得進乎註設問之令老萊明其不可進䟽蹙然驚恐貌謂仲尼所學聖迹業行可得修進爲世用可不老萊子曰夫不忍一世之傷而驚萬世之患註一世爲之則其迹萬世爲患故不可輕也䟽夫聖智仁義救一時之傷後執爲姦成萬世之禍時聖迹而驕謷則陳恒之徒是也亦有作驚音者云使萬代驅騖不息亦是奔馳之義也抑固窶邪䟽固執聖迹抑揚從已夫於本性故窮窶亡其略弗及邪註直任之則民性不窶而皆自有略無弗及之事也䟽亡失本性忽略生崖故不及於眞道惠以歡爲驁終身之醜註惠之而歡者無惠則醜矣然惠不可長故一惠終身醜也䟽夫以施惠爲歡者惠不可徧故謷慢者多矣是以用惠取人適爲怨府故終身醜辱中民之行進焉耳註言其易進則不可忘惠之相引以名相結以隱註隱括進之謂也䟽夫上智下愚其性難改中庸之人易爲進退故聞堯之美相引慕以利名聞桀之惡則結之以隱匿與其譽堯而非桀不如兩忘而閉其所譽註閉者閉塞䟽贊譽堯之善道非毁桀之惡迹以此奔馳失性多矣故不如善惡兩忘閉塞毁譽則物性全矣反无非傷也動无非邪也註順之則全靜之則正䟽夫反於物性無不傷損擾動心靈皆非正法聖人躊躇以興事以每成功註事不遠本故其功每成䟽躊躇從容聖人無心應機而動興起事業恒自從容不逆物情故其功每就奈何哉其載焉終矜爾註矜不可載故遺而弗有也䟽奈何猶如何也如何執仁義之迹擾撓物心運載矜莊終身不替此是老萊詆訶夫子之辭也宋元君夜半而夢人被髮闚阿門䟽宋國君謚曰元即宋元君也阿曲也謂阿旁曲室之闚門曰予自宰路之淵予爲清江使河伯之所漁者余且得予䟽自後也宰路江畔淵名姓余名且捕魚之人也元君覺使人占之曰此神龜也君曰漁者有余且乎左右曰有君曰令余且會朝䟽命召也召令赴朝問其所得明日余且朝君曰漁何得對曰且之網得白龜焉其圓五尺君曰獻若之龜龜至君再欲殺之再欲活之心疑卜之曰殺龜以卜吉䟽心疑猶預殺活再三乃殺吉遂刳龜也卜之乃刳龜七十二鑽而無遺筴䟽筭計前後鑽之凡經七十二筭計吉凶曾不失中仲尼曰神龜能見夢於元君而不能避余且之網知能七十二鑽而無遺筴不能避刳腸之患如是則知有所困神有所不及也註神知之不足恃也如是夫唯靜然居其所能而不營於外者爲全䟽夫神智不足恃也是故至人之處世忘形神智慮與枯木同其不華將死天均其寂魄任物冥於造化是以孔丘大聖因而議之雖有至知萬人謀之註不用其知而用衆謀魚不畏網而畏鵜鶘註網無情故得魚䟽網無情而得魚諭聖人無心故天下歸之去小知而大知明註小知自私大知任物䟽小知取捨於心大知無分别遣間奪之情故無分别則大知光明也去善而自善矣註去善則善無所慕善無所慕則善者不矯而自善也䟽遣矜尚之小心合自然之大善故前文云離道以善險德以行又老經云天下皆知善之爲善斯不善已嬰兒生无石師而能言與能言者處也註汎然無習而自能者非跂而學彼也䟽夫嬰兒之性其不假師匠年漸長大而自然能言者非有心學之與父母同處率其本性自然能言是知世間萬物非由運知學而成之也惠子謂莊子曰子言無用䟽莊子通人也空有並照其言宏博不契俗心是以惠施譏爲無用莊子曰知無用而始可與言用矣䟽夫有用則同於天折無用則全其崖故知無用始可語其用天地非不廣且大也人之所用容足耳然則側足而墊之致黄泉人尚有用乎惠子曰无用䟽墊掘也夫六合之内廣大無最於地人之所用不過容足若使側足之外掘至黃泉人則戰慄不得行動是知有用之物假無用成功莊子曰然則无用之爲用也亦明矣註聖應其内當事而發已言其外以暢事情情暢則事通外明則内用相須之理然也䟽直置容足不可得行必候餘地方能運用脚足無用之理分明故取老子云有之以爲利無之以爲用莊子曰人有能遊且得不遊乎人而不能遊且得遊乎註性之所能不得不爲也性所不能不得强爲故聖人唯莫之制則同焉皆得而不知所以得也䟽夫人禀性不同所用各異自有聞言如影響自有智昏菽麥故性之能者不得不由性之無者不可强涉各守其分則物皆不喪夫流遁之志决絶之行噫其非至知厚德之任與註非至厚則莫能任其志行而信其殊能也䟽流蕩逐物逃遯不返果决絶滅因而不移此之志行極愚極鄙豈是至妙眞知深厚道德之所任用莊子之意謂其如此覆墜而不及火馳而不顧註人之所好不避是非死生以之䟽愚迷之類執志慤然雖復家被覆没身遭顚墜亦不知悔反馳逐物情急如煙火而不知回顧流遯决絶遂至於斯耳雖相與爲君臣時也易世而无以相賤註所以爲大齊同䟽夫時所賢者爲君才不應世者爲臣如舜禹應時相代爲君臣也故世遭革易不可以爲臣爲君而相賤輕流遯之徒不知此事故曰至人不留行焉註唯所遇而因之故能與化俱䟽夫世有興廢隨而行之是故達人曾無留滯夫尊古而卑今學者之流也註古無所尊今無所卑而學者尊古而卑今失其原矣䟽夫步驟殊時澆淳異世古今情事變也不同而乃貴古賤今深乖遠鑒適滋爲學小見豈曰清通且以狶韋氏之流觀今之世夫孰能不波註隨時因物乃平泯也䟽狶韋三皇已前帝號也以玄古之風御於今代澆淳既章誰能不波蕩而不失其性乎斯由尊古卑今之弊也唯至人乃能遊於世而不僻註當時應務所在爲正順人而不失己註本無我我何失焉彼教不學註教因彼性故非學也承意不彼註彼意自然故承而用之則夫萬物各全其我䟽獨有至德之人順時而化彼非學心而本性具足不由學致也承意不彼者禀承教意以導性而眞道素圓不彼教也目徹爲明耳徹爲聰鼻徹爲顫口徹爲甘心徹爲知知徹爲德䟽徹通也顫者辛臭之事也夫六根無壅故徹聰明不蕩於外故爲德凡道不欲壅壅則哽哽而不止則跈註當通而塞則理有不泄而相騰踐也跈則衆害生註生起也物之有知者恃息註凡根生者無知亦不恃息也䟽天生六根廢一不可耳聞眼見鼻嗅心知爲於分内雖用無咎若乃目帶桑中之色耳淫濮上之聲鼻滋蘭麝之香心用無窮之境則天理滅矣豈謂徹哉故六根窮徹則氣息通而生理全其不殷非天之罪註殷當也夫息不由知由知然後失當失當而後不通故知恃息息不恃知也然知欲之用制之由人非不得已之符也䟽殷當也或縱恣六根馳逐前境或竅穴哽塞以害生崖通蹍二徒皆不當理斯並人情之罪也非天然之辜天之穿之日夜无降註通理有常運䟽降止也自然之理穿通萬物自晝及夜未嘗止息人則顧塞其竇註無情任天竇乃開䟽竇孔也流俗之人反於天理壅塞根竅滯溺不通胞有重閬註閬空壙也䟽閬空也言人腹内空虚故容藏胃藏胃空虚故通氣液心有天遊註遊不係也䟽虚空故自然之道遊其中室无空虚則婦姑勃豀註爭處也䟽勃豀爭鬥也屋室不空則不容受故婦姑爭處無復尊卑心无天遊則六鑿相攘註攘逆䟽鑿孔也攘則逆也自然之道不遊其心則六根逆不順於理大林丘山之善於人也亦神者不勝註自然之理有寄物而通也䟽自然之理有寄物而通者也德溢乎名註夫名高則利深故修德者過其當䟽溢深也仁義五德所以行之過多者爲尚名好勝故也名溢乎暴註夫禁暴則名美於德䟽暴殘害也夫名者士之器名既過者必更相賊害内篇云名者相軋者也謀稽乎誸註誸急也急而後考其謀䟽稽考也誸急也急難之事然後校謀計知出乎事註平往則無用知䟽夫運心知以出境則爭鬥斯至柴生乎守註柴塞也䟽柴塞也守執也域情執固而所造不通官事果乎衆宜註衆之所宜者不一故官事立也䟽夫置官府設事條者須順於衆人之宜便若求逆之則禍亂生春雨日時草木怒生銚鎒於是乎始修註夫事物之生皆有由䟽銚耜之類也鎒鋤也青春時節時雨之日凡百草木萌動而生於是農具方始修理此明順時而動不逆物情也草木之到植者過半而不知其然註夫事由理發故不覺䟽植生也銚鎒既修芸除苑葦幸逢春日鉏罷到生良由時節使然不可以人情度是知制法立教必須順時靜然可以補病註非不病也䟽適有煩躁之病者簡靜可以療之眥𡟬可以休老註非不老也䟽翦齊髮鬢狀貌也衰老之容以此而沐浴寧可以止遽註非不遽也䟽遽疾速也夫心性怱迫者安靜可以止之雖然若是勞者之務也非佚者之所未嘗過而問焉註若是猶有勞故佚者超然不顧䟽夫止遽以寧療躁以靜者以對治之術斯乃小學之人勞役神智之事務也豈是體道之士閑逸之人不勞不病之心乎風彩情高故未嘗暫過而顧問焉聖人之所以駥天下神人未嘗過而問焉註神人即聖人也聖言其外神言其内䟽駭驚也神者不測之號聖者顯迹之名爲其垂教動人故不過問賢人所以駥世聖人未嘗過而問焉䟽證空爲賢並照爲聖從深望淺故不問之君子所以駥國賢人未嘗過而問焉䟽何以人物君子故駭動諸侯之國賢人捨有故不問小人所以合時君子未嘗過而問焉註趨步各有分高下各有等䟽夫趨世小人苟合一時如田恒之徒無足可貴故淑人君子鄙而不顧也演門有親死者以善毁爵爲官帥其黨人毁而死者半註慕賞而孝去眞遠矣斯尚賢之過也䟽東門也亦有作寅者隨字讀之東門之孝出自内心形容外毁惟宋君嘉其至孝遂加爵而命爲卿鄉黨之人聞其因孝而貴於是强哭詐毁矯性僞情因而死者其數半矣堯與許由天下許由逃之湯與務光務光怒之䟽堯知由賢襌以九五洒耳辭退逃避箕山湯與務光務光不受訶駡瞋怒遠之林籟斯皆率其本性腥臊榮禄非關矯偽以慕聲名紀他聞之帥弟子而踆於窾水諸侯弔之三年申徒狄因以踣河註其波蕩傷性遂至於此䟽姓申徒名狄姓紀名佗並隱者聞湯讓務光恐其及己與弟子蹲踞水旁諸侯聞之重其廉素時往弔慰恐其沈没狄聞斯事慕其高名遂赴長河自溺而死波蕩失性遂至於斯矣筌者所以在魚得魚而忘筌蹄者所以在兔得兔而忘蹄䟽筌魚笱也以竹爲之故字從竹亦有從草者蓀筌也香草也可以餌魚置香於柴木蘆葦之中以取魚也蹄兔罝也亦兔彊也以繫係兔脚故謂之蹄此二事譬也言者所以在意得意而忘言䟽此合諭也意妙理也夫得魚兔本因筌蹄而筌蹄實異魚兔亦由玄理假於言說言說實非玄理魚兔得而筌蹄忘玄理明而名言絶吾安得夫忘言之人而與之言哉註至於兩聖無意乃都無所言也䟽夫忘言得理目擊道存其人實稀故有斯難也南華眞經註䟽卷之二十八
