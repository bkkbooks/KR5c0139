  text: 南華眞經註䟽卷之二十四慶三
  hash: sha256:31581cb58a1a2452fde18a410bd149336cd4d3b9f19876191b9e5f5921353ddf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0139_HFL_024-001a, image: hfl/0515/0515-128.png}
body:
  text: 河南郭象註唐西華法師成玄英䟽外篇知北遊第二十二知北遊於玄水之上登隱弅之丘而適遭無爲謂焉䟽此章並假立姓名寓言明理北是幽冥之域水又幽昧之方隱則深遠難知弅則鬱然可見欲明至道玄絶顯晦無常故寄此言以彰其義也知謂無爲謂曰予欲有問乎若䟽若汝也此明運知極心問道假設賔主謂之無爲何思何慮則知道何處何服則安道何從何道則得道䟽此假設言方運知問道若爲尋思何所念慮則知至道若爲服勤於何處所則安心契道何所依從何所道說則得其道也三問而無爲謂不答也非不答不知答也䟽知分别也設此三問竟無一答非無爲謂惜情不答直是理無分别故不知所以答也知不得問反於白水之南登狐闋之上而覩狂屈焉知以之言也問乎狂屈䟽白是潔素之色南是顯明之方狐者疑似夷猶闋者空靜無物問不得决反照於白水之南捨有反無狐疑未能窮理既而猖狂妄行掘若槁木欲表斯義故曰狂屈焉耳狂屈曰唉予知之將語若中欲言而忘其所欲言䟽唉應聲也初欲言語中途忘之斯忘之術反照之道知不得問反於帝官見黄帝而問焉黃帝曰無思無慮始知道無處無服始安道無從無道始得道䟽軒轅體道妙達玄言故以一無無於三問知問黄帝曰我與若知之彼與彼不知也其孰是耶黃帝曰彼無爲謂眞是也狂屈似之我與汝終不近也夫知者不言言者不知故聖人行不言之教註任其自行斯不言之教也䟽眞者不知也似者中忘也不近者以其知之也行不言之教引老子經爲證也道不可致註道在自然非可言致者也䟽致得也夫玄道不可以言得言得非道也德不可至註不失德故稱德稱德而不至也䟽夫上德不德若爲德者非至德也仁可爲也䟽夫至仁無親而今行偏愛之仁者適可有爲而已矣義可虧也䟽夫裁非斷割適可虧殘非大全也大全者生之而已矣禮相僞也䟽夫禮尚往來更相浮僞華藻亂德非眞實也故曰失道而後德失德而後仁失仁而後義失義而後禮禮者道之華而亂之首也註禮有常則故矯效之所由生也䟽棄本逐末散樸爲澆道喪淳漓逮于行禮故引老經證成其義也故曰爲道者日損註損華僞也損之又損之以至於無爲無爲而無不爲也註華去而朴全則雖爲而非爲也䟽夫修道之人日損華僞既而前損有後損無有無雙遣以至於非有非無之無爲也寂而不動無爲故無不爲也此引老經重明其㫖今已爲物也註物失其所故有爲物欲復歸根不亦難乎其易也其爲大人乎註其歸根之易者唯大人耳大人體合變化故化物不難䟽倒置之類浮偽居心徇末忘本以道爲物縱欲歸根復命其可得乎今量反本不難唯在大聖人耳生也死之徒註知變化之道者不以爲異死也生之始孰知其紀註更相爲始則未知孰死孰生也䟽氣聚而生猶是死之徒類氣散而死猶是生之本始生死終始誰知紀綱乎聚散往來變化無定人之生氣之聚也聚則爲生散則爲死註俱是聚也俱是散也若死生爲徒吾又何患註患生於異䟽夫氣聚爲生氣散爲死聚散雖異爲氣則同斯則死生聚散可爲徒伴既無其别有何憂色故萬物一也䟽生死既其不二萬物理當歸一是其所美者爲神竒其所惡者爲臭腐臭腐復化爲神竒神竒復化爲臭腐故曰通天下一氣耳註各以所美爲神竒所惡爲臭腐耳然彼之所美我之所惡也我之所美彼或惡之故通共神竒通共臭腐耳死生彼我豈殊哉䟽夫物無美惡而情有向背故情之所美者則謂爲神妙竒特情之所惡者則謂爲腥臭腐敗而顚倒本末一至於斯然物性不同所好各異彼之所美此則惡之此之所惡彼又爲美故毛嬙麗姬人之所美魚見深入鳥見高飛斯則臭腐神竒神竒臭腐而是非美惡何有定焉是知天下萬物同一和氣耳聖人故貴一䟽夫體道聖人智同萬物故貴此眞一而㝠同萬境知謂黃帝曰吾問無爲謂無爲謂不應我非不我應不知應我也吾問狂屈狂屈中欲告我而不我告非不我告中欲告而忘之也今予問乎若若知之奚故不近黄帝曰彼其眞是也以其不知也此其似之也以其忘之也予與若終不近也以其知之也狂屈聞之以黄帝爲知言註明夫自然者非言知之所得故當昧乎無言之地是以先舉不言之標而後寄明於黃帝則夫自然之冥物槩乎有得而見也䟽彼無爲謂妙體無知故眞是道也此狂屈反照遣言中忘其告似道非眞也知與黃帝二人運智以詮理故不近眞道也狂屈逖聽聞此格量謂黃帝雖未近眞適可知玄言而已矣天地有大美而不言四時有明法而不議萬物有成理而不說註此孔子之所以云子欲無言䟽夫二儀覆載其功最美四時代叙各有明法萬物生成咸資道理竟不言說曾無議論也聖人者原天地之美而達萬物之理是故至人無爲註任其自爲而已䟽夫聖人者合兩儀之覆載同萬物之生成是故口無所言心無所作大聖不作註唯因任也觀於天地之謂也註觀其形容象其物宜與天地不異䟽夫大聖至人無爲無作觀天地之覆載法至道之生成無爲無言斯之謂也今彼神明至精與彼百化註百化自化而神明不奪䟽彼神聖明靈至精極妙與物和混變化隨流或聚或散曾無欣戚今言百千萬者並舉其大綱數爾物已死生方圓莫知其根也註夫死者已自死而生者已自生圓者已自圓而方者已自方未有爲其根者故莫知䟽夫物或生或死乍方乍圓變化自然莫知根緒扁然而萬物自古以固存註豈待爲之而後存哉䟽扁然徧生之貌也言萬物翩然隨時生育從古已來必固自有豈由措意而後有之六合爲巨未離其内註計六合在無極之中則陋矣秋豪爲小待之成體註秋豪雖小非無亦無以容其質䟽六合天地四方也獸逢秋景毛端生豪豪極微細謂秋豪也巨大也六合雖大猶居至道之中豪毛雖小資道以成體質也天下莫不沈浮終身不故註日新也䟽世間庶物莫不浮沈升降生死往來不住運之不停新新相續未嘗守故也陰陽四時運行各得其序註不待爲之䟽夫二氣氤氲四時運轉春秋寒暑次叙天然豈待爲之而後行之惛然若亡而存註昭然若存則亡矣䟽惛然如昧似無而有油然不形而神註挈然有形則不神䟽神者妙萬物而爲言也油然無係不見形象而神用無方萬物畜而不知此之謂本根註畜之而不得其本性之根故不知其所以畜也䟽亭毒群生畜養萬物而玄功潜被日用不知此之眞力是至道一根本也可以觀於天矣註與天同觀䟽觀見也天自然也夫能達理通玄識根知本者可謂觀自然之至道也齧缺問道乎被衣被衣曰若正汝形一汝視天和將至䟽齧缺王倪弟子被衣王倪之師也汝之容貌端雅忽爲邪僻視聽純一勿多取境自然和理歸至汝身攝汝知一汝度神將來舍䟽收攝私心令其平等專一志度令無放逸汝之精神自來舍止德將爲汝美道將爲汝居䟽深玄上德盛美於汝無極大道居乎汝心中汝瞳焉如新生之犢而無求其故䟽瞳焉無知直視之貌故事也心既虚夷視亦平直故如新生之犢於事無求也言未卒齧缺睡寐被衣大悦行歌而去之䟽談玄未終斯人已悟坐忘契道事等睡瞑於是被衣喜躍贊其敏速行於大道歌而去之曰形若槁骸心若死灰眞其實知不以故自持註與變俱也䟽形同槁木之骸心類死灰之土無情直任純實之眞知不自矜持於事故也媒媒晦晦無心而不可與謀彼何人哉註獨化者也䟽媒媒晦晦息照遣明忘心忘知不可謀議非凡所識故云彼何人哉自形若槁骸以下並被衣歌辭也舜問乎丞曰道可得而有乎䟽丞古之得道人舜師也而至道虚通生成動植未知己身之内得有此道不乎既逢師傅故有咨請曰汝身非汝有也汝何得有夫道註夫身者非汝所能有也塊然而自有耳身非汝所有而況道哉䟽道者四句所不能得百非所不能詮汝身尚不能自有何得有於道邪舜曰吾身非吾有也孰有之哉䟽未悟生因自然形由造物故云身非我有孰有之哉曰是天地之委形也生非汝有是天地之委和也性命非汝有是天地之委順也註若身是汝有者則美惡死生當制之由汝今氣聚而生汝不能禁也氣散而死汝不能止也明其委結而自成耳非汝有也䟽委結聚也夫天地陰陽結聚剛柔和順之氣成汝身形性命者也故聚則爲生散則爲死死生聚散既不由汝是知汝身豈汝有邪孫子非汝有是天地之委蜕也註氣自委結而蟬蜕也䟽陰陽結聚故有子孫獨化而成猶如蟬蜕也故行不知所往處不知所持食不知所味註皆在自爾中來故不知也䟽夫行住食味皆率自然推尋根由莫知其所故行者誰行住者誰住食者誰食味者誰味乎皆不知所由而悉自爾也天地之彊陽氣也又胡可得而有邪註彊陽猶運動耳明斯道也庶可以遺身而忘生也䟽彊陽運動也胡何也夫形性子孫者並是天地陰陽運動之氣聚結而成者也復何得自有此身也孔子問於老聃曰今日晏間敢問至道䟽晏安也孔子師於老子故承安居閑暇而詢問玄道也老聃曰汝齋戒䟽瀹而心澡雪而精神掊擊而知夫道窅然難言哉將爲汝言其崖略䟽䟽瀹猶洒濯也澡雪猶精潔也而汝也掊擊打破也崖分也汝欲問道先須齋汝心迹戒愼專誠洒濯身心清靜神識打破聖智滌蕩虚夷然玄道窅冥難可言辯將爲汝舉其崖分粗略言之夫昭昭生於冥冥有倫生於無形精神生於道註皆所以明其獨生而無所資也形本生於精註皆由精以至粗䟽倫理也夫昭明顯著之物生於窅冥之中人倫有爲之事生於無形之内精智神識之心生於重玄之道有形質氣之類根本生於精微而萬物以形相生故九竅者胎生八竅者卵生註言萬物雖以形相生亦皆自然耳故胎卵不能易種而生明神氣之不可爲也䟽夫無形之道能生有形之物有形之物則以形質氣類而相生也故人獸九竅而卵生八竅禀之自然不可相易其來無迹其往無崖無門無房四達之皇皇也註夫率自然之性遊無迹之途者放形骸於天地之間寄精神於八方之表是以無門無房四達皇皇逍遥六合與化偕行也䟽皇大也夫以不來爲來者雖來而無蹤跡不往爲往者雖往亦無崖際是以出入無門户來往無邊傍故能宏達四方大通萬物也邀於此者四肢彊思慮恂達耳目聰明其用心不勞其應物無方註人生而遇此道則天性全而精神定䟽邀遇也恂通也遇於道而會於眞理者則百體安康四肢彊健思慮通達視聽聰明無心之心用而不勞不應之應應無方所也天不得不高地不得不廣日月不得不行萬物不得不昌此其道與註言此皆不得不然而自然耳非道能使然也䟽二儀賴玄道而高廣三光資玄道以運行庶物得之以昌盛斯大道之功用也故老經云天得一以清地得一以寧萬物得一以生是之謂也且夫博之不必知辯之不必慧聖人以斷之矣註斷棄知慧而付之自然也䟽夫博讀經典不必知眞宏辯飾辭不必慧照故老經云善者不辯辯者不善知者不博博者不知斯則聖人斷棄之矣若夫益之而不加益損之而不加損者聖人之所保也註使各保其正分而已故無用知慧爲也䟽博知辯慧不益其明沈默面墻不加其損所謂不增不滅無損無益聖人妙體故保而愛之也淵淵乎其若海註容恣無量䟽尾閭泄之而不耗百川注之而不增淵澄深大故譬玄道巍巍乎其終則復始也註與化俱者乃積無窮之紀可謂巍巍䟽巍巍者高大貌也夫道遠超太一近邁兩儀囊括無窮故以歎巍巍也終則復始此明無終無始變化日新隨迎不得運量萬物而不匱註用物而不役己故不匱也則君子之道彼其外與註各取於身而足䟽夫運載萬物器量羣生潜被無窮而不匱乏者聖人君子之道此而非遠近在内心既不藉禀豈其外也萬物皆往資焉而不匱此其道與註還用物故我不匱此明道之贍物在於不贍不贍而物自得故曰此其道與言至道之無功無功乃足稱道也䟽有識無情皆禀此玄之道而玄功冥被終不匱乏然道物不一不異而離道無物故曰此其道與中國有人焉非陰非陽註無所偏名處於天地之間直且爲人註敖然自放所遇而安了無功名䟽中國九州也言人所禀之道非陰非陽非柔非剛非短非長故絶四句離百非也處在天地之間直置爲人而無偏執本亦作值字者言處乎宇内遇值爲人曾無所係也將反於宗註本逐末也䟽既無偏執在置爲人故能反本還原歸於宗極自本觀之生者喑醷物也註直聚氣也䟽本道也喑噫氣聚也從道理而觀之故知生者聚氣之物也奚足以惜之哉雖有壽夭相去幾何須臾之說也奚足以爲堯桀之是非註死生猶未足殊況壽夭之間哉䟽一生之内百年之中假令壽夭賒促詎幾俄頃之間須臾之說耳何足以是堯非桀而分别於其間哉果蓏有理註物無不理但當順之人倫雖難所以相齒註人倫有智慧之變故難也然其智慧自相齒耳但當從而任之䟽在樹曰果在地曰蓏桃李之屬瓜瓠之徒木生藤生皆有其理人之處世險阻艱難而貴賤尊卑更相齒次但當任之自合天道譬彼果蓏有理存焉聖人遭之而不違註順所遇也過之而不守註宜過而過䟽遭遇軒冕徒而不違既以過焉亦不留舍也調而應之德也偶而應之道也註調偶和合之謂也䟽調和庶物順而應之上德也偶對前境逗機應物聖道也帝之所興王之所起也註如斯而已䟽夫帝王興起俯應羣生莫遇調偶隨時逗機接物人生天地之間若白駒之過郤忽然而己註乃不足惜䟽白駒駿馬也亦言日也隙孔也夫人處世俄頃之間其爲迫促如馳駿駒之過孔隙欻忽而已何曾足云也註然勃然莫不出焉油然漻然莫不入焉註出入者變化之謂耳言天下未有不變也䟽注勃是生出之容油漻是入死之狀言世間萬物相與無恒莫不從變而生順化而死已化而生又化而死註俱是化也生物哀之註死物不哀人類悲之註死類不悲䟽夫生死往來皆變化耳委之造物何足係哉故其死也生物人類共悲哀之務非類非生故不悲不哀也解其天弢墮其天袠註獨脱也䟽弢囊藏也袠束囊也言人執是競非欣生惡死故爲生死束縛也今既一於是非忘於生死故隳解天然之弢袠也紛乎宛乎註變化烟煴魂魄將往乃身從之乃大歸乎註無爲用心於其間也䟽紛綸宛轉並適散之貌也魂魄往天骨肉歸土神氣離散紛宛任從自有還無乃大歸也不形之形形之不形註不形形乃成若形之形則敗其形矣䟽夫人之未生也本不有其形故從無形氣聚而有其形氣散而歸於無形也是人之所同知也註雖知之然不能任其自形而反形之所以多敗非將至之所務也註務則不至䟽夫從無形生形從有表復無形質是人之所同知也斯乃人間近事非詣理至人之達務也此衆人之所同論也註雖論之然故不能不務所以不至也䟽形質有無生死來往衆人凡類同共乎論耳彼至則不論註悗然不覺乃至論則不至䟽彼至聖之人忘言得理故無所論說若論說之則不至於道明見無值註闇至乃值䟽值命遇也夫能閉智塞聰冥契玄理若顯明間見則不會眞也辯不若默道不可聞聞不若塞此之謂大得註默而塞之則無所奔逐故大得䟽夫大辯飾詞去眞遠矣忘言靜默玄道近焉故道不可以多聞求多聞求不如於闇塞若能妙知於此意可謂深得於大理已矣東郭子問於莊子曰所謂道惡乎在䟽居在東郭故號東郭子則無擇之師東郭順子也問莊子曰所謂虚通至道於何處在乎莊子曰無所不在䟽道無不徧在處有之東郭子曰期而後可註欲令莊子指名所在䟽郭注云欲令莊子指名所在也莊子曰在嶁蟻曰何其下邪曰在稊稗曰何其愈下邪曰在瓦甓曰何其愈甚邪曰在屎溺東郭子不應䟽大道無不在而所在皆無故處處有之不簡穢賤東郭未達斯趣謂道卓爾清高在瓦甓已嫌卑甚又聞屎溺故瞋而不應也莊子曰夫子之問也固不及質註舉其標質言無所不在而方復怪此斯不及質也䟽質實也言道無不在豈唯稊稗固答子之問猶未逮眞也正獲之問於監市履狶也每下愈况註狶大豕也夫監市之履豕以知其肥瘦者愈履其難肥之處愈知豕肥之要今問道之所在而每况之於下賤則明道之不逃於物也必矣䟽正官號也則今之市令也獲名也監市之魁也則今屠卒也狶猪也凡今問於屠人買猪之法云踐豕之股脚之間難肥之處愈知豕之肥痩之意況也何者近下難肥之處有肉足知易肥之處足脂亦猶屎溺卑下之處有道則明清虚之地皆徧也汝唯莫必無乎逃物註若必謂無之逃物則道不周矣道而不周則未足以爲道䟽無者無爲道也夫大道曠蕩無不制圍汝唯莫言至道逃棄於物也必其逃物何爲周徧乎至道若是大言亦然註明道不逃物䟽至道理也大言教也理既不逃於物教亦普徧無偏也周徧咸三者異名同實其指一也䟽周悉普徧咸皆有道此重明至道不逃於物雖有三名之異其實理指歸則同於一也嘗相與游乎無何有之宫同合而論無所終窮乎註若游有則不能周徧咸也故同合而論之然後知道之無不在知道之無不在然後能曠然無懷而游彼無窮也䟽無何有之宫謂玄道處所也無一物可有故曰無何有也而周徧三者相與敖游乎至道之鄉實㫖既一同合而論冥符玄理故無終始窮極耳嘗相與無爲乎澹而靜乎漠而清乎調而間乎註此皆無爲故也䟽此總歎周徧咸三功能盛德也既游至道之鄉又處無爲之域故能恬淡安靜寂寞清虚柔順調和寬閑逸豫寥已吾志註寥然空虚䟽得道玄聖契理冥眞性志九夷寂寥而已乎無往焉而不知其所至註志苟寥然則無所往矣無往焉故往而不知其所至有往焉則理未動而志已至矣去而來而不知其所止註斯順之也䟽語既寂寥故與無還往假令不往而往不來而來竟無至所亦無止住吾已往來焉而不知其所終註但往來不由於知耳不爲不往來也往來者自然之常理也其有終乎䟽假令往還造物來去死生隨變任化亦不知終始也彷徨乎馮閎大知入焉而不知其所窮註馮閎者虚廓之謂也大知由乎寥廓恣變化之所知故不知也䟽彷徨是放任之名馮閎是虚曠之貌謂入契會也言大聖知之人能會於寂寥虚曠之理是以逍遥自得放任無窮物物者與物無際註明物物者無物而物自物耳物自物耳故冥也䟽際崖畔也夫能物於物者聖人也聖人冥同萬境故與物無彼我之際畔而物有際者所謂物際者也註物有際故每相與不能冥然眞所謂際者也䟽物情分别取舍萬端故有物我之交際也不際之際際之不際者也註不際者雖有物物之名直明物之自物耳物物者竟無物也際其安在乎䟽際之不際者聖人之達觀也不際之際者凡鄙之滯情也謂盈虚衰殺彼爲盈虚非盈虚彼爲衰殺非衰殺彼爲本末非本末彼爲積散非積散也註既明物物者無物又明物之不能自物則爲之者誰乎哉皆忽然而自爾也䟽富貴爲盈貧賤爲虚老病爲衰殺終始爲本末生來爲積死去爲散夫物物者非物而生物誰乎此明能物所物皆非之也物既非物何盈虚衰殺之可語邪是知所謂盈虚皆非盈虚故西昇經云若能明之所是反非也妸荷甘與神農同學於老龍吉䟽姓妸字荷甘神農者非三皇之神農也則後之人物耳二人同學於老龍吉老龍吉亦是號也神農隱几闔户晝瞑妸荷甘日中奓户而入曰老龍死矣䟽隱慿也闔合也奓開也亦排也學道之人心神凝靜閉門隱几守默而瞑荷甘既聞師亡所以排尸而告神農隱几擁杖而起嚗然放杖而笑註起而悟夫死之不足驚故還放杖而笑也䟽嚗然放杖聲也神農聞吉死是以擁枤而驚覆思死不足哀故還放杖而笑曰天知予僻陋慢訑故棄予而死已矣夫子無所發予之狂言而死矣夫註自肩吾已下皆以至言爲狂而不信也故非老龍連叔之徒莫足與言也䟽夫子老龍吉也言其有自然之德故呼之曰天也狂言猶至言也非世人之所解故名至言爲狂也而師知我偏僻鄙陋慢訑不專故棄背吾徒止息而死哲人云亡至言斯絶無復談玄垂訓開發我心弇堈弔聞之曰夫體道者天下之君子所繫焉註言體道者人之宗主也今於道秋豪之端萬分未得處一焉註秋豪之端細矣又未得其萬分之一而猶知藏其狂言而死又况夫體道者乎註明夫至道非言之所得也唯在手自得耳䟽姓弇名堈隱者也繫屬也聞龍吉之亡傍爲議論云體道之人世間共重賢人君子繫屬歸依今老龍之於玄道猶豪端萬分之未一尚知藏其狂簡處順而亡況乎妙悟之人曾肯露其言說是知體道深玄忘言契理者之至稀也俔之無形聽之無聲於人之論者謂之冥冥所以論道而非道也註㝠㝠而猶復非道明道之無名也䟽夫玄道虚漠妙體希夷非色非聲絶視絶聽故於學人論者論曰冥冥而謂之冥㝠猶非眞道也於是泰清問乎無窮曰子知道乎無窮曰吾不知䟽泰大也夫至道宏曠恬淡清虚囊括無窮故以泰清無窮爲名也既而泰清以知問道無窮答以不知欲明道離形聲亦不可以言知求也又問乎無爲無爲曰吾知道曰子之知道亦有數乎曰有曰其數若何䟽子既知道頗有名數不乎其數如何請爲略述無爲曰吾知道之可以貴可以賤可以約可以散此吾所以知道之數也䟽貴爲帝王賤爲僕隸約聚爲生分散爲死數乃無極此略言之欲明非名而名非數而數也泰清以之言也問乎無始曰若是則無窮之弗知與無爲之知孰是而孰非乎䟽至道玄通寂寞無爲隨迎不測無終無始故寄無窮無始爲其名焉無窮無爲弗知與知誰是誰非請定臧否無始曰不知深矣知之淺矣弗知内矣知之外矣䟽不知合理故深玄而處内知之乖道故粗淺而䟽外於是泰清中而歎曰弗知乃知乎知乃不知乎孰知不知之知註凡得之不由於知乃冥也䟽泰清得中道而嗟歎悟不知乃眞知誰知不知之知明眞知之至希也無始曰道不可聞聞而非也道不可見見而非也道不可言言而非也註故默成乎不聞不見之域而後至焉䟽道無聲不可以耳聞耳聞非道也道無色不可以眼見眼見非道也道無名不可以言說言說非道也知形形之不形乎註形自形耳形形者竟無物也䟽夫能形色萬物者固非形色也乃曰形形不形也道不當名註有道名而竟無物故名之不能當也䟽名無得道之功道無當名之實所以名道而非無始曰有問道而應之者不知道也雖問道者亦未聞道註不知故問問之而應則非道也不應則非問者所得故雖問之亦終不聞也䟽夫道絶名言不可問答故問道應道悉皆不知道無問問無應註絶學去教而歸於自然之意也䟽體道離言有何問應凡言此者覆釋前文無問問之是問窮也註所謂貴空䟽窮空也理無可問而强問之是貴空也無應應之是無内也註實無而假有以應者外矣䟽理無可應而强應之乃成殊外以無内待問窮若是者外不觀乎宇宙内不知乎太初䟽天地四方曰宇往古來今曰宙太初道本也若以理外之心待空之智者可謂外不識乎六合宇宙内不知乎己身之妙本者也是以不過乎崑崙不遊乎太虚註若夫婪落天地遊虚涉遠以入乎冥冥者不應而已矣䟽崑崙是高遠之山太虚是深玄之理苟其滯著名言猶存問應者是知未能經過高遠遊涉深玄者矣光耀問乎無有曰夫子有乎其無有乎䟽光曜者是能視之智也無有者所觀之境也智能照察故假名光曜境體空寂故假名無有也而智有明暗境無深淺故以智問境有乎無乎光耀不得問而孰視其狀貌窅然空然終日視之而不見聽之而不聞搏之而不得也䟽夫妙境希夷視聽斷絶故審狀貌唯寂唯空也光曜曰至矣其孰能至此乎予能有無矣而未能無無也及爲無有矣何從至此哉註此皆絶學之意也於道絶之則夫學者乃在根本中來矣故學之善者其唯不學乎䟽光明照曜其智尚淺唯能得無喪有未能雙遣有無故歎無有至深誰能如此玄妙而言無有者非直無有亦乃無無四句百非悉皆無有以無之一字無所不無言約理廣故稱無也而言何從至此者但無有之境窮理盡性自非玄德上士孰能體之是以淺學小智無從而至也大馬之捶鉤者年八十矣而不失豪芒註拈捶鉤之輕重而無豪芒之差也䟽大馬官號楚之大司馬也捶打鍛也鉤腰帶也大司馬家有工人少而善鍛鉤行年八十而捶鉤彌巧專性凝慮故無豪芒之差失也鉤稱鉤椎也謂能拈捶鉤推知斤兩之輕重無豪芒之差失也大馬曰子巧與有道與䟽司馬怪其年老而捶鍛愈精謂其工巧别有道術也曰臣有守也臣之年二十而好捶鉤於物無視也非鉤無察也䟽更無别術有所守持少年已來專精好此捶鉤之外無所觀察習以成性遂至於斯也是用之者假不用者也以長得其用而況乎無不用者乎物孰不資焉註都無懷則物來皆應䟽所以至老而長得其捶鉤之用者假賴於不用心視察他物故也夫假不用爲用尚得終年況乎體道聖人無用無不用故能成大用萬物資禀不亦宜乎冉求問於仲尼曰未有天地可知邪仲尼曰可古猶今也註言天地常存乃無未有之時䟽姓冉名求仲尼弟子師資發起詢問兩儀未有之時可知已否夫變化日新則無今無古古猶今也故答云可知也冉求失問而退明日復見曰昔者吾問未有天地可知乎夫子曰可古猶今也䟽失其問意遂退而歸既遵應問還用應答昔日吾昭然今日吾昧然敢問何謂也䟽昔日初咨心中昭然明察今時後間情慮昧然暗晦敢問前明後暗意謂如何仲尼曰昔之昭然也神者先受之註虚心以待命斯神受也今之昧然也且又爲不神者求邪註思求更致不了䟽先求未悟銳彼精神用心求受故昭然明白也後時領解不復運用精神直置任眞無所求請故昧然暗塞也求邪者言不求也無古無今無始無終註非唯無不得化而爲有也有亦不得化而爲無矣是以無有之爲物雖千變萬化而不得一爲無也不得一爲無故自古無未有之時而常存也䟽日新而變故無始無終無今無古故知無未有天地之時者也未有子孫而有子孫可乎註言世世無極䟽言子孫相生世世無極天地人物悉皆無原無有之時也可乎言不可也冉求未對仲尼曰已矣未應矣不以生生死註夫死者獨化而死耳非夫生者生此死也不以死死生註生者亦獨化而生耳䟽已止也未無也夫聚散死生皆獨化日新未嘗假賴豈相因待故不用生生此死不用死死此生冉求未對之間仲尼止令無應理盡於此更何所言也死生有待邪註獨化而足皆有所一體註死與生各自成一體䟽死獨化也豈更成一物哉死既不待於生故知生亦不待於死死生聚散各自成一體耳故無所因待也有先天地生者物邪物物者非物物出不得先物也猶其有物也猶其有物也無己註誰得先物者乎哉吾以陰陽者即所謂物耳誰又先陰陽者乎吾以自然爲先之而自然即物之自爾耳吾以至道爲先之矣而至道者乃至無也既以無矣又奚爲先然則先物者誰乎哉而猶有物無已明物之自然非有使然也䟽夫能物於物者非物也故非物則無先後物出則是物復不得有先於此物者何以知其然邪謂其猶是物故也以此推量竟無先物者也然則先物者誰乎哉明物之自然耳自然則無窮已之時也是知天地萬物自古以固存無未有之時也聖人之愛人也終無已者亦乃取於是者也註取於自爾者恩流百代而不廢也䟽夫得道聖人慈愛覆育恩流百代而無窮止者良由德合天地妙體自然故能虚己於彼忘懷亭毒萬物芻狗蒼生蓋取斯義而然也顔淵問乎仲尼曰回嘗聞諸夫子曰無有所將無有所迎回敢問其遊䟽請夫子言將送也夫聖人如鏡不送不迎顔回問之曰未曉其理故詢諸尼父問其所由仲尼曰古之人外化而内不化註以心順形而形自化䟽古人純樸合道者多故能外形隨物内心凝靜今之人内化而外不化註以心使形䟽内以縁通變化無明外形乖誤不能順物與物化者一不化者也註常無心故一不化一不化乃能與物化者耳安化安不化註化與不化皆任彼耳斯無心也䟽安任也夫聖人無心隨物流轉故化與不化斯安任之既無分别曾不槩意也安與之相靡註直無心而恣其自化耳非將迎而靡順之䟽靡順也所謂化與不化悉安任者爲不忤蒼生更相靡順必與之莫多註不將不迎則足而止䟽雖復與物相順而亦不多仁恩各止於分彼我無損狶韋氏之囿黃帝之圃有虞氏之宫湯武之室註言夫無心而任化乃羣聖之所遊處䟽狶韋軒轅虞舜殷湯周武並是聖明王也言無心順物之道乃是狶韋彷徨之苑囿軒轅敖遊之園圃虞舜養德之宫闈湯武怡神之虚室斯乃羣聖之所遊而處之也君子之人若儒墨者師故以是非相𩐎也而況今之人乎註𩐎和也夫儒墨之師天下之難和者而無心者猶故和之而況其凡乎䟽𩐎和也夫儒墨之師更相是非天下之難和者也而聖人君子猶能順而和之況乎令世之人非儒墨之師者也隨而化之不亦宜乎聖人處物不傷物註至順也䟽處俗和光利而不害故不傷之也不傷物者物亦不能傷也註在我而已䟽虚舟飄瓦大順羣生羣生樂推故處不害也唯無所傷者爲能與人相將迎註無心故至順至順故能無所將迎而義冠於將迎也䟽夫唯安任羣品彼我無傷者故能與物交際而明不迎而迎者山林與皋壤與使我欣欣然而樂與註山林皋壤未善於我而我便樂之此爲無故而樂也樂未畢也哀又繼之註夫無故而樂亦無故而哀也則凡所樂不足樂凡所哀不足哀也䟽凡情滯執忘生欣惡忽覩高山茂林神皋奥壤則欣然欽慕以爲快樂而樂情未幾哀又繼之情隨事遷哀樂斯變此乃無故而樂無故而哀是知世之哀樂不足計也哀樂之來吾不能禦其去弗能止悲夫世人直爲物逆旅耳註不能坐忘自得而爲哀樂所寄也䟽逆旅客舍也窮達之來不能禦扞哀樂之去不能禁止而凡俗之人不閑斯趣譬彼客舍爲物所停以妄爲眞深可悲歎也夫知遇而不知所不遇註知之所遇者即知之知之所不遇者即不知也知能能而不能所不能註所不能者不能强能也由此觀之知與不知能與不能制不出我也當付之自然耳䟽夫智有明闇能有工拙各禀素分不可强爲故分之所遇知則知之不遇者不能知也分之所能能則能之性之不能不可能也譬鳥飛魚泳蛛網蜣丸率之自然寧非性也無知無能者固人之所不免也註受生各有分也䟽既非聖人未能智周萬物故知與不知能與不能禀生不同機關各異而流俗之人必固其所不免也夫務免乎人之所不免者豈不亦悲哉䟽人之所不免者分外智能之事也而凡鄙之流不能安分故銳意感情務在獨免愚惑之甚深可悲傷至言去言至爲去爲註皆自得也䟽至理之言無言可言故去言也至理之爲無爲可爲故去爲也齊知之所知則淺矣註夫由知而後得者假學者耳故淺也䟽見賢思齊捨己效物假學求理運知訪道此乃淺近豈曰深知矣南華眞經註䟽卷之二十四
