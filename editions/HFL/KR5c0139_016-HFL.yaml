  text: 南華眞經注䟽卷之十六善二
  hash: sha256:5d6c12b6c93f4a65bca57767a5a87a33680b2848c6bf18dcd0c15cc14a719652
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0139_HFL_016-001a, image: hfl/0513/0513-090.png}
body:
  text: 河南郭象註唐西華法師成玄英䟽外篇天運第十四天其運乎註不運而自行也䟽言天禀陽氣清浮在上無心運行而自動之也地其處乎註不處而自止也䟽地禀陰氣濁沈在下亦無心寧靜而自止日月其爭於所乎註不爭所而自代謝也䟽晝夜照臨出没往來自然如是既無情於代謝豈有心於爭處孰主張是䟽孰誰也是者指斥前文也言四時八節雲行雨施覆育蒼生亭毒群品誰爲主宰而施張乎此一句解天運孰維綱是註皆自爾䟽山嶽産育川源流注包容萬物運載無窮春生夏長必無差忒是誰維持綱紀故得如斯此一句解地處也孰居無事推而行是註無則無所能推有則各自有事然則無事而推行是者誰乎哉各自行耳䟽夫日月代謝星辰朗耀各有度數咸由自然誰安居無事推筭而行之乎此一句解日月爭所已前三者並假設疑問顯發幽微故知皆自爾耳無物使之然也意者其有機緘而不得已邪䟽機關也緘閉也玄冬肅殺夜宵暗昧以意億度謂有主司關閉事不得已致令如此以理推者皆自爾也方地不動其義亦然也意者其運轉而不能自止邪註自爾故不可知也䟽至如青春氣發萬物皆生晝夜開明六合俱照氣序運轉致兹生育尋其理趣無物使然圓天運行其義亦爾也雲者爲雨乎雨者爲雲乎註二者俱不能相爲各自爾也䟽夫氣騰而上所以爲雲雲散而下流潤成雨然推尋始末皆無攸肇故知二者不能相爲孰隆弛是䟽隆興也弛廢也言誰興雲雨而洪注滂沲誰廢甘澤而致兹亢旱也孰居無事淫樂而勸是䟽誰安居無事自勵勸彼作此淫雨而快樂邪司馬本作倦字風起北方一西一東有上彷徨孰噓吸是孰居無事而披拂是䟽彷徨迴轉之貌也嘘吸猶吐納也披拂猶扇動也北方陰氣起風之所故云北方夫風吹無心東西任適或彷徨而居空裏或嘘吸而在山中披拂升降略無定準孰居無事而爲此乎蓋自然也敢問何故註設問所以自爾之故䟽此句總問以前有何意故也巫咸祒曰來吾語汝天有六極五常註夫物事之近或知其故然尋其原以至乎極則無故而自爾也自爾則無所稍問其故也但當順之䟽巫咸神巫也爲殷中宗相祒名也六極謂六合四方上下也五常謂五行金木水火土人倫之常性也言自然之理有此六極五常至於日月風雲例皆如此但當任之自然具足何爲措意於其間哉帝王順之則治逆之則凶註夫假學可變而天性不可逆也䟽夫帝王者上符天道下順蒼生垂拱無爲因循任物則天下治矣而逆萬國之歡心乖二儀之和氣所作凶悖則禍亂生也九洛之事治成德備監照下土䟽九洛之事者九州聚落之事也言王者應天順物馭用無心故致天下太平人歌擊壞九州聚落之地治定功成八荒夷狄之邦道圓德備既合二儀覆載萬物又齊三景照臨下土天下載之此謂上皇註順其自爾故也䟽道合自然德均造化故衆生樂推而不厭百姓荷戴而不辭可謂返樸還淳上皇之治也商大宰蕩問仁於莊子䟽宋承殷後故商即宋國也太宰官號名盈字蕩方欲决己所疑故問仁於莊子莊子曰虎狼仁也䟽仁者親愛之迹夫虎狼猛獸猶解相親足明萬類皆有仁性也曰何謂也䟽太宰未達深情重間有何意謂莊子曰父子相親何爲不仁䟽父子親愛出自天然此乃眞仁何勞再問曰請問至仁䟽虎狼親愛厥義未弘故請至仁庶聞深㫖莊子曰至仁無親註無親者非薄惡之謂也夫人之體非有親也而首自在上足自處下府藏居内皮毛在外外内上下尊卑貴賤於其體中各任其極而未有親愛於其間也然至仁足矣故五親六族賢愚遠近不失分於天下者理自然也又奚取於有親哉䟽夫至仁者忘懷絶慮與太虚而同體混萬物而爲一何親䟽之可論乎泊然無心而順天下之親䟽也太宰曰蕩聞之無親則不愛不愛則不孝謂至仁不孝可乎䟽夫無愛無親便是不孝謂至仁不孝於理可乎商蕩不悟深㫖遂生淺惑莊生爲其顯折義列下文莊子曰不然夫至仁尚矣孝固不足以言之註必言之於忘仁忘孝之地然後至耳䟽至仁者忘義忘仁可貴可尚豈得將愛敬近迹以語其心哉固不足以言也此非過孝之言也不及孝之言也註凡名生於不及者故過仁孝之名而涉乎無名之境然後至焉䟽商蕩之間近滯域中莊生之答遠超方外故知親愛之㫖非過孝之談封執名教不及孝之言也夫南行者至於郢北面而不見冥山是何也則去之遠也註冥山在乎北極而南行以觀之至仁在乎無親而仁愛以言之故郢雖見而愈遠冥山仁孝雖彰而愈非至理也䟽郢地居南冥山北故郭注云冥山在乎北極南行以觀之至仁在乎無親而仁愛以言之故郢雖見而愈遠冥山仁孝彰而愈非至道此注甚明不勞更釋故曰以敬孝易以愛孝難䟽夫敬在形迹愛率本心心由天性故難迹關人情故易也以愛孝易而忘親難䟽夫愛孝雖難猶滯域中未若忘親澹然無係志既勝愛有復劣無以此格量難易明之矣忘親易使親忘我難䟽夫騰猨斷腸老牛䑛犢恩慈下流物之恒性故子忘親易親忘子難自非達道孰能行此使親忘我易兼忘天下難兼忘天下易使天下兼忘我難註夫至仁者百節皆適則終日不自識也聖人在上非有爲也恣之使各自得而已耳自得其爲則衆務自適羣生自足天下安得不各自忘我哉各自忘矣主其安在乎斯所謂兼忘也䟽夫兼忘天下者棄萬乗如脱屣也使天下兼忘我者謂百姓日用而不知也夫垂拱汾陽而游心姑射揖讓之美貴在虚忘比兼忘天下者也方前則難比後便易未若忘懷至道息智自然將造化而同功與天地而合德者故能恣萬物之性分順百姓之所爲大小咸得飛沈不喪利澤潜被物皆自然上如標枝民如野鹿當是時也主其安在乎此使天下兼忘我者也可謂軒頊之前淳古之君耳其德不見故天下忘之斯則從劣向優自粗入妙遣之又遣玄之又玄也夫德遺堯舜而不爲也註遺堯舜然後堯舜之德全耳若係之在心則非自得也䟽遺忘棄也言堯舜二君盛德深遠而又忘其德任物不爲斯解兼忘天下難利澤施於萬世天下莫知也註泯然常適䟽有利益恩澤惠潤羣生萬世之後其德不替而至德潜被日用不知斯解使天下兼忘我難也豈直太息而言仁孝乎哉註失於江湖乃思濡沫䟽太息猶嗟歎也夫盛德同於堯舜尚能遺忘不自顯豈復太息言於仁孝嗟歎於陳迹乎夫孝悌仁義忠信貞廉此皆自勉以役其德者也不足多也䟽悌順也德者眞性也以此上八事皆矯性偽情勉强勵力己效人勞役其性故不足多也故曰至貴國爵並焉註並者除棄之謂也夫貴在身身猶忘之况國爵乎斯貴之至䟽並者除棄之謂也夫貴爵禄者本爲身也身猶忘之况爵禄乎斯至貴者也至富國財并焉註至富者自足而已故除天下之財者也䟽至富者知足者也知足之人以不貪爲寳縱令傾國資財亦棄而不用故老經云知足者富斯之謂也至願名譽并焉註所至願者適也得適而仁孝之名都去矣䟽夫至願者莫過適性也既一毁譽混榮辱忘物我泯是非故令問聲名視之如涕唾也是以道不渝註去華取實故也䟽渝變也薄也既忘富貴又遺名譽是以道德淳厚不隨物變也北門成問於黄帝曰帝張咸池之樂於洞庭之野䟽姓北門名成黃帝臣也欲明至樂之道故寄此二人更相發起也咸池樂名張施也咸和也大也洞庭之野天地之間非太湖之洞庭也吾始聞之懼復聞之怠卒聞之而惑䟽怠退怠也卒終也復重也惑闇也不悟至樂初聞之時懼然驚悚再聞其聲想悟音㫖故懼心退息最後聞之知至樂與二儀合德視之不見聽之不聞故心無分别有同暗惑者也蕩蕩默默乃不自得註不自得坐忘之謂也䟽蕩蕩平易之容默默無知之貌第三聞之體悟玄理故蕩蕩而無偏默默而無知芒然坐忘物我俱喪乃不自得帝曰汝殆其然哉吾奏之以人徽之以天行之以禮義建之以太清註由此觀之知夫至樂者非音聲之謂也必先順乎天應乎人得於心而適於性然後發之以聲奏之以曲耳故咸池之樂必待黃帝之化而後成焉䟽殆近也奏應也徽順也禮義五德也太清天道也黃帝既允門成第三聞樂體悟玄道忘知息慮是以許其所解故云汝近自然也夫至樂者先應之以人事順之以天理行之以五德應之以自然然後調理四時太和萬物雖復行於禮義之迹而忘自然之本者也此是第一奏也四時迭起萬物循生一盛一衰文武倫經䟽循順倫理經常也言春夏秋冬更迭而起一初物類順序而生夏盛冬衰春文秋武生殺之理天道之常但常任之斯至樂矣一清一濁陰陽調和流光其聲註自然律吕以滿天地之間但當順不奪則至樂全䟽清天也濁地也陰升陽降二氣調和故施生萬物和氣流布三光照燭此謂至樂無聲之聲蟄蟲始作吾驚之以雷霆註因其自作而用其所以動䟽仲春之月蟄蟲始啓自然之理驚之雷霆所謂動靜順時因物或作至樂具合斯道也其卒無尾其始無首註運轉無極䟽尋求自然之理無始無終討論至樂之聲無首無尾故老經云迎之不見其首隨之不見其後一死一生一僨一起所常無窮註以變化爲常則所常者無窮也䟽僨仆也夫盛衰生死虚盈起復變化之道理之常數若以變化爲常則所謂常者無窮也而一不可待汝故懼也註初聞無窮之變不能待之以一故懼然悚聽也䟽至一之理絶視絶聽不可待之以聲色故初聞懼然也吾又奏之以陰陽之和燭之以日月之明註所謂用天之道䟽言至樂之聲將陰陽合其序所通生物與日月齊其明此第二奏也其聲能短能長能柔能剛變化齊一不主故常註齊一於變化故不主故常䟽順羣生之脩短任萬物之柔剛齊變化之一理豈守故而執常在谷滿谷在阬滿阬註至樂之道無不周也䟽至樂之道無所不徧乃阬乃谷悉皆盈滿所謂道無不在所在皆無也塗郤守神註塞其兊也䟽塗塞也郤孔也閑心知之孔郤守凝寂之精神郭注云塞其兊也以物爲量註大制不割䟽量音亮大小脩短隨物器量終不制割而從己也其聲撣綽註所謂闡諧䟽揮動也綽寬也同雷霆之震動其聲寬也其名高明註名當其實則高明也䟽高如上天明如日月聲既廣大名亦高明是故鬼神守其幽註不離其所䟽人物居其顯明鬼神守其幽昧各得其所而不相撓故老經云以道利天下其鬼不神也日月星辰行其紀註不失其度䟽三光朗燿依分而行綱紀上玄必無差忒也吾止之於有窮註常在極上住也䟽止住也窮極也雖復千變萬化而常居玄極不離妙本動而常寂也流之於無止註隨變而往也䟽流動也應感無方隨時適變未嘗執守故寂而動也予欲慮之而不能知也望之而不能見也逐之而不能及也註故闇然恣使化去䟽夫至樂者眞道也欲明道非心識故謀慮而不能知道非聲色故瞻望而不能見道非形質故追逐而不能逮也儻然立於四虚之道註弘敞無偏之謂䟽儻然無心貌也四虚謂四方空大道也言聖人無心與至樂同體立志弘敞接物無偏包容萬有與虚空而合德倚於槁梧而吟註無所復爲也䟽弘敞虚容忘知絶慮故形同槁木心若死灰逍遥無爲且吟且詠也目知窮乎所欲見力屈乎所欲逐吾既不及已矣註言物之知力各有所齊限䟽夫目知所見蓋有涯限所以稱窮力馳逐亦有分齊所以稱屈至樂非心色等法不可以根窮故吾知盡其不及故止而不逐也心既有限故知愛無名引覆前子欲慮之等文也形充空虚乃至委蛇汝委蛇故怠註夫形充空虚無身也無身故能委蛇委蛇任性而悚懼之情怠也䟽夫形充空則與虚空而等量委蛇任性故順萬境而無心所謂隳體出聰離形去智者也只爲委蛇任性故悚懼之情怠息此解第二聞樂也吾又奏之以無怠之聲註意既怠矣乃復無怠此其至也䟽再聞至樂任性逶迤悚懼之心於焉怠息雖復賢於初聞猶自不及後聞故奏無怠之聲斯則以無遣怠故郭注云怠既怠矣乃復無怠此其至者也此是第三奏也調之以自然之命註命之所有者非爲也皆自然耳䟽調和也凡百蒼生皆以自然爲其性命所以奏此咸池之樂者方欲調造化之心靈和自然之性命也已故若混逐叢生註混然無係随後而生䟽混同生出同風物之動吹隨叢林之出聲也林樂而無形註至樂者適而已適在體中故無别形䟽夫叢林地籟之聲無心而成至樂適於性命而已豈復有形也布揮而不曳註自布耳䟽揮動四時布散萬物各得其所非由牽曳幽昏而無聲註所謂至樂䟽言至樂寂寥趣於視聽故幽冥昏闇而無聲響矣動於無方註夫動者豈有方而後動哉䟽夫至樂之本雖復無聲而應動隨時實無方所斯寂而動之也居於窈冥註所謂寧極䟽雖復應物隨機千變萬化而深根寧極恒處窅冥斯動而寂也或謂之死或謂之生或謂之實或謂之榮行流散徙不主常聲註隨物變化䟽夫眷生冬死秋實夏榮雲行雨散水流風從自然之理日新其變至樂之道豈常主聲也世疑之稽於聖人註明聖人應世非唱也䟽稽留也夫聖人者譬幽谷之響明象之照對之不知其所以來絶之不知其所以往物來斯應應而忘懷豈預前作法而留心應世故行留散徙不主常聲而世俗之人妄生疑惑也聖也者達於情而遂於命也註故有情有命者莫不資焉䟽所言聖者更無他義也通有物之情順自然之命故謂之聖天機不張而五官皆備此之謂天樂註忘樂而樂足非張而後備䟽天機自然之樞機五官五藏也言五藏各有主司故謂之官夫目視耳聽手把脚行布網轉丸飛空走地非由倣效禀之造物豈措意而後能爲故五藏職司素分備足天樂之美其在兹也無言而心悦註心悦在適不在言也䟽體此天和非由措意故心靈適悦而妙絶名言也故有焱氏爲之頌曰聽之不聞其聲視之不見其形充滿天地苞裹六極汝欲聽之而無接焉而故惑也註此乃無樂之樂樂之至也䟽焱氏神農也美此至樂爲之章頌大音希聲故聽之不聞大象無形視之不見道無不在故充滿天地二儀大無不包故囊括六極六極六合也假欲留音聽之亦不可以耳根承接是故體兹至樂理趣幽微心無分别事同愚惑也樂也者始於懼懼故祟註懼然悚聽故是祟耳未大和也䟽以下重釋三奏三聽之意結成至樂之道初聞至樂未悟太和心生悚懼不能放釋是故禍祟之也吾又次之以怠怠故遁註迹稍滅也䟽再聞之後情意稍悟欲懼心怠退其迹遁滅也卒之於惑惑故愚愚故道道可載而與之俱也註以無知爲愚愚乃至也䟽最後聞樂靈府淳和心無分别有同闇惑蕩蕩默默類彼愚迷不怠不懼雅符眞道既而運載無心與物俱至也孔子西遊於衛顔淵問師金曰以夫子之行爲奚如䟽衛本昆吾之邑又是康叔之封自魯適衛故曰西遊師金魯太師名金也奚何也言夫子行仁義之道以化衛侯未知此術行用可不邪師金曰惜乎而夫子其窮哉䟽言仲尼叡哲明敏才智可惜守先王之聖迹執堯舜之古道所以頻遭辛苦屢致困窮顔淵曰何也䟽問窮之所以也師金曰夫芻狗之未陳也盛以篋衍巾以文繡尸祝齋戒以將之䟽此下譬喻凡有六條第一芻狗第二舟車第三桔橰第四樝梨第五狙猨第六妍醜芻狗草也謂結草爲狗以解除也衍笥也尸祝巫師也將送也言芻狗未陳盛以筐笥之器覆以文繡之巾致齋潔以表誠展如在之將送庶其福祉貴之如是及其己陳也行者踐其首脊蘇者取而爨之而己將復取而盛以篋衍巾以文繡遊居寢卧其下彼不得夢必且數眯焉註廢棄之物於時無用則更致他妖也䟽踐履也首頭也脊背也取莫曰蘇爨炊也眯魘也言芻狗未陳致斯肅敬既祭之後棄之路中故行人履踐其頭脊蘇者取供其炊爨方將復取而貴之盛於筐衍之中覆於又繡之下敖游居處寢卧其傍假令不致惡夢必當數數遭魘故郭注云廢棄之物於時無用則更致他妖也今而夫子亦取先王已陳芻狗取弟子游居寢卧其下故伐樹於宋削迹於衛窮於商周是非其夢邪䟽此合芻狗之譬并合孔子窮義也先王謂堯舜禹湯先代之帝王也憲章文武祖述堯舜而爲教迹故集聚弟子敖游於仁義之域卧寢於禮信之鄉古法不可執留事同已陳芻狗伐樹於宋者孔子曾遊於宋與門人講說於大樹之下司馬桓魋欲殺夫子夫子去後桓魋惡其坐處因伐樹焉削剗也夫子嘗遊於衛衛人疾之故剗削其迹不見用也商是殷地周是東周孔子歷聘曾因於此良田執於聖迹故致斯弊狼狽如是豈非惡夢邪圍於陳蔡之間七日不火食死生相與鄰是非其昧邪註此皆絶聖棄知之意耳無所稍嫌也夫先王典禮所以適時用也時過而不棄即爲民妖所以興矯效之端也䟽當時楚昭王聘夫子夫子領徒宿於陳蔡之地蔡人見徒衆極多謂之爲賊故興兵圍繞經乎七日糧食罄盡無復炊爨從者餓病莫之能興憂悲困苦鄰乎死地豈非遭於已陳芻狗而魘邪夫水行莫如用舟而陸行莫如用車以舟之可行於水也而求推之於陸則没世不行尋常䟽夫舟行於水車行於陸致於千里未足爲難若推舟於陸求其運載終没一世不可數尺古今非水陸與周魯非舟車與今蘄行周於魯是猶推舟於陸也䟽此合諭也蘄求也亦今古代殊豈異乎水陸周魯地異何異乎舟車勞而無功身必有殃彼未知夫無方之傳應物而不窮者也註時移世異禮亦宜變故因物而無所係焉斯不勞而有功也䟽万猶常也傳轉也言夫子執先王之迹行衰周之世徒勞心力卒不成功故削迹伐樹身遭殃禍也夫聖人之智接濟無方千轉萬變隨機應物未知此道故嬰斯禍也且子獨不見夫桔橰者乎引之則俯舍之則仰彼人之所引非引人也故俯仰而不得罪於人䟽桔橰挈水木也人牽引之則俛下捨放之則仰上俛仰上下引捨以人委順無心故無罪夫人能虚己其義亦然也故夫三皇五帝之禮義法度不矜於同而矜於治註期於合時宜應治體而已䟽矜美也夫三皇五帝步驟殊時禮義威儀不相㳂襲美在逗機不治以定不貴率今以同古故譬三皇五帝之禮義法度其猶柤梨橘柚邪其味相反而皆可於口䟽夫柤梨橘柚甘苦味殊至於噉嚼而皆可於口譬三皇五帝澆淳異世至於爲政咸適機宜也故禮義法度者應時而變者也註彼以爲美而此或以爲惡故當應時而變然後皆適也䟽帝王之迹蓋無常凖應時而變不可執留豈得膠柱刻船居今行古也今取猨狙而衣以周公之服彼必齕齧挽裂盡去而後慊觀古今之異猶猨狙之異乎周公也䟽慊足也周公聖人譬淳古之世狙猨狡獸諭澆競之時是以禮服雖華猨狙不以爲美聖迹乃貴末代不以爲尊故毁禮服猨狙始慊其心棄聖迹蒼生方適其性故西施病心而矉其里其里之醜人見而美之歸亦捧心而矉其里其里之富人見之堅閉門而不出貧人見之挈妻子而去之走䟽西施越之美女也貌極妍麗既病心痛嚬眉苦之而端正之人體多宜便因其嚬蹙更益其美是以閭里見之彌加愛重鄰里醜人見而學之不病强嚬倍增其陋故富者惡之而不出貧人棄之而遠走捨己效物其義例然削迹伐樹皆學嚬之過也彼知美矉而不知矉之所以美註况夫禮義當其時而用之則西施也時過而不棄則醜人也䟽所以猶所由也嚬之所以美者由乎西施之好也彼之醜人但美嚬之麗雅而不知由西施之妹好也惜乎而夫子其窮哉䟽總會後文結成其㫖窮之事迹章中具載矣孔子行年五十有一而不聞道乃南之沛見老聃䟽仲尼雖領徒三千號素王而盛行五德未聞大道故從魯之沛自北徂南而見老君以詢玄極故也老聃曰子來乎吾聞子北方之賢者也子亦得道乎孔子曰未得也䟽聞仲尼有當世賢能未知頗得至道不答言未得自楚望魯故曰北也老子曰子惡乎求之哉䟽問於何處尋求至道曰吾求之於度數五年而未得也䟽數筭術也三年一閏天道小成五年再閏天道大成故言五年也道非術數故未得之也老子曰子又惡乎求之哉䟽更問求道用何方法曰吾求之於陰陽十有二年而未得註此皆寄孔老以明絶學之義也䟽十二年陰陽之一周也而未得者明以陰陽取道而道非陰陽故下文云中國有人非陰非陽老子曰然使道而可獻則人莫不獻之於其君使道而可進則人莫不進之於其親使道而可以告人則人莫不告其兄弟使道而可以與人則人莫不與其子孫然而不可者無他也䟽夫至道深玄妙絶言象非無非有不自不他是以不進獻於君親豈得告於子弟所以然者無他由也故記孔老二君聖以明玄中之玄也中無主而不止註心中無受道之質則雖聞道而過去也䟽若使中心無受道之主假令聞於聖說亦不能止住於胸懷故知無他也外無正而不行註中無主則外物亦無正己者也故未嘗通也䟽中既受道之心故外亦無能正於己者故不可行也由中出者不受於外聖人不出註由中出者聖人之道也外有能受之者乃出耳䟽由從也從内出者聖人垂迹顯教也良由物能感聖故聖人不應若使外物不能禀受聖人亦終不出教由外入者無主於中聖人不隱註由外入者假學以成性者也雖性可學成然要當内有其質若無主於中則無以藏聖道也䟽隱藏也由外入者習學而成性也由其外禀聖教冥在心中若使素無受入之心則無藏於聖道名公器也註夫名者天下之所共用䟽名鳴也公平也器用也名有二種一是命物二是毁譽今之所言是毁譽名也不可多取註矯飾過實多取者也多取而天下亂也䟽夫令譽善名天下共用必其多取則矯飾過實而爭競斯起也仁義先王之蘧廬也註猶傳舍也止可以一宿而不可乆處覯而多責註夫仁義者人之性也人性有變古今不同也故遊寄而過去則㝠若無滯而係於一方則見見則偽生偽生而責多矣䟽蘧廬逆於傳舍也覯見也亦乆也夫蘧廬舍客不可乆停仁義禮智用訖宜廢客停乆疵釁生聖迹留過責起古之至人假道於仁託宿於義註隨時而變無常迹也以遊逍遥之墟䟽古之眞人和光降迹逗機而行博愛應物而用人群何異乎假借塗路寄託宿止暫時游寓蓋非眞實而動不傷寂應不離眞故恒逍遥乎自得之場彷徨乎無爲之境食於苟簡之田立於不貸之圃註苟且也簡略也貸施與也知止知足食於苟簡之田不損已物立於不貸之圃而言田圃者明是聖人養生之地逍遥無爲也註有爲則非仁義苟簡易養也註全從其簡故易養也䟽只爲逍遥累盡故能無爲恬淡苟簡苟且簡素自足而已故易養也不貸無出也註不貸者不損己以爲物也䟽不損我以益彼故無所出此三句覆釋前義也古者謂是采眞之遊註遊而任之斯眞采也采眞則色不偽矣䟽古者聖人行苟簡等法謂是神采眞實而無假偽逍遥任適而隨化遨游也以富爲是者不能讓禄以顯爲是者不能讓名親權者不能與人柄註天下未有以所非自累者而各没命於所是所是而以没其命者非立乎不貸之圃也䟽夫是富非貪貪於貨賄者豈能讓人財禄是顯非隱滯於榮位者何能與人名譽親愛權勢矜夸於物者何能與人之柄柄權也唯厭穢風塵羶臊榮利者故能棄之若遺操之則慄舍之則悲註舍之悲者操之不能不慄也䟽操執權柄恐失所以戰慄捨去威力喪去所以憂悲而一無所鑒以闚其所不休者是天之戮民也註言其知進而不知止則性命喪矣所以爲戮䟽是富好權之人心靈愚暗唯滯名利一無鑒識豈能聞見玄理而休心息智者乎如是之人雖復楚戮未加而情性以困故是自然刑戮之民怨恩取與諫教生殺八者正之器也䟽夫怨敵必殺恩惠須償分内自取分外與他臣子諫上君父教下應青春以生長順素秋以殺罰此八者治正之器不得不用之也唯循大變無所湮者爲能用之故曰正者正也其心以爲不然者天門弗關矣註守故不變則失正矣䟽循順也湮塞也唯當順於大理隨於變化達於物情而無滯塞者故能用八事治之正事合於正理故曰正者正也其心之不能如是者天機之門擁而弗開天門心也孔子見老聃而語仁義老聃曰夫播糠眯目則天地四方易位矣蚊虻𠾱膚則通夕不寐矣註外物如之雖小而傷性已大也䟽仲尼滯於聖迹故發辭則語仁義夫播糠眯目目暗故不能辯東西蚊虻𠾱膚膚痛則徹宵不睡是以外物雖微爲害必巨況乎仁非天理義不率性捨己效他喪其本性其爲害也豈眯目𠾱膚而已哉𠾱齧也夫仁義𢡚然乃憤吾心亂莫大焉註尚之以加其性故亂䟽仁義𢡚毒甚於蚊虻憤憤吾心令人煩悶擾亂物性莫大於此一本亦作憤字者吾子使天下無失其朴註質全而仁義著吾子亦放風而動總德而立矣註風自動而依之德自立而秉之斯易持易行之道也䟽放縱任也欲使蒼生喪其淳樸之性者莫若絶仁棄義則反冥我極也仲尼亦宜放無爲之風教隨機務而應物總虚妄之至德立不測之神功亦有作放方往反放依也又奚傑然若負建鼓而求亡子者邪註言夫揭仁義以趨道德之鄉其猶擊鼓而求逃者無由得也䟽建擊傑然用力貌夫揭仁義以趨道德之鄉何異乎打大鼔以求逃亡之子故鼔聲大而亡子速仁義彰而道德廢也夫鵠不日浴而白烏不日黔而黑註自然各已足黑白之朴不足以爲辯註俱自然耳無以偏向䟽浴洒也染緇曰黔黔黑也辯者别其勝負也夫鵠白烏黑禀之自然豈須日日浴染方得如是以言物性其義例然然黑白素樸各足於分所遇斯適故不足於分所以論勝負亦言辯變也黑白分定不可變白爲黑也名譽之觀不足以爲廣註夫至足者忘名譽忘名譽乃廣耳䟽修名立譽招物觀視此乃狹劣何足自多唯恐遣名譽方可稱大耳泉涸魚相與處於陸相呴以濕相濡以沫註言仁義之譽皆生於不足不若相忘於江湖註斯乃忘仁而仁者也䟽此總結前文斥仁義之弊夫泉源枯竭魚傳沫以相濡樸散淳離行仁義以濟物及其江湖浩蕩各足所以相忘道德深玄得性所以虚淡既江湖比於道德濡沫方於仁義以此格量故不同日而語矣孔子見老聃歸三日不談䟽老子方外大聖變化無常不可測量故無所談說也弟子問曰夫子見老聃亦將何規哉䟽不的姓名直云弟子當是升堂之類共發此疑既見老子應有規誨何所聞而三日而不談也孔子曰吾乃今於是乎見龍龍合而成體散而成章註謂老聃能變化䟽夫龍之德變化不恒以況至人隱顯無定故本合而成妙體窈冥迹散而起文章焕爛乗乎雲氣而養乎陰陽註言其因御無方自然已足䟽言至人乗雲氣而無心順陰陽而養物也予口張而不能嗋予又何規老聃哉䟽嗋合也心懼不定口開不合復何容暇聞規訓之言乎子貢曰然則人固有尸居而龍見雷聲而淵默發動如天地者乎䟽言至人其處也若死尸之安居其出也似龍神之變見其語也如雷霆之振響其默也類玄理之無聲是以奮發機動同二儀之生物者也既而或處或出或語或默豈有出處語默之異而異之哉然則至人必有出處默語不言之能故仲尼見之口而不能合賜亦可得而觀乎遂以孔子聲見老聃䟽賜子貢名也子貢欲至觀至人龍德之相遂以孔子聲教而往見之老聃方將倨堂而應微曰予年運而往矣子將何以戒我乎䟽倨企也運時也老子自得從容故企堂敖誕物感斯應發微其言子年衰邁可以教何以戒我乎子貢曰夫三王五帝之治天下不同其係聲名一也而先生獨以爲非聖人如何哉䟽澆淳漸異歩驟有殊用力用兵逆順斯異故云不同聲名令聞相係一也先生乃排三王爲非聖有何意㫖可得聞乎老聃曰小子少進子何以謂不同䟽汝少進前說不同所由對曰堯授舜舜受禹禹用力而湯用兵文王順紂而不敢逆武王逆紂而不肯順故曰不同䟽堯舜二人即是五帝之數自夏禹以降便是三王堯讓舜舜讓禹禹治水而用力湯伐桀而用兵文王拘羑里而順商辛武王渡孟津而逆殷紂不同之狀可略言焉老聃曰小子少進余語汝三皇五帝之治天下䟽三皇者伏犧神農黄帝也五帝少昊顓頊高辛唐虞也治天下之治列在下文黄帝之治天下使民心一民有其親死不哭而民不非也註若非之則强哭䟽三皇行道人心淳一不獨親其親不獨子其子故親死不哭而世俗不非必也非之則强哭者衆堯之治天下使民心親民有爲其親殺其殺而民不非也註殺降也言親䟽有降殺䟽五帝行德不及三皇使子父兄弟更相親愛爲降殺之服以别親䟽既順人心亦不非毁舜之治天下使民心競民孕婦十月生子子生五月而能言註教之速也䟽舜是五帝之末其俗漸澆樸散淳離民心浮競遂使懷孕之婦十月生子五月能言古者懷孕之婦十四月而誕育生子兩歲方始能言澆淳既革故與古之乖異也不至乎孩而始誰註誰者别人之意也未孩已擇人言其競教速成也䟽未解孩笑已識是非分别之心自此而始矣則人始有夭矣註不能同彼我則心競於親䟽故不終其天年也䟽分别既甚不終天年夭逝之始起自虞舜禹之治天下使民心變人有心而兵有順註此言兵有順則天下已有不順故也䟽去道既遠澆偽日興遂使蠢爾之民好爲禍變廢無爲之迹興有爲之心賞善罰惡以此爲化而禹懷慈愛猶解泣辜兵刃所加必須天道也殺盜非殺註盜自應死殺之順也故非殺䟽盜賊有罪理合其誅順乎素秋雖殺非殺此則兵有順義也人自爲種而天下耳註不能大齊萬物而人人自别斯人自爲種也承百代之流而會乎當今之變其弊至於斯者非禹也故曰天下耳言聖知之迹非亂天下而天下必有斯亂䟽夫澆浪既興分别日甚人人自爲種見不能大齊萬物此則解人有心也聖智之迹使其如是非禹之過也故曰天下耳矣是以天下大駭儒墨皆起註此乃百代之弊䟽此總論三皇五帝之迹驚天下蒼生致使儒崇堯舜以飾非墨遵禹道而自是既而百家競起九流爭騖後代之弊實此之由也其作始有倫而今乎婦女註今之以女爲婦而上下悖逆者非作始之無理但至理之弊遂至於此䟽倫理也當莊子之世六國競興淫風大行以女爲婦乖禮悖德莫甚於兹故知聖迹始興故有倫理及其末也例同斯弊也何言哉註弊生於理故無所復言䟽從理生教遂至於此世澆俗薄何可稍言論正發憤而傷歎也余語汝三皇五帝之治天下名曰治之而亂莫甚焉註必弊故也䟽夫三皇之治實自無爲無爲之迹迹生於弊故百代之後亂莫甚焉弊亂之狀列在下文三皇之知上悖日月之明下睽山川之精中墮四時之施䟽悖逆也睽乖離也墮廢壞也施澤也運無爲之智以立治方後世執迹遂成其弊致星辰悖彗日月爲之不明山川乖離嶽瀆爲之崩竭廢壞四時寒暑爲之𠎝叙其知𢡚於𧓽蠆之尾鮮規之獸莫得安其性命之情者而猶自以爲聖人不可恥乎其無恥也䟽𢡚毒也𧓽蠆尾端有毒也鮮規小貌言三皇之智損害蒼生其爲毒也甚於𧓽蠆是故細小蟲獸皆遭擾動況乎黔首如何得安以斯爲聖於理未可毒害既多深可羞媿也子貢蹴蹴然立不安註子貢本謂老子獨絶三王故欲同三王於五帝耳今又見老子通毁五帝上及三皇則失其所以爲談矣䟽蹴蹴驚驚貌也子貢欲救三王同五帝今見老子詞調高貌排擯五帝指斥三皇心形驚悚失其所謂故蹴然形容雖立心神不安孔子謂老聃曰丘治詩書禮樂易春秋六經自以爲乆矣孰知其故矣以奸者七十二君論先王之道而明周召之迹一君無所鉤用甚矣夫人之難說也道之難明邪老子曰幸矣子之不遇治世之君也夫六經先王之陳迹也豈其所以迹哉註所以迹者眞性也夫任物之眞性者其迹則六經也今子之所言猶迹也夫迹履之所出而迹豈履哉註况今之人事則以自然爲履六經爲迹夫白鶂之相視眸子不運而風化蟲雄鳴於上風雌應於下風而風化註鶂以眸子相視蟲以嗚聲相應俱不待合而便生子故曰風化類自爲雌雄故風化註夫同類之雌雄各自有以相感相感之異不可勝極苟得其類其化不難故乃有遥感而風化也性不可易命不可變時不可止道不可壅註故至人皆順而通之苟得於道無自而不可註雖化者無方而皆可也失焉者無自而可註所在皆不可也孔子不出三月復見曰丘得之矣鳥鵲𡦗魚傳沫細要者化註言物之自然各有性也䟽鵲居巢内交尾而表陰陽魚在水中傳沫而爲牝牡蜂取桑蟲祝爲己子是知物性不同禀之大道物之自然各有性也有弟而兄啼註言人之性舍長而視幼故啼也䟽有弟而兄失愛捨長憐幼故啼是知陳迹不可執留但當順之物我無累言人性捨長視幼故啼也久矣夫丘不與化爲人不與化爲人安能化人註夫與化爲人者任其自化者也若繙六經以說則䟽也老子曰可丘得之矣南華眞經注䟽卷之十六
