front:
  text: 南華眞經注䟽卷之十一縁五
  hash: sha256:97917e2be865e4204234e3e8e5815840181df88c1c443bd3c6cb5651b7698418
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0139_SJB_011-160398a, image: sjb/16/160398a.png}
body:
  text: 河南郭象注唐西華法師成玄英䟽外篇馬蹄第九馬蹄可以踐霜雪毛可以禦風寒齕草飲水翹足而陸此馬之眞性也註駑驥各適於身而足䟽齕齒也踐履禦捍翹舉也夫蹄踐霜雪毛禦風寒飢即齕草渴即飲水逸豫適性即舉足而跳躑求禀乎造物故眞性豈願羈馽皁棧而馬服養之乎況萬有參差咸資素分安排任性各得逍遥不矜不企即生涯可保雖有羲臺路寢無所用之註馬之眞性非辟鞍而惡乗但無羡於榮華䟽羲養也謂是貴人養衛之臺觀也亦言羲臺猶靈臺也路大也正也即正寢之大殿也言馬之爲性欣於原野雖有高臺大殿無所用之況清虚之士淳樸之民樂彼茅茨安兹甕牖假使丹楹刻桷於我何爲及至伯樂曰我善治馬燒之剔之刻之雒之連之以羈馽編之以皁棧馬之死者十二三矣註有意治之則不治矣治之爲善斯不善也䟽列子云姓孫名陽字伯樂秦穆公時善治馬人燒鐵炙之也剔謂剪其毛刻謂削其蹄絡謂著籠頭也羈謂連枝絆也馽謂約前兩脚也皁謂槽櫪也棧編木爲椗安馬脚下以去其濕所謂馬牀也夫不能任馬眞性而横見燒剔既乖天理而死者已多況無心徇物性命所以安全有意治之天年於焉夭折飢之渴之馳之驟之整之齊之前有橛飾之患而後有鞭筴之威而馬之死者己過半矣註夫善御者將以盡其能也盡能在於自任而乃走作驅步求其過能之用故有不堪而多死焉若乃任駑驥之力適遲疾之分雖則足迹接乎八荒之表而衆馬之性全矣而或者聞任馬之性乃謂放而不乗聞無爲之風遂云行不如卧何其往而不返哉斯失乎莊生之㫖遠矣䟽橛銜也謂以寳物飾於鏕也帶皮曰鞭無皮曰筴俱是馬杖也夫馳驟過分飢渴失常整之以衡軏齊之以鏕轡威之策筴而求其以分外之能故駑駘不堪而死已過半聖智治物其損亦然陶者曰我善治埴圓者中規方者中矩䟽範土曰陶陶化也亦室也埴黏也亦土也謂陶者善能調和水土而爲瓦器運用方圓必中規矩也匠人曰我善治木曲者中鉤直者應繩䟽鉤曲也繩直也謂匠人機巧善能治木木之曲直必中鉤繩夫埴木之性豈欲中規矩鉤繩哉䟽土木之性禀之造物不求曲直豈慕方圓陶者匠人浪爲臧否然且世世稱之曰伯樂善治馬而陶匠善治埴木此亦治天下者之過也註世以任自然而不加巧者爲不善於治也揉曲爲直厲駑習驥能爲規矩以矯拂其性使死而後已乃謂之善治也不亦過乎䟽此總舉前文以合其譬然世情愚惑以治爲善不治之爲偽偽莫大焉吾意善治天下者不然註以不治治之乃善治也䟽然猶如此也莊子云我意謂善治天下不如向來陶匠等也善治之術列在下文彼民有常性織而衣耕而食是謂同德註夫民之德小異而大同故性之不可去者衣食也事之不可廢者耕織也此天下之所同而爲本者也守斯道者無爲之至也䟽彼民黎首也言蒼生皆有眞常之性而不假於物也德者得也率其眞常之性物各自足故同德郭象云性之不可去者衣食事之不可廢者耕織比天下之所同而爲本也守斯道也無爲至矣一而不黨命曰天放註放之而自一耳非黨也故謂之天放䟽黨偏也命名也天自然也夫虚通一道亭毒群生長之育之無偏無黨若有心治物則乖彼天然直置放任則物皆自足故名曰天放也故至德之世其行塡塡其視顚顚註此自足於内無所求及之貌䟽塡塡滿足之心顚顚高直之貌夫太上淳和之世遂初至德之時心既遣於是非行亦忘乎物我所以守眞内足塡塡而處無爲自不外求顚顚而遊於虚淡當是時也山無蹊隧澤無舟梁註不求非望之利故止於一家而足䟽蹊徑隧道也舟船也當是時即至德之世也人知守分物皆淳樸不伐不奪徑道所以可遺莫往莫來船橋於是乎廢萬物群生連屬其鄉註混芒而同得也則與一世而淡漠焉豈國異而家殊哉䟽夫混芒之世淳和淡漠故無情萬物連接而共里閭有識群生係屬而同鄉縣豈國異政而家殊俗哉禽獸成群草木遂長註足性而止無吞夷之欲故物全䟽飛禽走獸不害所以成群蔬草果木不伐遂其盛茂是故禽獸可係羈而遊鳥鵲之巢可攀援而闚註與物無害故物馴也䟽人無害物之心物無畏人之慮故山禽野獸可羈係而遨遊鳥鵲巢窠可攀援而窺望也夫至德之世同與禽獸居族與萬物並惡乎知君子小人哉䟽夫徇物邪僻爲小人履道方正爲君子既而巢居穴處將鳥獸而不分含哺鼓腹混群物而無異於何而知君子於何而辯小人哉同乎無知其德不離註知則離道以善也䟽既無分别之心故同乎無知之理又不以險德以求行故抱一而不離也同乎無欲是謂素樸註欲則離性以飾也䟽同遂初之無欲物各清廉異末代之浮華人皆淳樸素樸而民性得矣註無煩乎知欲也䟽夫蒼生所以失性者皆由滯欲故也既而無欲素樸眞性不喪故稱得也此一句總結已前至德之美者也及至聖人註聖人者民得性之迹耳非所以迹也此云及至聖人猶云及至其迹也蹩躠爲仁踶跂爲義而天下始疑矣澶漫爲樂摘僻爲禮而天下始分矣註夫聖迹既彰則仁義不眞而禮樂離性徒得形表而已矣有聖人即有斯弊吾若是何哉䟽自此已上明淳素之德自此已下斥聖迹之失及至聖人即五帝已下行聖迹之人也蹩躠用力之貌踶跂矜恃之容澶漫是縱逸之心摘僻是曲拳之行夫淳素道消澆偽斯起踶跂恃裁非之義蹩躠夸偏愛之仁爲漫澶貴奢淫之樂摘僻尚浮華之禮於是宇内分離蒼生疑惑亂天之經自斯而始矣故純樸不殘孰爲犧樽白玉不毁孰爲珪璋䟽純樸全木也不殘未彫也孰誰也犧樽酒器刻爲牛首以祭宗廟也上鋭下方曰珪半珪曰璋此略舉譬喻以明澆競之治也道德不廢安取仁義䟽此合譬也夫大道之世不辯是非至德之時未論憎愛無愛則人心自息無非則本迹斯忘故老經云大道廢有仁義矣性情不離安用禮樂䟽禮以檢迹樂以和心情苟不散安用和心性茍不離何勞檢迹是知和心檢迹由乎道喪也五色不亂孰爲文采五聲不亂孰應六律註凡此皆變樸爲華棄本崇末於其天素有殘廢矣世雖貴之非其貴也䟽夫文采本由相間音樂貴在相和若各色各聲不相顯發則宫商黼黻無由成用此重起譬却證前㫖夫殘樸以爲器工匠之罪也毁道德以爲仁義聖人之過也註工匠則有規矩之制聖人則有可尚之迹䟽此總結前義夫工匠以犧樽之器殘淳朴之木聖人以仁義之迹毁無爲之道爲弊既一獲罪宜均夫馬陸居則食草飲水喜則交頸相靡怒則分背相踶馬知已此矣註御其眞知乗其自陸則萬里之路可致而群馬之性不失䟽靡摩也順也踶踏也已止也夫物之喜怒禀自天然率性而動非由矯偽故喜則交頸而靡順怒則分背而踶踏而馬之知解適盡於此食草飲水樂在其中矣夫加之以衡扼齊之以月題而馬知介倪闉扼鷙曼詭銜竊轡䟽衡轅前横木也扼又馬頸木也月題額上當顱形似月者也介獨也倪睥睨也闉曲也鷙抵也曼突也詭詐也竊盜也夫馬之眞知唯欣放逸不求服飾豈慕榮華既而加以月題齊以衡扼乖乎天性不任困苦是以譎詐萌出睥睨曲頭綟扼抵突御人竊轡即盜脱籠頭詭銜乃吐出其勒良由乖損眞性所以矯偽百端者矣故馬之知而能至盜者伯樂之罪也註馬性不同而齊求其用故有力竭而態作者䟽態姦詐也夫馬之眞知適於原野馳驟過分即矯詐心生詭竊之態罪歸伯樂也夫赫胥氏之時民居不知所爲行不知所之含哺而熙鼓腹而遊民能已此矣註此民之眞能也䟽之適也赫胥上古帝王也亦言有赫然之德使民胥附故曰赫胥蓋炎帝也夫行道之時無爲之世心絶縁慮安居而無所爲率性而動遊行而無所往既而含哺而熙戲與嬰兒而不殊鼔腹而遨遊將童子而無别此至淳之世民能如此也及至聖人屈折禮樂以匡天下之形縣跂仁義以慰天下之心而民乃始踶跂好知爭歸於利不可止也此亦聖人之過也註其過皆由乎迹之可尚也䟽夫屈曲折旋行禮樂以正形體高懸仁義令企慕以慰心靈於是始踶跂自矜好知而興矯詐經營利禄爭歸而不知止噫聖迹之過者也南華眞經註䟽卷之十一
