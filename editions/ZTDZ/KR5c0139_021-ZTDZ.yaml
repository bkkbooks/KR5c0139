  text: 南華眞經注䟽卷之二十一善七
  hash: sha256:0eec7662e0e4971280023b1fdeef69f9f95e21b39e1414f576ac65653daec0c7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0139_SJB_021-160509c, image: sjb/16/160509c.png}
body:
  text: 河南郭象註唐西華法師成玄英䟽外篇達生第十九達生之情者不務生之所無以爲註生之所無以爲者分外物也達命之情者不務知之所無奈何註知之所無奈何者命表事也䟽夫人之生也各有素分形之妍醜命之脩短奚及貧富貴賤愚智窮通一毫已上無非命也故達生於性命之士性靈明照終不貪於分外爲己事務也一生命之所鍾者皆智慮之所無奈之何也養形必先之以物物有餘而形不養者有之矣註知止其分物稱其生生斯足矣有餘則傷䟽物者謂資貨衣食旦夕所須夫頤養身形先須用物而物有分限不可無涯故凡鄙之徒積聚有餘而養衛不足者世有之矣有生必先無離形形不離而生亡者有之矣註守形太甚故生亡也䟽既有此浮生而不能離形遺智愛形太甚亡失全生之道也如此之類世有之矣生之來不能却其去不能止註非我所制則無爲有懷於其間䟽生死去來委之造物妙達斯原故無所惡悲夫世之人以爲養形足以存生註故彌養之而彌失之䟽夫壽夭去來非己所制而世俗之人不悟斯理貪多資貨厚養其身妄謂足以存生深可悲歎而養形果不足以存生註養之彌厚則死地彌至䟽厚養其形彌速其死故决定不足以存生則世奚足爲哉註莫若放而任之䟽夫馳逐物境本爲資生生既非養所存故知世間物務何足爲也雖不足爲而不可不爲者其爲不免矣註性分各自爲者皆在至理中來故不可免也是以善養生者從而任之䟽分外之事不足爲也分内之事不可不爲也夫目見耳聽足行心知者禀之性理雖爲無爲故不務免也夫欲免爲形者莫如棄世棄世則無累無累則正平正平則與彼更生更生則幾矣註更生者日新之謂也付之日新則性命盡矣䟽幾盡也更生日新也夫欲有爲養形者無過棄却世間分外之事棄世則無憂累無憂累則合於正眞平等之道平正則冥於日新之變故能盡道之玄妙事奚足棄而生奚足遺棄事則形不勞遺生則精不虧註所以遺棄之䟽人世虚無何足損棄生涯空幻何足遺忘故棄世事則形逸而不勞遺生涯則神凝而不損也夫形全精復與天爲一註俱不爲也䟽夫形全不擾故能保完天命精固不虧所以復本還原形神全固故與玄天之德爲一天地者萬物之父母也註無所偏爲故能子萬物䟽夫二儀無心而生化萬物故與天地合德者群生之父母合則成體散則成始註所在皆成無常處䟽夫陰陽混合則成體質氣息離散則反於未生之始形精不虧是謂能移註與化俱也䟽移者遷轉之謂也夫不勞於形不虧其精者故能隨變任化而與物俱遷也精而又精反以相天註還輔其自然也䟽相助也夫遣之又遣乃曰精之又精是以反本還元輔於自然之道也子列子問關尹曰至人潜行不窒註其心虚故能御群實䟽古人稱師曰子亦是有德之嘉名具斯二義故曰子列子即列禦寇也姓尹名喜字公度爲函谷關令故曰關令尹眞人是老子弟子懷道抱德故禦寇詢之也窒塞也夫至極聖人和光匿燿潜伏行世混跡同塵不爲物境障礙故等虚室空而無塞本亦作空字蹈火不熱行乎萬物之上而不慄註至適故無不可耳非物往可之䟽冥於寒暑故不能灾一於高卑故心不恐懼請問何以至於此䟽總結前問意也關尹曰是純氣之守也非知巧果敢之䟽夫不爲外物侵傷者乃是保守純和之氣養於性澹之心而致之也非關運役心智分别巧詐勇决果敢而得之列居予語汝䟽命禦寇令復坐我告汝至言也凡有貌象聲色者皆物也物與物何以相遠註唯無心者獨逮耳夫奚足以至乎先是色而已註同是形色之物耳未足以相先也䟽夫形貌聲色可見聞者皆爲物也二彼俱物何足以遠亦何足以先至乎俱是聲色故也唯當非色非聲絶視絶聽者故能超貌象之外在萬物之先也則物之造乎不形而止乎無所化註常遊於極䟽夫不色不形故能造形色者也無變無化故能變化於萬物者也是以群有從造化而受形任變化之妙本夫得是而窮之者物焉得而止焉註夫至極者非物所制䟽夫得造化之深根自然之妙本而窮理盡性者世間萬物何得止正而控馭焉故當獨往獨來出没自在乗正御辯於何待焉彼將處乎不淫之度註止於所受之命䟽彼之得道聖人方將處心虚澹其度量宏博終不滯於世間而藏乎無端之紀註冥然與變化日新䟽大道無端無緒不始不終即用比混沌而爲紀綱故聖人藏心晦跡於恍惚之鄉也遊乎萬物之所終始註終始者物之極䟽夫物所始終謂造化也言生死始終皆是造化物固以終始爲造化也而聖人於任乎自然之境遨遊乎造化之場壹其性註飾則二矣䟽率性而動故不二也養其氣註不以心使之䟽吐納虚夷故愛養元氣合其德註不以物離性䟽抱一不離故常與玄德冥合也以通乎物之所造註萬物皆造放自爾䟽物之所造自然也既一性合德與亦相應故能達至道之原通自然之本夫若是者其天守全其神無郤物奚自入焉䟽是者指斥以前聖人也自從也若是者其保守自然之道全而不虧其心神凝照曾無間郤故世俗事物何從而入於靈府哉夫醉者之墜車雖疾不死骨節與人同而犯害與人異其神全也乗亦不知也墜亦不知也死生驚懼不入乎其胸中是故遻物而不慴䟽自此已下凡有三譬以况聖人任獨無心一者醉人二者利劍三者飄瓦此則是初夫醉人乗車忽然顚墜須復困疾必當不死其謂心無縁慮神照凝全既而乗墜不知死生不入是故遻於外物而情無慴懼彼得全於酒而猶若是註醉故失其所知耳非自然無心者也而况得全於天乎䟽彼之醉人因於困酒猶得暫時凝澹不爲物傷而況德全聖人冥於自然之道者乎物莫之傷故其冥矣聖人藏於天故莫之能傷也註不闚性分之外故曰藏䟽夫聖人照等三光智周萬物藏光塞智於自然之境故物莫之傷矣復讎者不折鏌干註夫干將鏌鎁雖與讎爲用然報讎者不事折之以其無心䟽此第二諭也干將鏌鎁並古之良劍雖用劍殺害因以結讎而報讎之人終不瞋怒此劍而折之也其爲無心故物莫之害也雖有忮心者不怨飄瓦註飄落之瓦雖復中人人莫之怨者由其無情䟽飄落之瓦偶爾傷人雖忮逆褊心之夫終不怨恨爲瓦是無心之物此第三諭也是以天下平均註凡不平者由有情故無攻戰之亂無殺戮之刑者由此道也註無情之道大矣䟽夫海内清平遐荒靜息野無攻戰之亂朝無殺戮之刑者蓋由此無爲之道無心聖人故致之也是知無心之義大矣不聞人之天而開天之天註不慮而知開天也知而後感開人也然則開天者性之動也開人者知之用也䟽郭注云不慮而知開天者也知而後感開人者也然則開天者性之動開人者智之用郭得之矣無勞更釋開天者德生註性動者遇物而當足則忘餘斯德生也開人者賊生註知用者從感而求勌而不已斯賊生也䟽夫率性而動動而常寂故德生也運智御世爲害極深故賊生也老經云以智治國國之賊不以智治國國之德也不厭其天不忽於人註任其天性而動則人理亦自全矣䟽常用自然之性不厭天者也任智自照於物斯不忽人者也民幾乎以其眞註民之所患偽之所生常在於知用不在於性動也䟽幾盡也因天任人性動智用而人天無別知用不殊是以率土盡眞蒼生無偽也仲尼適楚出於林中見痀僂者承蜩猶掇之也䟽病僂老人曲腰之貌承蜩取蟬也掇拾也孔子聘楚行出林籟之中遇老公以竿承蟬如俛拾地芥一無遺也仲尼曰子巧乎有道邪曰我有道也䟽怪其巧妙一至於斯故問其方答云有道也五六月累丸二而不墜則失者錙銖註累二丸於竿頭是用手之停審也故其承蜩所失者不過錙銖之間也䟽錙銖稱兩之微數也初學承蜩時經半歲運手停審故所失不多累三而不墜則失者十一註所失愈多䟽時節猶乆累丸微多所承之蜩十失其一也累五而不墜猶掇之也註停審之至故乃無所復失䟽累五丸於竿頭一無墜落停審之意遂到於斯是以承蜩蟬猶如俛拾吾處身也若橛株拘吾執臂也若槁木之枝註不動之至䟽拘謂斫殘枯樹枝也執用也我安處身心猶如枯樹用臂執竿若槁木之枝凝寂停審不動之至斯言有道此之謂也雖天地之大萬物之多而唯蜩翼之知䟽二儀極大萬物甚多而運智用心唯在蜩翼蜩翼之外無他縁慮也吾不反不側不以萬物易蜩之翼何爲而不得註遺彼故得此䟽反側猶變動也外息攀縁内心凝靜萬物雖衆不奪蜩翼之知是以事同拾芥何爲不得也孔子顧謂弟子曰用志不分乃凝於神其痀僂文人之謂乎䟽夫運心用志凝靜不離故累丸承蜩妙疑神鬼而尼父勉勗門人故云病僂丈人之謂也顔淵問仲尼曰吾嘗濟乎觴深之淵津人操舟若神䟽觴深淵名也其狀似桮因以爲名在宋國也津人謂津濟之人也操捉也顔回嘗經行李濟渡斯淵而津人操舟甚有方便其便僻機巧妙若神鬼顔面怪之故問夫子吾問焉曰操舟可學邪曰可善遊者數能註言物雖有性亦須數習而後能耳䟽顔回問可學答曰好遊涉者數習則能夫物雖禀之自然亦有習以成性者若乃夫没人則未嘗見舟而便操之也註没人謂能鶩没於水底䟽注云謂鶩没水底鶩鴨子也謂津人便水没入水下猶如鴨鳥没水因而捉舟吾問焉而不吾告敢問何謂也仲尼曰善遊者數能忘水也註習以成性遂若自然䟽好遊於水數習故能心無忌憚忘水者也若乃夫没人之未嘗見舟而便操之也彼視淵若陵視舟之覆猶其車却也註視淵若陵故視舟之覆於淵猶車之却退於坂也䟽好水數遊習以成性遂使顧視淵潭猶如陵陸假令舟之顚覆亦如車之却退於阪覆却萬方陳乎前而不得入其舍註覆却雖多而猶不以經懷以其性便故也䟽舍猶心中也隨舟進退方便萬端陳在目前不關懷抱既不忘水豈復勞心惡往而不暇註所遇皆閒暇也䟽率性操舟任眞遊水心無矜係何往不閒豈唯操舟學道亦爾但能忘遣即是達生以瓦注者巧以鈎注者憚以黃金注者殙註所要愈重則其心愈矜也䟽注射也用瓦器賤物而戲覩射者既心無矜惜故巧而中也以鈎帶賭者以其物稍貴恐不中垛故心生怖懼而不著也用黃金覩者既是極貴之物矜而惜之故心智昏亂而不中也是以津人以忘遣故若神射者以矜物故昏亂是以矜之則拙忘之則巧朂諸學者幸志之焉其巧一也而有所矜則重外也凡外重者内拙註夫欲養生全内者其唯無所矜重也䟽夫射者之心巧拙無二爲重於外物故心有所矜只爲貴重黃金故内心昏拙豈唯在射萬事亦然田開之見周威公威公曰吾聞祝腎學生註學生者務中適吾子與祝腎遊亦何聞焉䟽姓田名開之學道之人姓祝名腎懷道者也周公之胤莫顯其名食采於周謚曰威也素聞祝腎學養生之道開之既從遊學未知何所聞乎有此咨疑庶禀其術田開之曰開之操拔篲以侍門庭亦何聞於夫子䟽開之謂祝腎爲夫子拔篲掃帚也言我操提掃帚參侍門户灑掃庭前而已亦何敢輒問先生之道乎古人事師皆擁篲以充役也威公曰田子無讓寡人願聞之䟽讓猶謙也養生之道寡人願聞幸請指陳不勞謙遜開之曰聞之夫子曰善養生者若牧羊然視其後者而鞭之䟽我承祝腎之說養生譬之牧羊鞭其後者令其折中威公曰何謂也䟽未悟田開之言故更發疑問田開之曰魯有單豹者巖居而水飲不與民共利行年七十而猶有嬰兒之色不幸遇餓虎餓虎殺而食之䟽姓單名豹魯之隠者也巖居飲水不爭名利雖復年事長老而形色不衰乆處山林忽遭餓虎所食有張毅者高門縣薄無不走也行年四十而有内熱之病以死䟽姓張名毅亦魯人也高門富貴之家也縣薄垂簾也言張毅是流俗之人追奔世利高門甲第朱户垂簾莫不馳驟參謁趍走慶弔形勞神弱困而不休於是内熱發背而死豹養其内而虎食其外毅養其外而病攻其内此二子者皆不鞭其後者也汪夫守一方之事至於過理者不及於會通之適也鞭其後者去其不及也䟽單豹寡欲清虚養其内德而虎食其外張毅交游世貴養其形骸而病攻其内以死此二子各滯一邊未爲折中故並不鞭其後也仲尼曰無入而藏註曰藏既内矣而又入之此過於入也䟽注云入既入矣而又藏之偏滯於處此單豹也無出而陽註陽既外矣而又岀之此過於出也䟽陽顯也出既出矣而又顯之偏滯於岀此張毅也柴立其中央註若槁木之無心而中適是立也䟽柴木也不滯於出不滯於處出處雙遣如槁木之無情妙捨二邊而獨立於一中之道三者若得其名必極註名極而實萬也䟽夫因名詮理從理生名若得已前三句語意者則理窮而名極者也亦言得此三者名爲證至極之人也夫畏塗者殺人則父子兄弟相戒也必盛卒徒而後敢岀焉不亦知乎䟽塗道路也夫路有劫賊險難可畏十人同行一人被殺則親情相戒不敢輕行彊盛卒伍多結徒伴斟量平安然後敢去豈不知全身遠害乎人之所取畏者衽席之上飲食之問而不知爲之戒者過也註十殺耳便大畏之至於色欲之害動皆之死地而莫不冒之斯過之甚也䟽衽衣服也夫塗路患難十殺其一猶相戒愼不敢輕行況飲食之問不能將節衽席之上恣其淫蕩動之死地萬無一全舉世皆然深爲罪過祝宗人玄端以臨牢莢說彘䟽祝祝史也如今太宰六祝官也玄端衣冠筴圈也彘猪也夫饗祭宗廟必有祝史具於玄端冠服執版而祭鬼神未祭之問臨圈說彘說彘之文在於下也曰汝奚惡死吾將三月㹖汝十日戒三日齋藉白茅加汝肩尻乎彫俎之卜則汝爲之乎䟽豢養也俎盛肉器也謂彫飾之俎也說彘曰汝何須好生而惡死乎我將養汝以好食齋戒以潔清藉神坐以白茅置汝身於俎上如此相待豈不欲爲之乎爲彘謀曰不如食以糠糟而錯之牢筴之中自爲謀則苟生有軒冕之尊死得於腞楯之上聚僂之中則爲之爲彘謀則去之自爲謀則取之所異彘者何也註欲贍則身亡理常俱耳不問人獸也䟽錯置也腞畫飾也楯筴車也謂畫輀車也聚僂棺椁也爲彘謀者不如置之圈内食之糟糠不用白茅無勞彫俎自爲謀則苟且生時有乗軒戴冕之尊死則置於棺中載於楯車之上則欲得爲之爲彘謀則去白茅彫俎自爲謀則取於軒冕楯車而異彘者何也此蓋顚倒愚癡非達生之性者也桓公田於澤管仲御見鬼焉公撫管仲之手曰仲父何見對曰臣無所見䟽公即桓公小白也畋獵於野澤之下而使管夷吾御車公因見鬼心有所怖懼執管之手問之答曰臣無所見此章明凡百病患多因妄係而成公反誤詒爲病數日不出䟽誒詒是懈怠之容亦是數悶之貌既見鬼憂惶而歸遂成病患所以不出齊士有皇子告敖者曰公則自傷鬼惡能傷公䟽姓皇子字告敖齊之賢人也既聞公有病來問之云公妄係在心自遭傷病鬼有何力而能傷公欲以正理遣其邪病也夫忿滀之氣散而不反則爲不足䟽夫人忿怒則滀聚邪氣於是精魂離散不歸於身則心虚弊犯神道不足也上而不下則使人善怒下而不上則使人善忘不上不下中身當心則爲病䟽夫邪氣上而不下則上攻於頭令人心中怖懼鬰而好怒下而不上陽伏陰散精神恍惚故好忘也夫心者五藏之主神靈之宅故炁當身心則爲病桓公曰然則有鬼乎曰有䟽公問所由答言有鬼沈有履竈有髻䟽沈者水下泥之中有鬼曰履竈神其狀如美女著赤女衣名髻也户内之煩壤雷霆處之䟽門户内糞壤之中其間有鬼名曰雷霆東北方之下者倍阿鮭聾躍之䟽人宅中東北墻下有鬼名陪阿鮭聾躍狀如小兒長一尺四寸黑衣赤憤帶劍持㦸西北方之下者則泆陽處之䟽豹頭馬尾名曰泆陽水有罔象䟽注云狀如小兒黑色赤衣大耳長臂名曰罔象丘有崒䟽其狀如狗有角身有文彩山有夔䟽大如牛狀如鼔一足行也野有徬徨䟽其狀如蛇兩頭五彩澤有委蛇公曰請問委蛇之狀何如䟽桓公見鬼本在澤中既聞委蛇故問其狀皇子曰委蛇其大如轂其長如轅紫衣而朱冠其爲物也惡聞雷車之聲則捧其首而立見之者殆乎霸桓公辴然而笑曰此寡人之所見者也䟽辴喜笑貌也殆近也若見委蛇近爲霸主桓公聞說大笑歡之我所見正是此也於是正衣冠與之坐不終日而不知病之去也註此章言憂來而累生者不明也患去而性得者達理也䟽聞說委蛇情中暢適於是整衣冠共語論不終日而情抱豁然不知疾病從何而去也紀省子爲王養鬥雞䟽姓紀名渻子亦作消字隨字讀之爲齊王養雞擬鬥也此章明不必禀生知自然之理亦有積習以成性者十日而問雞已乎曰未也方虚憍而恃氣䟽養經十日堪鬥乎答曰始恃驕矜自恃意氣故未堪也十日又問曰未也猶應嚮景䟽見聞他雞猶相應和若形聲影響也十日又問曰未也猶疾視而盛氣䟽顧視遠疾意氣强盛心神尚動故未堪也十日又問曰幾矣雞雖有鳴者已無變矣䟽幾盡也都不驕矜心神安定雞雖之嗚以無變慴養雞之妙理盡於斯望之似木雞矣其德全矣異雞無敢應者反走矣註此章言養之以至於全者猶無敵於外况自全乎䟽神識安閑形容審定遥望之者其猶木雞不動不驚其德全具他人之雞見之反走天下無敵誰敢應乎孔子觀於吕梁縣水三十仞流沫四十里黿鼉魚鼈之所不能游也䟽吕梁水名解者不同或言是西河離石有黃河縣絶之處名吕梁也或言蒲州二百里有龍門河水所經瀑布而下亦名梁或言宋國彭城縣之吕梁八尺曰仞計高二十四丈而縣下也今者此水縣注名高蓋是寓言談過其實耳黿者似鼈而形大鼉者類魚而有脚此水瀑布既高流波峻駃遂使激湍騰沫三十里至於水族尚不能游況在陸生如何可渉見一丈夫游之以爲有苦而欲死也使弟子並流而拯之䟽激湍沸涌非人所能游忽見丈夫謂之遭溺而困苦故命弟子隨流而拯接之數百步而出被髮行歌而游於塘下䟽塘岸也既安於水故散髮而行歌自得逍遥敖游岸下孔子從而問焉曰吾以子爲鬼察子則人也請問蹈水有道乎䟽丈夫既不憚流波行歌自若尼父怪其如此從而問之我謂汝爲鬼神審觀察乃人也汝能履深水頗有道術不乎曰亡吾無道䟽答云我更無道術直是乆游則巧習以性成耳吾始乎故長乎性成乎命䟽我初始生於陵陸遂與陵爲故舊也長大游於水中習而成性也既習水成性心無懼憚恣情放任遂同自然天命也與齊俱入與汩偕出註磨翁而旋入者齊也回伏而涌出者汩也䟽湍沸旋入如磑心之轉者齊也回復騰漫而反出者汩也既與水相宜事符天命故出入齊汩曾不介懷郭注云磨翁而入者關東人唤磑爲磨磨翁而入是磑釭轉也從水之道而不爲私焉註任水而不任己䟽隨順於水委質從流不使私情輒懷違拒從水尚爾何況唯道是從乎此吾所以蹈之也䟽更無道術理盡於斯孔子曰何謂始乎故長乎性成乎命䟽未開斯㫖請重釋之曰吾生於陵而安於陵故也長於水而安於水性也不知吾所以然而然命也註此章言人有偏能得其所能而任之則天下無難矣用夫無難以涉生生之道何往而不通也䟽此之三義並釋於前無勞重解也梓慶削木爲鐻鐻成見者驚猶鬼神註不似人所作也䟽姓梓名慶魯大匠也亦云梓者官號鐻者樂器似夾鍾亦言鐻似虎形刻木爲之彫削巧妙不類人工見者驚疑謂神鬼之所作也魯侯見而問焉曰子何術以爲焉䟽魯侯見其神妙怪而問之汝何道術爲此鐻焉對曰臣工人何術之有雖然有一焉臣將爲鐻未嘗敢以耗氣也必齊以靜心䟽梓答云臣是工巧材人有何藝術雖復如是亦有一法焉臣欲爲鐻之時未嘗輒有攀縁損耗神氣必齋戒清潔以靜心靈也齊三日而不敢懷慶賞爵禄䟽心跡既齊凡經三日至於慶弔賞罰官爵利禄如斯之事並不入於情田齊五日不敢懷非譽巧拙䟽齊日既多心靈漸靜故能非譽雙遣巧拙兩忘齊七日輒然忘吾有四枝形體也當是時也無公朝註視公朝若無則跂慕之心絶矣䟽輒然不敢動貌也齊潔既乆情義清虚於是百體四肢一時忘遣輒然不動均於枯木既無意於公私豈有懷於朝廷哉其巧專而外滑消註性外之事去也䟽滑亂也專精内巧之心消除外亂之事然後入山林觀天性形軀至矣然後成見鐻然後加手焉不然則己註必取材中者也䟽外事既除内心虚靜於是入山林觀看天性好木形容軀貌至精妙而成事堪爲鐻者然後就手加工焉若其不然則止而不爲則以天合天註不離其自然也䟽機變雖加人工木性常因自然故以合天也器之所以疑神者其是與註盡因物之妙故乃疑是鬼神所作也䟽所以鐻之微妙疑似鬼神者只是因於天性順其自然故得如此此章明順理則巧若神鬼性乖則心勞而自拙也東野稷以御見莊公進退中繩左右旋中規莊公以爲文弗過也䟽姓東野名稷古之善御人也以御事魯莊公左右旋轉合規之圓進退抑揚中繩之直莊公以爲組繡織文不能過乎此之妙也使之鉤百而反䟽任馬旋回如鈎之曲百度反之皆復其跡顔闔遇之入見曰稷之馬將敗公密而不應䟽姓顔名闔魯之賢人也入見莊公初不信故密不應焉少焉果敗而反公曰子何以知之䟽少時之頃馬困而敗公問顔生何以知此曰其馬力竭矣而猶求焉故曰敗註斯明至當之不可過也䟽答馬力竭盡而求其過分之能故知必敗也非唯車馬萬物皆然工倕旋而蓋規矩指與物化而不以心稽䟽旋規也規圓也稽留也倕是堯時工人禀性極巧蓋用規矩手隨物化因物施巧不稽留也故其靈臺而不桎註雖工倕之巧猶任規矩此言因物之易者也䟽任物因循忘懷虚淡故其靈臺凝一而不桎梏也忘足屨之適也忘要帶之適也註百體皆適則都忘其身也知忘是非心之適也註是非生於不適耳䟽夫有履有帶本爲足爲要今既忘足要履帶當閑適亦猶心懷憂戚爲有是非今則知忘是非故心常適樂也不内變不外從事會之適也註所遇而安故無所所變從也䟽外智凝寂内心不移物境虚空不從事乃契會眞道所在常適始乎適而未嘗不適者忘適之適也註識適者猶未適也䟽始本也夫體道虚忘本性常適非由感物而後歡娛則有時不適本性常適故無往不歡也斯乃忘適之適非有心適有孫休者䟽姓孫名休魯人也踵門而詫子扁慶子曰休居鄉不見謂不修臨難不見謂不勇然而田原不遇歲事君不遇世賔於鄉里逐於州部則胡罪乎天哉休惡遇此命也䟽踵頻也詫告也歎也不能述道而怨迍邅頻來至門而歎也姓扁名子慶魯之賢人孫休之師也孫休俗人不達天命頻詣門而言之我居鄉里不見道我不修飾臨於厄難不見道我無勇武而營田於平原逢歲不熟禾稼不收處朝廷以事君不遇聖明不縻好爵遭州部而放逐被鄉閭而賔棄有何罪於上天苟遇斯之運命扁子曰子獨不聞夫至人之自行邪忘其肝膽遺其耳目註闇付自然也䟽夫至人立行虚遠清高故能内忘五藏之肝膽外遺六根之耳目蕩然空靜無纖介於胸臆芒然彷徨乎塵垢之外註凡此眞性皆塵垢也逍遥乎無事之業註凡自爲者皆無事之業也䟽芒然無心之貌也彷徨是縱放之名逍遥是任適之稱而處染不染縱放於囂塵之表涉事無事任適於物務之中也是謂爲而不恃註率性自爲耳非恃而爲之長而不宰註任其自長耳非宰而長之䟽接物施化不恃藉於我我勞長養黎元豈斷割而從己事出老經今汝飾知以驚愚修身以明汙昭昭乎若揭日月而行也䟽汝光飾心智驚動愚俗修營身形顯他汗穢昭昭明白自炫其能猶如擔揭日月而行於世也豈是韜光匿燿以蒙養恬哉汝得全而形軀具而九竅無中道夭於聾盲跛蹇而比於人數亦幸矣又何暇乎天之怨哉子往矣䟽而汝也得軀貌完全九竅具足復免中塗夭於聾盲跛蹇又得預於人倫偕於人數慶幸矣莫甚於斯有何容暇怨於天道子宜速往無勞辭費孫子出扁子入坐有間仰天而歎䟽孫休聞道而出扁子言訖而歸俄頃之間子慶嗟歎也弟子問曰先生何爲歎乎䟽扁子門人問其嗟歎所以扁子曰向者休來吾告之以至人之德吾恐其驚而遂至於惑也䟽孫休頻來踵門而詫述己居世坎軻不平吾遂告以至人深玄之德而器小言大慮有漏機恐其驚迫更增其惑是以吁歎也弟子曰不然孫子之所言是邪先生之所言非邪非固不能惑是孫子所言非邪先生所言是邪被固惑而來矣又奚罪焉䟽若孫子言是扁子言非非理之言必不惑是若扁子言是孫子言非彼必以非故來詣斯求是進退尋責何罪有乎先主之歎終成虚假扁子曰不然昔者有鳥止於魯郊魯君悦之爲具太牢以饗之奏九韶以樂之鳥乃始憂悲眩視不敢飲食此之謂以己養養鳥也若夫以鳥養養鳥者宜棲之深林浮之江湖食之以委蛇則平陸而已矣註各有所便也䟽此爰居之鳥非應瑞之物魯侯濫賞饗以太牢事顯前篇無勞重解今休款啓寡聞之民也吾告以至人之德譬之若載鼷以車馬樂鴳以鍾鼓也彼又惡能無驚乎哉註此章言善養生者各任性分之適而至矣哉䟽鼷小鼠也鴳雀也孫休是寡識少聞之人應須款曲啓發其事今乃告以至人之德大道玄妙之言何異乎載小鼠以大車娛鴳雀以韶樂既御小而用大亦何能無驚懼者也南華眞經註䟽卷二十一
