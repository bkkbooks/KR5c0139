front:
  text: 南華眞經注䟽卷之十七善三
  hash: sha256:b91dcf519da6303c80c535f8436327e976101b0f6da0dcd41dbec769ed033b43
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0139_SJB_017-160473c, image: sjb/16/160473c.png}
body:
  text: 河南郭象註唐西華法師成玄英䟽外篇刻意第十五刻意尚行離世異俗高論怨誹爲亢而已矣此山谷之士非世之人枯槁赴淵者之所好也䟽刻削也意志也亢窮也言偏滯之人未能會理刻勵身心高尚其行離異世俗卓爾不羣清談五帝之風高論三皇之教怨有才而不遇誹無道而荒淫亢志林籟之中削迹巖崖之下斯乃隱處山谷之士非毁時世之人枯槁則鮑焦介推之流赴淵則申狄卞隨之類蓋是一曲之士何足以語至道哉已止也其術止於此矣語仁義忠信恭儉推讓爲修而已矣此平世之士教誨之人遊居學者之所好也䟽發辭吐氣則語及仁義用兹等法爲修身之本此乃平時治世之士施教誨物之人斯則子夏之在西河宣尼之居洙泗或遊行而議論或安居講說蓋是學人之所好良非道士之所先語大功立大名禮君臣正上下爲治而已矣此朝廷之士尊主强國之人致功并兼者之所好也䟽建海内之功績立古今之鴻名致君臣之盛禮王天下之大義寧安社稷緝熙常道既而尊君王而服遐荒强本邦而兼并敵國豈非朝廷之士廊廟之臣乎即皋陶伊尹吕望之徒是也就藪澤處間曠釣魚間處無爲而已矣此江海之士避世之人閒暇者之所好也䟽棲隠山藪放曠臯澤間居而事綸釣避世而處無爲天子不得臣諸侯不得友斯乃從容閒暇之人即巢父許由公閲休之類吹呴呼吸吐故納新熊經鳥申爲壽而已矣此導引之士養形之人彭祖壽考者之所好也註此數子者所好不同恣其所好各之其方亦所以爲逍遥也然此亦各自得焉能靡所不樹哉若夫使萬物各得其分而不自失者故當付之無所執爲也䟽吹冷呼而吐故呴暖吸而納新如熊攀樹而自經類鳥飛空而伸脚斯皆導引神氣以養形魂延年之道駐形之術故彭祖八百歲白石三千年壽考之人即此之類以前數子志尚不同各滯一方未爲通美自不刻意而下方會玄玄之妙致也若夫不刻意而高無仁義而修無功名而治無江海而間不導引而壽註所謂自然無不忘也無不有也註忘故能有若有之則不能救其忘矣故有者非有之而有也忘而有之也䟽夫玄通合變之士冥眞契理之人不刻意而其道彌高無仁義而恒自修習忘功名而天下大治去江海而淡爾清閑不導引而壽命無極者故能唯物與我無不盡忘而萬物歸之故無不有也斯乃忘而有之非有之而有也澹然無極而衆美從之註若厲己以爲之則不能無極而衆惡生䟽心不滯於一方迹冥符於五行是以澹然虚曠而其道無窮萬德之美皆從於己也此天地之道聖人之德也註不爲萬物而萬物自生者天地也不爲百行而百行自成者聖人也䟽天地無心於亭毒而萬物生聖人無心於化育而百行成是以天地以無生生而爲道聖人以無爲爲而成德故老經云天地不仁聖人不仁故曰夫恬惔寂寞虚無無爲此天地之平而道德之質也註非夫寂寞無爲也則危其平而喪其質也䟽恬惔寂寞是凝湛之心虚無無爲是寂用之智天地以此法爲平均之源道德以此法爲質實之本也故曰聖人休休焉則平易矣註休乎恬惔寂寞息乎虚無無爲則雖歷乎阻險之變常平夷而無難䟽休心於恬惔之鄉息智於虚無之境則履艱難而簡易涉危險而平夷也平易則恬惔矣註患難生於有爲有爲亦生於患難故平易恬惔交相成也䟽豈唯休心恬惔故平易抑乃平易而恬惔矣是知平易恬惔交相成也平易恬惔則憂患不能入邪氣不能襲註泯然與正理俱往䟽心既恬惔迹又平易雖心與迹一種無爲故慇憂患累不能入其靈臺邪炁祅炁不能襲其藏府襲猶入也互其文也故其德全而神不虧註夫不平不惔者豈唯傷其形哉神德並喪於内也䟽夫恬惔無爲者豈唯外形無毁亦乃内德圓全形德既安則精神無損之矣故曰聖人之生也天行註任自然而運動其死也物化註蜕然無所係䟽聖人體勞息之不二達去來之爲一故其生也如天道之運行其死也類萬物之變化任鑪冶之陶鑄無纖介於胸中也靜而與陰同德動而與陽同波註動靜無心而付之陰陽也䟽凝神靜慮與太陰同其盛德應感而動與陽炁同其波瀾動靜順時無心者也不爲福先不爲禍始感而後應註無所唱也䟽夫善爲福先惡爲禍始既善惡雙遣亦禍福兩忘感而後應豈爲先始者也迫而後動註會至乃動䟽迫至也逼也動應也和而不唱赴機而應不得已而後起註任理而起吾不得已也䟽已止也機感通至事不得止而後起應非預謀去知與故循天之理註天理自然知故無爲乎其間䟽循順也内去心知外忘事故如混沌之無爲順自然之妙理也故無天灾註灾生於違天䟽合天故無灾也無物累註累生於逆物䟽順物故無累也無人非註與人同者衆必是焉䟽同人故無非也無鬼責註同於自得故無責其生若浮其死若休註汎然無所惜也䟽夫聖人動靜無心死生一貫故其生也似浮漚之暫起變化俄然其死也若疲勞休息曾無係戀也不思慮註付之天理䟽心若死灰絶於縁念不豫謀註理至而應䟽譬懸鏡高堂物來斯照終不預前謀度而待機務者也光矣而不耀註用天下之自光非吾耀也䟽智照之光明逾日月而韜光晦迹故不炫燿於物也信矣而不期註用天下之自信非吾期也䟽逼機赴感如影隨形信若四時必無差忒機來方應不預期也其寢不夢其覺無憂䟽契眞故凝寂而不夢累盡故常適而無憂也其神純粹註一無所欲䟽純粹者不雜也既無夢無憂契眞合道故其心神純粹而無間雜也其魂不罷註有欲乃疲䟽恬惔無爲心神閑逸故其精魂應用終不疲勞虚無恬淡乃合天德註乃與天地合其恬惔之德也䟽歎此虚無與天地合其德故曰悲樂者德之邪䟽違心則悲順意則樂不達違從是德之邪妄喜怒者道之過䟽稱心則喜乖情則怒喜怒不忘是道之罪過好惡者德之失䟽無好爲好無惡爲惡此之妄心是德之愆咎也故心不憂樂德之至也註至德常適故情無所槩䟽不喜不怒無憂無樂恬恬虚夷至德之人也一而不變靜之至也註靜而一者不可變也䟽抱眞一之玄道混囂塵而不變自非至靜孰能如斯無所於忤虚之至也註其心豁然確盡乃無纖介之違䟽忤逆也大順羣生無所乖逆自非虚豁之極其孰能然也不與物交淡之至也註物自來耳至淡者無交物之情䟽守分清高不交於物無所須待恬惔之至也無所於逆粹之至也註若雜乎濁欲則有所不順䟽智照精明至純無雜故能混同萬物大順蒼生至論忤之與逆厥理不殊顯虚粹兩義故再言耳故曰形勞而不休則弊精用而不已則勞勞則竭注物皆有當不可失也䟽夫形體精神禀之有限而役用無涯必之死地故分外勞形不知休息則困弊斯生精神逐物而不知止必當勞損損則精炁枯竭矣水之性不雜則清莫動則平鬱閉而不流亦不能清天德之象也註象天德者無心而階會也䟽象者法效也言水性清平善鑒於物若混而雜之鬱而閉塞之則乖於常性既不能猗流注亦不能鑒照於物也唯當不動不閉則清而且平洞照無私爲物準的者天德之象也以况聖人心虚皎潔鑒照無私法象自然與玄天合德故老經云上善若水也故曰純粹而不雜註無非至當之事也䟽雖復和光同塵而精神凝湛此覆釋前其神純粹也靜一而不變註常在當上住䟽縱使千變萬化而心恒靜一此重釋一而不變淡而無爲註與會俱而已矣䟽假令混俗揚波而無妨虚淡與物交接亦不廢無爲此釋前恬淡之至也動而以天行註若夫逐欲而動人行也䟽感物而動應而無心同於大道之運行無心而生萬物此養神之道也䟽總結以前天行等法是治身之術養神之道也夫有干越之劍者柙而藏之不敢用也寳之至也註况敢輕用其神乎䟽干溪名也越山名也干溪越山但出良劍也又云干吴也言吴越二國並出名劍因以爲名也夫有此干越之寳劍柙中而藏舉之自非敵國大事不敢輕用寳而重之遂至於此而況寳愛精神者乎精神四達並流無所不極上際於天下蟠於地註夫體天地之極應萬物之數以爲精神者故若是矣若是而有落天地之功者任天行耳非輕用也䟽流通也夫愛養精神者故能通達四方並流無滯即而下蟠薄於厚地上際逮於玄天四維上下無所不極動而常寂非輕用之者也化育萬物不可爲象註所育無方䟽化導蒼生含育萬物隨機俯應不守一方故不可以形象而域之也其名爲同帝註同天帝之不爲䟽帝審也總結以前名爲審實之道也亦言同天帝之不爲也已純素之道唯神是守守而勿失與神爲一註常以純素守乎至寂而不蕩於外則冥也䟽純精素質之道唯在守神守而不喪則精神凝靜既而形同枯木心若死灰物我兩忘身神爲一也一之精通合于天倫註精者物之眞也䟽倫理也既與神爲一則精智無礙故冥乎自然之理野語有之曰衆人重利廉士重名賢士尚志聖人貴精註與神爲一非守神也不遠其精非貴精也然其道則貴守之迹䟽莊子欲格量人物志尚不同故泛舉大綱略爲四品仍寄野逸之人以明言無的當且世俗衆多之人咸重財利則盜跖之徒是也貞廉潔素之士皆重聲名則伯夷介推是也賢人君子高尚志節不屈於世則許由子州支伯是也唯體道聖人無所偏滯故能寳貴精神不蕩於物雖復應變隨時而不喪其純素也故素也者謂其無所與雜也純也者謂其不虧其神也註苟以不虧爲純則雖百行同舉萬變參備乃至純也苟以不雜爲素則雖龍章鳳姿倩乎有非常之觀乃至素也若不能保其自然之質而雜乎外飾則雖犬羊之鞹庸得謂之純素哉䟽夫混迹世物之中而與物無雜者至素者也參變囂塵之内而其神不虧者至純者也豈復獨立於高山之頂拱手於林籟之間而稱純素哉蓋不然乎此結釋前純素之道義也能體純素謂之眞人䟽體悟解也妙契純素之理則所在皆眞道也故可謂得眞道之人也南華眞經注䟽卷之十七
