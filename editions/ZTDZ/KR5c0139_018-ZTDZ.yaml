front:
  text: 南華眞經注䟽卷之十八善四
  hash: sha256:7f766bd78e71fe02123aea344bfe69135132998f968fa5bf0c98734104c9f37b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0139_SJB_018-160479a, image: sjb/16/160479a.png}
body:
  text: 河南郭象註唐西華法師成玄英䟽外篇繕性第十六繕性於俗俗學以求復其初註已治性於俗矣而欲以俗學復性命之本所以求者愈非其道也䟽繕治也性生也俗習也初本也言人禀性自然各守生分率而行之自合於理今乃智於偽法治於眞性矜而矯之已困弊矣方更行仁義禮智儒俗之學以求歸復本初之性故俗彌得而性彌失學逾近而道逾遠也滑欲於俗思以求致其明註已亂其心於欲而方復役思以求明思之愈精失之逾遠䟽滑亂也致得也欲謂名利聲色等可貪之物也言人所以心靈昏亂者爲貪欲於塵俗故也今遺役用分别之心思量求學望得獲其明照之道者必不可也唯當以無學學可以歸其本矣以無思思可以得其明矣本亦有作滑欲於欲者也謂之蔽蒙之民註若夫發蒙者必離俗去欲而後幾焉䟽蔽塞也蒙昏也此則結前以俗學歸本以思慮求明如斯之類可謂蔽塞蒙暗之人古之治道者以恬養知註恬靜而後知不蕩知不蕩而性不失也䟽恬靜也古者聖人以道治身治國者必以恬靜之法養眞質之知使不蕩於外也生而無以知爲也謂之以知養恬註夫無以知爲而任其自知則雖知周萬物而恬然自得也䟽率性而照知生者也無心而知無以知爲也任知而往無用造爲斯則無知而知知而無知非知之而知者也故終日知而未嘗知亦未嘗不知終日爲而未嘗爲亦未嘗不爲仍以此眞知養於恬靜若不如是何以恬乎知與恬交相養而和理出其性註知而非爲則無害於恬恬而自爲則無傷於知斯可謂交相養矣二者交相養則和理之分豈出他哉䟽夫不能恬靜則何以生彼眞知不有眞知何能致兹恬靜是故恬由於知所以能靜知資於靜所以獲眞知故知之與恬交相養也斯則中和之道存乎寸心自然之理出乎天性在我而已豈關他哉夫德和也道理也註和故無不得道故無不理䟽德被於人故以中和爲義理通於物故以大道爲名也德無不容仁也註無不容者非爲仁也而仁迹行焉䟽玄德深遠無不包容慈愛宏博仁迹斯見道無不理義也註無不理者非爲義也而義功著焉䟽夫道能通物物各當理理既宜矣義功著焉義明而物親忠也註若夫義明而不由忠則物愈䟽䟽義理明顯情率於中既不矜驕故物來親附也中純實而反乎情樂也註仁義發中而遺任本懷則志得矣志得矣其迹則樂也䟽既仁義由中故志性純實雖復涉於物境而恒歸於眞情所造和適故謂之樂信行容體而順乎文禮也註信行容體而順乎自然之節文者其迹則禮也䟽夫信行顯著容儀軌物而不乖於節文者其迹則禮也禮樂徧行則天下亂矣註以一體之所履一志之所樂行之天下則一方得而萬方失也䟽夫不能虚心以應物而執迹以馭世者則必滯於華藻之禮而溺於荒淫之樂也是以芻狗再陳而天下亂矣彼正而蒙己德德則不冒冒則物必失其性也註各正性命而自蒙己德則不以此冒彼也若以此冒彼安得不失其性哉䟽蒙暗也冒亂也彼謂履正道之聖人也言人彼也冒亂則物我失其性矣古之人在混芒之中與一世而得澹漠焉䟽謂三皇之前玄古無名號之君也其時淳風未散故處在混沌芒昧之中而與時世爲一冥然無迹君臣上下不相往來俱得恬澹寂寞無爲之道也當是時也陰陽和靜鬼神不擾四時得節萬物不傷群生不夭人雖有知無所用之註任其自然而已䟽當時混沌之時淳朴之世舉世恬惔體合無爲遂使陰昇陽降二炁和而靜泰鬼幽人顯各守分而不擾炎凉順序四時得節即無灾眚萬物不傷群生各盡天年終無夭折人雖有心知之術無爲故無用之此之謂至一當是時也莫之爲而常自然註物皆自然故至一也䟽均彼此於無爲混是非於恬惔物我不二故謂之至一也莫無也莫之爲而自爲無爲也不知所以然而然自然也故當是時也人懷無爲之德物合自然之道焉逮德下衰註夫德之所以下衰者由聖人不繼世則在上者不能無爲而羡無爲之迹故致斯弊也及燧人伏羲始爲天下是故順而不一註世已失一或不可解故釋而不推順之而已䟽逮及也古者茹毛飲血與麋鹿同羣及至燧人始變生爲熟伏犧則服牛乗馬創立庖厨畫八卦以製文字放蜘蛛而造密網既而智詐萌矣嗜欲漸焉澆淳朴之心散無爲之道德衰而始爲天下此之謂乎是順黎庶之心而不能混同至一也德又下衰及神農黄帝始爲天下是故安而不順註安之於其所安而已䟽夫德化更衰爲弊增甚故神農有共工之伐黃帝致蚩尤之戰祅氣不息兵革屢興是以誅暴去殘弔民問罪苟且欲安於天下未能大順於羣生是也德又下衰及唐虞始爲天下興治化之流𣻏淳散朴註聖人無心任世之自成成之淳薄皆非聖也聖能任世之自得耳豈能使世得聖哉故皇王之迹與世俱遷而聖人之道未始不全也䟽夫唐堯虞舜居五帝之末而興治行化冠三王之始是以設五與而綱紀五行置百官而平章百姓百姓因此而澆訛五行自斯而荒殆枝流分派迄至于兹豈非毁淳素以作澆訛散朴質以爲華偽離道以善註善者過於適之稱故有善而道不全䟽夫虚通之道善惡兩忘今乃捨己效人矜名企善既乖於理所以稱離也險德以行註行者違性而行之故行立而德不夷䟽險危阻也不能率性任眞晦其蹤迹乃矯情立行以取聲名寔由外行聲名浮偽故令内德危險何清夷之有哉然後去性而從於心註以心自役則性去也䟽離虚通之道捨淳和之德然後去自然之性從分别之心心與心識註彼我之心競爲先識無復任性也䟽彼我之心更相謀慮是非臧否競爲前識者也知而不足以定天下註忘知任性斯乃定也䟽夫心攀縁於有境知分别於無崖六合爲之烟塵八荒爲之騰沸四時所以愆序三光所以彗孛斯乃禍亂之源何足以定天下也然後附之以文益之以博文滅質博溺心註文博者心質之飾也䟽前既使心運知不足以定天下故後依附文書以匡時代增博學而濟世不知質是文之本文華則隱滅於素質博是心之末博學則没溺於心靈唯當絶學而去文方會無爲之美也然後民始惑亂無以反其性情而復其初註初謂性命之本䟽文華既滅於素質博學又溺於心靈於是民始成蠢亂矣欲反其恬澹之情性復其自然之初本其可得乎噫心知文博之過由是觀之世喪道矣道喪世矣世與道交相喪也註夫道以不貴故能存世然世存則貴之貴之道斯喪矣道不能使世不貴而世亦不能不貴於道故交相喪也䟽喪廢也由是事迹而觀察之故知時世澆浮廢棄無爲之道亦由無爲之道廢變淳和之世是知世之與道交相喪之也道之人何由興乎世世亦何由興乎道哉註若不貴乃交相興也䟽故懷道聖人高蹈塵俗未肯興弘以馭世而澆偽之世亦何能興感於聖道也道無以興乎世世無以興乎道雖聖人不在山林之中其德隱矣註今所以不隱由其有情以興也何由而興由無貴也䟽澆季之時不能用道無爲之道不復行世假使體道聖人降迹塵俗混同羣小無人知者韜藏聖德莫能見用雖居朝市何異山林矣隱故不自隱註若夫自隱而用物則道世交相興矣何隱之有哉䟽時逢昏亂故聖道不行豈是韜光自隱其德耶古之所謂隱士者非伏其身而弗見也非閉其言而不出也非藏其知而不發也時命大謬也註莫知反一以息迹而逐迹以求一愈得迹愈失一斯大謬矣雖復起身以明之開言以出之顯知以發之何由而交興哉秪所以交喪也䟽謬偽妄也非伏匿其身而不見雖見而不亂羣非閉其言而不出雖出而不忤物非藏其智而不發雖發而不炫燿但時逢謬妄命遇迍邅故隨世污隆全身遠害當時命而大行乎天下註此澹漠之時也則反一無迹註反任物性而物性自一故無迹䟽時逢有道命屬清夷則播德弘化大行天下既而人人反一物物歸根彼我㝠符故無朕迹不當時命而大窮乎天下註此不能澹漠之時也則深根寧極而待註雖有事之世而聖人未始不澹漠也故深根寧極而待其自爲耳斯道之所以不喪也䟽時遭無道命值荒淫德化不行則大窮天下既而深固自然之本保寧至極之性安排而隨變化處常而待終年窮通豈有休戚於其間哉此存身之道也註未有身存而世不興者也䟽在窮塞而常樂處危險而安寧任時世之行藏可謂存身之道也古之行身者不以辯飾知註任其眞知而已䟽古人輕辯重訥賤言貴行是以古之行其身者必不用浮華之言辯飾分別之小智也不以知窮天下註此澹泊之情也䟽窮者困累之謂也不縱知毒害以困苦蒼生也不以知窮德註守其自得而已䟽知止其分不以無涯而累其自得危然處其所而及其性已又何爲哉註危然獨正之貌䟽危猶獨也言獨居亂世之中處危而所在安樂動不傷寂恒反自然之性率性而動復何爲之哉言其無爲也道固不小行註遊於坦塗䟽大道廣蕩無不制圍小成隱道固不小行矣德固不小識註塊然大通䟽上德之人智周萬物豈留意是非而爲識鑒也小識傷德小行傷道䟽小識小知虧損深玄之盛德小學小行傷毁虚通之大道也故曰正己而已矣樂全之謂得志註自得其志獨夷其心而無哀樂之情斯樂之全者也䟽夫己身履於正道則所作皆虚通也既而無順無逆忘哀忘樂所造皆適斯樂全之者也至樂全矣然後志性得焉古之所謂得志者非軒冕之謂也謂其無以益其樂而己矣註全其内而足䟽益加也軒車也冕冠也古人淳朴體道無爲得志在乎恬夷取樂非關軒冕樂已足矣豈待加之也今之所謂得志者軒冕之謂也䟽今世之人澆浮者衆貪美榮位待此適心是以戴冕乗軒用爲得志也軒冕在身非性命也物之儻來寄也䟽儻者意外忽來耳軒冕榮華身外之物物之儻來非我性命蹔寄而已豈可乆長也寄之其來不可圉其去不可止註在外物耳得失之非我也䟽時屬儻來泛然而取軒冕命遭寄去澹爾而捨榮華既無心於扞禦豈有情於留恡也故不爲軒冕肆志註淡然自若不覺寄之在身不爲窮約趨俗註曠然自得不覺窮之在身䟽肆申也趨競也古人體窮通之有命達榮枯之非己假使軒冕當塗亦未足申其志炁甘儉約以窮窘豈趨競於囂俗其樂彼與此同註彼此謂軒冕與窮約䟽彼軒冕也此窮約也夫軒冕窮約俱是儻來既樂彼軒冕亦須喜兹窮約二俱是寄所以相同也故無憂而已矣註亦無欣歡之喜也䟽軒冕不樂窮約不苦安排去化所以無憂者也今寄去則不樂由是觀之雖樂未嘗不荒也註夫寄去則不樂者寄來則荒矣斯以外易内也䟽今世之人識見浮淺是以物之寄也欣然而喜及去也悒然不樂豈知彼此事出儻來而寄去寄來常憂常喜故知雖樂而心未始不荒亂也故曰喪己於物失性於俗者謂之倒置之民註營外虧内甚倒置也䟽夫寄去寄來且憂且喜以己徇物非喪如何軒冕窮約事歸塵俗若習俗之常失於本性違眞背道寔此之由其所安置足爲顚倒也南華眞經注䟽卷之十八
