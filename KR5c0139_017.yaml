body:
  text: 南華真經注疏卷之十七善三河南郭象注唐西華法師成玄英疏外篇刻意第十五刻意尚行離世異俗高論怨誹為亢而已矣此山谷之士非世之人枯槁赴淵者之所好也疏刻削也意志也亢窮也言偏滯之人未能會理刻勵身心高尚其行離異世俗卓爾不羣清談五帝之風高論三皇之教怨有才而不遇誹無道而荒淫亢志林籟之中削迹巖崖之下斯乃隱處山谷之士非毁時世之人枯槁則鮑焦介推之流赴淵則申狄卞隨之類蓋是一曲之士何足以語至道哉已止也其術止於此矣語仁義忠信恭儉推讓為修而已矣此平世之士教誨之人遊居學者之所好也疏發辭吐氣則語及仁義用兹等法為修身之本此乃平時治世之士施教誨物之人斯則子夏之在西河宣尼之居洙泗或遊行而議論或安居講說蓋是學人之所好良非道士之所先語大功立大名禮君臣正上下為治而已矣此朝廷之士尊主强國之人致功并兼者之所好也疏建海內之功績立古今之鴻名致君臣之盛禮王天下之大義寧安社稷緝熙常道既而尊君王而服遐荒强本邦而兼并敵國豈非朝廷之士廊廟之臣乎即皋陶伊尹吕望之徒是也就藪澤處間曠釣魚間處無為而已矣此江海之士避世之人閒暇者之所好也疏棲隱山藪放曠臯澤間居而事綸釣避世而處無為天子不得臣諸侯不得友斯乃從容閒暇之人即巢父許由公閲休之類吹詬呼吸吐故納新熊經鳥申為壽而已矣此導引之士養形之人彭祖壽考者之所好也注此數子者所好不同恣其所好各之其方亦所以為逍遙也然此亦各自得焉能靡所不樹哉若夫使萬物各得其分而不自失者故當付之無所執為也疏吹冷呼而吐故詬暖吸而納新如熊攀樹而自經類鳥飛空而伸腳斯皆導引神氣以養形魂延年之道駐形之術故彭祖八百歲白石三千年壽考之人即此之類以前數子志尚不同各滯一方未為通美自不刻意而下方會玄玄之妙致也若夫不刻意而高無仁義而修無功名而治無江海而間不導引而壽注所謂自然無不忘也無不有也注忘故能有若有之則不能救其忘矣故有者非有之而有也忘而有之也疏夫玄通合變之士冥真契理之人不刻意而其道彌高無仁義而恆自修習忘功名而天下大治去江海而淡爾清間不導引而壽命無極者故能唯物與我無不盡忘而萬物歸之故無不有也斯乃忘而有之非有之而有也淡然無極而衆美從之注若厲己以為之則不能無極而衆惡生疏心不滯於一方迹冥符於五行是以淡然虛曠而其道無窮萬德之美皆從於己也此天地之道聖人之德也注不為萬物而萬物自生者天地也不為百行而百行自成者聖人也疏天地無心於亭毒而萬物生聖人無心於化育而百行成是以天地以無生生而為道聖人以無為為而成德故老經云天地不仁聖人不仁故曰夫恬惔寂寞虛無無為此天地之平而道德之質也注非夫寂寞無為也則危其平而喪其質也疏恬惔寂寞是凝湛之心虛無無為是寂用之智天地以此法為平均之源道德以此法為質實之本也故曰聖人休休焉則平易矣注休乎恬惔寂寞息乎虛無無為則雖歷乎阻險之變常平夷而無難疏休心於恬惔之鄉息智於虛無之境則履艱難而簡易涉危險而平夷也平易則恬惔矣注患難生於有為有為亦生於患難故平易恬惔交相成也疏豈唯休心恬惔故平易抑乃平易而恬惔矣是知平易恬惔交相成也平易恬惔則憂患不能入邪氣不能襲注泯然與正理俱往疏心既恬惔迹又平易雖心與迹一種無為故殷憂患纍不能入其靈臺邪氣祅氣不能襲其藏府襲猶入也互其文也故其德全而神不虧注夫不平不惔者豈唯傷其形哉神德並喪於內也疏夫恬惔無為者豈唯外形無毁亦乃內德圓全形德既安則精神無損之矣故曰聖人之生也天行注任自然而運動其死也物化注蛻然無所係疏聖人體勞息之不二達去來之為一故其生也如天道之運行其死也類萬物之變化任爐冶之陶鑄無纖介於胸中也靜而與陰同德動而與陽同波注動靜無心而付之陰陽也疏凝神靜慮與太陰同其盛德應感而動與陽氣同其波瀾動靜順時無心者也不為福先不為禍始感而後應注無所唱也疏夫善為福先惡為禍始既善惡雙遣亦禍福兩忘感而後應豈為先始者也迫而後動注會至乃動疏迫至也逼也動應也和而不唱赴機而應不得已而後起注任理而起吾不得已也疏已止也機感通至事不得止而後起應非預謀去知與故循天之理注天理自然知故無為乎其間疏循順也內去心知外忘事故如混沌之無為順自然之妙理也故無天灾注灾生於違天疏合天故無灾也無物纍注纍生於逆物疏順物故無纍也無人非注與人同者衆必是焉疏同人故無非也無鬼責注同於自得故無責其生若浮其死若休注泛然無所惜也疏夫聖人動靜無心死生一貫故其生也似浮漚之暫起變化俄然其死也若疲勞休息曾無係戀也不思慮注付之天理疏心若死灰絶於緣念不豫謀注理至而應疏譬懸鏡高堂物來斯照終不預前謀度而待機務者也光矣而不耀注用天下之自光非吾耀也疏智照之光明逾日月而韜光晦迹故不炫耀於物也信矣而不期注用天下之自信非吾期也疏逼機赴感如影隨形信若四時必無差忒機來方應不預期也其寢不夢其覺無憂疏契真故凝寂而不夢纍盡故常適而無憂也其神純粹注一無所欲疏純粹者不雜也既無夢無憂契真合道故其心神純粹而無間雜也其魂不罷注有欲乃疲疏恬惔無為心神間逸故其精魂應用終不疲勞虛無恬淡乃合天德注乃與天地合其恬惔之德也疏歎此虛無與天地合其德故曰悲樂者德之邪疏違心則悲順意則樂不達違從是德之邪妄喜怒者道之過疏稱心則喜乖情則怒喜怒不忘是道之罪過好惡者德之失疏無好為好無惡為惡此之妄心是德之愆咎也故心不憂樂德之至也注至德常適故情無所槩疏不喜不怒無憂無樂恬恬虛夷至德之人也一而不變靜之至也注靜而一者不可變也疏抱真一之玄道混囂塵而不變自非至靜孰能如斯無所於忤虛之至也注其心豁然確盡乃無纖介之違疏忤逆也大順羣生無所乖逆自非虛豁之極其孰能然也不與物交淡之至也注物自來耳至淡者無交物之情疏守分清高不交於物無所須待恬惔之至也無所於逆粹之至也注若雜乎濁欲則有所不順疏智照精明至純無雜故能混同萬物大順蒼生至論忤之與逆厥理不殊顯虛粹兩義故再言耳故曰形勞而不休則弊精用而不已則勞勞則竭注物皆有當不可失也疏夫形體精神禀之有限而役用無涯必之死地故分外勞形不知休息則困弊斯生精神逐物而不知止必當勞損損則精氣枯竭矣水之性不雜則清莫動則平鬱閉而不流亦不能清天德之象也注象天德者無心而階會也疏象者法效也言水性清平善鑒於物若混而雜之鬱而閉塞之則乖於常性既不能猗流注亦不能鑒照於物也唯當不動不閉則清而且平洞照無私為物準的者天德之象也以况聖人心虛皎潔鑒照無私法象自然與玄天合德故老經云上善若水也故曰純粹而不雜注無非至當之事也疏雖復和光同塵而精神凝湛此覆釋前其神純粹也靜一而不變注常在當上住疏縱使千變萬化而心恆靜一此重釋一而不變淡而無為注與會俱而已矣疏假令混俗揚波而無妨虛淡與物交接亦不廢無為此釋前恬淡之至也動而以天行注若夫逐欲而動人行也疏感物而動應而無心同於大道之運行無心而生萬物此養神之道也疏總結以前天行等法是治身之術養神之道也夫有干越之劍者柙而藏之不敢用也寶之至也注况敢輕用其神乎疏干溪名也越山名也干溪越山但出良劍也又云干吳也言吳越二國並出名劍因以為名也夫有此干越之寶劍柙中而藏舉之自非敵國大事不敢輕用寶而重之遂至於此而況寶愛精神者乎精神四達並流無所不極上際於天下蟠於地注夫體天地之極應萬物之數以為精神者故若是矣若是而有落天地之功者任天行耳非輕用也疏流通也夫愛養精神者故能通達四方並流無滯即而下蟠薄於厚地上際逮於玄天四維上下無所不極動而常寂非輕用之者也化育萬物不可為象注所育無方疏化導蒼生含育萬物隨機俯應不守一方故不可以形象而域之也其名為同帝注同天帝之不為疏帝審也總結以前名為審實之道也亦言同天帝之不為也已純素之道唯神是守守而勿失與神為一注常以純素守乎至寂而不蕩於外則冥也疏純精素質之道唯在守神守而不喪則精神凝靜既而形同枯木心若死灰物我兩忘身神為一也一之精通合于天倫注精者物之真也疏倫理也既與神為一則精智無礙故冥乎自然之理野語有之曰衆人重利廉士重名賢士尚志聖人貴精注與神為一非守神也不遠其精非貴精也然其道則貴守之迹疏莊子欲格量人物志尚不同故泛舉大綱略為四品仍寄野逸之人以明言無的當且世俗衆多之人咸重財利則盜跖之徒是也貞廉潔素之士皆重聲名則伯夷介推是也賢人君子高尚志節不屈於世則許由子州支伯是也唯體道聖人無所偏滯故能寶貴精神不蕩於物雖復應變隨時而不喪其純素也故素也者謂其無所與雜也純也者謂其不虧其神也注苟以不虧為純則雖百行同舉萬變參備乃至純也苟以不雜為素則雖龍章鳳姿倩乎有非常之觀乃至素也若不能保其自然之質而雜乎外飾則雖犬羊之鞹庸得謂之純素哉疏夫混迹世物之中而與物無雜者至素者也參變囂塵之內而其神不虧者至純者也豈復獨立於高山之頂拱手於林籟之間而稱純素哉蓋不然乎此結釋前純素之道義也能體純素謂之真人疏體悟解也妙契純素之理則所在皆真道也故可謂得真道之人也南華真經注疏卷之十七
