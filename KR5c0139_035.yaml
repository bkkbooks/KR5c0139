body:
  text: 南華真經注疏卷之三十五尺八河南郭象注唐西華法師成玄英疏雜篇天下第三十三天下之治方術者多矣皆以其有為不可加矣注為以其有為則真為也為其真為則無偽矣又何加焉疏方道也自軒頊已下迄于堯舜治道藝術方法甚多皆隨有物之情順其所為之性任羣品之動植曾不加之於分表是以雖教不教雖為不為矣古之所謂道術者果惡乎在疏上古三皇所行道術隨物任化淳朴無為此之方法定在何處假設疑問發明深理也曰無乎不在疏答曰無為玄道所在有之自古及今無處不遍曰神何由降明何由出注神明由事感而後降出疏神者妙物之名明者智周為義若使虛通聖道今古有之亦何勞彼神人顯兹明智制禮作樂以導物乎聖有所生王有所成疏夫虛凝玄道物感所以誕生聖帝明王功成所以降迹豈徒然哉皆原於一注使物各復其根抱一而已無飾於外斯聖王所以生成也疏原本也一道雖復降靈接物混迹和光應物不離真常抱一而歸本者也不離於宗謂之天人不離於精謂之神人不離於真謂之至人以天為宗以德為本以道為門兆於變化謂之聖人注凡此四名一人耳所自言之異疏冥宗契本謂之自然淳粹不雜謂之神妙嶷然不假謂之至極以自然為宗上德為本玄道為門觀於機兆隨物變化者謂之聖人已上四人只是一耳隨其功用故有四名也以仁為恩以義為理以禮為行以樂為和薰然慈仁謂之君子注此四名之粗迹而賢人君子之所服膺也疏布仁惠為恩澤施義理以裁非運節文為行首動樂音以和性慈照光乎九有仁風扇乎八方譬蘭蕙芳馨香氣薰於遐邇可謂賢矣以法為分以名為表以參為驗以稽為決其數一二三四是也疏稽考也操執也法定其分名表其實操驗其行考決其能一二三四即名法等是也百官以此相齒以事為常疏自堯舜已下置立百官用此四法更相齒次君臣物務遂以為常所謂彝倫也以衣食為主蕃息畜藏疏夫事之不可廢者耕織也聖人之不可廢者衣食也故國以民為本民以食為天是以蕃滋生息畜積藏儲者皆養民之法老弱孤寡為意皆有以養民之理也注民理既然故聖賢不逆古之人其備乎注古之人即此之四名也疏養老哀弱矜孤恤寡五帝已下備有之焉配神明醇天地育萬物和天下疏配合也夫聖帝無心因循品物故能合神明之妙理同天地之精醇育宇內之黎元和域中之羣有澤及百姓明於本數係於末度注本數明故末不離疏本數仁義也末度名法也夫聖心慈育恩覃黎庶故能明仁義以崇本係法名以救末六通四闢小大精粗其運無乎不在注所以為備疏闢法也大則兩儀小則羣物精則神智粗則形像通六合以遨遊法四時而變化隨機運動無所不在也其明而在數度者舊法世傳之史尚多有之注其在數度而可明者雖多有之已疏外也疏史者春秋尚書皆古史也數度者仁義法名等也古舊相傳顯明在世者史傳書籍尚多有之其在於詩書禮樂者鄒魯之士搢紳先生多能明之注能明其迹耳豈所以迹哉疏鄒邑名也魯國號也搢笏也亦插也紳大帶也先生儒士也言仁義名法布在六經者鄒魯之地儒服之人能明之也詩以道志書以道事禮以道行樂以道和易以道陰陽春秋以道名分疏道達也通也夫詩道情志書道世事禮道心行樂道和適易明卦兆通達陰陽春秋褒貶定其名分其數散於天下而設於中國者百家之學時或稱而道之注皆道古人之陳迹耳尚復不能常稱疏六經之迹散在區中風教所覃不過華壤百家諸子依稀五德時復稱説不能大同也天下大亂注用其迹而無統故也疏執守陳迹故不升平聖賢不明注能明其迹又未易也疏韜光晦迹道德不一注百家穿鑿疏法教多端天下多得一注各信其偏見而不能都舉疏宇內學人各滯所執偏得一術豈能弘通察焉以自好注夫聖人統百姓之大情而因為之制故百姓寄情於所統而自忘其好惡故與一世而得淡漠焉亂則反之人恣其近好家用典法故國異政家殊俗疏不能恬淡虛忘而每運心思察隨其倩好而為教方譬如耳目鼻口皆有所明不能相通疏夫目能視色不能聽聲鼻能聞香不能辨味各有所主故不能相通也猶百家衆技也皆有所長時有所用注所長不同不得常用疏夫六經五德百家諸書其於救世各有所長既未中道故時有所廢猶如鼻口有所不通也雖然不該不遍一曲之士也注故未足備任也疏雖復各有所長而未能該通周遍斯乃偏僻之士滯一之人非圓通合變者也判天地之美析萬物之理注各用其一曲故析判疏一曲之人各執偏僻雖著方術不能會道故分散兩儀淳和之美離析萬物虛通之理也察古人之全寡能備於天地之美稱神明之容注况一曲者乎疏觀察古昔全德之人猶能備兩儀之亭毒稱神明之容貌况一曲之人乎是故內聖外王之道暗而不明鬱而不發注全人難遇故也疏玄聖素王內也飛龍九五外也既而百家競起各私所見是非殽亂彼我紛紜遂使出處之道暗塞而不明鬱閉而不泄也天下之人各為其所欲焉以自為方悲夫百家往而不反必不合矣疏心之所欲執而為之即此欲心而為方術一往逐物曾不反本欲求合理其可得也既乖物情深可悲歎後世之學者不幸不見天地之純古人之大體注大體各歸根抱一則天地之純也疏幸遇也天地之純無為也古人大體朴素也言後世之人屬斯澆季不見無為之道不遇淳朴之世道術將為天下裂注裂分離也道術流弊遂各奮其方或以主物則物離性以從其上而性命喪矣疏裂分離也儒墨名法各馳驚各私所見咸率己情道術紛紜更相倍譎遂使蒼生措心無所分離一性實此之由也不侈於後世不靡於萬物不暉於數度注勤儉則瘁故不暉也疏侈奢也靡麗也暉明也教於後世不許奢華物我窮儉未嘗綺麗既乖物性教法不行故於先王典禮不得顯明於世也以繩墨自矯注矯厲也疏矯厲也用仁義為繩墨以勉厲其志行也而備世之急注勤而儉則財有餘故急有備疏世急者謂陽九百六水火之災也勤儉節用儲積財物以備世之凶災急難也古之道術有在於是者墨翟禽滑釐聞其風而悅之為之大過己之大循注不復度衆所能也疏循順也古之道術禹治洪水勤儉枯稿其迹尚在故言有在於是者姓禽字滑釐墨翟弟子也墨翟滑釐性好勤儉聞禹風教深悅愛之務為此道勤苦過甚適周己身自順未堪教被於人矣作為非樂命之曰節用生不歌死無服疏非樂節用是墨子二篇書名也生不歌故非樂死無服故節用謂無衣衾棺槨等資葬之服言其窮儉惜費也墨子泛愛兼利而非鬭注夫物不足則以鬭為是今墨子令百姓皆勤儉各有餘故以鬭為非也疏普汜兼愛利益羣生使各自足故無鬬爭以鬬爭為非也其道不怒注但自刻也疏克己勤儉故不怨怒於物也又好學而博不異注既自以為是則欲令萬物皆同乎己也疏墨子又好學博通墳典己既勤儉欲物同之也不與先王同毁古之禮樂注先王則恣其羣異然後同焉皆得而不知所以得也疏禮則節文隆殺樂則鍾鼓羽毛嫌其侈麗奢華所以毁棄不用黃帝有咸池堯有大章舜有大韶禹有大夏湯有大濩文王有辟雍之樂武王周公作武疏已上是五帝三王樂名也古之喪禮貴賤有儀上下有等天子棺槨七重諸侯五重大夫三重士再重疏自天王已下至于士庶皆有儀法悉有等級斯古之禮也今墨子獨生不歌死不服桐棺三寸而無椁以為法式以此教人恐不愛人以此自行固不愛己注皆以任力稱情為愛今以勤儉為法而為之大過雖欲饒天下更非所以為愛也疏師於禹迹勤儉過分上則乖於三王下則逆於萬民故生死勤窮不能養於外物形容枯稿未可愛於己身也末敗墨子道注但非道德疏末無也翟性尹老之意也雖然歌而非歌哭而非哭樂而非樂是果類乎注雖獨成墨而不類萬物之情疏夫生歌死哭人倫之常理凶哀吉樂世物之大情今乃反此故非徒類矣其生也勤其死也薄其道大觳注觳無潤也疏觳無潤也生則勤苦身心死則資葬儉薄其為道乾觳無潤也使人憂使人悲其行難為也恐其不可以為聖人之道注夫聖人之道悅以使民民得性之所樂則悅悅則天下無難矣疏夫聖人之道得百姓之歡心今乃使物憂悲行之難久又無潤澤故不可以教世也反天下之心天下不堪墨子雖獨能任奈天下何離於天下其去王也遠矣注王者必合天下之歡心而與物俱往也疏夫王天下者必須虛心忘已大順羣生今乃毁皇王之法反黔首之性其於主物不亦遠乎墨子稱道曰昔禹之湮洪水決江河而通四夷九州也名川三百支川三千小者無數疏湮塞也昔堯遭洪水命禹治水置塞隄防通決川瀆救百六之災以播種九穀也禹親自操橐耜而九雜天下之川疏橐盛土器也耜掘土具也禹捉耜掘地操橐負土躬自辛苦以導川原於是舟楫往來九州雜易又解古者字少以滌為蕩川為原凡經九度言九雜也又本作鳩者言鳩雜川谷以導江河也腓無肢脛無毛沐甚雨櫛疾風置萬國禹大聖也形勞天下也如此注墨子徒見禹之形勞耳未覩其性之適也疏通導百川安置萬國聞啓之泣無暇暫看三過其門不得看子賴驟雨而灑髮假疾風而梳頭勤苦執勞形容毁悴遂使腓股無肉膝脛無毛禹之道聖尚自艱辛况我凡庸而不勤苦使後世之墨者多以裘褐為衣以跂蹻為服日夜不休以自苦為極注謂自苦為盡理之法疏裘褐粗衣也木曰跂草曰蹻也後世墨者翟之弟子也裘褐跂蹻儉也日夜不休力也用此自苦為理之妙極也曰不能如此非禹之道也不足謂墨注非其時而守其道所以為墨也疏墨者禹之陳迹也故不能勤苦乖於禹道者不可謂之墨也相里勤之弟子五侯之徒南方之墨者苦獲己齒鄧陵子之屬俱誦墨經而倍譎不同相謂别墨注必其各守所見則所在無通故於墨之中又相與别也疏姓相里名勤南方之墨師也苦獲五侯之屬並是學墨人也譎異也俱誦墨經而更相倍異相呼為别墨以堅白同異之辨相訾以觭偶不仵之辭相應以巨子為聖人注巨子最能辨其所是以成其行疏訾毁也巨大也獨唱曰觭音竒對辨曰偶仵倫次也言鄧陵之徒然蹈墨術堅執堅白各炫己能合異為同析同為異或獨唱而寡和或賔主而往來以有無是非之辨相毁用無倫次之辭相應勤儉甚者號為聖人皆願為之尸注尸者主也冀得為其後世至今不決注為欲係巨子之業也疏咸願為師主庶傳業將來對爭勝負不能決定也墨翟禽滑釐之意則是注意在不侈靡而備世之急斯所以為是其行則非也注為之太過故也疏意在救物所以是也勤儉太過所以非也將使後世之墨者必自苦以腓無肢脛無毛相進而已矣疏進過也後世學徒執墨陳迹精苦自勵意在過人也亂之上也注亂莫大於逆物而傷性也治之下也注任衆適性為上今墨反之故為下疏墨子之道逆物傷性故是治化之下術荒亂之上首也雖然墨子真天下之好也注為其真好重聖賢不逆也但不可以教也捋求之不得也注無輩雖枯稿不舍也注所以為真好也疏字內好儉一人而已求其輩類竟不能得憔悴如此終不休廢率性真好非矯為也才士也夫注非有德也疏夫歎也逆物傷性誠非聖賢亦勤儉救世才能之士耳不纍於俗不飾於物不苟於人不忮於衆注忮逆也疏於俗無患纍於物無矯飾於人無苟且於衆無逆忮立於名行以養蒼生也願天下之安寧以活民命人我之養畢足而止注不敢望有餘也以此白心古之道術有在於是者疏每願宇內清夷濟活黔首物我儉素止分知足以此教迹清白其心古術有在相傳不替矣宋鈃尹文聞其風而悅之疏姓宋名鈃姓尹名文並齊宣王時人同遊稷下宋著書一篇尹著書二篇咸師於黔首而為之名也性與教合故聞風悅愛作為華山之冠以自表注華山上下均平疏華山其形如削上下均平而宋尹立志清高故為冠以表德之異接萬物以别宥為始注不欲令相犯錯疏宥區域也始本也置立名教應接人間而區别萬有用斯為本也語心之容命之曰心之行疏命名也發語吐辭每令心容萬物即名此容受而為心行以輀合歡以調海內注強以其道聏令合調令和也請欲置之以為主注二子請得若此者立以為物主也疏聏和也用斯名教和調四海庶令同合以得歡心置立此人以為物主也見侮不辱注其於以活民為急也救民之鬥禁攻寢兵救世之戰注所謂聏調疏寢息也防禁攻伐止息干戈意在調和不許戰鬥假令欺侮不以為辱意在救世所以然也以此周行天下上説下教雖天下不取強聒而不舍者也注聏調之理然也疏用斯教迹行化九州上説君王下教百姓雖復物不取用而強勸喧聒不自廢舍也故曰上下見厭而強見也注所謂不辱疏雖復物皆厭賤猶自強見勸他所謂被人輕侮而不耻辱也雖然其為人太多其自為太少注不因其自化而強以慰之則其功太重也疏夫達道聖賢感而後應先存諸己後存諸人今乃勤強勸人被厭不已當身枯稿豈非自為太少乎曰請欲固置五升之飯足矣注斯明自為之大少也先生恐不得飽弟子雖飢不忘天下注宋鈃尹文稱天下為先生自稱為弟子也疏宋尹稱黔首為先生自謂為弟子先物後己故也坦然之迹意在勤儉置五升之飯為一日之食唯恐百姓之飢不慮已身之餓不忘天下以此為心勤儉故養蒼生也用斯作法晝夜不息矣日夜不休曰我必得活哉注謂民亦當報已也圖傲乎救世之士哉注揮斥高大之貌疏圖傲高大之貌也言其強力忍垢接濟黎元雖未合道可謂救世之人也曰君子不為苛察注務寬恕也疏夫賢人君子恕己寬容終不用取捨之心苟且伺察於物也不以身假物注必自出其力也疏立身求己不必假物以成名也以為無益於天下者明之不如已也注所以為救世之士也疏已止也苦心勞形乖道逆物既無益於宇內明不如止而勿行以禁攻寢兵為外疏為利他外行也以情欲寡淺為內疏為自利內行也其大小精粗其行適至是而止注未能經虛涉曠疏自利利他內外兩行雖復大小有異精粗稍殊而立趨維綱不過適是而已矣公而不黨易而無私決然無主注各自任也疏公正而不阿黨平易而無偏私依理斷決無的主宰所謂法者其在於斯趣物而不兩注物得所趣故一疏意在理趣而於物無二也不顧於慮不謀於知於物無擇與之俱往疏依理用法不顧前後斷決正直無所懼慮亦不運知法外謀謨守法而往酷而無擇古之道術有在於是者疏自五帝已來有以法為政術之者故有可尚之迹而猶在乎世彭蒙田駢愼到聞其風而悅之疏姓彭名蒙姓田名駢姓愼名到並齊之隱士俱遊稷下各著書數篇性與法合故聞風悅愛也齊萬物以為首曰天能覆之而不能載之地能載之而不能覆之大道能包之而不能辨之知萬物皆有所可有所不可故曰選則不遍注都用乃周疏夫天覆地載各有所能大道包容未嘗辨説故知萬物有可不可隨其性分但當任之若欲揀選必不周遍也教則不至注性其性乃至道則無遺者矣疏萬物不同稟性各異以此教彼良非至極若率至玄道則物皆自得而無遺失矣是故愼到棄知去己而緣不得已泠汰於物以為道理注泠汰猶聽放也疏泠汰猶揀鍊也息慮棄知忘身去已機不得已感而後應揀鍊是非據法斷決愼到守此用為道理曰知不知將薄知而後鄰傷之者也注謂知力淺不知任其自然故薄之而後鄰傷焉疏鄰近也夫知則有所不知故薄淺其知雖復薄知而未能都忘故猶近傷於理謑髁無任而笑天下之尚賢也注不肯當其任而任夫衆人衆人各自能則無為橫復尚賢也疏謑髁不定貌也隨物順倩無的任用物各自得不尚賢能故笑之也縱脫無行而非天下之大聖注欲壤其迹使物不殉疏縱恣脫略不為仁義之德行忘遺陳迹故非宇內之聖人也椎拍輐斷與物宛轉注法家雖妙猶有椎拍故未泯合疏椎拍笞撻也輐斷行刑也宛轉變化也復能打拍刑戮而隨順時代故能與物變化而不固執之者也舍是與非苟可以免疏不固執是非苟且免於當世之為也不師知慮不知前後注不能知是之與非前之與後睧目恣性苟免當時之患也疏不師其成心不運用知慮亦不瞻前顧後矯性為情直舉宏網順物而已魏然而已矣注任性獨立疏魏然不動之貌也雖復處俗同塵而魏然獨立也推而後行曳而後往注所謂緣於不得已疏推而曳之緣不得已感而後應非先唱也若飄風之還若羽之旋若所石之隧全而無非動靜無過未嘗有罪疏磨磑也隧轉也如飄風之回如落羽之旋若磑石之轉三者無心故能全得是以無是無非無罪無過無情任物故致然也是何故疏假設疑問以顯其能夫無知之物無建己之患無用知之纍動靜不離於理是以終身無譽注患生於譽譽生於有建疏夫物莫不耽滯身己建立功名運用心知沒溺前境今磨磑等行藏任物動靜無心恆居妙理患纍斯絶是以終於天命無咎無譽也故曰至於若無知之物而已無用賢聖注唯聖人然後能去知與故循天之理故愚知處宜貴賤當位賢不肖襲情而云無用賢聖所以為不知道也夫塊不失道注欲令去知如土塊也亦為凡物云云皆無緣得道道非遍物也疏貴尚無知情同瓦石無用賢聖暗若夜遊遂如土塊名為得理愼到之惑其例如斯豪桀相與笑之曰愼到之道非生人之行而至死人之理注夫去知任性然後神明洞照所以為賢聖也而云土塊乃不失道人若土塊非死如何豪桀所以笑也疏夫得道賢聖照物無心德合二儀明齊三景今乃以土塊為道與死何殊既無神用非生人之行也是以英儒贍聞玄通豪桀知其乖理故嗤笑之適得怪焉注未合至道故為詭怪疏不合至道者適為其怪也田駢亦然學於彭蒙得不教焉注得自任之道也疏田駢愼到稟業彭蒙縱任放誕無所教也彭蒙之師曰古之道人至於莫之是莫之非而已矣注所謂齊萬物以為首其風窢然惡可而言注逆風所動之聲疏窢然迅速貌也古者道人虛懷忘我指為天地無復是非風教窢然隨時過去何可留其聖迹執而言之也常反人不聚觀注不順民望疏未能大順羣品而每逆忤人心亦不能致蒼生之稱其瞻望也而不免於魭斷注雖立法而魭斷無圭角也疏魭斷無圭角貌也雖復立法施化而未能大齊萬物故不免於魭斷也其所謂道非道而所言之韙不免於非注韙是也疏韙是也愼到所謂為道者非正道也所言為是者不是也故不免於非也彭蒙田駢愼到不知道注道無所不在而云土塊乃不失道所以為不知疏雖復習尚虛忘以無心為道而未得圓照故不知也雖然槩乎皆嘗有聞者也注但不至也疏彭蒙之類雖未體真而志尚知略有梗槩更相師祖皆有稟承非獨臆斷故嘗有聞之也以本為精以物為粗疏本無也物有也用無為妙道為精用有為事物為粗以有積為不足注寄之天下乃有餘也淡然獨與神明居古之道術有在於是者疏貪而儲積心常不足知足止分故清廉虛淡絶待獨立而精神道無不在自古有之也關尹老聃聞其風而悅之疏姓尹名喜字公度周平王時函谷關令故為之關尹也姓李名耳字伯陽外字老聃即尹喜之師老子也師資唱和與理相應故聞無為之風而悅愛之也建之以常無有注夫無有何所能建建之以常無有則明有物之自建也主之以太一注自天地以及羣物皆各自得而已不兼他飾斯非主之以太一邪疏太者廣大之名一以不二為稱言大道曠蕩無不制圍括囊萬有通而為一故謂之太一也建立言教每以凝常無物為宗悟其指歸以虛通太一為主斯蓋好儉以勞形質未可以教他人亦無勞敗其道術也以濡弱謙下為表以空虛不毁萬物為實疏表外也以柔弱謙和為權智外行以空惠圓明為實智內德也關尹曰在己無居注物來則應應而不藏故功隨物去疏成功弗居推功於物用此在己而修其身也形物自著注不自是而委萬物故物形各自彰著疏委任萬物不伐其功故彼之形性各自彰著也其動若水其靜若鏡其應若響注常無情也疏動若水流靜如縣鏡其逗機也似響應聲動靜無心神用故速芴乎若亡寂乎若清同焉者和得焉者失注常全者不知所得也疏芴忽也亡無也夫道非有非無不清不濁故暗忽似無體非無也靜寂如清也是已同靡清濁和蒼生之淺見也遂以此清虛無為而為德者斯喪道矣未嘗先人而常隨人疏和而不唱也老聃曰知其雄守其雌為天下溪知其白守其辱為天下谷注物各自守其分則靜默而已無雄白也夫雄白者非尚勝自顯者邪尚勝自顯豈非逐知過分以殆其生邪故古人不隨無崖之知守其分內而已故其性全其性全然後能及天下能及天下然後歸之如溪谷也疏夫英雄俊傑進躁所以夭年雌柔謙下退靜所以長久是以去彼顯白之榮華取此韜光之屈辱斯乃學道之樞機故為宇內之溪谷也而溪谷俱是川壑但溪小而谷大故重言耳人皆取先己獨取後注不與萬物爭鋒然後天下樂推而不厭故後其身疏俗人皆尚勝趨先大聖獨謙卑處後故道經云後其身而身先故也曰受天下之垢注雌辱後下之類皆物之所謂垢疏退身居後推物在先斯受垢辱之者人皆取實注唯知有之以為利未知無之以為用疏貪資貨也己獨取虛注守沖泊以待羣實疏守沖寂也無藏也故有餘注付萬物使各自守故不患其少疏藏積也知足守分散而不積故有餘巋然而有餘注獨立自足之謂疏巋然獨立之謂也言清廉潔己在物至稀獨有聖人無心而已其行身也徐而不費注因民所利而行之隨四時而成之常與道理俱故無疾無費也疏費損也夫達道之人無近恩惠食苟簡之田立不貸之圃從容間雅終不損己為於物耳以此為行而養其身也無為也而笑巧注巧者有為以傷神器之自成故無為者因其自生任其自成萬物各得自為蜘蛛猶能結網則人人自有所能矣無貴於工倕也疏率性而動淳朴無為嗤彼俗人機心巧偽也人皆求福己獨曲全注委順至理則常全故無所求福福已足曰苟免於咎注隨物故物不得咎也疏咎禍也俗人愚迷所為封執但知求福不能慮禍唯大聖虛懷委曲隨物保全生道且免災殃以深為根注理根於太初之極不可謂之淺也以約為紀注去甚泰也疏以深玄為德之本根以儉約為行之綱紀曰堅則毁矣注夫至順則雖金石無堅也忤逆則雖水氣無耎也至順則全忤逆則毁斯正理也鋭則挫矣注進躁無崖為鋭疏毁損堅剛之行挫止貪鋭之心故道經云挫其鋭常寬容於物注各守其分則自容有餘不削於人注全其性也疏退己謙和故寬容於物知足守分故不侵削於人也可謂至極關尹老聃乎古之博大真人哉疏關尹老子古之大聖窮微極妙冥真合道教則浩蕩而宏博理則廣大而深玄莊子庶幾故有斯嘆也寂漠無形變化無常注隨物也疏妙本無形故寂漠也迹隨物化故無常也死與生與天地並與神明往與注任化也疏以死生為晝夜故將二儀並也隨造化而轉變故共神明往矣芒乎何之忽乎何適注無意趣也疏委自然而變化隨芒忽而敖遊既無情於去取亦任命而之適萬物畢羅莫足以歸注故都任置疏包羅庶物囊括宇內未嘗離道何處歸根古之道術有在於是者莊周聞其風而悅之以謬悠之説荒唐之言無端崖之辭時恣縱而不儻不以觭見之也注不急欲使物見其意疏謬虛也悠遠也荒唐廣大也恣縱猶放任也觭不偶也而莊子應世挺生冥契玄道故能致虛遠深宏之説無涯無緒之談隨時放任而不偏黨和氣混俗未嘗觭介也以天下為沉濁不可與莊語注纍於形名以莊語為狂而不信故不與也疏莊語猶大言也宇內黔黎沉滯暗濁咸溺於小辨未可與説大言也以巵言為曼衍以重言為真以寓言為廣疏巵言不定也曼衍無心也重尊老也寓寄也夫巵滿則傾巵空則仰故以巵器以況至言而蓍艾之談體多真實寄之他人其理深廣則鴻蒙雲將海若之徒是也獨與天地精神往來而不敖倪於萬物注其言通至理正常萬物之性命疏敖倪猶驕矜也抱真精之智運不測之神寄迹域中生來死往謙和順物固不驕矜不譴是非注己無是非故恣物而行以與世俗處注形羣於物疏譴責也是非無主不可窮責故能混世揚波處於塵俗也其書雖瑰瑋而連犿無傷也注還與物合故無傷也疏瑰瑋宏壯也連犿和混也莊子之書其旨高遠言猶涉俗故合物而無傷其辭雖參差而諔詭可觀注不唯應當時之務故參差疏參差者或虛或實不一其言也諔詭猶滑稽也雖寓言託事時代參差而諔詭滑稽甚可觀閲也彼其充實不可以已注多所有也疏已止也彼所著書辭清理遠括囊無實富贍無窮故不止極也上與造物者遊而下與外死生無終始者為友疏乘變化而遨遊交自然而為友故能混同生死冥一始終本妙迹粗故言下下其於本也弘大而闢深閎而肆其於宗也可謂調適而上遂矣疏闢開也弘大也閎亦大也肆申也遂達也言至本深大申暢開通真宗調適上達玄道也雖然其應於化而解於物也疏言此莊書雖復諔詭而應機變化解釋物情莫之先也其理不竭其來不蛻疏蛻脫捨也妙理虛玄應無窮竭而機來感己終不蛻而捨之也芒乎昧乎未之盡者注莊子通以平意説己與説他人無異也案其辭明為汪汪然禹拜昌言亦何嫌乎此也疏芒昧猶窈冥也言莊子之書窈窕深遠芒昧恍忽視聽無辨若以言象徵求未窮其趣也惠施多方其書五車其道舛駁其言也不中疏舛差殊也駁雜揉也既多方術書有五車道理殊雜而不純言辭雖辨而無當也歷物之意疏心遊萬物歷覽辨之曰至大無外謂之大一至小無內謂之小一疏囊括無外謂之大也入於無間謂之小也雖復大小異名理歸無二故曰一也無厚不可積也其大千里疏理既精微搏之不得妙絶形色何厚之有故不可積而纍之也非但不有亦乃不無有無相生故大千里也天與地卑山與澤平疏夫物倩見者則天高而地卑山崇而澤下今以道觀之則山澤均平天地一致矣齊物云莫大於秋豪而太山為小即其義也日方中方睨物方生方死疏睨側視也居西者呼為中處東者呼為側則無中側也猶生死也生者以死為死死者以生為死日既中側不殊物亦死生無異也大同而與小同異此之謂小同異疏物情分别見有同異此小同異也萬物畢同畢異此之謂大同異疏死生交謝寒暑遞遷形性不同體理無異此大同異也南方無窮而有窮疏知四方無窮會有物也形不盡形色不盡色形與色相盡也知不窮知物不窮物窮與物相盡也只為無厚故不可積也獨言南方舉一隅三可知也今日適越而昔來疏夫以今望昔所以有今以昔望今所以有昔而今自非今何能有昔昔自非昔豈有今哉既其無昔無今故曰今日適越而昔來可也連環可解也疏夫環之相貫貫於空處不貫於環也是以兩環貫空不相涉入各自通轉故可解者也我知天下之中央燕之北越之南是也疏夫燕越二邦相去迢遞人情封執各是其方故燕北越南可為天中者也泛愛萬物天地一體也疏萬物與我為一故泛愛之二儀與我並生故同體也惠施以此為大觀於天下而曉辨者疏惠施用斯道理自以為最觀照天下曉示辨人也天下之辨者相與樂之疏愛好既同情性相感故域中辨士樂而學之也卵有毛疏有無二名咸歸虛寂俗倩執見謂卵無毛名謂既空有毛可也雞三足疏數之所起自虛從無從無適有三名斯立是知二三竟無實體故雞之二足可名為三雞足既然在物可見者也郢有天下疏郢楚都也在江陵北七十里夫物之所居皆有四方是以燕北越南可謂天中故楚都於郢地方千里何妨即天下者邪犬可以為羊疏名無得物之功物無應名之實名實不定可呼犬為羊鄭人謂玉未理者為璞周人謂鼠未臘者亦曰璞故形在於物名在於人也馬有卵疏夫胎卵濕化人情分别以道觀者未始不同鳥卵既有毛獸胎何妨名卵也丁子有尾疏楚人呼蝦蟆為丁子也夫蝦蟆無尾天下共知此蓋物情非關至理以道觀之者無體非無非無尚得稱無何妨非有可名尾也火不熱疏火熱水冷起自物情據理觀之非冷非熱何者南方有食火之獸聖人則入水不濡以此而言固非冷熱也又譬杖加於體而痛發於人人痛杖不痛亦猶火加體而熱發於人人熱火不熱也山出口疏山本無名山名出自人口在山既爾萬法皆然也輪不蹍地疏夫車之運動輪轉不停前迹已過後塗未至除却前後更無踞時是以輪雖運行竟不踞於地也猶肇論云旋嵐偃嶽而常靜江河競注而不流野馬飄鼓而不動日月歷天而不周復何怪哉復何怪哉目不見疏夫目之見物必待於緣緣既體空故知目不能見之者也指不至至不絶疏夫以指指物而非指故指不至也無目指得物故至不絶者也龜長於蛇疏夫長短相形則無長無短謂蛇長龜短乃是物之滯情今欲遣此昏迷故云龜長於蛇也矩不方規不可以為圓疏夫規圓矩方其來久矣而名謂不定方圓無實故不可也鑿不圍枘疏鑿者孔也枘者內孔中之木也然枘入鑿中木穿空處不關涉故不能圍此猶連環可解義也飛鳥之景未嘗動也疏過去已滅未來未至過未之外更無飛時唯鳥與影嶷然不動是知世間即體皆寂故論云然則四象風馳璇璣電卷得意豪微雖遷不轉所謂物不遷者也鏃矢之疾而有不行不止之時疏鏃矢專也夫幾發雖速不離三時無異輪行何殊鳥影既不踞不動鏃矢豈有止有行亦如利刀割三條絲其中亦有過去未來見在之者也狗非犬疏狗之與犬一物兩名名字既空故狗非犬也狗犬同實異名名實合則彼謂狗此謂犬也名實離則彼謂狗異於犬也墨子曰狗犬也然狗非犬也黃馬驪牛三疏夫形非色色乃非形故一馬一牛以之為二添馬之色而可成三曰黃馬曰驪牛曰黃驪形為三也亦猶一與言為二二與一為三者也白狗黑疏夫名謂不實形色皆空欲反執情故指白為黑也孤駒未嘗有母一尺之捶日取其半萬世不竭疏捶杖也取折也問曰一尺之杖今朝折半逮乎後夕五寸存焉兩日之間捶當窮盡此事顯著豈不竭之義乎答曰夫名以應體體以應名故以名求物物不能隱也是以執名責實名曰尺捶每於尺取何有窮時若於五寸折之便虧名理乃曰半尺豈是一尺之義邪辨者以此與惠施相應終身無窮桓團公孫龍辨者之徒疏姓桓名團姓公孫名龍並趙人皆辨士也客遊平原君之家而公孫龍著守白論見行於世用此上來尺捶言更相應和以斯卒歲無復窮已飾人之心易人之意疏縱兹玄辨雕飾人心用此雅辭改易人意能勝人之口不能服人之心辨者之囿也疏辨過於物故能勝人之口言未當理故不服人之心而辨者之徒用為苑囿又解囿域也惠施之言未宜於理所詮限域莫出於斯者也惠施曰以其知與人之辨特與天下之辨者為怪此其柢也疏特獨也字亦有作將者怪異也柢體也惠子曰用分别之知共人評之獨將一己與天地殊異雖復姦狡萬端而本體莫過於此然惠施之口談自以為最賢疏然猶如此也言惠施解理亞乎莊生加之口談最賢於衆豈似諸人直辨而已曰天地其莊乎施存雄而五術疏壯大也術道也言天地與我並生不足稱大意在雄俊超世過人既不謙柔故無真道而言其壯者猶獨壯也南方有倚人焉曰黃繚問天地所以不墜不陷風雨雷霆之故疏住在南方姓黃名繚不偶於俗羈異於人遊方之外賢士者也聞惠施聰辨故來致問問二儀長久風雨雷霆動靜所發起何端緒惠施不辭而應不慮而對疏意氣雄俊言辨縱橫是以未辭謝而應機不思慮而對答者也遍為萬物説説而不休多而無已猶以為寡益之以怪疏遍為陳説萬物根由並辨二儀雷霆之故不知休止猶嫌簡約故加竒怪以騁其能者也以反人為實而欲以勝人為名是以與衆不適也疏以反人情曰為實道每欲超勝群物出衆為心意在聲名故不能和適於世者也弱於德強於物其塗隩矣疏塗道也德術甚弱於物極強自言道理異常深隩也由天地之道觀惠施之能其猶一蚊一虻之勞者也其於物也何庸疏由從也庸用也從二儀生成之道觀惠施化物之能無異乎蚊虻飛空鼓翅喧擾徒自勞倦曾何足云益物之言便成無用者也夫充一尚可曰愈貴道幾矣疏幾近也夫惠施之辨詮理不弘於萬物之中尚可充一數而已而欲鋭情貴道飾意近真慤而論之良未可也惠施不能以此自寧散於萬物而不厭卒以善辨為名疏卒終也不能用此玄道以自安寧而乃散亂精神高談萬物竟無道存目擊卒有辨者之名耳惜乎惠施之才駘溢而不得逐萬物而不反是窮響以聲形與影競走也悲夫注昔吾未覽莊子嘗聞論者爭夫尺捶連環之意而皆云莊生之言遂以莊生為辨者之流案此篇較評諸子至於此章則曰其道舛駁其言不中乃知道聽塗説之傷實也吾意亦謂無經國體致真所謂無用之談也然膏粱之子均之戲豫或倦於典言而能辨名析理以宣其氣以係其思流於後世使性不邪淫不猶賢於博奕者乎故存而不論以貽好事也疏駘放也痛惜惠施有才無道放蕩辭辨不得真原馳逐萬物之末不能反歸於妙本夫得理莫若忘知反本無過息辨今惠子役心術求道縱河瀉以素真亦何異乎欲逃響以振聲將避影而疾走者也洪才若此深可悲傷也南華真經注疏卷之三十五
