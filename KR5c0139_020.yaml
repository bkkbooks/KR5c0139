body:
  text: 南華真經注疏卷之二十善六河南郭象注西華法師成玄英疏外篇至樂第十八天下有至樂無有哉有可以活身者無有哉注忘歡而後樂足樂足而後身存將以為有樂邪而至樂無歡將以為無樂邪而身以存而無憂疏此假問之辭也至極也樂歡也言寰宇之中頗有至極歡樂可以養活身命者無有哉今奚為奚據奚避奚處奚就奚去奚樂奚惡注擇此八者莫足以活身唯無擇而任其所遇乃全耳疏奚何也今欲行至樂之道以活身者當何所為造何所依據何所避諱何所安處何所從就何所捨去何所歡樂何所嫌惡而合至樂之道乎此假設疑問下自曠顯夫天下之所尊者富貴壽善也所樂者身安厚味美服好色音聲也疏天下所尊重者無過富足財寶貴盛榮華壽命遐長善名令譽所歡樂者滋味爽口麗服榮身玄黃悅目宫商娛耳若得之者則為據處就樂所下者貧賤夭惡也疏貧窮卑賤夭折惡名世間以為下也所苦者身不得安逸口不得厚味形不得美服目不得好色耳不得音聲若不得者則大憂以懼其為形也亦愚哉注凡此失之無傷於形而得之有損於性今反以不得為憂故愚疏凡此上事無益於人而流徙之俗以不得為苦既不適情遂憂愁懼慮如此修為形體豈不甚愚癡夫富者苦身疾作多積財而不得盡用其為形也亦外矣注內而形者知足而已疏夫富豪之家勞神苦思馳騁身力多聚錢財積而不散用何能盡內其形者豈其如斯也夫貴者夜以繼日思慮善否其為形也亦疏矣注故親其形者自得於身中而已疏夫位高慮遠祿重憂深是以晝夜思量獻可替不勞形怵心無時暫息其為形也不亦疏乎人之生也與憂俱生壽者惛惛久憂不死何之苦也其為形也亦遠矣注夫遺生然後能忘憂忘憂而後生可樂生可樂而後形是我有富是我物貴是我榮也疏夫禀氣頑癡生而憂戚雖復壽考而精神惛暗久憂不死翻成苦哉如此為形豈非疏遠其於至樂不亦謬乎烈士為天下見善矣未足以活身吾未知善之誠善邪誠不善邪若以為善矣不足活身以為不善矣足以活人注善則過當故不周濟疏誠實也夫忠烈之士忘身徇節名傳今古見善世間然未知此善是有虛實善若實也不足以活身命善必虛也不應養活蒼生賴諫諍而太平此足以活人也為忠烈而被戮此不足以活身也故曰忠諫不聽蹲循勿爭注唯中庸之德為然疏蹲循猶順從也夫為臣之法君若無道宜以忠誠之心匡諫君若不聽即須蹲循休止若逆鱗强諍必遭刑戮也故夫子胥爭之以殘其形不爭名亦不成誠有善無有哉注故當緣督以為經也疏吳王夫差荒淫無道子胥忠諫以遭殘戮若不諫諍忠名不成故諫與不諫善與不善誠未可定矣今俗之所為與其所樂吾又未知樂之果樂邪果不樂邪疏果未定也流俗以貪染為心以色聲為樂未知此樂决定樂邪而倒置之心未可謂信也吾觀夫俗之所樂舉群趣者誣誙然如將不得已注舉群趣其所樂乃不避死也疏誙誙趣死貌已止也舉世之人群聚趣競所歡樂者無五塵貪求至死未能心息之也而皆曰樂者吾未之樂也亦未之不樂也注無懷而恣物耳疏而世俗之人皆用色聲為上樂而莊生體道忘淡故不見其樂亦不見其不樂也果有樂無有哉吾以無為誠樂矣注夫無為之樂無憂而已疏以色聲為樂者未知决定有此樂不若以莊生言之用虛淡無為為至實之樂又俗之所大苦也故曰至樂無樂至譽無譽注俗以鏗鎗為樂美善為譽疏俗以富貴榮華鏗金鎗玉為上樂用美言佞善為令譽以無為恬淡寂寞虛夷為憂苦故知至樂以無樂為樂至譽以無譽為譽也天下是非果未可定也雖然無為可以定是非注我無為而任天下之是非是非者各自任則定矣疏夫有為執滯執是競非而是非無主故不可定矣無為虛淡忘是忘非既無是非而是非定者也至樂活身唯無為幾存注百姓足則吾身近乎存也疏幾近也存在也夫至樂無樂常適無憂可以養活身心終其天命唯彼無為近在其中者矣請嘗試言之天無為以之清地無為以之寧注皆自清寧耳非為之所得故兩無為相合萬物皆化注不為而自合故皆化若有意乎為之則有時而滯也疏天無心為清而自然清虛地無心為寧而自然寧靜故天地無為兩儀相合升降災福泰而萬物化生若有心為之即不能已芒乎芴乎而無從出乎注皆自出耳未有為而出之也芴乎芒乎而無有象乎注無有為之象疏夫二儀造化生物無心恍惚芒昧參差難測芴其從出莫知所由視其形容竟無象貌覆論芒芴互其文耳萬物職職皆從無為殖注皆自殖耳疏職職繁多貌也夫春生夏長庶物繁多孰使其然皆自耳尋其源流從無為種植既無為種植豈有為耶故曰天地無為也而無不為也注若有為則有不濟也人也孰能得無為哉注得無為則無樂而樂至矣疏孰誰也夫天地清寧無為虛廓而升降生化而無不為也凡俗之人心靈暗昧耽滯有欲誰能得此無為哉言能之者乃至務也若得之者便是德合二儀冥符至樂也莊子妻死惠子弔之疏莊惠二子為淡水素交既有死亡理須往弔之莊子則方箕踞鼓盆而歌疏箕者垂兩腳如簸箕形也盆甕瓦𦈢也莊子知生死之不二達哀樂之為一是以妻亡不哭鼓甕而歌垂腳箕踞敖然自樂惠子曰與人居長子老身死不哭亦足矣又鼓盆而歌不亦甚乎疏共妻居處長養子孫妻老死亡竟不哀哭乖於人理足是無情加之鼓歌一何太甚也莊子曰不然是其始死也我獨何能無槩然疏然猶如是也世人皆欣生惡死哀死樂生故我初聞死之時何能獨無概然驚歎也察其始而本無生非徒無生也而本無形非徒無形也而本無氣疏莊子聖人妙達相本故覩察初始本自無生未生之前亦無形質形質之前亦復無氣從無生有假合而成是知此身不足惜也雜乎芒芴之間變而有氣氣變而有形形變而有生今又變而之死是相與為春秋冬夏四時行也疏大道在恍惚之內造化芒昧之中和雜清濁變成陰陽二氣二氣凝結變而有形形既成就變而生育且從無出有變而為生自有還無變而為死而生來死往變化循環亦猶春秋冬夏四時代序是以達人觀察何哀樂之有哉人且偃然寢於巨室而我噭噭然隨而哭之自以為不通乎命故止也注未明而槩已達而止斯所以誨有情者將令推至理以遣纍也疏偃然安息貌也巨室謂天地之間也且夫息我以死卧於天地之間譬彼炎凉何得隨而哀慟自覺不通天命故止哭而鼓甕也支離叔與滑介叔觀於冥伯之丘崑崙之虛黃帝之所休疏支離謂支體離析以明忘形也滑介猶骨稽也謂骨稽挻特以忘智也欲顯叔世澆訛故號為叔也冥暗也伯長崑崙人身也言神智杳冥堪為物長崑崙玄遠近在人身丘墟不平俯同世俗而黃帝聖君光臨區字休心息智寄在凡庸是知至道幽玄其則非遠故託二叔以彰其義也俄而柳生其左肘其意蹶蹶然惡之疏蹶蹶驚動貌柳生者易生之木木者棺槨之象此是將死之徵也二叔遊於崑崙觀於變化俄頃之間左臂生柳蹙然驚動似欲惡之也支離叔曰子惡之乎疏相與觀化貴在虛忘蹶然驚動似有嫌惡也滑介叔曰亡豫何惡疏亡無也觀化之理理在忘懷我本無身何惡之有也生者假借也假之而生生者塵垢也疏夫以二氣五行四支百體假合結聚借而成身是知生者塵垢穢纍非真物者也死生為書夜疏以生為晝以死為夜故天不能無晝夜人焉能無死生且吾與子觀化而化及我我又何惡焉注斯皆先示有情然後尋至理以遣之若云我本無情故能無憂則夫有情者遂自絶於遠曠之域而迷困於憂樂之境矣疏我與子同遊觀於變化化而及我斯乃是當待終有何嫌惡既冥死生之變故合至樂也莊子之楚見空闕髏髐然有形擊以馬捶因而問之疏之過也髐然無潤澤也擊打擊也馬捶猶馬杖也莊子適楚遇見髑髏空骨無肉朽骸無潤遂以馬杖打擊因而問之欲明死生之理均齊故寄髑髏寓言答問也曰夫子貪生失理而為此乎疏夫子貪欲資生失於道理致使夭折性命而骸骨為此乎將子有亡國之事斧鉞之誅而為此乎疏為當有亡國征戰之事行陳斧鉞之誅而為此乎將子有不善之行愧遺父母妻子之醜而為此乎疏或行姦盜不善之行世問共惡人倫所恥遺愧父母羞見妻孥慚醜而死於此乎將子有凍餒之患而為此乎疏餒餓也或遊學他鄉衣糧乏盡患於飢凍死於此乎將子之春秋故及此乎疏春秋猶年紀也將子有黃髮之年耆艾之壽終於天命卒於此乎於是語卒援髑髏枕而卧疏卒終也援引也初逢枯骨援馬杖而擊之問語既終引髑髏而高枕也夜半髑髏見夢曰子之談者似辨士諸子所言皆生人之纍也死則無此矣子欲聞死之說乎疏覩於此子所言皆是生人之纍患欲論死道由無此憂虞子是生人頗欲聞死人之說乎莊子睡中感於此夢也莊子曰然疏然許髑髏欲其死說髑髏曰死無君於上無臣於下亦無四時之事從然以天地為春秋雖南面王樂不能過也疏夫死者魂氣升於天骨肉歸乎土既無四時炎凉之事寧有君臣上下之纍乎從容不復死生故與二儀同其年壽雖南面稱孤王侯之樂亦不能過也莊子不信曰吾使司命復生子形為子骨肉肌膚反子父母妻子閭里知識子欲之乎疏莊子不信髑髏之言更說生人之事欲使司命之鬼復骨肉反妻子歸閭里頗欲之乎髑髏深矉蹙頞曰吾安能棄南面王樂而復為人間之勞乎注舊說云莊子樂死惡生斯說謬矣若然何謂齊乎所謂齊者生時安生死時安死生死之情既齊則無為當生而憂死耳此莊生之㫖也疏深矉蹙頞憂愁之貌也既聞司命復形反於鄉里於是憂愁矉蹙不用此言誰能復為生之勞而棄於南面王之樂耶顔淵東之齊孔子有憂色子貢下席而問曰小子敢問回東之齊夫子有憂色何耶疏顔回自西之東從魯往於齊國欲將三皇五帝之道以教齊侯尼父恐不逗機故有憂色於是子貢避席自稱小子敢問夫子憂色所由孔子曰善哉汝問昔者管子有言丘甚善之曰褚小者不可以懷大綆短者不可以汲深疏褚容受也懷包藏也綆罐索也夫容小之器不可以藏大物短促之繩不可以引深井此言出管子之書孔丘善之故引以為譬也已夫若是者以為命有所成而形有所適也夫不可損益注故當任之而已疏夫人禀於天命愚智各有所成受形造化情好咸著所適方之鳧鶴不可盜損故當任之而無不當也吾恐回與齊侯言堯舜黃帝之道而重以燧人神農之言彼將內求於己而不得不得則惑人惑則死注內求不得將求於外舍內求外非惑如何疏黃帝堯舜五帝也燧人神農三皇也恐顔回將三皇五帝之道以說齊侯既而步驟殊時澆淳異世執持聖迹不逗機緣齊侯聞此大言未能領悟求於己身不能得解脫不得解悟則心生疑惑於是忿其勝己必殺顔回且汝獨不聞邪昔者海鳥止於魯郊魯侯御而觴之于廟奏九韶以為樂具太牢以為膳疏郭外曰郊御迎也九韶舜樂名也太牢牛羊豕也昔有海鳥名曰爰居形容極大頭高八尺避風而至止魯東郊實是凡鳥而妄以為瑞臧文仲禮之故有不智之名也於是奏韶樂設太牢迎於太廟之中而觴宴之也而臧文仲用為神鳥非關魯侯但飲鳥於魯廟之中故言魯侯觴之也鳥乃眩視憂悲不敢食一臠不敢飲一杯三日而死疏夫韶樂太牢乃美乃善而施之爰居非所餐聽故目眩心悲數日而死亦猶三皇五帝其道高遠施之齊侯非所聞之也此以己養養鳥也非以鳥養養鳥也疏韶樂牢觴是養人之具非養鳥之物也亦猶顔回以己之學術以教於齊侯非所樂也夫以鳥養養鳥者宜棲之深林遊之壇陸浮之江湖食之鰌䱔隨行列而止委蛇而處疏壇陸湖渚也鰌泥鰌也䱔白魚子也逶迤寬舒自得也夫養鳥之法宜棲茂林放洲渚食魚子浮江湖逐群飛自間放此以鳥養之法養鳥者也亦猶齊侯率己所行逍遙自得無所羡也彼唯人言之惡聞奚以夫譊譊為乎咸池九韶之樂張之洞庭之野鳥聞之而飛獸聞之而走魚聞之而下入人卒聞之相與還而觀之疏奚何也譊喧聒也咸池堯樂也洞庭之野謂天地之間也還繞也咸池九韶唯人愛好魚鳥諸物惡聞其聲愛好則繞而觀之惡聞則高飛深入既有欣有惡八音何用為乎魚處水而生人處水而死彼必相與異其好惡故異也疏魚好水而惡陸人好陸而惡水彼之人魚禀性各别好惡不同故死生斯異豈唯二種萬物皆然也故先聖不一其能不同其事注各隨其情疏先古聖人因循物性使人如器不一其能各稱其情不同其事也是知將三皇之道以說齊侯者深不可也名止於實義設於適是之謂條達而福持注實而適故條達性常得故福持疏夫因實立名而名以召實故名止於實不用實外求名而義者宜也隨宜施設適性而已不用捨己效人如是之道可謂條理通達而福德扶持者矣列子行食於道從見百歲髑髏攓蓬而指之曰唯豫與汝知而未嘗死未嘗生也注各以所遇為樂疏攓技也從傍也禦寇困於行李食於道傍仍見枯朽髑髏形色似久言百歲者舉其大數髑髏隱在蓬草之下遂拔却蓬草因而指麾與言然髑髏以生為死以死為生列子則以生為生以死為死生死各執一方未足為定故未嘗死未嘗生也汝果養乎豫果歡乎注歡養之實未有定在疏汝欣冥冥冥冥果有怡養乎我悅人倫人倫决可歡乎適情所遇未可定之者也種有幾注變化種數不可勝計疏陰陽造物轉變無窮論其種類不可勝計之也得水則為繼疏潤氣生物從無生有故更相繼續也得水土之際則為蛙蠙之衣疏蛙蠙之衣青苔也在水中若張綿俗謂之蝦蟆之衣也生於陵屯則為陵舄疏屯阜也陵舄車前草也既生於陵阜高陸即變為車前也陵舄得鬱棲疏鬱棲糞壤也陵舄既老變為糞土也則為烏足疏糞壤復化生烏足之草根也烏足之根為蠐螬其葉為胡蝶胡蝶胥也疏蠐螬䗶蟲也胥胡蝶名也變化無恆故根為蠐螬而葉為胡蝶也化而為蟲生於竈下其狀若脫其名為鴝掇疏鴝掇蟲名也胥得熱氣故作此蟲狀如新脫皮毛形容雅净也鴝掇千日為鳥其名為乾餘骨乾餘骨之沫為斯彌疏乾餘骨鳥口中之沫化為斯彌之蟲斯彌為食醯疏酢罋中蠛蠓亦為之醯雞也頤輅生乎食醯黃軦生乎九猷疏軦亦蟲瞀芮生乎腐蠸疏並蟲名也腐蠸螢火蟲也亦言是粉鼠蟲羊奚比乎不箰久竹疏並草名也生青寧疏羊奚比合於久竹而生青寧之蟲也青寧生程疏亦蟲名也程生馬馬生人疏未詳所據人又反入於機萬物皆出於機皆入於機注此言一氣而萬形有變化而無死生也疏機者發動所謂造化也造化者無物也人既從無生有又反入歸無也豈唯在人萬物皆爾或無識變成有識有識變為無識或無識變為無識或有識變為有識千萬變化未始有極也而出入機變謂之死生既知變化無窮寧復欣生惡死體斯趣㫖謂之至樂也南華真經注疏卷之二十
