body:
  text: 南華真經注疏卷之二十八尺二河南郭象注唐西華法師成玄英疏雜篇外物第二十六外物不可必疏域心執固謂必然也夫人間事物參差萬緒惟安大順則所在虛通若其逆物執情必遭禍害故龍逄誅比干戮箕子狂惡來死桀紂亡注善惡之所致俱不可必也疏龍逄比干外篇已解箕子殷紂之庶叔也忠諫不從懼紂之害所以徉狂亦終不免殺戮惡來紂之佞臣畢志從紂所以俱亡人主莫不欲其臣之忠而忠未必信故伍員流于江萇弘死于蜀藏其血三年而化為碧注精誠之至疏碧玉也子胥萇弘外篇已釋而言流江者忠諫夫差夫差殺之取馬皮作袋為鴟鳥之形盛伍員尸浮之江水故云流于江萇弘遭譖被放歸蜀自恨忠而遭譖遂刳腸而死蜀人感之以匱盛其血三年而化為碧玉乃精誠之至也人親莫不欲其子之孝而孝未必愛故孝己憂而曾參悲注是以至人無心而應物唯變所適疏孝已殷高宗之子也遭後母之難憂苦而死曾參至孝而父母憎之常遭父母打鄰乎死地故悲泣也夫父子天性君臣義重而至忠至孝尚有不愛不知况乎世事萬塗而可必固者唯當忠懷物我適可全身遠害與木相摩則然金與火相守則流疏夫木生火火尅金五行之氣自然之理故木摩木則火生火守金則金爍是以誠心執固而必於外物者爍滅之敗陰陽錯行則天地大絃於是乎有雷有霆水中有火乃焚大槐注所謂錯行疏水中有火電也乃焚大槐霹靂也陰陽錯亂不順五行故雷霆擊怒驚駭萬物人乖和氣敗損亦然有甚憂兩陷無所逃注苟不能忘形則隨形所遭而陷於憂樂左右無宜也疏不能虛志而忘形域心執固是以馳情於榮辱二境陷溺於憂樂二邊無處逃形螴蜳不得成注矜之愈重則所在為難莫知所守故不得成疏螴蜳猶怵惕也不能忘情忘懷矜惜故雖勞形怵慮而卒無所成心若縣於天地之間注所希跂者高而闊也疏心徇有為高而且遠馳情逐物通乎宇宙慰睯沈屯注非情夷平暢也疏遂心則慰喜乖意則昏悶遇境則沈溺觸物則屯邅既非清夷豈是平暢利害相摩生火甚多注內熱故也疏夫利者必有害蟬鵲是也纓纏於利害之間內心恆熱故生火多矣衆人焚和注衆人而遺利則和若利害存懷則其和焚也疏焚燒也衆人猶俗人也不能守分無為而每馳心利害內熱如火故燒焰中和之性月固不勝火注大而暗則多纍小而明則知分疏月雖大而光圓火雖小而明照諭志大而多貪不如小心守分於是乎有僓然而道盡注唯僓然無矜遺形自得道乃盡也疏僓然放任不矜之貌忘情利害淡爾不矜虛玄道理乃盡於此也莊周家貧故往貸粟於監河侯疏監河侯魏文侯也莊子高素不事有為家業既貧故來貸粟監河侯曰諾我將得邑金將貸子三百金可乎疏諾許也銅鐵之類皆名為金此非黃金也待我歲終得百姓租賦封邑之物乃貸子莊周忿然作色曰周昨來有中道而呼者周顧視車轍中有鮒魚焉周問之曰鮒魚來子何為者邪對曰我東海之波臣也君豈有斗升之水而活我哉疏波浪小臣困於車轍君頗有水以相救乎周曰諾我且南遊吳越之王激西江之水而迎子可乎疏西江蜀江也江水至多北流者衆惟蜀江從西來故謂之西江是也鮒魚忿然作色曰吾失我常與我無所處吾得斗升之水然活耳君乃言此曾不如早索我於枯魚之肆注此言當理無小苟其不當雖大何益疏索求肆市常行海水鮒魚波浪失於常處升斗之水可以全生乃激西江非所宜也既其不救斯須不如求我於乾魚之肆此言事無大小時有機宜苟不逗機雖大無益也任公子為大鉤巨緇五十犗以為餌疏任國名任國之公子巨大也緇黑繩也犗犍牛也餌鉤頭肉既為巨鉤故用大繩縣五十頭牛以為餌蹲乎會稽投竿東海疏號為巨鉤期年不得魚蹲踞也踞坐也踞其山旦旦而釣期年不得魚已而大魚食之牽巨鉤錎沒而下驚揚而奮鬐白波若山海水震蕩聲侔鬼神憚赫千里疏期年之外有大魚吞鉤於是牽鉤陷沒馳驚而下揚其頭尾奮其鱗鬐遂使白波如山洪波際日任公子得若魚離而臘之自浙河以東蒼梧已北莫不厭若魚者疏若魚海神也浙浙江也蒼梧山名在嶺南舜葬之所海神肉多分為脯臘自五嶺已北三湘已東皆厭之已而後世輇才諷説之徒皆驚而相告也疏代末季葉才智輕浮諷誦詞説不敦玄道聞得大魚驚而相語輕字有作輇字者輇量也夫揭竿纍趨灌瀆守鯢鮒其於得大魚難矣疏纍細繩也鯢鮒小魚也擔揭細小之竿繩趨走溉灌之溝瀆適得鯢鮒難獲大魚也飾小説以干縣令其於大達亦遠矣疏千求也縣高也夫修飾小行矜持言説以求高名令問者必不能大通於至道字作縣者古懸字多不著心是以未嘗聞任氏之風俗其不可與經於世亦遠矣注此言志趣不同故經世之宜小大各有所適也疏人間世道夷險不常自非懷豁虛通未可以治亂若矜名飾行去之遠矣儒以詩禮發冢大儒臚傳曰東方作矣事之何若疏大儒碩儒謂大博士從上傳語告下曰臚臚傳也東方作謂天曙曰先起儒弟子發冢為盜恐天時曙故催告之問其如何將事小儒曰未解裙襦口中有珠疏小儒弟子也死人裙衣猶未解脫捫其口中知其有寶珠詩固有之曰靑靑之麥生於陵陂生不布施死何舍珠為疏此是逸詩久遭刪削凡貴人葬者口多含珠故誦青青之詩刺之接其鬢擪其顪儒以金椎控其頤徐别其頰無傷口中珠注詩禮者先王之陳迹也苟非其人道不虛行故夫儒者乃有用之為姦則迹不足恃也疏接撮也擪按也顪口也控打也撮其鬢桉其口鐵椎打仍恐損珠故安徐分别之是以田恆資仁義以竊齊儒生誦詩禮以發冢由是觀之聖迹不足賴老萊子之弟子出薪遇仲尼返以告疏老萊子楚之賢人隱者也常隱蒙山楚王知其賢遣使召為相其妻采樵歸見門前有車馬迹妻問其故老萊曰楚王召我為相妻曰受人有者必為人角制而之不能為人制之妻遂捨而去老萊隨之夫負妻戴逃於江南莫知所之出取薪者采樵也既見孔子歸告其師曰有人於彼修上而趨下注長上而促下也末僂而後耳注耳却近後而上僂視若營四海注視之儡然似營他人事者不知其誰氏之子疏修長也趨短末肩背也所見之士下短上長肩背傴僂耳却近後瞻視高遠所作匆匆觀其儀容似營天下未知子之族姓是誰督其異常故發斯問老萊子曰是丘也召而來疏魯人孔丘汝宜唤取仲尼至曰丘去汝躬矜與汝容知斯為君子矣注謂仲尼能遺形去知故以為君子疏躬身也孔丘既至老萊未語宜遣汝身之躬飾忘爾容貌心知如此之時可為君子仲尼揖而退注受其言也疏敬受其言揖讓而退蹙然改容而問曰業可得進乎注設問之令老萊明其不可進疏蹙然驚恐貌謂仲尼所學聖迹業行可得修進為世用可不老萊子曰夫不忍一世之傷而驚萬世之患注一世為之則其迹萬世為患故不可輕也疏夫聖智仁義救一時之傷後執為姦成萬世之禍時聖迹而驕謷則陳恆之徒是也亦有作驚音者云使萬代驅騖不息亦是奔馳之義也抑固窶邪疏固執聖迹抑揚從已夫於本性故窮窶亡其略弗及邪注直任之則民性不窶而皆自有略無弗及之事也疏亡失本性忽略生崖故不及於真道惠以歡為驁終身之醜注惠之而歡者無惠則醜矣然惠不可長故一惠終身醜也疏夫以施惠為歡者惠不可遍故謷慢者多矣是以用惠取人適為怨府故終身醜辱中民之行進焉耳注言其易進則不可忘惠之相引以名相結以隱注隱括進之謂也疏夫上智下愚其性難改中庸之人易為進退故聞堯之美相引慕以利名聞桀之惡則結之以隱匿與其譽堯而非桀不如兩忘而閉其所譽注閉者閉塞疏贊譽堯之善道非毁桀之惡迹以此奔馳失性多矣故不如善惡兩忘閉塞毁譽則物性全矣反無非傷也動無非邪也注順之則全靜之則正疏夫反於物性無不傷損擾動心靈皆非正法聖人躊躇以興事以每成功注事不遠本故其功每成疏躊躇從容聖人無心應機而動興起事業恆自從容不逆物情故其功每就奈何哉其載焉終矜爾注矜不可載故遺而弗有也疏奈何猶如何也如何執仁義之迹擾撓物心運載矜莊終身不替此是老萊詆訶夫子之辭也宋元君夜半而夢人被髮窺阿門疏宋國君諡曰元即宋元君也阿曲也謂阿旁曲室之窺門曰豫自宰路之淵豫為清江使河伯之所漁者余且得豫疏自後也宰路江畔淵名姓余名且捕魚之人也元君覺使人占之曰此神龜也君曰漁者有余且乎左右曰有君曰令余且會朝疏命召也召令赴朝問其所得明日余且朝君曰漁何得對曰且之網得白龜焉其圓五尺君曰獻若之龜龜至君再欲殺之再欲活之心疑卜之曰殺龜以卜吉疏心疑猶預殺活再三乃殺吉遂刳龜也卜之乃刳龜七十二鑽而無遺策疏算計前後鑽之凡經七十二算計吉凶曾不失中仲尼曰神龜能見夢於元君而不能避余且之網知能七十二鑽而無遺策不能避刳腸之患如是則知有所困神有所不及也注神知之不足恃也如是夫唯靜然居其所能而不營於外者為全疏夫神智不足恃也是故至人之處世忘形神智慮與枯木同其不華將死天均其寂魄任物冥於造化是以孔丘大聖因而議之雖有至知萬人謀之注不用其知而用衆謀魚不畏網而畏鵜鶘注網無情故得魚疏網無情而得魚諭聖人無心故天下歸之去小知而大知明注小知自私大知任物疏小知取捨於心大知無分别遣間奪之情故無分别則大知光明也去善而自善矣注去善則善無所慕善無所慕則善者不矯而自善也疏遣矜尚之小心合自然之大善故前文云離道以善險德以行又老經云天下皆知善之為善斯不善已嬰兒生無石師而能言與能言者處也注泛然無習而自能者非跂而學彼也疏夫嬰兒之性其不假師匠年漸長大而自然能言者非有心學之與父母同處率其本性自然能言是知世間萬物非由運知學而成之也惠子謂莊子曰子言無用疏莊子通人也空有並照其言宏博不契俗心是以惠施譏為無用莊子曰知無用而始可與言用矣疏夫有用則同於天折無用則全其崖故知無用始可語其用天地非不廣且大也人之所用容足耳然則側足而墊之致黃泉人尚有用乎惠子曰無用疏墊掘也夫六合之內廣大無最於地人之所用不過容足若使側足之外掘至黃泉人則戰栗不得行動是知有用之物假無用成功莊子曰然則無用之為用也亦明矣注聖應其內當事而發已言其外以暢事情情暢則事通外明則內用相須之理然也疏直置容足不可得行必候餘地方能運用腳足無用之理分明故取老子云有之以為利無之以為用莊子曰人有能遊且得不遊乎人而不能遊且得遊乎注性之所能不得不為也性所不能不得強為故聖人唯莫之制則同焉皆得而不知所以得也疏夫人稟性不同所用各異自有聞言如影響自有智昏菽麥故性之能者不得不由性之無者不可強涉各守其分則物皆不喪夫流遁之志決絶之行噫其非至知厚德之任與注非至厚則莫能任其志行而信其殊能也疏流蕩逐物逃遁不返果決絶滅因而不移此之志行極愚極鄙豈是至妙真知深厚道德之所任用莊子之意謂其如此覆墜而不及火馳而不顧注人之所好不避是非死生以之疏愚迷之類執志慤然雖復家被覆沒身遭顚墜亦不知悔反馳逐物情急如煙火而不知回顧流遁決絶遂至於斯耳雖相與為君臣時也易世而無以相賤注所以為大齊同疏夫時所賢者為君才不應世者為臣如舜禹應時相代為君臣也故世遭革易不可以為臣為君而相賤輕流遁之徒不知此事故曰至人不留行焉注唯所遇而因之故能與化俱疏夫世有興廢隨而行之是故達人曾無留滯夫尊古而卑今學者之流也注古無所尊今無所卑而學者尊古而卑今失其原矣疏夫步驟殊時澆淳異世古今情事變也不同而乃貴古賤今深乖遠鑒適滋為學小見豈曰清通且以狶韋氏之流觀今之世夫孰能不波注隨時因物乃平泯也疏狶韋三皇已前帝號也以玄古之風御於今代澆淳既章誰能不波蕩而不失其性乎斯由尊古卑今之弊也唯至人乃能遊於世而不僻注當時應務所在為正順人而不失己注本無我我何失焉彼教不學注教因彼性故非學也承意不彼注彼意自然故承而用之則夫萬物各全其我疏獨有至德之人順時而化彼非學心而本性具足不由學致也承意不彼者稟承教意以導性而真道素圓不彼教也目徹為明耳徹為聰鼻徹為顫口徹為甘心徹為知知徹為德疏徹通也顫者辛臭之事也夫六根無壅故徹聰明不蕩於外故為德凡道不欲壅壅則哽哽而不止則跈注當通而塞則理有不泄而相騰踐也跈則衆害生注生起也物之有知者恃息注凡根生者無知亦不恃息也疏天生六根廢一不可耳聞眼見鼻嗅心知為於分內雖用無咎若乃目帶桑中之色耳淫濮上之聲鼻滋蘭麝之香心用無窮之境則天理滅矣豈謂徹哉故六根窮徹則氣息通而生理全其不殷非天之罪注殷當也夫息不由知由知然後失當失當而後不通故知恃息息不恃知也然知欲之用制之由人非不得已之符也疏殷當也或縱恣六根馳逐前境或竅穴哽塞以害生崖通蹍二徒皆不當理斯並人情之罪也非天然之辜天之穿之日夜無降注通理有常運疏降止也自然之理穿通萬物自晝及夜未嘗止息人則顧塞其竇注無情任天竇乃開疏竇孔也流俗之人反於天理壅塞根竅滯溺不通胞有重閬注閬空壙也疏閬空也言人腹內空虛故容藏胃藏胃空虛故通氣液心有天遊注遊不係也疏虛空故自然之道遊其中室無空虛則婦姑勃豀注爭處也疏勃豀爭鬥也屋室不空則不容受故婦姑爭處無復尊卑心無天遊則六鑿相攘注攘逆疏鑿孔也攘則逆也自然之道不遊其心則六根逆不順於理大林丘山之善於人也亦神者不勝注自然之理有寄物而通也疏自然之理有寄物而通者也德溢乎名注夫名高則利深故修德者過其當疏溢深也仁義五德所以行之過多者為尚名好勝故也名溢乎暴注夫禁暴則名美於德疏暴殘害也夫名者士之器名既過者必更相賊害內篇云名者相軋者也謀稽乎誸注誸急也急而後考其謀疏稽考也誸急也急難之事然後校謀計知出乎事注平往則無用知疏夫運心知以出境則爭鬥斯至柴生乎守注柴塞也疏柴塞也守執也域情執固而所造不通官事果乎衆宜注衆之所宜者不一故官事立也疏夫置官府設事條者須順於衆人之宜便若求逆之則禍亂生春雨日時草木怒生銚耨於是乎始修注夫事物之生皆有由疏銚耜之類也耨鋤也青春時節時雨之日凡百草木萌動而生於是農具方始修理此明順時而動不逆物情也草木之到植者過半而不知其然注夫事由理發故不覺疏植生也銚耨既修藝除苑葦幸逢春日鉏罷到生良由時節使然不可以人情度是知制法立教必須順時靜然可以補病注非不病也疏適有煩躁之病者簡靜可以療之眥𡟬可以休老注非不老也疏翦齊髮鬢狀貌也衰老之容以此而沐浴寧可以止遽注非不遽也疏遽疾速也夫心性匆迫者安靜可以止之雖然若是勞者之務也非佚者之所未嘗過而問焉注若是猶有勞故佚者超然不顧疏夫止遽以寧療躁以靜者以對治之術斯乃小學之人勞役神智之事務也豈是體道之士間逸之人不勞不病之心乎風彩情高故未嘗暫過而顧問焉聖人之所以駥天下神人未嘗過而問焉注神人即聖人也聖言其外神言其內疏駭驚也神者不測之號聖者顯迹之名為其垂教動人故不過問賢人所以駥世聖人未嘗過而問焉疏證空為賢並照為聖從深望淺故不問之君子所以駥國賢人未嘗過而問焉疏何以人物君子故駭動諸侯之國賢人捨有故不問小人所以合時君子未嘗過而問焉注趨步各有分高下各有等疏夫趨世小人苟合一時如田恆之徒無足可貴故淑人君子鄙而不顧也演門有親死者以善毁爵為官帥其黨人毁而死者半注慕賞而孝去真遠矣斯尚賢之過也疏東門也亦有作寅者隨字讀之東門之孝出自內心形容外毁惟宋君嘉其至孝遂加爵而命為卿鄉黨之人聞其因孝而貴於是強哭詐毁矯性偽情因而死者其數半矣堯與許由天下許由逃之湯與務光務光怒之疏堯知由賢襌以九五灑耳辭退逃避箕山湯與務光務光不受訶罵瞋怒遠之林籟斯皆率其本性腥臊榮祿非關矯偽以慕聲名紀他聞之帥弟子而踆於窾水諸侯弔之三年申徒狄因以踣河注其波蕩傷性遂至於此疏姓申徒名狄姓紀名他並隱者聞湯讓務光恐其及己與弟子蹲踞水旁諸侯聞之重其廉素時往弔慰恐其沈沒狄聞斯事慕其高名遂赴長河自溺而死波蕩失性遂至於斯矣筌者所以在魚得魚而忘筌蹄者所以在兔得兔而忘蹄疏筌魚笱也以竹為之故字從竹亦有從草者蓀筌也香草也可以餌魚置香於柴木蘆葦之中以取魚也蹄兔罝也亦兔強也以繫係兔腳故謂之蹄此二事譬也言者所以在意得意而忘言疏此合諭也意妙理也夫得魚兔本因筌蹄而筌蹄實異魚兔亦由玄理假於言説言説實非玄理魚兔得而筌蹄忘玄理明而名言絶吾安得夫忘言之人而與之言哉注至於兩聖無意乃都無所言也疏夫忘言得理目擊道存其人實稀故有斯難也南華真經注疏卷之二十八
