body:
  text: 南華真經注疏卷之二十四慶三河南郭象注唐西華法師成玄英疏外篇知北遊第二十二知北遊於玄水之上登隱弅之丘而適遭無為謂焉疏此章並假立姓名寓言明理北是幽冥之域水又幽昧之方隱則深遠難知弅則鬱然可見欲明至道玄絶顯晦無常故寄此言以彰其義也知謂無為謂曰豫欲有問乎若疏若汝也此明運知極心問道假設賔主謂之無為何思何慮則知道何處何服則安道何從何道則得道疏此假設言方運知問道若為尋思何所念慮則知至道若為服勤於何處所則安心契道何所依從何所道説則得其道也三問而無為謂不答也非不答不知答也疏知分别也設此三問竟無一答非無為謂惜情不答直是理無分别故不知所以答也知不得問反於白水之南登狐闋之上而覩狂屈焉知以之言也問乎狂屈疏白是潔素之色南是顯明之方狐者疑似夷猶闋者空靜無物問不得決反照於白水之南捨有反無狐疑未能窮理既而猖狂妄行掘若稿木欲表斯義故曰狂屈焉耳狂屈曰唉豫知之將語若中欲言而忘其所欲言疏唉應聲也初欲言語中途忘之斯忘之術反照之道知不得問反於帝官見黃帝而問焉黃帝曰無思無慮始知道無處無服始安道無從無道始得道疏軒轅體道妙達玄言故以一無無於三問知問黃帝曰我與若知之彼與彼不知也其孰是耶黃帝曰彼無為謂真是也狂屈似之我與汝終不近也夫知者不言言者不知故聖人行不言之教注任其自行斯不言之教也疏真者不知也似者中忘也不近者以其知之也行不言之教引老子經為證也道不可致注道在自然非可言致者也疏致得也夫玄道不可以言得言得非道也德不可至注不失德故稱德稱德而不至也疏夫上德不德若為德者非至德也仁可為也疏夫至仁無親而今行偏愛之仁者適可有為而已矣義可虧也疏夫裁非斷割適可虧殘非大全也大全者生之而已矣禮相偽也疏夫禮尚往來更相浮偽華藻亂德非真實也故曰失道而後德失德而後仁失仁而後義失義而後禮禮者道之華而亂之首也注禮有常則故矯效之所由生也疏棄本逐末散朴為澆道喪淳漓逮于行禮故引老經證成其義也故曰為道者日損注損華偽也損之又損之以至於無為無為而無不為也注華去而朴全則雖為而非為也疏夫修道之人日損華偽既而前損有後損無有無雙遣以至於非有非無之無為也寂而不動無為故無不為也此引老經重明其旨今已為物也注物失其所故有為物欲復歸根不亦難乎其易也其為大人乎注其歸根之易者唯大人耳大人體合變化故化物不難疏倒置之類浮偽居心徇末忘本以道為物縱欲歸根復命其可得乎今量反本不難唯在大聖人耳生也死之徒注知變化之道者不以為異死也生之始孰知其紀注更相為始則未知孰死孰生也疏氣聚而生猶是死之徒類氣散而死猶是生之本始生死終始誰知紀綱乎聚散往來變化無定人之生氣之聚也聚則為生散則為死注俱是聚也俱是散也若死生為徒吾又何患注患生於異疏夫氣聚為生氣散為死聚散雖異為氣則同斯則死生聚散可為徒伴既無其别有何憂色故萬物一也疏生死既其不二萬物理當歸一是其所美者為神竒其所惡者為臭腐臭腐復化為神竒神竒復化為臭腐故曰通天下一氣耳注各以所美為神竒所惡為臭腐耳然彼之所美我之所惡也我之所美彼或惡之故通共神竒通共臭腐耳死生彼我豈殊哉疏夫物無美惡而情有向背故情之所美者則謂為神妙竒特情之所惡者則謂為腥臭腐敗而顚倒本末一至於斯然物性不同所好各異彼之所美此則惡之此之所惡彼又為美故毛嬙麗姬人之所美魚見深入鳥見高飛斯則臭腐神竒神竒臭腐而是非美惡何有定焉是知天下萬物同一和氣耳聖人故貴一疏夫體道聖人智同萬物故貴此真一而冥同萬境知謂黃帝曰吾問無為謂無為謂不應我非不我應不知應我也吾問狂屈狂屈中欲告我而不我告非不我告中欲告而忘之也今豫問乎若若知之奚故不近黃帝曰彼其真是也以其不知也此其似之也以其忘之也豫與若終不近也以其知之也狂屈聞之以黃帝為知言注明夫自然者非言知之所得故當昧乎無言之地是以先舉不言之標而後寄明於黃帝則夫自然之冥物槩乎有得而見也疏彼無為謂妙體無知故真是道也此狂屈反照遣言中忘其告似道非真也知與黃帝二人運智以詮理故不近真道也狂屈逖聽聞此格量謂黃帝雖未近真適可知玄言而已矣天地有大美而不言四時有明法而不議萬物有成理而不説注此孔子之所以云子欲無言疏夫二儀覆載其功最美四時代敘各有明法萬物生成咸資道理竟不言説曾無議論也聖人者原天地之美而達萬物之理是故至人無為注任其自為而已疏夫聖人者合兩儀之覆載同萬物之生成是故口無所言心無所作大聖不作注唯因任也觀於天地之謂也注觀其形容象其物宜與天地不異疏夫大聖至人無為無作觀天地之覆載法至道之生成無為無言斯之謂也今彼神明至精與彼百化注百化自化而神明不奪疏彼神聖明靈至精極妙與物和混變化隨流或聚或散曾無欣戚今言百千萬者並舉其大綱數爾物已死生方圓莫知其根也注夫死者已自死而生者已自生圓者已自圓而方者已自方未有為其根者故莫知疏夫物或生或死乍方乍圓變化自然莫知根緒扁然而萬物自古以固存注豈待為之而後存哉疏扁然遍生之貌也言萬物翩然隨時生育從古已來必固自有豈由措意而後有之六合為巨未離其內注計六合在無極之中則陋矣秋豪為小待之成體注秋豪雖小非無亦無以容其質疏六合天地四方也獸逢秋景毛端生豪豪極微細謂秋豪也巨大也六合雖大猶居至道之中豪毛雖小資道以成體質也天下莫不沈浮終身不故注日新也疏世間庶物莫不浮沈升降生死往來不住運之不停新新相續未嘗守故也陰陽四時運行各得其序注不待為之疏夫二氣氤氲四時運轉春秋寒暑次敘天然豈待為之而後行之惛然若亡而存注昭然若存則亡矣疏惛然如昧似無而有油然不形而神注挈然有形則不神疏神者妙萬物而為言也油然無係不見形象而神用無方萬物畜而不知此之謂本根注畜之而不得其本性之根故不知其所以畜也疏亭毒群生畜養萬物而玄功潛被日用不知此之真力是至道一根本也可以觀於天矣注與天同觀疏觀見也天自然也夫能達理通玄識根知本者可謂觀自然之至道也齧缺問道乎被衣被衣曰若正汝形一汝視天和將至疏齧缺王倪弟子被衣王倪之師也汝之容貌端雅忽為邪僻視聽純一勿多取境自然和理歸至汝身攝汝知一汝度神將來舍疏收攝私心令其平等專一志度令無放逸汝之精神自來舍止德將為汝美道將為汝居疏深玄上德盛美於汝無極大道居乎汝心中汝瞳焉如新生之犢而無求其故疏瞳焉無知直視之貌故事也心既虛夷視亦平直故如新生之犢於事無求也言未卒齧缺睡寐被衣大悅行歌而去之疏談玄未終斯人已悟坐忘契道事等睡瞑於是被衣喜躍贊其敏速行於大道歌而去之曰形若稿骸心若死灰真其實知不以故自持注與變俱也疏形同稿木之骸心類死灰之土無情直任純實之真知不自矜持於事故也媒媒晦晦無心而不可與謀彼何人哉注獨化者也疏媒媒晦晦息照遣明忘心忘知不可謀議非凡所識故云彼何人哉自形若稿骸以下並被衣歌辭也舜問乎丞曰道可得而有乎疏丞古之得道人舜師也而至道虛通生成動植未知己身之內得有此道不乎既逢師傅故有咨請曰汝身非汝有也汝何得有夫道注夫身者非汝所能有也塊然而自有耳身非汝所有而況道哉疏道者四句所不能得百非所不能詮汝身尚不能自有何得有於道邪舜曰吾身非吾有也孰有之哉疏未悟生因自然形由造物故云身非我有孰有之哉曰是天地之委形也生非汝有是天地之委和也性命非汝有是天地之委順也注若身是汝有者則美惡死生當制之由汝今氣聚而生汝不能禁也氣散而死汝不能止也明其委結而自成耳非汝有也疏委結聚也夫天地陰陽結聚剛柔和順之氣成汝身形性命者也故聚則為生散則為死死生聚散既不由汝是知汝身豈汝有邪孫子非汝有是天地之委蛻也注氣自委結而蟬蛻也疏陰陽結聚故有子孫獨化而成猶如蟬蛻也故行不知所往處不知所持食不知所味注皆在自爾中來故不知也疏夫行住食味皆率自然推尋根由莫知其所故行者誰行住者誰住食者誰食味者誰味乎皆不知所由而悉自爾也天地之強陽氣也又胡可得而有邪注強陽猶運動耳明斯道也庶可以遺身而忘生也疏強陽運動也胡何也夫形性子孫者並是天地陰陽運動之氣聚結而成者也復何得自有此身也孔子問於老聃曰今日晏間敢問至道疏晏安也孔子師於老子故承安居間暇而詢問玄道也老聃曰汝齋戒疏瀹而心澡雪而精神掊擊而知夫道窅然難言哉將為汝言其崖略疏疏瀹猶灑濯也澡雪猶精潔也而汝也掊擊打破也崖分也汝欲問道先須齋汝心迹戒愼專誠灑濯身心清靜神識打破聖智滌蕩虛夷然玄道窅冥難可言辨將為汝舉其崖分粗略言之夫昭昭生於冥冥有倫生於無形精神生於道注皆所以明其獨生而無所資也形本生於精注皆由精以至粗疏倫理也夫昭明顯著之物生於窅冥之中人倫有為之事生於無形之內精智神識之心生於重玄之道有形質氣之類根本生於精微而萬物以形相生故九竅者胎生八竅者卵生注言萬物雖以形相生亦皆自然耳故胎卵不能易種而生明神氣之不可為也疏夫無形之道能生有形之物有形之物則以形質氣類而相生也故人獸九竅而卵生八竅稟之自然不可相易其來無迹其往無崖無門無房四達之皇皇也注夫率自然之性遊無迹之途者放形骸於天地之間寄精神於八方之表是以無門無房四達皇皇逍遙六合與化偕行也疏皇大也夫以不來為來者雖來而無蹤迹不往為往者雖往亦無崖際是以出入無門户來往無邊傍故能宏達四方大通萬物也邀於此者四肢強思慮恂達耳目聰明其用心不勞其應物無方注人生而遇此道則天性全而精神定疏邀遇也恂通也遇於道而會於真理者則百體安康四肢強健思慮通達視聽聰明無心之心用而不勞不應之應應無方所也天不得不高地不得不廣日月不得不行萬物不得不昌此其道與注言此皆不得不然而自然耳非道能使然也疏二儀賴玄道而高廣三光資玄道以運行庶物得之以昌盛斯大道之功用也故老經云天得一以清地得一以寧萬物得一以生是之謂也且夫博之不必知辨之不必慧聖人以斷之矣注斷棄知慧而付之自然也疏夫博讀經典不必知真宏辨飾辭不必慧照故老經云善者不辨辨者不善知者不博博者不知斯則聖人斷棄之矣若夫益之而不加益損之而不加損者聖人之所保也注使各保其正分而已故無用知慧為也疏博知辨慧不益其明沈默面墻不加其損所謂不增不滅無損無益聖人妙體故保而愛之也淵淵乎其若海注容恣無量疏尾閭泄之而不耗百川注之而不增淵澄深大故譬玄道巍巍乎其終則復始也注與化俱者乃積無窮之紀可謂巍巍疏巍巍者高大貌也夫道遠超太一近邁兩儀囊括無窮故以歎巍巍也終則復始此明無終無始變化日新隨迎不得運量萬物而不匱注用物而不役己故不匱也則君子之道彼其外與注各取於身而足疏夫運載萬物器量羣生潛被無窮而不匱乏者聖人君子之道此而非遠近在內心既不藉稟豈其外也萬物皆往資焉而不匱此其道與注還用物故我不匱此明道之贍物在於不贍不贍而物自得故曰此其道與言至道之無功無功乃足稱道也疏有識無情皆稟此玄之道而玄功冥被終不匱乏然道物不一不異而離道無物故曰此其道與中國有人焉非陰非陽注無所偏名處於天地之間直且為人注敖然自放所遇而安了無功名疏中國九州也言人所稟之道非陰非陽非柔非剛非短非長故絶四句離百非也處在天地之間直置為人而無偏執本亦作值字者言處乎宇內遇值為人曾無所係也將反於宗注本逐末也疏既無偏執在置為人故能反本還原歸於宗極自本觀之生者喑醷物也注直聚氣也疏本道也喑噫氣聚也從道理而觀之故知生者聚氣之物也奚足以惜之哉雖有壽夭相去幾何須臾之説也奚足以為堯桀之是非注死生猶未足殊況壽夭之間哉疏一生之內百年之中假令壽夭賒促詎幾俄頃之間須臾之説耳何足以是堯非桀而分别於其間哉果蓏有理注物無不理但當順之人倫雖難所以相齒注人倫有智慧之變故難也然其智慧自相齒耳但當從而任之疏在樹曰果在地曰蓏桃李之屬瓜瓠之徒木生藤生皆有其理人之處世險阻艱難而貴賤尊卑更相齒次但當任之自合天道譬彼果蓏有理存焉聖人遭之而不違注順所遇也過之而不守注宜過而過疏遭遇軒冕徒而不違既以過焉亦不留舍也調而應之德也偶而應之道也注調偶和合之謂也疏調和庶物順而應之上德也偶對前境逗機應物聖道也帝之所興王之所起也注如斯而已疏夫帝王興起俯應羣生莫遇調偶隨時逗機接物人生天地之間若白駒之過郤忽然而己注乃不足惜疏白駒駿馬也亦言日也隙孔也夫人處世俄頃之間其為迫促如馳駿駒之過孔隙欻忽而已何曾足云也注然勃然莫不出焉油然漻然莫不入焉注出入者變化之謂耳言天下未有不變也疏注勃是生出之容油漻是入死之狀言世間萬物相與無恆莫不從變而生順化而死已化而生又化而死注俱是化也生物哀之注死物不哀人類悲之注死類不悲疏夫生死往來皆變化耳委之造物何足係哉故其死也生物人類共悲哀之務非類非生故不悲不哀也解其天韜墮其天帙注獨脫也疏韜囊藏也帙束囊也言人執是競非欣生惡死故為生死束縛也今既一於是非忘於生死故隳解天然之韜帙也紛乎宛乎注變化煙煴魂魄將往乃身從之乃大歸乎注無為用心於其間也疏紛綸宛轉並適散之貌也魂魄往天骨肉歸土神氣離散紛宛任從自有還無乃大歸也不形之形形之不形注不形形乃成若形之形則敗其形矣疏夫人之未生也本不有其形故從無形氣聚而有其形氣散而歸於無形也是人之所同知也注雖知之然不能任其自形而反形之所以多敗非將至之所務也注務則不至疏夫從無形生形從有表復無形質是人之所同知也斯乃人間近事非詣理至人之達務也此衆人之所同論也注雖論之然故不能不務所以不至也疏形質有無生死來往衆人凡類同共乎論耳彼至則不論注悗然不覺乃至論則不至疏彼至聖之人忘言得理故無所論説若論説之則不至於道明見無值注暗至乃值疏值命遇也夫能閉智塞聰冥契玄理若顯明間見則不會真也辨不若默道不可聞聞不若塞此之謂大得注默而塞之則無所奔逐故大得疏夫大辨飾詞去真遠矣忘言靜默玄道近焉故道不可以多聞求多聞求不如於暗塞若能妙知於此意可謂深得於大理已矣東郭子問於莊子曰所謂道惡乎在疏居在東郭故號東郭子則無擇之師東郭順子也問莊子曰所謂虛通至道於何處在乎莊子曰無所不在疏道無不遍在處有之東郭子曰期而後可注欲令莊子指名所在疏郭注云欲令莊子指名所在也莊子曰在嶁蟻曰何其下邪曰在稊稗曰何其愈下邪曰在瓦甓曰何其愈甚邪曰在屎溺東郭子不應疏大道無不在而所在皆無故處處有之不簡穢賤東郭未達斯趣謂道卓爾清高在瓦甓已嫌卑甚又聞屎溺故瞋而不應也莊子曰夫子之問也固不及質注舉其標質言無所不在而方復怪此斯不及質也疏質實也言道無不在豈唯稊稗固答子之問猶未逮真也正獲之問於監市履狶也每下愈况注狶大豕也夫監市之履豕以知其肥瘦者愈履其難肥之處愈知豕肥之要今問道之所在而每况之於下賤則明道之不逃於物也必矣疏正官號也則今之市令也獲名也監市之魁也則今屠卒也狶豬也凡今問於屠人買豬之法云踐豕之股腳之間難肥之處愈知豕之肥瘦之意況也何者近下難肥之處有肉足知易肥之處足脂亦猶屎溺卑下之處有道則明清虛之地皆遍也汝唯莫必無乎逃物注若必謂無之逃物則道不周矣道而不周則未足以為道疏無者無為道也夫大道曠蕩無不制圍汝唯莫言至道逃棄於物也必其逃物何為周遍乎至道若是大言亦然注明道不逃物疏至道理也大言教也理既不逃於物教亦普遍無偏也周遍咸三者異名同實其指一也疏周悉普遍咸皆有道此重明至道不逃於物雖有三名之異其實理指歸則同於一也嘗相與遊乎無何有之宫同合而論無所終窮乎注若遊有則不能周遍咸也故同合而論之然後知道之無不在知道之無不在然後能曠然無懷而遊彼無窮也疏無何有之宫謂玄道處所也無一物可有故曰無何有也而周遍三者相與敖遊乎至道之鄉實旨既一同合而論冥符玄理故無終始窮極耳嘗相與無為乎淡而靜乎漠而清乎調而間乎注此皆無為故也疏此總歎周遍咸三功能盛德也既遊至道之鄉又處無為之域故能恬淡安靜寂寞清虛柔順調和寬間逸豫寥已吾志注寥然空虛疏得道玄聖契理冥真性志九夷寂寥而已乎無往焉而不知其所至注志苟寥然則無所往矣無往焉故往而不知其所至有往焉則理未動而志已至矣去而來而不知其所止注斯順之也疏語既寂寥故與無還往假令不往而往不來而來竟無至所亦無止住吾已往來焉而不知其所終注但往來不由於知耳不為不往來也往來者自然之常理也其有終乎疏假令往還造物來去死生隨變任化亦不知終始也倣徨乎馮閎大知入焉而不知其所窮注馮閎者虛廓之謂也大知由乎寥廓恣變化之所知故不知也疏倣徨是放任之名馮閎是虛曠之貌謂入契會也言大聖知之人能會於寂寥虛曠之理是以逍遙自得放任無窮物物者與物無際注明物物者無物而物自物耳物自物耳故冥也疏際崖畔也夫能物於物者聖人也聖人冥同萬境故與物無彼我之際畔而物有際者所謂物際者也注物有際故每相與不能冥然真所謂際者也疏物情分别取舍萬端故有物我之交際也不際之際際之不際者也注不際者雖有物物之名直明物之自物耳物物者竟無物也際其安在乎疏際之不際者聖人之達觀也不際之際者凡鄙之滯情也謂盈虛衰殺彼為盈虛非盈虛彼為衰殺非衰殺彼為本末非本末彼為積散非積散也注既明物物者無物又明物之不能自物則為之者誰乎哉皆忽然而自爾也疏富貴為盈貧賤為虛老病為衰殺終始為本末生來為積死去為散夫物物者非物而生物誰乎此明能物所物皆非之也物既非物何盈虛衰殺之可語邪是知所謂盈虛皆非盈虛故西升經云若能明之所是反非也妸荷甘與神農同學於老龍吉疏姓妸字荷甘神農者非三皇之神農也則後之人物耳二人同學於老龍吉老龍吉亦是號也神農隱几闔户晝瞑妸荷甘日中奓户而入曰老龍死矣疏隱慿也闔合也奓開也亦排也學道之人心神凝靜閉門隱几守默而瞑荷甘既聞師亡所以排尸而告神農隱几擁杖而起嚗然放杖而笑注起而悟夫死之不足驚故還放杖而笑也疏嚗然放杖聲也神農聞吉死是以擁枤而驚覆思死不足哀故還放杖而笑曰天知豫僻陋慢訑故棄豫而死已矣夫子無所發豫之狂言而死矣夫注自肩吾已下皆以至言為狂而不信也故非老龍連叔之徒莫足與言也疏夫子老龍吉也言其有自然之德故呼之曰天也狂言猶至言也非世人之所解故名至言為狂也而師知我偏僻鄙陋慢訑不專故棄背吾徒止息而死哲人云亡至言斯絶無復談玄垂訓開發我心弇缸弔聞之曰夫體道者天下之君子所繫焉注言體道者人之宗主也今於道秋豪之端萬分未得處一焉注秋豪之端細矣又未得其萬分之一而猶知藏其狂言而死又况夫體道者乎注明夫至道非言之所得也唯在手自得耳疏姓弇名缸隱者也繫屬也聞龍吉之亡傍為議論云體道之人世間共重賢人君子繫屬歸依今老龍之於玄道猶豪端萬分之未一尚知藏其狂簡處順而亡況乎妙悟之人曾肯露其言説是知體道深玄忘言契理者之至稀也俔之無形聽之無聲於人之論者謂之冥冥所以論道而非道也注冥冥而猶復非道明道之無名也疏夫玄道虛漠妙體希夷非色非聲絶視絶聽故於學人論者論曰冥冥而謂之冥冥猶非真道也於是泰清問乎無窮曰子知道乎無窮曰吾不知疏泰大也夫至道宏曠恬淡清虛囊括無窮故以泰清無窮為名也既而泰清以知問道無窮答以不知欲明道離形聲亦不可以言知求也又問乎無為無為曰吾知道曰子之知道亦有數乎曰有曰其數若何疏子既知道頗有名數不乎其數如何請為略述無為曰吾知道之可以貴可以賤可以約可以散此吾所以知道之數也疏貴為帝王賤為僕隸約聚為生分散為死數乃無極此略言之欲明非名而名非數而數也泰清以之言也問乎無始曰若是則無窮之弗知與無為之知孰是而孰非乎疏至道玄通寂寞無為隨迎不測無終無始故寄無窮無始為其名焉無窮無為弗知與知誰是誰非請定臧否無始曰不知深矣知之淺矣弗知內矣知之外矣疏不知合理故深玄而處內知之乖道故粗淺而疏外於是泰清中而歎曰弗知乃知乎知乃不知乎孰知不知之知注凡得之不由於知乃冥也疏泰清得中道而嗟歎悟不知乃真知誰知不知之知明真知之至希也無始曰道不可聞聞而非也道不可見見而非也道不可言言而非也注故默成乎不聞不見之域而後至焉疏道無聲不可以耳聞耳聞非道也道無色不可以眼見眼見非道也道無名不可以言説言説非道也知形形之不形乎注形自形耳形形者竟無物也疏夫能形色萬物者固非形色也乃曰形形不形也道不當名注有道名而竟無物故名之不能當也疏名無得道之功道無當名之實所以名道而非無始曰有問道而應之者不知道也雖問道者亦未聞道注不知故問問之而應則非道也不應則非問者所得故雖問之亦終不聞也疏夫道絶名言不可問答故問道應道悉皆不知道無問問無應注絶學去教而歸於自然之意也疏體道離言有何問應凡言此者覆釋前文無問問之是問窮也注所謂貴空疏窮空也理無可問而強問之是貴空也無應應之是無內也注實無而假有以應者外矣疏理無可應而強應之乃成殊外以無內待問窮若是者外不觀乎宇宙內不知乎太初疏天地四方曰宇往古來今曰宙太初道本也若以理外之心待空之智者可謂外不識乎六合宇宙內不知乎己身之妙本者也是以不過乎崑崙不遊乎太虛注若夫婪落天地遊虛涉遠以入乎冥冥者不應而已矣疏崑崙是高遠之山太虛是深玄之理苟其滯著名言猶存問應者是知未能經過高遠遊涉深玄者矣光耀問乎無有曰夫子有乎其無有乎疏光曜者是能視之智也無有者所觀之境也智能照察故假名光曜境體空寂故假名無有也而智有明暗境無深淺故以智問境有乎無乎光耀不得問而孰視其狀貌窅然空然終日視之而不見聽之而不聞搏之而不得也疏夫妙境希夷視聽斷絶故審狀貌唯寂唯空也光曜曰至矣其孰能至此乎豫能有無矣而未能無無也及為無有矣何從至此哉注此皆絶學之意也於道絶之則夫學者乃在根本中來矣故學之善者其唯不學乎疏光明照曜其智尚淺唯能得無喪有未能雙遣有無故歎無有至深誰能如此玄妙而言無有者非直無有亦乃無無四句百非悉皆無有以無之一字無所不無言約理廣故稱無也而言何從至此者但無有之境窮理盡性自非玄德上士孰能體之是以淺學小智無從而至也大馬之捶鉤者年八十矣而不失豪芒注拈捶鉤之輕重而無豪芒之差也疏大馬官號楚之大司馬也捶打鍛也鉤腰帶也大司馬家有工人少而善鍛鉤行年八十而捶鉤彌巧專性凝慮故無豪芒之差失也鉤稱鉤椎也謂能拈捶鉤推知斤兩之輕重無豪芒之差失也大馬曰子巧與有道與疏司馬怪其年老而捶鍛愈精謂其工巧别有道術也曰臣有守也臣之年二十而好捶鉤於物無視也非鉤無察也疏更無别術有所守持少年已來專精好此捶鉤之外無所觀察習以成性遂至於斯也是用之者假不用者也以長得其用而況乎無不用者乎物孰不資焉注都無懷則物來皆應疏所以至老而長得其捶鉤之用者假賴於不用心視察他物故也夫假不用為用尚得終年況乎體道聖人無用無不用故能成大用萬物資稟不亦宜乎冉求問於仲尼曰未有天地可知邪仲尼曰可古猶今也注言天地常存乃無未有之時疏姓冉名求仲尼弟子師資發起詢問兩儀未有之時可知已否夫變化日新則無今無古古猶今也故答云可知也冉求失問而退明日復見曰昔者吾問未有天地可知乎夫子曰可古猶今也疏失其問意遂退而歸既遵應問還用應答昔日吾昭然今日吾昧然敢問何謂也疏昔日初咨心中昭然明察今時後間情慮昧然暗晦敢問前明後暗意謂如何仲尼曰昔之昭然也神者先受之注虛心以待命斯神受也今之昧然也且又為不神者求邪注思求更致不了疏先求未悟鋭彼精神用心求受故昭然明白也後時領解不復運用精神直置任真無所求請故昧然暗塞也求邪者言不求也無古無今無始無終注非唯無不得化而為有也有亦不得化而為無矣是以無有之為物雖千變萬化而不得一為無也不得一為無故自古無未有之時而常存也疏日新而變故無始無終無今無古故知無未有天地之時者也未有子孫而有子孫可乎注言世世無極疏言子孫相生世世無極天地人物悉皆無原無有之時也可乎言不可也冉求未對仲尼曰已矣未應矣不以生生死注夫死者獨化而死耳非夫生者生此死也不以死死生注生者亦獨化而生耳疏已止也未無也夫聚散死生皆獨化日新未嘗假賴豈相因待故不用生生此死不用死死此生冉求未對之間仲尼止令無應理盡於此更何所言也死生有待邪注獨化而足皆有所一體注死與生各自成一體疏死獨化也豈更成一物哉死既不待於生故知生亦不待於死死生聚散各自成一體耳故無所因待也有先天地生者物邪物物者非物物出不得先物也猶其有物也猶其有物也無己注誰得先物者乎哉吾以陰陽者即所謂物耳誰又先陰陽者乎吾以自然為先之而自然即物之自爾耳吾以至道為先之矣而至道者乃至無也既以無矣又奚為先然則先物者誰乎哉而猶有物無已明物之自然非有使然也疏夫能物於物者非物也故非物則無先後物出則是物復不得有先於此物者何以知其然邪謂其猶是物故也以此推量竟無先物者也然則先物者誰乎哉明物之自然耳自然則無窮已之時也是知天地萬物自古以固存無未有之時也聖人之愛人也終無已者亦乃取於是者也注取於自爾者恩流百代而不廢也疏夫得道聖人慈愛覆育恩流百代而無窮止者良由德合天地妙體自然故能虛己於彼忘懷亭毒萬物芻狗蒼生蓋取斯義而然也顔淵問乎仲尼曰回嘗聞諸夫子曰無有所將無有所迎回敢問其遊疏請夫子言將送也夫聖人如鏡不送不迎顔回問之曰未曉其理故詢諸尼父問其所由仲尼曰古之人外化而內不化注以心順形而形自化疏古人純朴合道者多故能外形隨物內心凝靜今之人內化而外不化注以心使形疏內以緣通變化無明外形乖誤不能順物與物化者一不化者也注常無心故一不化一不化乃能與物化者耳安化安不化注化與不化皆任彼耳斯無心也疏安任也夫聖人無心隨物流轉故化與不化斯安任之既無分别曾不槩意也安與之相靡注直無心而恣其自化耳非將迎而靡順之疏靡順也所謂化與不化悉安任者為不忤蒼生更相靡順必與之莫多注不將不迎則足而止疏雖復與物相順而亦不多仁恩各止於分彼我無損狶韋氏之囿黃帝之圃有虞氏之宫湯武之室注言夫無心而任化乃羣聖之所遊處疏狶韋軒轅虞舜殷湯周武並是聖明王也言無心順物之道乃是狶韋倣徨之苑囿軒轅敖遊之園圃虞舜養德之宫闈湯武怡神之虛室斯乃羣聖之所遊而處之也君子之人若儒墨者師故以是非相𩐎也而況今之人乎注𩐎和也夫儒墨之師天下之難和者而無心者猶故和之而況其凡乎疏𩐎和也夫儒墨之師更相是非天下之難和者也而聖人君子猶能順而和之況乎令世之人非儒墨之師者也隨而化之不亦宜乎聖人處物不傷物注至順也疏處俗和光利而不害故不傷之也不傷物者物亦不能傷也注在我而已疏虛舟飄瓦大順羣生羣生樂推故處不害也唯無所傷者為能與人相將迎注無心故至順至順故能無所將迎而義冠於將迎也疏夫唯安任羣品彼我無傷者故能與物交際而明不迎而迎者山林與皋壤與使我欣欣然而樂與注山林皋壤未善於我而我便樂之此為無故而樂也樂未畢也哀又繼之注夫無故而樂亦無故而哀也則凡所樂不足樂凡所哀不足哀也疏凡情滯執忘生欣惡忽覩高山茂林神皋奧壤則欣然欽慕以為快樂而樂情未幾哀又繼之情隨事遷哀樂斯變此乃無故而樂無故而哀是知世之哀樂不足計也哀樂之來吾不能禦其去弗能止悲夫世人直為物逆旅耳注不能坐忘自得而為哀樂所寄也疏逆旅客舍也窮達之來不能禦扞哀樂之去不能禁止而凡俗之人不間斯趣譬彼客舍為物所停以妄為真深可悲歎也夫知遇而不知所不遇注知之所遇者即知之知之所不遇者即不知也知能能而不能所不能注所不能者不能強能也由此觀之知與不知能與不能制不出我也當付之自然耳疏夫智有明暗能有工拙各稟素分不可強為故分之所遇知則知之不遇者不能知也分之所能能則能之性之不能不可能也譬鳥飛魚泳蛛網蜣丸率之自然寧非性也無知無能者固人之所不免也注受生各有分也疏既非聖人未能智周萬物故知與不知能與不能稟生不同機關各異而流俗之人必固其所不免也夫務免乎人之所不免者豈不亦悲哉疏人之所不免者分外智能之事也而凡鄙之流不能安分故鋭意感情務在獨免愚惑之甚深可悲傷至言去言至為去為注皆自得也疏至理之言無言可言故去言也至理之為無為可為故去為也齊知之所知則淺矣注夫由知而後得者假學者耳故淺也疏見賢思齊捨己效物假學求理運知訪道此乃淺近豈曰深知矣南華真經注疏卷之二十四
