body:
  text: 南華真經注疏卷之二十七尺一河南郭象注唐西華法師成玄英疏雜篇則陽第二十五則陽遊於楚疏姓彭名陽字則陽魯人遊事諸侯後入楚欲事楚文王夷節言之於王王未之見疏姓夷名節楚臣也則陽欲事於楚故因夷節稱言於王王既貴重故猶未之見也夷節所進未遂故罷朝而歸家夷節歸彭陽見王果曰夫子何不談我於王疏王果楚之賢大夫也談猶稱説也本亦有作言談字者前因夷節未得見王後説王果冀其談薦也王果曰我不若公閲休疏若如也公閲休隱者之號也王果賢人嫌彭陽貪榮情速故盛稱隱者以抑其進趨之心也彭陽曰公閲休奚為者邪疏奚何也既稱公閲休言己不知故問何為庶聞所以曰冬則擉鱉于江夏則休乎山樊有過而問者曰此豫宅也注言此者以抑彭陽之進趨疏擉刺也樊傍也亦茂林也隆冬刺鱉於江渚以逍遙盛夏歸休偃茂林而取適既無環庶故指山傍而為舍此略陳閲休之事迹也夫夷節已不能而況我乎吾又不若夷節夫夷節之為人也無德而有知不自許以之神其交固顚冥乎富貴之地注言己不若夷節之好富貴能交結意盡形之任知以干上也疏顚冥猶迷沒也言夷節交遊堅固意在榮華顚倒迷惑情貪富貴實無真德而有俗知不能虛淡以從神而好任知以干上數數如此猶自不能況我守愚若為堪薦此是王果謙遜之辭也非相助以德相助消注苟進故德薄而名消疏消毁損也言則陽憑我談己於王者此適可敗壞名行必不益於盛德也夫凍者假衣於春暍者反冬乎冷風注言已順四時之施不能赴彭陽之急疏夫遭凍之人得衣則暖被暍之者遇水便活乃待陽和以解凍須寒風以救暍雖乖人事實順天時履道達人體無近惠不進彭陽其義亦爾夫楚王之為人也形尊而嚴其於罪也無赦如虎非夫佞人正德其孰能撓焉疏儀形有南面之尊威嚴據千乘之貴赫怒行毒猶如暴虎戮辱蒼生必無赦宥自非大佞之人不堪任使若履正懷德之士誰能屈撓心志而事之乎故聖人其窮也使家人忘其貧注淡然無欲樂足於所遇不以侈靡為貴而以道德為榮故其家人不識貧之可苦疏禦寇居鄭老萊在楚妻弩窮窶而樂在其內賢士尚然況乎真聖斯志貧也其達也使王公忘爵祿而化卑注輕爵祿而重道德超然坐忘不覺榮之在身故使王公失其所以為高疏韜光為窮顯迹為達哀公德友於尼父軒轅膝步於廣成斯皆道在則尊不拘品命故能使萬乘之王五等之君化其高貴之心而為卑下之行也其於物也與之為娛矣注不以為物自苦疏同塵涉事與物無私所造皆適故未嘗不樂也其於人也樂物之通而保己焉注通彼人不喪我疏混迹人間而無滯塞雖復通物而不喪我動不傷寂而常守於其真故或不言而飲人以和注人各自得斯飲和矣豈待言哉疏蔭庇群生冥同蒼昊中和之道各得其心滿腹而歸豈勞言教與人並立而使人化注望其風而靡之疏和光同塵斯並立也各反其真斯人化也父子之宜彼其乎歸居注使彼父父子子各歸其所疏雖復混同貴賤而倫序無虧故父子君臣各居其位無相參冒不亦宜乎而一間其所施注其所施同天地之德故間靜而不二疏所有施惠與四時合序未嘗不間暇從容動靜不二其於人心者若是其遠也疏聖人之用心其如上説是以知其清高深遠也故曰待公閲休注欲其釋楚王而從閲休將以靜泰之風鎮其動心也疏此總結也聖人達綢繆注所謂玄通疏綢繆結縛也夫達道聖人超然縣解體知物境空幻豈為塵網所羈閲休雖未極乎道故但託而説之也同盡一體矣注無外內而皆同照疏夫智周萬物窮理盡性物我不二故混同一體也而不知其然性也注不知其然而自然者非性如何疏能所相應境智冥合不知所以莫辨其所然故與真性符會復命搖作而以天為師注搖者自搖作者自作莫不復命而師其天然也疏反夫真根復於本命雖復搖動順物而作動靜無心合於天地故師於二儀也人則從而命之也注此非赴名而高其迹師性而動其迹自高故人不能下其名也疏命名也合道聖人本無名字為有清塵可慕故人從後而名之憂乎知而所行恆無幾時其有止也若之何注任知其行則憂患相繼疏任知為物憂患斯生心靈易奪所行無幾攀緣念慮寧有住時假令神禹無奈何生而美者人與之鑑不告則不知其美於人也注鑑鏡也鑑物無私故人美之今夫鑑者豈知鑑而鑑邪生而可鑑則人謂之鑑耳若人不相告則莫知其美於人譬之聖人人與之名疏鑑鏡也告語也夫生明照照物無私人愛慕之故名為鏡若人不相告語明鏡本亦無名此起譬也若知之若不知之若聞之若不聞之其可喜也終無已注夫鑑之可喜由其無情不問知與不知聞與不聞來即鑑之故終無已若鑑由聞知則有時而廢也疏已止也夫鏡之照物義在無情不問怨親照恆平等若不聞而不知鏡亦不照既有聞知鏡能照之斯則事涉間奪有時休廢矣焉能久照乎只為凝照無窮故為人之所喜好也人之好之亦無已性也注若性所不好豈能久照疏鏡之能照出自天然人之喜好率乎造物既非矯性所以無窮聖人之愛人也人與之名不告則不知其愛人也注聖人無愛若鏡耳然而事濟於物故人與之名若人不相告則莫知其愛人也疏聖人澤被蒼生恩流萬代物荷其德人與之名更相告語嘉號斯起不若然者豈有聖名乎若知之若不知之若聞之若不聞之其愛人也終無已注蕩然以百姓為芻狗而道合於愛人故能無己若愛之由乎聞知則有時而衰也疏夫聖德遐曠接物無私亭毒群生芻狗百姓豈待知聞而後愛之哉只為慈救無偏故德無窮已此合諭也人之安之亦無已性也注性之所安故能久疏安定也夫靜而與陰同德動而與陽同波故無心於動靜也故能疾雷破山而恆定大風振海而不驚斯率其真性者也若矯性偽情則有時而動矣故王弼云不性其情焉能久行其企舊國舊都望之暢然注得舊猶暢然況得性乎疏國都諭其真性也夫少失本邦流離他邑皈望桑梓暢然喜歡況喪道日淹逐末來久今既還原反本故曰暢然雖使丘陵草木之緡注緡合也入之者十九猶之暢然况見見聞聞者也注見所嘗見聞所嘗聞而猶暢然況體其性也疏緡合也舊國舊都荒廢日久丘陵險陋草木叢生入中相訪十人識九見所曾見聞所曾聞懷生之情暢然歡樂况喪道日久流沒生死忽然反本會彼真原皈其重玄之鄉見其至道之境其為樂也豈易言乎以十仞之臺縣衆間者也注衆之所習雖危猶間況聖人之無危疏七尺曰仞臺高七丈可謂危縣人衆數登遂不怖懼習以性成尚自寬間而况得真何往不安者也冉相氏得其環中以隨成注冉相氏古之聖王也居空以隨物物自成疏冉相氏三皇以前無為皇帝也環中之空也言古之聖王得真空之道體環中之妙故道順群生混成庶品與物無終無始無幾無時注忽然與之俱往疏無始無過去無終無未來也無幾無時無見在也體化合變與物俱往故無三時也日與物化者一不化者也注日與物化故常無我常無我故常不化也疏順於日新與物俱化者動而常寂故凝寂一道嶷然不化闔嘗舍之注言夫為者何不試舍其所為之乎疏闔何也言體空之人冥於造物千變萬化而與化俱往曷常暫相捨離也夫師天而不得師天注唯無所師乃得師天疏師者倣效之名天者自然之謂夫大塊造物率性而動若有心師學則乖於自然故不得也與物皆徇其以為事也若之何注雖師天猶未免於殉奚足事哉師天猶不足稱事況又不師邪疏徇者逐也求也夫有心倣效造化而與物俱往者此不率其本性也奚足以為修其事業乎尚有所求故是徇也夫師猶有稱徇況捨己逐物其如之何夫聖人未始有天未始有人未始有始未始有物疏夫得中聖人達於至理故能人天雙遣物我兩忘既曰無終何嘗有始率性合道不復師天與世偕行而不替所行之備而不洫其合之也若之何注都無乃冥合疏替廢也堙塞也混同人事與世並行接物隨時曾無廢闕然人間否泰備經之矣而未嘗堙塞所遇斯通無心師學自然合道如何效效方欲契真固不可也湯得其司御門尹登恆為之傳之注委之百官而不與焉疏姓門名尹且言門尹官號也姓登名恆殷湯聖人忘懷順物故得良臣御事既為師傅玄默端拱而不為也從師而不囿注任其自聚非囿之也縱其自散非解之也疏從任也囿聚也虛淡無為委任師傅終不積聚而為己功得其隨成為之司其名注司御之屬亦能隨物之自然也而湯得之所以名寄於物而功不在己疏良臣受委隨物而成推功司御名不在己之名嬴法得其兩見注名法者已過之迹耳非適足也故曰嬴然無心者寄治於群司則其名迹並見於彼疏嬴然無心也見顯也成物之名聖迹之法並是師傅而不與焉故名法二事俱顯於彼嬴然間放功成弗居也仲尼之盡慮為之傅之注仲尼曰天下何思何慮慮已盡矣若有纖芥之慮豈得寂然不動應感無窮以輔萬物之自然也疏傅輔也盡絶也孔丘聖人忘懷絶慮故能開化群品輔稟自然若藴纖芥有心豈能坐忘應感容成氏曰除日無歲注今所以有歲而存日者為有死生故也若無死無生則歲日之計除疏容成古之聖王也歲日者時序之名耳為計於時日故有生死生死無矣故歲日除焉無內無外注無彼我則無內外也疏內我也外物也為計死生故有內外歲日既遣物我何施魏瑩與田侯牟約田侯牟背之魏瑩怒將使人刺之疏瑩魏惠王名也田侯即齊威王也名牟桓公之子田恆之後故曰田侯齊魏二國約誓立盟不相征伐盟後未幾威王背之故魏侯瞋怒將使人刺而殺之其盟在齊威二十六年魏惠八年犀首聞而耻之曰君為萬乘之君也而以匹夫從讎疏犀首官號也如今虎賁之類公家之孫名衍為此官也諸侯之國革車萬乘故謂之君也匹夫者謂無官職夫妻相匹偶也從讎猶報讎也夫君人者一怒則伏尸流血今乃令匹夫行刺單使報讎非萬乘之事故可羞衍請受甲二十萬為君攻之虜其人民係其牛馬疏將軍孫衍請專命受鉞率領甲卒二十萬人攻其齊城必當獲勝於是虜掠百姓羈係牛馬緒勳酬賞分布軍人也使其君內熱發於背然後拔其國忌也出走然後抶其背折其脊疏姓田名忌齊將也抶折擊也國破人亡而懷恚怒故熱氣藴於心癰疽發於背也國既傾拔獲其主將於是擊抶其背打折腰脊旋師獻凱不亦快乎季子聞而耻之曰築十仞之城城者既十仞矣則又壞之此胥靡之所苦也疏季姓也昔者古之稱魏之賢臣也胥靡徒役人也季子懷道不用征伐聞犀首請兵羞而進諫夫七丈之城用功非少城就成矣無事壞之此乃徒役之人濫遭辛苦此起譬也今兵不起七年矣此王之基也衍亂人不可聽也疏干戈靜息已經七年偃武修文王者洪基犀首方為禍亂不可聽從華子聞而醜之曰善言伐齊者亂人也善言勿伐者亦亂人也謂伐之與不伐亂人也者又亂人也疏華姓子有德稱亦魏之賢臣也善巧言伐齊者謂興動千戈故是禍亂之人此公孫衍也善言勿伐者意在王之洪基勝於敵國有所解望故是亂人斯季子也謂伐與不伐亂人者未能忘言行道猶以是非為心故亦未勉於亂人此華子自道之辭也君曰然則若何疏華子遣蕩既深王不測其所以故問言旨意趣如何曰君求其道而已矣疏夫道清虛淡漠物我兼忘故勸求之庶其寡欲必能履道爭奪自消惠子聞之而見戴晉人疏戴晉人梁之賢者也姓戴字晉人惠施聞華子之清言猶恐魏王之未悟故引戴晉庶解所疑戴晉人曰有所謂蝸者君知之乎曰然注蝸至微而有兩角疏蝸者蟲名有類小螺也俗謂之黃犢亦謂之蝸牛有四角君知之不曰然魏王答云我識之矣有國於蝸之左角者曰觸氏有國於蝸之右角者曰蠻氏時相與爭地而戰伏尸數萬逐北旬有五日而後返注誠知所爭者若此之細也則天下無爭矣疏蝸之兩角二國存焉蠻氏頻相戰爭殺傷既其不少進退亦復淹時此起譬君曰噫其虛言與疏所言竒譎不近人情故發噫歎疑其不實也曰臣請為君實之疏必謂虛言請陳實録君以意在四方上下有窮乎疏君以意則四方上下有極不斯理物又質魏侯君曰無窮疏魏侯答云上下四方竟無窮已曰知遊心於無窮而反在通達之國注人迹所及為通達謂今四海之內也若存若亡乎疏人迹所接為通達也存有也亡無也遊心無極之中又比九州之內語其大小可謂如有如無也君曰然注今自以四海為大然計在無窮之中若有若無也疏然猶如此也謂所陳之語諫不虛也曰通達之中有魏疏謂魏國在四海之中於魏中有梁疏昔在河東國號為魏魏為強秦所逼徙都於梁梁從魏而有故曰魏中有梁也於梁中有王王與蠻氏有辨乎疏辨別也王之一國別於六合欲論大小如有如無與彼蠻氏有何差異此合譬也君曰無辨注王與蠻氏俱有限之物耳有限則不問大小俱不得與無窮者計也雖復天地共在無窮之中皆蔑如也況魏中之梁梁中之王而足爭哉疏自悟己之所爭與蝸角無别也客出而君惝然若有亡也注自悼所爭者細疏惝然悵恨貌也晉人言畢辭出而行君覺己非惝然悵恨心之悼矣恍然如失客出惠子見君曰客大人也聖人不足以當之疏聖人謂堯舜也晉人所談其理宏博堯舜之行不足以當惠子曰夫吹管也猶有嗃也吹劍首者吷而已矣堯舜人之所譽也道堯舜於戴晉人之前譬猶一吷也注曾不足聞疏嗃大聲吷小聲也夫吹竹管聲猶嗃大若吹劍環聲則微小唐堯俗中所譽若於晉人之前盛談斯道者亦何異乎吹劍吷聲曾無足可聞也孔子之楚舍於蟻丘之漿疏蟻丘丘名也漿賣漿水之家也仲尼適楚而為聘使路傍舍息於賣漿水之家其家住在丘下故以丘為名也其鄰有夫妻臣妾登極者子路曰是稯稯何為者邪疏極高也總總衆聚也孔一應聘門徒甚多卑馬威議驚異常故漿家鄰舍男女群聚共登賣漿觀視仲尼子路不識是以怪問仲尼曰是聖人僕也疏古者淑人君子均號聖人故孔子名宜僚為聖人也言臣妾登極聚衆多者是匝南宜僚之僕隸也是自埋於民注與民同自藏於畔注進不榮華退不枯稿疏混迹泥滓同塵氓俗不顯其德故自埋於民也進不榮華退不枯稿隱顯出處之際故自藏於畔也其聲銷注損其名也其志無窮注規是生也疏聲名也消滅也一榮辱故毁滅其名冥至道故以心無極其口雖言其心未嘗言注所言者皆世言疏口應人間心恆凝寂故不言而言言未嘗言方且與世違而心不屑與之俱注心與世異疏道與俗反固違於世虛心無纍不與物同此心迹俱異也是陸沈者也注人中隱者譬無水而沈也疏寂寥虛淡譬無水而沈謂陸沈也是其市南宜僚邪疏姓熊字宜僚居於市南故謂之市南宜僚也子路請往召之疏由聞宜僚陸沈賢士請往就舍召之孔子曰已矣疏已止也彼必不來幸止勿唤彼知丘之著於己也注著明也知丘之適楚也以丘為必使楚王之召己也彼且以丘為佞人也疏彼宜僚也著明也知丘明識宜僚是陸沈賢士又知適楚必向楚王薦召之如是則用丘為諂佞之人也夫若然者其於佞人也羞聞其言而况親見其身乎疏陸沈之人率性誠直其於邪佞耻聞其言況自視其形良非所願而何以為存注不如舍之以從其志疏而汝也存在也匿影消聲久當逃避汝何為召謂其猶在子路往視之其室虛矣注果逃去也疏仲由無鑑不用師言遂往其家庶觀盛德而辭聘情切宜僚己逃其屋虛矣長梧封人問子牢曰君為政焉勿鹵莽治民焉勿滅裂注鹵莽滅裂輕脫未略不盡其分疏長梧地名其地有長樹之梧因以名焉封人也即此地守疆之人子牢孔子弟子姓琴宋卿也為政行化也治民宰割也鹵莽不用心也滅裂輕薄也夫民為邦本本固則邦寧唯當用意養人亦不可輕爾搔擾封人有道故戒子牢昔豫為禾耕而鹵莽之則其實亦鹵莽而報豫藝而滅裂之其實亦滅裂而報豫疏為禾猶種禾也藝拔草也耕地不深鉏治不熟至秋收時嘉實不多皆由疏略故致斯報也豫來年變齊深其耕而熟耰之注功盡其分無為之至其禾蘩以滋豫終年厭飱疏變改也耕治也耰藝也去歲為田亟遭飢餒今年藝植改法深耕耕墾既深鉏耰而熟於是禾苗蘩茂子實滋榮寬歲足飱故其宜矣莊子聞之曰今人之治其形理其心多有似封人之所謂疏今世之人澆浮輕薄馳情欲境倦而不休至於治理心形例如封人所謂莊周聞此因而論之遁其天離其性滅其情亡其神以衆為注夫遁離滅亡以衆為之所致也若各至其極則何患也疏逃自然之理散淳和之性滅真實之情失養神之道者皆以徇逐分外多滯有為故也故鹵莽其性者欲惡之孽為性萑葦注萑葦害黍稷欲惡傷正性疏萑葦蘆也夫欲惡之心多為祅孽萑葦害黍稷欲惡傷真性皆由鹵莽浮偽故致其然也蒹葭始萌以扶吾形注扶疏則神氣暢疏蒹葭亦蘆也夫穢草初萌尚易除剪及扶疏盛茂必害黍稷亦猶欲心初萌尚易止息及其昏溺戒之在微故老子云其末非易謀也尋擢吾性注以欲惡引性不止於當疏尋引也擢拔也以欲惡之事誘引其心遂使拔擢真性不止於當也並潰漏發不擇所出漂疽疥癰內熱溲膏是也注此鹵莽之報也故治性者安可以不齊其至分疏潰漏人冷瘡也漂疽熱毒腫也癰亦疽之類也溲膏溺精也耽滯物境沒溺聲色故致精神昏亂形氣虛羸衆病發動不擇處所也柏矩學於老聃曰請之天下遊疏柏姓矩名懷道之士老子門人也請遊行宇內觀風化察物情也老聃曰已矣天下猶是也疏老子止之不許其往言天下物情與此處無别也又請之老聃曰汝將何始疏鄭重殷勤所請不已方問行李欲先往何邦曰始於齊疏柏矩魯人與齊相近齊人無道欲先行也至齊見辜人焉推而強之解朝服而幕之疏遊行至齊以觀風化忽見罪人刑戮而死於是推而強之令其正卧解取朝服幕而覆之號天而哭之曰子乎子乎天下有大災子獨先離之曰莫為盜莫為殺人注殺人大災謂自此以下事大災既有則雖戒以莫為其可得已乎疏離罹也災禍也號叫上天哀而大哭慜其枉濫故重曰子乎為盜殺人世間大禍子獨何罪先此遭罹大災之條具列於下又解所謂辜人則朝士是也言其強相推讓以被朝服重為羅網以羅黎元故告天哭之明災由斯起預張之網列在下文榮辱立然後覩所病注各自得則無榮辱得失紛紜故榮辱立榮辱立則夸其所謂辱而跂其所謂榮矣奔馳乎夸跂之間非病如何疏軒冕為榮戮耻為辱奔馳取捨非病如何貨財聚然後覩所爭注若以知足為富將何爭乎疏珍寶彌積馳競斯起今立人之所病聚人之所爭窮困人之身使無休時欲無至此得乎注上有所好則下不能安其本分疏賞之以軒冕玩之以珠璣遂便群品奔馳因而不止欲令各安本分其可得乎古之君人者以得為在民以失為在己注君莫之失則民自得矣疏推功於物故以得在民受國不祥故以失在己以正為在民以枉為在己注君莫之枉則民自正疏無為任物正在民也引過責躬枉在己也故一形有失其形者退而自責注夫物之形性何為而失哉皆由人君撓之以至斯患耳故自責疏夫人受氣不同稟分斯異令各任其能則物皆自得若有一物失所虧其形性者則引過歸己退而責躬昔殷湯自剪是也今則不然疏步驟殊時澆淳異世故今之馳物者則不復如此也匿為物而愚不識注返其性匿也用其性顯也故為物所顯則皆識疏所作憲章皆反物性藏匿罪名愚妄不識故罪名者衆也大為難而罪不敢注為物所易則皆敢疏法既難定行之不易故決定違者斯罪之也重為任而罰不勝注輕其所任則皆勝遠其塗而誅不至注適其足力則皆至疏力微事重而責其不勝路遠期促而罰其後至皆不可也民知力竭則以偽繼之注將以避誅罰也疏智力竭盡不免誅罰懼罰情急故繼之以偽日出多偽士民安取不偽注王日興偽士民何以得其真乎疏譎偽之風日日而出偽衆如草於何得真夫力不足則偽知不足則欺財不足則盜盜竊之行於誰責而可乎注當責上也疏夫知力窮竭譎偽必生賦斂益急貪盜斯起皆由主上無德法令滋彰夫能忘愛釋私不貴珍寶當責在上豈罪下民乎蘧伯玉行年六十而六十化注亦能順世而不係於彼我故也疏姓籧名瑗字伯玉衛之賢大夫也盛德高明照達空理故能與日俱新隨年變化未嘗不始於是之而卒詘之以非也注順物而暢物情之變然也疏初履之年謂之為是年既終謝謂之為非一歲之中而是非常出故始時之是終詘為非也未知今之所謂是之非五十九非也注物情之變未始有極疏故變為新以新為是故已謝矣以故為非然則去年之非於今成是今年之是來歲為非是知執是執非滯新執故者倒置之流也故容成氏曰除日無歲籧瑗達之故隨物化也萬物有乎生而莫見其根有乎出而莫見其門注無根無門忽爾自然故莫見也唯無其生亡其出者為能覩其門而測其根也疏隨變而生生無根原任化而出出無門户既曰無根無門故知無生無出生出無門理其如此何為歲之可像乎人皆尊其知之所知而莫知恃其知之所不知而後知可不謂大疑乎注我所不知物有知之者矣故用物之知則無所不知獨任我知知甚寡矣今不恃物以知而自尊知則物不告我非大疑如何疏所知者俗知也所不知者真知也流俗之人皆尊重分別知之鋭情取捨而莫能賴其分别之智以照真原可謂大疑惑之人也已乎已乎且無所逃注不能用彼則寄身無地疏已止也夫鋭情取捨不如休止必遭禍患無處逃形此所謂然與然乎注自謂然者天下未之然也疏各然其所然各可其所可彼我相對孰是孰非乎仲尼問於太史大韜伯常騫狶韋疏太史官號也下三人皆史官之姓名也所問之事次列下文曰夫衛靈公飲酒湛樂不聽國家之政田獵畢弋不應諸侯之際其所以為靈公者何邪疏畢大網也弋繩繫箭而射也庸猥之君淫聲嗜酒捕獵禽獸不聽國政會盟交際不赴諸侯汝等史官應須定諡無道如此何為諡靈大韜曰是因是也注靈即是無道之諡也疏依周公諡法亂而不損曰靈靈即無道之諡也此是因其無道諡之曰靈故曰是因是也伯常騫曰夫靈公有妻三人同濫而浴注男女同浴此無禮也史鰌奉御而進所搏幣而扶翼注以鰌為賢而奉御之勞故搏幣而扶翼之使其不得終禮此其所以為肅賢也幣者奉御之物疏濫浴器也姓史字魚衛之賢大夫也幣帛也又諡法德之精明曰靈男女同浴使賢人進御公見史魚良臣深懷愧悚遣人搏捉幣帛令扶將羽翼慰而送之使不終其禮敬賢如此便是明君故諡為靈靈則有道之諡其慢若彼之甚也見賢人若此其肅也是其所以為靈公也注欲以肅賢補其私慢靈有二義不可謂善故仲尼問焉疏男女同浴嬌慢之甚忽見賢人頓懷肅敬用為有道故諡靈也狶韋曰夫靈公也死卜葬於故墓不吉卜葬於沙丘而吉掘之數仞得石槨焉洗而視之有銘焉曰不馮其子靈公奪而埋之夫靈公之為靈也久矣注子謂蒯聵也言不馮其子靈公將奪汝處也夫物皆先有其命故來事可知也是以凡所為者不得不為凡所不為者不可得為而愚者以為之在己不亦妄乎之二人何足以識之注徒識已然之見事耳未知已然之出於自然也疏沙丘地名也在盟津河北子蒯聵也欲明人之名諡皆定於未兆非關物情而有升降故沙丘石槨先有其銘豈馮蒯聵方能奪葬史與常騫詎能識邪少知問於太公調疏智照狹劣謂之少知大大也公正也道德廣大公正無私復能調順群物故謂之太公調假設立人以論道理曰何謂丘里之言疏古者十家為丘二十家為里鄉閭丘里風俗不同故假問答以辨之也太公調曰丘里者合十姓百名而以為風俗也疏采其十姓取其百名合而論之以為風俗也合異以為同散同以為異今指馬之百體而不得馬而馬係於前者立其百體而謂之馬也疏如采丘里之言以為風俗斯合異以為同也一人設教隨方順物斯散同以為異也亦猶指馬百體頭尾腰脊無復是馬此散同以為異也而係於前見有馬此合異以為同也是故丘山積卑而為高江河合水而為大大人合并而為公注無私於天下則天下之風一也疏積土石以成丘山聚細流以成江海亦猶聖人無心隨物施教故能并合八方均一天下華夷共履遐邇無私是以自外入者有主而不執疏自從也謂聖人之教從外以入從中而出隨順物情故居主竟無所執也由中出者有正而不距注自外入者大人之化也由中出者民物之性也性各得正故民無違心化必至公故主無所執所以能合丘里而并天下一萬物而夷群異也疏由亦從也謂萬物黔黎各有正性率心而出稟受皇風既合物情故順而不距四時殊氣天不賜故歲成注殊氣自有故能常有若本無之而由天賜則有時而廢疏賜與也夫春暄夏暑秋涼冬寒稟之自然故歲敘成立若由天與之則有時而廢矣五官殊職君不私故國治注殊職自有其才故任之耳非私而與之疏五官謂古者法五行置官也春官秋官各有司職君王玄默委任無私故致宇內清夷國家寧泰也文武大人不賜故德備注文者自文武者自武非大人所賜也若由賜而能則有時而闕矣豈唯文武凡性皆然疏文相武將量才授職各任其能非聖與也無私於物故道德圓備萬物殊理道不私故無名疏夫群物不同率性差異或巢居穴處走地飛空而亭之毒之咸能自濟物各得理故無功也無名故無為無為而無不為注名止於實故無為實各自為故無不為疏功歸於物故為無為不執此為而無不為時有終始世有變化注故無心者斯順疏時謂四敘遞代循環世謂人事遷貿不定禍福淳淳注流行反覆疏淳淳流行貌夫天時寒暑流謝不常人情禍福何能久定故老子經云禍兮福所倚福兮禍所伏也至有所拂者而有所宜注於此為戾於彼或以為宜疏拂戾也夫物情向背蓋無定準故於此乖戾者或於彼為宜是以達道之人不執逆順也自殉殊面注各自信其所是不能離也疏殉逐也面向也夫彼此是非紛然固執故各逐己見而所向不同也有所正者有所差注正於此者或差於彼疏於此為正定者或於彼差邪此明物情顚倒殊向而然也比于大澤百材皆度注無棄材也疏比譬也度量也夫廣大臯澤林籟極多隨材量用必無棄擲大人取物其義亦然觀乎大山木石同壇注合異以為同也疏壇基也石有巨小木有粗細共聚大山而為基本此合異以為同也此之謂丘里之言注言於丘里則天下可知疏總結前義也少知曰然則謂之道足乎疏以道為名名道於理謂不足乎欲明至道無名故發斯問太公調曰不然今計物之數不止於萬而期曰萬物者以數之多者號而讀之也注夫有數之物猶不止於萬况無數之數謂道而足邪疏期限也號語也夫有形之物物乃無窮今世人語之限曰萬物者此舉其大經為言也亦猶虛道妙理本自無名據其功用強名為道名於理未足也是故天地者形之大者也陰陽者氣之大者也道者為之公注物得以通通物無私而強字之曰道疏天覆地載陰陽生育故形氣之中最大者也天道能通萬物亭毒蒼生施化無私故謂之公也因其大以號而讀之則可也注所謂道可道也疏大通有物生化群品語其始本實曰無名因其功號讀亦可也已有之矣乃將得比哉注名已有矣故乃將無可得而比邪疏因其功用已有道名不得將此有名比於無名之理以斯比擬去之迢遞則若以斯辨譬猶狗馬其不及遠矣注今名之辨無不及遠矣故謂道猶未足也必在乎無名無言之域而後至焉雖有名故莫之比也疏夫獨以狗馬一獸語而相比者非直大小有殊亦乃貴賤斯别也今以有名之道比無名之理者非直粗妙不同亦深淺斯異故不及遠也少知曰四方之內六合之裏萬物之所生惡起注問此者或謂道能生之疏六合之內天地之間萬物動植從何生起少知發問欲辨其原太公調曰陰陽相照相蓋相治四時相代相生相殺注言此皆其自爾非無所生疏夫三光相照二儀相蓋風雨相治炎涼相代春夏相生秋冬相殺豈關情慮物理自然也欲惡去就於是橋起雌雄片合於是庸有注凡此事故云為趨舍近起於陰陽之相照四時之相代也疏矯起貌也庸常也順則就而欲逆則惡而去言物在陰陽造化之中藴斯情慮開杜交合以此為常也安危相易禍福相生緩急相摩聚散以成疏夫逢泰則安遇否則危危則為禍安則為福緩者為壽急者為夭散則為死聚則為生凡此數事出乎造物相摩而成其猶四敘變易遷貿豈關情慮哉此名實之可紀精之可志也注過此已往至於自然自然之故誰知所以也疏志記也夫陰陽之內天地之間為實有名故可綱可紀假令精微猶可言記至於重玄妙理超絶形名故不可以言像求也隨序之相理橋運之相使窮則反終則始此物之所有注皆物之所有自然而然耳非無能有之也疏夫四敘循環更相治理五行運動遞相驅役物極則反終而復始物之所有理盡於斯言之所盡知之所至極物而已注物表無所復有故言知不過極物也疏夫真理玄妙絶於言知若以言詮辨運知思想道可極於有物而已固未能造於玄玄之境覩道之人不隨其所廢不原其所起注廢起皆自爾無所原隨也此議之所止注極於自爾故無所議疏覩見也隨逐也夫見道之人玄悟之士凝神物表寂照環中體萬境皆玄四生非有豈復留情物物而推逐發起之所由乎所謂之言語道斷議論休止者也少知曰季真之莫為接子之或使二家之議孰正於其情孰偏於其理注季真曰道莫為也接子曰道或使或使者有使物之功也疏季真接子並齊之賢人俱遊稷下故託二賢明於理莫無也使為也季真以無為為道接子謂道有為使物之功各執一家未為通論今少知問此以定臧否於素情妙理誰正誰偏者也太公調曰雞鳴犬吠是人之所知雖有大知不能以言讀其所自化又不能以意其所將為注物有自然非為之所能也由斯而觀季真之言當也疏夫目見耳聞雞嗚狗吠出乎造化愚智同知故雖大聖至知不能用意測其所為不能用言道其所以自然嗚吠豈道使之然是知接子之言於理未當斯而析之精至於無倫大至於不可圍注皆不為而自爾疏假令精微之物無有倫緒粗大之物不可圍量用此道理推而析之未有一法非自然獨化者也或之使莫之為未免於物而終以為過注物有相使亦皆自爾故莫之為者未為非物也凡物云云皆由莫為而過去疏不合於道故未免於物各滯一邊故卒為過患也或使則實注實自使之疏滯有為也莫為則虛注無使之也疏溺無故也有名有實是物之居注指名實之所在無名無實在物之虛注物之所在其實至虛疏夫情苟滯於有則所在皆物也情苟尚無則所在皆虛也是知有無在心不在乎境可言可意言而愈疏注故求之於言意之表而後至焉疏夫可以言詮可以意察者去道彌疏遠也故當求之於言意之表而後至焉未生不可忌注突然自生制不由我我不能禁已死不可阻注忽然自死吾不能違疏忌禁也阻礙也突然而生不可禁忌忽然而死有何礙阻唯當隨變任化所在而安字亦有作沮者怨也處順而死故不怨喪也死生非遠也理不可覩注近在身中猶莫見其自爾而欲憂之疏勞息聚散近在一身其理窈冥愚人不見或之使莫之為疑之所假注此二者世所至疑也疏有無二執非達者之心疑惑之人情偏乃為議論之也吾觀之本其往無窮吾求之末其來無止無窮無止言之無也與物同理注物理無窮故知言無窮然後與物同理也疏本過去也末未來也過去已往生化無窮莫測根原焉可意致假令盛談無有既其偏滯未免於物故與物同於一理也或使莫為言之本也與物終始注恆不為而自使然也疏本猶始各執一邊以為根本者猶未免於本末也故與有物同於始斯離於物也道不可有有不可無注道故不能使有而有者常自然也疏夫至道不絶非有非無故執有執無二俱不可也道之為名所假而行注物所由而行故假名之曰道疏道大無名強名曰道假此名教動而行之也或使莫為在物一曲夫胡為於大方注舉一隅便可知疏胡何也方道也或使莫為未階虛妙斯乃俗中一物偏曲之人何足以造重玄語乎大道言而足則終日言而盡道注求道於言意之表則足言而不足則終日言而盡物注不能忘言而存意則不足疏足圓遍也不足偏滯也苟能忘言會理故曰言未嘗言盡合玄道也如其執言不能契理既乖虛通之道故盡是滯礙之物也道物之極言默不足以載注天道物之極常莫為而自爾不在言與不言疏道物極處非道非物故言默不能盡載之非言非默議有所極注極於自爾非言默而議之也疏默非默議非議唯當索之於四句之外而後造於衆妙之門也南華真經注疏卷之二十七
