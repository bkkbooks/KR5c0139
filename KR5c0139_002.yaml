body:
  text: 南華真經注疏卷之二福二河南郭象注唐西華法師成玄英疏內篇齊物論第二夫自是而非彼美己而惡人物莫不皆然然故是非雖異而彼我均也南郭子綦隱几而坐仰天而噓嗒焉似喪其耦注同天人均彼我故外無與為歡而嗒焉解體若失其配匹疏楚昭王之庶弟楚莊王之司馬字子綦古人淳質多以居處為號居於南郭故號南郭亦猶市南宜僚東郭順子之類其人懷道抱德虛心忘淡故莊子羡其清高而託為論首隱憑也噓歎也嗒焉解釋貌耦匹也為身與神為匹物與我耦也子綦憑几坐忘凝神遐想仰天而歎妙悟自然離形去智嗒焉隳體身心俱遣物我兼忘故若喪其匹耦也顔成子遊立侍乎前曰何居乎形固可使如稿木而心固可使如死灰乎注死灰稿木取其寂寞無情耳夫任自然而忘是非者其體中獨任天真而已又何所有哉故止若立枯木動若運枯枝坐若死灰行若遊塵動止之容吾所不能一也其於無心而自得吾所不能二也疏姓顔名偃字子遊居安處也方欲請益故起而立侍如何安處神識凝寂頓異從來遂使形將稿木而不殊心與死灰而無别必有妙術請示所由今之隱几者非昔之隱几者也注子遊常見隱几者而未有若子綦也疏子遊昔見坐忘未盡玄妙今逢隱几實異曩時怪其寂泊無情故發驚疑之旨子綦曰偃不亦善乎而問之也今者吾喪我汝知之乎注吾喪我我自忘矣我自忘矣天下有何物足識哉故都忘外內然後超然俱得疏而由汝也喪由忘也許其所問故言不亦善乎而子綦境智兩忘物我雙絶子遊不悟而以驚疑故示隱几之能汝頗知不汝聞人籟而未聞地籟汝聞地籟而未聞天籟夫注籟簫也夫簫管參差宫商異律故有短長高下萬殊之聲聲雖萬殊而所稟之度一也然則優劣無所錯其間矣況之風物異音同是而咸自取焉則天地之籟見矣疏人籟簫也長一尺二寸十六管象鳳翅舜作也夫簫管參差所受各足況之風物咸稟自然故寄此二賢以明三籟之義釋在下文子遊曰敢問其方疏方道術也雖聞其名未解其義故請三籟其術如何子綦曰夫大塊噫氣其名為風注大塊者無物也夫噫氣者豈有物哉氣塊然而自噫耳物之生也莫不塊然而自生則塊然之體大矣故遂以大塊為名疏大塊者造物之名亦自然之稱也言自然之理通生萬物不知所以然而然大塊之中噫而出氣仍名此氣而為風也是唯無作作則萬竅怒呺注言風唯無作作則萬竅皆怒動而為聲也疏是者指此風也作起也言此大風唯當不起若其動作則萬殊之穴皆鼓怒呺叫也而獨不聞之翏翏乎注長風之聲山林之畏佳注大風之所扇動也疏翏翏長風之聲畏佳扇動之貌而翏翏清吹擊蕩山林遂使樹木枝條畏佳扇動世皆共覩汝獨不聞之耶下文云大木百圍之竅穴似鼻似口似耳似枅似圈似臼似窪者似污者注此略舉衆竅之所似疏竅穴樹孔也枅柱頭木也今之斗㭼是也圈畜獸闌也木既百圍穴亦竒衆故或似人之口鼻或似獸之闌圈或似人之耳孔或似舍之枅㭼或窪曲而擁腫或污下而不平形勢無窮略陳此八事亦由世間萬物種類不同或醜或妍蓋稟之造化激者謞者叱者吸者叫者譹者宎者咬者注此略舉衆竅之聲殊疏激者如水湍激聲也謞者如箭鏃頭孔聲叱者咄聲也吸者如呼吸聲也叫者如叫呼聲也譹者哭聲也宎者深也若深谷然咬者哀切聲也略舉樹穴即有八種風吹木竅還作八聲亦由人稟分不同種種差異率性而動莫不均齊假令小大夭壽未足以相傾前者唱于而隨者唱喁泠風則小和飄風則大和注夫聲之宫商雖千變萬化唱和大小莫不稱其所受而各當其分疏泠小風也飄大風也于喁皆是風吹樹動前後相隨之聲也故泠清風和聲即小暴疾飄風和聲即大各稱所受曾無勝劣以况萬物稟氣自然厲風濟則衆竅為虛注濟止也烈風作則衆竅實及其止則衆竅虛虛實雖異其於各得則同疏厲大也列也濟止也言大風止則衆竅虛及其動則衆竅實虛實雖異各得則同耳况四序盈虛二儀生殺既無心於亭毒豈有意於虔劉而獨不見之調調之刁刁乎注調調刁刁動搖貌也言物聲既異而形之動搖亦又不同也動雖不同其得齊一耳豈調調獨是而刁刁獨非乎疏而汝也調調刁刁動搖之貌也言物形既異動亦不同雖有調刁之殊而終無是非之異況盈虛聚散生死窮通物理自然不得不爾豈有是非臧否於其間哉子遊曰地籟則衆竅是已人籟則比竹是己敢問天籟疏地籟則竅穴之徒人籟則簫管之類並皆眼見此則可知唯天籟深玄卒難頓悟敢陳庸昧請決所疑子綦曰夫吹萬不同而使其自己也注此天籟也夫天籟者豈復别有一物哉即衆竅比竹之屬接乎有生之類會而共成一天耳無既無矣則不能生有有之未生又不能為生然則生生者誰哉塊然而自生耳自生耳非我生也我既不能生物物亦不能生我則我自然矣自己而然則謂之天然天然耳非為也故以天言之以天言之所以明其自然也豈蒼蒼之謂哉而或者謂天籟役物使從己也夫天且不能自有況能有物哉故天也者萬物之總名也莫適為天誰主役物乎故物各自生而無所出焉此天道也疏夫天者萬物之總名自然之别稱豈蒼蒼之謂哉故夫天籟者豈别有一物邪即此竹衆竅接乎有生之類是爾尋夫生生者誰乎蓋無物也故外不待乎物內不資乎我塊然而生獨化者也是以郭注云自己而然則謂之天然故以天然言之者所以明其自然也而言吹萬不同且風唯一體竅乃萬殊雖復大小不同而各稱所受咸率自知豈藉他哉此天籟也故知春生夏長目視耳聽近取諸身遠託諸物皆不知其所以悉莫辨其所然使其自己當分各足率性而動不由心智所謂亭之毒之此天籟之大意者也咸其自取怒者其誰邪注物皆自得之耳誰主怒之使然哉此重明天籟也疏自取由自得也言風竅不同形聲乃異至於各自取足未始不齊而怒動為聲誰使之然也欲明群生糾紛萬象參差分內自取未嘗不足或飛或走誰取其然故知鼓之怒之莫知其宰此則重明天籟之義者也大知間間小知間間注此蓋知之不同疏間間寬裕也間間分别也夫智惠寬大之人率性虛淡無是無非小智狹劣之人性靈褊促有取有捨故間隔而分别無是無非故間暇而寬裕也大言炎炎小言詹詹注此蓋言語之異疏炎炎猛烈也詹詹詞費也夫詮理大言由如猛火炎燎原野清蕩無遺儒墨小言滯於競辨徒有詞費無益教方其寐也魂交其覺也形開注此蓋寤寐之異疏凡鄙之人心靈馳躁耽滯前境無得暫停故其夢寐也魂神妄緣而交接其覺悟也則形質開朗而取染也與接為構日以心鬥縵者窖者密者注此蓋交接之異疏構合也窖深也今穴地藏穀是也密隱也交接世事構合根塵妄心既重渴日不足故惜彼寸陰心與日鬥也其運心逐境情性萬殊略而言之有些三别也小恐惴惴大恐縵縵注此蓋恐悸之異疏惴惴怵惕也縵縵沮喪也夫境有違從而心恆憂度慮其不遂恐懼交懷是以小恐惴慓而怵惕大恐寬暇而沮喪也其發若機栝其司是非之謂也疏機弩牙也栝箭括也司主也言發心逐境速如箭栝役情拒害猛若弩牙唯主意是非更無他謂也其留如詛盟其守勝之謂也注此蓋動止之異疏詛祝也盟誓也言役意是非由如祝詛留心取境不異誓盟堅守確乎情在勝物其殺如秋冬以言其日消也注其衰殺日消有如此者疏夫素秋搖落玄冬肅殺物景貿遷驟如交臂愚惑之類豈能覺邪唯爭虛妄是非詎知日新消毁人之衰老其狀例然其溺之所為之不可使復之也注其溺而遂往有如此者疏滯溺於境其來已久所為之事背道乖真欲使復命遺原無由可致其厭也如緘以言其老洫也注其厭沒於欲老而愈洫有如此者疏厭沒溺也顚倒之流厭沒於欲惑情堅固有類緘繩豈唯壯年縱恣抑乃老而愈洫近死之心莫使復陽也注其利患輕禍陰結遂志有如此者疏莫無也陽生也耽滯之心鄰乎死地欲使反於生道無由得之喜怒哀樂慮歎變慹姚佚啓態注此蓋性情之異者疏凡品愚迷則執違順順則喜樂違則哀怒然哀樂則重喜怒則輕故喜則心生歡悅樂則形於舞抃怒則當時瞋恨哀則舉體悲號慮則所度未來歎則咨嗟已往變則改易舊事慹則屈伏不伸姚則輕浮躁動佚則奢華縱放啓則開張情欲態則嬌淫妖冶衆生心識變轉無窮略而言之有此十二審而察之物情斯見矣樂出虛蒸成菌注此蓋事變之異也自此以上略舉天籟之無方自此以下明無方之自然也物各自然不知所以然而然則形雖彌異其然彌同也疏夫簫管內虛故能出於雅樂濕暑氣蒸故能生成朝菌亦猶二儀萬物虛假不真從無生有例如菌樂浮幻若是喜怒何施日夜相代乎前而莫知其所萌注日夜相代代故以新也夫天地萬物變化日新與時俱往何物萌之哉自然而然耳疏日晝月夜輪轉循環更相遞代互為前後推求根緒莫知其狀者也已乎己乎曰一暮得此其所由以生乎注言其自生疏已止也推求日夜前後難知起心虞度不如止息又重推旦暮覆察昏明亦莫測其所由固不知其端緒欲明世間萬法虛妄不真推求生死即體皆寂故老經云迎之不見其首隨之而不見其後理由若此非彼無我非我無所取是亦近矣注彼自然也自然生我我自然生故自然者即我之自然豈遠之哉疏彼自然也取稟受也若非自然誰能生我若無有我誰稟自然乎然我則自然自然則我其理非遠故曰是亦近矣而不知其所為使注凡物云云皆自爾耳非相為使也故任之而理自至矣疏言我稟受自然其理已具足行手捉耳聽目視功能御用各有司存亭之毒之非相為使無勞措意直置任之若有真宰而特不得其眹注萬物萬情趣舍不同若有真宰使之然也起索真宰之眹迹而亦終不得則明物皆自然無使物然也疏夫肢體不同而御用各異似有真性竟無宰主眹迹攸肇從何而有可行己信注今夫行者信己可得行也疏信己而用可意而行天機自張率性而動自濟自足豈假物哉而不見其形注不見所以得行之形疏物皆信己而行不見信可行之貌者也有情而無形注情當其物故形不别見也疏有可行之情智無信己之形質百骸九竅六藏賅而存焉注付之自然而莫不皆存也疏百骸百骨節也九竅謂眼耳鼻舌口及下二漏也六藏六腑也謂大腸小腸膀胱三焦也藏謂五臟肝心脾肺腎也賅備也言體骨在外藏腑在內竅通內外備此三事以成一身故言存吾誰與為親注直自存耳汝皆悅之乎其有私焉注皆悅之則是所私也有私則不能賅而存矣故不悅而自存不為而自生也疏言夫六根九竅俱是一身豈有親疏私存愛悅若有心愛悅便是有私身而私之理在不可莫不任置自有司存於身既然在物亦爾如是皆有為臣妾乎注若皆私之則志過其分上下相冒而莫為臣妾矣臣妾之才而不安臣妾之任則失矣故知君臣上下手足外內乃天理自然豈直人之所為哉疏臣妾者士女之賤職也且人之一身亦有君臣之别至如見色則目為君而耳為臣行步則足為君手為臣也斯乃出自天理豈人之所為乎非關係意親疏故為君臣也郭注云時之所賢者為君才不應世者為臣治國治身內外無異其臣妾不足以相治乎注夫臣妾但各當其分耳未為不足以相治也相治者若手足耳目四肢百體各有所司而更相御用也疏夫臣妾御用各有職司知手執腳行當分自足豈為手之不足而腳為行乎蓋天幾自張無心相為而治理之也舉比手足諸事可知也其遞相為君臣乎注夫時之所賢者為君才不應世者為臣若天之自高地之自卑首自在上足自居下豈有遞哉雖無錯於當而必自當也疏夫首自在上足自居下目能視色耳能聽聲而用捨有時故有貴賤豈措情於上下而遞代為君臣乎但任置無心而必自當也其有真君存焉注任之而自爾則非偽也疏直置忘懷無勞措意此即真君妙道存乎其中矣又解真君即前之真宰也言取捨之心青黃等色本無自性緣合而成不自不他非無非有故假設疑問以明無有真君也如求得其情與不得無益損乎其真注凡得真性用其自為者雖復皂隸猶不顧毁譽而自安其業故知與不知皆自若也若乃開希幸之路以下冒上物喪其真人忘其本則毁譽之間俯仰失錯也疏夫心境相感欲染斯興是以求得稱情即謂之為益如其不得即謂之為損斯言凡情迷執有得喪以攖心道智觀之無損益於其真性者也一受其成形不亡以待盡注言性各有分故知者守知以待終而愚者抱愚以至死豈有能中易其性者也疏夫稟受形性各有涯量不可改愚以為智安得易醜以為妍是故形性一成終不中途亡失適可守其分內待盡天年矣與物相刃相靡其行盡如馳而莫之能止不亦悲乎注群品云云逆順相交各信其偏見而恣其所行莫能自反此比衆人之所悲者亦可悲矣而衆人未嘗以此為悲者性然故也物各性然又何物足悲哉疏刃逆也靡順也群品云云鋭情逐境境既有逆有順心便執是執非行有終年遠如馳驟唯知貪境曾無止息格量物理深可悲傷終身役役而不見其成功注夫物情無極知足者鮮故得此不止復逐於彼皆疲役終身未厭其志死而後已故其成功者無時可見也疏夫物浮競知足者稀故得此不休復逐於彼所以終身疲役沒命貪殘持影繫風功成何日薾然疲役而不知其所歸可不哀邪注凡物各以所好役其形骸至于疲困薾然不知所以好此之歸趣云何也疏薾然疲頓貌也而所好情篤勞役心靈形魂歸弊薾然困苦直以信心好此貪競責其意謂亦不知所歸愚癡之甚深可哀歎人謂之不死奚益注言其實與死同疏奚何也耽滯如斯困而不已有損行業無益神氣可謂雖生之日猶死之年也其形化其心與之然可不謂大哀乎注言其心形並馳困而不反比於凡人所哀則此真哀之大也然凡人未嘗以此為哀則凡所哀者不足哀也疏然由知此也念念遷移新新流謝其化而為老心識隨而昏昧形神俱變故謂與之然世之悲哀莫此甚也人之生也固若是芒乎其我獨芒而人亦有不芒者乎注凡此上事皆不知其所以然而然故曰芒也今夫知者皆不知所以知而自知矣生者不知所以生而自生矣萬物雖異至於生不由知則未有不同者也故天下莫不芒也疏芒昧暗也言凡人在生芒昧如是舉世皆惑豈有一人不昧者而莊子體道真人智用明達俯同塵俗故云而我獨芒郭注稍乖今不依用夫隨其成心而師之誰獨且無師乎注夫心之足以制一身之用者謂之成心人自師其成心則人各自有師矣人各自有師故付之而自當疏夫域情滯著執一家之偏見者謂之成心夫隨順封執之心師之以為準的世皆如此故誰獨無師乎奚必知代而心自取者有之愚者與有焉注夫以成代不成非知也心自得耳故愚者亦師其成心未肯用其所謂短而舍其所謂長者也疏愚惑之類堅執是非何必知他理長代己之短唯欲斥他為短自取為長如此之人處處皆有愚癡之輩先豫其中未成乎心而有是非是今日適越而昔至也注今日適越昨日何由至哉未成乎心是非何由生哉明夫是非者群品之所不能無故至人兩順之疏吳越路遙必須積旬方達今朝發途昨日何由至哉欲明是非彼我生自妄心言心必也未生是非從何而有故先分别而後是非先造途而後至越是以無有為有無有為有雖有神禹且不能知吾獨且奈何哉注理無是非而或者以為有此以無有為有也惑心已成雖聖人不能解故付之自若而不強知也疏夏禹字文命鯀子啓父也諡法泉源流通曰禹又云受襌成功曰禹理無是非而惑者為有此用無有為有也迷執日久惑心已成雖有大禹神人亦不令其解悟莊生深懷慈救獨奈之何故付之之自若不強知之者也夫言非吹也言者有言注各有所説故異於吹疏夫名言之與風吹皆是聲法而言者必有詮辨故曰有言其所言者特未定也注我以為是而彼以為非彼之所是我又非之故未定也未定也者由彼我之情偏疏雖有此言異於風吹而咸言我是僉曰彼非既彼我情偏故獨未定者也果有言邪注以為有言邪然未足以有所定其未嘗有言邪注以為無言邪則據已已有言疏果決定也此以為是彼以為非此以為非而彼以為是既而是非不定言何所詮故不足稱定有言也然彼此偏見各執是非據己所言故不可以為無言也其以為異於鷇音亦有辨乎其無辨乎注夫言與鷇音其致一也有辨無辨誠未可定也天下之情不必同而所言不能異故是非紛紜莫知所定疏辨别也鳥子欲出卵中而嗚謂之鷇音也言亦帶殼曰殼夫彼此偏執不定是非亦何異鷇鳥之音有聲無辨故將言説異於鷇音者恐未足以為别者也道惡乎隱而有真偽疏惡乎謂於何也虛通至道非真非偽於何逃匿而真偽生焉言惡乎隱而有是非注道焉不在言何隱蔽而有真偽是非之名紛然而起疏至教至言非非非是於何隱蔽有是有非者哉道惡乎往而不存注皆存疏存在也陶鑄生靈周行不殆道無不偏于何不在乎所以在偽在真而非真非偽也言惡乎存而不可注皆可疏玄道真言隋物生殺何往不可而言隱邪故可是可非而非非非是者也道隱於小成疏小成者謂仁義五德小道而有所成得者謂之小成也世薄時澆唯行仁義不能行於大道故言道隱於小成而道不可隱也故老君云大道廢有仁義言隱於榮華注夫小成榮華自隱於道而道不可隱則真偽是非者行於榮華而止於實當見於小成而滅於大全也疏榮華者謂浮辨辭華美之言也只為滯於華辨所以蔽隱至言所以老君經云信言不美美言不信故有儒墨之是非疏昔有鄭人名緩學於求氏之地三年藝成而化為儒儒者祖述堯舜憲章文武行仁義之道辨尊卑之位故謂之儒也緩弟名翟緩化其弟遂成於墨墨者禹道也尚賢崇禮儉以兼愛摩頂至踵以救蒼生此謂之墨也而緩翟二人親則兄弟各執一教更相是非緩恨其弟感激而死然彼我是非其來久矣爭競之甚起自二賢故指此二賢為亂群之帥是知道喪言隱方督是非以是其所非而非其所是注儒墨更相是非而天下皆儒墨也故百家並起各私所見而未始出其方也疏天下莫不自以為是以彼為非彼亦與汝為非自以為是故各用己是是彼非各用己非非彼是欲是其所非而非其所是則莫若以明注夫有是有非者儒墨之所是也無是無非者儒墨之所非也今欲是儒墨之所非而非儒墨之所是者乃欲明無是無非也欲明無是無非則莫若還以儒墨反覆相明反覆相明則所是者非是而所非者非非矣非非則無非非是則無是疏世皆以他為非用己為是今欲翻非作是翻是作非者無過還用彼我反覆相明反覆相明則所非者非非則無非所是者非是則無是無是則無非故知是非皆虛妄耳物無非彼物無非是注物皆自是故無非是物皆相彼故無非彼無非彼則天下無是矣無非是則天下無彼矣無彼無是所以玄同也疏注曰物皆自是故無非是物皆相彼故無非彼無非彼也則天下無是矣無非是也則天下無彼矣無彼無是所以玄同此注理盡無勞别釋自彼則不見自知則知之疏自為彼所彼此則不自見自知己為是便則知之物之有偏也例皆如是若審能見他見自故無是無非也故曰彼出於是是亦因彼注夫物之偏也皆不見彼之所見而獨自知其所知自知其所知則自以為是自以為是則以彼為非矣故曰彼出於是是亦因彼彼是相因而生者也疏夫彼對於此是待於非文豕之大體也今言彼出於是者言約理微舉彼角勢也欲示舉彼明此舉是明非也而彼此是非相因而有推求分析即體皆空也彼是方生之説也雖然方生方死方死方生方可方不可方不可方可因是因非因非因是注夫死生之變猶春秋冬夏四時行耳故死生之狀雖異其於各安所遇一也今生者方自謂生為生而死者方自謂生為死則無生矣生者方自謂死為死而死者方自謂死為生則無死矣無生無死無可無不可故儒墨之辨吾所不能同也至於各冥其分吾所不能異也疏方方將也言彼此是非無異生死之説也夫生死交謝由寒暑之遞遷而生者以生為生死者將生為死亦如是者以是為是而非者以是為非故知因是而非因非而是因非而是則無是矣因是而非則無非矣是以無是無非無生無死無可無不可何彼此之論乎是以聖人不由而照之于天亦因是也注夫懷豁者因天下之是非而自無是非也故不由是非之途而是非無患不當者直明其天然而無所奪故也疏天自然也聖人達悟不由是得非直置虛凝照以自然之智只因此是非而得無非無是終不奪有而别證無是亦彼也注我亦為彼所彼彼亦是也注彼亦自以為是疏我自以為是亦為彼之所非我以彼為非而彼亦以自為是也彼亦一是非此亦一是非注此亦自是而非彼彼亦自是而非此此與彼各有一是一非於體中也疏此既自是彼亦自是此既非彼彼亦非此故各有一是各有一非也果且有彼是乎哉果且無彼是乎哉注今欲謂彼為彼而彼復自是欲謂是為是而是復為彼所彼故復是有無未果定也疏夫彼此是非相待而立反覆推討舉體浮虛自以為是此則不無為彼所彼此則不有有無彼此未可決定彼是莫得其偶謂之道樞注偶對也彼是相對而聖人兩順之故無心者與物冥而未嘗有對於天下也此居其樞要而會其玄極以應夫無方也疏偶對也樞要也體夫彼此俱空是非兩幻凝神獨見而無對於天下者可謂會其玄極得道樞要也前則假問有無待奪不定此則重明彼此當體自空前淺後深所以為次也樞始得其環中以應無窮注夫是非反覆相尋無窮故謂之環環中空矣今以是非為環而得其中者無是無非也無是無非故能應夫是非是非無窮故應亦無窮疏夫絶待獨化道之本始為學之要故謂之樞環者假有二竅中者真空一道環中空矣以明無是無非是非無窮故應亦無窮也是亦一無窮非亦一無窮也注天下莫不自是而莫不相非故一是一非兩行無窮唯涉空得中者曠然無懷乘之以遊也疏夫物莫不自是故是亦一無窮莫不相非故非亦一無窮唯彼我兩忘是非雙遣而得環中之道者故能大順蒼生乘之遊也故曰莫若以明以指喻指之非指不若以非指喻指之非指也以馬喻馬之非馬不若以非馬喻馬之非馬也疏指手指也馬戲籌也喻比也言人是非各執彼我異情故用己指比他指即用他指為非指復將他指比汝指汝指於他指覆為非指矣指義既爾馬亦如之所以諸法之中獨舉指者欲明近取諸身切要無過於指遠託諸物勝負莫先於馬故舉二事以況是非天地一指也萬物一馬也注夫自是而非彼彼我之常情也故以我指喻彼指則彼指於我指獨為非指矣此以指喻指之非指也若復以彼指還喻我指則我指於彼指復為非指矣此以非指喻指之非指也將明無是無非莫若反覆相喻反覆相喻則彼之與我既同於自是又均於相非均於相非則天下無是同於自是則天下無非何以明其然邪是若果是則天下不得復有非之者也非若果非亦不得復有是之者也今是非無主紛然殽亂明此區區者各信其偏見而同於一致耳仰觀俯察莫不皆然是以至人知天地一指也萬物一馬也故浩然大寧而天地萬物各當其分同於自得而無是無非也疏天地雖大一指可以蔽之萬物雖多一馬可以理盡何以知其然邪今以彼我是非反覆相喻則所是者非是所非者非非故知二儀萬物無是無非者也可乎可注可於己者即謂之可不可乎不可注不可於已者即謂之不可疏夫理無是非而物有違順故順其意者則謂之可乖其情者則謂之不可違順既空故知可不可皆妄也道行之而成注無不成也疏大道曠蕩亭毒含靈周行萬物無不成就故在可成於可而不當於可在不可成不可亦不當於不可也物謂之而然注無不然也疏物情顚倒不達違從虛計是非妄為然不惡乎然然於然惡乎不然不然於不然疏心境兩空物我雙幻於何而有然法遂執為然於何不然為不然也物固有所然物固有所可注各然其所然各可其所可疏物情執滯觸境皆迷必固為有然必固謂有可豈知可則不可然則不然耶無物不然無物不可疏群品云云各私所見皆然其所然可其所可故為是舉莛與楹厲與西施恢脆譎怪道通為一注夫莛橫而楹縱厲醜而西施好所謂齊者豈必齊形狀同規矩哉故舉縱橫好醜恢恑譎怪各然其所然各可其所可則理雖萬殊而性同得故曰道通為一也疏為是義故略舉八事以破之莛屋梁也楹舍柱也厲病醜人也西施吳王美姬也恢者寬大之名恑者竒變之稱譎者矯詐之心怪者妖異之物夫縱橫美惡物見所以萬殊恢譎竒異世情用之為傾側故有是非不可迷執其分今以玄道觀之本來無二是以妍醜之狀萬殊自得之情惟一故曰道通為一也其分也成也注夫物或此以為散而彼以為成疏夫物或於此為散於彼為成欲明聚散無恆不可定執此則於不二之理更舉論端者也其成也毁也注我之所謂成而彼或謂之毁疏或於此為成於彼為毁物之涉用有此不同則散毛成氈伐木為舍等也凡物無成與毁復通為一注夫成毁者生於自見而不見彼也故無成與毁猶無是與非也疏夫成毁是非生於偏滯者也既成毁不定是非無主故無成毁通而一之唯達者知通為一為是不用而寓諸庸疏寓寄也庸用也唯當達道之夫凝神玄鑒故能去彼二偏通而為一為是義故成功不處用而忘用寄用群才也庸也者用也用也者通也通也者得也注夫達者無滯於一方故忽然自忘而寄當於自用自用者莫不條暢而自得也疏夫有夫至功而推功於物馳馭億兆而寄用群才者其惟聖人乎是以應感無心靈通不滯可謂冥真體道得玄珠於赤水者也適得而幾矣注幾盡也至理盡於自得也疏幾盡也夫得者內不資於我外不資於物無思無為絶學絶待適爾而得蓋無所由與理相應故能盡妙也因是已注達者因而不作疏夫達道之士無作無心故能因是非而無是非循彼我而無彼我我因循而已豈措情哉己而不知其然謂之道注夫達者之因是豈知因為善而因之哉不知所以因而自因耳故謂之道也疏已而者仍前生後之辭也夫至人無心有感斯應譬彼明鏡方兹虛谷因循萬物影響蒼生不知所以然不知所以應豈有情於臧否而係於利害者乎以法因人可謂自然之道也勞神明為一而不知其同也疏夫玄道妙一常湛以然非由心智謀度而後不二而愚者勞役神明邂逅言辨而求一者與彼不一無一異矣不足類也不知至理理自混同豈俟措心方稱不二耶謂之朝三疏此起譬也何謂朝三狙公賦芧曰朝三而暮四衆狙皆怒曰然則朝四而暮三衆狙皆悅名實未虧而喜怒為用亦因是也注夫達者之於一豈勞神哉若勞神明於為一不足賴也與彼不一者無以異矣亦同衆狙之惑因所好而自是也疏此解譬也狙獼猴也賦付與也芧橡子也似栗而小也列子曰宋有養狙老翁善解其意戲狙曰吾與汝芧朝三而暮四足乎衆狙皆起而怒又曰我與汝朝四而暮三足乎衆狙皆伏而喜焉朝三暮四朝四暮三其於七數並皆是一名既不虧實亦無損而一喜一怒為用愚迷此亦同其所好自以為是亦猶勞役心慮辨飾言詞混同萬物以為其一因以為一者亦何異衆狙之惑耶是以聖人和之以是非而休乎天均注莫之偏任故付之自均而止也疏天均者自然均平之理也夫達道聖人虛懷不執故能和是於無是同非於無非所以息智乎均平之鄉休心乎自然之境也是之謂兩行注任天下之是非疏不離是非而得無是非故謂之兩行南華真經注疏卷之二
