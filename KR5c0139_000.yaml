body:
  text: 南華真經序河南郭象子玄撰夫莊子者可謂知本矣故未始藏其狂言言雖無會而獨應者也夫應而非會則雖當無用言非物事則雖高不行與夫寂然不動不得已而後起者固有間矣斯可謂知無心者也夫心無為則隨感而應應隨其時言唯謹爾故與化為體流萬代而冥物豈曾設對獨遘而遊談乎方外哉此其所以不經而為百家之冠也然莊生雖未體之言則至矣通天地之統序萬物之性達死生之變而明內聖外王之道上知造物無物下知有物之自造也其言宏綽其旨玄妙至至之道融微旨雅泰然遺放放而不敖故曰不知義之所適猖狂妄行而蹈其大方含哺而熙乎淡泊鼓腹而遊乎混茫至仁極乎無親孝慈終於兼忘禮樂復乎已能忠信發乎天光用其光則其朴自成是以神器獨化於玄冥之境而源深流長也故其長波之所蕩高風之所扇暢乎物宜適乎民願弘其鄙解其懸灑落之功未加而矜夸所以散故觀其書超然自以為已當經崑崙涉太虛而遊惚恍之庭矣雖復貪婪之人進躁之士暫而攬其餘芳味其溢流仿佛其音影猶足曠然有忘形自得之懷況探其遠情而玩永年者乎遂綿邈清遐去離塵埃而返冥極者也南華真經疏序唐西華法師成玄英撰夫莊子者所以申道德之深根述重玄之妙旨暢無為之恬淡明獨化之窅冥鉗揵九流括囊百氏諒區中之至教實象外之微言者也其人姓莊名周字子休生宋國睢陽蒙縣師長桑公子受號南華仙人當戰國之初降衰周之末歎蒼生之業薄傷道德之陵夷乃慷慨發憤爰著斯論其言大而博其旨深而遠非下士之所聞豈淺識之能究所言子者是有德之嘉號古人稱師曰子亦言子是書名非但三篇之總名亦是百家之通題所言內篇者內以待外立名篇以編簡為義古有殺青為簡以韋為編編簡成篇猶今連紙成卷也故元愷云大事書之於策小事簡牘而已內則談於理本外則語其事迹事雖彰著非理不通理既幽微非事莫顯欲先明妙理故前摽內篇內篇理深故每於文外别立篇目郭象仍於題下即注解之逍遙齊物之類是也自外篇以去則取篇首二字為其題目駢拇馬蹄之類是也所言逍遙遊者古今解釋不同今泛舉紘綱略為三釋所言三者第一顧桐柏云逍者銷也遙者遠也銷盡有為纍遠見無為理以斯而遊故曰逍遙第二支道林云物物而不物於物故逍然不我待玄感不疾而速故遙然靡所不為以斯而遊天下故曰逍遙遊第三穆夜云逍遙者蓋是放狂自得之名也至德內充無時不適忘懷應物何往不通以斯而遊天下故曰逍遙遊內篇明於理本外篇語其事迹雜篇雜明於理事內篇雖明理本不無事迹外篇雖明事迹甚有妙理但立教分篇據多論耳所以逍遙建初者言達道之士智德明敏所造皆適遇物逍遙故以逍遙命物夫無待聖人照機若鏡既明權實之二智故能大齊於萬境故以齊物次之既指馬蹄天地混同庶物心靈凝淡可以攝衛養生故以養生主次之既善惡兩忘境智俱妙隨變任化可以處涉人間故以人間世次之內德圓滿故能支離其德外以接物既而隨物升降內外冥契故以德充符次之止水流鑑接物無心忘德忘形契外會內之極可以匠成庶品故以大宗師次之古之真聖知天知人與造化同功即寂即應既而驅馭群品故以應帝王次之駢拇以下皆以篇名二字為題既無别義今不復次篇也而自古高士晉漢逸人皆莫不耽玩為之義訓雖注述無可間然並有美辭咸能索隱玄英不揆庸昧少而習焉研精覃思三十年矣依子玄所注三十三篇輒為疏解總三十卷雖復詞情疏拙亦頗有心迹指歸不敢貽厥後人聊自記其遺忘耳
