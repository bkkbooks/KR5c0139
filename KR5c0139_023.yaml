body:
  text: 南華真經注疏卷之二十三慶二河南郭象注唐西華法師成玄英疏外篇田子方第二十一田子方侍坐於魏文侯數稱溪工疏姓田名無擇字子方魏之賢人也文侯師也文侯是畢萬七世孫武侯之父也姓溪名工亦魏之賢人文侯曰溪工子之師邪子方曰非也無擇之里人也稱道數當故無擇稱之疏溪工是子方鄉里人也稱說言道頻當於理故無擇稱之不是師文侯曰然則子無師邪子方曰有曰子之師誰邪子方曰東郭順子文侯曰然則夫子何故未嘗稱之疏居在郭東因以為氏名順子子方之師也既是先生之師何故不稱說之子方曰其為人也真注無假也疏所謂真道人也人貌而天注雖貌與人同而獨任自然疏雖復貌同人理而心契自然也虛緣而葆真注虛而順物故真不失疏緣順也虛心順物而恆守真宗動而常寂也清而容物注夫清者患於大潔今清而容物與天同也疏郭注云清者患於大潔今清而容物與天同也物無道正容以悟之使人之意也消注曠然清虛正己而已而物邪自消疏世間無道之物邪僻之人東郭自正容儀令其曉悟使惑亂之意自然消除也無擇何足以稱之疏師之盛德深玄若是無擇庸鄙何足稱揚也子方出文侯儻然終日不言召前立臣而語之曰遠矣全德之君子疏儻然自失之貌聞談順子之德儻然靡據自然失所謂故終日不言於是召前立侍之臣與之語話歎東郭子之道深遠難知諒全德之人可以君子萬物也始吾以聖智之言仁義之行為至矣吾聞子方之師吾形解而不欲動口鉗而不欲言注自覺其近吾所學者真正梗耳注非真物也疏我初昔修學用先王聖智之言周孔仁義之行為窮理至極今聞說子方之師其道宏博遂使吾形解散不能動止口舌鉗困無可言語自覺所學土人而已逢雨則壞並非真物土梗者土人也夫魏真為我纍耳注知至貴者以人爵為纍也疏既聞真道隳體坐忘故知爵位壇土適為憂纍耳溫伯雪子適齊舍於魯魯人有請見之者溫伯雪子曰不可吾聞中國之君子明乎禮義而陋於知人心吾不欲見也疏姓溫名伯字雪子楚之懷道人也中國魯國也陋拙也自楚往齊途經於魯止於主人之舍魯人是孔子門人聞溫伯雪子賢人請欲相見溫伯不許云我聞中國之人明於禮義聖迹而拙於知人心是故不欲見也至於齊反舍於魯是人也又請見疏溫伯至齊反還舍魯是前之人復欲請見溫伯雪子曰往也蘄見我今也又蘄見我是必有以振我也疏蘄求也振動也昔我往齊求見於我我今還魯復來求見必當别有所以故欲感動我來出而見客入而歎明日見客又入而歎其僕曰每見之客也必入而歎何邪疏前後見客頻自嗟歎溫伯僕隸怪而問之也曰吾固告子矣中國之民明乎禮義而陋乎知人心昔之見我者進退一成規一成矩從容一若龍一若虎注盤辟其步逶迤其迹疏擎跪揖讓前却方圓逶迤若龍盤辟如虎其諫我也似子其道我也似父注禮義之弊有斯飾也是以歎也疏匡諫我也如子之事父訓導我也似父之教子夫遠近尊卑自有情義既非天性何事殷勤是知聖迹之弊遂有斯矯是以歎之也仲尼見之而不言注已知其心矣子路曰吾子欲見溫伯雪子久矣見之而不言何邪疏二人得意所以忘言仲由怪之是故起問焉仲尼曰若夫子者目擊而道存矣亦不可以容聲矣注目裁往意已達無所容其德音也疏擊動也夫體悟之人忘言得理目裁運動而玄道存焉無勞更事辭費容其聲之說也顔淵問於仲尼曰夫子步亦步夫子趨亦趨夫子馳亦馳夫子奔逸絶塵而回瞪若乎後矢夫子曰回何謂邪曰夫子步亦步也夫子言亦言也夫子趨亦趨也夫子辨亦辨也夫子馳亦馳也夫子言道回亦言道也及奔逸絶塵而回瞪若乎後者夫子不言而信不比而周無器而民蹈乎前而不知所以然而已矣疏奔逸絶塵急走也瞪直目貌也滅塵迅速不可追趁故直視而在後也器爵位也夫子不言而為人所信未曾親比而與物周旋實無人君之位而民足蹈乎前而衆聚也不知所然而然直置而已矣所謂奔逸絶塵也仲尼曰惡可不察與夫哀莫大於心死而人死亦次之注夫心以死為死乃更吏其死其死之速由哀以自喪也無哀則已有哀則心死者乃哀之大也疏夫不比而周不言而信蓋由虛心順物豈徒然哉何可不忘懷鑒照荑心審察邪夫情之纍者莫過心之變易變易生滅深可哀傷而以生死哀之次也日出東方而入於西極萬物莫不比方注皆可見也疏夫夜暗晝明東出西入亦由人入幽出顯死去生來故知人之死生譬天之晝夜以斯寓比亦何惜哉有目有趾者待是而後成功注目成見功足成行功也疏趾足也夫人百體禀自陰陽目見足行資乎造化若不待此何以成功故知死生非關人也是出則存是入則亡注直以不見為亡耳竟不亡疏見日出謂之存覩日入謂之亡此蓋凡情之浪執非通聖人之達觀萬物亦然有待也而死有待也而生注待隱謂之死待顯謂之生竟無死生也疏夫物之隱顯皆待造化隱謂之死顯謂之生日出入既無存亡物隱顯豈有生死者邪吾一受其成形而不化以待盡注夫有不得變而為無故一受成形則化盡無期也疏夫我之形性禀之造化明暗妍醜崖錢已成一定已後更無變化唯當端然待盡以此終年妍醜既不自由生死理當亦任也效物而動注自無心也疏夫至聖虛凝感來斯應物動而動自無心者也日夜無隙注恆化新也疏變化日新泯然而無間隙而不知其所終注不以死為死也疏隨之不見其後薰然其成形注薰然自成又奚為哉疏薰然自動之貌薰然禀氣成形無物使之然也知命不能規乎其前丘以是日徂注不係於前與變俱往故日徂疏徂往也達於時變不能預作規模體於日新是故與化俱往也吾終身與汝交一臂而失之可不哀與注夫變化不可執而留也故雖執臂相守而不能令停若哀死者則此亦可哀也今未嘗以此為哀奚獨哀死邪疏孔丘顔子賢聖二人共修一身各如交臂而變化日新遷流迅速罕執固守不能暫停把臂之間欻然已謝新既行矣故以失焉若以失故而悲此深可哀也汝殆著乎吾所以著也彼已盡矣而汝求之以為有是求馬於唐肆也注唐肆非停馬處也言求向者之有不可復得也人之生若馬之過肆耳恆無駐須臾新故之相續不舍晝夜也著見也言汝殆見吾所以見者耳吾所以見者日新也故已盡矣汝安得有之疏殆近也著見也唐道肆市也吾所見者變故日新者也顔回孔子對面清談向者之言其則非遠故言殆者也彼之故事於今已滅汝仍求向時之有謂在於今者耳謂求馬於唐肆也唐肆非停馬之處也向者見馬市道而行今時復尋馬已過去亦猶向者之迹已滅於前求之於今物已變矣故知新新不往運運遷移耳吾服汝也甚忘注服者思存之謂也甚忘謂過去之速也言汝去忽然思之恆欲不及疏服者尋思之謂也向者之汝於今已謝吾服思之亦竟忘失汝服吾也亦甚忘注俱爾耳不問賢之與聖未有得停者疏變化日新不簡賢聖豈唯於汝抑亦在吾汝之思吾故事亦滅雖然汝奚患焉雖忘乎故吾吾有不忘者存注不忘者存謂繼之以日新也雖忘故吾而新吾已至未始非吾吾何患焉故能離俗絶塵而與物無不冥也疏夫變化之道無時暫停雖失故吾而新吾尚在斯有不忘者存也故未始非吾汝何患也孔子見老聃老聃新沐方將被髮而乾慹然似非人注寂泊之至孔子便而待之疏既新沐髮曝之令乾凝神寂泊熱然不動搖若槁木故似非人孔子見之不敢往觸遂便徙所消息待之少焉見曰丘也眩與其信然與向者先生形體掘若槁木似遺物離人而立於獨也注無其心身而後外物去也疏俄頃之間入見老子云丘見先生眼眩忘遣形智信是聖人既而離異於人遺棄萬物亡於不測而冥於獨化也老聃曰吾遊心於物之初注初未有而欻有故遊於物初然後明有物之不為而自有也疏初本也夫道通生萬物故名道為物之初也遊心物初則是凝神妙本所以形同槁木心若死灰也孔子曰何謂邪疏雖聞聖言未識意謂曰心困焉而不能知口辟焉而不能言注欲令仲尼必求於言意之表也疏辟者口開不合也夫聖心非不能知為其無法可知口非不能辨為其無法可辨辨之則乖其體知之則喪其真是知至道深玄超言意之表故困焉辟焉嘗為汝議乎其將注試議陰陽以擬向之無形耳未之敢必疏夫至理玄妙非言意能詳試為汝議論陰陽將擬議大道雖即仿象未即是真矣至陰肅肅至陽赫赫肅肅出乎天赫赫發乎地注言其交也疏肅肅陰氣寒也赫赫陽氣熱也近陰中之陽陽中之陰言其交泰也兩者交通成和而物生焉或為之紀而莫見其形注莫見為紀之形明其自爾疏陽氣下降陰氣上升二氣交通遂成和合因此和氣而物生焉雖復四叙炎凉紀綱庶物而各自化故莫見綱紀之形消息滿虛一晦一明日改月化日有所為注未嘗守故疏陰消陽息夏滿冬虛夜晦晝明日遷月徙新新不生故日有所為也而莫見其功注自爾故無功疏玄功冥濟故莫見為之者也生有所乎萌注萌於未聚也疏萌於無物死有所乎歸注歸於散也疏歸於未生始終相反乎無端而莫知乎其所窮注所謂迎之不見其首隨之不見其後疏死生終始反覆往來既無端緒誰知窮極故至人體達任其變也非是也且孰為之宗疏若非是虛通生化之道誰為萬物之宗本乎夫物云云必資於道也孔子曰請問遊是疏請問遊心是道其術如何必得遊是復有何功力也老聃曰夫得是至美至樂也得至美而遊乎至樂謂之至人注至美無美至樂無樂故也疏夫證於玄道美而歡暢既得無美之美而遊心無樂之樂者可謂至極之人也孔子曰願聞其方疏方猶道也請說至美至樂之道曰草食之獸不疾易藪水生之蟲不疾易水行小變而不失其大常也注死生亦小變也疏疾患也易移也夫食草之獸不患移易藪澤水生之蟲不患改易池沼但有草有水則不失大常從東從西蓋小變耳亦猶人處於大道之中隨變任化未始非我此則不失大常生死之變蓋亦小耳喜怒哀樂不入於胸次注知其小變而不失大常故疏喜順怒逆樂生哀死夫四者生崖之事也而死生無變於己喜怒豈入於懷中也夫天下也者萬物之所一也得其所一而同焉則四支百體將為塵垢而死生終始將為晝夜而莫之能滑而况得喪禍福之所介乎注愈不足患疏夫天地萬物其體不二達斯趣者故能混同是以物我皆空百體將為塵垢死生虛幻終始均乎晝夜死生不能滑亂而况得喪禍福生崖之事乎愈不足以介懷也棄隸者若棄泥塗知身貴於隸也注知身之貴於隸故棄之若遺土耳苟知死生之變所在皆我則貴者常在也貴在於我而不失於變注所貴者我也而我與變俱故無失也疏夫舍棄僕隸事等泥塗故知貴在於我不在外物我將變俱故無所喪也且萬化而未始有極也夫孰足以患心已為道者解乎此注所謂縣解疏夫世物遷流未嘗有極而隨變任化誰復纍心唯當修道達人方能解此孔子曰夫子德配天地而猶假至言以修心古之君子孰能脫焉疏配合也脫免也老子德合二儀明齊三景故應忘言歸理聖智自然今乃盛談至言以修心術然則古之君子誰能遣於言說而免於修為者乎老聃曰不然夫水之於汋也無為而才自然矣至人之於德也不修而物不能離焉若天之自高地之自厚日月之自明夫何修焉注不修不為而自得也疏汋水也澄湛也言水之澄湛其性自然汲取利潤非由修學至人玄德其義亦然端拱巖廊而物不能離澤被羣品日用不知若天高地厚日月照明夫何修為自然而已矣孔子出以告顔回曰丘之於道也其猶醯雞與注醯雞者罋中之蠛蠓微夫子之發吾覆也吾不知天地之大全也注此吾全於老聃猶罋中之與天地矣疏醯雞醋罋中之蠛蠓每遭物蓋罋頭故不見二儀也亦猶仲尼遭聖迹蔽覆不見事理若無老子為發覆蓋則終身不知天地之大全虛通之妙道也莊子見魯哀公哀公曰魯多儒士少為先生方者疏方術也莊子是六國時人與魏惠王齊威王同時去魯哀公一百二十年如此言見魯哀公者蓋寓言耳然魯則是周公之後應是衣冠之國又孔子生於魯盛行五德之教是以門徒三千服膺儒服長裾廣袖魯地必多無為之學其人鮮矣莊子曰魯少儒疏夫服以象德不易其人莊子體知故譏儒少哀公曰舉魯國而儒服何謂少乎疏哀公庸暗不察其道直據衣冠謬稱多儒莊子曰周聞之儒者冠圜冠者知天時履方屨者知地形緩佩玦者事至而斷君子有其道者未必為其服也為其服者未必知其道也疏屨方也緩者五色絛繩穿玉玦以飾佩也玦决也本亦有作綬字者夫天圓地方服以象德故戴圓冠以象天者則知三象之吉凶履方屨以法地者則知九州之水陸曳綬佩玦者事到而决斷是以懷道之人不必為服為服之者不必懷道彼己之子今古有之是故莊子寓言辨說也公固以為不然何不號於國中曰無此道而為此服者其罪死於是哀公號之五日而魯國無敢儒服者疏有服無道罪合極刑法令既嚴不敢犯者號經五日無復一儒也獨有一丈夫儒服而立乎公門公即召而問以國事千轉萬變而不窮莊子曰以魯國而儒者一人耳可謂多乎注德充於內者不修飾於外疏一人謂孔子孔子聖人觀機吐智若鏡之照轉變無窮舉國一人未足多也百里奚爵祿不入於心故飯牛而牛肥使秦穆公忘其賤與之政也疏百里奚秦之賢人也本是虞人虞被晋亡遂入秦國初未遭用貧賤飯牛安於飯牛身甚肥悅忘於富貴故爵祿不入於心後穆公知其賢委以國事都不猜疑故云忘其賤矣有虞氏死生不入於心故足以動人注內自得者外事全也疏有虞舜也姓媯氏字重華遭後母之難頻被躓頓而不以死生經心至孝有聞感動天地於是堯妻以二女委以萬乘故足以動人也宋元君將畫圖衆史皆至受揖而立舐筆和墨在外者半疏宋國之君欲畫國中山川地土圖樣而畫師並至受君令命拜揖而立調朱和墨爭競功能除其受揖在外者半言其趨競者多有一史後至者儃儃然不趨受揖不立因之舍公使人視之則解衣槃礴嬴君曰可矣是真畫者也注內足者神閒而意定疏儃儃寬閒之貌也內既自得故外不矜持徐行不趨受命不立直入就舍解衣箕坐倮露赤身曾無懼憚元君見其神彩可謂真畫者也文王觀於臧見一丈夫釣而其釣莫釣注聊以卒歲疏臧者近渭水地名也丈夫者寓言於太公也吕望未遭文王之前綸釣於臧地無心施餌聊自寄此逍遙非持其釣有釣者也注竟無所求常釣也注不以得失經意其於假釣而已疏非執持其釣有意羡魚常游渭濱卒歲而已文王欲舉而授之政而恐大臣父兄之弗安也欲終而釋之而不忍百姓之無天也疏文王既見賢人欲委之國政復恐皇親宰輔猜而忌之既欲捨而釋之不忍蒼生失於覆蔭故言無天也於是旦而屬之大夫曰昔者寡人夢見良人黑色而𩑺乘駁馬而偏朱蹄號曰寓而政於臧丈人庶幾乎民有瘳乎疏既欲任賢故託諸夢想乃屬語臣佐云我昨夜夢見賢良之人黑色而有鬚𩑺乘駁馬而蹄偏赤號令我云寄汝國政於臧丈人慕賢進隱則民之荒亂病必瘳差矣駁亦有作字者隨字讀之也諸大夫蹴然曰先君王也疏文王之父季歷生存之日黑色多𩑺好乘駁馬駁馬蹄偏赤王之所夢乃是先君教令於王是以蹴然驚懼也文王曰然則卜之諸大夫曰先君之命王其無他又何卜焉疏此是先君令命决定無疑卜以决疑不疑何卜也遂迎臧丈人而授之政典法無更偏令無出疏君臣契協遂迎丈人拜為卿輔授其國政於是典憲刑法一施無改偏曲敕令無復出行也三年文王觀於國則列士壞植散群長官者不成德斔斛不敢入於四境疏植行列也亦言境界引舍以受諫書也亦言是諫士之館也庾六斗四升也為政三年移風易俗君臣履道無可針規散却列士之爵打破諫書之館上下咸亨長官不顯其德遐邇同軌度量不入四境列士壞植散羣則尚同也注所謂和其光同其塵長官者不成德則同務也注潔然自成則與衆務異也斔斛不敢入於四境則諸侯無二心也注天下相信故能同律度量衡也疏天下大同不競忠諫事無隔異則德不彰五等守分則四方寧謐也文王於是焉以為太師北面而問曰政可以及天下乎臧丈人昧然而不應汒然而辭朝令而夜遁終身無聞注為功者非己故功成而身不得不退事遂而名不得不去名去身退乃可以及天下也疏俄頃之間拜為師傅北面事之問其政術無心榮寵故泛然而辭其意消聲故昧然不應由名成身退推功於物不欲及於天下故逃遁無聞然吕佐周室受封於齊檢於史傳竟無逃迹而云夜遁者蓋莊生之寓言也顔淵問於仲尼曰文王其猶未邪又何以夢為乎疏顔子疑於文王未極至人之德真人不夢何以夢乎仲尼曰默汝無言夫文王盡之也注任諸大夫而不自任斯盡之也而又何論刺焉彼直以循斯須也注斯須者百姓之情當悟未悟之頃故文王循而發之以合其大情也疏斯須由須臾也循順也夫文王聖人盡於妙理汝宜寢默不勞譏刺彼直隨任物性順蒼生之望欲悟未悟之頃進退須臾之間故託夢以發其性耳未足怪也列御寇為伯昏無人射引之盈貫注盈貫謂溢鏑也措杯水其肘上注左手如拒石右手如附枝右手放發而左手不知故可措之杯水也疏御寇無人內篇具釋盈貫滿鏃也措置也御寇風仙魯之善射右手引弦如附枝而滿鏑左手如拒石置杯水於肘上言其停審敏捷之至也發之適矢復沓注矢去也箭適去復歃沓也方矢復寓注箭方去未至的也復寄杯於肘上言其敏捷之妙也疏適往也沓重也寓寄也弦發矢往復重沓前箭所謂擘括而入者箭方適垛未至于的復寄杯水言其敏捷寓字亦作隅者言圓鏑重沓破括方全插孔復於寓角也當是時猶象人也注不動之至疏象人木偶土梗人也言御寇當射之時掘然不動猶土木之人也伯昏無人曰是射之射非不射之射也疏言汝雖巧仍是有心之射非忘懷無心不射之射也嘗與汝登高山履危石臨百仞之淵若能射乎疏七尺曰仞深七百尺也若汝也此是不射之射也於是無人遂登高山履危石臨百仞之淵背逡巡足二分垂在外揖御寇而進之御寇伏地汗流至踵疏前略陳射意此直欲彎弓逡巡猶却行也進讓也登峻聳高山履危懸之石臨極險之淵仍背淵却行足垂二分在外空裏控弦自若揖御寇而讓之御寇怖懼不能舉頭於是冥目伏地汗流至腳也伯昏無人曰夫至人者上窺青天下潜黃泉揮斥八極神氣不變注揮斥猶縱放也夫德充於內則神滿於外無遠近幽深所在皆明故審安危之機而泊然自得也今汝怵然有恂目之志爾於中也殆矣夫注不能明至分故有懼有懼而所喪多矣豈唯射乎疏揮斥猶縱放也恂懼也夫至德之人與太空等量故能上窺青天下隱黃泉譬彼神龍升沈無定縱放八方精神不改臨彼萬仞何足介懷今我觀汝有怵惕之心眼目眩惑懷恂懼之志汝於射之危殆矣夫肩吾問於孫叔敖曰子三為令尹而不榮華三去之而無憂色吾始也疑子今視子之鼻間栩栩然子之用心獨奈何疏肩吾隱者也叔敖楚之賢人也栩栩歡暢之貌也夫達者毁譽不動寵辱莫驚故孫叔敖三仕而不榮華三黜而無憂色肩吾始聞其言猶懷疑惑復察其貌栩栩自歡若為用心獨得如此也孫叔敖曰吾何以過人哉吾以其來不可却也其去不可止也吾以為得失之非我也而無憂色而已矣我何以過人哉疏夫軒冕榮華物來儻寄耳故其來不可遣却其去不可禁止窮通得喪豈由我哉達此去來故無憂色何有藝術能過人耶且不知其在彼乎其在我乎其在彼邪亡乎我在我邪亡乎彼注曠然無係玄同彼我則在彼非獨亡在我非獨存也疏亡失也且不知榮華定在彼人定在我己若在彼邪則於我為失若在我邪則於彼為失而彼我既其玄同得喪於乎自泯也方將躊躇方將四顧何暇至乎人貴人賤哉注躊躇四顧謂無可無不可疏躊躇是逸豫自得四顧是高視八方方將磅礴萬物揮斥宇宙有何容暇至於人世留心貴賤之間乎故去之而無憂色也仲尼聞之曰古之真人知者不得說美人不得濫盜人不得劫伏犧黃帝不得友注伏犧黃帝者功號耳非所以功者也故況功號於所以功相去遠矣故其名不足以友其人也疏仲尼聞孫叔敖之言而美其德故引遠古以證斯人古之真人窮微極妙縱有智言之人不得辨說美色之姿不得淫濫盜賊之徒何能劫剝三皇五帝未足交友也死生亦大矣而無變乎己況爵祿乎疏人雖日新死生大矣而不變於己況於爵祿豈復棲心若然者其神經乎大山而無介入乎淵泉而不濡處卑細而不憊充滿天地既以與人己愈有注割肌膚以為天下者彼我俱失也使人人自得而己者與人而不損於己也其神明充滿天地故所在皆可所在皆可故不損己為物而放於自得之地也疏介礙也既盡也夫真人入火不熱入水不濡經乎大山而神無障礙屈處卑賤其道不虧德合二儀故充滿天地不損己為物故愈有也楚王與凡君坐少焉楚王左右曰凡亡者三注言有三亡徵也疏楚文王共凡僖侯同坐論合從會盟之事凡是國名周公之後國在汲郡界今有凡賤是也三者謂不敬鬼尊賢養民也而楚大凡小楚有吞夷之意故使從者以言感也凡君曰凡之亡也不足以喪吾存注遺凡故也疏自得造化怡然不懼可謂周公之後世不乏賢也夫凡之亡不足以喪吾存則楚之存不足以存存注夫遺之者不足以亡為亡則存亦不足以為存矣曠然無矜乃常存也由是觀之則凡未始亡而楚未始存也注存亡更在於心之所措耳天下竟無存亡也疏夫存亡者在心之得喪也既亡於得喪故亡者未必亡而亡者更存存者不獨存而存者更亡也南華真經注疏卷之二十三
