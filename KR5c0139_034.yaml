body:
  text: 南華真經注疏卷之三十四尺七河南郭象注唐西華法師成玄英疏雜篇列御寇第三十二列御寇之齊中道而反遇伯昏瞀人疏伯昏楚之賢士號曰伯昏瞀人隱者之徒也禦寇既師壺子又事伯昏方欲適齊行於化道自驚行淺中路而還適逢瞀人問其所以伯昏瞀人曰奚方而反疏方道也奚何也汝行何道欲往何方問其所由中塗反意也曰吾驚焉疏自覺己非驚懼而反此略答前問意曰惡乎驚疏重聞禦寇於何事迹而起驚心曰吾嘗食於十漿注賣漿之家曰五漿先饋注言其敬己疏饋遺也十漿謂有十家賣漿飲也列子因行渴於逆旅十家賣飲而五家先遺覩其容觀競起驚心未能冥混是以驚懼也伯昏瞀人曰若是則汝何為驚己疏更問驚由庶陳己失曰夫內誠不解注外自矜飾疏自覺內心實智未能懸解為物所敬是以驚而歸形諜成光注舉動便辟而成光儀也以外鎮人心注其內實不足以服物疏諜便僻貌也鎮服也儀容便僻動成光華用此外形鎮服人物使人輕乎貴老注若鎮物由乎內實則使人貴老之情篤也而𩐎其所患注言以美形動物則所患亂生也疏𩐎亂也未能混俗同塵而為物標杓使人敬貴於己而輕老人良恐禍患方亂生矣夫漿人特為食羹之貨多餘之贏其為利也薄其為權也輕而猶若是注權輕利薄可無求於人而況於萬乘之主乎疏特獨也贏利也夫賣漿之人獨有羹食為貨所盈之物蓋亦不多為利既薄權亦非重尚能敬己競走獻漿况在君王權高利厚奔馳尊貴不亦宜乎身勞於國而知盡於事彼將任我以事而效我以功吾是以驚疏夫君人者位總萬機威跨四海故躬疲倦於邦國心盡慮於世事則思賢若渴以代己勞必將任我以物務而驗我以功績徇外喪內逐僞忘真驚之所由具陳如是也伯昏瞀人曰善哉觀乎疏汝能觀察己身審知得喪嘉其自覺故歎善哉汝處己人將保汝矣注苟不遺形則所在見保保者聚守之謂也疏保守也汝安處己身不能忘我猶顯形德為物所歸門人請益聚守之矣無幾何而往則户外之屨滿矣疏無幾何謂無多時也俄頃之間伯昏往禦寇之所適見脫屨户外跣足升堂請益者多矣伯昏瞀人北面而立敦杖蹙之乎頤立其間不言而出疏敦竪也以枝柱頤聽其言說倚立間久忘言而歸也賔者以告列子列子提屨跣而走暨乎門曰先生既來曾不發藥乎疏賔者謂通賔客人也御寇聞師友立不言而歸於是竦息慙惕不暇納屨跣足馳走至門而反高人既來庶蒙針艾不嘗開發藥石遺棄而還誠心欽渴有此固請也曰已矣吾固告汝曰人將保汝果保汝矣疏已止也我已於先固告汝汝不能韜光晦迹必為物所歸依今果見汝門人滿室吾昔語汝諒非虛言宜止所請無勞辭費非汝能使人保汝而汝不能使人無保汝也注任平而化則無感無求無感無求乃不相保疏顯迹於外故為人保之未能忘德故不能無守也而焉用之感豫出異也注先物施惠惠不因彼豫出則異也疏而汝也焉何也夫物我兩忘亦何須物來感已必有機來感而後應不勞預出異端先物施惠必且有感搖而本性又無謂也注必將有感則與本性動也疏搖動也必固有感迫而後起率其本性搖而應之滅迹匿端有何稱謂也與汝遊者又莫汝告也彼所小言盡人毒也注細巧入人為小言疏共汝同游行解相類唯事浮辨細巧之言佞媚於人盡為鳩毒詎能用道以告汝也莫覺莫悟何相孰也疏孰誰也彼此迷塗無能覺悟何誰獨曉以相告乎巧者勞而知者憂無能者無所求飽食而遨遊泛若不繫之舟虛而遨遊者也注夫無其能者唯聖人耳過此以下至於昆蟲未有自忘其能而任衆人者也疏夫物未嘗為無用憂勞而必以智巧困弊唯聖人泛然無係泊爾忘心譬彼虛舟任運逍遙鄭人緩也呻吟裘氏之地注呻吟吟詠之謂祇三年而緩為儒注祇適也疏呻吟詠讀也裘氏地名也祗適也鄭人名緩於裘地學問適經三年而成儒道河潤九里澤及三族使其弟墨注三族謂父母妻族也能使弟成於墨教也儒墨相與辨其父助翟注翟緩弟名疏翟緩弟名也儒則憲章文武祖述堯舜甚固吝好多言墨乃遵於禹道勤儉好施儒墨塗别志尚不同各執是非互相爭辨父黨小兒遂助於翟矣十年而緩自殺其父夢之曰使而子為墨者子也闔胡嘗視其良既為秋柏之實矣注緩怨其父之助弟故感激自殺死而見夢謂己既能自化為儒又化弟令墨弟由己化而不能順己己以良師而便怨誠之至故為秋柏之實疏闔何也秋柏徑木也父既助翟而緩恨之經由十年感激自殺仍見夢於父以申怨言云使汝子為墨者我之功力也何不看視我為賢良之師而更朋助弟我怨恨之甚化為異物秋柏子實生於墓上亦有作垠字者垠冢也云汝何不看我冡上已化為秋柏之木而生實也夫造物者之報人也不報其人而報其人之天注自此已下莊子辭也夫積習之功為報報其性不報其為也然則學習之功成性而已豈為之哉疏造物者自然之洪爐也而造物者無物也能造化萬物故謂之造物也夫物之智能禀乎造化非由從師而學成也故假於學習輔道自然報其天性不報人功也是知翟有墨性不從緩得緩言我教不亦繆乎彼故使彼注彼有彼性故使習彼疏彼翟先者有墨性故成墨若率性素無學終不成也豈唯墨翟庶物皆然夫人以己為有以異於人以賤其親注言緩自美其儒謂己能有積學之功不知其性之自然也夫有功以賤物者不避其親也無其身以平往者貴賤不失其倫也疏言緩自恃於己有學植之功異於常人故輕賤其親而汝於父也人之迷滯而至於斯乎齊人之井飲者相捽也故曰今之世皆緩也注夫穿井所以通泉吟詠所以通性無泉則無所穿無性則無所詠而世皆忘其泉性之自然徒識穿詠之末功因欲矜而有之不亦妄乎疏夫土下有泉人各有性天也穿之成井學以成術者人也嗟乎世人迷妄之甚徒知穿學之末事不悟泉性之自然而矜之以為己功者故世皆緩之流也齊人穿鑿得井行李汲而飲之井主護水捽頭而休莊生聞之故引為諭自是有德者以不知也而况有道者乎注觀緩之謬以為學父故能任其自爾而知故無為其間也疏觀緩之迷以為己誠有德之人從是之後忘知任物不復自矜况體道之人豈視其功邪古者謂之遁天之刑注仍自然之能以為己功者逃天者也故刑戮及之疏不知物性自爾矜為己功者逃遁天然之理也既乖造化故刑戮及之聖人安其所安不安其所不安注夫聖人無安無不安順百姓之心也疏安任也任羣生之性不引物從己性之無者不强安之故所以為聖人也衆人安其所不安不安其所安注所安相與異故所以為衆人也疏學己所不能安其所不安也不安其素分不安其所安也莊子曰知道易勿言難疏玄道窈冥言像斯絶運知則易忘言實難知而不言所以之天也知而言之所以之人也疏妙悟玄道無法可言故詣於自然之境雖知至極而猶存言辨斯未離於人倫矣古之人天而不人注知而落天地未嘗開言以引物應其至分而已疏復古真人知道之士天然淳素無復人情朱泙漫學屠龍於支離益單千全之家三年技成而無所用其巧注事在於適無貴於遠功疏姓朱名泙漫姓支離名益殫盡也罄千金之産學殺龍之術伏膺三歲其道方成伎雖巧妙卒為無用屠龍之事於世稍稀欲明處涉人間貴在適中苟不當機雖大無益也聖人以必不必故無兵注理雖必然猶不必之斯至順矣兵其安有疏達道之士隨逐物情理雖必然猶不固執故無交爭也衆人以不必必之故多兵注理雖未必抑而必之各必其所見則乖逆生也疏庸庶之類妄為封執理不必爾而固必之既忤物情則多乖矣順於兵故行有求注物各順性則足足則無求疏心有貪求故任於執固之情也兵恃之則亡注不得已而用之以恬淡為上者未之亡也疏不能大順羣命而好乖逆物情者則幾亡吾寶矣小夫之知不離苞苴竿牘注苞苴以遺竿牘以問遺問之具小知所殉疏小夫猶匹夫也苞苴香草也竿牘竹簡也夫搴芳草以相贈折簡牘以相問者斯蓋俗中細務固非丈夫之所忍為敝精神乎蹇淺注昏於小務所得者淺疏好為遺問徇於小務可謂勞精神於跛蹇淺薄之事不能遊虛涉遠矣而欲兼濟導物太一形虛若是者迷惑于宇宙形纍不知太初注小夫之知而欲兼濟導物經虛涉遠志大神敝形為之纍則迷惑而失致也疏以蹇淺之知而欲兼濟羣物導達羣生望得虛空其形合太一之玄道者終不可也此人迷於古今形纍於六合何能照知太初之妙理邪彼至人者歸精神乎無始而甘瞑乎無何有之鄉疏無始妙本也無何有之鄉道境也至德之人動而常寂雖復兼濟道物而神凝無始故能和光混俗而恆寢道鄉也水流乎無形發泄乎大清注泊然無為而任其天行也疏無以順物如水流行隨時適變不守形迹迹不離本故雖應動恆發泄於太清之極也悲哉乎汝為知在毫毛注為知所得者細而不知大寧注任性大寧而至疏苞苴竿牘何異毫毛如斯運智深可悲歎精神淺薄詎知乎至寂之道邪宋人有曹商者為宋王使秦其往也得車數乘王悅之益車百乘疏姓曹名商宋人也為宋偃王使秦應對得所秦王愛之遂賜車百乘乘駟馬也反於宋見莊子曰夫處窮閭厄巷困窘織屨槁項黃馘者商之所短也一悟萬乘之主而從車百乘者商之所長也疏窘急也言貧窮困急織屨以自供頸項枯槁而憔悴頭面黃瘦而馘厲當爾之際是商之所短也一使强秦遂使秦王驚悟遺車百乘者是商之智數長也以此自多矜夸莊子也莊子曰秦王有病召醫破癰潰痤者得車一乘舐痔者得車五乘所治愈下得車愈多子豈治其痔邪何得車之多也子行矣注夫事下然後功高功高然後祿重故高遠恬淡者遺榮也疏癰癢熱毒腫也痔下漏病也莊生風神俊悟志尚清遠既而縱此竒辨以挫曹商故郭注云夫事下然後功高功高然後祿重高遠恬淡者遺榮也魯哀公問乎顔闔曰吾以仲尼為貞幹國其有瘳乎疏言仲尼有忠貞幹濟之德欲命為卿相魯邦亂病庶瘳差矣曰殆哉圾乎仲尼注圾危也夫至人以民靜為安今一為貞幹則遺高迹於萬世令飾競於仁義而畫其毛彩百姓既危至人亦無以為安也疏殆近也圾危也以貞幹迹率物物既失性仲尼何以安也方且飾羽而畫注凡言方且皆謂後世從事飾晝非任真也疏方將貞幹輔相魯廷萬代奔逐修飾羽儀喪其真性也從事華辭以支為㫖注將令後世之從事者無實而意趣橫出也疏聖迹既彰令從政任事情僞辭車析派分流為意㫖也忍性以視民而不知不信注後世人君將慕仲尼之遐軌而遂忍性自矯僞以臨民上下相習遂不自知也疏後代人君慕仲尼遐軌安忍情性用之臨人上下相習矯僞黔黎而不知已無信實也以華僞之迹教示蒼生禀承心靈宰割真性用此居人之上何足稱哉受乎心宰乎神夫何足以上民注今以上民則後世百姓非直外形從之而已乃以心神受而用之不能復自得於心中也疏彼代百姓非直外形從之乃以心神受用之不能復自得之性以此居民上何足可安哉彼宜汝與注彼百姓也汝哀公也彼與汝各自有所宜相效則失真此即今之見驗疏彼百姓也汝哀公也百姓與汝各有所宜若將汝所宜與百姓不可也豫頤與注效彼非所以養己也疏豫我也頤養也我與百姓怡養不同譬如魚鳥升沈各異若以汝所養衛物物我俱失也誤而可矣注正不可也疏以貞幹之迹錯誤行之正不可也今使民離實學僞非所以視民也為後世慮不若休之注問不謂當時也疏離實性學僞法不可教示黎民慮後世荒亂不如休止也難治也注治之則僞故聖人不治也疏捨己效物聖人不治也施於人而不忘非天布也注布而識之非芻狗萬物也疏二儀布生萬物豈貴恩也商賈不齒注况士君子乎疏夫能施求報商客尚不齒理况君子士人乎雖以事齒之神者弗齒注要能施惠故於事不得不齒以其不忘故心神忽之此百姓之大情也疏施而不忘未合天道能施恩惠於物事不得不齒為責求報心神輕忽不録百姓之情也事之者性倩也為外刑者金與木也注金謂刀鋸斧鉞木謂棰楚桎梏為內刑者動與過也注靜而當則外內無刑宵人之離外刑者金木訊之疏宵暗夜也離羅也訊問也暗惑之人罹於憲網身遭枷杻斧鉞之刑也離內刑者陰陽食之注動而過分則性氣傷於內金木訊於外也疏若不止分則內結寒暑陰陽殘食之也夫免乎外內之刑者唯真人能之注自非真人未有能止其分者故必外內受刑但不問大小耳疏心若死灰內不滑靈府形同槁木外不挂桎梏唯真人哉孔子曰凡人心險於山川難於知天天猶有春秋冬夏旦暮之期人者厚貌深倩疏人心難知甚於山川過於蒼昊厚深之狀列在下文故有貌願而益有畏若不肖疏願慤真也不肖不似也人有形如慤真而心益虛浮也有心實長者形如不肖也有順懷而遠疏懷急也形順躁急而心達理也有堅而縵有緩而釬注言人情貌之反有如此者疏縵緩也釬急也自有形如堅固而實散縵亦有外形寬緩心內躁急也故其就義若渴者其去義若熱注但為難知耳未為殊無迹疏人有就仁義如渴思水捨仁義若熱逃火雖復難知未為無迹徵驗具列下文也故君子遠使之而觀其忠近使之而觀其敬疏遠使忠佞斯彰咫步敬慢立明者也煩使之而觀其能疏煩極任使察其彼能卒然問焉而觀其知疏卒問近對觀其願智急與之期而觀其信疏忽卒與期觀信契也委之以財而觀其仁疏仁者不貪告之以危而觀其節疏告危亡驗節操醉之以酒而觀其則雜之以處而觀其色疏至人酒不能昏法則男女參居貞操不易九徵至不肖人得矣疏君子易觀不肖難明然視其所以觀其所由察其所安搜之有塗亦可知也疏九事徵驗小人君子厚貌深情必無所避正考父一命而傴再命而僂三命而俯循墻而走孰敢不軌注言人不敢以不軌之事侮之疏考成也父大也有考成大德而履正道故號正考父則孔子十代祖宋大夫也士一命大夫二命卿三命也傴曲循墻並敬容極恭卑退若此誰敢將不軌之事而侮之也如而夫者一命而吕巨再命而於車上儛三命而名諸父孰協唐許注而夫謂凡夫也唐謂堯也許謂許由也言而夫與考父者誰同於唐許之事也疏而夫鄙夫也諸父伯叔也凡夫篤競軒冕一命則吕巨夸華再命則援綏作舞三命善識自高下呼伯叔之名然考夫謙夸各異格量勝劣誰同唐堯許由無為襌讓之風哉賊莫大乎德有心注有心於為德非真德也夫真德者忽然自得而不知所以德也疏役智勞慮有心為德此賊害之甚也而心有眼注率心為德猶之可耳役心於眉睫之間則僞已甚矣及其有眼也而內視內視而敗矣注乃欲探射幽隱以深為事則心與事俱敗矣疏率心為役用心神於眼睫緣慮逐境不知休止致危敗甚矣凶德有五中德為首疏謂心耳眼舌鼻也曰此五根禍因此德謂凶德也五根禍主中德為無心也何謂中德中德也者有以自好也而吡其所不為者也注吡訾也夫自是而非彼則攻之者非一故為凶首也若中無自好之倩則恣萬物之所是所是各不自失則天下皆思奉之矣疏吡訾也用心中所好者自以為是不同己為者訾而非之以心中自是為得故曰中德窮有八極達有三必形有六府疏八極三必窮達猶人身有六府也列下文矣美髯長大壯麗勇敢八者俱過人也因以是窮注窮於受役也然天下未曾窮於所短而恆以所長自困疏美恣媚也髯髭鬢也長高也大粗大也壯多力麗妍華勇猛敢果决也藴此八事超過常人受役既多因以窮困也緣循偃佒困畏不若人三者俱通達注緣循杖物而行者也偃佒不能俯執者也困畏怯弱者也此三者既不以事見任乃將接佐之故必達也疏循順也緣物順他不能自立也偃佒仰首不能俯執也困畏困苦怯懼也有此三事不如恆人所在通達也知慧外通注通外則以無崖傷其內也疏自持智慧照物外通塵境也勇動多怨注怯而靜乃厚其身耳疏雄健躁擾必招讎隙仁義多責注天下皆望其愛然愛之則有不周矣故多責疏仁義則不周必有多責也達生之情者傀注傀然大恬解之貌也達於知者肖注肖釋散也疏注云消釋散也傀恬解也達悟之崖真性虛照傀然縣解無係戀也達大命者隨注泯然與化俱也疏大命大年假如彭祖壽考隨而順之亦不厭其長久以為勞苦也達小命者遭注每在節上住乃悟也疏小命小年也遭遇也如殤子促齡所遇斯適曾不介懷耳人有見宋王者錫車十乘以其十乘驕稚莊子疏錫與也稚後也宋襄王時有庸瑣之人游宋妄說宋王錫車十乘用此驕炫排莊周於己後自矜物先也莊子曰河上有家貧恃緯蕭而食者其子沒於淵得千金之珠其父謂其子曰取石來鍛之夫千金之珠必在九重之淵而驪龍頷下子能得珠者必遭其睡也使驪龍而寤子尚奚微之有哉疏葦蘆也蕭蒿也家貧織蘆蒿為薄賣以供食鍛椎也驪黑龍也頷下有千金之珠也譬譏得車之人也今宋國之深非直九重之淵也宋王之猛非直驪龍也子能得車者必遭其睡也使宋王而寤子為𩐎粉夫注夫取富貴必順乎民望也若挾竒說乘天衢以嬰人主之心者明君之所不受也故如有所譽必有所試於斯民不違僉曰舉之以合萬夫之望者此三代所以直道而行之也疏懷忠貞以感人主者必非常之賞而用左道使其說佞媚君王僥幸於富貴者故有驕稚之容亦何異遭驪龍睡得珠邪餘詳注意或聘於莊子疏寓言不明聘人姓氏族故言或也莊子應其使曰子見夫犧牛乎疏犧養也君王預前三日養牛祭宗廟曰犧也衣以文繡食以芻菽及其牽而入於太廟雖欲為孤犢其可得乎注樂生者畏犧而辭聘髑髏聞生而矉𥉷此死生之情異而各自當也疏芻草也菽豆也犧養豐贍臨祭日求為孤犢不可得也况祿食之人例多夭折嘉遁之士方足全生莊子清高笑彼名利莊子將死弟子欲厚葬之莊子曰吾以天地為棺槨以日月為連璧星辰為珠璣萬物為齎送吾葬具豈不備邪何以加此疏莊子妙達玄道逆旅形骸故棺槨天地爐冶兩儀珠璣星辰變化三景資送備矣門人厚葬深乖造物也弟子曰吾恐烏鳶之食夫子也莊子曰在上烏鳶食在下為螻蟻食奪彼與此何其偏也疏鳶鷀也門人荷師主深恩也將欲厚葬避其烏鳶豈知厚葬還遭螻蟻情好所奪偏私之也以不平平其平也不平注以一家之平平萬物未若任萬物之自平也疏無情與奪委任均平此真平也若運情慮均平萬物若欲起心已不平矣以不徵徵其徵也不徵注徵應也不因萬物之自應而欲以其所見應之則必有不合矣疏聖人無心有感則應此真應也若有心應物不能應也徵應也明者唯為之使注夫執其所見受使多矣安能使物哉疏自炫其明情應於務為物驅使何能役人也神者徵之注唯任神然後能至順故無往不應也疏神者無心寂然不動能無不應也夫明之不勝神也久矣注明之所及不過於形骸也至順則無遠近幽深皆各自得疏明則有心應務為物驅役神乃無心應感無方有心不及無心存應不及忘應格量可知也而愚者恃其所見入於人其功外也不亦悲乎注夫至順則用發於彼而以藏於物若恃其所見執其自是雖欲入人其功外矣疏夫忘懷應物者為而不恃功成不居愚惑之徒自執其用叨人功績歸入己身雖欲矜伐其功外矣迷忘如此深可悲哉南華真經注疏卷之三十四
