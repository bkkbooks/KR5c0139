body:
  text: 南華真經注疏卷之二十五慶四河南郭象注唐西華法師成玄英疏雜篇庚桑楚第二十三老聃之役有庚桑楚者偏得老聃之道疏姓庚桑名楚老君之弟子蓋隱者也役門人之稱古人事師共其驅使不憚艱危故稱役也而老君大聖弟子極多門人之中庚桑楚最勝故稱偏得也以北居畏壘之山其臣之畫然知者去之其妾之潔然仁者遠之注畫然飾知潔然矜仁疏畏壘山名在魯國僕隸妾接也言人以仁智為臣妾庚桑子悉棄仁智以接事君子也楚既幽人寄居山藪情敦素朴心鄙浮華山旁士女競為臣妾故畫然舒智自明炫者斥而去之潔然矜仁苟異於物者今其疏遠擁腫之與居注擁腫朴也鞅掌之為使注鞅掌自得疏擁腫鞅掌皆淳朴自得之貌也斥棄仁智淡然歸實故淳素之士與其同居率性之人共其驅使居三年畏壘大穰畏壘之民相與言曰庚桑子之始來吾灑然異之注異其棄知而任愚今吾日計之而不足歲計之而有餘注夫與四時俱者無近功疏大穰豐也灑微驚貌也居住三年山中大熟畏壘百姓僉其私道云庚桑子初來我微驚異本我日計利益不足稱歲計至功其有餘蓋賢聖之人與四時合度無近功故日計不足有遠德故歲計有餘三歲一閏天道小成故居三年而畏壘大穰庶幾其聖人乎子胡不相與尸而祝之社而稷之乎疏庶慕也幾近也尸主也庚桑大賢之士慕近聖人之德何不相共尊而為君主南面之事為立社稷建其宗廟祝祭依禮豈不善邪庚桑子聞之南面而不釋然弟子異之疏忽聞畏壘之人立為南面之主既乖無為之道故釋然不悅門人未明斯趣是以怪而異之也庚桑子曰弟子何異於豫夫春氣發而百草生正得秋而萬寶成夫春與秋豈無得而然哉天道已行矣注夫春秋生氣皆得自然之道故不為也疏夫春生秋實陰陽之恆夏長冬藏物之常事故春秋豈有心施於萬寶而天然之道已自行焉故忘其生有之德也實亦有作寶字者言二儀以萬物為寶故逢秋而成就也吾聞至人尸居環堵之室而百姓猖狂不知所如往注直自往耳非由知也疏四面環各一堵謂之環堵也所謂方丈室也如死尸之寂泊故言尸居今以畏壘之細民而竊竊焉欲俎豆豫于賢人之間我其杓之人邪注不欲為物標杓疏竊竊平章偶語也俎切肉之几豆盛脯之具皆禮器也夫群龍無首先聖格言蒙德養恬後賢軌轍今細碎百姓偶語平章方欲禮我為賢尊我為主便是物標杓豈曰棲隱者乎吾是以不釋於老聃之言注聃云功成事遂而百姓皆謂我自爾今畏壘反此故不釋然疏老君云成功弗居長而不宰楚既虔禀師訓畏壘反此故不釋然弟子曰不然夫尋常之溝巨魚無所還其體而鯢鰌為之制步仞之丘陵巨獸無所隱其軀而㜸狐為之祥注弟子謂大人必有豐祿也疏八尺曰尋倍尋曰常六尺曰步七尺曰仞鯢小魚而有腳此非鯤大魚也制擅也夫尋常小瀆豈鯤鯨之所周旋而鯢鰌小魚反以為美步仞丘陵非大獸之所藏隱而妖㜸之狐用之為吉祥故知巨獸必隱深山大人應須厚祿也且夫尊賢授能先善與利自古堯舜以然而況畏壘之民乎夫子亦聽矣疏尊貴賢人擢授能者有善先用與其利祿堯舜聖人尚且如是況畏壘百姓敢異前修夫子通人幸聽從也庚桑子曰小子來夫函車之獸介而離山則不免于網罟之患吞舟之魚碭而失水則蟻能苦之故鳥獸不厭高魚鱉不厭深注去利遠害乃全疏其獸極大口能含車孤介離山則不免網羅為其患害吞舟之魚其質不小波蕩失水蟻能害之故鳥獸高山魚鱉深水豈好異哉蓋全身遠害魚鳥尚爾而況人乎夫全其形生之人藏其身也不厭深眇而已矣注若嬰身於利祿則粗而淺疏眇遠也夫棲遁之人全形養生者故當遠迹塵俗深就山泉若嬰於利祿則粗而淺也且夫二子者又何足以稱揚哉注二子謂堯舜疏二子謂堯舜也唐虞聖迹亂人之本故何足稱邪是其於辨也將妄鑿垣墻而殖蓬蒿也注將令後世妄行穿鑿而殖穢亂也疏將令後世妄行穿鑿而殖穢亂辨别也物性之外别立堯舜之風以教迹令人倣效者猶如鑿破好垣墻種植蓬蒿之草以為蕃屏者也簡髮而櫛數米而炊注理錐刀之末也疏譬如擇簡毛髮梳以為髢格量米數炊以供餐利益蓋微為捐更甚竊竊乎又何足以濟世哉注混然一之無所治為乃濟疏祖述堯舜私議竊竊此蓋小道何足救世舉賢則民相軋注將戾拂其性以待其所尚任知則民相盜注真不足而以知繼之則僞矣僞以求生拖盜如何疏相盜軋傷也夫舉賢授能任知先善則爭為欺侮盜詐百端趨競路開故更相害也之數物者不足以厚民民之於利甚勤子有殺父臣有殺君正晝為盜目中穴阫注無所復顧疏數物者謂舉賢任知等也此教浮薄不足令百姓淳厚也而蒼生貪利之心甚自殷勤私情怨忿遂生篡弒謀危社稷正晝為盜攻城穿壁日中穴阡也吾語汝大亂之本必生于堯舜之間其末存千世之後千世之後其必有人與人相食也注堯舜遺其迹飾僞播其後以致斯弊疏唐虞揖讓之風會成篡逆之亂亂之根本起自堯舜千載之後其弊不絶黃巾赤眉則是相食也南榮趎蹴然正坐曰若趎之年者已長矣將惡乎託業以及此言邪疏姓南榮名趎庚桑弟子也蹴然驚悚貌南榮既聞斯義心生慕仰於是驚懼正容勤誠請益云趎年老精神暗昧憑託何學方逮斯言庚桑子曰全汝形注中其分也抱汝生注無攬乎其生之外也無使汝思慮營營若此三年則可以及此言也疏不逐物境全形者也守其分內抱生者也既正分全生神凝形逸故不復役知思慮營營徇生也三年虛靜方可及乎斯言此庚桑教南榮之辭也南榮趎曰目之與形吾不知其異也而盲者不能自見耳之與形吾不知其異也而聾者不能自聞心之與形吾不知其異也而狂者不能自得注目與目耳與耳心與心其形相似而所能不同苟有不同則不可彊相法效也疏夫盲聾之士與凡常之人耳目無異而盲者不見色聾者不聞聲風狂之人與不狂之者形貌相似而狂人失性不能自得南榮舉此三諭以況一身不解至道之言與彼盲聾何别故內篇云非唯形骸有聾盲夫智亦有之也形之與形亦辟矣注未有閉之而物或間之邪欲相求而不能相得注兩形雖開而不能相得將有間也疏闢開也間别也夫盲與不盲二形孔竅俱開見與不見於物遂有間别而盲聾求於間見終不可得也亦猶南榮求於解悟無由致之今謂趎曰全汝形抱汝生勿使汝思慮營營趎勉聞道達耳矣注早聞形隔故難化也疏全形抱生已如前釋重述所間以彰問㫖庚桑子曰辭盡矣曰奔蜂不能化藿蠋越雞不能伏鵠卵魯雞固能矣疏奔蜂細腰土蜂也藿豆也蠋者豆中大青蟲越雞荆雞也魯雞今之蜀雞也奔蜂細腰能化桑蟲為己子而不能化藿蠋越雞小不能伏鵠卵蜀雞大必能之也言我才劣未能化大所說辭情理盡於此也雞之與雞其德非不同也有能與不能者其才固有巨小也今吾才小不足以化子子胡不南見老子疏夫雞有五德頭戴冠禮也足有距義也得食相呼仁也知時智也見敵能距勇也而魯越雖異天德則同所以有能與不能者才有大小也我類越雞才小不能化子子何不南行往師以謁老君南榮趎贏糧七日七夜至老子之所疏贏裹也儋也慕聖情殷晝夜不息終乎七日方見老君也老子曰子自楚之所來乎南榮趎曰唯疏自從也問云汝從桑楚處來南榮趎曰唯直敬應之聲也答云如是老子曰子何與人偕來之衆也注挾三言而來故疏偕俱也老子聖人照機如鏡未忘仁義故刺以偕來理挾三言故譏之言衆也南榮趎懼然顧其後疏懼然驚貌也未達老子之言忽聞衆來之說顧盻其後恐有多人也老子曰子不知吾所謂乎疏謂者言意也我言偕來譏汝挾三言而來汝視其後是不知吾謂也南榮趎俯而慙仰而歎曰今者吾忘吾答因失吾問疏俯低頭也自知暗昧不達聖言於是俯首羞慚仰天歎息神魂恍忽情彩章惶豈直喪其形容亦乃失其咨問老子曰何謂也疏問其所言有何意謂南榮趎曰不知乎人謂我朱愚知乎反愁我軀疏朱愚猶專愚無知之貌也若使混沌塵俗則有愚癡之名若也運智人間更致危身之禍禍敗在己故云愁軀也不仁則害人仁則反愁我身不義則傷彼義則反愁我己我安逃此而可此三言者趎之所患也願因楚而問之疏仁者兼愛之迹義者成物之功並是先聖蘧廬非所以全身遠害者也故不仁不義則傷物害人行義行仁則乖真背道未知若為處心免兹患害寄此三言因桑楚以為媒願留聽於下問老子曰向吾見若眉睫之間吾因以得汝矣今汝又言而信之疏吾昔觀汝形貌已得汝心今子所陳畢挾三術以子之言於是信驗若規規然若喪父母揭竿而求諸海也汝亡人哉惘惘乎疏規規細碎之謂也汝用心細碎懷兹三術猶如童稚小兒喪失父母也似儋揭竿木尋求大海欲測深底其可得乎汝是亡真失道之人亦是溺喪逃亡之子芒昧何所歸依也汝欲及汝情性而無由入可憐哉疏榮趎踐於聖迹溺於仁義縱欲還原及本復歸於實生真情瘡疣已成無由可入大聖運慈深可哀愍也南榮趎請入就舍召其所好去其所惡十日自愁復見老子疏既失所問情識芒然於是退就家中思惟旬日徵求所好之道德除遣所惡之仁義末能契道是以悲愁庶其請益仍見老子老子曰汝自灑濯熟哉鬱鬱乎然而其中津津乎猶有惡也疏歸家一旬遣除五隱滌蕩穢纍精熟以吾觀汝氣鬱鬱乎乎雖復加功津津尚漏以此而驗惡猶未盡也夫外韄者不可繁而捉將內揵內韄者不可繆而捉將外揵注揵關揵也耳目外也心術內也夫全形抱生莫若忘其心術遺其耳目若乃聲色韄於外則心術塞於內欲惡韄於內則耳目喪於外固必無得無失而後為通也疏韄者繫縛之名揵者關閉之目繁者急也繆者殷勤也言人外用耳目而為聲色所韄者則心神閉塞於內也若內用心智而為欲惡所牽者則耳目閉塞於外也此內外相感必然之符假令用心禁制急手捉持殷勤綢繆亦無由得也夫唯精神定於內耳目靜於外者方合全生之道外內韄者道德不能持而況放道而行者乎注偏韄由不可況外內俱韄乎將耳目眩惑於外而心術流蕩於內雖繁手以執之綢繆以持之弗能止也疏偏執滯邊已乖生分況內外韄溺為惑更深縱有懷道抱德之士尚不能扶持況放散玄道而專行此惑欲希禁止可得乎南榮趎曰里人有病里人問之病者能言其病然其病病者猶未病也疏閭里有病鄰里問之病人能自說其病狀者此人雖病猶未困重而可療也亦猶南榮雖愚能自陳過狀庶可教也若趎之聞大道譬猶飲藥以加病也疏夫藥以療疾疾愈而藥消教以機悟機悟而教息苟其本不病藥復不消教資不忘機又不悟不謂飲藥以加其病趎願聞衛生之經而已矣疏經常也已止也夫聖教多端學門匪一今所謂衛請全生心之所存止在於此如蒙指誨輒奉為常老子曰衛生之經能抱一乎注不離其性疏守真不二也能勿失乎注還自得也疏自得其性也能無卜筮而知吉凶乎注當則吉過則凶無所卜也疏履道則吉徇物則凶斯理必然豈用卜筮能止乎注止於分也疏不逐分外能已乎注無追故迹疏已過不追能舍諸人而求諸己乎注全我而不效彼疏諸於也捨棄效彼之心追求己身之道能翛然乎注無停迹也疏往來無係止能侗然乎注無節礙也疏順物無心也能兒子乎疏同於赤子也兒子終日嗥而嗌不嗄和之至也注任聲之自出不由於喜怒疏嗌喉塞也嗄聲破任氣出聲心無喜怒故終日啼號不破不塞淳和之守遂至於斯終日握而手不掜共其德也注任手之自握非獨得也疏掜拘寄勞倦者為其淳和與玄道至德同也終日視而目不瞚偏不在外也注任目之自見非係於色也疏瞚動也任眼見視視不動目不偏滯於外塵也行不知所之注任足之自行無所趣疏之往也泛若不繫之舟故雖行而無所的詣也居不知所為注縱體而自任也疏恬淡無為寂寞之至與物委蛇注斯順之也疏接物無心委曲隨順而同其波注物波亦波疏和光混迹同其波也是衛生之經已疏總指已前結成義也南榮趎曰然則是至人之德已乎注若能自改而用此言更欲目謂至人之德疏如前所說衛生之經依而行之合於玄道至人之德止此可乎曰非也是乃所謂冰解凍釋者注能乎明非自爾疏南榮拘束仁義其日固久余聞聖教方解衛生譬彼冬冰逢兹春日執滯之心於斯釋散此因學致悟非率自然能乎明非真也此則老子答趎之辭也夫至人者相與交食乎地而交樂乎天注自無其心皆與物共疏夫至人無情隨物興感故能同蒼生之食地共羣品而樂天交共也不以人物利害相攖不相與為怪不相與為謀不相與為事疏攖擾亂也夫至人虛心順世與物同波故能息怪異於羣生絶謀謨於黎首既不以事為事何利害之能擾乎翛然而往侗然而來是謂衛生之經已疏重舉前文結成其義曰然則是至乎注謂己便可得此言而至邪疏謂聞此言可以適極南榮不敏重問老君曰未也吾固告汝曰能兒子乎注非以此言為不至也但能聞而學者非自至耳苟不自至則雖聞至言適可以為經胡可得至哉故學者不至至者不學也疏夫云能者奬勸之辭也此言雖至猶是筌蹄既曰告汝則因禀學然學者不至至者不學在筌異魚故曰未也此是老子重答南榮兒子動不知所為行不知所之身若槁木之枝而心若死灰疏虛冲凝淡寂寞無情同槁木而不榮類死灰而忘照身心既其雙遣何行動之可知乎衛生之要也若是者禍亦不至福亦不來禍福無有惡有人災也注禍福生於失得人灾由於愛惡今槁木死灰無情之至則愛惡失得無自而來疏夫禍福生乎得喪人灾起乎美惡今既形同槁木心若死灰得喪兩忘美惡雙遣尚無冥昧之責何入災之有乎宇泰定者發乎天光注夫德宇泰然而定則真所發者天光耳非人耀疏夫身者神之舍故以至人為道德之器宇也且德宇安泰而靜定者其發心照物由乎自然之智光發乎天光者人見其人注天光自發由人見其人物見其物物各自見而不見彼所以泰然而定也疏凡庸之人不能測聖伹見羣於衆庶不知天光遐照也人有修者乃今有恆注人而修人則自得矣所以常泰疏恆常也理雖絶學道亦資求故有真修之人能會凝常之道也有恆者人舍之天助之注常泰故能反居我宅而自然獲助也疏體常之人動以吉會為蒼生之所舍止皇天之所福助不亦宜乎人之所舍謂之天民天之所助謂之天子注出則天子處則天民此二者俱以泰然而自得之非為而得之也疏出則君后處則逸人皆以臨道體常故致斯功者也學者學其所不能學也行者行其所不能行也辨者辨其所不能辨也注凡所能者雖行非為雖習非學雖言非辨疏夫為於分內者雖為也不為故雖學不學雖行不行雖辨不辨豈復為於分外學所不能邪知止乎其所不能知至矣注所不能知不可彊知故止斯至疏率其所能止於分內所不能者不彊知之此臨學之至妙若有不即是者天鈞敗之注意雖欲為為者必敗理終不能疏若有心分外即不以分內為是者斯敗自然之性者也備物以將形注因其自備而順其成形疏將順也夫造化洪爐物皆備足但順成形於理問學藏不虞以生心注心自生耳非虞而出之虞者億度之謂疏夫至人無情物感斯應包藏聖智遇物生心終不預謀所為虞度者也敬中以達彼注理自達彼耳非慢中而敬外疏中內智也彼外境也敬重神智不敢輕染智既凝寂境自虛通若是而萬惡至者皆天也注天理自有窮通而非人也注有為而致惡者乃是人疏若文王之拘羑里孔子之困匡人智非不明也人非不聖也而遭斯萬惡窮否者蓋由天時運命耳豈人之所為哉不足以滑成注安之苦命故其成不滑疏滑亂也體道會真安時達命縱遭萬惡不足以亂於大成之心不可內於靈臺注靈臺者心也清暢故憂患不能入疏內入也靈臺心也妙體空靜故世物不能入其靈臺也靈臺者有持注有持者謂不動於物耳其實非持疏惟貴能持之心竟不知所以也而不知其所持注若知其所持則持之而不可持者也注持則失也疏若有心執持則失之遠矣故不可也不見其誠己而發注此妄發作每發而不當注發而不由己誠何由而當疏以前顯得道之士智照光明此下明喪真之人妄心乖默誠實也未曾反照實智而輒妄發迷心心既不真故每乖實當也業入而不舍注事不居其分內疏業事也世事攖擾每入心中不達違從故不能舍止每更為失注發由已誠乃為得也疏每妄發心緣逐前境自謂為得翻更喪真為不善乎顯明之中者人得而誅之為不善乎幽間之中者鬼得而誅之疏夫人鬼幽顯乃曰殊塗至於推誠履信道理無隔若彼乖分失真必招報應讎怨相感所以遭誅則材伯彭生之類是也明乎人明乎鬼者然後能獨行注幽顯無愧於心則獨行而不懼疏幽顯二塗分明無譴不犯於物故獨行不懼也券內者行乎無名注劵分也夫遊於分內者行不由於名疏劵分也無名道也履道而為於分內者雖行而無名迹也券外者志乎期費注有益無益期欲損己以為物也疏期卒也立志矜矯游心分外終無成益卒有費損也行乎無名者唯庸有光注本有斯光因而用之疏庸用也游心無名之道者其所用智日有光明也志乎期費者唯賈人也注雖己所無猶借彼而販賣也疏志求之分外要期聲名而貪損神智者意唯名利猶高價販賣之人人見其跂猶之魁然注夫期費者人已見其跂矣而猶自以為安疏企危也魁安也鋭情貪取分外企求他人見其危乎猶自以為安隱愚之至也與物窮者物入焉注窮謂終始疏舍止之謂也物我冥符而窮理盡性者故為外物之所歸依之也與物且者其身之不能容焉能容人注且謂劵外而跂者跂者不立焉能自容不能自容焉能容人人不獲容則去也疏聊與人涉苟且於浮華貪利求名身尚矜企心靈躁競不能自容何能容物邪不能容人者無親無親者盡人注身且不能容則雖己非己況能有親乎故盡是他人疏褊狹不容則無親愛既無親愛則盡是他人逆忤既多讎敵非少欲求安泰其可得乎兵莫憯于志鏌鎁為下注夫志之所攖焦火凝水故其為兵甚於劍㦸也疏兵戈鋒刃之徒鏌鎁良劍也夫憯毒傷害莫甚乎心心志所緑不疾而速故其為損害甚於鏌鎁以比校量劍㦸為下寇莫大於陰陽無所逃於天地之間疏寇敵也域心得喪喜怒戰於胸中其寒凝水其熱焦火此陰陽之寇也夫勍敵巨寇猶可逃之而兵起內心如何避邪非陰陽賊之心則使之也注心使氣則陰陽徵結於五藏而所在皆陰陽也故不可逃疏此非陰陽能賊害於人但由心有躁競故使之然也道通其分也其成也毁也注成毁無常分而道皆通疏夫物之受氣各有崖限妍醜善惡禀分毁成而此謂之成彼謂之毁道以通之無不備足所惡乎分者其分也以備注不守其分而求備焉所以惡分也疏夫榮辱壽天禀自天然素分之中反己備足分外馳者而求備焉游心是非之境惡其所受之分也所以惡乎備者其有以備注本分不備而有以求備所以惡備也若其本分素備豈惡之哉疏造物已備而嫌惡之豈知自然先已備矣故出而不反見其鬼注不反守其分內則其死不久疏夫出愚惑妄逐是非之境而不能反本還原者動之死地故見為鬼也出而得是謂得死注不出而無得乃得生疏其出心逐物遂其欲情而有所獲者此可謂得死滅之本滅而有實鬼之一也注已滅其性矣雖有斯生何異於鬼疏迷滅本性謂身實有失死不殊故與鬼為一也以有形者象無形者而定矣注雖有斯形苟能曠然無懷則生全而形定也疏象似也雖有斯形似如無者即形非有故也曠然忘我故心靈和光而止定也出無本注欻然自生非有本入無竅注欻然自死非有根疏出生也入死也從無出有有無根原自有還無無乃無竅穴也有實而無乎處有長而無乎本剽疏剽末也亦原也本亦作摽字今隨字讀云言從無出有實有此身推索因由意無處所自古至今甚為長遠尋今竟無本末有所出而無竅者有實注言出者自有實耳其所出無根竅以出之疏有所出而無竅穴者以凡觀之謂其有實其實不有也有實而無乎處者宇也注宇者有四方上下而四方上下未有窮處疏宇者四方上下也方物之生謂其有實尋責宇中竟無來處宇既非矣處豈有邪有長而無本剽者宙也注宙者有古今之長而古今之長無極疏宙者往古來今也時節賒長謂之今古推求代叙竟無本末宙既無矣本豈有邪有乎生有乎死有乎出有乎入入出而無見其形注死生出入皆欻然自爾無所由故無所見其形疏出入由生死也謂其出入生死故有出入之名推窮性理竟無出入處所之形而可見也是謂天門注天門者萬物之都名也謂之天門猶云衆妙之門也疏天者自然之謂也自然者以無所由為義言萬有皆無所從莫測所以自然為造物之門户也天門者無有也萬物出乎無有注死生出入皆欻然目爾未有為之者也然有聚散隱顯故有出入之名徒有名耳竟無出入門其安在乎故以無為門以無為門則無門也疏夫天然之理造化之門徒有其名竟無其實而一切萬物從此門生故郭注云以無為門以無為門則無門矣有不能以有為有注夫有之未生以何為生乎故必自有耳豈有之所能有乎疏有既有矣焉能有有有之未生誰生其有椎求淅有竟無有也必出乎無有注此所以明有之不能為有而自有耳非謂無能為有也若無能為有何謂無乎疏夫已生未生二俱無有此有之出乎無有非謂此無能生有無若生有何謂無乎而無有一無有注一無有則遂無矣無者遂無則有自欻生明矣疏不問百非四句一抄皆無故謂一無有聖人藏乎是注任其自生而不生生疏玄德聖人冥真契理藏神隱智其在兹乎古之人其知有所至矣疏玄古聖人得道之士知與境合故稱為至惡乎至疏何至所由有何為至有以為未始有物者至矣盡矣弗可以加矣疏此顯至之體狀也知既造極觀中皆空故能用諸有法未曾有一物者也可謂精微至極窮理盡性虛妙之甚不復可加矣其次以為有物矣疏其次以下未達真空而諸萬境用為有物也將以生為喪也注喪其散而之乎聚也以死為反也注還融液也疏喪失也流俗之人以生為得以死為喪今欲反於迷情故以生為喪以其無也以死為反反於空寂雖未盡於至妙猶齊於死生是以分已注雖欲均之然已分也疏雖齊死生猶見死生之異故從非有而起分别也其次曰始無有既而有生生俄而死以無有為首以生為體以死為尻孰知有無死生之一守者吾與之為友疏其次以下心知稍暗而始本無有從無有生俄頃之間此生彼滅故用無為其頭以生為其形體以死為其尻誰能知有無生死之不二而以此修守者莊生狎而友朋斯人猶難得也是三者雖異公族也注或有而無之或有而一之或分而齊之故謂三也此三者雖有盡與不盡然俱能無是非於胸中故謂之公族疏三者謂以無為首以生為體以死為尻是也於一體之中而起此三異猶如楚家於一姓之上分為三族昭景也著戴也甲氏也著封也非一也注此四者雖公族然已非一則向之三者已復差之疏昭屈景楚之公族三姓昔屈原為三閭大夫掌三族三姓即斯是也此中文略故直言昭景王孫公子長大加冠故著衣而戴冠也各有品秩咸蒞職官因官賜姓故甲第氏族也功績既著封之茅土枝派分流故非一也猶如一道之中分為有無生死種類不同名實各有異故引其族內譬也有生黬也注直聚氣也疏黬疵也無有此形質而謂之生者直是聚氣成疵鹹非所貴者也披然曰移是注既披然而有分則各是其所是矣是無常在故曰移疏披分散也天道無彼我而物有是非是非不定故分散移徙而不常也其移是之狀列在下又嘗言移是非所言也注所是之移已著於言前矣疏理形是非故或言耳然是非之移非忠言也雖然不可知者也注不言其移則其移不可知故試言也疏雖復是非不由於言而非言無以知是非故試言是非一遣於是非名不寄言則不知是非之無是非也臘者之有膍胲可散而不可散也注物各有用疏臘者大祭也膍生百葉也胲備也亦言是牛蹄也臘祭之時牲牢甚備至於四枝五藏並皆陳設祭事既訖方復散之則以散為是若是祭未了則不合散則以散為不是是知是與不是移是無常觀室者周於寢廟又適期偃焉注偃謂屏厠疏偃屏厠也祭事既竟齊宫與飲施設餘胙屋室之中觀看周旋於寢廟之內飲食既久應須便僻故往圊圂而便尿也飲食則以寢廟為是便尿則以圊圂為是是非無常竟何定乎臘者明聚散無恆觀室顯處所不定俱無是非也為是舉移是注寢廟則以饗燕屏厠則以偃溲當其偃溲則寢廟之是移於屏厠矣故是非之移一彼一此誰能常之故至人因而乘之則均耳請常言移是是以生為本注物之變化無時非生生則所在皆本也疏夫悲忘生死者則無是無非者也祇為滯生所以執是也必能遣生是將安寄故知移是以生為本以知為師注所知雖異而各師其知因以乘是非注乘是非者無是非也疏因其師知之心心乘是非之用豈知師知者顚倒是非者無是非乎果有名實注物之名實果各自有疏夫物云云悉皆虛幻芻狗萬像名實何於倒置之徒謂决定有此名實也因以己為質注質主也物各謂己是足以為是非之主疏質主也妄執名實遂用己為名實之主而競是非也使人以為已節注人皆謂己是故莫通疏節者至操也既迷名實又滯是非遂使無識之人堅執虛名以為節操也因以死償節注當其所守非真脫也疏守是非以成志操慤乎不拔期死執之也若然者以用為知以不用為愚以徹為名以窮為辱注不能隨所遇而安之疏以炫耀為智晦迹為愚通徹為榮名窮塞為恥辱若然者豈能一窮通榮辱乎移是今之人也注玄古之人無是無非何移之有疏夫固執名實移滯是非澆季浮僞今世之人也豈上古淳和質朴之士乎是蜩與鷽鳩同於同也注同共是其所同疏蜩鷽二蟲以蓬蒿為是二蟲同是未為通見移是之人斯以類也蜩同於鳩鳩同於蜩故曰同於同也蹍市人之足則辭以放驁注稱己脫誤以謝之疏蹍踏也履也履踏市廛之人不相識者之節腳即謝云已傲慢放縱錯雜誤而然非故為也者兄則以嫗注言嫗詡之無所辭謝疏踏著兄弟之足則嫗詡而憐之不以言愧大親則已矣注明恕素足疏若父踏子足則默然而已不復辭費故知言辭往來虛僞不實故曰至禮有不人注不人者視人若己視人若己則不相辭謝斯乃禮之至也疏自彼兩忘視人若己不允人者己外何辭謝之有乎斯至禮也至義不物注各得其宜則物皆我也疏物我雙遣妙得其宜不却我外有物何裁非之有斯至義至知不謀注謀而後知非自然知疏率性而照非謀謨而智斯至智也至仁無親注譬之五藏未曾相親而仁已至矣疏方之手足更相御用無心相為而相濟之功成矣豈有親愛於其間哉至信辟金注金玉者小信之質耳至信則除矣疏辟除也金玉者信之質耳至信則棄除之矣徹志之勃解心之謬去德之纍達道之塞疏徹毁也勃亂也繆繫縛也此略標名下具顯釋也貴富顯嚴名利六者勃志也疏榮貴富贍高顯尊嚴聲名利祿六者亂情志之具也容動色理氣意六者謬心也疏容貌變動顔色辭理氣調情意六者綢繆繫縛心靈者也本亦有作謬字者解心之謬妄也惡欲喜怒哀樂六者纍德也疏憎惡愛欲欣喜恚怒悲哀歡樂六者德家之患纍也去就取與知能六者塞道也疏去捨從就貪取施與知慮彼能六者蔽真道也此四六者不蕩胸中則正正則靜靜則明明則虛虛則無為而無不為也注蕩動也疏四六之病不動蕩於胸中則心神平正正則安靜靜則照明明則虛通虛則恬淡無為應物而無不窮也道者德之欽也疏道是所修之法德是臨人之法重人輕法故欽仰於道生者德之光也疏天地之大德曰生故生化萬物者盛德之光華也性者生之質也疏質本也自然之性者是禀生之本也性之動謂之為注以性自動故稱為耳此乃真為非有為也疏率性而動分內而為為而無為非有為也為之僞謂之失疏感物而動性之欲僞情分外有為謂之喪道也知者接也知者謨也疏夫交接前物謀謨情事故謂之知也知者之所不知猶睨也注夫目之能視非知視而親也不知視而視不知知而知耳所以為自然若知而後為則知僞也疏睨視也夫目之張視也不知所以視而視視有明暗心之能知不知所以知而知而知有深淺目不能視而不可彊視心不能知而不可彊知若有分限故猶如睨也動以不得已之謂德注若得已而動則為彊動者所以失也疏夫迫而後動和而不習不得已而用之可謂盛德也動無非我之謂治注動而效彼則亂疏率性而動不捨我效物合於正理故不亂名相反而實相順也注有彼我之名故反各得其實則順疏有彼我是非之名故相反無彼我是非之實故實相順也羿工乎中微而拙乎使人無己譽注善中則善取譽矣理常俱疏羿古之善射人工巧也羿彎弓放矢工中前物盡射家之微妙既有斯伎則擅斯名使己無令譽不可得也聖人工乎天而拙乎人注任其自然天也有心為之人也疏前起譬此合諭也聖人妙契自然功侔造化使羣品日用不知不顯其迹此誠難也故上文云使天下兼忘我難夫工乎天而俍乎人者唯全人能之注工於天即俍於人矣謂之全人全人則聖人也疏俍善也全人神人也夫巧合天然善能晦迹澤及萬世而日用不知者其神人之謂乎神人無功故能之耳唯蟲能蟲唯蟲能天注能還守蟲即是能天疏鳥飛獸走能蟲也蛛網蜣丸能天也皆禀之造物豈倣效之所致哉全人惡天惡人之天疏夫全德之人神功不測豈嫌己之素分而惡人之所禀哉蓋不然率順其天然而已矣而況吾天乎人乎注都不知而任之斯而謂工乎天疏天乎人乎不見人天之異都任之也前自遺天人美惡猶有天人此句混一天人不見天人之異也吾者論主假自稱也一雀適羿羿必得之威也注威以取物物必逃之疏假有一雀羿善射射必得之此以威猛猛非由德慧故所獲者少所逃者多以威御世其義亦爾以天下為之籠則雀無所逃注天下之物各有所好所好各得則逃將安在疏大道曠蕩無不制圍故以天地為籠則雀無逃處是知以威取物深乖大造是故湯以庖人籠伊尹秦穆公以五羊之皮籠百里奚疏伊尹有莘氏之媵臣能調鼎負玉鼎以干湯湯知其賢也又順其性故以庖厨而籠之百里奚沒狄狄人愛羊皮秦穆公以五色羊皮而贖之又云百里奚好著五色羊皮裘號曰五羖大夫而湯聖穆賢俱能好士故得此二人用為良佐皆順其本性所以籠之是故非以其所好籠之而可得者無有也疏順其所好則天下無難逆其本性而籠得者未之有也介者拸畫外非譽也注畫所以飾容貌也刖者之貌既以虧殘則不復以好醜在懷故拸而棄之疏介刖也拸去也畫裝也裝嚴服飾本為容儀殘刖之人形貌殘損至於非譽榮辱無復在懷故拸而棄之胥靡登高而不懼遺死生也注無賴於生故不畏死疏胥靡徒役之人也千金之子固貴其身僕隸之人不重其命既不矜惜故登危而不怖懼也天復謵不餽而忘人注不識人之所惜疏餽本亦有作愧字者隨字讀之夫復於本性胥以成之既不捨己效人遂棄忘於愧謝斯忘於人倫之道也譬之手足方諸服用更相御用豈謝賴於其間哉忘人因以為天人矣注無人之情則自然為天人疏率其天道之性忘於人道之情因人於自然之理也故敬之而不喜侮之而不怒者唯同乎天和者為然注彼形殘胥靡而猶同乎天和況天和之自然乎疏同乎天和忘於逆順故恭敬之而不喜侮慢之而不怒也出怒不怒則怒出於不怒矣出為無為則為出於無為矣注此故是無不能生有有不能為生之意也疏夫能出怒出為者不為不怒者也是以從不怒不為出故知為本無為怒本不怒能體斯趣故侮之而不怒也欲靜則平氣欲神則順心有為也欲當則緣於不得已不得己之類聖人之道注平氣則靜理足順心則神功至緣於不得已則所為皆當故聖人以斯為道豈求無為於恍惚之外哉疏緣順也夫欲靜攀緣必須調乎志氣神功變化莫先委順心靈和混有為之中而欲當於理者又須順於不得止不得止者感而後應分內之事也如斯之例聖人所以用為正道也南華真經注疏卷之二十五
