body:
  text: 南華真經注疏卷之一河南郭象注唐西華法師成玄英疏內篇逍遙遊第一注夫小大雖殊而放於自得之場則物任其性事稱其能各當其分逍遙一也豈容勝負於其間哉北冥有魚其名為鯤鯤之大不知其幾千里也疏溟猶海也取其溟漠無涯故為之溟東方朔十洲記云溟海無風而洪波百丈巨海之內有此大魚欲明物性自然故標為章首玄中記云東方有大魚焉行者一日過魚頭七日過魚尾産三日碧海為之變紅故知大物生於大處豈獨北溟而已化而為鳥其名為鵬注鵬鯤之實吾所未詳也夫莊子之大意在乎逍遙遊放無為而自得故極小大之致以明性分之適達觀之士宜要其會歸而遺其所寄不足事事曲與生說自不害其弘㫖旨皆可略之疏夫四序風馳三光電卷是以負山嶽而捨故揭舟壑以趨新故化魚為鳥欲明變化之大理也鵬之背不知其幾千里也怒而飛其翼若垂天之雲疏魚論其大以表頭尾難知鳥言其背亦示修短叵測故下文云未有知其修者也鼓怒翅翼奮迅毛衣既欲摶風方將擊水遂乃斷絶雲氣背負青天騫翥翶翔凌摩雷霄漢乘垂陰布影若天涯之降行雲也是鳥也海運則將徙於南冥南冥者天池也注非溟海不足以運其身非九萬里不足以負其翼此豈好竒哉直以大物必自生於大處大處亦必自生此大物理固自然不患其失又何措心於其間哉疏運轉也是指斥也即此鵬鳥其形重大若不海中運轉無以自致高升皆不得不然非樂然也且形既遷革情亦隨變昔日為魚涵泳北海今時作鳥騰翥南溟雖復升沉性殊逍遙一也亦猶死生聚散所遇斯適千變萬化未始非吾所以化魚為鳥自北徂南者鳥是凌虛之物南即啓明之方魚乃滯溺之蟲北有幽冥之地欲表向明背暗捨滯求進故舉南北鳥魚以示為道之徑耳而大海洪川原夫造化非人所作故曰天池也齊諧者志怪者也諧之言曰鵬之徙於南冥也水擊三千里摶扶搖而上者九萬里注夫翼大則難舉故摶扶搖而後能上九萬里乃足自勝耳既有斯翼豈得决然而起數仞而下哉此皆不得不然非樂然也去以六月息者也注夫大鳥一去半歲至天池而息小鳥一飛半朝槍榆枋而止此比所能則有間矣其於適性一也疏姓齊名諧人姓名也亦言書名也齊國有此悱諧之書也志記也擊打也摶鬥也扶搖旋風也齊諧所著之書多記怪異之事莊生引以為證明己所說不虛大鵬既將適南溟不可决決然而起所以舉擊兩翅動蕩三千踉蹌而行方能離水然後繚戾宛轉鼓怒徘徊風氣相扶搖動而上塗經九萬時隔半年從容志滿方言憩止適足而已豈惜情乎哉野馬也塵埃也生物之以息相吹也注此皆鵬之所憑以飛者耳野馬者遊氣也疏爾雅云邑外曰郊郊外曰牧牧外曰野此言青春之時陽氣發動遙望藪澤之中猶如奔馬故謂之野馬也揚土曰塵塵之細者曰埃天地之間生物氣息更相吹動以舉於鵬者也夫四生雜沓萬類參差形性不同資待宜異故鵬鼓乖垂天之翼託風氣以逍遙蜩張决決起之翅槍榆枋而自得斯皆率性而動禀之造化非有情於遐邇豈措意於驕矜體斯趣者於何而語夸企乎天之蒼蒼其正色邪其遠而無所至極邪其視下也亦若是則已矣注今觀天之蒼蒼竟未知便是天之正色邪天之為遠而無極邪鵬之自上以視地亦若人之自此視天則止而圖南矣言鵩不知道里之遠近趣足以自勝而逝疏仰視圓穹甚為迢遞碧空高遠算數無窮蒼蒼茫昧豈天正色然鵬處中天人居下地而鵩之俯視不異人之仰觀人既不辨天之正色鵬亦詎知地之遠近自勝取足適至南溟鵬之圖度止在於是矣且夫水之積也不厚則其負大舟也無力覆杯水於坳堂之上則芥為之舟置杯焉則膠水淺而舟大也注此皆明鵬之所以高飛者翼大故耳夫質小者所資不待大則質大者所用不得小矣故理有至分物有定極各足稱事其濟一也若乃失乎忘生之主而營生於至當之外事不在力動不稱倩則雖乘天之翼不能無窮决起之飛不能無困矣疏且者假借是聊略之辭夫者開發在語之端緒積聚也厚深也杯小器也坳污陷也謂堂庭坳陷之地也芥草也膠黏也此起譬也夫翻覆一杯之水於坳污堂地之間將草葉為舟則浮泛靡滯若還用杯為舟理必不可何者水淺舟大則黏地不行故也是以大舟必須深水小芥不待洪流苟其大小得宜則物皆逍遙風之積也不厚則其負大翼也無力故九萬里則風斯在下矣疏此合喻也夫水不深厚則大舟不可載浮風不崇高大翼無由凌漢是以小鳥半朝决起槍榆之上大鵬九萬飄風鼓鼓扇其下也而後乃今培風背負青天而莫之天閼者而後乃今將圖南注夫所以乃今將圖南者非其好高而慕遠也風不積則夭閼不通故耳此大鵬之逍遙也疏培重也夭折也閼塞也初賴扶搖故能升翥重積風吹然後飛行既而上負青天下乘乘風脊一凌霄漢至六月方止網羅不逮畢弋無侵折塞之禍於何而至良由資待合宜自致得所逍遙南海不亦宜乎蜩與鷽鳩笑之曰我决決起而飛槍榆枋時則不至而控於地而已矣奚以之九萬里而南為注茍足於其性則雖大鵬無以自貴於小鳥小鳥無羡於天池而榮願有餘矣故小大雖殊逍遙一也疏蜩蟬也生七八月紫青色一名昭蟟鷽鳩鶻鳩也即今之斑鳩是也决決卒疾之貌槍集也亦突也枋檀木也控投也引也窮也奚何也之適也蜩鳩聞鵬鳥之宏大資風水以高飛故嗤彼形大而劬勞欣我質小而逸豫且騰躍不過數仞突榆檀而栖集時困不到前林投地息而更起逍遙適性樂在其中何須地經六月途遙九萬跋涉辛苦南適胡為以小笑大夸企自息而不逍遙者未之有也適莽蒼者三餐而反腹猶果然適百里者宿春糧適千里者三月聚糧注所適彌遠則聚糧彌多故其翼彌大則積氣彌厚也疏適往也莽蒼郊野之色遙望之不甚分明也果然飽貌也往於郊野來去三食路既非遙腹猶充飽百里之行路程稍遠春搗糧食為一宿之備借適於千里之塗路既迢遙聚積三月之糧方充往來之食故郭注云所適彌遠則聚糧彌多故其翼彌大則積氣彌厚者也之二蟲又何知注二蟲謂鵬蜩也對大於小所以均異趣也夫趣之所以異豈知異而異哉皆不知所以然而自然耳自然耳不為也此逍遙之大意疏郭注云二蟲鵬蜩也對大於小所以均異趣也且大鵬摶風九萬小鳥决決起榆枋雖復遠近不同適性均也咸不知道里之遠近各取足而自勝天機自張不知所以既無意於高卑豈有情於優劣逍遙之致其在兹乎而呼鵬為蟲者大戴禮云東方鱗蟲三百六十應龍為其長南方羽蟲三百六十鳳皇為其長西方毛蟲三百六十麒麟為其長北方甲蟲三百六十靈龜為其長中央裸蟲三百六十聖人為其長通而為語故名鵬為蟲也小知不及大知小年不及大年注物各有性性各有極皆如年知豈跂尚之所及哉自此已下至于列子歷舉年知之大小各信其一方未有足以相傾者也然後統以無待之人遺彼忘我冥此群異異方同得而我無功名是故統小大者無小無大者也苟有乎小大則雖大鵬之與斥鴳宰官之與御風同為纍物耳齊死生者無死無生者也苟有乎死生則雖大椿之與蟪蛄彭祖之與朝菌均於短折耳故遊於無小無大者無窮者也冥乎不死不生者無極者也若夫逍遙而繫於有方則雖放之使遊而有所窮矣未能無待也疏夫物受氣不同禀分各異智則有明有暗年則或短或長故舉朝菌冥靈宰官榮子皆如年智豈企尚之所及哉故知物性不同不可强相希效也奚以知其然也疏奚何也然如此也此何以知年智不相及若此之縣解耶假設其問以生後答朝菌不知晦朔蟪蛄春不知秋此小年也疏此答前問也朝菌者謂天時滯雨於糞壤之上熱蒸而生陰濕則生見日便死亦謂之犬大芝生於朝而死於暮故曰朝菌月終謂之晦月旦謂之朔假令逢䕃陰數日便萎終不涉三旬故不知晦朔也蟪蛄夏蟬也生於麥梗亦謂之麥節夏生秋死故不知春秋也菌則朝生暮死蟬則夏長秋殂斯言齡命短促故謂之小年也楚之南有冥靈者以五百歲為春五百歲為秋上古有大椿者以八千歲為春八千歲為秋疏冥靈大椿並木名也以葉生為春以葉落為秋冥靈生於楚之南以二千歲為一年也而言上古者伏犧時也大椿之木長於上古以三萬二千歲為一年也冥靈五百歲而花生大椿八千歲而葉落並以春秋賒永故謂之大年也而彭祖乃今以久久特聞衆人匹之不亦悲乎注夫年知不相及若此之懸也比於衆人之所悲亦可悲矣而衆人未嘗悲此者以其性各有極也苟知其極則豪分不可相跂天下又何所悲乎哉夫物未嘗以大欲小而必以小羡大故舉小大之殊各有定分非羡欲所及則羡欲之纍可以絶矣夫悲生於纍纍絶則悲去悲去而性命不安者未之有也疏彭祖者姓籛名鏗帝顓頊之玄孫也善養性能調鼎進雉羹於堯堯封於彭城其道可祖故謂之彭祖歷夏經殷至周年八百歲矣特獨也以其年長壽所以聲獨聞於世而世人比匹彭祖深可悲傷而不悲者為彭祖禀性遐壽非我氣類置之言外不敢嗟傷故知生也有涯豈唯彭祖去己一毫不可企及於是均椿菌混彭殤各止其分而性命安矣湯之問棘也是己注湯之問棘亦云物各有極任之則條暢故莊子以所問為是也疏湯是帝嚳之後契之苗裔姓子名履字天乙母氏扶都見白氣貫月感而生湯豐下兊兑上身長九尺仕夏為諸侯有聖德諸侯歸之遭桀無道囚於夏臺後得免乃與諸侯同盟於景亳之地會桀於昆吾之墟大戰於鳴條之野桀奔於南巢湯既克桀讓天下於務光務光不受湯即位乃都於亳後改為商殷開基之主也棘者湯時賢人亦云湯之博士列子謂之夏革革棘聲類蓋字之誤也而棘既是賢人湯師事之故湯問於棘詢其至道云物性不同各有素分循而直往固而任之殷湯請益深有玄趣莊子許其所問故云是已窮髮之北有冥海者天池也有魚焉其廣數千里未有知其修者其名為鯤疏修長也地以草為毛髮北方寒沍之地草木不生故名窮髮所謂不毛之地鯤魚廣闊數千未有知其長者明其大也然溟海鯤鵬前文已出如今重顯者正言前引齊諧足為典實今牽列子再證非虛鄭重殷勤以成其義者也有鳥焉其名為鵬背若太山翼若垂天之雲摶扶搖羊角而上者九萬里絶雲氣負青天然後圖南疏鵬背宏巨狀若嵩華旋風曲戾猶如羊角既而凌摩蒼昊遏絶雲霄鼓怒放暢圖度南海故禦寇湯問篇云世豈知有此物哉大禹行而見之伯益知而名之夷堅聞而志之是也且適南溟也斥鴳笑之曰彼且奚適也我騰躍而上不過數仞而下翶翔蓬蒿之間此亦飛之至也而彼且奚適也此小大之辨也注各以得性為至自盡為極也向言二蟲殊翼故所至不同或翶翔天池或畢志榆枋直各稱體而足不知所以然也今言小大之辨各有自然之素既非跂慕之所及亦各安其天性不悲所以異故再出之疏且將也亦語助也斥小澤也鴳雀也八尺曰仞翶翔猶嬉戲也而鴳雀小鳥縱任斥澤之中騰舉踴躍自得蓬篙之內故能嗤九萬之遠適欣數仞之近飛斯蓋辨小大之性殊論各足之不二也故夫知效一官行比一鄉德合一君而徵一國者其自視也亦若此矣注亦猶鳥之自得於一方也疏故是仍前之語夫是生後之詞國是五等之邦鄉是萬二千五百家也自有智數功效堪蒞一官自有名譽著聞比周鄉黨自有道德弘博可使南面徵成邦國安有黎元此三者禀分不同優劣斯異其於各足未始不齊視己所能亦猶鳥之自得於一方而宋榮子猶然笑之注未能齊故有笑疏子者有德之稱姓榮氏宋人也然如是榮子雖能忘有未能遣無故笑宰官之徒滯於爵祿虛淡之人猶懷嗤笑見如是所以不齊前既以小笑大示大者不夸今則以大笑小小者不企而性命不安者理未之聞也且舉世而譽之而不加勸舉世而非之而不加沮注審自得也疏舉皆也勸勵勉也沮怨喪也榮子率性懷道謷然超俗假令世皆譽讚亦不增其勸奬率土非毁亦不加其沮喪審自得也定乎內外之分注內我而外物疏榮子知內既非我外亦非物內外雙遣物我兩忘故於內外之分定而不忒也辨乎榮辱之境注榮己而辱人疏忘勸沮於非譽混窮通於榮辱故能反照明乎心智玄鑒辨於物境不復內我而外物榮己而辱人也斯已矣注亦不能復過此疏斯此也已止也宋榮智德止盡於斯也彼其於世未數數然也注足於身故間於世也疏數數猶汲汲也宋榮率性虛淡任理直前未嘗運智推求役心為道栖身物外故不汲汲然者也雖然猶有未樹也注唯能自是耳未能無所不可也疏樹立也榮子捨有證無溺在偏滯故於無待之心未立逍遙之趣智尚虧也夫列子御風而行泠然善也注泠然輕妙之貌疏姓列名禦寇鄭人也與鄭繻公同時師於壺丘子林著書八卷得風仙之道乘風遊泠然輕舉所以稱善也旬有五日而後反注苟有待焉則雖御風而行不能以一時而周也疏旬十日也既得風仙遊行天下每經一十五日回反歸家未能無所不乘故不可一時用也彼於致福者未數數然也注自然御風行耳非數數然求之也疏致得也彼列禦寇得於風仙之福者蓋由炎凉無心虛懷任運非關役情取捨汲汲求之欲明為道之要要在忘心若運役智慮去之遠矣此雖免乎行猶有所待者也注非風則不得行斯必有待也唯無所不乘者無待耳疏乘風輕舉雖免步行非風不進猶有須待自宰官已下及宋榮禦寇歷舉智德優劣不同既未洞忘咸歸有待唯當順萬物之性遊變化之塗而能無所不成者方盡逍遙之妙致者也若夫乘天地之正而御六氣之辨以遊無窮者彼且惡乎待哉注天地者萬物之總名也天地以萬物為體而萬物必以自然為正自然者不為而自然者也故大鵬之能高斥鴳之能下椿木之能長朝菌之能短凡此皆自然之所能非為之所能也不為而自能所以為正也故乘天地之正者即是順萬物之性也御六氣之辨者即是遊變化之塗也如斯以往則何往而有窮哉所遇斯乘又將惡乎待哉此乃至德之人玄同彼我者之逍遙也苟有待焉則雖列子之輕妙猶不能以無風而行故必得其所待然後逍遙耳而况大鵬乎夫唯與物冥而循大變者為能無待而常通豈自通而已哉又順有待者使不失其所待所待不失則同於大通矣故有待無待吾所不能齊也至於各安其性天機自張受而不知則吾所不能殊也夫無待猶不足以殊有待況有待者之巨細乎疏天地者萬物之總名萬物者自然之别稱六氣者季頤云平旦朝霞日午正陽日入飛泉夜半沆瀣也天地二氣為六氣也又杜預云六氣者陰陽風雨晦明也又支道林云六氣天地四時也辨者變也惡乎待於何也言無待聖人虛懷體道故能乘兩儀之正理順萬物之自然御六氣以逍遙混群靈以變化苟無物而不順亦何往而不通哉明朝徹於無窮將於何而有待者也故曰至人無己注無己故順物順物而至矣神人無功注夫物未嘗有謝生於自然者而必欣賴於針石故理至則迹滅矣今順而不助與至理為一故無功聖人無名注聖人者物得性之名耳未足以名其所以得也疏至言其體神言其用聖言其名故就體語至就用語神就名語聖其實一也詣於靈極故謂之至陰陽不測故謂之神正名百物故謂之聖也一人之上其有此三欲顯功用名殊故有三人之别此三人者則是前文乘天地之正御六氣之辨人也欲結此人無待之德彰其體用反言故曰耳堯讓天下於許由疏堯者帝嚳之子姓伊祁字放勛母慶都嚳感赤龍而生身長一丈兊兑上而豐下眉有八彩足履翼星有聖德年十五對唐侯二十一代兄登帝位都平陽號曰陶唐在位七十二年乃授舜年百二十八歲崩葬於陽城諡曰堯依諡法翼善傳聖曰堯言其有傳舜之功也許由隱者也姓許名由字仲武潁川陽城人也隱於箕山師於齧缺依山而食就河而飲堯知其賢讓以帝位許由聞之乃臨河洗耳巢父飲犢牽而避之曰惡吾水也死後堯封其墓諡曰箕公即堯之師也曰日月出矣而爝火不息其於光也不亦難乎時而降矣而猶浸灌其於澤也不亦勞乎疏爝火猶炬火也亦小火也神農時十五日一雨謂之時雨也且以日月照燭詎假炬火之光時雨滂沱無勞浸灌之澤堯既撝謙克讓退己進人所以致此之辭盛推仲武也夫子立而天下治而我猶尸之吾自視缺然請致天下疏治正也尸主也致與也堯既師於許由故謂之為夫子若仲武立為天子宇內必致太平而我猶為物主自視缺然不足請將帝位讓與賢人許由曰子治天下天下既已治也注夫能令天下治不治天下者也故堯以不治治之非治之而治者也今許由方明既治則無所代之而治實由堯故有子治之言宜忘言以尋其所況而或者遂云治之而治者堯也不治而堯得以治者許由也斯失之遠矣夫治之由乎不治為之出乎無為也取於堯而足豈借之許由哉若謂拱默乎山林之中而後得稱無為者此莊老之談所以見棄於當塗當塗者自必於有為之域而不反者斯之由也疏治謂理也既盡也言堯治天下久久以升平四海八荒盡皆清謐何勞讓我過辭費然覩莊文則貶堯而推許尋郭注乃劣許而優堯者何耶欲明放勛大聖仲武大賢賢聖二塗相去遠矣故堯負扆汾陽而喪天下許由不夷其俗乎獨立高山圓照偏溺斷可知矣是以莊子援襌禪讓之迹故有爝火之談郭生察無待之心更致不治之說可謂探微索隱了文合義宜尋其㫖旨况況無所稍嫌也而我猶代子吾將為名乎名者實之賔也吾將為賔乎注夫自任者對物而順物者與物無對故堯無對於天下而許由與稷契為匹矣何以言其然邪夫與物冥者故群物之所不能離也是以無心玄應唯感之從泛乎若不繫之舟東西之非己也故無行而不與百姓共者亦無往而不為天下之君矣以此為君若天之自高實君之德也若獨亢然立乎高山之頂非夫人有情於自守守一家之偏尚何得專此此故俗中之一物而為堯之外臣耳若以外臣待乎內主斯有為君之名而無任君之實也疏許由偃蹇箕山逍遙潁水膻臊榮利厭穢聲名而堯殷勤致請猶希代己許由若高九五將為萬乘之名然實以生名名從實起實則是內是主名便是外是賔捨主取賔喪內求外既非隱者所尚故云吾將為賔也鷦鷯巢於深林不過一枝偃鼠飲河不過滿腹注性各有極苟足其極則餘天下之財也疏鷦鷯巧婦鳥也一名工雀一名女匠亦名桃蟲好深處而巧為巢也偃鼠形大小如牛亦黑色獐腳腳有三甲耳似象耳尾端白好入河飲水而鳥巢一枝之外不假茂林獸飲滿腹之餘無勞浩汗況許由安兹蓬蓽不顧金闈樂彼蔬食詎勞玉食也歸休乎君豫無所用天下為注均之無用而堯獨有之明夫懷豁者無方故天下樂推而不厭疏豫我也許由寡欲清廉不受堯讓故謂堯云君宜速還黃屋歸反紫微襌讓之辭宜其休息四海之尊於我無用九五之貴豫何用為庖人雖不治庖尸祝不越樽俎而代之矣注庖人尸祝各安其所司鳥獸萬物各足於所受帝堯許由各靜其所遇此乃天下之至實也各得其實又何所為乎哉自得而已矣故堯許之行雖異其於逍遙一也疏庖人謂掌庖厨之人則今之太官供膳是也尸者太廟中神主也祝者則今太常太祝是也執祭版對尸而祝之故謂之尸祝也樽酒器也俎肉器也而庖人尸祝者各有司存假令膳夫懈怠不肯治庖尸祝之人終不越局濫職棄於樽俎而代之宰烹亦猶帝堯襌讓不治天下許由亦不去彼山林就兹帝位故注云帝堯許由各靜於所遇也已肩吾問於連叔曰吾聞言於接輿疏肩吾連叔並古之懷道人也接輿者姓陸名通字接輿楚之賢人隱者也與孔子同時而佯狂不仕常以躬耕為務楚王知其賢聘以黃金百鎰車駟二乘並不受於是夫負妻戴以遊山海莫知所終肩吾聞接輿之言過無準的故問連叔詢其義㫖旨而言吾聞言於接輿者聞接輿之言也莊生寄三賢以明堯之一聖所聞之狀具列於下文也大而無當往而不反吾驚怖其言猶河漢而無極也疏所聞接輿之言怖弘而無的當一往而陳梗槩曾無反覆可尋吾竊聞之驚疑怖恐猶如上天河漢迢遞清高尋其源流略無窮極也大有徑庭不近人情焉疏徑庭猶過差亦是直往不顧之貌也謂接輿之言不偶於俗多有過差不附世情故大言不合於理耳也連叔曰其言謂何哉疏陸通之說其意謂若何則反質肩吾所聞意謂曰藐姑射之山有神人居焉肌膚若冰雪綽約若處子注此皆寄言耳夫神人即今所謂聖人也夫聖人雖在廟堂之上然其心無異於山林之中世豈識之哉徒見其戴黃屋佩玉璽便謂足以纓紼其心矣見其歷山川同民事便謂足以憔悴其神矣豈知至至者之不虧哉今言王德之人而寄之此山將明世所無由識故乃託之於絶垠之外而推之於視聽之表耳處子者不以外傷內疏藐遠也山海經云姑射山在寰海之外有神聖之人戢機應物時須揖讓即為堯舜時須干戈即為湯武綽約柔弱也處子未嫁女也言聖人動寂相應則空有並照雖居廊廟無異山林和光同塵在染不染冰雪取其潔净綽約譬以柔和處子不為物傷姑射語其絶遠此明堯之盛德窈冥玄妙故託之絶垠之外推之視聽之表斯蓋寓言耳亦何必有姑射之實乎宜忘言以尋其所況此即肩吾述己昔聞以答連叔之辭者也不食五穀吸風飲露注俱食五穀而獨為神人明神人者非五穀所為而特禀自然之妙氣疏五穀者黍稷麻菽麥也言神聖之人降生應物挺淳粹之精靈禀陰陽之秀氣雖順物以資待非五穀之所為託風露以清虛豈四時之能變也乘雲氣御飛龍而遊乎四海之外疏智照靈通無心順物故曰乘雲氣不疾而速變現無常故曰御飛龍寄生萬物之上而神超六合之表故曰遊乎四海之外也其神凝使物不疵癘而年穀熟吾以是狂而不信也注夫體神居靈而窮理極妙者雖靜默閒堂之裏而玄同四海之表故乘兩儀而御六氣同人群而驅萬物茍無物而不順則浮雲斯乘矣無形而不載則飛龍斯御矣遺身而自得雖淡然而不待坐忘行忘忘而為之故行若曳枯木止若聚死灰是以云其神凝也其神凝則不凝者自得矣世皆齊其所見而斷之豈嘗信此哉疏凝靜也疵癘疾病也五穀熟謂有年也聖人形同枯木心若死灰本迹一時動寂俱妙凝照潜通虛懷利物遂使四時順序五穀豐登人無灾害物無夭枉聖人之處世有此功能肩吾未悟至言謂為狂而不信連叔曰然瞽者無以與乎文章之觀聾者無以與乎鐘鼓之聲豈唯形骸有聾盲哉夫知亦有之注不知至言之極妙而以為狂而不信此知之聾盲哉疏瞽者謂眼無眹縫冥冥如鼓皮也聾者耳病也盲者眼根敗也夫目視耳聽蓋有物之常情也既瞽既聾不可示之以聲色也亦猶至言妙道唯懸解者能知愚惑之徒終身未悟良由智障盲暗不能照察豈唯形質獨有之耶是以聞接輿之言謂為狂而不信自此已下是連叔答肩吾之辭也是其言也猶時女也注謂此接輿之所言者自然為物所求但知之聾盲者謂無此理疏是者指斥之言也時女少年處室之女也指此接輿之言猶如窈窕之女綽約凝潔為君子所求但智之聾盲言者謂無此理也之人也之德也將旁礴萬物以為一世蘄乎亂孰弊弊焉以天下為事注夫聖人之心極兩儀之至會窮萬物之妙數故能體化合變無往不可旁礴萬物無物不然世以亂故求我我無心也我苟無心亦何為不應世哉然則體玄而極妙者其所以會通萬物之性而陶鑄天下之化以成堯舜之名者常以不為為之耳熟弊弊焉勞神苦思以事為事然後能乎疏之是語助亦歎美也旁礴猶混同也蘄求也孰誰也之人者歎堯是聖人之德者歎堯之盛德也言聖人德合二儀道齊群品混同萬物制馭百靈世道荒淫蒼生離亂故求大聖君臨安撫而虛舟懸鏡應感無心誰肯勞形弊智經營區宇以事為事然後能事故老子云為無為事無事又云取天下常以無事及其有事不足以取天下也之人也物莫之傷注夫安於所傷則傷不能傷傷不能傷而物亦不傷之也大浸稽天而不溺大旱金石流土山焦而不熱注無往而不安則所在皆適死生無變於己況溺熱之間哉故至人之不嬰乎禍難非避之也推理直前而自然與吉會疏稽至也夫達於生死則無死無生宜於水火則不溺不熱假令陽九流金之灾百六滔天之禍紛紜自彼於我何為故郭注云死生無變於己何況溺熱之間也哉是其塵垢粃糠將猶陶鑄堯舜者也孰肯以物為事注堯舜者世事之名耳為名者非名也故夫堯舜者豈直堯舜而已哉必有神人之實焉今所稱堯舜者徒名其塵垢粃糠耳疏散為塵膩為垢穀不熟為粃穀皮曰糠皆猥物也鎔金曰鑄範土曰陶諡法翼善傳聖曰堯仁聖盛明曰舜夫堯至本妙絶形名混迹同塵物甘其德故立名諡以彰聖體然名者粗法不異粃糠諡者世事何殊塵垢既而矯諂佞妄將彼塵垢鍛鑄為堯用此粃糠埏埴作舜豈知妙體胡可言耶是以誰肯以物為事者也宋人資章甫而適諸越越人斷髮文身無所用之疏此起譬也資貨也越國逼近江湖斷髮文身以避蛟龍之難也章甫冠名也故孔子生於魯衣縫掖長於宋冠章甫而宋實微子之裔越乃太伯之苗二國貿遷往來乃以章甫為貨且章甫本充首飾必須雲鬟承冠越人斷髮文身資貨便成無用亦如榮華本猶滯著富貴起自驕矜堯既體道洞忘故能無用天下故郭注云夫堯之無所用天下為亦猶越人無所用章甫耳堯治天下之民平海內之政往見四子藐姑射之山汾水之陽窅然喪其天下焉注夫堯之無用天下為亦猶越人之無所用章甫耳然遺天下者固天下之所宗天下雖宗堯而堯未嘗有天下也故窅然喪之而嘗遊心於絶冥之境雖寄坐萬物之上而未始不逍遙也四子者蓋寄言以明堯之不一於堯耳夫堯實冥矣其迹則堯也自迹觀冥內外異域未足怪也世徒見堯之為堯豈識其冥哉故將求四子於海外而據堯於所見因謂與物同波者失其所以逍遙也然未知至遠之迹順者更近而至高之所會者反下也若乃厲然以獨高為至而不夷乎俗纍斯山谷之士非無待者也奚足以語至極而遊無窮哉疏治言緝理政言風教此合喻也汾水出自太原西入于河水北曰陽則今之晋州平陽縣在汾水北昔堯都也窅然者寂寥是深遠之名喪之言忘是遣蕩之義而四子者四德也一本二迹三非本非迹四非非本迹也言堯反照心源洞見道境超兹四句故言往見四子也夫聖人無心有感斯應故能緝理萬邦和平九土雖復凝神四子端拱而坐汾陽統御萬機窅然而喪天下斯蓋即本即迹即體即用空有雙照動寂一時是以姑射不異汾陽山林豈殊黃屋世人齊其所見曷嘗信此耶而馬彪將四子為齧缺便未達於遠理劉璋推汾水於射山更迷惑於近事今所解釋稍異於斯故郭注云四子者蓋寄言明堯之不一於堯耳世徒見堯之迹豈識其真哉惠子謂莊子曰魏王貽我大瓠之種疏姓惠名施宋人也為梁國相謂語也貽遺也瓠匏之類也魏王即梁惠王也昔居安邑國號為魏後為强秦所逼徙於大梁復改為梁僭號稱王也惠子所以起此大匏之譬以譏莊子之書雖復詞㫖旨恢弘而不切機務故致此詞而更相激發者也我樹之成而實五石以盛水漿其堅不能自舉也疏樹者藝植之謂也實者子也惠施既得瓠種藝之成就生子甚大容受五石仍持此瓠以盛水漿虛脆不堅故不能自勝舉也剖之以為瓢則瓠落無所容非不呺然大也吾為其無用而掊之疏剖分割之也瓢勺也瓠落平淺也呺然虛大也掊打破也用而盛水虛脆不能自勝分剖為瓢平淺不容多物衆謂無用打破棄之刺莊子之言不救時要有同此言應須屛削也莊子曰夫子固拙於用大矣宋人有善為不龜手之藥者世世以洴澼絖為事注其藥能令手不拘坼故常漂絮於水中也疏洴浮澼漂也絖絮也世世年也宋人隆冬涉水漂絮以作牽離手指生瘡拘坼有同龜背故世世相承家傳此藥令其手不拘坼常得漂絮水中保斯事業永無虧替又云澼劈也絖䌤也謂之䌤於水之中劈也客聞之請買其方百金疏金方一寸重一斤為一金也他國遊客偶爾聞之請買手瘡一術遂費百金之價者也聚族而謀曰我世世為洴澼絖不過數金今一朝而鬻技百金請與之疏鬻賣也估價既高聚族謀議世世洴澼為利蓋寡一朝賣術資貨極多異口同音僉曰請與客得之以說吳王越有難吳王使之將冬與越人水戰大敗越人裂地而封之疏吳越北鄰地帶江海丘戈相接必用艫船戰士隆冬手多拘坼而客素禀雄才天生睿智既得方術遂說吳王越國兵難侵吳吳王使為將帥賴此名藥而兵手不拘坼旌旗才舉越人亂轍獲此大捷獻凱而旋勳庸克著胙之茆土能不龜手一也或以封或不免於洴澼絖則所用之異也疏或不定也方藥無工而用者有殊故行客得之以封侯宋人用之以洴澼此則所用工拙之異今子有五石之瓠何不攄以為大樽而浮乎江湖而憂其瓠落無所容則夫子猶有蓬之心也夫注蓬非直達者也此章言物各有宜茍得其宜安往而不逍遙也疏攄者繩絡之也樽者漆之如酒樽以繩結縛用渡江湖南人所謂腰舟者也蓬草名拳曲不直也夫歎也言大瓠浮泛江湖可以舟船淪溺至教興行世境可以濟渡群迷而惠生既有蓬心未能直達玄理故妄起掊擊之譬譏刺莊子之書為用失宜深可歎之惠子謂莊子曰吾有大樹人謂之樗疏樗栲漆之類嗅之甚臭惡木者也世間名字例皆虛假相與嗅之未知的當故言人謂之樗也其大本擁腫而不中繩墨其小枝卷曲而不中規矩立之塗匠者不顧疏擁腫槃癭也卷曲不端直也規圓而矩方塗道也樗栲之樹不材之木根本擁腫枝幹攣卷繩墨不加方圓無取立之行路之旁匠人曾不顧盻也今子之言大而無用衆所同去也疏樹既擁腫不材匠人不顧言迹迂誕無用衆所不歸此合喻者也莊子曰子獨不見狸狙乎卑身而伏以候敖者東西跳梁不避高下中於機辟死於罔罟疏狌野猫也跳梁猶走躑也辟法也謂機關之類也罔罟罝罘也子獨不見狸狙捕鼠之狀乎卑伏其身伺候慠慢之鼠東西跳躑不避高下之地而中於機關之法身死罔罟之中皆以利惑其小不謀大故也亦猶擎跪曲奉執持聖迹僞情矯性以要時利前雖遂意後必危亡而商鞅蘇張即是其事此何異乎捕鼠狸狌死於罔罟也今夫斄牛其大若垂天之雲此能為大矣而不能執鼠疏斄牛猶旄牛也出西南夷其形甚大山中遠望如天際之雲藪澤之中逍遙養性跳梁投鼠不及野狸亦猶莊子之言不狎流俗可以理國治身且長且久久者也今子有大樹患其無用何不樹之於無何有之鄉廣莫之野疏無何有猶無有也莫無也謂寬曠無人之處不問何物悉皆無有故曰無何有之鄉也倣徨乎無為其側逍遙乎寢卧其下疏倣徨縱任之名逍遙自得之稱亦是異言一致互有文耳不材之木枝葉茂盛婆娑蔭映蔽日來風故行李經過徘徊憩息徙倚顧步寢卧其下亦猶莊子之言無為虛淡可以逍遙適性䕃庇蒼生也不夭斤斧物無害者無所可用安所困苦哉注夫小大之物苟失其極則利害之理均用得其所則物皆逍遙也疏擁腫不材拳曲無取匠人不顧斤斧無加夭折之灾何從而至故得終其天年盡其生理無用之用何所困苦哉亦猶莊子之言乖俗會道可以攝衛可以全真既不夭枉於世塗詎肯困苦於生分也南華真經注疏卷之一
