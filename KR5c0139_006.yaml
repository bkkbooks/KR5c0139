body:
  text: 南華真經注疏卷之六福六河南郭象注唐西華法師成玄英疏內篇德充符第五德充於內物應於外外內玄合信若符命而遺其形骸也魯有兀者王駘疏姓王名駘魯人也刖一足曰兀形雖殘兀而心實虛忘故冠德充符而為篇首也從之遊者與仲尼相若注弟子多少敵孔子疏若如也陪從王駘遊行稟學門人多少如似於仲尼者也常季問於仲尼曰王駘兀者也從之遊者與夫子中分魯疏姓常名季魯之賢人也王駘遊行外忘形骸內德充實所以從遊學者數滿三千與孔子同徙中分魯國常季未達真趣是以生疑立不教坐不議虛而往實而歸注各自得而足也疏弟子雖多曾無講説立不教授坐無議論請益則虛心而往得理則實腹而歸又解未學無德亦為虛往之固有不言之教無形而心成者邪注怪其殘形而心乃充足也夫心之全也遺身形忘五藏忽然獨往而天下莫能離疏教授門人曾不言議殘兀如是無復形容而玄道至德內心成滿必固有此衆乃從之也是何人也疏常季怪其殘兀而聚衆極多欲顯德充之美故發斯問也仲尼曰夫子聖人也丘也直後而未往耳丘將以為師而況不若丘者乎疏宣尼呼王駘為夫子答常季云王駘是體道聖人也汝自不識人所以致疑丘直為參差在後未得往事丘將尊為師傅咨詢問道何況晚學之類不如丘者乎請益服膺固其宜矣奚假魯國丘將引天下而與從之注夫神全心具則體與物冥與物冥者天下之所不能遠奚但一國而已哉疏奚何也何但假藉魯之一邦耶丘將誘引宇內稟承盛德猶恐未盡其道也常季曰彼兀者也而王先生其與庸亦遠矣疏王盛也庸常也先生孔子也彼王駘者是殘兀之人門徒侍從於尼父以斯疑怪應異常流與凡常之人固當遠矣若然者其用心也獨若之何疏然猶如是也王駘盛德如是為物所歸未審運智用心獨若何術常季不委發此疑也仲尼曰死生亦大矣注人雖曰變然死生之變變之大也而不得與之變注彼與變俱故死生不變於彼疏夫山舟潛遁薪指遷流雖復萬境皆然而死生最大但王駘心冥造物與變化而遷移迹混人間將死生而俱往故變所不能變者也雖天地覆墜亦將不與之遺注斯須之也疏遺失也雖復圓天顚覆方地墜陷既冥於安危故未嘗喪我也審乎無假注明性命之固當而不與物遷注任物之自遷疏靈心安審妙體真元既與道相應故不為物所遷變者也命物之化注以化為命而無怪忤而守其宗也注不離至當之極疏達於分命冥於外物唯命唯物與化俱行動不乖寂故恆住其宗本者也常季曰何謂也疏方深難悟更請決疑仲尼曰自其異者視之肝膽楚越也注恬苦之性殊則美惡之情背疏夫物云云悉歸空寂倒置之類妄執是非於重玄道中橫起分别何異乎膽附肝生本同一體也楚越迢遞相去數千而於一體之中起數千之異異見之徒例皆如是也自其同者視之萬物皆一也注雖所美不同而同有所美各美其所美則萬物一美也各是其所是則天下一是也夫因其所異而異之則天下莫不異而浩然大觀者官天地府萬物知異之不足異故因其所同而同之則天下莫不皆同又知同之不足有故因其所無而無之則是非美惡莫不皆無矣夫是我而非彼美己而惡人自中知以下至于昆蟲莫不皆然然此明乎我而不明乎彼者爾若夫玄通泯合之士因天下以明天下天下無曰我非也即明天下之無非無曰彼是也即明天下之無是無是無非混而為一故能乘變任化忤物而不懾疏若夫玄通之士浩然大觀二儀萬物一指一馬故能忘懷任物大順群生然同者見其同異者見其異至論衆妙之境非異亦非同夫若然者且不知耳目之所宜注宜生於不宜者也無美無惡則無不宜無不宜故忘其宜也疏耳目之宜宜於聲色者也且凡情分别耽滯聲色故有宜與不宜可與不可而王駘混同萬物冥一死生豈於根塵之間而懷美惡之見耶而遊心乎德之和注都忘宜故無不任也都任之而不得者未之有也無不得而不和者亦未聞也故放心於道德之間蕩然無不當而曠然無不適也疏既而混同萬物不知耳目之宜故能遊道德之鄉放任乎至道之境者也物視其所一而不見其所喪視喪其足猶遺土也注體夫極數之妙心故能無物而不同無物而不同則死生變化無往而非我矣故生為我時死為我順時為我聚順為我散聚散雖異而我皆我之則生故我耳未始有得死亦我也未始有喪夫死生之變猶以為一既覩其一則説然無係玄同彼我以死生為寤寐以形骸為逆旅去生如脫屣斷足如遺土吾未見足以纓茀其心也疏物視猶視物也王駘一於死生物與彼我生為我時不見其得死為我順不見其喪觀視萬物混而一之故雖兀足視之如遺土者也常季曰彼為己以其知注嫌王駘未能忘知而自存疏彼王駘也謂王駘修身修己猶用心知嫌其未能忘知而任獨之者也得其心以其心注嫌未能遺心而自得疏嫌王駘不能忘懷任致猶用心以得心也夫得心者無思無慮忘知忘覺死灰稿木泊爾無情措之於方寸之間起之於視聽之表同二儀之覆載順三光以照燭混塵穢而不撓其神履窮塞而不作其慮不得為得而得在於無得斯得之矣若以心知之術而得之者非真得也得其常心物何為最之哉注夫得其常心平往者也嫌其不能平往而與物過常故使物就之疏最聚也若能虛忘平淡得真常之心者固當和光匿耀不殊於俗豈可獨異於物使衆歸之者也仲尼曰人莫鑒於流水而鑒於止水注夫止水之致鑒者非為止以求鑒也故王駘之聚衆衆自歸之豈引物使從己疏鑒照也夫止水所以留鑒者為其澄清故也王駘所以聚衆者為其凝寂故也止水本無情於鑒物物自照之王駘豈有意於招携而衆自來歸湊者也唯止能止衆止注動而為之則不能居衆物之止疏唯獨也唯止是水本凝湛能止是留停生人衆止是物來臨照亦猶王駘獨懷虛寂故能容止群生由是功能所以為衆歸聚也受命於地唯松柏獨也在冬夏青青注夫松柏特稟自然之鍾氣故能為衆木之傑耳非能為而得之也疏凡厥草木皆資厚地至於稟質堅徑隆冬不凋者在松柏通年四季常保青全受氣自爾非關指意王駘聚衆其義亦然也受命於天唯舜獨也正注言特受自然之正氣者至希也下首則唯有松柏上首則唯有聖人故凡不正者皆來求正耳若物皆有青全則無貴於松柏人各自正則無羡於大聖而趣之疏人稟三才命受蒼旻圓首方足其類至多至如挺氣正真獨有虞舜豈由役意直置自然王駘合道其義亦爾郭注云上首唯有聖人者但人頭在上去上則死木頭在下去下則死是以呼人為上首呼木為下首故上首食傍首傍首食下首下首草木也傍首蟲獸也幸能正生以正衆生注幸自能正耳非為正以正之疏受氣上玄能正生道也非由用意幸悉自然既非正己復能正物正己正物自利之他內外行圓名為大聖虞舜既爾王駘亦然而舜受讓人故為標的也夫保始之徵不懼之實勇士一人雄入於九軍將求名而能自要者而猶若是注非能遺名而無不任疏徵成也信也天子六軍諸侯三軍故九軍也或有一人稟氣勇武保守善始之心信成令終之節內懷不懼之志外顯雄猛之姿既而直入九軍以求名位尚能伏心要譽忘死忘生何况王駘體道之狀列在下文也而況官天地府萬物注冥然無不體也疏綱維二儀曰官天地包藏宇宙曰府萬物夫勇士入軍直要名位猶能不顧身命忘於生死而況官府兩儀混同萬物視死如生不亦宜乎直寓六駭注所謂逆旅疏寓寄也六骸謂身首四肢也王駘體一身非實達萬有皆真故能混塵穢於俗中寄精神於形內直置暫遇而已豈係之耶象耳目注人用耳目亦用耳目非須耳目疏象似也和光同塵似用耳目非須也一知之所知而心未嘗死者乎注知與變化俱則無往而不冥此知之一者也心與死生順則無時而非生此心之未嘗死也疏一知智也所知境也能知之智照所知之境境冥會能無所差故知與不知通而為一雖復迹理物化而心未嘗見死者也豈容有全兀於其間哉彼且擇曰而登假人則從是也注以不失會為擇耳斯人無擇也任其天行而時動者也故假借之人由此而最之耳疏彼王駘者豈復簡擇良日而登升玄道蓋不然乎直置虛淡忘懷而會之也君人無心止水留鑒而世間虛假之人由是而從之也彼且何肯以物為事乎注其恬莫故全也疏唯彼王駘冥真合道虛假之物自來歸之彼且何曾以為己務申徒嘉兀者也而與鄭子産同師於伯昏無人疏姓申徒名嘉鄭之賢人兀者也姓公孫名僑字子産鄭之賢大夫也伯昏無人者伯長也昏暗也德居物長韜光若暗洞忘物我故曰伯昏無人子産申徒俱學玄道雖復出處殊隔而同師伯昏故寄此三人以彰德充之義也子産謂申徒嘉曰我先出則子止子先出則我止注羞與刖者並行疏子産執政當塗榮華富貴申徒稟形殘兀無復容儀子産雖學伯昏未能忘遣猶存寵辱恥見形殘故預相檢約今其必不並己也其明日又與合堂同席而坐子産謂申徒嘉曰我先出則子止子先出則我止今我將出子可以止乎其未邪注質而問之欲使必不並己疏子産存榮辱之意申徒忘貴賤之心前雖有言都不采領所以居則共堂坐還同席公孫見其如此是故質而問之且子見執政而不違子齊執政乎注當以執政自多故直云子齊執政便謂足以明其不遜疏違避也夫出處異塗貴賤殊致我秉執朝政便為貴人汝乃卑賤形殘應殊敬我不能遜讓翻欲齊己也申徒嘉曰先生之門固有執政焉如此哉注此論德之處非計位也疏先生伯昏也先生道門深明衆妙混同榮辱齊一死生定以執政自多必如此耶子而悅子之執政而後人者也注笑其矜悅在位欲處物先疏汝猶悅愛榮華矜誇政事推人於後欲處物先意見如斯何名學道聞之曰鑒明則塵垢不止止則不明也久與賢人處則無過乎今子之所取大者先生也而猶出言若是不亦過乎注事明師而鄙吝之心猶未去乃真過也疏鑒鏡也夫境明則塵垢不止止則非明照亦猶久與賢人居則無過若有過則非賢哲今子之所取可重可大者先生之道也而先生之道退己虛忘子乃自矜深乖妙旨而出言如是豈非過者乎子産曰子既若是矣注若是形殘猶與堯爭善計子之德不足以自反邪注言不自顧省而欲輕蔑在位與有德者並計子之德固不足以補形殘之過疏反猶復也言申徒形殘如是而不自知乃欲將我並驅可謂與堯爭善子雖有德何足言以德補殘猶未平復也申徒嘉曰自狀其過以不當亡者衆注多自陳其過狀以己為不當亡者衆也不狀其過以不當存者寡注默然為過自以為應死者少也疏夫自顯其狀推罪於他謂己無愆不合當犯如此之人世間甚衆不顯過狀將罪歸己謂己之過不久存生如此之人世間寡少鄭子産奢侈矜伐於義亦然者也知不可奈何而安之若命唯有德者能之疏若順也夫素質形殘稟之天命雖有知計無如之何唯當安而順之則所造皆適自非盛德其孰能然遊於羿之彀中中央者中地也然而不中者命也注羿古之善射者弓矢所及為彀中夫利害相攻則天下皆羿也自不遺身忘知與物同波者皆遊於羿之彀中耳雖張毅之出單豹之處猶未免於中地則中與不中唯在命耳而區區者各有所遇而不知命之自爾故免乎弓矢之害者自以為巧欣然多己及至不免則自恨其謬而志傷神辱斯未能達命之情者也夫我之生也非我之所生也則一生之內百年之中其坐起行止動靜趣舍情性知能凡所有者凡所無者凡所為者凡所遇者皆非我也理自爾耳而橫生休戚乎其中斯又逆自然而失者也疏羿堯時善射者也其矢所及謂之彀中言羿善射矢不虛發彀中之地必被殘傷無問鳥獸罕獲免者偶然得免乃關天命免與不免非由工拙自不遺形忘智皆遊於羿之彀中是知申徒兀足忽遭羿之一箭子産形全中地偶然獲免既非人事故不足自多矣人以其全足笑吾不全足者衆矣注皆不知命而有斯笑我怫然而怒注見其不知命而怒斯又不知命也疏怫然暴戾之心也人不知天命妄計虧全況己形好嗤彼之兀如此之人其流甚衆忿其無知怫然暴怒愼忿他人斯又未知命也而適先生之所則廢然而反注見至人之知命遺形故廢向者之怒而復常疏在伯昏之所稟不言之教則廢向者之怒而復於常性也不知先生之洗我以善邪注不知先生洗我以善道故邪我為能自反邪斯自忘形而遣纍疏既適師門入於虛室廢棄忿怒反復尋常不知師以善水洗滌我心為是我之性情自反復進退尋責莫測所由斯又忘於學心遣其係纍吾與夫子遊十九年矣而未嘗知吾兀者也注忘形故也疏我與伯昏遊於道德故能窮陰陽之妙要極至理之精微既其遣智忘形豈覺我之殘兀今子與我遊於形骸之內而子索我於形骸之外不亦過乎注形骸外矣其德內也今子與我德遊耳非與我形交也而索我外好豈不過哉疏郭注云形骸外矣其德內也今子與我德遊耳非與我形交也而索我外好豈不過也此注意更不勞别釋也子産蹴然改容更貌曰子無乃稱注已吾則厭其多言也疏蹴然驚慚貌也子産未能忘懷遣欲多在物先既被識嫌方懷驚悚改矜誇之貌更醜惡之容悟知己至不用稱説者也魯有兀者叔山無趾踵見仲尼注踵頻也疏叔山字也踵頻也殘兀之人居於魯國雖遭刖足猶有學心所以接踵頻來尋師訪道既無足趾因以為其名也仲尼曰子不謹前既犯患若是矣雖今來何及矣疏子之修身不能謹愼犯於憲綱前已遭官患難艱辛形殘若此今來請益何所逮耶無趾曰吾唯不知務而輕用吾身吾是以亡足注人之生也理自生矣直莫之為而任其自生斯重其身而知務者也若乃忘其自生謹而矜之斯輕用其身而不知務也故五藏相攻於內而手足殘傷於外也今吾來也猶有尊足者存注刖一足未足以虧其德明夫形骸者逆旅也吾是以務全之也注去其矜謹任其自生斯務全也疏無趾交遊恭謹重德輕身唯欲務借聲名不知務全生道所以觸犯憲章遭斯殘兀形雖虧損其德猶存是故頻煩追討務全道德以德比形故言尊足者存存者在也夫天無不覆地無不載注天不為覆故能常覆地不為載故能常載使天地而為覆載則有時而息矣使舟能沉而為人浮則有時而沒矣故物為焉則未足以終其生也吾以夫子為天地安知夫子之猶若是也注責其不謹不及天地也疏夫天地亭毒覆載無偏而聖人德合二儀固當弘普不棄寧知夫子尚不捨形殘善救之心豈其如是也孔子曰丘則陋矣疏仲尼所陳不過聖迹無趾請學務其全生答淺問深足成鄙陋也夫子胡不入乎請講以所聞無趾出注聞所聞而出全其無為也疏夫子無趾也胡何也仲尼自覺鄙陋情實多慚故屈無趾今其入室語説所聞方內之道既而蘧廬久處芻狗再陳無趾惡聞故默然而出也孔子曰弟子勉之夫無趾兀者也猶務學以復補前行之惡而況全德之人乎注全德者生便忘生疏勉朂厲也夫無趾殘兀尚全生補其虧殘悔其前行況賢人君子形德兩全便忘死生德充於內者也門人之類宜朂之焉無趾語老聃曰孔丘之於至人其未邪彼何賔賔以學子為注怪其方復學於老聃疏賔賔恭勤貌也夫玄德之人窮理極妙忘言絶學率性生知而仲尼執滯文字專行聖迹賔賔勤敬問禮老君以汝格量故知其未如至人也學子何為者也彼且蘄以諔詭幻怪之名聞不知至人之以是為己桎梏邪注夫無心者人學亦學然古之學者為己今之學者為人其弊也遂至乎為人之所為矣夫師人以自得者率其常然者也舍己效人而逐物於外者求乎非常之名者也夫非常之名乃常之所生也故學者非為幻怪也幻怪之生必由於學禮者非為華藻也而華藻之興必由於禮斯必然之理至人之所無奈何故以為己之桎梏疏蘄求也諔詭猶竒譎也在手曰桎在足曰梏即今之杻械也彼之仲尼行於聖迹所學竒譎怪異之事唯求虛妄幻化之名不知方外體道至人用此聲教為已枷鎖也老聃曰胡不直使彼以死生為一條以可不可為一貫者解其桎梏可乎注欲以直理冥之冀其無迹疏無趾前見仲尼談講之日何不使孔丘忘於仁義混同生死齊一是非條貫既融則是帝之縣解豈非釋其枷鎖解其杻械也無趾曰天刑之安可解注今仲尼非不冥也顧自然之理行則影從言則響隨夫順物則名迹斯立而順物者非為名也非為名則至矣而終不免乎名則孰能解之哉故名者影響也影響者形聲之桎梏也明斯理也則名迹可遺名迹可遺則尚彼可絶尚彼可絶則性命可全矣疏仲尼憲章文武祖述堯舜刪詩書定禮樂窮陳蔡圍商周執於仁義遭斯戮耻亦猶行則影從言則響隨自然之勢必至之宜也是以陳迹既興疵釁斯起欲不困弊其可得乎故天然刑戮不可解也魯哀公問於仲尼曰衛有惡人焉曰哀駘它注惡醜也疏惡醜也言衛國有人形容醜陋內德充滿為俗所歸而哀駘是醜貌因以為名丈夫與之處者思而不能去也婦人見之請於父母曰與為人妻寧為夫子妾者十數而未止也疏妻者齊也言其位齊於夫妾者接也適可接事君子哀駘才全德滿為物歸依大順群生物忘其醜遂使丈夫與同處戀仰不能捨去婦人美其才德競請為其媵妾十數未止明其慕義者多不為人妻彰其道能感物也未嘗有聞其唱者也常和人而己矣疏滅迹匿端謙居物後直置應和而已未嘗誘引先唱無君人之位以濟乎人之死注明物不由權勢而往疏夫人君者必能赦過宥罪恤死護生駘它窮為匹夫位非南面無權無勢可以濟人明其懷人不由威力無聚祿以望人之腹注明非求食而往疏夫儲積倉廪招迎士衆歸湊本希飽腹而駘它既無聚祿何以致人明其慕義非由食往也又以惡駭天下注明不以形美故往疏駘它容形異常鄙陋論其醜惡驚駭天下明其聚衆非由色往和而不唱注非招而致之疏譬幽谷之響直而無心既不以言説招携非由先物而唱者也知不出乎四域注不役思於分外疏域分也忘心遣智率性任真未曾役思運懷緣於四方分外也且而雌雄合乎前注夫才全者與物無害故入獸不亂群入鳥不亂行而為萬物之林藪疏雌雄禽獸之類也夫才全之士與物同波人無害物之心物無畏人之慮故鳥與獸且群聚於前也是必有異乎人者也疏一無權勢二無利祿三無色貌四無言説五無知慮夫聚集人物必不從然今駘它為衆歸依不由前之五事以此而驗固異於常人者也寡人召而觀之果以惡駭天下與寡人處不至以月數而寡人有意乎其為人也注未經月已覺其有遠處疏既聞有異故命召看之形容醜陋果驚駭於天下共其同處不過二旬觀其為人察其意趣心神凝淡以覺深遠也不至乎期年而寡人信之國無宰寡人傳國焉注委之以國政疏日月既久漬鍊彌深是以共處一年情相委信而國無良宰治道未弘庶屈賢人傳於國政者也悶然而後應注寵辱不足以驚其神疏悶然而後應不覺之容亦是虛淡之貌既無情於利祿豈有意於榮華故同彼世人悶然而應之也泛若而辭注人辭亦辭疏泛若者是無的當不係之貌也雖無驚於寵辱亦乃同塵以遜讓故泛然常人辭亦辭也寡人醜乎卒授之國無幾何也去寡人而行寡人恤焉若有亡也若無與樂是國也是何人者也疏愧慙也卒終也幾何俄頃也恤憂也寡人是五等之謙稱也既見良人泛然虛淡中心愧醜戀慕殷勤終欲與之國政屈為卿輔俄頃之間逃遁而去喪失賢宰實懷憂恤情之恍惚若有遺亡雖君魯邦魯無歡樂來喜去憂感動如此何人何術一至於斯仲尼曰丘也嘗使於楚矣適見豚子食於其死母者注食乳也少焉胸若皆棄之而走不見己焉爾不得類焉爾注夫生者以才德為類死而才德去矣故生者以失類而走也故含德之厚者比於赤子無往而不為之赤子也則天下莫之害斯得類而明己故也情苟類焉則雖形不與同而物無害心情類苟亡雖則形同母子而不足以固其志矣疏哀公陳己心迹以問孔子孔子以豚子為譬以答哀公丘曾領門徒遊行楚地適見豚子飲其死母之乳眴目之頃少時之間棄其死母皆散而走不見已類所以為然故郭注云生者以才德為類死而才德去矣故生者以失類而走也以況哀公素無才德非是已類棄捨而去駘它才德既全於赤子物之親愛固是其宜矣所愛其母者非愛其形也愛使其形者也注使形者才德也疏郭注云使形者才德也而才德者精神也豚子愛母愛其精神民之慕君慕其才德者也戰而死者其人之葬也不以翣資注翣者武所資也戰而死者無武也翣將安施刖者之屨無為愛之注所愛屨者為足故耳皆無其本矣注翣屨者以足武為本疏翣者武飾之具武王為之或云周公作也其形似方扇飾車兩邊軍將行師陷陳而死及其葬日不用翣資是知翣者武之所資屨者足之所使用形者神之所使無足屨無所用無武則翣無所資無神則形無所愛然翣屨以足武為本形貌以才德為原二者無本故並無用也為天子之諸御不爪翦不穿耳注全其形也取妻者止於外不得復使注恐傷其形疏夫帝王宫闈揀擇御女穿耳翦爪恐傷其形匹夫娶妻惇於外務使役驅馳慮虧其色比重舉譬以況全才也形全猶足以為爾注採擇濱御及燕爾新昏本以形好為意者也故形之全也猶以降至尊之情回貞女之操也而況全德之人乎注德全而物愛之宜矣疏爾然也夫形之全具尚能降真人感貞女而況德全乎此合譬也故郭注云德全而物愛之宜矣哉今哀駘它未言而信無功而親使人授己國唯恐其不受也是必才全而德不形者也疏夫親由績彰信藉言顯今駘它未至言説而己遭委信本無功績而付託實親遂使魯侯虛襟授其朝政卑己遜讓唯恐不受如是之人必當才智全具而推功於物故德不形見之也哀公曰何謂才全疏前雖標舉於義未彰故發此疑庶希後答仲尼曰死生存亡窮達貧富賢與不肖毁譽飢渴寒暑是事之變命之行也注其理固當不可逃也故人之生也非誤生也生之所有常有言也天地雖大萬物雖多然吾之所遇適在於是則雖天地神明國家聖賢絶力至知而弗能違也故凡所不遇弗能遇也其所遇弗能不遇也所不為弗能為也其所為弗能不為也故付之而自當矣疏夫二儀雖大萬物雖多人生所遇適在於是故前之八對並是事物之變化天命之流行而留之不停推之不去安排任化所遇所適自非德充之士其孰能然此則仲尼答哀公才全之義日夜相代乎前注夫命行事變不舍晝夜推之不去留之不停故才全者隨所遇而任之而知不能規乎其始者也注夫始非知之所規而故非情之所留是以知命之必行事之必變者豈於終規始在新戀故哉雖有至知而弗能規也逝者之往吾奈之何哉疏夫命行事變其速如馳代謝遷流不舍晝夜一前一後反覆循環雖有至知不能測度豈復在新戀故在終規始哉蓋不然也唯當隨變任化則無往而不逍遙也故不足以滑和注苟知性命之固當則雖死生窮達千變萬化淡然自若而和理在身矣疏滑亂也雖復事變命遷而隨形任化淡然自若不亂於中和之道也不可入於靈府注靈府者精神之宅也夫至足者不以憂患經神若皮外而過去疏靈府者精神之宅所謂心也經寒涉暑治亂千變萬化與物俱往未當槩意豈復關心耶使之和豫通而不失於兊注苟使和性不滑靈府間豫則雖涉乎至變不失其兊然也疏兊遍悅也體窮通達生死遂使所遇和樂中心逸豫經涉夷險兊然自得不失其適悅也使日夜無郤注泯然常任之疏郤間也駘它流轉日夜不停心心相係亦無間斷也而與物為春注群生之所賴也疏慈照有生恩霑動植與物仁惠事等青春是接而生時乎心者也注順四時而俱化疏是者指斥以前事也才全之人接濟群品生長萬物應赴順時無心之心逗機而照者也是之謂才全疏總結以前是才全之義也何謂德不形疏已領才全未悟德不形義更相發問庶聞後旨也曰平者水停之盛也注天下之平莫盛於停水也疏停止也而天下均平莫盛於止水故上文云人莫鑒於流水而必鑒於止水此舉為譬以彰德不形義故也其可以為法也注無情至平故天下取正焉內保之而外不蕩也注內保其明外無情偽玄鑒洞照與物無私故能全其平而行其法也疏夫水性澄清鑒照於物大匠雖巧非水不平故能保守其明而不波蕩者可以軌轍工人洞鑒妍醜也故下文云水平中準大匠取則焉況至人冥真合道和光和物模楷蒼生動而常寂故云內保之而外不蕩者也德者成和之修也注事得以成物得以和謂之德也疏夫成於庶事和於萬物者非盛德孰能之哉必也先須修身立行後始可成事和物之德以和而我不喪者方可以謂之德也德不形者物不能離也注無事不成無物不和此德之不形也是以天下樂推而不厭疏夫明齊日月而歸明於昧功侔造化而歸功於物者此德之不形也是以含德之厚比於赤子天下樂推而不厭斯而不離之者也哀公異日以告閔子曰始也吾以南面而君天下執民之紀而憂其死吾自以為至通矣今吾聞至人之言恐吾無其實輕用吾身而亡其國吾與孔丘非君臣也德友而己矣注聞德充之風者雖復哀公猶欲遺形骸忘貴賤也疏姓閔名損字子騫宣尼門人在四科之數甚有孝德魯人也異日猶它日也南面君位也初始未悟矜於魯君執持綱紀憂於兆庶養育教誨恐其夭死用斯治術為至美至通今聞尼父言談且陳才德之義魯侯悟解方覺前非至通憂死之言更成虛幻執紀南面之大都無實録於是隳肢體黜聰明遺尊卑忘爵位觀魯邦若蝸角視己形如隙影友仲尼以全道德禮司寇以異君臣故知莊老之談其風清遠德充之美一至於斯闉跂支離無賑説衛靈公靈公悅之而視全人其脰肩肩甕盎太癭説齊桓公桓公悅之而視全人其脰肩肩注偏情一往則醜者更好而好者更醜也疏闉曲也謂攣曲全腫而行脤脣也謂支體坼裂傴僂殘病復無脣也盎盆也脰頸也肩肩細小貌也而支離殘病企踵而行瘤癭之病大如盆甕此二人者窮天地之陋而俱能忘形建德體道談玄遂使齊衛兩君欽風愛悅美其盛德不覺病醜顧視全人之頸翻小而似肩肩之者故德有所長而形有所忘注其德長於順物則物忘其醜長於逆物則物忘其好疏大癭支離道德長遠遂使齊侯衛主忘其形惡人不忘其所忘而忘其所不忘此謂誠忘注生則愛之死則棄之故德者世之所不忘也形者理之所不存也故夫忘形者非忘也不忘形而忘德者乃誠忘也疏誠實也所忘形不忘德也忘形易忘德難也故謂形為所忘德為不忘也不忘形而忘德者此乃真實忘斯德不形之義也故聖人有所遊注遊於自得之場放之而無不至者才德全也疏物我雙遣形德兩忘故放任乎變化之場遨遊於至虛之域也而知為孽約為膠德為接工為商注此四者自然相生其理已具疏夫至人道邁三清而神遊六合故藴智以救妖孽約束以檢散心樹德以接蒼生工巧以利群品此之四事凡類有之大聖慈救同塵順物也聖人不謀惡用知不斫惡用膠無喪惡用德不貨惡用商注自然已具故聖人無所用其己也疏惡何也至人不妖孽謀謨何用智惠不散亂雕斫何用膠固本不喪道用德何為不貴難得之貨無勞商賈秖為和光和物是故有之者也四者天鬻也天鬻者天食也注言自然而稟之疏鬻食也食稟也天自然也以前四事蒼生有之稟自天然各率其性聖人順之故無所用己也既受食於天又惡用人注疏稟之自然其理己足則雖沉思以免難或明戒以避禍物無妄然皆天地之會至理所趣必自思之非我思也必自不思非我不思也或思而免之或思而不免或不思而免之或不思而不免凡此皆非我也又奚為哉任之而自至也疏稟之自然各有定分何須分外添足人情違天任人故至悔者也有人之形注視其形貌若人無人之情注掘若稿木之枝疏聖人同塵在世有生處之形害體道虛忘無是非之情慮有人之形故群於人注類聚群分自然之道疏和光混迹群聚世間此解有人之形無人之情故是非不得於身注無情故付之於物也疏譬彼靈真絶無性識既忘物我何有是非此解無人之情故也眇乎小哉所以屬於人也注形貌若人疏屬係也迹閔嚚吝形係人群與物不殊故稱眇小也此結有人之形耳謷乎大哉獨成其天注無情故浩然無不任無不任者有情之所未能也故無情而獨成天也疏謷高大貌也謷然大教萬境都忘智德高深凝照宏遠故歎美大人獨成自然之至此結無人之情也惠子謂莊子曰人故無情乎疏前文云有人之形無人之情惠施引此語來質疑莊子所言人者必固無情慮乎然莊惠二賢並遊心方外故常稟而為論端莊子曰然疏然如是也許其所問故答云然惠子曰人而無情何以謂之人疏若無性智何名為人此是惠施進責之辭問於莊子莊子曰道與之貌天與之形惡得不謂之人注人之生也非情之所生也生之所知豈情之所知哉故有情於為離曠而弗能也然離曠以無情而聰明矣有情於為賢聖而弗能也然賢聖以無情而賢聖矣豈直賢聖絶遠而離曠難慕哉雖下愚聾瞽及雞嗚狗吠豈有情於為之亦終不能也不問遠之與近雖去已一分顔孔之際終莫之得也是以關之萬物反取諸身耳目不能以易任成功手足不能以代司致業故嬰兒之始生也不以目求乳不以耳向明不以足操物不以手求行豈百骸無定司形貌無素主而專由情以制之哉疏惡何也虛通之道為之相貌自然之理也遺其形質形貌具有何得不謂之人且形之將貌蓋亦不殊道與自然互其文耳欲顯明斯義故重言之也惠子曰既謂之人惡得無情注未解形貌之非情也疏既名為人理懷情慮若無情矣何得謂之人此是惠施未解形貌之非情莊子曰是非吾所謂情也注以是非為情則無是無非無好無惡者雖有形貌直是人耳情將安寄疏吾所言情者是非彼我好惡憎嫌等也若無是無非雖有形貌直是人耳情將安寄吾所謂無情者言人之不以好惡內傷其身注任當而直前者非情也疏莊子所謂無情者非木石其懷也止言不以好惡緣慮分外遂成性而內理其身者也亦何則藴虛照之智無情之情也常因自然而不益生也注止於當也疏因任自然之理以此為常止於所稟之涯不知生分惠子曰不益生何以有其身注未明生之自生理之自足疏若不資益生道何得有此身乎未解生之自生理之自足者也莊子曰道與之貌天與之形注生理已自足於形貌之中但任之則身存疏道與形貌生理已足但當任之無勞措意也無以好惡內傷其身注夫好惡之情非所以益生祗足以傷身以其生之有分也疏還將益以酬後問也今子外乎子之神勞乎子之精倚樹而吟據稿梧而瞑注夫神不休於性分之內則外矣精不止於自生之極則勞矣故行則倚樹而吟坐則據梧而睡言有情者之自困也疏稿梧夾漆几也惠子未遣筌蹄耽常筌理疏外神識勞苦精靈故行則倚樹而吟詠坐則隱几而談説是以形勞心倦疲怠而瞑者也天選子之形子以堅白鳴注言凡子所為外神勞精倚樹據梧且吟且睡此世之所謂情也而云天選明夫情者非情之所生而況他哉故雖萬物萬形云為趣舍皆在無情中來又何用情於其間哉疏選授也鳴言説也自然之道授與汝形夭壽妍醜其理已定無勞措意分外益生而子稟性聰明辨析明理執持己德炫耀衆人亦何異乎公孫龍作白馬論云白馬非馬堅守斯論以此自多信有其言而無其實能伏衆人之口不能伏衆人之心今子分外誇談即是斯之類也南華真經注疏卷之六
