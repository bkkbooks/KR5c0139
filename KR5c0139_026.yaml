body:
  text: 南華真經注疏卷之二十六慶五河南郭象注唐西華法師成玄英疏雜篇徐無鬼第二十四徐無鬼因女商見魏武侯疏姓徐字無鬼隱者也姓女名商魏之宰臣武侯文侯之子畢萬八世孫也無鬼欲針規武侯故假宰臣以見之武侯勞之曰先生病矣苦於山林之勞故乃肯見於寡人疏久處山林勤苦貧病忽能降志混迹俗中中心欣悅有慰勞也徐無鬼曰我則勞於君君有何勞於我君將盈嗜欲長好惡則性命之情病矣君將黜嗜欲掔好惡則耳目病矣注嗜欲好惡內外無可疏黜廢退也掔引却也君若嗜欲盈滿好惡長進則性命精靈困病也君屏點嗜欲掔去好惡既不稱適故耳目病矣是故我將慰勞於君君有何暇能勞於我也我將勞君君有何勞於我疏此重結前義武侯超然不對注不悅其言疏超恨也既不稱情故長然不答少焉徐無鬼曰嘗語君吾相狗也疏既覺武侯悵然不悅試語狗馬庶愜其心下之質執飽而止是狸德也疏執守情志唯貪飽食此之形質德比狐狸下品之狗中之質若視日疏意氣高遠望如視日體質如則中品狗也上之質若亡其一疏一身也神氣定審若喪其身上品之狗也吾相狗又不若吾相馬也疏狗有三品馬有數階而相狗之能不若相馬武侯庸鄙故以此逗機冀其歡悅庶幾歸正吾相馬直者中繩疏謂馬前齒曲者中鉤疏謂馬項也方者中矩疏謂馬頭也圓者中規疏謂馬眼也是國馬也疏合上之相是謂諸侯之國上品馬也而未若天下馬也天下馬有成材疏材德素成不待於習斯乃字內上馬天王所馭也若恤若失若喪其一疏眼自顧視既似憂虞蹄足緩疏又如奔佚觀其神彩若忘己身如此之材天子馬也若是者超軼絶塵不知其所疏軼過也馳走迅速超過群馬疾若迅風塵埃遠隔既非教習故不知所由也武侯大悅而笑注夫真人之言何遜哉唯物所好之可也疏語當其機故笑而歡悅徐無鬼出女商曰先生獨何以說吾君乎疏議事已了辭而出女商怪君歡笑是以咨問無鬼也吾所以說吾君者橫說之則以詩書禮樂從說之則以金板六韜疏詩書禮樂六經金板六韜周書篇名也或言祕讖也本有作韜字者隨字讀之云是太公兵法謂文武虎豹龍犬韜也橫遠也縱近也武侯好武而惡文故以兵法為縱六經為橫也奉事而大有功者不可為數而吾君未嘗啓齒注是直樂鴳以鍾鼓耳故愁今先生何以說吾君使吾君悅若此乎疏奉事武侯盡於忠節或獻替可否功績克彰如此之徒不可稱數而我君未嘗開口而微笑今子有何術遂使吾君歡說如此邪徐無鬼曰吾直告之吾相狗馬耳疏夫藥無貴賤愈疾則良故直告犬馬更無他說女商曰若是乎疏直置如是告狗馬乎怪其術淺故有斯問曰子不聞夫越之流人乎去國數日見其所知而喜注各思其本性之所好疏去國迢遞有流放之人或犯憲綱或遭苛政辭鄉甫爾始經數日忽逢知識喜慰何疑此起譬也去國旬月見所嘗見於國中者喜疏日月稍久思鄉漸深雖非相識而國中曾見故人見之而歡也及期年也見似人者而喜矣不亦去人滋久思人滋深乎注各得其所好則無思無思則忘其所以喜也疏去國周年所適漸遠故見似鄉里人而歡喜矣豈非離家漸遠而思戀滋深乎以況武侯性好犬馬久不聞政事等離鄉之人忽聞談笑夫逃虛空者藜藋柱乎鼪鼬之徑踉位其空聞人足音跫然而喜矣又況乎昆弟親戚之謦咳其側者乎注得所至樂則大悅也疏柱塞也踉食人也跫行聲也夫時遭暴亂運屬飢荒逃避波迸於虛園宅唯有藜藋野草柱塞門庭狙猿鼪鼬蹊徑斯在若於堂宇人位虛廣間然當爾之際思鄉滋甚忽聞他人行聲猶自欣悅況乎兄弟親眷謦咳言笑者乎此重起譬也久矣夫莫以真人之言謦咳吾君之側乎注所以未嘗啓齒也夫真人之言所以得吾君性也始得之而喜久得之則忘疏武侯思聞犬馬其日固久譬彼流人方滋逃客羈弊既淹實懷鄉眷今乃以真人六經之說大公兵法之談謦咳其側非所宜也此合前諭也徐無鬼見武侯武侯曰先生居山林食芧栗厭葱韭以賔寡人久矣夫今老邪其欲千酒肉之味邪其寡人亦有社稷之福邪疏千求也久處山林飱食蔬果年事衰老勞若厭倦豈不欲求於滋味以養頽齡乎庶禀德以謀固宗廟徐無鬼曰無鬼生於貧賤未嘗敢飲食君之酒肉將來勞君也疏生涯貧賤安於山藪豈欲貪於飲食以自養哉蓋不然乎將勞君也君曰何哉奚勞寡人疏奚何也問其所以也曰勞君之神與形疏食欲無厭形勞神倦故慰之耳武侯曰何謂邪疏問其所言有何意謂徐無鬼曰天地之養也一注不以為君而恣之無極疏夫天地兩儀亭毒群品物於資養周普無偏不以為君恣其奢侈此並是無鬼勞君之辭登高不可以為長居下不可以為短君獨為萬乘之主以苦一國之民以養耳目鼻口注如此違天地之平也疏登高位為君子不可樂之以為長居卑下為百姓不可苦之以為短而獨誇萬乘之威苦此一國黎庶貪色聲香味以恣耳目鼻口既違天地之意竊為公不取焉夫神者不自許也注物與之耳疏許與也夫聖主神人物我平等必不多貪滋味而自與焉夫神者好和而惡姦注與物共者和也私自許者姦也疏夫神聖之人好與物和同而惡姦私者夫姦病也故勞之唯君所病之何也疏夫姦者私通於理為病君獨有病其困如何武侯曰欲見先生久矣吾欲愛民而為義偃兵其可乎疏欲行愛養之仁而為裁非之義修於文教偃息兵戈如斯治國未知可不也徐無鬼曰不可愛民害民之始也注愛民之迹為民所尚尚之為愛愛已僞也為義偃兵造兵之本也注為義則名彰名彰則競興競興則喪其真矣父子君臣懷情相欺雖欲偃兵其可得乎疏夫偏愛之仁裁非之義偃武之功修文之事迹既彰矣物斯徇焉害民造兵自此始也君自此為之則殆不成注從無為為之乃成耳疏自從也殆近也從此以為必殆隳敗無為之本故近不成也凡成美惡器也注美成於前則僞生於後故成美者乃惡器也疏夫善善之事成之於前美迹既彰物則趨競故為惡之器貝也君雖為仁義幾且僞哉注民將以僞斷之耳未肯為真也疏幾近也仁義迹顯物皆喪真故近僞本也形固造形注仁義有形固僞形必作疏仁義二塗並有形迹故前迹既依後形必造成固有伐注成則顯也疏夫功名成者必招爭競故有征伐變固外戰注失其常然疏夫造作刑法而變更易常者物必害之故致外敵事多爭戰君亦必無盛鶴列於麗譙之間注鶴列陳兵也麗譙高樓也無徒驥於錙壇之宫注步兵曰徒但不當為義愛民耳亦無為盛兵走馬疏鶴列陳兵也言陳設兵馬如鶴之行列也麗譙高樓也言其華麗譙嶢也錙壇宫名也君但勿起心偃兵為義亦無勞盛陳兵卒於高樓之下徒驥馬宫苑之間無藏逆於得注得中有逆則失耳疏莫包藏逆心而苟於得無以巧勝人注守其朴而朴各有所能則平疏大巧若拙各敦朴素莫以機心爭勝於人無以謀勝人注率其真知而知各有所長則均疏忘心遣慮率其直知勿以謀謨勝捷於物無以戰勝人注以道應物物服而無勝名疏先為清淡以道服人勿以兵戰取勝於物夫殺人之士民兼人之土地以養吾私與吾神者其戰不知孰善勝之惡乎在注不知以何為善則雖克非己勝疏夫應天順人而或滅凶殄逆者雖亡國戮人而不失百姓之歡心也若使誅殺人民兼土并地而意在貪取私養其身及悅其心者雖復戰克前敵善勝於人不知此勝於何處在善且在誰邊也君若勿已矣修胸中之誠以應天地之情而勿攖注若未能已則莫若修已之誠疏誠實也攖擾也事不得止應須治國若修心中之實應二儀之生殺無勞作法攖擾黎民夫民死已脫矣君將惡乎用夫偃兵哉注甲兵無所陳非偃也疏大順天地施化無心民以勝殘免脫傷死何勞措意作法偃兵邪黃帝將見大隗乎具茨之山疏黃帝軒轅也大隗大道廣大而隗然空寂也亦言大隗古之至人也具茨山名也在滎陽密縣界亦名泰隗山黃帝聖人久冥至理方欲寄尋玄道故託迹具茨方明為御昌㝢驂乘張若謵朋前馬昆閽滑稽後車疏方明滑稽等皆是人名在右為驂在左為御前馬馬前為導也後車車後為從也至於襄城之野七聖皆迷無所問塗注聖者名也名生而物迷矣雖欲之乎大隗其可得乎疏塗道也今汝州有襄城縣在泰隗山南即黃帝訪道之所也自黃帝已上至于滑稽總有七聖也注云聖者名也名生而物迷矣雖欲之乎大隗其可得乎此注得之今子重釋也適遇牧馬童子問塗焉疏牧馬童子得道人也牧馬曰牧適爾而值牧童因問道之所在曰若知具茨之山乎曰然疏若汝也然猶是也問山之處所答云我知若知大隗之所存乎曰然疏存在也又問道之所在答云知處黃帝曰異哉小童非徒知具茨之山又知大隗之所存請問為天下疏帝驚異牧童知道所在因問緝理區宇其法如何小童曰夫為天下者亦若此而已矣又奚事焉注各自若則無事矣無事乃可以為天下也疏異何也若如也夫欲修為天下亦如治理身身既無為物有何事故老經云我無為而民自化豫少而自遊於六合之內豫適有瞀病有長者教豫曰若乘日之車而遊於襄城之野注日出而遊日入而息疏六合之內謂囂塵之裏也瞀病謂風眩冒亂也言我少遊至道之境棲心塵垢之外而有眩病未能體真幸聖人教我修道晝作夜息乘日遨游以此安居而逍遙處世本有作車字者謂乘日新以變化今豫病少痊豫又且復遊於六合之外夫為天下亦若此而已豫又奚事焉注夫為天下莫過自放任自放任矣物亦奚攖焉故我無為而民自化疏痊除也虛妄之病久已痊除任染而游心物外治身治國豈有異乎物我混同故無事也黃帝曰夫為天下者則誠非吾子之事注事由民作雖然請問為天下注令民自得必有道也疏夫牧養蒼生實非聖人務理雖如此猶請示以要言小童辭疏無所說也黃帝又問疏殷勤請小童也小童曰夫為天下者亦奚以異乎牧馬者哉亦去其害馬者而已矣注馬以過分為害疏害馬者謂分外之事也夫治身莫先守分故牧馬之術可以養民問既殷勤聊為此答黃帝再拜稽首稱天師而退注師夫天然而去其過分則大隗至也疏頓悟聖言故身心愛敬退其分外至乎大隗合乎天然之道其在吾師乎知士無思慮之變則不樂疏世屬艱危時逢禍變知謀之士思而慮之如其不然則不樂也辨士無談說之序則不樂疏辨類縣河辭同炙輠無談說端故則不歡樂察士無凌誶之事則不樂疏機警之士明察之人若不容主客問訊辭鋒凌轢則不樂也皆囿於物者也注不能自得於內而樂物於外故可囿也故各以所樂囿之則萬物不召而自來非彊之也疏此數人者各有偏滯未達大方並囿域於物也招世之士興朝疏推薦忠良招致人物之士可以與於朝廷也中民之士榮官疏治理四民甚龍折中斯人精幹局分可以榮官筋力之士矜難疏英髦壯士有力如虎時逢厄難務於濟世也勇敢之士奮患疏武勇之士果决之人奮發雄豪滌除禍患兵革之士樂戰疏情好千戈志存鋒刃如此之士樂於征戰枯槁之士宿名疏食寡衣褐形容憔悴留心寢宿唯在聲名也法律之士廣治疏刑法之士留情格條懲惡勸善其治大也禮教之士敬容疏節文之禮矜敬容貌仁義之士貴際注士之不同若此故當之者不可易其方疏世有迍邅時逢際會則施行仁義以著名勳際會也農夫無草萊之事則不比商賈無市井之事則不比注能同則事同所以比疏比和樂古者因井為市故謂之市井也若乖本務情必不和也庶人有旦暮之業則勸注業得其志故勸疏衆庶之人各有事旦暮稱情故自勉勵百工有器械之巧則壯注事非其巧則惰疏壯盛也百工功巧各有器械能順其情事斯盛矣錢財不積則貪者憂注物得所嗜而樂也權勢不尤則夸者悲疏尤甚也夫貪競之人必聚財以適性矜誇之士假權勢以娛心事苟乖情則憂悲斯生矣勢物之徒樂變注權勢生於事變疏夫禍起則權勢尤故以勢陵物之徒樂禍變也遭時有所用不能無為也注凡此諸士用各有時時用則不能自已也苟不遭時則雖欲自用其可得乎故貴賤無常也疏以前諸士遭遇時命情隨事遷故不無為也此皆順比於歲不物於易者也注士之所能各有其極若四時之不可易耳故當其時物順其倫次則各有用矣是以順歲則時序易性則不物物而不物非毁如何疏比次第也夫士之所行能有長短用捨隨時成有次第方之歲叙炎凉不易於物不物猶不易於物者也馳其形性潜之萬物終身不反悲夫注不守一家之能而之夫萬方以要時利故有匐匍而歸者所以悲也疏馳鶩身心潜伏前境至乎沒命不知反歸頑愚若此深可悲歎也已矣莊子曰射者非前期而中謂之善射天下皆羿也可乎注不期而中謂誤中者也非善射也若謂謬中為善射是則天下皆可謂之羿可乎言不可也疏期謂準的也夫射無期準而誤中一物即謂之善射者若以此為善射可乎惠子曰可疏謂宇內皆羿也莊子曰天下非有公是也而各是其所是天下皆堯也可乎注若謂謲中者羿也則私自是者亦可謂堯矣莊子以此明妄中者非羿而自是者非堯疏各私其是故無公是也而唐堯聖人對桀為是若各是其所是則皆聖人可乎言不可惠子曰可疏言各是其是天下盡堯有斯理而惠施滯辨有言無實莊子曰然則儒墨楊秉四與夫子為五果孰是邪注若皆堯也則五子何為復相非乎疏儒姓鄭名緩墨名翟也楊名朱秉者公孫龍字也此四子者並聰明過物蓋世雄辨添惠施為五各相是非未知次定用誰為是若天下皆堯何為五復相非乎或者若魯遽者邪其弟子曰我得夫子之道矣吾能冬爨鼎而夏造冰矣疏姓魯名遽周初人云冬取千年燥灰以擁火須臾出火可以爨鼎盛夏以瓦瓶盛水湯中煮之縣瓶井中須臾成冰也而迷惑之俗自是非徒與魯無異也魯遽曰是直以陽召陽以陰召陰非吾所謂道也疏千年灰陽也火又陽也此是以陽召陽井中陰也水又陰也此是以陰召陰魯遽此言非其弟子也吾示子乎吾道於是為之調瑟廢一於堂廢一於室鼓宫宫動鼓角角動音律同矣注俱亦以陽召陽而橫自以為是疏廢置也置一瑟於堂中置一瑟於室內鼓堂中宫角室內弦應而動斯乃五音六律聲同故也猶是以陽召陽也夫或改調一弦於五音無當也注隨調而改疏堂中改調一弦則室內音無復應動當為律不同故也鼓之二十五弦皆動注無聲則無以相動有聲則非同不應今改此一絃而二十五弦皆改其以急緩為調也疏應唯宫角而已密二十五弦俱動聲律同者悉應動也未始異於聲而音之君已注魯遽以此夸其弟子然亦以同應同耳未為獨能其事也疏聲律之外曾更有異術雖復應動不同總以五音為其君主而已既無他術何足以自夸且若是者邪注五子各私所見而是其所是然亦無異於魯遽之夸其弟子未能相出也疏惠子之言各私其是務夸陵物不異魯遽故云若是惠子曰今夫儒墨楊秉且方與我以辨相拂以辭相鎮以聲而未始吾非也則奚若矣注未始吾非者各自是也惠子便欲以此為至莊子曰齊人蹢子於宋者其命閽也不以完注投之異國使門者守之出便與手不保其全此齊人之不慈也然亦自以為是故為之疏閽守門人也齊之人棄蹢其子於宋仍命以此不亦我是其求鈃鍾也以束縛注乃反以愛鍾器為是束縛恐其破傷其求唐子也而未始出域有遺類矣注唐失也失亡其子而不能遠索遺其氣類而亦未始自非人之自是有斯謬矣疏鈃小鍾也唐亡失也求覓亡子不偶境域束縛鈃鍾恐其損壞賤子貴器為不慈遺其氣類亦言我是夫楚人寄而蹢閽者注俱寄止而不能自投於高地也夜半於無人之時而與舟人鬭未始離於岑而足以造於怨也注岑岸也夜半獨上人船未離岸已共人鬬言齊楚二人所行若此而未嘗自以為非今五子自是豈異斯哉疏楚郢之人因子客寄近于江濱之側投蹢守門之家夜半無人之時輒入他人舟上而船未離岑已共舟人鬬打不懷恩德更造怨辭愚猥如斯亦云我是惠子之徒此之類也岑岸也莊子送葬過惠子之墓顧謂從者曰郢人堊漫其鼻端若蠅翼使匠石斫之匠石運斤成風聽而斫之注瞑目恣手疏郢楚都也漢書揚雄傳作郢乃因郢人謂泥畫之人也堊者白善土也漫汙也莊生送親知之葬過惠子之墓緬懷疇昔仍起斯譬瞑目恣手聽聲而斫運斤之妙遂成風聲若蠅翼者言其神妙也盡堊而鼻不傷郢人立不失容宋元君聞之召匠石曰嘗試為寡人為之疏去堊漫而鼻無傷損郢人立傍容貌不失元君聞其神妙嘗試召而為之匠石曰臣則嘗能斫之雖然臣之質死久矣自夫子之死也吾無以為質矣吾無與言之矣注非夫不動之質忘言之對則雖至言妙斫而無所用之疏質對也匠石雖巧必須不動之質莊子雖賢猶藉忘言之對蓋知惠子之亡莊子喪偶故匠人輟成風之妙響莊子息濠上之微言管仲有病桓公問之曰仲父之病病矣可不謂云至於大病則寡人惡乎屬國而可疏管仲姓管名仲字夷吾齊相也是鮑叔牙之友人桓公尊之號曰仲父桓公即小白也一匡天下九合諸侯而為霸主者管仲之力也病病者言是病極重也大病者至死也既將屬纊故臨問之仲父死後屬付國政與誰為可也管仲曰公誰欲與公曰鮑叔牙疏問國政欲與誰答曰與鮑叔也曰不可其為人潔廉善士也其於不已若者不比之又一聞人之過終身不忘使之治國上且鉤乎君下且逆乎民其得罪於君也將弗久矣疏姓鮑字叔牙貞廉清潔善人也而事猥之人不如己者不比數之一聞人之過至死不忘率性廉直不堪宰輔上以忠直鉤束於君下以清明逆忤百姓不能和混故君必罪之管仲賢人通鑒於物恐危社稷慮害叔牙故不舉之也公曰然則孰可對曰勿已則隰朋可其為人也上忘而下畔注高而不亢疏姓隰名朋齊賢人也叛猶望也混高卑一榮辱故己為卿輔能遺富貴之尊下撫黎元須忘皂隸之賤事不得止用之可也愧不若黃帝而哀不己若者注故無棄人疏不及己者但懷哀悲輔弼齊侯期於淳朴心之所愧不逮軒轅也以德分人謂之聖以財分人謂之賢疏聖人以道德拯物賢人以財貨濟人也以賢臨人未有得人者也以賢下人未有不得人者也其於國有不聞也其於家有不見也勿已則隰朋可疏運智明察臨於百姓逆忤物情叔牙治國則不問物之小瑕治家則不見人之過勿已則隰朋可總結以前義吳王浮于江登乎狙之山衆狙見之恂然棄而走逃於深蓁有一狙焉委蛇攫𢮞見巧乎王王射之敏給注敏疾也給續括也疏狙獼猴也山多獼猴故謂之狙山也恂怖懼也蓁棘叢也委蛇從容也攫𢮞騰擲也敏給猶速也吳王浮江遨遊眺望衆狙恂懼走避深棘獨一老狙恃便敖王王既怪怒急速射之搏捷矢注捷速也矢往雖速而狙猶搏之疏搏接也捷速也矢箭也箭往雖速狙皆接之其敏捷也如此王命相者趨射之狙執死疏命召也相助也謂王之左右也王既自射不中乃召左右亂趨射之於是狙抱樹而死王顧謂其友顔不疑曰之狙也伐其巧恃其便以敖豫以至此殛也戒之哉嗟乎無以汝色驕人哉疏姓顔字不疑王之友也殛死也豫我也狙矜伐徑巧恃賴方便傲慢於王遂遭死殛嗟此狡獸可以戒人勿淫聲色驕豪於世顔不疑歸而師董梧以鋤其色去樂辭顯三年而國人稱之注稱其忘巧遺色而任夫素朴疏姓董名梧吳之賢人也鋤除去也既奉王教於是退歸悔過自新師於有道除其美色去其聲樂重素朴辭榮華修德三年國人稱其賢善南伯子綦隱几而坐仰天而噓疏猶是齊物中南郭子綦也其隱几等義並貝解內篇顔成子入見曰夫子物之尤也形固可使若槁骸心固可使若死灰乎疏顔成子綦門人也尤甚也每仰歎先生忘物之甚必固形同槁骸心若死灰慕德殷勤有此嗟詠也曰吾嘗居山穴之口矣當是時也田禾一覩我而齊國之衆三賀之注以得見子綦為榮疏山穴齊南山也田禾齊王姓名子綦隱居山穴德音遐搌齊主暫覩以見為榮所以一國之人三度慶賀也我必先之彼故知之我必賣之彼故鬻之疏我聲名在先故使物知我我便是賣於名聲故田禾見而則之若我而不有之彼惡得而知之若我而不賣之彼惡得而鬻之疏若我韜光晦迹不有聲名彼之世人何得知我我若名價不貴彼何得見而則之只為不能滅迹匿端故為物之所賣鬻之嗟乎我悲人之自喪者疏喪猶亡失也子綦悲歎世人捨己慕他喪失其道吾又悲夫悲人者疏夫道無得喪而物有悲樂故悲人之自喪者亦可悲也吾又悲夫悲人之悲者其後而日遠矣注子綦知夫為之不足以救彼而適足以傷我故以不悲悲之則其悲稍去而泊然無心枯槁其形所以為日遠矣疏夫玄道沖虛無喪無樂是以悲人自喪及悲者雖復前後悲深淺稱異咸未偕道故亦可悲悲而又悲遣之又遣教既彰矣玄玄之理斯著與衆妙相符故曰而深遠矣仲尼之楚楚王觴之孫叔敖執爵而立市南宜僚受酒而祭曰古之人乎於此言已注古之言者必於會同疏觴酒器之總名謂以酒燕之也爵亦酒器受一升古人欲飲必先祭其宜僚瀝酒祭故祝聖人願與孔子於此言論也曰丘也聞不言之言矣未之嘗言注聖人無言其所言者百姓之言耳故曰不言之言苟以言為不言則雖言出於口故為未之嘗言於此乎言之注今將於此言於無言疏夫理而教不言矣教而理未之嘗言也是以聖人妙體斯趣故終曰言而未嘗言也孔子應宜僚之請故於此亦言於無言矣市南宜僚弄丸而兩家之難解孫叔敖甘寢秉羽而郢人投兵注此二子息訟以默淡泊自若而兵難自解疏姓熊字宜僚楚之賢人亦是勇士沉默者也居於市南因號曰市南子焉楚白公勝欲因作亂將殺令尹子西司馬子綦言熊宜勇士也若得敵五百人遂遣使屈之宜僚正上下弄丸而戲不與使者言使因以劍乘之宜僚曾不驚懼既不從命亦不言他白公不得宜僚反事不成故曰兩家難解姓孫字叔敖楚之令尹甚有賢德者也郢楚都也投息也叔敖藴藉實知高枕而逍遙會理忘言執羽扇而自得遂使敵國不侵折衝千里之外楚人無事修文德息其武略彰二子有此功能故可與仲尼晤言贊揚玄道也丘願有喙三尺注苟所言非己則雖終身言故為未嘗言耳是以有喙三尺未足稱長凡人閉口未是不言疏喙口也苟其言當即此無言假余喙長三尺與閉口何異故願有之也彼之謂不道之道注彼謂二子疏彼謂所詮之理不道而道言非道非不道也此之謂不言之辨注此謂仲尼疏此謂能詮之教不言而言非言非不言也子玄乃云此謂仲尼斯注粗淺失之遠矣夫不道不言斯乃探微索隱窮理盡性豈二子之所能邪若以甘寢弄丸而稱息訟以默者此則默語縣隔丘何得有喙三尺乎故不可也又此一章盛談玄極觀其文勢不關孫熊明矣故德總乎道之所一注道之所容者雖無方然總其大歸莫過於自得故一也而言休乎知之所不知至矣注言出其分非至如何疏天至道之境重玄之域聖心所不能知神口所不能辨若以言知索真失之遠矣故德之所總言之所然者在於至妙之一道也道之所一者德不能同也注各自得耳非相同也而道一也疏夫一道虛玄曾無涯量而德有上下誰不能周備也本有作同字者言德有優劣未能同道也此解前道之所一也知之所不能知者辨不能舉也注非其外故不能舉疏夫知者玄道所謂妙絶名言故非辨說所能勝舉也此解前知之所不知也名若儒墨而凶矣注夫儒墨欲同所不能同舉所不能舉故凶疏夫執是競非而名同儒墨者凶禍斯及矣故海不辭東流大之至也注明受之無所辭所以成大疏百川競注東流不息而巨海容納曾不辭憚此據東海為言亦宏博之至也已聖人并包天地澤及天下而不知其誰氏注泛然都任疏前舉海為諭此下合譬也聖人德合二儀故并包天地仁覃無外故澤及天下成而不處故不知誰為推功於人故莫識其氏族矣是故生無爵注有而無之死無諡注諡所以名功功不在己故雖諡而非己有疏夫人處世生有名位死定諡號所以表其實也聖人生既以功推物故死亦無可諡也實不聚注令萬物各知足疏縱有財德悉分散於人也名不立注功非已為故名歸於物疏夫名以名實實既不聚故名將安寄也此之謂大人注若為而有之則小矣疏總結以前忘於名諡之士可謂大德之人狗不以善吠為良人不以善言為賢注賢出於性非言所為疏善喜好也夫犬不必吠賢人豈復多言而況為大乎注大人愈不可為而得疏夫好言為賢猶自不可況惑心取捨於大乎夫為大不足以為大而況為德乎注唯自然乃德耳疏愛心宏博謂之大冥符玄道謂之德夫有心求大於理尚乖況有情為德固不可也夫大備矣莫若天地然奚求焉而大備矣注天地大備非求之也疏備具足也夫二儀覆載亭毒無心四叙周行生成庶品蓋何術焉而萬物必備知大備者無求無失無棄不以物易己也注知其自備者不捨己而求物故無求無失無棄也疏夫體弘自然之理而萬物素備者故能於物我之際淡然忘懷是以無取無捨無失無喪無證無得而不以物境易奪己心也反己而不窮注反守我理我理自通疏只為弘備故契於至理既而反本還原會己身之妙極而無窮竟者也循古而不摩注順常性而自至耳非摩拭疏循順也順於物性無心改作豈復摩飾而矜之大人之誠注不為而自得故曰誠疏誠實也夫反本還原因循萬物者斯乃大聖之人自實之德也子綦有八子陳諸前召九方歅曰為我相吾子孰為祥疏子綦楚司馬子綦也陳行列也諸於也方姓也歅名也孰誰也祥善也九方歅善相者也陳列諸子於庭前命方歅令相之八子之中誰為吉善九方歅曰梱也為祥疏梱子名也言八子之中梱最祥善也子綦瞿然喜曰奚若疏瞿然驚喜貌聞子吉祥故容貌驚喜問其祥善貌相如何曰梱也將與國君同食以終其身子綦索然出涕曰吾子何為以至於是極也疏索然涕出貌方歅識見淺近以食肉為祥子綦鑒深玄妙知其非吉故憫其凶極悲而出涕九方歅曰夫與國君同食澤及三族而況父母乎今夫子聞之而泣是禦福也子則祥矣父則不祥疏三族謂父母族也妻族也禦拒扞也夫共國君食尊榮富貴恩被三族何但二親子享吉祥父翻涕泣斯乃禦福德也子綦曰歅汝何足以識之而梱祥邪盡於酒肉入於鼻口矣而何足以知其所自來疏自從也方歅小巫識鑒不遠相梱祥者不過酒肉味入於鼻口方歅道術理盡於斯詎知酒肉由來從何而至吾未嘗為牧而牂生於奧未嘗好田而鶉生於宎若勿怪何邪注夫所以怪出於不意故也疏牂羊也奧西南隅未地羊位也牂東南隅辰地也辰為鶉位故言牂生也夫羊須牧養鶉因畋獵若祿藉功著然後可致富貴今梱而功行未聞而與國君同食何異乎無牧而忽有羊不田而獲鶉也非牧非田怪如何也吾所與吾子遊者遊於天地注不有所為吾與之邀樂於天吾與之邀食於地注隨所遇於天地耳邀遇也疏邀遇也天地無心也子綦體道虛忘順物自足於性分之內敖遊乎天地之間所造皆適不待歡娛所遇斯食豈資厚味邪吾不與之為事不與之為謀不與之為怪注怪異也循常任性脫然自爾疏忘物故不為事忘智故不為謀循常故不為怪吾與之乘天地之誠而不以物與之相攖注斯不為也疏誠實也乘二儀之實道順萬物以逍遙故不與物更相攖擾吾與之一委蛇而不與之為事所宜注斯順耳無擇也疏委蛇猶縱任也心境不二從容任物事既非事何宜便之可為乎今也然有世俗之償焉注夫有功於物物乃報之吾不為功而償之何也疏夫報功賞德者世俗務也苟體道任物不立功名何須功之償哉凡有怪徵者必有怪行殆乎非我與吾子之罪幾天與之也注今無怪行而有怪徵故知其天命也疏殆危也幾近也夫有怪異之行者必怪異之徵祥也今吾子未有怪行而有怪徵必遭殆者斯乃近是天降之灾非吾子之罪吾是以泣也注夫為而然者勿為則已矣不為而自至則不可奈何也故泣之疏罪若由人庶其修改既關天命是以泣也無幾何而使梱之於燕盜得之於道全而鬻之則難不若刖之則易注全恐其逃故不如刖之易售也疏無幾何謂俄頃間也楚使捆聘燕途道之上為賊所得略梱為奴而全形賣之恐其逃竄故難防禦則刖足不慮其逃故易售於是乎刖而鬻之於齊適當渠公之街然身食肉而終疏渠公齊之富人為街正梱之既遭刖足賣與齊國富商之家代主當街終身肉食也字又作術者云渠公屠人也賣梱在屠家共主行宰殺之術終身食肉也齧缺遇許由曰子將奚之疏齧缺逢遇許由仍問欲何之適曰將逃堯疏答曰將欲逃避帝堯曰奚謂邪疏問其何意曰夫堯畜畜然仁吾恐其為天下笑後世其人與人相食與注仁者爭尚之原故也疏畜畜盛行貌也成行偏愛之仁乖於淳和之德恐宇內喪道之士猶甚澆季將來逐迹百姓飢荒倉廪既虛民必相食是以逃也夫民不難聚也愛之則親利之則至譽之則勸致其所惡則散疏夫民撫愛則親利益則至來譽贊則相勸勉與所惡則衆離散故黔首聚散蓋不難也愛利出乎仁義捐仁義者寡利仁義者衆夫仁義之行唯且無誠注仁義既行將僞以為之疏夫利益蒼生愛育羣品立功聚衆莫先仁義而履仁蹈義捐率於中者少託於聖迹以規名利者多是故行仁義者矯性僞情無誠實者也且假夫禽貪者器注仁義可見則夫貪者將假斯器以獲其志疏器聖迹也且貪於名利險於禽獸者必假夫仁義為其器者也是以一人之斷制利天下注若夫仁義各出其情則其斷制不止乎一人疏榮利之徒負於仁義恣其䲴毒斷制天下向無聖迹豈得然乎譬之猶一覕也注覕割也萬物萬形而以一劑割之則有傷也疏覕割也若以一人制服天下譬猶一刀割於萬物其於損傷彼此多矣夫堯知賢人之利天下也而不知其賊天下也夫唯外乎賢者知之矢注外賢則賢不僞疏夫賢聖之迹為利一時萬代之後必生賊害唯能忘外賢聖者其知之妙也有暖姝者有濡需者有卷婁者疏此略摽下解釋所謂暖妹者學一先生之言則暖暖妹妹而私自悅也自以為足矣而未知未始有物也注意盡形教豈知我之獨化於玄冥之境哉疏暖姝自許之貌也小見之人學問寡薄自悅足謂窮微極妙豈知所學未有一物可稱也是以謂暖姝者此言結前也是以謂暖姝者也濡需者豕蝨是也擇疏鬛自以為廣宫大囿奎蹄曲隈乳間股腳自以為安室利處不知屠者之一旦鼓臂布草操煙火而己與豕俱焦也疏濡需矜夸之貌也豕猪也言蝨寄猪體上擇疏長之毛鬛將為廣大宫室苑囿蹄腳奎隈之所股腳乳旁之間用為溫暖利便豈知屠人忽操湯火攘臂布草而殺之乎即己與豕俱焦爛者也諭流俗寡識之人耽好情欲與豕蝨濡需喜歎無異也此以域進此以域退疏域境界也蝨則逐豕而有亡人則隨境而榮樂故謂之域進退也此其所謂濡需者也注非夫通變邈世之才而偷安乎一時之利者皆豕蝨者也疏此結也卷婁者舜也羊肉不慕蟻蟻慕羊肉羊肉羶也舜有羶行百性悅之疏卷婁者謂背項俯曲俯前攣卷而偃僂也羊肉羶腥無心慕蟻蟻聞而歸之舜有仁行不慕百姓百姓悅之故羊肉比舜蟻况百姓故三徙成都至鄧之墟而十有萬家疏舜避丹朱又不願衆聚故三度逃走移徙避之百姓慕德從者十萬所居之處自成都邑至鄧墟地名也堯聞舜之賢舉之童土之地曰冀得其來之澤疏地無草木曰童土堯聞舜有賢聖之德妻以娥皇女英舉以自代讓其天下居不毛土歷試艱難望鄰境承儀蒼生蒙澤舜舉乎童土之地年齒長矣聰明衰矣而不得休歸所謂卷婁者也注聖人之形不異凡人故耳目之用衰也至於精神則始終常全耳若少則未成及長而衰則聖人之聖曾不崇朝可乎疏既登九五威跨萬乘慜念蒼生憂憐凡庶於是年齒長老耳目衰竭無由休息豈得歸寧偃僂攣卷形勞神倦所謂卷婁者也是以神人惡衆至注衆自至耳非好而致也疏三徙遠之以惡也衆至則不比不比則不利也注明舜之所以有天下蓋於不得已耳豈比而利之疏比和也夫衆聚則不和不和則不利於我也故無所甚親無所甚疏抱德煬和以順天下此謂真人疏煬溫也夫不測神人親疏一觀抱守溫和可謂真聖於蟻棄知於魚得計於羊棄意注於民則蒙澤於舜則形勞疏不慕羊肉之仁故於蟻棄智也不為羶行教物故於羊棄意也既遺仁義合乎至道不濡沫相忘於江湖故魚得計此斥虞舜羶行故及斯言也以目視目以耳聽耳以心復心注此三者未能無其耳目心意也疏夫視目之所見聽耳之所聞復心之所知不逐物於分外而知止其分內者其真人之道也若然者其平也繩注未能去繩而自平疏繩無心而正物聖忘懷而平等其變也循注未能絶迹而玄會疏循順也處世和光千變萬化大順蒼生曾不逆寡古之真人以天待之注居無事以待事事斯得疏如上所解即是玄古真人用自然之道虛其心以待物不以人入天注以有事求無事事愈荒疏不用人事取捨亂於天然之智古之真人得之也生失之也死得之也死失之也生注死生得失各隨其所居耳於生為得於死或復為失未始有常也疏夫處生而言即以生為得若據死而語便以生為喪死生既其無定得失的在誰邊噫未可知也是以混死生一得喪故謂之真人矣藥也其實堇也桔梗也雞壅也豕零也是時為帝者也何可勝言注當其所須則無賤非其時則無貴貴賤有時誰能常也疏堇烏頭也治風痺桔梗治心腹血雞壅即雞頭草也服延年豕零猪苓根也似猪卵治渴病此並賤藥也帝君王也夫藥無貴賤愈病則良藥病相當故便為君主乃至目視耳聽手捉心知用有行藏時有興廢故時之所賢者為君才不應世者為臣此事必然故何可言盡也勾踐也以甲楯三千棲於會稽疏勾踐越王也會稽山名也越為吳軍所殘窘迫退走棲息於會稽山上也唯種也能知亡之所以存唯種也不知其身之所以愁疏種越大夫名其時勾踐大敗兵唯三千走上會稽山亡滅非遠而種密謀深智亡時可在當時矯與吳和後二十二年而滅吳矣夫狡兔死良狗烹敵國滅忠臣亡數其然也平吳之後范蠡去越而遊乎江海變名易姓韜光晦迹即陶朱公是也大夫種不去為勾踐所誅但知國亡而可以存不知愁身之必死也字亦有作種者隨字讀之故曰鴟目有所適鶴脛有所節解之也悲注各適一時之用不能靡所不可則有時而失有時而失故有時而悲矣解去也疏鴟目晝暗而夜開則適夜不適晝鶴脛禀分而長則能長不能短枝節如此故解去則悲亦猶種暗於謀身長於存國也故曰風之過河也有損焉日之過河也有損焉注有形者自然相與為纍唯外乎形者磨之而不磷注風日是氣河有形質凡有形氣者未能無纍也而風吹日纍必有損傷恃源而往所以不覺亦猶吳得越之後謀臣必恃其功勳以無後慮遭戮是知物相利相必相為害也謂只風與日相與守河而河以為未始其攖也注實已損矣而不自覺恃源而往者矣注所以不覺非不損也恃源往也疏恃賴也攖損也風之與日相與守河於河攖損而不知覺恃其源流故水之守土也審影之守人也審物之守物也審注無意則止於分所以為審疏審安定也夫水非土則不安影無人則不見物無造物則不立故三者相守而自以為固而新故不住存亡不停昨日之物於今已化山舟潜遁昧者不知斯之義也故目之於明也殆耳之於聰也殆心之於殉也殆注有意則無崖故殆疏殉遂也夫視目所見聽耳所聞任心所逐若目求離朱之明耳索師曠之聰心逐無崖之知欲不危殆其可得乎凡能其於府也殆殆之成也不給改注所以貴其無能而任其天然疏夫運分别之智出於藏府而自伐能者必致危亡也故雖有成功不還周給而改悔矣禍之長也兹萃注萃聚也苟不能忘知則禍之長也多端矣疏滋多也萃聚也役於藏府自顯其能故凶災禍患增長而多聚之也其反也緣功注反守其性則其功不作而成疏自伐己能而反招禍敗者緣於功成不退故也其果也待久注欲速則不果疏夫誠意成功决定矜伐有待之心其日固久而人以為己寶不亦悲乎注己寶謂有其知能疏流徙之人心處愚暗寶貴己能成功而處執滯如是甚可悲傷故有亡國戮民無已注皆有其身之禍疏貪土地為己有大寶取之無道國破家亡殘害黎元無數無窮已也不知問是也注不知問禍之所由由乎有心而修心以救禍也疏世有明人是為龜鏡不知問禍敗所由唯惡貧賤愚之至也故足之於地也踐雖踐恃其所不蹍而後善博也疏踐蹍俱履蹈也夫足之能行必履於地仍賴不踐之土而後得行若無餘地則無由安善而致博遠也此舉譬也人之於知也少雖少恃其所不知而後知之所謂也注夫忘天地遺萬物然後蜩翼可得而知也況欲知天之所謂而可以不無其心哉疏知有明暗能有少多各止其分則物逍遙是以地藉不踐而得行心賴不知而能照所以處寂養恬天然之理故老經云有之以為利無之以為用此合諭也知大一知大陰知大目知大均知大方知大信知大定至矣疏此略摽能知七大之者可謂造極自此以下歷解義大一通之注道也疏一是陽數大一天也能通生萬物故曰通大陰解之注用其分內則萬事無滯也疏大陰地也無心運載而無分解物形之也大目視之注用萬物之自見亦大目也疏各視其所見謂大目大均緣之注因其本性今各自得則大均也疏緣順也大順也物物各性足均平大方體之注體之使各得其分則萬方俱得所以為大方也疏萬物之形各有方術蜘蛛結網之類斯體達之大信稽之注命之所期無令越逸斯大信也疏信實也稽至也循而任之各至其實斯大信也大定持之注真不撓則自定故持之以大定斯不持也疏物各信空持而用之其理空矣盡有天注夫物未有無自然者也疏上來七大未有不由其自然者也循有照注循之則明無所作也疏循順也但順其天然智自明照冥有樞注至理有極但當冥之則得其樞要也疏窈冥之理自有樞機而用之無勞措意也始有彼注始有之者彼也故我述而不作疏始有之者彼也故我述而不作也則其解之也似不解之者注夫解任彼則彼自解解之無功故似不解疏體從彼學而解也戒小成性故不似解其知之也似不知之也注明彼知也疏能忘其知故似不知也不知而後知之注我不知則彼知自用彼知自用則天下莫不皆知也疏不知而知故不知而後知此是真知其問之也不可以有崖注應物宜而無方而不可以無崖注各以其分頡滑有實注萬物雖頡滑不同而物物各自有實也疏頡滑不同也萬物紛擾頡滑不同統而治之成資實道古今不代注各自有故不可相代疏古自在古不從古以來今今自存今亦不從今以生古物各有性故不相代换也而不可以虧注宜各盡其分也疏時不往來法無遷貿豈賴古以為今邪則可不謂有大揚榷乎注榷而揚之有大限也疏如上所問其道廣大豈不謂顯揚妙理而榷實論之乎闔不亦問是己奚惑然為注若問其大榷則物有至分故忘己任物之理可得而知也奚為而惑若此也疏闔何不也奚何無識之類若夜游何不詢問聖人及其弱喪而迷惑困苦如是何為也以不惑解惑復於不惑是尚大不惑注夫惑不可解故尚大不惑愚之至也是以聖人從而任之所以皇王殊迹隨世為名也疏不惑聖智惑於凡情也以聖智之言辨於凡惑忘得反本復乎真根而不能得意忘言而執乎聖迹貴重明言以不惑為大此乃欲尚不惑豈能除惑哉斯又遣於不惑也南華真經注疏卷之二十六
