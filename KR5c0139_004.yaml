body:
  text: 南華真經注疏卷之四福四河南郭象注唐西華法師成玄英疏內篇養生主第三夫生以養存則養生者理之極也若乃養過其極以養傷生非養生之主也吾生也有涯注所禀之分各有極也疏涯分也夫生也受形之載禀之自然愚智修短各有涯分而知止守分不蕩於外者養生之妙也然黔首之類莫不稱吾則凡稱吾者皆有極者也而知也無涯注夫舉重携輕而神氣自若此力之所限也而尚名好勝者雖復絶膂猶未足以慊其願此知之無涯也故知之為名生於失當而滅於冥極冥極者任其至分而無豪銖之加是故雖負萬鈞茍當其所能則忽然不知重之在身雖應萬機泯然不覺事之在己此養生之主也疏所禀形性各有限極而分别之智徇物無涯遂使心因形勞未慊其願不能止分非養生之主也以有涯隨無涯殆己注以有限之性尋無極之知安得而不困哉疏夫生也有限智也無涯是以用有限之生逐無涯之智故形勞神弊而危殆者也己而為知者殆而已矣注已困於知而不知止又為知以救之斯養而傷之者真大殆也疏無涯之智已用於前有為之學救之於後欲不危殆其可得乎為善無近名為惡無近刑注忘善惡而居中任萬物之自為悶然與至當為一故刑名遠己而全理在身也疏夫有為俗學抑乃多徒要功而言莫先善惡故為善也無不近乎名譽為惡也無不鄰乎刑戮是知俗智俗學未足以救前知適有疲役心靈更增危殆緣督以為經注順中以為常也疏緣順也督中也經常也夫善惡兩忘刑名雙遣故能順一中之道處真常之德虛夷任物與世推遷養生之妙在乎兹矣可以保身可以全生可以養親注養親以適可以盡年注苟得中而冥度則事事無不可也夫養生非求過分蓋全理盡年而已矣疏夫惟妙捨二偏而處於中一者故能保守身形全其生道外可以孝養父母大順人倫內可以攝衛生靈盡其天命庖丁為文惠君解牛手之所觸肩之所倚足之所履膝之所踦砉然嚮然奏刀騞然疏庖丁謂掌厨丁役之人今之供膳是也亦言丁名也文惠君即梁惠王也解宰割之也踦下角刺也言庖丁善能宰牛見其間理故以其手摶觸以肩倚著用腳踏履用膝刺築遂使皮肉離析砉然嚮應進奏鸞刀騁然大解此蓋寄庖丁以明養生之術者也莫不中音合於桑林之舞乃中經首之會注言其因便施巧無不間解盡理之甚既適牛理又合音節疏桑林殷湯樂名也經首咸池樂章名則堯樂也庖丁神彩從容妙盡牛理既而改割聲嚮雅合宫商所以音中桑林韻符經首也文惠君曰嘻善或技蓋至此乎疏嘻歎聲也惠君既見庖丁因便施巧奏音節遠合樂章故美其技術一至於此者也庖丁釋刀對曰臣之所好者道也進乎技矣注直寄道理於技耳所好者非技也疏捨釋鸞刀對答養生之道故倚技術進獻於君又解進過也所好者養生之道過於解牛之技耳始臣之解牛之時所見無非牛者注未能見其理間疏始學屠宰未見間理所覩唯牛亦猶初學養生未照真境是以觸途皆礙三年之後未嘗見全牛也注但見其理間也疏操刀既久頻見理間所以才覩有牛已知空卻亦猶服道日久智照漸明所見塵境無非虛幻方今之時臣以神遇而不以目視注暗與理會疏遇會也經乎一十九年合陰陽之妙數率精神以會理豈假目以看之亦猶學道之人妙契至極推心靈以虛扇豈用眼以取塵也官知止而神欲行注司察之官廢縱心而順理疏官者主司之謂也謂目主於色耳司於聲之類是也既而神遇不用目視故眼等主司悉皆停廢從心所欲順理而行善養生者其義亦然依乎天理注不橫絶也疏依天然之腠理終不橫截以傷牛亦猶養生之妙道依自然之涯分必不貪生以夭折也批大卻注有際之處因而批之令離疏間郤交際之處用力而批戾之令其筋骨各相離異亦猶學道之人生死窮通之際用心觀照令其解脫導大竅注節解竅空就導令殊疏竅空也骨節空處蹴導令殊亦猶學人以有資空將空導有因其固然注刀不妄加疏因其空郤之處然後運刀亦因其眼見耳聞必不妄加刀然也技經肯綮之未嘗注技之妙也常遊刃於空未嘗經槩於微礙也而況大軱乎注軱戾大骨衄刀刃也疏肯綮肉著骨處也軱大骨也夫技術之妙遊刃於空微礙尚未曾經大骨理當不犯況養生運智妙體真空細惑尚不染心粗塵豈能纍德良庖歲更刀割也注不中其理間也疏良善之庖猶未中理經乎一歲更易其刀況小學之人未體真道證空捨有易奪之心者矣族庖月更刀折也注中骨而折刀也疏況凡鄙之夫心靈暗塞觸境皆礙必損智傷神今臣之刀十九年矣所解數千牛矣而刀刃若新發於硎注硎砥石也疏硎砥礪石也十陰數也九陽數也故十九年極陰陽之妙也是以年經十九牛解數千遊空涉虛不損鋒刃故其刀鋭利猶若新磨者也況善養生人智窮空有和光處世妙盡陰陽雖復千變萬化而自新其德參涉萬境而常湛凝然矣彼節者有間而刀刃者無厚以無厚入有間恢恢乎其於遊刃必有餘地矣疏彼牛骨節素有間郤而刀刃鋒鋭薄而不厚用無厚之刃入有間之牛故遊刃恢恢必寬大有餘矣況養生之士體道之人運至忘之妙智遊虛空之物境是以安排造適間暇有餘境智相冥不一不異是以十九年而刀刃若新發於硎疏重疊前文結成其義雖然每至於族吾見其難為注交錯聚結為族怵然為戒視為止注不復屬目於他物也行為遲注徐其手也疏節骨交聚磐結之處名為族也雖復遊刃於空善見其卻每至交錯之處未嘗不留意艱難為其怵惕戒愼專視徐手況體道之人雖復達彼虛幻至於境智交涉必須戒愼艱難不得輕染根塵動傷於寂者也動力甚微謋然已解注得其宜則用力少如土委地注理解而無刀迹若聚土也疏謋化百反謋然骨肉離之聲也運動鸞刀甚自微妙依於天理所以不難如土委地有何蹤跡況運用神智明照精微涉於塵境曾無罣礙境智冥合能所泯然提刀而立為之四顧為之躊躇滿志注逸足容豫自得之謂疏解牛事訖間放從容提挈鸞刀倣徨徙倚既而風韻清遠所以高視四方志氣盈滿為之躊躇自得養生會理其義亦然善刀而藏之注拭刀而韜之也疏善能保愛故拭而韜之況美攝生人光而不耀文惠君曰善哉吾聞庖丁之言得養生焉注以刀可養故知生亦可養疏魏侯聞庖丁之言遂悟養生之道也美其神妙故歎以善哉公文軒見右師而驚曰是何人也惡乎介也注介偏刖之名疏姓公文名軒宋人也右師官名也介刖也公文見右師刖足故驚問所由於何犯忤而致此殘刖於足者也天與其人與注知之所無奈何天也犯其所知人也疏為禀自天然少兹一足為犯於人事故被虧殘此是公文致問之辭故也曰天也非人也天之生是使獨也注偏刖曰獨夫師一家之知而不能兩存其足則是知之無所奈何若以右師之知而必求兩全則心神內困而形骸外弊矣豈直偏刖而已哉疏夫智之明暗形之虧全並禀自天然非關人事假使犯於王憲致此形殘亦是天生頑愚謀身不足直知由人以虧其形不知由天以暗其智是知有與獨無非命也人之貌有與也注兩足共行曰有與有與之貌未有疑其非命也以是知其天也非人也注以有與者命也故知獨者亦非我也是以達生之情者不務生之所無以為達命之情者不務命之所無奈何也全其自然而已疏與共也凡人之貌皆有兩足共行禀之造物故知我之一腳遭此形殘亦無非命也欲明窮通否泰愚智虧全定乎冥兆非由巧拙達斯理趣者方可全生澤雉十步一啄百步一飲不蘄畜乎樊中注蘄求也樊所以籠雉也夫俯仰乎天地之間逍遙乎自得之場固養生之妙處也又何求於入籠而服養哉疏蘄求也樊中雉籠也夫澤中之雉任於野性飲啄自在放曠逍遙豈欲入樊籠而求服養譬養生之人蕭然嘉遁唯適情於林籟豈企羡於榮華又解澤似雉而非澤尾長而雉尾短澤雉之類是也神雖王不善也注夫始乎適而未嘗不適者忘適也雉心神長王志氣盈豫而自放於清曠之地忽然不覺善為之善也疏雉居山澤飲啄自在心神長王志氣盈豫當此時也忽然不覺善之為善既遭樊籠性情不適方思昔日甚為清暢鳥既如此人亦宜然欲明至適忘適至善忘善老聃死秦失弔之三號而出注人弔亦弔人號亦號疏老君即老子也姓李名耳字伯陽外字老聃大聖人也降生陳國苦縣當周平王時去周西度流沙適之罽賔而內外經書竟無其迹而此獨云死者欲明死生之理泯一凡聖之道均齊此蓋莊生寓言耳而老君為大道之祖為天地萬物之宗豈有生死哉故託此言聖人亦有死生以明死生之理也故老君降生行數升天備載者經不具言也秦失者姓秦名失懷道之士不知何許人也既死且弔爰洎三號而俯跡同凡事終而出也弟子曰非夫子之友邪注怪其不倚户觀化乃至三號也疏秦失老君俱遊方外既號且弔豈曰清高故門人驚疑起非友之問曰然疏然由是也秦失答弟子云是我方外之友然則弔焉若此可乎疏方外之人行方內之禮號弔如此於理可乎未解和光更致斯問者也曰然注至人無情與衆號耳故若斯可也疏然猶可也重寂相即內外冥符故若其可也始也吾以為其人也而今非也疏秦失初始入弔謂哭者是方外門人及見哀慟過知非老君弟子也向吾入而弔焉有老者哭之如哭其子少者哭之如哭其母彼其所以會之必有不蘄言而言不蘄哭而哭者注嫌其先物施惠不在理上住故致此甚愛也疏蘄求也彼衆人也夫聖人虛懷物感斯應哀憐兆庶愍念蒼生不待勤求為其演說故其死也衆來聚會號哭悲慟如於母子斯乃凡情執滯妄見死生感於聖恩致此哀悼以此而測故知非老君門人也是遁天倍倩忘其所受注天性所受各有本分不可逃亦不可加疏是指斥哭人也倍加也言逃遁天然之性加添流俗之情妄見死之可哀故忘失所受之分也古者謂之遁天之刑注感物大深不止於當遁天者也將馳鶩於憂樂之境雖楚戮未加而性情已困庸非刑哉疏夫逃遁天理倍加俗情哀樂經懷心靈困苦有同捶楚寧非刑戮古之達人有如此議適來夫子時也注時自生也適去夫子順也注理當死也疏夫子者是老君也秦失歎老君大聖妙達本源故適爾生來皆應時而降誕簫然死去亦順理而反真耳安時而處順哀樂不能入也注夫哀樂生於失得者也今玄通合變之士無時而不安無順而不處冥然與造化為一則無往而非我矣將何得何失孰死孰生哉故任其所受而哀樂無所措其間矣疏安於生時則不厭於生處於死順則不惡於死千變萬化未始非吾所適斯適故憂樂無措其懷矣古者謂是帝之縣解注以有係者為縣則無係者縣解也縣解而性命之情得矣此養生之要也疏帝者天也為生死所係者為縣解則無死無生者縣解也夫死生不能係憂樂不能入者而遠古聖人謂是天然之解脫也且老君大聖冥一死生豈復逃遁天刑馳鶩憂樂子玄此注失之遠矣若然者何謂安時處順帝之縣解乎文勢前後自相鋒楯是知遁天之刑屬在哀慟之徒非關老君也指窮於為薪火傳也注窮盡也為薪猶前薪也前薪以指指盡前薪之理故火傳而不滅心得納養之中故命續而不絶明夫養生乃生之所以生也疏窮盡也薪柴樵也為前也言人然火用乎前之能盡然火之理者前薪雖盡後薪以續前後相繼故火不滅也亦猶善養生者隨變任化與物俱遷故吾新吾曾無係戀未始非我故續而不絶者也不知其盡也注夫時不再來今不一停故人之生也一息一得耳向息非今息故納養而命續前火非後火故為薪而火傳火傳而命續由夫養得其極也世豈知其盡而更生哉疏夫迷忘之徒役情執固豈知新新不住念念遷流昨日之我於今已盡今日之我更生於後耶舊來分此一篇為七章明義觀其文勢過為繁冗今將為善合於第一指窮合於老君總成五章無所猜嫌也南華真經注疏卷之四
