  - {type: line-break, offset: 3229, content: '', id: KR5c0139_master_017-bkklb317}
  - {type: variant, offset: 3236, length: 162, content: 不雜爲素則雖龍章鳳姿倩乎有非常之觀乃至素也若不能保其自然之質而雜乎外飾則雖犬羊之鞹庸得謂之純素哉䟽夫混迹世物之中而與物無雜者至素者也參變囂塵之内而其神不虧者至純者也豈復獨立於高山之頂拱手於林籟之間而稱純素哉蓋不然乎此結釋前純素之道義也能體純素謂之眞人䟽體悟解也妙契純素之理則所在皆眞道也故可謂得眞道之人也南華眞經注䟽卷之十七, CK-KZ: ''}
