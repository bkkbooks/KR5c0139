markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', CK-KZ: 應既而驅馭群品故以應帝王次之駢拇以下皆以篇名二字爲題既无别義今不復次篇也而自古高士晉漢逸人皆莫不耽翫爲之義訓雖注述無可間然並有美辭咸能索隱玄英不揆庸昧少而習焉研精覃思三十年矣依子玄所注三十三篇輙爲疏解總三十卷雖復詞情疎拙亦頗有心跡指歸不敢貽厥後人聊自記其遺忘耳唐西華法師成玄英撰重刋道藏輯要}
