body:
  text: 南華真經注疏卷之三十二尺六河南郭象注唐西華法師成玄英疏雜篇說劍第三十昔趙文王喜劍劍士夾門而客三千餘人日夜相擊於前死傷者歲百餘人好之不厭如是三年國衰諸侯謀之疏趙惠王名何趙武靈王之子也好擊劍之士養客三千好無厭足其國衰弊故諸侯知其無道共相謀議欲將伐之也太子悝患之募左右曰孰能說王之意止劍士者賜之千金左右曰莊子當能疏悝趙太子名也厭患其父喜好干戈故欲千金以募說士莊子大賢當能止劍也太子乃使人以千金奉莊子莊子弗受與使者俱往見太子曰太子何以教周賜周千金太子曰聞夫子明聖謹奉千金以幣從者夫子弗受悝尚何敢言疏欲教我何事乃賜千金既見金多故問太子曰聞莊子賢哲聖明故所以贈千金以充從車之幣帛也莊子曰聞太子所欲用周者欲絶王之喜好也使臣上說大王而逆王意下不當太子則身刑而死周尚安所事金乎使臣上說大王下當太子趙國何求而不得也太子曰然吾王所見唯劍士也莊子曰諾周善為劍太子曰然吾王所見劍士皆蓬頭突鬢垂冠曼胡之纓短後之衣瞋目而語難王乃悅之今夫子必儒服而見王事必大逆疏髮亂如蓬鬢毛突出鐵為冠垂下露面曼胡之纓謂屯項項抹額也短後之衣便於武事瞋目怒眼勇者之容憤然置胸故語聲難瀝斯劍士之形服也莊子曰請治劍服治劍服三日乃見太子太子乃與見王王脫白刃待之莊子入殿門不趨見王不拜疏夫自得者內無懼心故不趨走也王曰子欲何以教寡人使太子先疏汝欲用何術以教諫於我而使太子先言於我乎曰臣聞大王喜劍故以劍見王王曰子之劍何能禁制曰臣之劍十步一人千里不留行王大悅之曰天下無敵矣疏其劍十步殺一人一去千里行不留住鋭快如是寧有敵乎莊子曰夫為劍者示之以虛開之以利後之以發先之以至願得試之疏夫為劍者道也是以忘己虛心開通利物感而後應機照物先莊子之用劍也王曰夫子休就舍待命令設戲請夫子疏辭㫖清遠感動王心故令休息屈就館舍待設劍戲然後邀延也王乃校劍士七日死傷者六十餘人得五六人使奉劍於殿下乃召莊子王曰今日試使士敦劍疏敦斷也試陳劍士使考教使斷以定勝劣莊子曰望之久矣疏企望日久請早試之王曰夫子所御杖長短何如曰臣之所奉皆可疏御用也謂莊實可擊劍故問之然臣有三劍唯王所用請先言而後試王曰願聞三劍曰有天子劍有諸侯劍有庶人劍王曰天子之劍何如曰天子之劍以燕溪石城為鋒齊岱為鍔疏鋒劍端也鍔刃也燕溪在燕國石城塞外山此地居北以為劍鋒齊國岱嶽在東為劍刃也晋魏為脊周宋為鐔疏鐔環也晋魏二國近乎趙地故以為脊也周宋二國近南故以為環也韓魏為鋏疏鋏把也韓魏二國在趙之西故以為把也包以四夷裏以四時疏懷四夷以道德順四時以生化才以渤海帶以常山疏渤海滄州也常山北嶽也造化之中以山海鎮其地也制以五行論以刑德疏五行金木水火土刑刑罰德德化也以此五行匡制區宇論其刑德以御群生開以陰陽持以春夏行以秋冬疏夫陰陽開闢春夏維持秋冬肅殺自然之道也此劍直之無前舉之無上按之無下運之無旁上决浮雲下絶地紀此劍一用匡諸侯天下服矣疏夫以道為劍則無所不包故上下旁通莫能礙者浮雲地紀豈足言哉既以造化為功故無不服也此天子之劍也文王芒然自失疏夫才小聞大不相承領故芒然若涉海失其所謂類魏惠王之聞韶樂也曰諸侯之劍何如曰諸侯之劍以知勇士為鋒以清廉士為鍔以賢良士為脊以忠聖士為鐔以豪桀士為鋏此劍直之亦無前舉之亦無上案之亦無下運之亦無旁上法圓天以順三光下法方地以順四時中和民意以安四鄉疏四鄉猶四方也夫能法象天地而知萬物之情謂諸侯所以為異也但能依用此劍而御于邦國亦宇內無敵此劍一用如雷霆之震也四封之內無不賔服而聽從君命者矣此諸侯之劍也疏易以震卦為諸侯故雷霆為諸侯之斂也王曰庶人之劍何如曰庶人之劍蓬頭突鬢垂冠曼胡之纓短後之衣瞋目而語難相擊於前上斬頸領下决肝肺此庶人之劍無異於鬥雞一旦命已絶矣無所用於國事今大王有天子之位而好庶人之劍臣竊為大王薄之疏莊子雄辨冠絶古今故能說化趙王去其所好而結會㫖歸在於此矣王乃牽而上殿宰人上食王三環之疏環繞也王覺己非深懷慚惡命莊子上殿以展愧情繞食三周不能安坐氣急心悶豈復能飱乎莊子曰大王安坐定氣劍事已畢奏矣於是文王不出宫三月劍士皆服斃其處也疏不復受賞故恨而致死也南華真經注疏卷之三十二
