body:
  text: 南華真經注疏卷之九緣三河南郭象注唐西華法師成玄英疏內篇應帝王第七夫無心而任乎自化者應為帝王也齧缺問於王倪四問而四不知疏四問而四不知則齊物篇中四問也夫帝王之道莫若忘知故以此義而為篇首老子云不以智治國國之德者也齧缺因躍而大喜行以告蒲衣子蒲衣子曰而乃今知之乎疏蒲衣子堯時賢人年八歲舜師之讓位不受即被衣子也齧缺得不知之妙㫖仍踊躍而喜歡走以告於蒲衣子迷王倪之深義蒲衣是方外之大賢達忘言之至道理無知而固久汝今日乃知也有虞氏不及泰氏注夫有虞氏之與泰氏皆世事之迹耳非所以迹也所以迹者無迹也世孰知之哉未之嘗名何勝負之有邪然無迹者乘群變屬萬世世有夷險故迹有不及也疏有虞氏舜也泰氏即太昊伏羲也三皇之世其俗淳和五帝之時其風澆競澆競則運知而養物淳和則存真而馭㝢不及之義驗此可知也有虞氏其猶臧仁以要人亦得人矣而未始出於非人注夫以人所好為是人所惡為非人者唯以是非為域者也夫能出於非人之域者必入於無非人之境矣故無得無失無可無不可豈直臧仁而要人也疏夫舜包臧仁義要求士庶以得百姓之心未是忘懷自合天下故出於是非之域亦有作臧字者臧善也善於仁義要求人心者也泰氏其卧徐徐其覺于于疏徐徐寬緩之容于于自得之貌伏犧之時淳風尚在故卧則安間而徐緩覺則歡娛而自得也一以己為馬一以己為牛注夫如是又奚是人非人之有哉斯可謂出於非人之域疏忘物我遣是非或馬或牛隨人呼召人獸尚且無主何是非之有哉其知情信注任其自知故情信疏率其真知情無虛矯故實信也其德甚真注任其自得故無僞疏以不德為德德無所德故不僞者也而未始入於非人注不入乎是非之域所以絶於有虞之世疏既率其情其德不僞故能超出心知之境不入是非之域者也肩吾見狂接輿狂接輿曰日中始何以語汝疏肩吾接輿已具前解日中始賢人姓名即肩吾之師也既是汝師有何告示此是接輿發語以問故也肩吾曰告我君人者以己出經式義度人孰敢不聽而化諸疏式用也教我為君之道化物之方必須己出智以經綸用仁義以導俗則四方氓庶誰不聽從遐遠黎元敢不歸化耶狂接輿曰是欺德也注以已制物則物失其真疏夫以己制物物喪其真欺誑之德非實道其於治天下也猶涉海鑿河而使蚉負山也注夫寄當於萬物則無事而自成以一身制天下則功莫就而任不勝也疏夫溟海宏博深廣難窮而穿之為河必無成理亦猶大道遐曠玄絶難知而鑿之為義其功難克又蚉蟲至小山嶽極高令其負荷無由勝任以智經綸用仁理物德小謀大其義亦然夫聖人之治也治外乎注全其性分之內而已疏隨其分內而治之必不分外治物治乎外者言不治之者也正而後行注各正性命疏順其正性而後行化確乎能其事者而已矣注不為其所不能疏確實也順其實性於事有能者因而任之止於分內不論於外者耳且鳥高飛以避增弋之害鼷鼠深穴乎神丘之下以避熏鑿之患注禽獸猶各有以自存故帝王任之而不為則自成也疏矰網也弋以繩係箭而射之也鼷鼠小鼠也神丘社壇也鳥則高飛而逃網鼠則深穴而避薰斯皆率性自然豈待教而遠害者也鳥鼠既耳在人亦然故知式義出經誣罔之甚矣而曾二蟲之無知注言汝曾不知此二蟲之各存而不待教乎疏而汝也汝不曾知此二蟲不待教令而解避害全身者乎既深穴高飛豈無知耶况在人倫而欲出經式義欺矯活物不亦妄哉天根遊於殷陽至蓼水之上適遭無名人而問焉曰請問為天下疏天根無名並為姓字寓言問答也殷陽殷山之陽蓼水在趙國界內遭遇也天根遨遊於山水之側適遇無名人而問之請問之意在乎天下無名人曰去汝鄙人也何問之不豫也注問為天下則非起於太初止於玄冥也疏汝是鄙陋之人宜其速去所問之㫖甚不悅豫我心豫方將與造物者為人注任人之自為疏夫造物為人素分各足何勞作法措意治之既同於大通故任而不助也厭則又乘夫莽眇之鳥以出六極之外而遊無何有之鄉以處壙埌之野注莽眇群碎之謂耳乘群碎馳萬物故能出處常通而無狹滯之地疏莽眇深埦之謂壙埌宏博之名鳥則取其無迹輕升六極猶六合也夫聖人馭世恬淡無為大順物情有同造化若其息用歸本厭離世間則乘深遠之大道凌虛空而滅迹超六合以放任遊無有以逍遙凝神智於射山處清虛於曠野如是則何天下之可為哉蓋無為者也汝又何帠以治天下感豫之心為注言皆放之自得之場則不治而自治也疏夫放而任之則物皆自化有何帠術輒欲治之感動我心何為如此又復問疏天根未達更請决疑無名人曰汝遊心於淡注其任性而無所飾焉則淡矣合氣於漠注漠然靜於性而止疏可遊汝心神於恬淡之域合汝形氣於寂寞之鄉唯形與神二皆虛靜如是則天下不待治而自化者耳順物自然而無容私焉而天下治矣注任性自生公也心欲益之私也容私果不足以生生而順公乃全也疏隨造化之物情順自然之本性無容私作法術措意治之放而任之則物我全之矣陽子居見老聃曰有人於此嚮疾彊梁物徹疏明學道不倦如是者可比明王乎疏姓陽名朱字子居問老子明王之道假且有人素性聰達神智捷疾猶如嚮應涉事理務彊幹果决鑒物洞徹疏通明敏學道精勤曾無懈倦如是之人可得將明王聖帝比德不乎老聃曰是於聖人也胥易技係勞形怵心者也注言此功夫容身不得不足以比聖主疏若將彼人比聖主無易胥徒勞苦改易形容技術工巧神慮係纍劬勞故形容變改係纍故心靈怵惕也且也虎豹之文來田猿狙之便執斄之狗來藉如是者可比明王乎注此皆以其文章技能係纍其身非涉虛以御乎無方也疏藉繩也猿狙獼猴也虎豹之皮有文章故來田獵獼猴以跳躍便捷恆被繩拘狗以執捉狐狸每遭係頸若以嚮疾之人類於聖帝則此之三物可比明王也耳陽子居蹴然曰敢問明王之治疏既其失問故驚𢜺變容重請明王為政其義安在老聃曰明王之功蓋天下而似不自己注天下若無明主則莫能自得今之自得實明王之功也然功在無為而還在天下皆得自任故似非明王之功疏夫聖人為政功侔造化覆等玄天載同厚地而功成不處故非己為之也化貸萬物而民弗恃注夫明王皆就足物性故人人皆云我自爾而莫知恃賴於明王疏誘化蒼生令其去惡貸借萬物與其福善而玄功潜被日用不知百姓謂我自然不賴君之德有莫舉名使物自喜注雖有蓋天下之功而不舉以為己名故物皆自以為得而喜疏莫無也舉顯也推功於物不顯其名使物各自得而歡喜適悅者也立乎不測注居變化之塗日新而無方而遊於無有者也注與萬物為體則所遊者虛也不能冥物則忤物不暇何暇遊虛哉疏無有妙本也樹德立功神妙不測而即迹即本故常遊心於至極也鄭有神巫曰季咸疏鄭國有神異之巫甚有靈驗從齊而至姓季名咸耳知人之死生存亡禍福壽夭期以歲月旬日若神鄭人見之皆棄而走注不喜自聞死日也疏占候吉凶必無差失剋定時日驗若鬼神不喜預而聞凶禍是以棄而走避也列子見之而心醉歸以告壺子疏列子事迹具逍遙篇今不重解壺子鄭之得道人也號壺子名林即列子之師也列子見季咸小術驗若鬼神中心羡仰恍然如醉既而歸反具告其師曰始吾以夫子之道為至矣則又有至焉者矣注謂季咸之至又過於夫子疏夫子壺子也至極也初始禀學先生之道為至今見季咸其道又極於夫子此是禦寇心醉之言也壺子曰吾與汝既其文未既其實而固得道與疏與授也既盡也吾比授汝始盡文言於其妙理余未造實汝固執文字謂言得道豈知筌蹄異於魚兔耶衆雌而無雄而又奚卵焉注言列子之未懷道也疏夫衆雌無雄無由得卵既文無實亦何道之有哉而以道與世亢必信夫故使人得而相汝注未懷道則有心有心而亢其一方以必信於世故可得而相之疏汝用文言之道而與世間亢對既無大智必信彼小巫是故季咸得而相汝者也嘗試與來以豫示之疏夫至人凝遠神妙難知本迹寂動非凡能測故召令至以我示之也明日列子與之見壺子出而謂列子曰嘻子之先生死矣弗活矣不以旬數矣吾見怪焉見濕灰焉疏嘻聲也子林示其寂泊之容季咸謂其將死先怪已彰不過十日弗活之兆類彼濕灰也列子入泣涕沾襟以告壺子壺子曰嚮吾示之以地文萌乎不震不正注萌然不動亦不自正與枯木同其不華濕灰均於寂魄此乃至人無感之時也夫至人其動也天其靜也地其行也水流其止也淵默淵默之與水流天行之與地止其於不為而自爾一也今季咸見其尸居而坐忘即謂之將死覩其神動而天隨因謂之有生誠應不以心而理自玄符與變化升降而以世為量然後足為物主而順時無極故非相者所測耳此應帝王之大意也疏文象也震動也地以無心而寧靜故以不動為地文也萌然寂泊曾不震動無心自正文類傾頽此是大聖無感之時小巫謂之弗活也而壺丘示見義有四重第一示妙本虛凝寂而不動二示垂迹應感動而不寂第三本迹相即動寂一時第四本迹兩忘動寂雙遣此則第一妙本虛凝寂而不動也是殆見吾杜德機也注德機不發曰杜疏殆近也杜塞也機動也至德之機關而不發示其凝淡便為濕灰小巫庸瑣近見於此矣嘗又與來疏前者伊妄言我死今時重命令遣更來也明日又與之見壺子出而謂列子曰幸矣子之先生遇我也有瘳矣全然有生矣疏此即第二垂迹應感動而不寂示以應容神氣微動既殊槁木全似生平而濫以聖功用為己力謬言遇我幸矣有瘳也哉吾見其杜權矣注權機也今乃自覺昨日之所見見其杜權故謂之將死疏權機也前時一覩有類濕灰杜塞機權全無應動今日遇我方待全生小巫寡識有兹叨濫者也列子入以告壺子壺子曰嚮吾示之以天壤注天壤之中覆載之功見矣比之地文不猶外乎此應感之容也疏壤地也示之以天壤謂示以應動之容也譬彼兩儀覆載萬物至人應感其義亦然名實不入注任自然而覆載則天機玄應而名利之飾皆為棄物疏雖復降迹同塵和光利物而名譽真實曾不入於靈腑也而機發於踵注常在極上起疏踵本也雖復物感而動不失時宜而此之神機發乎妙本動而常寂是殆見吾善者機也注機發而善於彼彼乃見之疏示其善機應此兩儀季咸見此形容所以謂之為善全然有生則是見善之謂也嘗又與來明日又與之見壺子出而謂列子曰子之先生不齊吾無得而相焉試齊且復相之疏此是第三示本跡相即動寂一時夫至人德滿智圓虛心凝照本跡無别動靜不殊其道深玄豈小巫能測耶謂齊其心迹試相之焉不敢的定吉凶故言且復相者耳列子入以告壺子壺子曰吾嚮示之以太沖莫勝注居太沖之極浩然治心而玄同萬方故勝負莫得措其間也疏沖虛也莫無也夫聖照玄凝與太虛等量本跡相即動寂一時初無優劣有何勝負哉是殆見吾衡氣機也注無名不平混然一之以管窺天者莫見其涯故似不齊疏衡平也即跡即本無優無劣神氣平等以此應機小巫近見不能遠測心中迷亂所以請齊耳鯢桓之審為淵止水之審為淵流水之審為淵淵有九名此處三焉注淵者靜默之謂耳夫水常無心委順外物故雖流之與止鯢桓之與龍躍常淵然自若未始失其靜默也夫至人用之則行捨之則止行止雖異而玄默一焉故略舉三異以明之雖波流九變治亂紛如居其極者常淡然自得泊乎忘為也疏此舉譬也鯢大魚也桓盤也審也夫水體無心動止隨物或鯨鯢盤桓螭龍騰踴或凝湛止住或波流湍激雖復漣漪清淡多種不同而玄默無心其致一也故鯢桓以方衡氣止水以譬地文流水以喻天壤雖復三異而虛照一焉而言淵有九名者也鯢桓止水流水泛水濫水沷水雍水文水肥水故謂之九也並出列子彼文具載此略叙有此三焉嘗又與來疏欲示極玄應須更召明日又與之見壺子立未定自失而走疏季咸前後虞度來相未呈玄遠猶有近見今者第四其道極深本跡兩忘動寂雙遣聖心行處非凡所測遂使立未安定奔逸而走壺子曰追之疏既見奔逃命令捉取列子追之不及反以報壺子曰己滅矣已失矣吾弗及已疏驚迫已甚奔馳亦速滅矣失矣莫知所之者也壺子曰嚮吾示之以未始出吾宗注雖變化無常而常深根寧極也疏夫妙本玄源窈冥恍惚超兹四句離彼百非不可以心慮知安得以形名取既絶言象無的宗塗不測所由故失而走吾與之虛而委蛇注無心而隨物化不知其誰何注泛然無所係也疏委蛇隨順之貌也至人應物虛已忘懷隨順逗機不執宗本既不可名目故不知的是何誰也因以為弟靡因以為波流故逃也注變化頽靡世事波流無往而不因也夫至人一耳然應世變而時動故相者無所措其目自失而走此明應帝王者無方也疏頽者放任靡者順從夫上德無心有感斯應放任不務順從於物而揚波塵往隨流世間因任前機曾無執滯千變萬化非相者所知是故季咸宜其逃逸也然後列子自以為未始學而歸疏季咸逃逸之後列子方悟己迷始覺壺丘道深神巫術淺自知未學請乞其退歸習尚無為伏膺玄業也三年不出為其妻爨食豕如食人注忘貴賤也疏不出三年屏於俗務為妻爨火忘於榮辱食豕如人净穢均等於事無與親注唯所遇耳疏悟於至理故均彼我涉於世事無親疏也雕琢復朴注去華取實疏雕琢華飾之務悉皆棄除直置任真復於朴素之道者也塊然獨以其形立注外飾去也疏塊然無情之貌也外除雕飾內違心智槁木之形塊然無偶也紛而封哉注雖動而真不散也疏封守也雖復涉世紛擾和光接物而守於真本確爾不移一以是終注使物各自終疏動不乖寂雖分擾而封哉應不離真常抱一以終始無為名尸注因物則物各自當其名也疏尸主也身尚忘遺名將安寄故無復為名譽之主也無為謀府注使物各自謀也疏虛淡無心忘懷任物故無復運為謀慮於靈府耳無為事任注付物使各自任疏各率素分恣物自為不復於事任用於己無為知主注無心則物各自主其知也疏忘心絶慮天順群生終不運知以主於物體盡無窮注因天下之自為故馳萬物而無窮疏體悟真源故能以智境冥會故曰皆無窮也而遊無眹注任物故無迹疏眹跡也雖遨遊天下接濟蒼生而晦迹韜光故無眹也盡其所受乎天注足則止也疏所禀天性物物不同各盡其能未為不足者也而無見得注見得則不知止疏夫目視之所見雖見不見得於分內之得雖得不得既不造意於見得故雖見得而無見得也亦虛而己注不虛則不能任群實疏所以盡於分內而無見得者自直虛心忘淡而已至人之用心若鏡注鑒物而無情疏夫懸鏡高堂物來斯照至人虛應其義亦然不將不迎應而不藏注來即應去即止疏將送也夫物有去來而鏡無迎送來者即照必不隱藏亦猶聖智虛凝無幽不燭物感斯應應不以心既無將迎豈有情於隱匿哉故能勝物而不傷注物來乃鑒鑒不以心故雖天下來照而無勞神之纍疏夫物有生滅而鏡無隱顯故常能照物而物不能傷亦由聖人德合二儀明齊三景鑒照遐廣覆載無偏用心不勞故無損害為其勝物是以不傷南海之帝為倏北海之帝為忽中央之帝為渾沌疏南海是顯明之方故以倏為有北是幽暗之域故以忽為無中央既非北非南故以混沌為非無非有者也倏與忽時相與遇於渾沌之地渾沌待之甚善疏有無二心會於非無非有之境和二偏心之執為一中之志故云待之甚善也倏與忽謀報渾沌之德曰人皆有七竅以視聽食息此獨無有嘗試鑿之疏倏忽二人由懷偏滯未能和會尚起學心忘嫌混沌之無心而謂穿鑿之有益也曰鑿一竅七日而渾沌死注為者敗之疏夫運四肢以滯境鑿七竅以染塵乖渾沌之至淳順有無之取捨是以不終天年中塗夭折勗哉學者幸免之焉故郭注云為者敗之也南華真經注疏卷之九
